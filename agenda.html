<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Agenda — Zion Church Lisboa</title>

    <link rel="icon" href="/assets/icons/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#009098">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zion Lisboa">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap"
          rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>

    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">

    <style>
        /* ── Layout ─────────────────────────────────────── */
        .content {
            flex: 1;
            overflow-y: auto;
            background: var(--bg-input);
            display: flex;
            flex-direction: column;
        }

        .content::-webkit-scrollbar {
            width: 4px;
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(0, 144, 152, 0.25);
            border-radius: 2px;
        }

        /* ── Banner ─────────────────────────────────────── */
        .banner {
            min-height: 28vh !important;
            background-image: url('assets/zion-predios.avif') !important;
            background-size: cover !important;
            background-position: center !important;
            align-items: flex-end !important;
            justify-content: space-between !important;
            display: flex !important;
            padding: 0 14px 14px !important;
            overflow: hidden !important;
            position: relative;
        }

        .banner-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
        }

        .banner-gradient {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 140px;
            background: linear-gradient(to bottom, rgba(2, 22, 30, 0), rgba(2, 22, 30, 1));
        }

        .back-btn {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(2, 22, 30, 0.65);
            border: 1px solid rgba(216, 195, 165, 0.35);
            border-radius: 999px;
            padding: 6px 14px;
            font-family: var(--font-title);
            font-size: 10px;
            letter-spacing: 1.5px;
            color: var(--primary);
            text-decoration: none;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: rgba(216, 195, 165, 0.12);
            border-color: var(--primary-light);
            color: var(--primary-light);
        }

        .page-badge {
            position: relative;
            z-index: 2;
            font-family: var(--font-title);
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--primary);
            text-transform: uppercase;
            background: rgba(2, 22, 30, 0.65);
            border: 1px solid rgba(216, 195, 165, 0.35);
            border-radius: 999px;
            padding: 6px 14px;
            backdrop-filter: blur(8px);
        }

        /* ── Toolbar ─────────────────────────────────────── */
        .cal-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-card);
            gap: 8px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .cal-nav {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .cal-nav-btn {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.12s;
            font-size: 16px;
            flex-shrink: 0;
        }

        .cal-nav-btn:hover {
            border-color: var(--primary);
            background: var(--primary-faint);
        }

        .cal-title {
            font-family: var(--font-title);
            font-size: 11px;
            font-weight: 700;
            color: var(--text-main);
            min-width: 150px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .cal-today-btn {
            padding: 5px 12px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            font-family: var(--font-title);
            font-size: 9px;
            letter-spacing: 1px;
            color: var(--primary-dark);
            cursor: pointer;
            transition: all 0.12s;
        }

        .cal-today-btn:hover {
            border-color: var(--primary-light);
            background: var(--primary-faint);
        }

        .cal-views {
            display: flex;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .cal-view-btn {
            padding: 5px 10px;
            font-size: 9px;
            font-family: var(--font-title);
            letter-spacing: 0.5px;
            cursor: pointer;
            border: none;
            background: var(--bg-input);
            color: var(--text-faint);
            transition: all 0.12s;
            border-right: 1px solid var(--border);
        }

        .cal-view-btn:last-child {
            border-right: none;
        }

        .cal-view-btn:hover {
            background: var(--primary-faint);
            color: var(--primary-dark);
        }

        .cal-view-btn.active {
            background: var(--primary);
            color: #fff;
        }

        /* ── Legenda / filtros ───────────────────────────── */
        .cal-legend {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            padding: 8px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-card);
            flex-shrink: 0;
            align-items: center;
        }

        .legend-label {
            font-family: var(--font-title);
            font-size: 9px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-faint);
            margin-right: 4px;
        }

        .legend-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px 3px 8px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            font-family: var(--font-title);
            font-size: 9px;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.12s;
            user-select: none;
        }

        .legend-chip:hover {
            border-color: var(--primary-light);
            color: var(--primary-dark);
        }

        .legend-chip.active {
            border-color: var(--primary);
            background: var(--primary-faint);
            color: var(--primary-dark);
            font-weight: 700;
        }

        .legend-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .legend-chip.active .legend-dot {
            outline: 2px solid var(--primary);
            outline-offset: 1px;
        }

        /* ── Cal body ─────────────────────────────────────── */
        .cal-body {
            overflow: auto;
            flex: 1;
        }

        /* ── Time grid ───────────────────────────────────── */
        .cal-week-header {
            display: grid;
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--bg-card);
            border-bottom: 2px solid var(--border);
        }

        .cal-header-time {
            border-right: 1px solid var(--border);
            padding: 8px 4px;
            font-size: 9px;
            color: var(--text-faint);
            text-align: center;
            width: 44px;
        }

        .cal-header-day {
            padding: 7px 4px;
            text-align: center;
            border-right: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.1s;
        }

        .cal-header-day:hover {
            background: var(--primary-faint);
        }

        .cal-header-day.today {
            background: var(--primary-faint);
        }

        .cal-wd-name {
            font-family: var(--font-title);
            font-size: 9px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-faint);
        }

        .cal-wd-num {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.3;
        }

        .cal-header-day.today .cal-wd-num {
            color: var(--primary);
        }

        .cal-body-grid {
            display: grid;
            position: relative;
        }

        .cal-time-col {
            border-right: 1px solid var(--border);
            flex-shrink: 0;
        }

        .cal-time-slot {
            height: 54px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            padding: 3px 4px 0;
            font-size: 9px;
            color: var(--text-faint);
            width: 44px;
            box-sizing: border-box;
        }

        .cal-day-col {
            border-right: 1px solid var(--border);
            position: relative;
            min-height: 100%;
        }

        .cal-day-col.today {
            background: rgba(0, 144, 152, 0.02);
        }

        .cal-hour-line {
            height: 54px;
            border-bottom: 1px solid var(--border);
        }

        .cal-hour-line:nth-child(even) {
            background: rgba(0, 0, 0, 0.008);
        }

        .cal-now-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: #e74c3c;
            z-index: 5;
            pointer-events: none;
        }

        .cal-now-line::before {
            content: '';
            position: absolute;
            left: -4px;
            top: -4px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e74c3c;
        }

        /* ── Evento card ─────────────────────────────────── */
        .cal-ev {
            position: absolute;
            left: 2px;
            right: 2px;
            border-radius: 6px;
            padding: 4px 6px;
            font-size: 10px;
            cursor: pointer;
            overflow: hidden;
            transition: filter 0.1s, transform 0.1s;
            z-index: 3;
            box-sizing: border-box;
            line-height: 1.3;
            border-left-width: 3px;
            border-left-style: solid;
        }

        .cal-ev:hover {
            filter: brightness(1.1);
            transform: scale(1.01);
            z-index: 4;
        }

        .cal-ev-title {
            font-weight: 700;
            font-family: var(--font-title);
            font-size: 9px;
            letter-spacing: 0.5px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cal-ev-sub {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.85);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 1px;
        }

        .cal-ev-badge {
            display: inline-block;
            font-family: var(--font-title);
            font-size: 7px;
            letter-spacing: 1px;
            padding: 1px 4px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        /* Tipo: evento */
        .cal-ev.tipo-evento {
            background: rgba(0, 80, 120, 0.75);
            border-left-color: #009098;
        }

        /* Tipo: sala agendamento */
        .cal-ev.tipo-sala {
            background: rgba(60, 40, 100, 0.7);
            border-left-color: #7b6af0;
        }

        /* Sub-tipos de evento */
        .cal-ev.tipo-culto {
            background: rgba(0, 80, 100, 0.8);
            border-left-color: #009098;
        }

        .cal-ev.tipo-celula {
            background: rgba(0, 90, 60, 0.8);
            border-left-color: #2ecc71;
        }

        .cal-ev.tipo-conferencia {
            background: rgba(100, 40, 0, 0.8);
            border-left-color: #e67e22;
        }

        .cal-ev.tipo-retiro {
            background: rgba(80, 0, 80, 0.75);
            border-left-color: #9b59b6;
        }

        .cal-ev.tipo-treinamento {
            background: rgba(0, 60, 110, 0.8);
            border-left-color: #3498db;
        }

        .cal-ev.tipo-social {
            background: rgba(120, 40, 0, 0.75);
            border-left-color: #e74c3c;
        }

        /* ── Vista mês ───────────────────────────────────── */
        .cal-month-grid {
            display: flex;
            flex-direction: column;
        }

        .cal-month-hdr {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            border-bottom: 2px solid var(--border);
            background: var(--bg-card);
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .cal-month-hdr-day {
            padding: 7px 4px;
            text-align: center;
            font-family: var(--font-title);
            font-size: 9px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-faint);
            border-right: 1px solid var(--border);
        }

        .cal-month-hdr-day:last-child {
            border-right: none;
        }

        .cal-month-body {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-auto-rows: minmax(80px, 1fr);
            border-left: 1px solid var(--border);
        }

        .cal-month-cell {
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 4px;
            min-height: 80px;
            cursor: pointer;
            transition: background 0.1s;
            overflow: hidden;
        }

        .cal-month-cell:hover {
            background: var(--primary-faint);
        }

        .cal-month-cell.today {
            background: rgba(0, 144, 152, 0.05);
        }

        .cal-month-cell.other {
            opacity: 0.35;
        }

        .cal-month-num {
            font-family: var(--font-title);
            font-size: 12px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 3px;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .cal-month-cell.today .cal-month-num {
            background: var(--primary);
            color: #fff;
        }

        .cal-month-ev {
            font-size: 9px;
            border-radius: 4px;
            padding: 2px 5px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: var(--font-title);
            font-weight: 700;
            color: #fff;
        }

        .cal-month-ev.tipo-evento {
            background: #009098;
        }

        .cal-month-ev.tipo-culto {
            background: #007a82;
        }

        .cal-month-ev.tipo-celula {
            background: #27ae60;
        }

        .cal-month-ev.tipo-conferencia {
            background: #d35400;
        }

        .cal-month-ev.tipo-retiro {
            background: #8e44ad;
        }

        .cal-month-ev.tipo-treinamento {
            background: #2980b9;
        }

        .cal-month-ev.tipo-social {
            background: #c0392b;
        }

        .cal-month-ev.tipo-sala {
            background: #5b4bcc;
        }

        .cal-month-more {
            font-size: 9px;
            color: var(--primary-dark);
            font-weight: 700;
            padding: 1px 4px;
        }

        /* ── Vista lista ─────────────────────────────────── */
        .lista-section {
            padding: 0 14px 20px;
        }

        .lista-date-hdr {
            font-family: var(--font-title);
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-faint);
            padding: 14px 0 8px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 8px;
        }

        .lista-date-hdr.today-hdr {
            color: var(--primary);
        }

        .lista-item {
            display: flex;
            gap: 12px;
            padding: 11px 13px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: var(--bg-card);
            margin-bottom: 7px;
            cursor: pointer;
            transition: all 0.18s;
            animation: fadeUp 0.3s ease both;
        }

        .lista-item:hover {
            border-color: var(--primary-light);
            box-shadow: var(--shadow-sm);
            transform: translateY(-1px);
        }

        .lista-time-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
            width: 44px;
        }

        .lista-time-ini {
            font-family: var(--font-title);
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
        }

        .lista-time-fim {
            font-size: 10px;
            color: var(--text-faint);
            margin-top: 2px;
        }

        .lista-stripe {
            width: 3px;
            border-radius: 2px;
            flex-shrink: 0;
            align-self: stretch;
            min-height: 36px;
        }

        .lista-info {
            flex: 1;
        }

        .lista-titulo {
            font-family: var(--font-title);
            font-size: 13px;
            color: var(--text-main);
            margin-bottom: 3px;
        }

        .lista-sub {
            font-size: 11px;
            color: var(--text-faint);
        }

        .lista-chip {
            display: inline-block;
            font-family: var(--font-title);
            font-size: 8px;
            letter-spacing: 1px;
            padding: 2px 7px;
            border-radius: 999px;
            color: #fff;
            margin-bottom: 4px;
        }

        .lista-item.tipo-evento .lista-stripe {
            background: #009098;
        }

        .lista-item.tipo-culto .lista-stripe {
            background: #007a82;
        }

        .lista-item.tipo-celula .lista-stripe {
            background: #27ae60;
        }

        .lista-item.tipo-conferencia .lista-stripe {
            background: #d35400;
        }

        .lista-item.tipo-retiro .lista-stripe {
            background: #8e44ad;
        }

        .lista-item.tipo-treinamento .lista-stripe {
            background: #2980b9;
        }

        .lista-item.tipo-social .lista-stripe {
            background: #c0392b;
        }

        .lista-item.tipo-sala .lista-stripe {
            background: #5b4bcc;
        }

        /* ── Popup ───────────────────────────────────────── */
        .cal-ev-popup {
            position: fixed;
            z-index: 500;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
            padding: 16px 18px;
            min-width: 240px;
            max-width: 300px;
            pointer-events: all;
            animation: popIn 0.12s ease both;
        }

        .cal-ev-popup-title {
            font-family: var(--font-title);
            font-size: 14px;
            color: var(--primary-dark);
            margin-bottom: 10px;
            padding-right: 22px;
            line-height: 1.4;
        }

        .cal-ev-popup-type {
            display: inline-block;
            font-family: var(--font-title);
            font-size: 8px;
            letter-spacing: 1.5px;
            padding: 2px 9px;
            border-radius: 999px;
            color: #fff;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .cal-ev-popup-row {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 5px;
            line-height: 1.5;
        }

        .cal-ev-popup-row strong {
            color: var(--text-main);
            font-family: var(--font-title);
            font-size: 10px;
            letter-spacing: 0.5px;
        }

        .cal-ev-popup-close {
            position: absolute;
            top: 10px;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 17px;
            color: var(--text-faint);
            line-height: 1;
        }

        .cal-ev-popup-close:hover {
            color: var(--text-main);
        }

        .cal-ev-popup-link {
            display: block;
            margin-top: 10px;
            padding: 7px 12px;
            border-radius: var(--radius-sm);
            background: var(--primary-faint);
            border: 1px solid var(--border);
            font-family: var(--font-title);
            font-size: 9px;
            letter-spacing: 1px;
            color: var(--primary-dark);
            text-align: center;
            text-decoration: none;
            transition: all 0.15s;
        }

        .cal-ev-popup-link:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* ── Empty / loading ─────────────────────────────── */
        .cal-empty {
            padding: 32px 16px;
            text-align: center;
            color: var(--text-faint);
            font-size: 13px;
        }

        .lista-empty {
            padding: 40px 16px;
            text-align: center;
            color: var(--text-faint);
            font-size: 13px;
            font-family: var(--font-title);
            letter-spacing: 1px;
        }

        /* ── Keyframes ───────────────────────────────────── */
        @keyframes fadeIn {
            from {
                opacity: 0
            }
            to {
                opacity: 1
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px)
            }
            to {
                opacity: 1;
                transform: none
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%)
            }
            to {
                transform: translateY(0)
            }
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(-4px)
            }
            to {
                opacity: 1;
                transform: none
            }
        }

        /* Desktop modal center */
        @media (min-width: 700px) {
            .cal-title {
                min-width: 200px;
            }
        }
    </style>
</head>
<body>
<div class="page-wrapper">

    <div class="banner">
        <div class="banner-overlay"></div>
        <div class="banner-gradient"></div>
        <a href="index" class="back-btn">← Início</a>
        <span class="page-badge">Agenda Zion Lisboa</span>
    </div>

    <div class="gold-line"></div>

    <div class="content" id="main-content">
        <div class="loading">

                     stroke-linejoin="round" width="12" height="12">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="2" y1="12" x2="22" y2="12"/>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>

                Site Global
            </a>
            <a class="footer-link" href="https://zionlisboa.pt/" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round" width="12" height="12">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="2" y1="12" x2="22" y2="12"/>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>

                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round" width="12" height="12">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
                    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>

            </a>

</div>

<script>
    // ── AUTH ────────────────────────────────────────────────────────────
    let currentUser = null;

    // ── CONFIG ──────────────────────────────────────────────────────────
    const SUPA_URL = window.SUPABASE_URL || '';
    const SUPA_KEY = window.SUPABASE_ANON_KEY || '';

    // ── SUPABASE ────────────────────────────────────────────────────────
    async function sb(path, opts = {}) {
        const token = await ZionAuth.getToken();
        const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
            ...opts,
            headers: {
                'apikey': SUPA_KEY,
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=representation',
                ...opts.headers
            }
        });
        if (!r.ok) {
            const e = await r.json().catch(() => ({}));
            throw {status: r.status, ...e};
        }
        return r.json();
    }

    // ── CONSTANTES CALENDÁRIO ───────────────────────────────────────────
    const CAL_HOURS_START = 6;
    const CAL_HOURS_END = 24;
    const CAL_SLOT_H = 54;

    // ── STATE ───────────────────────────────────────────────────────────
    const calState = {
        view: 'semana',
        anchorDate: new Date(),
        // filtros: null = tudo, Set de tipos
        filterTipos: null,
    };

    let salas = [];
    let allItems = []; // eventos + sala_agendamentos combinados

    // Tipos de evento com cores
    const TIPO_COLORS = {
        'culto': '#007a82',
        'celula': '#27ae60',
        'conferencia': '#d35400',
        'retiro': '#8e44ad',
        'treinamento': '#2980b9',
        'social': '#c0392b',
        'evento': '#009098',
        'sala': '#5b4bcc',
    };
    const TIPO_LABELS = {
        'culto': 'Culto',
        'celula': 'Celula',
        'conferencia': 'Conferencia',
        'retiro': 'Retiro',
        'treinamento': 'Treinamento',
        'social': 'Social',
        'evento': 'Evento',
        'sala': 'Sala',
    };

    function tipoClass(item) {
        if (item._source === 'sala') return 'tipo-sala';
        const t = (item.tipo || 'evento').toLowerCase()
            .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        return `tipo-${TIPO_COLORS[t] ? t : 'evento'}`;
    }

    function tipoColor(item) {
        if (item._source === 'sala') return TIPO_COLORS.sala;
        const t = (item.tipo || 'evento').toLowerCase()
            .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        return TIPO_COLORS[t] || TIPO_COLORS.evento;
    }

    function tipoLabel(item) {
        if (item._source === 'sala') return 'Sala';
        const t = (item.tipo || 'evento').toLowerCase()
            .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        return TIPO_LABELS[t] || 'Evento';
    }

    // ── UTILS ───────────────────────────────────────────────────────────
    function toDateStr(d) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${dd}`;
    }

    function fmtHora(dt) {
        return new Date(dt).toLocaleTimeString('pt-PT', {hour: '2-digit', minute: '2-digit'});
    }

    function fmtDia(dt) {
        return new Date(dt).toLocaleDateString('pt-PT', {
            weekday: 'long',
            day: 'numeric',
            month: 'long',
            year: 'numeric'
        });
    }

    // ── CARREGAR DADOS ──────────────────────────────────────────────────
    async function carregarDados() {
        let ini, fim;
        const d = calState.anchorDate;

        if (calState.view === 'dia') {
            ini = fim = toDateStr(d);
        } else if (calState.view === 'semana') {
            const seg = calWeekStart(d);
            const dom = new Date(seg);
            dom.setDate(dom.getDate() + 6);
            ini = toDateStr(seg);
            fim = toDateStr(dom);
        } else if (calState.view === 'lista') {
            // Lista: próximos 60 dias
            const start = new Date();
            const end = new Date();
            end.setDate(end.getDate() + 60);
            ini = toDateStr(start);
            fim = toDateStr(end);
        } else {
            const first = new Date(d.getFullYear(), d.getMonth(), 1);
            const last = new Date(d.getFullYear(), d.getMonth() + 1, 0);
            ini = toDateStr(first);
            fim = toDateStr(last);
        }

        const [eventos, agendamentos] = await Promise.all([
            sb(`eventos?select=*&ativo=eq.true&data_inicio=gte.${ini}T00:00:00&data_inicio=lte.${fim}T23:59:59&order=data_inicio`)
                .catch(() => []),
            sb(`sala_agendamentos?select=*&status=neq.recusado&data_inicio=gte.${ini}T00:00:00&data_inicio=lte.${fim}T23:59:59&order=data_inicio`)
                .catch(() => []),
        ]);

        const evArr = (Array.isArray(eventos) ? eventos : []).map(e => ({...e, _source: 'evento'}));
        const agArr = (Array.isArray(agendamentos) ? agendamentos : []).map(a => ({
            ...a,
            _source: 'sala',
            titulo: a.titulo || 'Sala Agendada'
        }));

        allItems = [...evArr, ...agArr].sort((a, b) => new Date(a.data_inicio) - new Date(b.data_inicio));
    }

    // ── INIT ────────────────────────────────────────────────────────────
    async function init() {
        try {
            salas = await sb('salas?select=id,nome,espaco&ativo=eq.true');
        } catch (e) {
            salas = [];
        }

        await carregarDados().catch(() => {
        });
        renderPage();
    }

    // ── RENDER PRINCIPAL ────────────────────────────────────────────────
    function renderPage() {
        const content = document.getElementById('main-content');
        content.innerHTML =
            buildCalToolbar() +
            buildLegend() +
            '<div class="cal-body" id="cal-body"></div>';
        paintBody();
    }

    // ── TOOLBAR ─────────────────────────────────────────────────────────
    function buildCalToolbar() {
        const labels = {dia: 'Dia', semana: 'Semana', mes: 'Mes', lista: 'Lista'};
        return `
    <div class="cal-toolbar">
        <div class="cal-nav">
            <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
            <span class="cal-title" id="cal-title">${calGetTitle()}</span>
            <button class="cal-nav-btn" onclick="calNav(1)">›</button>
        </div>
        <button class="cal-today-btn" onclick="calToday()">Hoje</button>
        <div class="cal-views">
            ${['dia', 'semana', 'mes', 'lista'].map(v =>
            `<button class="cal-view-btn${calState.view === v ? ' active' : ''}" onclick="calSetView('${v}')">${labels[v]}</button>`
        ).join('')}
        </div>
    </div>`;
    }

    function calGetTitle() {
        const d = calState.anchorDate;
        if (calState.view === 'dia') {
            return d.toLocaleDateString('pt-PT', {weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'});
        }
        if (calState.view === 'semana') {
            const seg = calWeekStart(d);
            const dom = new Date(seg);
            dom.setDate(dom.getDate() + 6);
            if (seg.getMonth() === dom.getMonth()) {
                return seg.getDate() + ' – ' + dom.getDate() + ' ' +
                    seg.toLocaleDateString('pt-PT', {month: 'long', year: 'numeric'});
            }
            return seg.toLocaleDateString('pt-PT', {day: 'numeric', month: 'short'}) + ' – ' +
                dom.toLocaleDateString('pt-PT', {day: 'numeric', month: 'short', year: 'numeric'});
        }
        if (calState.view === 'lista') return 'Proximos 60 Dias';
        return d.toLocaleDateString('pt-PT', {month: 'long', year: 'numeric'});
    }

    // ── LEGENDA / FILTROS ────────────────────────────────────────────────
    function buildLegend() {
        // Recolhe tipos únicos dos items carregados
        const tiposUsados = new Set();
        allItems.forEach(item => {
            if (item._source === 'sala') tiposUsados.add('sala');
            else tiposUsados.add((item.tipo || 'evento').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''));
        });

        const chips = ['evento', 'culto', 'celula', 'conferencia', 'retiro', 'treinamento', 'social', 'sala']
            .filter(t => tiposUsados.has(t))
            .map(t => {
                const on = !calState.filterTipos || calState.filterTipos.has(t);
                return `<div class="legend-chip${on ? ' active' : ''}" onclick="toggleFiltro('${t}')" data-tipo="${t}">
                <div class="legend-dot" style="background:${TIPO_COLORS[t] || TIPO_COLORS.evento}"></div>
                ${TIPO_LABELS[t] || t}
            </div>`;
            }).join('');

        return `
    <div class="cal-legend" id="cal-legend">
        <span class="legend-label">Ver</span>
        <div class="legend-chip${!calState.filterTipos ? ' active' : ''}" onclick="filtroTudo()">
            <div class="legend-dot" style="background:var(--primary)"></div>Tudo
        </div>
        ${chips}
    </div>`;
    }

    function itemsVisiveis() {
        if (!calState.filterTipos) return allItems;
        return allItems.filter(item => {
            const t = item._source === 'sala' ? 'sala' :
                (item.tipo || 'evento').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            return calState.filterTipos.has(t);
        });
    }

    function toggleFiltro(tipo) {
        if (!calState.filterTipos) {
            calState.filterTipos = new Set([tipo]);
        } else {
            if (calState.filterTipos.has(tipo)) {
                calState.filterTipos.delete(tipo);
                if (!calState.filterTipos.size) calState.filterTipos = null;
            } else {
                calState.filterTipos.add(tipo);
            }
        }
        rebuildLegend();
        paintBody();
    }

    function filtroTudo() {
        calState.filterTipos = null;
        rebuildLegend();
        paintBody();
    }

    function rebuildLegend() {
        const el = document.getElementById('cal-legend');
        if (el) el.outerHTML = buildLegend();
    }

    // ── NAV ─────────────────────────────────────────────────────────────
    async function calNav(dir) {
        const d = calState.anchorDate;
        if (calState.view === 'dia') d.setDate(d.getDate() + dir);
        else if (calState.view === 'semana') d.setDate(d.getDate() + dir * 7);
        else if (calState.view === 'mes') d.setMonth(d.getMonth() + dir);
        else if (calState.view === 'lista') d.setDate(d.getDate() + dir * 30);
        calState.anchorDate = new Date(d);
        await carregarDados().catch(() => {
        });
        renderPage();
    }

    async function calToday() {
        calState.anchorDate = new Date();
        await carregarDados().catch(() => {
        });
        renderPage();
    }

    async function calSetView(v) {
        calState.view = v;
        await carregarDados().catch(() => {
        });
        renderPage();
    }

    // ── PAINT BODY ───────────────────────────────────────────────────────
    function paintBody() {
        const body = document.getElementById('cal-body');
        if (!body) return;
        const titleEl = document.getElementById('cal-title');
        if (titleEl) titleEl.textContent = calGetTitle();
        const items = itemsVisiveis();

        if (calState.view === 'dia') body.innerHTML = buildTimegrid([calState.anchorDate], items);
        if (calState.view === 'semana') body.innerHTML = buildTimegrid(calGetWeekDays(), items);
        if (calState.view === 'mes') body.innerHTML = buildMesView(items);
        if (calState.view === 'lista') body.innerHTML = buildListaView(items);
    }

    // ── WEEK HELPERS ─────────────────────────────────────────────────────
    function calGetWeekDays() {
        const seg = calWeekStart(calState.anchorDate);
        return Array.from({length: 7}, (_, i) => {
            const d = new Date(seg);
            d.setDate(seg.getDate() + i);
            return d;
        });
    }

    function calWeekStart(d) {
        const day = d.getDay();
        const diff = day === 0 ? -6 : 1 - day;
        const seg = new Date(d);
        seg.setDate(d.getDate() + diff);
        seg.setHours(0, 0, 0, 0);
        return seg;
    }

    // ── TIMEGRID (dia / semana) ──────────────────────────────────────────
    function buildTimegrid(dias, items) {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const nCols = dias.length;
        const totalH = CAL_HOURS_END - CAL_HOURS_START;
        const gridH = totalH * CAL_SLOT_H;
        const colTempl = nCols === 1 ? '44px 1fr' : `44px repeat(${nCols}, 1fr)`;

        const headerHtml = `<div class="cal-week-header" style="grid-template-columns:${colTempl}">
        <div class="cal-header-time"></div>
        ${dias.map(d => {
            const isToday = d.getTime() === today.getTime();
            const nome = d.toLocaleDateString('pt-PT', {weekday: 'short'}).replace('.', '').toUpperCase();
            return `<div class="cal-header-day${isToday ? ' today' : ''}"
                onclick="calState.anchorDate=new Date(${d.getTime()});calSetView('dia')">
                <div class="cal-wd-name">${nome}</div>
                <div class="cal-wd-num">${d.getDate()}</div>
            </div>`;
        }).join('')}
    </div>`;

        let timeCells = '';
        for (let h = CAL_HOURS_START; h < CAL_HOURS_END; h++) {
            timeCells += `<div class="cal-time-slot">${String(h).padStart(2, '0')}:00</div>`;
        }
        const timeCol = `<div class="cal-time-col">${timeCells}</div>`;

        const dayCols = dias.map(d => {
            const isToday = d.getTime() === today.getTime();
            let hourLines = '';
            for (let h = CAL_HOURS_START; h < CAL_HOURS_END; h++) hourLines += '<div class="cal-hour-line"></div>';

            let nowLine = '';
            if (isToday) {
                const now = new Date();
                const pct = ((now.getHours() - CAL_HOURS_START) + now.getMinutes() / 60) / totalH * 100;
                if (pct >= 0 && pct <= 100) nowLine = `<div class="cal-now-line" style="top:${pct}%"></div>`;
            }

            const dayItems = itemsForDay(items, d);
            const laid = layoutOverlaps(dayItems);
            const evHtml = laid.map(item => buildEvEl(item, d, items)).join('');

            return `<div class="cal-day-col${isToday ? ' today' : ''}">${hourLines}${nowLine}${evHtml}</div>`;
        }).join('');

        return `<div style="position:relative;min-height:${gridH}px">
        ${headerHtml}
        <div class="cal-body-grid" style="display:grid;grid-template-columns:${colTempl}">
            ${timeCol}${dayCols}
        </div>
    </div>`;
    }

    function itemsForDay(items, d) {
        const dStart = new Date(d);
        dStart.setHours(0, 0, 0, 0);
        const dEnd = new Date(d);
        dEnd.setHours(23, 59, 59, 999);
        return items.filter(a => {
            const s = new Date(a.data_inicio);
            const e = a.data_fim ? new Date(a.data_fim) : new Date(s.getTime() + 3600000);
            return s <= dEnd && e >= dStart;
        });
    }

    function layoutOverlaps(items) {
        const sorted = items.slice().sort((a, b) => new Date(a.data_inicio) - new Date(b.data_inicio));
        const cols = [];
        sorted.forEach(a => {
            const aStart = new Date(a.data_inicio);
            const aEnd = a.data_fim ? new Date(a.data_fim) : new Date(aStart.getTime() + 3600000);
            let placed = false;
            for (let c = 0; c < cols.length; c++) {
                const lastEnd = cols[c][cols[c].length - 1]._calEnd;
                if (lastEnd <= aStart) {
                    cols[c].push(a);
                    a._calCol = c;
                    placed = true;
                    break;
                }
            }
            if (!placed) {
                a._calCol = cols.length;
                cols.push([a]);
            }
            a._calEnd = aEnd;
        });
        sorted.forEach(a => {
            a._calTotalCols = cols.length;
        });
        return sorted;
    }

    function buildEvEl(item, dayRef, allItems) {
        const gridStart = new Date(dayRef);
        gridStart.setHours(CAL_HOURS_START, 0, 0, 0);
        const gridEnd = new Date(dayRef);
        gridEnd.setHours(CAL_HOURS_END, 0, 0, 0);
        const evStart = new Date(item.data_inicio);
        const evEnd = item.data_fim ? new Date(item.data_fim) : new Date(evStart.getTime() + 3600000);
        const totalMs = (CAL_HOURS_END - CAL_HOURS_START) * 3600000;

        const s = Math.max(evStart.getTime(), gridStart.getTime());
        const e = Math.min(evEnd.getTime(), gridEnd.getTime());
        const topPct = (s - gridStart.getTime()) / totalMs * 100;
        const htPct = Math.max((e - s) / totalMs * 100, 1.5);

        const nCols = item._calTotalCols || 1;
        const colW = 100 / nCols;
        const leftPct = (item._calCol || 0) * colW;
        const widPct = colW - 0.5;

        const hIni = fmtHora(evStart);
        const hFim = fmtHora(evEnd);
        const idx = allItems.indexOf(item);
        const cor = tipoColor(item);
        const cls = tipoClass(item);

        return `<div class="cal-ev ${cls}"
        style="top:${topPct}%;height:${htPct}%;left:${leftPct}%;width:${widPct}%;background:${cor}cc;border-left-color:${cor}"
        onclick="showPopup(event,${idx})"
        title="${item.titulo}">
        <div class="cal-ev-badge">${tipoLabel(item)}</div>
        <div class="cal-ev-title">${item.titulo}</div>
        <div class="cal-ev-sub">${hIni}–${hFim}</div>
    </div>`;
    }

    // ── MES VIEW ─────────────────────────────────────────────────────────
    function buildMesView(items) {
        const d = calState.anchorDate;
        const year = d.getFullYear(), month = d.getMonth();
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const first = new Date(year, month, 1);
        const startOffset = (first.getDay() + 6) % 7;
        const gridStart = new Date(first);
        gridStart.setDate(1 - startOffset);

        const diaNomes = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab', 'Dom'];
        const hdr = diaNomes.map(n => `<div class="cal-month-hdr-day">${n}</div>`).join('');

        let cells = '';
        for (let i = 0; i < 42; i++) {
            const cell = new Date(gridStart);
            cell.setDate(gridStart.getDate() + i);
            const isToday = cell.getTime() === today.getTime();
            const otherMonth = cell.getMonth() !== month;
            const dayItems = itemsForDay(items, cell)
                .sort((a, b) => new Date(a.data_inicio) - new Date(b.data_inicio));

            const MAX = 3;
            let evHtml = dayItems.slice(0, MAX).map(item =>
                `<div class="cal-month-ev ${tipoClass(item)}">${item.titulo}</div>`
            ).join('');
            if (dayItems.length > MAX) evHtml += `<div class="cal-month-more">+${dayItems.length - MAX} mais</div>`;

            const ts = cell.getTime();
            cells += `<div class="cal-month-cell${isToday ? ' today' : ''}${otherMonth ? ' other' : ''}"
            onclick="calState.anchorDate=new Date(${ts});calSetView('dia')">
            <div class="cal-month-num">${cell.getDate()}</div>
            ${evHtml}
        </div>`;
        }

        return `<div class="cal-month-grid">
        <div class="cal-month-hdr">${hdr}</div>
        <div class="cal-month-body">${cells}</div>
    </div>`;
    }

    // ── LISTA VIEW ────────────────────────────────────────────────────────
    function buildListaView(items) {
        if (!items.length) {
            return `<div class="lista-section"><div class="lista-empty">Nenhum evento nos proximos 60 dias</div></div>`;
        }

        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const grupos = {};
        items.forEach(item => {
            const key = toDateStr(new Date(item.data_inicio));
            if (!grupos[key]) grupos[key] = [];
            grupos[key].push(item);
        });

        let html = '<div class="lista-section">';
        Object.entries(grupos).sort(([a], [b]) => a.localeCompare(b)).forEach(([dateStr, dayItems]) => {
            const dt = new Date(dateStr + 'T00:00:00');
            const isToday = dt.getTime() === today.getTime();
            const label = isToday
                ? 'Hoje — ' + dt.toLocaleDateString('pt-PT', {weekday: 'long', day: 'numeric', month: 'long'})
                : dt.toLocaleDateString('pt-PT', {weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'});
            html += `<div class="lista-date-hdr${isToday ? ' today-hdr' : ''}">${label.charAt(0).toUpperCase() + label.slice(1)}</div>`;

            dayItems.forEach((item, i) => {
                const ini = fmtHora(item.data_inicio);
                const fim = item.data_fim ? fmtHora(item.data_fim) : '';
                const idx = allItems.indexOf(item);
                const cor = tipoColor(item);
                const cls = tipoClass(item);
                const local = item._source === 'sala'
                    ? (salas.find(s => s.id === item.sala_id)?.nome || 'Sala')
                    : (item.local || '');

                html += `<div class="lista-item ${cls}" onclick="showPopup(event,${idx})" style="animation-delay:${i * 0.04}s">
                <div class="lista-time-col">
                    <div class="lista-time-ini">${ini}</div>
                    ${fim ? `<div class="lista-time-fim">${fim}</div>` : ''}
                </div>
                <div class="lista-stripe"></div>
                <div class="lista-info">
                    <div class="lista-chip" style="background:${cor}">${tipoLabel(item)}</div>
                    <div class="lista-titulo">${item.titulo}</div>
                    ${local ? `<div class="lista-sub">${local}</div>` : ''}
                </div>
            </div>`;
            });
        });
        html += '</div>';
        return html;
    }

    // ── POPUP ─────────────────────────────────────────────────────────────
    function showPopup(evt, idx) {
        evt.stopPropagation();
        closePopup();

        const item = itemsVisiveis()[idx];
        if (!item) return;

        const ini = new Date(item.data_inicio).toLocaleDateString('pt-PT', {
            day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
        });
        const fim = item.data_fim ? fmtHora(item.data_fim) : '';
        const cor = tipoColor(item);

        let extraHtml = '';
        if (item._source === 'evento') {
            const sala = salas.find(s => s.id === item.sala_id);
            if (sala) extraHtml += `<div class="cal-ev-popup-row"><strong>Local</strong>: ${sala.nome}</div>`;
            else if (item.local) extraHtml += `<div class="cal-ev-popup-row"><strong>Local</strong>: ${item.local}</div>`;
            if (item.descricao) extraHtml += `<div class="cal-ev-popup-row"><strong>Descricao</strong>: ${item.descricao}</div>`;
            if (item.capacidade) extraHtml += `<div class="cal-ev-popup-row"><strong>Capacidade</strong>: ${item.capacidade} pessoas</div>`;
            const preco = item.gratuito ? 'Gratuito' : (item.valor ? `${Number(item.valor).toFixed(2)} €` : 'Consultar');
            extraHtml += `<div class="cal-ev-popup-row"><strong>Entrada</strong>: ${preco}</div>`;
            if (item.link_inscricao) {
                extraHtml += `<a class="cal-ev-popup-link" href="${item.link_inscricao}" target="_blank" rel="noopener">Inscrever-se</a>`;
            }
        } else {
            const sala = salas.find(s => s.id === item.sala_id);
            if (sala) extraHtml += `<div class="cal-ev-popup-row"><strong>Sala</strong>: ${sala.nome}${sala.espaco ? ' · ' + sala.espaco : ''}</div>`;
            if (item.descricao) extraHtml += `<div class="cal-ev-popup-row"><strong>Descricao</strong>: ${item.descricao}</div>`;
            const statusLabel = item.status === 'aprovado' ? 'Aprovado' : item.status === 'pendente' ? 'Pendente de aprovacao' : item.status || '';
            const statusColor = item.status === 'aprovado' ? '#27ae60' : item.status === 'pendente' ? '#e67e22' : '#888';
            extraHtml += `<div style="margin-top:8px"><span style="display:inline-block;font-family:var(--font-title);font-size:8px;letter-spacing:1px;padding:2px 9px;border-radius:999px;color:#fff;background:${statusColor}">${statusLabel}</span></div>`;
        }

        const pop = document.createElement('div');
        pop.className = 'cal-ev-popup';
        pop.id = 'ev-popup';
        pop.innerHTML = `
        <button class="cal-ev-popup-close" onclick="closePopup()">×</button>
        <div class="cal-ev-popup-type" style="background:${cor}">${tipoLabel(item)}</div>
        <div class="cal-ev-popup-title">${item.titulo}</div>
        <div class="cal-ev-popup-row"><strong>Horario</strong>: ${ini}${fim ? ' – ' + fim : ''}</div>
        ${extraHtml}`;
        document.body.appendChild(pop);

        const x = Math.min(evt.clientX + 10, window.innerWidth - 320);
        const y = Math.min(evt.clientY + 10, window.innerHeight - 220);
        pop.style.left = x + 'px';
        pop.style.top = y + 'px';

        setTimeout(() => document.addEventListener('click', closePopup, {once: true}), 10);
    }

    function closePopup() {
        const p = document.getElementById('ev-popup');
        if (p) p.remove();
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closePopup();
    });

    (async function () {
        const session = await ZionAuth.protect();
        if (!session) return;
        currentUser = await ZionAuth.getUser();
        init();
    })();

</script>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('SW registado:', reg.scope))
                .catch(err => console.error('SW erro:', err));
        });
    }
</script>
