<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de QR Code — Admin</title>

    <!-- Favicon -->
    <link rel="icon" href="/assets/icons/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/icons/icon-512.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --primary:        #009098;
            --primary-light:  #00adb6;
            --primary-dark:   #006b70;
            --primary-faint:  rgba(0, 144, 152, 0.08);
            --primary-soft:   rgba(0, 144, 152, 0.15);
            --border:         rgba(0, 144, 152, 0.2);
            --border-strong:  rgba(0, 144, 152, 0.4);
            --bg-page:        #F4F6F7;
            --bg-card:        #FFFFFF;
            --bg-input:       #F8FAFA;
            --bg-footer:      #EEF1F2;
            --text-main:      #111111;
            --text-muted:     #555555;
            --text-faint:     #888888;
            --shadow:         0 8px 40px rgba(0, 100, 105, 0.12);
            --shadow-sm:      0 2px 10px rgba(0, 100, 105, 0.08);
            --shadow-hover:   0 4px 18px rgba(0, 144, 152, 0.18);
            --font-title:     'Cinzel', serif;
            --font-body:      'Lato', sans-serif;
            --radius-sm:      6px;
            --radius-md:      10px;
            --radius-lg:      14px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-body);
            background: var(--bg-page);
            color: var(--text-main);
            min-height: 100vh;
            font-size: 14px;
        }

        /* HEADER */
        header {
            background: var(--bg-card);
            border-bottom: 2px solid var(--primary);
            padding: 0 32px;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-family: var(--font-title);
            font-size: 17px;
            font-weight: 600;
            color: var(--primary);
            letter-spacing: 2px;
        }

        .header-sep {
            width: 1px;
            height: 20px;
            background: var(--border);
        }

        .header-sub {
            font-size: 12px;
            font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* LAYOUT */
        .workspace {
            display: grid;
            grid-template-columns: 400px 1fr;
            min-height: calc(100vh - 56px);
        }

        /* FORM PANEL */
        .form-panel {
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 32px 28px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .section-title {
            font-family: var(--font-title);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--primary);
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        label .req { color: var(--primary); }

        input[type="text"],
        input[type="url"],
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: 14px;
            color: var(--text-main);
            background: var(--bg-input);
            transition: border-color .2s, box-shadow .2s;
            outline: none;
            resize: none;
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-faint);
            background: var(--bg-card);
        }

        textarea { min-height: 84px; line-height: 1.6; }

        /* Image upload */
        .img-upload-area {
            border: 1px dashed var(--border-strong);
            border-radius: var(--radius-md);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            position: relative;
            background: var(--bg-input);
        }

        .img-upload-area:hover {
            border-color: var(--primary);
            background: var(--primary-faint);
        }

        .img-upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .upload-label {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
            pointer-events: none;
        }

        .upload-label strong { color: var(--primary); }

        .img-preview {
            display: none;
            margin-top: 10px;
            position: relative;
        }

        .img-preview img {
            max-width: 100%;
            max-height: 90px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }

        .btn-remove-img {
            position: absolute;
            top: 4px; right: 4px;
            background: var(--text-main);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 20px; height: 20px;
            cursor: pointer;
            font-size: 10px;
            display: flex; align-items: center; justify-content: center;
            transition: background .2s;
        }

        .btn-remove-img:hover { background: #c0392b; }

        /* Size selector */
        .size-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .size-btn {
            padding: 9px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            border-radius: var(--radius-sm);
            font-size: 10px;
            font-family: var(--font-body);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            text-align: center;
            transition: all .2s;
            color: var(--text-muted);
        }

        .size-desc{
            font-size:6px;
            opacity:0.7;
        }

        .size-btn.active,
        .size-btn:hover {
            border-color: var(--primary);
            background: var(--primary-faint);
            color: var(--primary-dark);
        }

        /* Generate */
        .btn-generate {
            width: 100%;
            padding: 13px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font-title);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all .2s;
            margin-top: 4px;
        }

        .btn-generate:hover {
            background: var(--primary-dark);
            box-shadow: var(--shadow-hover);
        }

        .btn-generate:active { transform: scale(.98); }

        /* PREVIEW PANEL */
        .preview-panel {
            background: var(--bg-page);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 36px;
            gap: 18px;
            overflow-y: auto;
        }

        .preview-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-faint);
            align-self: flex-start;
        }

        /* QR CARD */
        .qr-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 440px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .card-top-bar {
            background: var(--primary);
            padding: 12px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .bar-brand {
            font-family: var(--font-title);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.9);
        }

        .bar-dots { display: flex; gap: 5px; }
        .bar-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
        }

        .card-body {
            padding: 36px 40px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-logo { display: none; margin-bottom: 18px; }
        .card-logo img { max-width: 110px; max-height: 70px; object-fit: contain; }
        .card-logo.visible { display: block; }

        .card-title {
            font-family: var(--font-title);
            font-size: 21px;
            font-weight: 600;
            color: var(--text-main);
            text-align: center;
            letter-spacing: 1px;
            line-height: 1.3;
            margin-bottom: 10px;
        }

        .card-title.empty {
            color: var(--border-strong);
            font-weight: 400;
            font-size: 16px;
        }

        .card-divider {
            width: 36px;
            height: 2px;
            background: var(--primary);
            opacity: .6;
            border-radius: 2px;
            margin: 8px auto 16px;
        }

        .card-message {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.7;
            margin-bottom: 26px;
            max-width: 320px;
            font-weight: 300;
        }

        .card-message.empty {
            color: var(--border-strong);
            font-style: italic;
        }

        .card-qr {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-input);
            min-width: 156px;
            min-height: 156px;
        }

        .qr-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .ph-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            width: 60px;
            height: 60px;
        }

        .ph-cell {
            border-radius: 2px;
            background: var(--border);
        }

        .ph-cell.on { background: var(--primary-soft); }

        .qr-placeholder p {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-faint);
        }

        .card-footer-area {
            padding: 14px 40px 18px;
            border-top: 1px solid var(--border);
            background: var(--bg-footer);
            text-align: center;
        }

        .card-footer-text {
            font-size: 11px;
            color: var(--text-faint);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Action bar */
        .action-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 440px;
        }

        .btn-action {
            padding: 10px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-card);
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all .2s;
            color: var(--text-muted);
        }

        .btn-action:hover {
            border-color: var(--primary);
            color: var(--primary-dark);
            background: var(--primary-faint);
        }

        .btn-action.primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        .btn-action.primary:hover {
            background: var(--primary-dark);
            border-color: var(--primary-dark);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px; right: 24px;
            background: var(--bg-card);
            color: var(--primary-dark);
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 700;
            border-left: 3px solid var(--primary);
            box-shadow: var(--shadow);
            opacity: 0;
            transform: translateY(8px);
            transition: all .25s;
            pointer-events: none;
            z-index: 999;
        }

        .toast.show { opacity: 1; transform: translateY(0); }

        @media print {
            header, .form-panel, .preview-label, .action-bar { display: none !important; }
            .workspace { display: block; }
            .preview-panel { padding: 0; background: white; }
            .qr-card { box-shadow: none; max-width: 100%; }
        }

        @media (max-width: 860px) {
            .workspace { grid-template-columns: 1fr; }
            .form-panel { border-right: none; border-bottom: 1px solid var(--border); }
        }
    </style>
</head>
<body>

<header>
    <span class="header-logo">Administrador</span>
    <div class="header-sep"></div>
    <span class="header-sub">Gerador de QR Code</span>
</header>

<div class="workspace">

    <aside class="form-panel">

        <div class="section-title">Configurar Cartão</div>

        <div class="field">
            <label>Link / URL <span class="req">*</span></label>
            <input type="url" id="inp-url" placeholder="https://..." />
        </div>

        <div class="field">
            <label>Imagem</label>
            <div class="img-upload-area">
                <input type="file" id="inp-image" accept="image/*" />
                <p class="upload-label"><strong>Clique para selecionar</strong> ou arraste aqui<br>PNG · JPG · SVG</p>
            </div>
            <div class="img-preview" id="img-preview">
                <img id="img-thumb" src="" alt="Preview" />
                <button class="btn-remove-img" id="btn-remove-img">&#x2715;</button>
            </div>
        </div>

        <div class="field">
            <label>Título</label>
            <input type="text" id="inp-title" placeholder="Ex: Processo de Admissão" maxlength="80" />
        </div>

        <div class="field">
            <label>Mensagem / Descrição</label>
            <textarea id="inp-message" placeholder="Descreva o processo ou instruções para o utilizador..."></textarea>
        </div>

        <div class="field">
            <label>Rodapé</label>
            <input type="text" id="inp-footer" value="© 2026 Zion Lisboa" maxlength="80" />
        </div>

        <div class="field">
            <label>Tamanho do QR Code</label>
            <div class="size-row">

                <button class="size-btn" data-size="128">
                    Pequeno
                    <span class="size-desc">128px (largura/altura)</span>
                </button>

                <button class="size-btn active" data-size="180">
                    Médio
                    <span class="size-desc">180px (largura/altura)</span>
                </button>

                <button class="size-btn" data-size="240">
                    Grande
                    <span class="size-desc">240px (largura/altura)</span>
                </button>

            </div>
        </div>

        <button class="btn-generate" id="btn-generate">Gerar QR Code</button>

    </aside>

    <main class="preview-panel">

        <p class="preview-label">Pré-visualização</p>

        <div class="qr-card">

            <div class="card-top-bar">
                <span class="bar-brand">Zion Lisboa</span>
                <div class="bar-dots">
                    <div class="bar-dot"></div>
                    <div class="bar-dot"></div>
                    <div class="bar-dot"></div>
                </div>
            </div>

            <div class="card-body">

                <div class="card-logo" id="card-logo">
                    <img id="card-logo-img" src="" alt="Imagem" />
                </div>

                <div class="card-title empty" id="card-title">Título do processo</div>
                <div class="card-divider"></div>
                <div class="card-message empty" id="card-message">A descrição do processo aparecerá aqui...</div>

                <div class="card-qr">
                    <div class="qr-placeholder" id="qr-placeholder">
                        <div class="ph-grid">
                            <div class="ph-cell on"></div><div class="ph-cell"></div><div class="ph-cell on"></div><div class="ph-cell on"></div>
                            <div class="ph-cell"></div><div class="ph-cell on"></div><div class="ph-cell"></div><div class="ph-cell on"></div>
                            <div class="ph-cell on"></div><div class="ph-cell on"></div><div class="ph-cell"></div><div class="ph-cell on"></div>
                            <div class="ph-cell"></div><div class="ph-cell on"></div><div class="ph-cell on"></div><div class="ph-cell"></div>
                        </div>
                        <p>QR Code</p>
                    </div>
                    <div id="qr-output" style="display:none;"></div>
                </div>

            </div>

            <div class="card-footer-area">
                <p class="card-footer-text" id="card-footer">© 2026 Zion Lisboa</p>
            </div>

        </div>

        <div class="action-bar">
            <button class="btn-action" id="btn-copy-link">Copiar Link</button>
            <button class="btn-action" id="btn-print">Imprimir</button>
            <button class="btn-action primary" id="btn-download">Guardar PNG</button>
        </div>

    </main>
</div>

<div class="toast" id="toast"></div>

<script>
    let logoDataUrl = null;
    let selectedSize = 180;

    document.getElementById('inp-title').addEventListener('input', e => {
        const el = document.getElementById('card-title');
        if (e.target.value.trim()) { el.textContent = e.target.value; el.classList.remove('empty'); }
        else { el.textContent = 'Título do processo'; el.classList.add('empty'); }
    });

    document.getElementById('inp-message').addEventListener('input', e => {
        const el = document.getElementById('card-message');
        if (e.target.value.trim()) { el.textContent = e.target.value; el.classList.remove('empty'); }
        else { el.textContent = 'A descrição do processo aparecerá aqui...'; el.classList.add('empty'); }
    });

    document.getElementById('inp-footer').addEventListener('input', e => {
        document.getElementById('card-footer').textContent = e.target.value || '© 2026 Zion Lisboa';
    });

    document.getElementById('inp-image').addEventListener('change', function() {
        const file = this.files[0];
        if (!file) return;
        const r = new FileReader();
        r.onload = e => {
            logoDataUrl = e.target.result;
            document.getElementById('img-thumb').src = logoDataUrl;
            document.getElementById('img-preview').style.display = 'block';
            document.getElementById('card-logo-img').src = logoDataUrl;
            document.getElementById('card-logo').classList.add('visible');
        };
        r.readAsDataURL(file);
    });

    document.getElementById('btn-remove-img').addEventListener('click', () => {
        logoDataUrl = null;
        document.getElementById('img-thumb').src = '';
        document.getElementById('img-preview').style.display = 'none';
        document.getElementById('card-logo').classList.remove('visible');
        document.getElementById('inp-image').value = '';
    });

    document.querySelectorAll('.size-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            selectedSize = parseInt(this.dataset.size);
        });
    });

    document.getElementById('btn-generate').addEventListener('click', () => {
        const url = document.getElementById('inp-url').value.trim();
        if (!url) { showToast('Insere um link válido antes de gerar.'); return; }

        const title  = document.getElementById('inp-title').value.trim();
        const msg    = document.getElementById('inp-message').value.trim();
        const footer = document.getElementById('inp-footer').value.trim();

        const titleEl = document.getElementById('card-title');
        titleEl.textContent = title || 'Título do processo';
        title ? titleEl.classList.remove('empty') : titleEl.classList.add('empty');

        const msgEl = document.getElementById('card-message');
        msgEl.textContent = msg || 'A descrição do processo aparecerá aqui...';
        msg ? msgEl.classList.remove('empty') : msgEl.classList.add('empty');

        document.getElementById('card-footer').textContent = footer || '© 2026 Zion Lisboa';

        const container = document.getElementById('qr-output');
        container.innerHTML = '';
        document.getElementById('qr-placeholder').style.display = 'none';
        container.style.display = 'block';

        new QRCode(container, {
            text: url,
            width: selectedSize,
            height: selectedSize,
            colorDark: '#111111',
            colorLight: '#F8FAFA',
            correctLevel: QRCode.CorrectLevel.H
        });

        showToast('QR Code gerado com sucesso.');
    });

    document.getElementById('btn-copy-link').addEventListener('click', () => {
        const url = document.getElementById('inp-url').value.trim();
        if (!url) { showToast('Nenhum link para copiar.'); return; }
        navigator.clipboard.writeText(url).then(() => showToast('Link copiado.'));
    });

    document.getElementById('btn-print').addEventListener('click', () => window.print());

    document.getElementById('btn-download').addEventListener('click', () => {
        const qrCanvas = document.querySelector('#qr-output canvas');
        if (!qrCanvas) { showToast('Gera o QR Code primeiro.'); return; }

        const title   = document.getElementById('inp-title').value.trim();
        const message = document.getElementById('inp-message').value.trim();
        const footer  = document.getElementById('inp-footer').value.trim() || '© 2026 Zion Lisboa';
        const pad     = 36;
        const cardW   = Math.max(qrCanvas.width + pad * 2, 320);
        const logoH   = logoDataUrl ? 96 : 0;
        const titleH  = title ? 50 : 0;
        const divH    = title ? 22 : 0;
        const msgH    = message ? (Math.ceil(message.length / 38) * 22 + 18) : 0;
        const footH   = 50;
        const cardH   = 42 + pad + logoH + titleH + divH + msgH + qrCanvas.height + pad + footH;

        const cvs = document.createElement('canvas');
        cvs.width = cardW; cvs.height = cardH;
        const ctx = cvs.getContext('2d');

        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, cardW, cardH);

        ctx.fillStyle = '#009098';
        ctx.fillRect(0, 0, cardW, 42);

        ctx.fillStyle = 'rgba(255,255,255,0.88)';
        ctx.font = '600 11px serif';
        ctx.textAlign = 'left';
        ctx.fillText('ZION LISBOA', 20, 26);

        let y = 42 + pad;

        const doDraw = (logoImg) => {
            if (logoImg) {
                const lw = Math.min(100, logoImg.width);
                const lh = (logoImg.height / logoImg.width) * lw;
                ctx.drawImage(logoImg, (cardW - lw) / 2, y, lw, lh);
                y += lh + 16;
            }

            if (title) {
                ctx.fillStyle = '#111111';
                ctx.font = '600 18px Georgia, serif';
                ctx.textAlign = 'center';
                ctx.fillText(title, cardW / 2, y + 22);
                y += 38;
                ctx.fillStyle = '#009098';
                ctx.fillRect(cardW / 2 - 18, y, 36, 2);
                y += 16;
            }

            if (message) {
                ctx.fillStyle = '#555555';
                ctx.font = '300 13px sans-serif';
                ctx.textAlign = 'center';
                const words = message.split(' ');
                let line = '', lines = [];
                const maxW = cardW - pad * 2;
                words.forEach(w => {
                    const t = line + w + ' ';
                    if (ctx.measureText(t).width > maxW && line) { lines.push(line.trim()); line = w + ' '; }
                    else line = t;
                });
                if (line) lines.push(line.trim());
                lines.forEach((l, i) => ctx.fillText(l, cardW / 2, y + 18 + i * 22));
                y += lines.length * 22 + 16;
            }

            ctx.drawImage(qrCanvas, (cardW - qrCanvas.width) / 2, y);
            y += qrCanvas.height + pad;

            ctx.fillStyle = '#EEF1F2';
            ctx.fillRect(0, y, cardW, cardH - y);
            ctx.strokeStyle = 'rgba(0,144,152,0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cardW, y); ctx.stroke();

            ctx.fillStyle = '#888888';
            ctx.font = '400 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(footer.toUpperCase(), cardW / 2, y + 26);

            const a = document.createElement('a');
            a.download = 'qrcode-zion.png';
            a.href = cvs.toDataURL('image/png');
            a.click();
            showToast('Imagem guardada.');
        };

        if (logoDataUrl) {
            const img = new Image();
            img.onload = () => doDraw(img);
            img.src = logoDataUrl;
        } else {
            doDraw(null);
        }
    });

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2800);
    }
</script>
