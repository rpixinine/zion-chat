<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão · Presenças</title>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy:    #02161e;
            --navy2:   #031f2a;
            --navy3:   #041e29;
            --teal:    #009098;
            --teal-d:  #007078;
            --teal-l:  rgba(0,144,152,0.15);
            --text:    #e8eef0;
            --muted:   #7a9aa8;
            --border:  rgba(255,255,255,0.08);
            --card:    rgba(255,255,255,0.04);
            --green:   #43a047;
            --green-l: rgba(67,160,71,0.15);
            --orange:  #fb8c00;
            --orange-l:rgba(251,140,0,0.12);
            --red:     #e53935;
            --red-l:   rgba(229,57,53,0.12);
            --radius:  14px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            min-height: 100%;
            background: var(--navy);
            color: var(--text);
            font-family: 'Lato', sans-serif;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            pointer-events: none; z-index: 0;
            background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,144,152,0.2) 0%, transparent 65%);
        }

        .page {
            position: relative; z-index: 1;
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center;
            padding: 0 0 40px;
        }

        /* ── HEADER ── */
        .top-hd {
            width: 100%; max-width: 560px;
            background: linear-gradient(135deg, var(--teal-d), var(--teal));
            padding: 18px 20px 14px;
            display: flex; align-items: center; gap: 14px;
        }

        .top-hd-logo { height: 34px; width: auto; object-fit: contain; flex-shrink: 0; }

        .top-hd-logo-text {
            font-family: 'Cinzel', serif;
            font-size: 16px; font-weight: 700;
            letter-spacing: 2px; color: white;
            display: none;
        }

        .top-hd-info { flex: 1; }
        .top-hd-title {
            font-family: 'Cinzel', serif;
            font-size: 13px; font-weight: 600;
            letter-spacing: 1.5px; color: white;
        }
        .top-hd-sub { font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 2px; }

        .top-hd-date {
            font-size: 11px; color: rgba(255,255,255,0.7);
            text-align: right; flex-shrink: 0;
        }

        /* ── WRAP ── */
        .wrap {
            width: 100%; max-width: 560px;
            padding: 0 14px;
        }

        /* ── TABS ── */
        .tabs {
            display: flex;
            background: rgba(0,0,0,0.25);
            border-bottom: 1px solid var(--border);
            max-width: 560px; width: 100%;
        }

        .tab {
            flex: 1; padding: 13px 10px;
            text-align: center;
            font-size: 10px; font-family: 'Cinzel', serif;
            letter-spacing: 1.2px; text-transform: uppercase;
            color: var(--muted); cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s; user-select: none;
        }

        .tab:hover { color: var(--text); }
        .tab.active { color: var(--teal); border-bottom-color: var(--teal); }

        .tab-badge {
            display: none; align-items: center; justify-content: center;
            width: 16px; height: 16px;
            background: var(--orange); color: white;
            border-radius: 50%; font-size: 8px;
            font-family: 'Lato', sans-serif; font-weight: 700;
            letter-spacing: 0; margin-left: 5px; vertical-align: middle;
        }
        .tab-badge.show { display: inline-flex; }

        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        /* ── LOADER ── */
        .loader {
            text-align: center; padding: 50px 20px;
            color: var(--muted); font-size: 13px;
        }
        .spinner {
            display: inline-block;
            width: 30px; height: 30px;
            border: 2px solid var(--border);
            border-top-color: var(--teal);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── CULTO CHIPS ── */
        .culto-chips-wrap {
            display: flex; gap: 8px;
            flex-wrap: wrap;
            padding: 14px 14px 0;
            max-width: 560px; width: 100%;
        }

        .culto-chip {
            padding: 7px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--card);
            font-size: 12px; cursor: pointer;
            color: var(--muted); transition: all 0.15s;
            text-align: center; white-space: nowrap;
        }

        .culto-chip:hover { border-color: var(--teal); color: var(--teal); }
        .culto-chip.on { background: var(--teal); color: white; border-color: var(--teal); font-weight: 700; }

        /* ── SCANNER CARD ── */
        .scanner-wrap {
            margin: 14px 14px 0;
            background: var(--navy2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .scanner-viewport {
            position: relative;
            width: 100%; aspect-ratio: 4/3;
            background: #000;
            overflow: hidden;
        }

        #g-video {
            width: 100%; height: 100%;
            object-fit: cover;
            display: none;
        }

        #g-video.active { display: block; }

        .scanner-placeholder {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 12px; color: var(--muted);
        }

        .scanner-placeholder svg { opacity: 0.3; }
        .scanner-placeholder p { font-size: 12px; letter-spacing: 0.5px; text-align: center; line-height: 1.5; }

        /* Scanner frame overlay */
        .scanner-frame-overlay {
            position: absolute; inset: 0;
            display: none; pointer-events: none;
        }
        .scanner-frame-overlay.active { display: block; }

        .scanner-corners {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 200px; height: 200px;
        }

        .scanner-corners::before,
        .scanner-corners::after,
        .scanner-corners > span::before,
        .scanner-corners > span::after {
            content: '';
            position: absolute;
            width: 28px; height: 28px;
            border-color: var(--teal);
            border-style: solid;
        }

        .scanner-corners::before { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
        .scanner-corners::after  { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
        .scanner-corners > span::before { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
        .scanner-corners > span::after  { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

        .scan-line {
            position: absolute;
            left: calc(50% - 100px); width: 200px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--teal), transparent);
            animation: scanAnim 2s ease-in-out infinite;
            display: none;
            box-shadow: 0 0 8px var(--teal);
        }

        .scan-line.active { display: block; }

        @keyframes scanAnim {
            0%   { top: calc(50% - 100px); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { top: calc(50% + 100px); opacity: 0; }
        }

        /* QR found flash */
        .scanner-flash {
            position: absolute; inset: 0;
            background: rgba(0,144,152,0.35);
            opacity: 0; pointer-events: none;
            transition: opacity 0.1s;
        }
        .scanner-flash.flash { opacity: 1; }

        .scanner-status {
            position: absolute; bottom: 10px;
            left: 50%; transform: translateX(-50%);
            font-size: 10px; letter-spacing: 1px;
            color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.5);
            padding: 4px 12px; border-radius: 20px;
            display: none; white-space: nowrap;
        }
        .scanner-status.show { display: block; }

        .scanner-controls {
            padding: 14px 16px;
            display: flex; gap: 10px; align-items: center;
        }

        .btn-scan {
            flex: 1; padding: 13px;
            border-radius: 10px; border: none;
            background: var(--teal); color: white;
            font-size: 14px; font-weight: 700;
            font-family: 'Lato', sans-serif;
            cursor: pointer; transition: all 0.15s;
            letter-spacing: 0.5px;
        }
        .btn-scan:hover { background: var(--teal-d); }
        .btn-scan.stop  { background: rgba(229,57,53,0.8); }
        .btn-scan.stop:hover { background: var(--red); }

        /* ── MANUAL SEARCH ── */
        .manual-wrap {
            margin: 10px 14px 0;
            position: relative;
        }

        .manual-input {
            width: 100%; padding: 12px 40px 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.04);
            color: var(--text); font-size: 14px;
            font-family: 'Lato', sans-serif;
            outline: none; transition: border-color 0.15s;
        }
        .manual-input::placeholder { color: var(--muted); font-size: 13px; }
        .manual-input:focus { border-color: var(--teal); }

        .manual-icon {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            color: var(--muted); pointer-events: none;
        }

        .manual-results {
            margin-top: 6px;
            background: var(--navy2);
            border: 1px solid var(--border);
            border-radius: 10px; overflow: hidden;
        }

        .manual-result-item {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            cursor: pointer; transition: background 0.15s;
        }
        .manual-result-item:last-child { border-bottom: none; }
        .manual-result-item:hover { background: rgba(255,255,255,0.04); }
        .manual-result-nome { font-size: 14px; font-weight: 600; }
        .manual-result-area { font-size: 11px; color: var(--muted); margin-top: 2px; }

        /* ── RESULT CARD ── */
        .result-card {
            margin: 12px 14px 0;
            background: var(--navy2);
            border: 1px solid rgba(0,144,152,0.3);
            border-radius: var(--radius);
            overflow: hidden;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .result-hd {
            padding: 16px 18px 14px;
            background: rgba(0,144,152,0.08);
            border-bottom: 1px solid var(--border);
        }

        .result-badge-row {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 8px;
        }

        .result-avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--teal-l);
            border: 2px solid rgba(0,144,152,0.4);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Cinzel', serif; font-size: 15px;
            font-weight: 700; color: var(--teal);
            flex-shrink: 0;
        }

        .result-nome {
            font-family: 'Cinzel', serif;
            font-size: 18px; font-weight: 700;
            color: var(--text);
        }

        .result-timing {
            font-size: 12px;
            display: flex; align-items: center; gap: 6px;
        }

        .timing-ok     { color: #a5d6a7; }
        .timing-late   { color: #ffcc80; }
        .timing-done   { color: var(--teal); }
        .timing-noshow { color: #ef9a9a; }

        .result-body { padding: 14px 18px; }

        .result-section-label {
            font-size: 9px; font-family: 'Cinzel', serif;
            letter-spacing: 2px; text-transform: uppercase;
            color: var(--muted); margin-bottom: 10px;
        }

        /* Area chips for multi-area selection */
        .area-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }

        .area-chip {
            padding: 9px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card);
            font-size: 13px; cursor: pointer;
            color: var(--muted); transition: all 0.15s;
            line-height: 1.3;
        }
        .area-chip:hover { border-color: var(--teal); color: var(--teal); }
        .area-chip.on { background: var(--teal-l); color: var(--text); border-color: var(--teal); font-weight: 600; }
        .area-chip-nome { font-weight: 700; }
        .area-chip-culto { font-size: 10px; opacity: 0.7; margin-top: 2px; }

        .result-actions { display: flex; gap: 10px; }

        .btn-confirmar {
            flex: 1; padding: 13px;
            border-radius: 10px; border: none;
            background: var(--green); color: white;
            font-size: 14px; font-weight: 700;
            font-family: 'Lato', sans-serif;
            cursor: pointer; transition: all 0.15s;
        }
        .btn-confirmar:hover { background: #388e3c; }
        .btn-confirmar:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-cancelar {
            padding: 13px 18px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent; color: var(--muted);
            font-size: 13px; font-family: 'Lato', sans-serif;
            cursor: pointer; transition: all 0.15s;
        }
        .btn-cancelar:hover { border-color: var(--red); color: var(--red); }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--navy2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 20px;
            display: flex; align-items: center; gap: 12px;
            min-width: 280px; max-width: 380px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            z-index: 999;
            transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
            opacity: 0;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .toast-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .toast-icon.ok   { background: var(--green-l); border: 1px solid rgba(67,160,71,0.3); }
        .toast-icon.late { background: var(--orange-l); border: 1px solid rgba(251,140,0,0.3); }
        .toast-icon.err  { background: var(--red-l); border: 1px solid rgba(229,57,53,0.3); }
        .toast-icon.falta { background: var(--red-l); border: 1px solid rgba(229,57,53,0.3); }

        .toast-body { flex: 1; }
        .toast-nome  { font-weight: 700; font-size: 14px; }
        .toast-info  { font-size: 12px; color: var(--muted); margin-top: 2px; }

        /* ── ATTENDANCE TAB ── */
        .attendance-hd {
            padding: 16px 14px 10px;
            display: flex; align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .attendance-hd-title {
            font-family: 'Cinzel', serif;
            font-size: 11px; letter-spacing: 1.5px;
            text-transform: uppercase; color: var(--teal);
        }

        .btn-mark-all {
            padding: 7px 14px;
            border-radius: 8px;
            border: 1px solid rgba(229,57,53,0.3);
            background: var(--red-l);
            color: #ef9a9a;
            font-size: 11px;
            font-family: 'Lato', sans-serif;
            cursor: pointer; transition: all 0.15s;
        }
        .btn-mark-all:hover { border-color: var(--red); color: white; background: rgba(229,57,53,0.2); }

        /* Ministry group */
        .ministry-group {
            margin: 0 14px 14px;
            background: var(--navy2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .ministry-group-hd {
            padding: 12px 14px;
            background: rgba(0,144,152,0.06);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            justify-content: space-between;
        }

        .ministry-group-nome {
            font-family: 'Cinzel', serif;
            font-size: 12px; font-weight: 600;
            letter-spacing: 1px; color: var(--teal);
        }

        .ministry-group-stats {
            display: flex; gap: 8px;
        }

        .stat-pill {
            font-size: 10px; padding: 2px 8px;
            border-radius: 20px; font-weight: 700;
        }
        .stat-pill.ok     { background: var(--green-l);  border: 1px solid rgba(67,160,71,0.25);  color: #a5d6a7; }
        .stat-pill.orange { background: var(--orange-l); border: 1px solid rgba(251,140,0,0.25);  color: #ffcc80; }
        .stat-pill.red    { background: var(--red-l);    border: 1px solid rgba(229,57,53,0.25);  color: #ef9a9a; }
        .stat-pill.muted  { background: var(--card);     border: 1px solid var(--border);          color: var(--muted); }

        /* Volunteer row */
        .vol-row {
            display: flex; align-items: center; gap: 10px;
            padding: 11px 14px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .vol-row:last-child { border-bottom: none; }

        .vol-dot {
            width: 8px; height: 8px; border-radius: 50%;
            flex-shrink: 0;
        }
        .vol-dot.presente    { background: var(--green); }
        .vol-dot.atrasado    { background: var(--orange); }
        .vol-dot.pre         { background: var(--teal); }
        .vol-dot.faltou      { background: var(--red); }
        .vol-dot.pendente    { background: var(--border); border: 1px solid var(--muted); }

        .vol-nome { flex: 1; font-size: 14px; }
        .vol-papel { font-size: 10px; color: var(--muted); }

        .vol-status {
            font-size: 11px; font-weight: 600;
            padding: 3px 8px; border-radius: 6px;
            flex-shrink: 0;
        }
        .vol-status.presente    { background: var(--green-l);  color: #a5d6a7; }
        .vol-status.atrasado    { background: var(--orange-l); color: #ffcc80; }
        .vol-status.pre         { background: var(--teal-l);   color: var(--teal); }
        .vol-status.faltou      { background: var(--red-l);    color: #ef9a9a; }
        .vol-status.pendente    { background: var(--card);      color: var(--muted); }

        .vol-hora { font-size: 10px; color: var(--muted); margin-left: 4px; }

        .btn-falta {
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid rgba(229,57,53,0.25);
            background: var(--red-l);
            color: #ef9a9a;
            font-size: 11px; font-weight: 600;
            font-family: 'Lato', sans-serif;
            cursor: pointer; transition: all 0.15s;
            flex-shrink: 0;
        }
        .btn-falta:hover { border-color: var(--red); background: rgba(229,57,53,0.2); color: white; }
        .btn-falta:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── EMPTY / ERROR ── */
        .empty-state {
            text-align: center; padding: 40px 20px;
            color: var(--muted); font-size: 13px;
        }
        .empty-state-title {
            font-family: 'Cinzel', serif;
            font-size: 14px; color: var(--teal);
            margin-bottom: 6px;
        }

        .msg-banner {
            margin: 12px 14px 0;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px; text-align: center;
            line-height: 1.5;
        }
        .msg-banner.err  { background: var(--red-l);   border: 1px solid rgba(229,57,53,0.3);  color: #ef9a9a; }
        .msg-banner.warn { background: var(--orange-l); border: 1px solid rgba(251,140,0,0.3);  color: #ffcc80; }
        .msg-banner.ok   { background: var(--green-l);  border: 1px solid rgba(67,160,71,0.3);  color: #a5d6a7; }

        /* ── MISC ── */
        .section-spacer { height: 14px; }
        .card-footer {
            max-width: 560px; width: 100%;
            padding: 14px;
            text-align: center; font-size: 11px;
            color: var(--muted); letter-spacing: 0.5px;
            border-top: 1px solid var(--border);
            margin-top: 14px;
        }

        #g-canvas { display: none; }
    </style>
</head>
<body>

<script>
    const SB_URL  = window.SUPABASE_URL;
    const SB_KEY  = window.SUPABASE_ANON_KEY;
    const TOLERANCIA_MIN = 10;
</script>

<div class="page">

    <!-- HEADER -->
    <div class="top-hd">
        <img class="top-hd-logo" src="assets/logo-zion-branca.svg" alt="Zion"
             onerror="this.style.display='none';document.getElementById('hd-txt').style.display='block'">
        <span id="hd-txt" class="top-hd-logo-text">ZION</span>
        <div class="top-hd-info">
            <div class="top-hd-title">Gestão de Presenças</div>
            <div class="top-hd-sub">Área Executiva</div>
        </div>
        <div class="top-hd-date" id="g-top-date"></div>
    </div>

    <!-- LOADING -->
    <div id="g-loading" style="padding-top:20px;width:100%;max-width:560px">
        <div class="loader">
            <div class="spinner"></div><br>A carregar escalas de hoje...
        </div>
    </div>

    <!-- MAIN (shown after load) -->
    <div id="g-main" style="display:none;width:100%">

        <!-- TABS -->
        <div class="tabs">
            <div class="tab active" id="g-tab-scanner"   onclick="gSwitchTab('scanner')">
                <span>&#9654;</span> Scanner
            </div>
            <div class="tab" id="g-tab-presencas" onclick="gSwitchTab('presencas')">
                Presenças&nbsp;<span class="tab-badge" id="g-badge-pend"></span>
            </div>
        </div>

        <!-- ══ TAB: SCANNER ══ -->
        <div class="tab-pane active" id="pane-scanner">

            <!-- Culto filter -->
            <div class="culto-chips-wrap" id="g-culto-filter"></div>

            <!-- Scanner card -->
            <div class="scanner-wrap">
                <div class="scanner-viewport" id="g-viewport">
                    <video id="g-video" autoplay muted playsinline></video>
                    <canvas id="g-canvas"></canvas>

                    <!-- Placeholder when off -->
                    <div class="scanner-placeholder" id="g-placeholder">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                            <rect x="3" y="3" width="7" height="7" rx="1"/>
                            <rect x="14" y="3" width="7" height="7" rx="1"/>
                            <rect x="3" y="14" width="7" height="7" rx="1"/>
                            <rect x="14" y="14" width="3" height="3"/>
                            <rect x="19" y="14" width="2" height="2"/>
                            <rect x="14" y="19" width="2" height="2"/>
                            <rect x="18" y="18" width="3" height="3"/>
                        </svg>
                        <p>Inicia o scanner para ler<br>o QR code do voluntário</p>
                    </div>

                    <!-- Scanning frame overlay -->
                    <div class="scanner-frame-overlay" id="g-frame-overlay">
                        <div class="scanner-corners"><span></span></div>
                        <div class="scan-line" id="g-scanline"></div>
                        <div class="scanner-flash" id="g-flash"></div>
                    </div>

                    <div class="scanner-status" id="g-scan-status">A ler QR code...</div>
                </div>

                <div class="scanner-controls">
                    <button class="btn-scan" id="g-scan-btn" onclick="gToggleScanner()">
                        &#9654;&nbsp; Iniciar Scanner
                    </button>
                </div>

            <!-- Manual search -->
            <div class="manual-wrap">
                <input class="manual-input" id="g-search"
                       placeholder="&#128269; Buscar voluntário por nome..."
                       oninput="gSearchVoluntario(this.value)"
                       autocomplete="off">
                <div id="g-search-results"></div>
            </div>

            <!-- Result card (shown after QR or manual select) -->
            <div id="g-result-area"></div>

            <div class="section-spacer"></div>
        </div>

        <!-- ══ TAB: PRESENÇAS ══ -->
        <div class="tab-pane" id="pane-presencas">
            <div class="attendance-hd">
                <div class="attendance-hd-title">Lista de Presenças</div>
                <button class="btn-mark-all" onclick="gMarcarTodosFalta()">
                    ✕&nbsp; Marcar restantes como Falta
                </button>
            </div>
            <div id="g-presenca-list"></div>
            <div class="section-spacer"></div>
        </div>

    </div><!-- /g-main -->

    <div class="card-footer">© 2026 Zion Lisboa · Gestão de Presenças</div>
</div>

<!-- TOAST -->
<div class="toast" id="g-toast">
    <div class="toast-icon" id="g-toast-icon"></div>
    <div class="toast-body">
        <div class="toast-nome" id="g-toast-nome"></div>
        <div class="toast-info" id="g-toast-info"></div>
    </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   UTILITÁRIOS SUPABASE
═══════════════════════════════════════════════════ */
function sb(path, opts) {
    return fetch(SB_URL + '/rest/v1/' + path, {
        headers: {
            'apikey': SB_KEY,
            'Authorization': 'Bearer ' + SB_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'return=representation',
            ...(opts?.headers || {})
        },
        ...opts
    }).then(async r => {
        const d = await r.json().catch(() => null);
        if (!r.ok) throw new Error(d?.message || d?.error || r.statusText);
        return d;
    });
}

/* ═══════════════════════════════════════════════════
   UTILITÁRIOS GERAIS
═══════════════════════════════════════════════════ */
function hojeISO() { return new Date().toISOString().split('T')[0]; }

function agoraHHMM() {
    const n = new Date();
    return String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}

function dataFmt(iso) {
    return new Date(iso + 'T00:00:00').toLocaleDateString('pt-PT', {
        weekday: 'long', day: '2-digit', month: 'long'
    });
}

function minutosDesde(horaInicio) {
    const agora = new Date();
    const [hh, mm] = horaInicio.split(':').map(Number);
    const ini = new Date(agora); ini.setHours(hh, mm, 0, 0);
    return Math.round((agora - ini) / 60000);
}

function iniciais(nome) {
    return nome.split(' ').slice(0,2).map(p => p[0]).join('').toUpperCase();
}

/* ═══════════════════════════════════════════════════
   ESTADO GLOBAL
═══════════════════════════════════════════════════ */
const G = {
    escalaHoje:  [],   // todos os registos de escala para hoje
    checkins:    [],   // todos os checkins de hoje
    cultos:      [],   // cultos únicos de hoje
    cultSel:     null, // culto filtrado actualmente
    scanning:    false,
    videoStream: null,
    animFrame:   null,
    lastQR:      null,
    lastQRTime:  0,
    scanResult:  null, // { membro, escalas, selectedEscala }
    searchTimer: null
};

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
async function gInit() {
    const hoje = hojeISO();
    document.getElementById('g-top-date').textContent = dataFmt(hoje);

    try {
        /* Buscar todas as escalas de hoje (todos os ministérios) */
        const escRaw = await sb(
            `ministerio_escala?data=eq.${hoje}` +
            `&select=id,membro_id,ministerio_id,culto_id,` +
            `membros(id,nome),ministerios(id,nome),cultos(id,nome,hora_inicio)` +
            `&order=culto_id`
        );
        G.escalaHoje = escRaw || [];

        /* Buscar checkins de hoje */
        G.checkins = await sb(
            `ministerio_checkin?data=eq.${hoje}&select=*`
        ).catch(() => []);

        /* Extrair cultos únicos */
        const cultMap = {};
        G.escalaHoje.forEach(e => {
            if (e.cultos) cultMap[e.cultos.id] = e.cultos;
        });
        G.cultos = Object.values(cultMap).sort((a,b) =>
            a.hora_inicio.localeCompare(b.hora_inicio)
        );
        if (G.cultos.length === 1) G.cultSel = G.cultos[0];

        document.getElementById('g-loading').style.display = 'none';
        document.getElementById('g-main').style.display = 'block';

        gRenderCultoFilter();
        gRenderPresencas();
        gAtualizarBadge();

    } catch (e) {
        document.getElementById('g-loading').innerHTML =
            `<div class="msg-banner err" style="margin:20px">Erro ao carregar: ${e.message}</div>`;
    }
}

/* ═══════════════════════════════════════════════════
   TABS
═══════════════════════════════════════════════════ */
function gSwitchTab(tab) {
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('active'));
    document.getElementById('g-tab-' + tab).classList.add('active');
    document.getElementById('pane-' + tab).classList.add('active');
    if (tab === 'presencas') gRenderPresencas();
}

/* ═══════════════════════════════════════════════════
   FILTRO DE CULTO
═══════════════════════════════════════════════════ */
function gRenderCultoFilter() {
    const el = document.getElementById('g-culto-filter');
    if (G.cultos.length <= 1) { el.style.display = 'none'; return; }
    el.innerHTML = G.cultos.map(c =>
        `<div class="culto-chip ${G.cultSel?.id === c.id ? 'on' : ''}"
              onclick="gSelCulto('${c.id}')">
            <span style="font-weight:700">${c.nome}</span>
            <span style="font-size:10px;opacity:.75;margin-left:4px">${c.hora_inicio.slice(0,5)}</span>
        </div>`
    ).join('');
}

function gSelCulto(id) {
    G.cultSel = G.cultos.find(c => c.id === id) || null;
    document.querySelectorAll('#g-culto-filter .culto-chip').forEach(el =>
        el.classList.toggle('on', el.getAttribute('onclick').includes(`'${id}'`))
    );
    gRenderPresencas();
    gAtualizarBadge();
}

/* ═══════════════════════════════════════════════════
   SCANNER
═══════════════════════════════════════════════════ */
function gToggleScanner() {
    if (G.scanning) gStopScanner();
    else gStartScanner();
}

async function gStartScanner() {
    const video = document.getElementById('g-video');
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        G.videoStream = stream;
        video.srcObject = stream;
        video.classList.add('active');
        await video.play();
        G.scanning = true;
        document.getElementById('g-placeholder').style.display = 'none';
        document.getElementById('g-frame-overlay').classList.add('active');
        document.getElementById('g-scanline').classList.add('active');
        document.getElementById('g-scan-status').classList.add('show');
        const btn = document.getElementById('g-scan-btn');
        btn.textContent = '■ Parar Scanner';
        btn.classList.add('stop');
        gScanLoop();
    } catch (e) {
        gShowMsgBanner('Não foi possível aceder à câmara. Usa a pesquisa manual.', 'warn');
    }
}

function gStopScanner() {
    if (G.videoStream) { G.videoStream.getTracks().forEach(t => t.stop()); G.videoStream = null; }
    if (G.animFrame)   { cancelAnimationFrame(G.animFrame); G.animFrame = null; }
    G.scanning = false;
    const video = document.getElementById('g-video');
    video.classList.remove('active');
    document.getElementById('g-placeholder').style.display = '';
    document.getElementById('g-frame-overlay').classList.remove('active');
    document.getElementById('g-scanline').classList.remove('active');
    document.getElementById('g-scan-status').classList.remove('show');
    const btn = document.getElementById('g-scan-btn');
    btn.textContent = '▶ Iniciar Scanner';
    btn.classList.remove('stop');
}

function gScanLoop() {
    if (!G.scanning) return;
    const video  = document.getElementById('g-video');
    const canvas = document.getElementById('g-canvas');

    if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imgData.data, imgData.width, imgData.height, {
            inversionAttempts: 'dontInvert'
        });
        if (code) {
            const now = Date.now();
            if (code.data !== G.lastQR || now - G.lastQRTime > 4000) {
                G.lastQR     = code.data;
                G.lastQRTime = now;
                gFlashCamera();
                gHandleQR(code.data);
            }
        }
    }
    G.animFrame = requestAnimationFrame(gScanLoop);
}

function gFlashCamera() {
    const f = document.getElementById('g-flash');
    f.classList.add('flash');
    setTimeout(() => f.classList.remove('flash'), 200);
}

/* ═══════════════════════════════════════════════════
   PROCESSAR QR
═══════════════════════════════════════════════════ */
async function gHandleQR(qrData) {
    let payload;
    try   { payload = JSON.parse(qrData); }
    catch { payload = { membro_id: qrData }; }

    const membro_id = payload?.membro_id;
    if (!membro_id) {
        gShowMsgBanner('QR inválido — não foi possível identificar o voluntário.', 'err');
        return;
    }
    await gProcessarVoluntario(membro_id, payload);
}

async function gProcessarVoluntario(membro_id, hint) {
    try {
        const hoje = hojeISO();

        /* Info do membro */
        const memRes = await sb(`membros?id=eq.${membro_id}&select=id,nome`);
        const mem = memRes?.[0];
        if (!mem) throw new Error('Voluntário não encontrado na base de dados.');

        /* Todas as escalas deste voluntário hoje */
        let escalasHoje = G.escalaHoje.filter(e => e.membro_id === membro_id);

        if (!escalasHoje.length) {
            gShowResultErro(mem, 'Este voluntário não tem escala para hoje.');
            return;
        }

        /* Filtrar pelo culto seleccionado (se houver) */
        if (G.cultSel) {
            const filtradas = escalasHoje.filter(e => e.culto_id === G.cultSel.id);
            if (filtradas.length) escalasHoje = filtradas;
        }

        /* Checkins actuais deste voluntário */
        const checkinsDoMembro = G.checkins.filter(c => c.membro_id === membro_id);

        /* Filtrar escalas ainda não confirmadas fisicamente */
        const pendentes = escalasHoje.filter(e => {
            const ci = checkinsDoMembro.find(c =>
                c.ministerio_id === e.ministerio_id && c.culto_id === e.culto_id
            );
            return !ci || ci.status === 'pre_confirmado';
        });

        const jaDone = escalasHoje.filter(e => {
            const ci = checkinsDoMembro.find(c =>
                c.ministerio_id === e.ministerio_id && c.culto_id === e.culto_id
            );
            return ci && (ci.status === 'presente' || ci.status === 'atrasado');
        });

        if (!pendentes.length && jaDone.length) {
            /* Todos já confirmados */
            gShowResultJaConcluido(mem, jaDone, checkinsDoMembro);
            return;
        }

        G.scanResult = {
            membro: mem,
            escalas: pendentes,
            selectedEscala: pendentes.length === 1 ? pendentes[0] : null
        };
        gRenderResultCard();

    } catch (e) {
        gShowMsgBanner(e.message, 'err');
    }
}

/* ═══════════════════════════════════════════════════
   RENDER: CARD DE RESULTADO
═══════════════════════════════════════════════════ */
function gRenderResultCard() {
    const { membro, escalas, selectedEscala } = G.scanResult;
    const area = document.getElementById('g-result-area');

    /* Calcular timing com base na escala seleccionada */
    let timingHtml = '';
    if (selectedEscala) {
        const min = minutosDesde(selectedEscala.cultos?.hora_inicio || '00:00');
        if (min < 0) {
            const falta = Math.abs(min);
            timingHtml = `<span class="timing-ok">✓ ${falta} min antes do início</span>`;
        } else if (min <= TOLERANCIA_MIN) {
            timingHtml = `<span class="timing-ok">✓ No horário (${min} min após início)</span>`;
        } else {
            timingHtml = `<span class="timing-late">⏱ Atrasado · ${min} min</span>`;
        }
    }

    /* Chips de área (se múltiplas) */
    let areaHtml = '';
    if (escalas.length > 1) {
        areaHtml = `
            <div class="result-section-label">Em que área está a servir agora?</div>
            <div class="area-chips">
                ${escalas.map(e =>
                    `<div class="area-chip ${G.scanResult.selectedEscala?.ministerio_id === e.ministerio_id ? 'on' : ''}"
                          onclick="gSelArea('${e.ministerio_id}', '${e.culto_id}')">
                        <div class="area-chip-nome">${e.ministerios?.nome || '—'}</div>
                        <div class="area-chip-culto">${e.cultos?.nome || ''} · ${(e.cultos?.hora_inicio||'').slice(0,5)}</div>
                    </div>`
                ).join('')}
            </div>`;
    } else if (escalas.length === 1) {
        const e = escalas[0];
        areaHtml = `
            <div class="result-section-label">Área</div>
            <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:14px">
                ${e.ministerios?.nome || '—'}
                <span style="font-size:11px;color:var(--muted);font-weight:400;margin-left:6px">
                    ${e.cultos?.nome || ''} · ${(e.cultos?.hora_inicio||'').slice(0,5)}
                </span>
            </div>`;
    }

    area.innerHTML = `
        <div class="result-card">
            <div class="result-hd">
                <div class="result-badge-row">
                    <div class="result-avatar">${iniciais(membro.nome)}</div>
                    <div>
                        <div class="result-nome">${membro.nome}</div>
                        <div class="result-timing">${timingHtml}</div>
                    </div>
                </div>
            </div>
            <div class="result-body">
                ${areaHtml}
                <div class="result-actions">
                    <button class="btn-confirmar" id="g-btn-confirmar"
                            onclick="gConfirmarCheckin()"
                            ${!G.scanResult.selectedEscala ? 'disabled' : ''}>
                        ✓&nbsp; Registar Presença
                    </button>
                    <button class="btn-cancelar" onclick="gCancelarResult()">Cancelar</button>
                </div>
            </div>
        </div>`;

    /* Scroll para o card */
    setTimeout(() => area.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
}

function gShowResultErro(mem, msg) {
    const area = document.getElementById('g-result-area');
    area.innerHTML = `
        <div class="result-card" style="border-color:rgba(229,57,53,0.3)">
            <div class="result-hd" style="background:rgba(229,57,53,0.06)">
                <div class="result-badge-row">
                    <div class="result-avatar" style="background:var(--red-l);border-color:rgba(229,57,53,0.4);color:#ef9a9a">
                        ${iniciais(mem.nome)}
                    </div>
                    <div>
                        <div class="result-nome">${mem.nome}</div>
                        <div class="result-timing"><span class="timing-noshow">${msg}</span></div>
                    </div>
                </div>
            </div>
            <div class="result-body">
                <button class="btn-cancelar" style="width:100%" onclick="gCancelarResult()">Fechar</button>
            </div>
        </div>`;
}

function gShowResultJaConcluido(mem, jaDone, checkins) {
    const areas = jaDone.map(e => {
        const ci = checkins.find(c => c.ministerio_id === e.ministerio_id && c.culto_id === e.culto_id);
        const st = ci?.status === 'atrasado' ? `⏱ Atrasado · ${ci.minutos_atraso}min` : '✓ Presente';
        const cls = ci?.status === 'atrasado' ? 'timing-late' : 'timing-ok';
        return `<div style="margin-bottom:6px;font-size:13px">
            <strong>${e.ministerios?.nome || '—'}</strong>
            <span class="${cls}" style="margin-left:8px;font-size:11px">${st} · ${ci?.hora_checkin?.slice(0,5) || ''}</span>
        </div>`;
    }).join('');

    const area = document.getElementById('g-result-area');
    area.innerHTML = `
        <div class="result-card" style="border-color:rgba(0,144,152,0.3)">
            <div class="result-hd">
                <div class="result-badge-row">
                    <div class="result-avatar">${iniciais(mem.nome)}</div>
                    <div>
                        <div class="result-nome">${mem.nome}</div>
                        <div class="result-timing"><span class="timing-done">✓ Check-in já efectuado</span></div>
                    </div>
                </div>
            </div>
            <div class="result-body">
                ${areas}
                <button class="btn-cancelar" style="width:100%;margin-top:8px" onclick="gCancelarResult()">Fechar</button>
            </div>
        </div>`;
}

function gSelArea(ministerio_id, culto_id) {
    G.scanResult.selectedEscala = G.scanResult.escalas.find(e =>
        e.ministerio_id === ministerio_id && e.culto_id === culto_id
    );
    /* Actualizar chips */
    document.querySelectorAll('.area-chip').forEach(el => {
        el.classList.toggle('on',
            el.getAttribute('onclick').includes(`'${ministerio_id}'`)
        );
    });
    /* Activar botão + recalcular timing */
    const btn = document.getElementById('g-btn-confirmar');
    if (btn) btn.disabled = false;

    /* Actualizar timing display */
    const e = G.scanResult.selectedEscala;
    if (e) {
        const min = minutosDesde(e.cultos?.hora_inicio || '00:00');
        let html = '';
        if (min < 0)              html = `<span class="timing-ok">✓ ${Math.abs(min)} min antes do início</span>`;
        else if (min <= TOLERANCIA_MIN) html = `<span class="timing-ok">✓ No horário</span>`;
        else                      html = `<span class="timing-late">⏱ Atrasado · ${min} min</span>`;
        const timEl = document.querySelector('.result-timing');
        if (timEl) timEl.innerHTML = html;
    }
}

function gCancelarResult() {
    document.getElementById('g-result-area').innerHTML = '';
    G.scanResult = null;
    G.lastQR = null;
    G.lastQRTime = 0;
}

/* ═══════════════════════════════════════════════════
   CONFIRMAR CHECK-IN
═══════════════════════════════════════════════════ */
async function gConfirmarCheckin() {
    const { membro, selectedEscala } = G.scanResult || {};
    if (!membro || !selectedEscala) return;

    const btn = document.getElementById('g-btn-confirmar');
    if (btn) { btn.disabled = true; btn.textContent = 'A registar...'; }

    try {
        const hoje = hojeISO();
        const diffMin   = minutosDesde(selectedEscala.cultos?.hora_inicio || '00:00');
        const atrasado  = diffMin > TOLERANCIA_MIN;
        const minAtraso = atrasado ? diffMin : 0;
        const status    = atrasado ? 'atrasado' : 'presente';

        /* Verificar se já existe registo (pre_confirmado ou outro) */
        const ex = await sb(
            `ministerio_checkin?ministerio_id=eq.${selectedEscala.ministerio_id}` +
            `&membro_id=eq.${membro.id}&culto_id=eq.${selectedEscala.culto_id}&data=eq.${hoje}&select=id,status`
        );

        if (ex?.length) {
            /* Actualizar registo existente */
            await sb(`ministerio_checkin?id=eq.${ex[0].id}`, {
                method: 'PATCH',
                body: JSON.stringify({
                    status, atrasado, minutos_atraso: minAtraso,
                    hora_checkin: agoraHHMM()
                })
            });
            /* Actualizar estado local */
            const idx = G.checkins.findIndex(c => c.id === ex[0].id);
            if (idx >= 0) {
                G.checkins[idx] = {
                    ...G.checkins[idx], status, atrasado,
                    minutos_atraso: minAtraso, hora_checkin: agoraHHMM()
                };
            }
        } else {
            /* Criar novo registo */
            const novo = await sb('ministerio_checkin', {
                method: 'POST',
                body: JSON.stringify({
                    ministerio_id: selectedEscala.ministerio_id,
                    membro_id: membro.id,
                    culto_id: selectedEscala.culto_id,
                    data: hoje, status, atrasado,
                    minutos_atraso: minAtraso,
                    hora_checkin: agoraHHMM(),
                    notificado_lider: false
                })
            });
            if (novo?.[0]) G.checkins.push(novo[0]);
        }

        /* Mostrar toast */
        gToast(
            atrasado ? 'late' : 'ok',
            membro.nome,
            atrasado
                ? `${selectedEscala.ministerios?.nome} · Atrasado ${minAtraso} min`
                : `${selectedEscala.ministerios?.nome} · Presença registada ✓`
        );

        gCancelarResult();
        gAtualizarBadge();

    } catch (e) {
        gToast('err', 'Erro', e.message);
        if (btn) { btn.disabled = false; btn.textContent = '✓ Registar Presença'; }
    }
}

/* ═══════════════════════════════════════════════════
   PESQUISA MANUAL
═══════════════════════════════════════════════════ */
function gSearchVoluntario(query) {
    clearTimeout(G.searchTimer);
    const el = document.getElementById('g-search-results');
    if (!query || query.length < 2) { el.innerHTML = ''; return; }

    G.searchTimer = setTimeout(() => {
        const q = query.toLowerCase();
        /* Filtrar dos dados já carregados */
        const hoje = hojeISO();
        const membrosMap = {};
        G.escalaHoje.forEach(e => {
            if (!e.membros) return;
            const nome = e.membros.nome.toLowerCase();
            if (!nome.includes(q)) return;
            if (!membrosMap[e.membro_id]) {
                membrosMap[e.membro_id] = { membro: e.membros, areas: [] };
            }
            membrosMap[e.membro_id].areas.push(e.ministerios?.nome || '—');
        });

        const resultados = Object.values(membrosMap).slice(0, 6);

        if (!resultados.length) {
            el.innerHTML = `<div class="manual-results">
                <div class="manual-result-item" style="cursor:default;color:var(--muted)">
                    Nenhum voluntário encontrado para hoje.
                </div>
            </div>`;
            return;
        }

        el.innerHTML = `<div class="manual-results">
            ${resultados.map(r =>
                `<div class="manual-result-item"
                      onclick="gSelectManual('${r.membro.id}')">
                    <div class="result-avatar" style="width:32px;height:32px;font-size:11px;flex-shrink:0">
                        ${iniciais(r.membro.nome)}
                    </div>
                    <div>
                        <div class="manual-result-nome">${r.membro.nome}</div>
                        <div class="manual-result-area">${[...new Set(r.areas)].join(' · ')}</div>
                    </div>
                </div>`
            ).join('')}
        </div>`;
    }, 200);
}

function gSelectManual(membro_id) {
    document.getElementById('g-search').value = '';
    document.getElementById('g-search-results').innerHTML = '';
    gProcessarVoluntario(membro_id, { membro_id });
}

/* ═══════════════════════════════════════════════════
   RENDER: LISTA DE PRESENÇAS
═══════════════════════════════════════════════════ */
function gRenderPresencas() {
    const el = document.getElementById('g-presenca-list');

    /* Agrupar por ministério → dentro do culto seleccionado */
    let escalas = G.escalaHoje;
    if (G.cultSel) escalas = escalas.filter(e => e.culto_id === G.cultSel.id);

    if (!escalas.length) {
        el.innerHTML = `<div class="empty-state">
            <div class="empty-state-title">Sem escala</div>
            <p>${G.cultSel ? 'Nenhuma escala para este culto.' : 'Nenhuma escala para hoje.'}</p>
        </div>`;
        return;
    }

    /* Agrupar por ministério */
    const minMap = {};
    escalas.forEach(e => {
        const mId = e.ministerio_id;
        if (!minMap[mId]) minMap[mId] = { nome: e.ministerios?.nome || '—', membros: [] };
        minMap[mId].membros.push(e);
    });

    let html = '';
    Object.values(minMap).forEach(group => {
        let totPresente = 0, totAtrasado = 0, totFaltou = 0, totPendente = 0;

        const rows = group.membros.map(e => {
            const ci = G.checkins.find(c =>
                c.membro_id === e.membro_id &&
                c.ministerio_id === e.ministerio_id &&
                c.culto_id === e.culto_id
            );
            const st = ci?.status || 'pendente';

            if      (st === 'presente')    totPresente++;
            else if (st === 'atrasado')    totAtrasado++;
            else if (st === 'faltou')      totFaltou++;
            else                            totPendente++;

            const horaLabel = ci?.hora_checkin ? ` · ${ci.hora_checkin.slice(0,5)}` : '';
            const tardLabel  = st === 'atrasado' && ci?.minutos_atraso ? ` +${ci.minutos_atraso}min` : '';

            const statusLabel = {
                presente: '✓ Presente',
                atrasado: '⏱ Atrasado',
                pre_confirmado: '• Confirmado',
                faltou: '✕ Falta',
                pendente: '— Pendente'
            }[st] || '—';

            const showFaltaBtn = (st === 'pendente' || st === 'pre_confirmado');

            return `<div class="vol-row" id="row-${e.membro_id}-${e.ministerio_id}-${e.culto_id}">
                <div class="vol-dot ${st === 'pre_confirmado' ? 'pre' : st}"></div>
                <div style="flex:1;min-width:0">
                    <div class="vol-nome">${e.membros?.nome || '—'}</div>
                </div>
                <span class="vol-status ${st === 'pre_confirmado' ? 'pre' : st}">
                    ${statusLabel}${tardLabel}
                    <span class="vol-hora">${horaLabel}</span>
                </span>
                ${showFaltaBtn
                    ? `<button class="btn-falta"
                               id="falta-${e.membro_id}-${e.ministerio_id}-${e.culto_id}"
                               onclick="gMarcarFalta('${e.membro_id}','${e.ministerio_id}','${e.culto_id}','${e.membros?.nome}')">
                           Falta
                       </button>`
                    : ''}
            </div>`;
        }).join('');

        const stats = [
            totPresente  ? `<span class="stat-pill ok">${totPresente} ✓</span>` : '',
            totAtrasado  ? `<span class="stat-pill orange">${totAtrasado} ⏱</span>` : '',
            totFaltou    ? `<span class="stat-pill red">${totFaltou} ✕</span>` : '',
            totPendente  ? `<span class="stat-pill muted">${totPendente} —</span>` : ''
        ].filter(Boolean).join('');

        html += `<div class="ministry-group">
            <div class="ministry-group-hd">
                <div class="ministry-group-nome">${group.nome}</div>
                <div class="ministry-group-stats">${stats}</div>
            </div>
            ${rows}
        </div>`;
    });

    el.innerHTML = html;
}

/* ═══════════════════════════════════════════════════
   MARCAR FALTA
═══════════════════════════════════════════════════ */
async function gMarcarFalta(membro_id, ministerio_id, culto_id, nome) {
    const btnId = `falta-${membro_id}-${ministerio_id}-${culto_id}`;
    const btn = document.getElementById(btnId);
    if (btn) { btn.disabled = true; btn.textContent = '...'; }

    try {
        const hoje = hojeISO();

        /* Verificar se já existe (pre_confirmado → actualizar) */
        const ex = await sb(
            `ministerio_checkin?ministerio_id=eq.${ministerio_id}` +
            `&membro_id=eq.${membro_id}&culto_id=eq.${culto_id}&data=eq.${hoje}&select=id`
        );

        if (ex?.length) {
            await sb(`ministerio_checkin?id=eq.${ex[0].id}`, {
                method: 'PATCH',
                body: JSON.stringify({ status: 'faltou', atrasado: false, minutos_atraso: 0 })
            });
            const idx = G.checkins.findIndex(c => c.id === ex[0].id);
            if (idx >= 0) G.checkins[idx] = { ...G.checkins[idx], status: 'faltou' };
        } else {
            const novo = await sb('ministerio_checkin', {
                method: 'POST',
                body: JSON.stringify({
                    ministerio_id, membro_id, culto_id, data: hoje,
                    status: 'faltou', atrasado: false, minutos_atraso: 0,
                    hora_checkin: agoraHHMM(), notificado_lider: false
                })
            });
            if (novo?.[0]) G.checkins.push(novo[0]);
        }

        gToast('falta', nome, 'Falta registada');
        gRenderPresencas();
        gAtualizarBadge();

    } catch (e) {
        gToast('err', 'Erro', e.message);
        if (btn) { btn.disabled = false; btn.textContent = 'Falta'; }
    }
}

async function gMarcarTodosFalta() {
    let escalas = G.escalaHoje;
    if (G.cultSel) escalas = escalas.filter(e => e.culto_id === G.cultSel.id);

    const pendentes = escalas.filter(e => {
        const ci = G.checkins.find(c =>
            c.membro_id === e.membro_id &&
            c.ministerio_id === e.ministerio_id &&
            c.culto_id === e.culto_id
        );
        return !ci || ci.status === 'pre_confirmado';
    });

    if (!pendentes.length) {
        gToast('ok', 'Tudo registado', 'Nenhum voluntário pendente.');
        return;
    }

    if (!confirm(`Marcar ${pendentes.length} voluntário(s) como FALTA?`)) return;

    let done = 0;
    for (const e of pendentes) {
        try {
            await gMarcarFaltaSilent(e.membro_id, e.ministerio_id, e.culto_id);
            done++;
        } catch (_) {}
    }

    gToast('falta', `${done} falta(s) registada(s)`, 'Concluído');
    gRenderPresencas();
    gAtualizarBadge();
}

async function gMarcarFaltaSilent(membro_id, ministerio_id, culto_id) {
    const hoje = hojeISO();
    const ex = await sb(
        `ministerio_checkin?ministerio_id=eq.${ministerio_id}` +
        `&membro_id=eq.${membro_id}&culto_id=eq.${culto_id}&data=eq.${hoje}&select=id`
    );
    if (ex?.length) {
        await sb(`ministerio_checkin?id=eq.${ex[0].id}`, {
            method: 'PATCH',
            body: JSON.stringify({ status: 'faltou', atrasado: false, minutos_atraso: 0 })
        });
        const idx = G.checkins.findIndex(c => c.id === ex[0].id);
        if (idx >= 0) G.checkins[idx] = { ...G.checkins[idx], status: 'faltou' };
    } else {
        const novo = await sb('ministerio_checkin', {
            method: 'POST',
            body: JSON.stringify({
                ministerio_id, membro_id, culto_id, data: hoje,
                status: 'faltou', atrasado: false, minutos_atraso: 0,
                hora_checkin: agoraHHMM(), notificado_lider: false
            })
        });
        if (novo?.[0]) G.checkins.push(novo[0]);
    }
}

/* ═══════════════════════════════════════════════════
   BADGE
═══════════════════════════════════════════════════ */
function gAtualizarBadge() {
    let escalas = G.escalaHoje;
    if (G.cultSel) escalas = escalas.filter(e => e.culto_id === G.cultSel.id);

    const pendentes = escalas.filter(e => {
        const ci = G.checkins.find(c =>
            c.membro_id === e.membro_id &&
            c.ministerio_id === e.ministerio_id &&
            c.culto_id === e.culto_id
        );
        return !ci || ci.status === 'pre_confirmado';
    }).length;

    const badge = document.getElementById('g-badge-pend');
    if (pendentes > 0) {
        badge.textContent = pendentes;
        badge.classList.add('show');
    } else {
        badge.classList.remove('show');
    }
}

/* ═══════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════ */
var _toastTimer = null;
function gToast(tipo, nome, info) {
    const iconMap = {
        ok:    `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#43a047" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`,
        late:  `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fb8c00" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
        err:   `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e53935" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
        falta: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e53935" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`
    };

    document.getElementById('g-toast-icon').innerHTML  = iconMap[tipo] || iconMap.ok;
    document.getElementById('g-toast-icon').className  = `toast-icon ${tipo}`;
    document.getElementById('g-toast-nome').textContent = nome;
    document.getElementById('g-toast-info').textContent = info;

    const toast = document.getElementById('g-toast');
    toast.classList.add('show');

    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
}

/* ═══════════════════════════════════════════════════
   HELPERS UI
═══════════════════════════════════════════════════ */
function gShowMsgBanner(msg, tipo) {
    const area = document.getElementById('g-result-area');
    area.innerHTML = `<div class="msg-banner ${tipo}">${msg}</div>`;
    setTimeout(() => { if (area.querySelector('.msg-banner')) area.innerHTML = ''; }, 4000);
}

gInit();
