<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inscrição — Zion Lisboa</title>

    <!-- Favicon -->
    <link rel="icon" href="/assets/icons/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/icons/icon-512.png">

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#009098">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zion Lisboa">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap"
          rel="stylesheet">
    <script src="config.js"></script>
    <style>
        :root {
            --navy: #02161e;
            --navy-card: #071e28;
            --navy-light: #0d2d3a;
            --navy-border: #1a3d4d;
            --teal: #009098;
            --teal-dark: #006b70;
            --teal-glow: rgba(0, 144, 152, .18);
            --beige: #d8c3a5;
            --beige-dim: rgba(216, 195, 165, .15);
            --green: #43a047;
            --green-dim: rgba(67, 160, 71, .12);
            --red: #ef5350;
            --red-dim: rgba(239, 83, 80, .10);
            --text-main: #e8f4f5;
            --text-muted: #7fa8b5;
            --text-faint: #4a7a8a;
            --gold: #c9a84c;
            --r: 14px;
            --font-title: 'Cinzel', serif;
            --font-body: 'Lato', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background: var(--navy);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── HEADER ──────────────────────────────────────── */
        .header {
            width: 100%;
            background: var(--navy-card);
            border-bottom: 1px solid var(--navy-border);
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 160px;
            background: radial-gradient(ellipse, var(--teal-glow) 0%, transparent 70%);
            pointer-events: none;
        }

        .header-inner {
            width: 100%;
            max-width: 520px;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 0 14px;
        }

        .header-logo {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid var(--navy-border);
        }

        .header-texts {
            flex: 1;
            min-width: 0;
        }

        .header-brand {
            font-family: var(--font-title);
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--teal);
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .header-ev-nome {
            font-family: var(--font-title);
            font-size: 16px;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-ev-data {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .gold-bar {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        /* ── WRAP ────────────────────────────────────────── */
        .wrap {
            width: 100%;
            max-width: 520px;
            padding: 24px 16px 60px;
            flex: 1;
        }

        /* ── LOADING / FATAL ─────────────────────────────── */
        .loading {
            text-align: center;
            padding: 80px 20px;
        }

        .spin {
            width: 36px;
            height: 36px;
            border: 2px solid var(--navy-border);
            border-top-color: var(--teal);
            border-radius: 50%;
            animation: spin .75s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-txt {
            font-size: 13px;
            color: var(--text-faint);
        }

        .fatal {
            text-align: center;
            padding: 70px 20px;
        }

        .fatal-icon {
            font-size: 40px;
            opacity: .25;
            margin-bottom: 12px;
        }

        .fatal-title {
            font-family: var(--font-title);
            font-size: 15px;
            color: var(--red);
            margin-bottom: 8px;
        }

        .fatal-sub {
            font-size: 13px;
            color: var(--text-faint);
            line-height: 1.6;
        }

        /* ── CARD EVENTO ─────────────────────────────────── */
        .ev-card {
            background: linear-gradient(135deg, var(--teal-dark) 0%, #004249 100%);
            border: 1px solid rgba(0, 144, 152, .3);
            border-radius: var(--r);
            padding: 20px 22px;
            margin-bottom: 22px;
            position: relative;
            overflow: hidden;
            animation: fadeUp .25s ease both;
        }

        .ev-card::after {
            content: '';
            position: absolute;
            top: -20px;
            right: -20px;
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, rgba(255, 255, 255, .05) 0%, transparent 70%);
            pointer-events: none;
        }

        .ev-card-tipo {
            font-family: var(--font-title);
            font-size: 9px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .5);
            margin-bottom: 5px;
        }

        .ev-card-nome {
            font-family: var(--font-title);
            font-size: 20px;
            color: #fff;
            margin-bottom: 8px;
            line-height: 1.25;
        }

        .ev-card-meta {
            font-size: 12px;
            color: rgba(255, 255, 255, .65);
            line-height: 1.8;
            margin-bottom: 14px;
        }

        .ev-price-tag {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, .12);
            border: 1px solid rgba(255, 255, 255, .2);
            border-radius: 30px;
            padding: 8px 20px;
        }

        .ev-price-val {
            font-family: var(--font-title);
            font-size: 22px;
            font-weight: 700;
            color: #fff;
        }

        .ev-price-lbl {
            font-size: 11px;
            color: rgba(255, 255, 255, .55);
        }

        /* ── STEP ────────────────────────────────────────── */
        .step {
            display: none;
        }

        .step.active {
            display: block;
            animation: fadeUp .22s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: none;
            }
        }

        /* ── FORM ────────────────────────────────────────── */
        .sec-title {
            font-family: var(--font-title);
            font-size: 9px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--text-faint);
            margin: 20px 0 12px;
            padding-bottom: 7px;
            border-bottom: 1px solid var(--navy-border);
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            display: block;
            margin-bottom: 7px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid var(--navy-border);
            background: var(--navy-card);
            font-family: var(--font-body);
            font-size: 15px;
            color: var(--text-main);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        .form-input:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px var(--teal-glow);
        }

        .form-input.invalid {
            border-color: var(--red) !important;
            box-shadow: 0 0 0 3px rgba(239, 83, 80, .12) !important;
        }

        .form-input::placeholder {
            color: var(--text-faint);
        }

        /* ── STATUS GRID ──────────────────────────────────── */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .status-opt {
            position: relative;
        }

        .status-opt input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .status-lbl {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 14px 8px;
            border: 1px solid var(--navy-border);
            border-radius: 12px;
            background: var(--navy-card);
            cursor: pointer;
            transition: all .15s;
            text-align: center;
            gap: 7px;
            min-height: 82px;
        }

        .status-lbl:hover {
            border-color: var(--teal);
            background: var(--navy-light);
        }

        .status-opt input:checked + .status-lbl {
            border-color: var(--teal);
            background: var(--teal-glow);
            box-shadow: 0 0 0 2px rgba(0, 144, 152, .2);
        }

        .status-icon {
            font-size: 22px;
        }

        .status-txt {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            line-height: 1.3;
        }

        .status-opt input:checked + .status-lbl .status-txt {
            color: var(--teal);
        }

        /* ── MSG ──────────────────────────────────────────── */
        .msg {
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 14px;
            display: none;
            line-height: 1.5;
        }

        .msg.show {
            display: block;
        }

        .msg.error {
            background: var(--red-dim);
            color: var(--red);
            border: 1px solid rgba(239, 83, 80, .25);
        }

        .msg.success {
            background: var(--green-dim);
            color: var(--green);
            border: 1px solid rgba(67, 160, 71, .25);
        }

        .msg.info {
            background: var(--teal-glow);
            color: var(--teal);
            border: 1px solid rgba(0, 144, 152, .25);
        }

        /* ── BTN SUBMIT ───────────────────────────────────── */
        .btn-submit {
            width: 100%;
            padding: 17px;
            border: none;
            border-radius: var(--r);
            background: var(--teal);
            color: #fff;
            font-family: var(--font-title);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .15s, box-shadow .2s;
            margin-top: 6px;
        }

        .btn-submit:hover:not(:disabled) {
            background: var(--teal-dark);
            box-shadow: 0 4px 20px var(--teal-glow);
        }

        .btn-submit:disabled {
            opacity: .35;
            cursor: not-allowed;
        }

        /* ── CONFIRMAÇÃO ──────────────────────────────────── */
        .confirmado {
            background: var(--navy-card);
            border: 1px solid var(--navy-border);
            border-radius: var(--r);
            padding: 36px 22px 28px;
            text-align: center;
        }

        .conf-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            margin: 0 auto 18px;
        }

        .conf-icon.ok {
            background: var(--green-dim);
            border: 2px solid var(--green);
        }

        .conf-icon.dup {
            background: var(--teal-glow);
            border: 2px solid var(--teal);
        }

        .conf-title {
            font-family: var(--font-title);
            font-size: 17px;
            margin-bottom: 10px;
        }

        .conf-title.ok {
            color: var(--green);
        }

        .conf-title.dup {
            color: var(--teal);
        }

        .conf-num {
            display: inline-block;
            background: var(--teal-glow);
            border: 1px solid rgba(0, 144, 152, .3);
            border-radius: 30px;
            padding: 9px 24px;
            font-family: var(--font-title);
            font-size: 22px;
            color: var(--teal);
            margin: 8px 0 18px;
        }

        .conf-sub {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.75;
            margin-bottom: 18px;
        }

        .conf-box {
            background: var(--navy);
            border: 1px solid var(--navy-border);
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 12px;
            color: var(--text-faint);
            line-height: 1.75;
            text-align: left;
        }

        .conf-box strong {
            color: var(--teal);
        }

        /* ── FOOTER ───────────────────────────────────────── */
        .footer {
            text-align: center;
            padding: 16px;
            font-size: 11px;
            color: var(--text-faint);
            border-top: 1px solid var(--navy-border);
            width: 100%;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="header-inner">
        <img class="header-logo" src="assets/logo-zion-branca.svg" alt="Zion"
             onerror="this.outerHTML='<div style=\'width:44px;height:44px;border-radius:10px;background:var(--teal-glow);border:1px solid var(--teal-dark);display:flex;align-items:center;justify-content:center;color:var(--teal);font-size:20px\'>⛰</div>'">
        <div class="header-texts">
            <div class="header-brand">Zion Lisboa</div>
            <div class="header-ev-nome" id="ev-titulo">A carregar...</div>
            <div class="header-ev-data" id="ev-data"></div>
        </div>
    </div>
</div>
<div class="gold-bar"></div>

<div class="wrap">

    <!-- LOADING -->
    <div id="view-loading" class="loading">
        <div class="spin"></div>
        <div class="loading-txt">A carregar evento...</div>
    </div>

    <!-- ERRO FATAL -->
    <div id="view-erro" class="fatal" style="display:none">
        <div class="fatal-icon">⛔</div>
        <div class="fatal-title" id="erro-title">Evento Inválido</div>
        <div class="fatal-sub" id="erro-msg">Este link de inscrição não é válido.</div>
    </div>

    <!-- STEP 1 — FORMULÁRIO -->
    <div id="step-form" class="step">

        <!-- Card do evento -->
        <div class="ev-card" id="ev-card-info"></div>

        <!-- Mensagem de feedback -->
        <div id="msg-form" class="msg"></div>

        <!-- Dados pessoais -->
        <div class="sec-title" style="margin-top:0">Os Teus Dados</div>

        <div class="form-group">
            <label class="form-label" for="f_nome">Nome Completo *</label>
            <input type="text" class="form-input" id="f_nome"
                   placeholder="O teu nome completo"
                   autocomplete="name"
                   onkeydown="if(event.key==='Enter')document.getElementById('f_email').focus()">
        </div>
        <div class="form-group">
            <label class="form-label" for="f_email">Email *</label>
            <input type="email" class="form-input" id="f_email"
                   placeholder="email@exemplo.com"
                   autocomplete="email"
                   inputmode="email"
                   onkeydown="if(event.key==='Enter')document.getElementById('f_tel').focus()">
        </div>
        <div class="form-group">
            <label class="form-label" for="f_tel">Telemóvel *</label>
            <input type="tel" class="form-input" id="f_tel"
                   placeholder="+351 912 345 678"
                   autocomplete="tel"
                   inputmode="tel"
                   onkeydown="if(event.key==='Enter')iSubmit()">
        </div>

        <!-- Estado na Igreja -->
        <div class="sec-title">O Teu Estado na Igreja</div>
        <div class="form-group">
            <div class="status-grid">
                <label class="status-opt">
                    <input type="radio" name="ig_status" value="membro">
                    <span class="status-lbl">
                        <span class="status-icon"></span>
                        <span class="status-txt">Sou Membro</span>
                    </span>
                </label>
                <label class="status-opt">
                    <input type="radio" name="ig_status" value="em_processo">
                    <span class="status-lbl">
                        <span class="status-icon"></span>
                        <span class="status-txt">Em Processo de Membresia</span>
                    </span>
                </label>
                <label class="status-opt">
                    <input type="radio" name="ig_status" value="visitante">
                    <span class="status-lbl">
                        <span class="status-icon"></span>
                        <span class="status-txt">Visitante</span>
                    </span>
                </label>
                <label class="status-opt">
                    <input type="radio" name="ig_status" value="nao_membro">
                    <span class="status-lbl">
                        <span class="status-icon"></span>
                        <span class="status-txt">Ainda Não Sou Membro</span>
                    </span>
                </label>
            </div>
        </div>

        <button class="btn-submit" id="btn-submit" onclick="iSubmit()">
            Confirmar Inscrição
        </button>

    </div>

    <!-- STEP 2 — CONFIRMAÇÃO -->
    <div id="step-confirmado" class="step">
        <div class="confirmado">
            <div class="conf-icon ok" id="conf-icon">✓</div>
            <div class="conf-title ok" id="conf-title">Inscrição Registada!</div>
            <div class="conf-num" id="conf-num" style="display:none"></div>
            <div class="conf-sub" id="conf-sub"></div>
            <div class="conf-box" id="conf-box"></div>
        </div>
    </div>

</div>

<div class="footer">Zion Lisboa · Sistema de Gestão</div>

<script>
    (function () {

        const SUPA_URL = window.SUPABASE_URL || '';
        const SUPA_KEY = window.SUPABASE_ANON_KEY || '';
        let _evento = null;

        /* ── Supabase helper ─────────────────────────────────── */
        async function sb(path, opts = {}) {
            const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
                ...opts,
                headers: {
                    apikey: SUPA_KEY,
                    Authorization: `Bearer ${SUPA_KEY}`,
                    'Content-Type': 'application/json',
                    Prefer: 'return=representation',
                    ...opts.headers
                }
            });
            if (!r.ok) {
                const e = await r.json().catch(() => {
                });
                throw e;
            }
            const t = await r.text();
            return t ? JSON.parse(t) : [];
        }

        /* ── INIT ────────────────────────────────────────────── */
        async function init() {
            const p = new URLSearchParams(window.location.search);
            const evId = p.get('e');
            if (!evId) return fatal('Link incompleto. Usa o link de inscrição fornecido.');

            try {
                const evs = await sb(`eventos?id=eq.${evId}&select=*`);
                _evento = evs?.[0];

                if (!_evento) return fatal('Evento não encontrado.');
                if (_evento.status === 'cancelado')
                    return fatal('Este evento foi cancelado. Contacta a organização.', 'Evento Cancelado');
                if (_evento.status === 'concluido')
                    return fatal('As inscrições para este evento já encerraram.', 'Evento Encerrado');

                /* Preenche header */
                document.getElementById('ev-titulo').textContent = _evento.titulo || '—';
                const d = _evento.data_inicio
                    ? new Date(_evento.data_inicio).toLocaleDateString('pt-PT', {
                        weekday: 'long', day: 'numeric', month: 'long',
                        hour: '2-digit', minute: '2-digit'
                    }) : '';
                document.getElementById('ev-data').textContent =
                    d + (_evento.local ? ' · ' + _evento.local : '');

                /* Card do evento */
                const valor = Number(_evento.valor) || 0;
                const gratuito = _evento.gratuito || valor === 0;
                document.getElementById('ev-card-info').innerHTML = `
                ${_evento.tipo ? `<div class="ev-card-tipo">${_evento.tipo}</div>` : ''}
                <div class="ev-card-nome">${_evento.titulo}</div>
                ${_evento.descricao
                    ? `<div class="ev-card-meta" style="margin-bottom:8px">${_evento.descricao}</div>`
                    : ''}
                <div class="ev-card-meta">
                    ${d ? '📅&nbsp;' + d : ''}
                    ${_evento.local ? '<br>📍&nbsp;' + _evento.local : ''}
                </div>
                <div class="ev-price-tag">
                    <span class="ev-price-val">${gratuito ? 'GRATUITO' : valor.toFixed(2) + ' €'}</span>
                    ${!gratuito
                    ? '<span class="ev-price-lbl">Pagamento na secretaria</span>'
                    : ''}
                </div>`;

                hide('view-loading');
                mostrar('form');
                setTimeout(() => document.getElementById('f_nome').focus(), 100);

            } catch (e) {
                fatal('Erro ao carregar o evento. Tenta novamente.');
                console.error(e);
            }
        }

        /* ── UI HELPERS ──────────────────────────────────────── */
        function fatal(msg, titulo) {
            hide('view-loading');
            document.getElementById('erro-msg').textContent = msg;
            if (titulo) document.getElementById('erro-title').textContent = titulo;
            document.getElementById('view-erro').style.display = '';
        }

        function mostrar(step) {
            hide('view-loading');
            hide('view-erro');
            ['form', 'confirmado'].forEach(s => {
                const el = document.getElementById('step-' + s);
                if (el) el.classList.remove('active');
            });
            const el = document.getElementById('step-' + step);
            if (el) el.classList.add('active');
        }

        function show(id) {
            const el = document.getElementById(id);
            if (el) el.style.display = '';
        }

        function hide(id) {
            const el = document.getElementById(id);
            if (el) el.style.display = 'none';
        }

        function setMsg(tipo, txt) {
            const el = document.getElementById('msg-form');
            if (el) {
                el.innerHTML = txt;
                el.className = 'msg show ' + tipo;
            }
        }

        function clearMsg() {
            const el = document.getElementById('msg-form');
            if (el) el.className = 'msg';
        }

        function markInvalid(id) {
            const el = document.getElementById(id);
            if (el) el.classList.add('invalid');
        }

        function clearInvalid() {
            document.querySelectorAll('.form-input.invalid').forEach(el => el.classList.remove('invalid'));
        }

        /* ── SUBMIT ──────────────────────────────────────────── */
        async function iSubmitold() {
            clearInvalid();
            clearMsg();

            const nome = document.getElementById('f_nome')?.value?.trim() || '';
            const email = document.getElementById('f_email')?.value?.trim()?.toLowerCase() || '';
            const tel = document.getElementById('f_tel')?.value?.trim() || '';
            const igEl = document.querySelector('input[name="ig_status"]:checked');
            const ig_status = igEl?.value || '';
            const telClean = tel.replace(/\D/g, '');

            /* Validação */
            let hasError = false;
            if (!nome) {
                markInvalid('f_nome');
                hasError = true;
            }
            if (!email || !email.includes('@')) {
                markInvalid('f_email');
                hasError = true;
            }
            if (telClean.length < 9) {
                markInvalid('f_tel');
                hasError = true;
            }
            if (hasError) {
                setMsg('error', 'Preenche correctamente todos os campos obrigatórios (*).');
                return;
            }
            if (!ig_status) {
                setMsg('error', 'Selecciona o teu estado na Igreja para continuar.');
                return;
            }

            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.textContent = 'A registar...';

            try {
                const evId = _evento.id;
                const telSuf = telClean.slice(-9);

                /* ── 1. Verificar duplicado por email ─────────── */
                const dupEmail = await sb(
                    `evento_inscricoes?evento_id=eq.${evId}&email=eq.${encodeURIComponent(email)}&select=id,status,nome&limit=1`
                ).catch(() => []);

                /* ── 1b. Verificar duplicado por telemóvel ────── */
                let dup = dupEmail?.[0] || null;
                if (!dup) {
                    const allInsc = await sb(
                        `evento_inscricoes?evento_id=eq.${evId}&select=id,status,nome,telemovel&limit=200`
                    ).catch(() => []);
                    dup = allInsc?.find(r =>
                        (r.telemovel || '').replace(/\D/g, '').slice(-9) === telSuf
                    ) || null;
                }

                if (dup) {
                    if (dup.status === 'pago') {
                        setMsg('success',
                            `✓ <strong>${dup.nome}</strong>, o teu pagamento já foi confirmado! Até já 🎉`
                        );
                    } else if (dup.status === 'cancelado') {
                        setMsg('info', 'A tua inscrição anterior foi cancelada. A registar nova inscrição...');
                        // Deixa continuar — cria nova
                        dup = null;
                    } else {
                        setMsg('info',
                            `Já tens uma inscrição pendente. Dirige-te à secretaria no dia do evento para efectuar o pagamento.`
                        );
                        btn.disabled = false;
                        btn.textContent = 'Confirmar Inscrição';
                        return;
                    }
                }

                if (!dup) {
                    /* ── 2. Tentar encontrar membro por email ───── */
                    let membroId = null;
                    try {
                        const mByEmail = await sb(
                            `membros?email=eq.${encodeURIComponent(email)}&select=id,nome&limit=1`
                        ).catch(() => []);
                        membroId = mByEmail?.[0]?.id || null;

                        if (!membroId) {
                            /* Busca por telemóvel — cliente-side para evitar problemas de encoding */
                            const mAll = await sb(
                                `membros?select=id,nome,telefone&ativo=eq.true&limit=500`
                            ).catch(() => []);
                            const found = mAll?.find(m =>
                                (m.telefone || '').replace(/\D/g, '').slice(-9) === telSuf
                            );
                            membroId = found?.id || null;
                        }
                    } catch (e) { /* não crítico */
                    }

                    /* ── 3. Criar inscrição ───────────────────── */

                    const novaInscricao = await sb('evento_inscricoes', {
                        method: 'POST',
                        body: JSON.stringify({
                            evento_id:     evId,
                            nome,
                            email,
                            telemovel:     tel,
                            status_igreja: ig_status,
                            membro_id:     membroId,
                            status:        'pendente'
                        })
                    });

                    if (novaInscricao?.[0]?.id) {
                        enviarEmailConfirmacao(novaInscricao[0].id);
                    }
                }

                /* ── 4. Posição na fila ───────────────────────── */
                const fila = await sb(
                    `evento_inscricoes?evento_id=eq.${evId}&status=eq.pendente&select=id&order=created_at`
                ).catch(() => []);
                const pos = fila?.length || 1;

                /* ── 5. Tela de confirmação ───────────────────── */
                const valor = Number(_evento.valor) || 0;
                const gratuito = _evento.gratuito || valor === 0;

                document.getElementById('conf-icon').textContent = '✓';
                document.getElementById('conf-icon').className = 'conf-icon ok';
                document.getElementById('conf-title').textContent = 'Inscrição Registada!';
                document.getElementById('conf-title').className = 'conf-title ok';

                const numEl = document.getElementById('conf-num');
                numEl.textContent = `# ${pos}`;
                numEl.style.display = '';

                document.getElementById('conf-sub').innerHTML =
                    `Olá <strong>${nome}</strong>! A tua inscrição em <strong>${_evento.titulo}</strong> foi registada com sucesso.`;

                document.getElementById('conf-box').innerHTML = gratuito
                    ? `<strong>Próximo passo:</strong> No dia do evento faz o check-in através do QR Code que estará disponível na entrada.`
                    : `<strong>Próximo passo:</strong> No dia do evento dirige-te à secretaria e informa o teu <strong>nome</strong> ou <strong>email</strong> para que possam localizar a tua inscrição.<br><br>
                   Após confirmação do pagamento de <strong>${valor.toFixed(2)} €</strong> serás adicionado à lista de presença e poderás fazer o check-in normalmente.`;

                mostrar('confirmado');

            } catch (err) {
                console.error(err);
                setMsg('error', 'Erro ao registar. Tenta novamente ou pede ajuda a um responsável.');
                btn.disabled = false;
                btn.textContent = 'Confirmar Inscrição';
            }
        }

        async function iSubmit() {
            clearInvalid();
            clearMsg();

            const nome     = document.getElementById('f_nome')?.value?.trim() || '';
            const email    = document.getElementById('f_email')?.value?.trim()?.toLowerCase() || '';
            const tel      = document.getElementById('f_tel')?.value?.trim() || '';
            const igEl     = document.querySelector('input[name="ig_status"]:checked');
            const ig_status = igEl?.value || '';
            const telClean = tel.replace(/\D/g, '');

            /* Validação */
            let hasError = false;
            if (!nome)                          { markInvalid('f_nome');  hasError = true; }
            if (!email || !email.includes('@')) { markInvalid('f_email'); hasError = true; }
            if (telClean.length < 9)            { markInvalid('f_tel');   hasError = true; }
            if (hasError) {
                setMsg('error', 'Preenche correctamente todos os campos obrigatórios (*).');
                return;
            }
            if (!ig_status) {
                setMsg('error', 'Selecciona o teu estado na Igreja para continuar.');
                return;
            }

            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.textContent = 'A registar...';

            try {
                const evId   = _evento.id;
                const telSuf = telClean.slice(-9);

                /* ── 1. Verificar duplicado por email ────────────────── */
                const dupEmail = await sb(
                    `evento_inscricoes?evento_id=eq.${evId}&email=eq.${encodeURIComponent(email)}&select=id,status,nome&limit=1`
                ).catch(() => []);

                let dup = dupEmail?.[0] || null;

                /* ── 1b. Verificar duplicado por telemóvel ───────────── */
                if (!dup) {
                    const allInsc = await sb(
                        `evento_inscricoes?evento_id=eq.${evId}&select=id,status,nome,telemovel&limit=200`
                    ).catch(() => []);
                    dup = allInsc?.find(r =>
                        (r.telemovel || '').replace(/\D/g, '').slice(-9) === telSuf
                    ) || null;
                }

                /* ── 2. Tratar duplicados ─────────────────────────────── */
                if (dup) {
                    if (dup.status === 'pago') {
                        setMsg('success',
                            `✓ <strong>${dup.nome}</strong>, o teu pagamento já foi confirmado! Até já 🎉`
                        );
                        btn.disabled = false;
                        btn.textContent = 'Confirmar Inscrição';
                        return;
                    }
                    if (dup.status === 'pendente') {
                        setMsg('info',
                            `Já tens uma inscrição pendente. Dirige-te à secretaria no dia do evento para efectuar o pagamento.`
                        );
                        btn.disabled = false;
                        btn.textContent = 'Confirmar Inscrição';
                        return;
                    }
                    // cancelado → permite criar nova, continua
                }

                /* ── 3. Encontrar membro por email/tel ───────────────── */
                let membroId = null;
                try {
                    const mByEmail = await sb(
                        `membros?email=eq.${encodeURIComponent(email)}&select=id&limit=1`
                    ).catch(() => []);
                    membroId = mByEmail?.[0]?.id || null;

                    if (!membroId) {
                        const mAll = await sb(
                            `membros?select=id,telefone&ativo=eq.true&limit=500`
                        ).catch(() => []);
                        const found = mAll?.find(m =>
                            (m.telefone || '').replace(/\D/g, '').slice(-9) === telSuf
                        );
                        membroId = found?.id || null;
                    }
                } catch (e) { /* não crítico */ }

                /* ── 4. Criar inscrição ──────────────────────────────── */
                const novaInscricao = await sb('evento_inscricoes', {
                    method: 'POST',
                    body: JSON.stringify({
                        evento_id:     evId,
                        nome,
                        email,
                        telemovel:     tel,
                        status_igreja: ig_status,
                        membro_id:     membroId,
                        status:        'pendente'
                    })
                });

                const novaId = novaInscricao?.[0]?.id;

                /* ── 5. Email em background (não bloqueia) ───────────── */
                if (novaId) {
                    enviarEmailConfirmacao(novaId); // fire-and-forget
                }

                /* ── 6. Posição na fila ──────────────────────────────── */
                const fila = await sb(
                    `evento_inscricoes?evento_id=eq.${evId}&status=eq.pendente&select=id&order=created_at`
                ).catch(() => []);
                const pos = fila?.length || 1;

                /* ── 7. Tela de confirmação ──────────────────────────── */
                const valor    = Number(_evento.valor) || 0;
                const gratuito = _evento.gratuito || valor === 0;

                document.getElementById('conf-icon').textContent  = '✓';
                document.getElementById('conf-icon').className    = 'conf-icon ok';
                document.getElementById('conf-title').textContent = 'Inscrição Registada!';
                document.getElementById('conf-title').className   = 'conf-title ok';

                const numEl = document.getElementById('conf-num');
                numEl.textContent  = `# ${pos}`;
                numEl.style.display = '';

                document.getElementById('conf-sub').innerHTML =
                    `Olá <strong>${nome}</strong>! A tua inscrição em <strong>${_evento.titulo}</strong> foi registada com sucesso.
            ${email ? '<br><small style="opacity:.7">Confirmação enviada para ' + email + '</small>' : ''}`;

                document.getElementById('conf-box').innerHTML = gratuito
                    ? `<strong>Próximo passo:</strong> No dia do evento faz o check-in através do QR Code que estará disponível na entrada.`
                    : `<strong>Próximo passo:</strong> Dirige-te à secretaria no dia do evento, informa o teu <strong>nome</strong> ou <strong>email</strong> e efectua o pagamento de <strong>${valor.toFixed(2)} €</strong>.<br><br>
               Após confirmação serás adicionado à lista de presença.`;

                mostrar('confirmado');

            } catch (err) {
                console.error('[iSubmit]', err);
                setMsg('error', 'Erro ao registar. Tenta novamente ou pede ajuda a um responsável.');
                btn.disabled = false;
                btn.textContent = 'Confirmar Inscrição';
            }
        }

        async function enviarEmailConfirmacao(inscricaoId) {
            try {
                const apiBase = window.API_URL || window.location.origin;

                const res = await fetch(`${apiBase}/api/auth/inscricao-confirmacao`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({inscricao_id: inscricaoId})
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    console.warn('[email confirmação] Falhou:', err?.error || res.status);
                } else {
                    console.log('[email confirmação] Enviado com sucesso.');
                }
            } catch (e) {
                console.warn('[email confirmação] Erro de rede:', e?.message);
            }
        }

        window.iSubmit = iSubmit;
        init();

    })();
</script>
