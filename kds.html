<!DOCTYPE html>
<html lang="pt" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDS — Zion Keola</title>
    <link rel="icon" href="/assets/icons/favicon.ico" sizes="any">
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ══════════════════════════════════════════════════
           TEMAS
        ══════════════════════════════════════════════════ */
        :root,
        [data-theme="dark"] {
            --primary:       #009098;
            --primary-dark:  #007078;
            --primary-light: #00b0b8;
            --primary-faint: rgba(0,144,152,0.12);
            --gold:          #c09040;
            --red:           #fc8a8a;
            --green:         #4caf7d;
            --green-light:   #5dc98f;
            --orange:        #f0944d;

            --bg-page:   #02161e;
            --bg-card:   #071c26;
            --bg-panel:  rgba(0,144,152,0.07);
            --bg-input:  rgba(255,255,255,0.04);

            --text-main:  #ffffff;
            --text-muted: rgba(255,255,255,0.72);
            --text-faint: rgba(255,255,255,0.34);

            --border:    rgba(0,144,152,0.22);
            --border-md: rgba(0,144,152,0.40);

            --shadow:    0 2px 16px rgba(0,0,0,0.45);
            --shadow-md: 0 6px 36px rgba(0,0,0,0.6);

            --prep-color:   #f0944d;
            --prep-bg:      rgba(240,148,77,0.10);
            --prep-border:  rgba(240,148,77,0.28);
            --pronto-color: #4caf7d;
            --pronto-bg:    rgba(76,175,125,0.10);
            --pronto-border:rgba(76,175,125,0.28);
        }

        [data-theme="light"] {
            --primary:       #009098;
            --primary-dark:  #007078;
            --primary-light: #00838b;
            --primary-faint: rgba(0,144,152,0.08);
            --gold:          #c09040;
            --red:           #c0392b;
            --green:         #2e7d32;
            --green-light:   #388e3c;
            --orange:        #e65100;

            --bg-page:   #f0f4f4;
            --bg-card:   #ffffff;
            --bg-panel:  #eaf2f2;
            --bg-input:  #f5fafa;

            --text-main:  #0a2020;
            --text-muted: #4a6a6a;
            --text-faint: #7a9a9a;

            --border:    rgba(0,144,152,0.18);
            --border-md: rgba(0,144,152,0.32);

            --shadow:    0 2px 10px rgba(0,112,120,0.09);
            --shadow-md: 0 4px 24px rgba(0,112,120,0.14);

            --prep-color:   #e65100;
            --prep-bg:      rgba(230,81,0,0.07);
            --prep-border:  rgba(230,81,0,0.22);
            --pronto-color: #2e7d32;
            --pronto-bg:    rgba(46,125,50,0.07);
            --pronto-border:rgba(46,125,50,0.22);
        }

        /* ── Base ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Lato', sans-serif;
            background: var(--bg-page);
            color: var(--text-main);
            display: flex; flex-direction: column;
            -webkit-font-smoothing: antialiased;
            transition: background 0.3s, color 0.3s;
        }

        /* ── HEADER ── */
        .header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            height: 54px;
            display: flex; align-items: center;
            padding: 0 20px; gap: 14px; flex-shrink: 0;
            box-shadow: var(--shadow); z-index: 50;
            transition: background 0.3s, border-color 0.3s;
        }
        .header-logo {
            font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700;
            color: var(--primary-dark); letter-spacing: 4px; text-transform: uppercase;
        }
        .header-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
        .header-sub {
            font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 3.5px;
            text-transform: uppercase; color: var(--text-faint);
        }
        .header-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
        .header-clock { font-family: 'Cinzel', serif; font-size: 18px; color: var(--text-muted); letter-spacing: 2px; }
        .header-date  { font-size: 12px; color: var(--text-faint); font-family: 'Cinzel', serif; letter-spacing: 0.5px; }
        .header-update { font-size: 10px; color: var(--text-faint); font-family: 'Cinzel', serif; letter-spacing: 1px; }

        /* ── Toggle tema ── */
        .theme-toggle {
            width: 36px; height: 36px; border-radius: 50%;
            border: 1px solid var(--border); background: var(--bg-panel);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); transition: all 0.2s; flex-shrink: 0;
        }
        .theme-toggle:hover { background: var(--primary-faint); border-color: var(--primary); color: var(--primary-dark); }
        .theme-toggle .icon-sun  { display: none; }
        .theme-toggle .icon-moon { display: block; }
        [data-theme="light"] .theme-toggle .icon-sun  { display: block; }
        [data-theme="light"] .theme-toggle .icon-moon { display: none; }

        .gold-stripe { height: 2px; background: linear-gradient(90deg, transparent 0%, var(--gold) 40%, var(--primary) 60%, transparent 100%); flex-shrink: 0; }

        /* ══════════════════════════════════════════════════
           PAINEL CLIENTE — faixa superior chamativa
        ══════════════════════════════════════════════════ */
        .painel-cliente {
            background: var(--bg-card);
            border-bottom: 2px solid var(--border-md);
            padding: 18px 24px 16px;
            flex-shrink: 0;
            transition: background 0.3s;
        }

        .painel-cliente-header {
            display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
        }
        .painel-cliente-titulo {
            font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 4px;
            text-transform: uppercase; color: var(--text-faint);
        }
        .painel-cliente-sep { flex: 1; height: 1px; background: var(--border); }

        /* Grid de pedidos prontos — chamada ao cliente */
        .chamada-grid {
            display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none; align-items: stretch;
            min-height: 100px;
        }
        .chamada-grid::-webkit-scrollbar { display: none; }

        .chamada-vazio {
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px;
            font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px;
            text-transform: uppercase; color: var(--text-faint); min-height: 100px;
        }

        /* Card do cliente — GRANDE e chamativo */
        .chamada-card {
            background: var(--pronto-bg);
            border: 2px solid var(--pronto-border);
            border-radius: 14px;
            padding: 16px 24px;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            flex-shrink: 0; min-width: 160px;
            animation: entradaCard 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            position: relative; overflow: hidden;
        }
        @keyframes entradaCard {
            from { opacity: 0; transform: scale(0.7) translateY(20px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Pulsar quando está pronto */
        .chamada-card.novo {
            animation: entradaCard 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both,
                       pulsarBorda 1.6s ease-in-out 0.4s infinite;
        }
        @keyframes pulsarBorda {
            0%, 100% { box-shadow: 0 0 0 0 rgba(76,175,125,0.5); border-color: var(--pronto-border); }
            50%       { box-shadow: 0 0 0 10px rgba(76,175,125,0);  border-color: var(--pronto-color); }
        }
        [data-theme="light"] .chamada-card.novo {
            animation: entradaCard 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both,
                       pulsarBordaLight 1.6s ease-in-out 0.4s infinite;
        }
        @keyframes pulsarBordaLight {
            0%, 100% { box-shadow: 0 0 0 0 rgba(46,125,50,0.4); border-color: var(--pronto-border); }
            50%       { box-shadow: 0 0 0 10px rgba(46,125,50,0); border-color: var(--pronto-color); }
        }

        .chamada-label {
            font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 3px;
            text-transform: uppercase; color: var(--pronto-color); margin-bottom: 2px;
        }
        .chamada-num {
            font-family: 'Cinzel', serif; font-size: 72px; font-weight: 700;
            color: var(--pronto-color); line-height: 1; letter-spacing: -2px;
        }
        .chamada-nome {
            font-size: 18px; font-weight: 700; color: var(--text-main);
            text-align: center; max-width: 180px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .chamada-card::before {
            content: ''; position: absolute; top: -30px; right: -30px;
            width: 90px; height: 90px; border-radius: 50%;
            background: radial-gradient(circle, var(--pronto-color) 0%, transparent 70%);
            opacity: 0.10; pointer-events: none;
        }

        /* ══════════════════════════════════════════════════
           ÁREA DE COZINHA — colunas
        ══════════════════════════════════════════════════ */
        .area-cozinha {
            flex: 1; display: grid; grid-template-columns: 1fr 1px 1fr; overflow: hidden;
        }
        .coluna-sep { background: var(--border); }
        .coluna { display: flex; flex-direction: column; overflow: hidden; }

        .coluna-header {
            padding: 14px 20px 12px; background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
            transition: background 0.3s;
        }
        .coluna-titulo {
            font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; font-weight: 600;
        }
        .col-prep   .coluna-titulo { color: var(--prep-color); }
        .col-pronto .coluna-titulo { color: var(--pronto-color); }

        .coluna-count {
            font-family: 'Cinzel', serif; font-size: 28px; font-weight: 700;
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 10px;
        }
        .col-prep   .coluna-count { color: var(--prep-color);   background: var(--prep-bg);   border: 1px solid var(--prep-border); }
        .col-pronto .coluna-count { color: var(--pronto-color); background: var(--pronto-bg); border: 1px solid var(--pronto-border); }

        /* Grid de cards */
        .cards-grid {
            flex: 1; overflow-y: auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px; padding: 18px; align-content: start;
        }
        .cards-grid::-webkit-scrollbar { width: 4px; }
        .cards-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* ── CARD DE PEDIDO (cozinha) ── */
        .pedido-card {
            background: var(--bg-card);
            border-radius: 14px; padding: 18px;
            display: flex; flex-direction: column; gap: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border); border-left: 4px solid transparent;
            animation: fadeUp 0.28s ease both;
            transition: background 0.3s, border-color 0.2s;
        }
        @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .col-prep   .pedido-card { border-left-color: var(--prep-color); }
        .col-pronto .pedido-card { border-left-color: var(--pronto-color); }

        /* Número do pedido — GRANDE para TV */
        .card-numero {
            font-family: 'Cinzel', serif; font-size: 56px; font-weight: 700;
            line-height: 1; text-align: center; letter-spacing: -1px;
        }
        .col-prep   .card-numero { color: var(--prep-color); }
        .col-pronto .card-numero { color: var(--pronto-color); }

        /* Nome do cliente — grande */
        .card-nome {
            font-size: 20px; font-weight: 700; text-align: center; color: var(--text-main);
            border-top: 1px solid var(--border); padding-top: 10px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* Itens */
        .card-itens {
            font-size: 15px; color: var(--text-muted); line-height: 1.8;
            background: var(--bg-panel); border-radius: 8px; padding: 10px 12px;
        }
        .card-item-linha { display: flex; gap: 8px; align-items: baseline; }
        .card-item-qty { font-family: 'Cinzel', serif; font-size: 15px; font-weight: 700; min-width: 28px; }
        .col-prep   .card-item-qty { color: var(--prep-color); }
        .col-pronto .card-item-qty { color: var(--pronto-color); }

        /* Tempo */
        .card-tempo {
            font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 1.5px;
            text-transform: uppercase; text-align: center; color: var(--text-faint);
        }
        .card-tempo.urgente { color: var(--red); animation: blink 1.2s ease-in-out infinite; }
        @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

        /* Botões */
        .btn-acao {
            width: 100%; padding: 13px 16px; border-radius: 10px; border: 1.5px solid;
            font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; transition: all 0.15s; font-weight: 600;
        }
        .btn-preparar {
            background: var(--prep-bg); border-color: var(--prep-border); color: var(--prep-color);
        }
        .btn-preparar:hover { background: rgba(240,148,77,0.18); }
        [data-theme="light"] .btn-preparar { background: rgba(230,81,0,0.07); border-color: rgba(230,81,0,0.25); color: #e65100; }
        [data-theme="light"] .btn-preparar:hover { background: rgba(230,81,0,0.14); }

        .btn-pronto {
            background: rgba(76,175,125,0.10); border-color: rgba(76,175,125,0.30); color: var(--green);
        }
        .btn-pronto:hover { background: rgba(76,175,125,0.20); }
        [data-theme="light"] .btn-pronto { background: rgba(46,125,50,0.07); border-color: rgba(46,125,50,0.25); color: #2e7d32; }
        [data-theme="light"] .btn-pronto:hover { background: rgba(46,125,50,0.14); }

        .btn-retirar {
            background: rgba(76,175,125,0.10); border-color: var(--pronto-border); color: var(--pronto-color);
        }
        .btn-retirar:hover { background: rgba(76,175,125,0.22); }
        [data-theme="light"] .btn-retirar { background: rgba(46,125,50,0.07); border-color: rgba(46,125,50,0.25); color: #2e7d32; }
        [data-theme="light"] .btn-retirar:hover { background: rgba(46,125,50,0.14); }

        .btn-acao:active { transform: scale(0.97); }

        /* Vazio */
        .empty-col {
            grid-column: 1/-1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 60px 20px; gap: 10px;
        }
        .empty-sep { width: 32px; height: 2px; background: var(--border); border-radius: 2px; }
        .empty-txt { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2.5px; color: var(--text-faint); text-align: center; }

        /* ── Toast ── */
        .toast {
            position: fixed; bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(14px);
            background: var(--bg-card); border: 1px solid var(--pronto-border);
            color: var(--pronto-color);
            padding: 14px 32px; border-radius: 40px;
            font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 1.5px;
            opacity: 0; transition: all 0.3s; pointer-events: none;
            box-shadow: var(--shadow-md); z-index: 300; white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* ── Responsivo TV ── */
        @media (min-width: 1600px) {
            .chamada-num { font-size: 90px; }
            .chamada-nome { font-size: 22px; }
            .card-numero { font-size: 72px; }
            .card-nome { font-size: 24px; }
            .card-itens { font-size: 17px; }
            .coluna-titulo { font-size: 15px; }
            .cards-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; padding: 20px; }
        }
        @media (min-width: 2000px) {
            .chamada-num { font-size: 110px; }
            .card-numero { font-size: 90px; }
            .card-nome { font-size: 28px; }
            .card-itens { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-logo">Zion Lisboa</div>
    <div class="header-divider"></div>
    <div class="header-sub">Keola · KDS</div>
    <div class="header-right">
        <div class="header-date"  id="date-str"></div>
        <div class="header-divider"></div>
        <div class="header-clock" id="clock">--:--</div>
        <div class="header-divider"></div>
        <div class="header-update" id="ultimo-update">—</div>
        <div class="header-divider"></div>
        <button class="theme-toggle" onclick="toggleTheme()" title="Alternar tema">
            <span class="icon-moon">
                <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
            </span>
            <span class="icon-sun">
                <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </span>
        </button>
    </div>
</div>
<div class="gold-stripe"></div>

<!-- PAINEL CLIENTE — faixa de chamada -->
<div class="painel-cliente">
    <div class="painel-cliente-header">
        <div class="painel-cliente-titulo">✦ Pedidos Prontos — Venha Retirar</div>
        <div class="painel-cliente-sep"></div>
    </div>
    <div class="chamada-grid" id="chamada-grid">
        <div class="chamada-vazio">
            <span>Nenhum pedido pronto no momento</span>
        </div>
    </div>
</div>

<!-- ÁREA COZINHA -->
<div class="area-cozinha">
    <div class="coluna col-prep">
        <div class="coluna-header">
            <div class="coluna-titulo">Em Preparação</div>
            <div class="coluna-count" id="count-prep">0</div>
        </div>
        <div class="cards-grid" id="grid-prep"></div>
    </div>
    <div class="coluna-sep"></div>
    <div class="coluna col-pronto">
        <div class="coluna-header">
            <div class="coluna-titulo">Pronto para Retirada</div>
            <div class="coluna-count" id="count-pronto">0</div>
        </div>
        <div class="cards-grid" id="grid-pronto"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // ── Tema ──
    (function() {
        const saved = localStorage.getItem('zion_kds_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', saved);
    })();
    function toggleTheme() {
        const html = document.documentElement;
        const novo = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', novo);
        localStorage.setItem('zion_kds_theme', novo);
    }

    // ── Supabase ──
    const SUPA_URL = window.SUPABASE_URL      || '';
    const SUPA_KEY = window.SUPABASE_ANON_KEY || '';
    async function sb(path, opts = {}) {
        const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
            ...opts,
            headers: { apikey:SUPA_KEY, Authorization:`Bearer ${SUPA_KEY}`, 'Content-Type':'application/json', Prefer:'return=representation', ...opts.headers },
        });
        if (!r.ok) { const e = await r.json().catch(()=>{}); throw e; }
        const t = await r.text(); return t ? JSON.parse(t) : [];
    }

    // ── Relógio ──
    function tickClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('pt-PT', { hour:'2-digit', minute:'2-digit' });
        document.getElementById('date-str').textContent = now.toLocaleDateString('pt-PT', { weekday:'long', day:'numeric', month:'long' }).replace(/^\w/, c => c.toUpperCase());
    }
    tickClock(); setInterval(tickClock, 1000);

    // ── Estado ──
    let idsProntoAntes = new Set();
    let todosNovos     = new Set(); // IDs prontos ainda não vistos

    function mins(ts)       { return Math.floor((Date.now() - new Date(ts)) / 60000); }
    function textoTempo(ts) { const m = mins(ts); return m < 1 ? 'Agora mesmo' : m === 1 ? '1 min' : `${m} min`; }
    function isUrgente(ts, status) {
        const m = mins(ts);
        return (status === 'em_preparacao' && m > 15) || (status === 'pronto' && m > 8);
    }

    // ── Painel Cliente (chamada) ──
    function renderChamada(prontos) {
        const grid = document.getElementById('chamada-grid');
        if (!prontos.length) {
            grid.innerHTML = `<div class="chamada-vazio">Nenhum pedido pronto no momento</div>`;
            return;
        }
        grid.innerHTML = prontos.map(p => {
            const isNovo = todosNovos.has(p.id);
            return `<div class="chamada-card ${isNovo ? 'novo' : ''}" id="chamada-${p.id}">
                <div class="chamada-label">✓ Pronto</div>
                <div class="chamada-num">#${String(p.numero).padStart(2,'0')}</div>
                <div class="chamada-nome">${p.nome_cliente || 'Anónimo'}</div>
            </div>`;
        }).join('');
    }

    // ── Colunas cozinha ──
    function renderColuna(pedidos, gridId, status) {
        const grid = document.getElementById(gridId);
        if (!pedidos.length) {
            grid.innerHTML = `<div class="empty-col">
                <div class="empty-sep"></div>
                <div class="empty-txt">${status === 'em_preparacao' ? 'Nenhum pedido em preparação' : 'Nenhum pedido pronto'}</div>
            </div>`;
            return;
        }
        grid.innerHTML = pedidos.map(p => {
            const ts       = p.updated_at || p.created_at;
            const urgente  = isUrgente(ts, status);
            const itensHtml = (p.itens || []).map(it =>
                `<div class="card-item-linha">
                    <span class="card-item-qty">${Number(it.quantidade)}×</span>
                    <span>${it.produto_nome}</span>
                </div>`
            ).join('');

            let btnHtml = '';
            if (status === 'em_preparacao') {
                btnHtml = `<button class="btn-acao btn-pronto" onclick="mudarStatus('${p.id}','pronto')">✓ Marcar Pronto</button>`;
            } else {
                btnHtml = `<button class="btn-acao btn-retirar" onclick="marcarEntregue('${p.id}')">📦 Retirado</button>`;
            }

            return `<div class="pedido-card" id="card-${p.id}">
                <div class="card-numero">#${String(p.numero).padStart(2,'0')}</div>
                <div class="card-nome">${p.nome_cliente || 'Anónimo'}</div>
                ${itensHtml ? `<div class="card-itens">${itensHtml}</div>` : ''}
                <div class="card-tempo ${urgente ? 'urgente' : ''}">${textoTempo(ts)}${urgente ? ' ⚠' : ''}</div>
                ${btnHtml}
            </div>`;
        }).join('');
    }

    // ── Carregar dados ──
    async function carregar() {
        const hoje  = new Date().toISOString().split('T')[0];
        const peds  = await sb(`pedidos?select=*&data_pedido=eq.${hoje}&status=in.(em_preparacao,pronto)&order=numero.asc`).catch(() => []);
        const pedIds = (peds || []).map(p => p.id);

        let itensMap = {};
        if (pedIds.length) {
            const all = await sb(`pedido_itens?select=*&pedido_id=in.(${pedIds.join(',')})&order=created_at`).catch(() => []);
            (all || []).forEach(it => {
                if (!itensMap[it.pedido_id]) itensMap[it.pedido_id] = [];
                itensMap[it.pedido_id].push(it);
            });
        }

        const todos   = (peds || []).map(p => ({ ...p, itens: itensMap[p.id] || [] }));
        const emPrep  = todos.filter(p => p.status === 'em_preparacao');
        const prontos = todos.filter(p => p.status === 'pronto');

        // Detecta prontos novos
        const idsAgora = new Set(prontos.map(p => p.id));
        prontos.forEach(p => {
            if (!idsProntoAntes.has(p.id)) {
                todosNovos.add(p.id);
                showToast(`Pedido #${String(p.numero).padStart(2,'0')} pronto — ${p.nome_cliente || 'Anónimo'}`);
                // Remove o estado "novo" após 12 s (para parar de piscar)
                setTimeout(() => { todosNovos.delete(p.id); renderChamada(prontos); }, 12000);
            }
        });
        idsProntoAntes = idsAgora;

        document.getElementById('count-prep').textContent   = emPrep.length;
        document.getElementById('count-pronto').textContent = prontos.length;

        renderChamada(prontos);
        renderColuna(emPrep,  'grid-prep',   'em_preparacao');
        renderColuna(prontos, 'grid-pronto', 'pronto');

        document.getElementById('ultimo-update').textContent =
            new Date().toLocaleTimeString('pt-PT', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    }

    async function mudarStatus(id, novoStatus) {
        await sb(`pedidos?id=eq.${id}`, {
            method: 'PATCH',
            body: JSON.stringify({ status: novoStatus, updated_at: new Date().toISOString() })
        }).catch(console.error);
        await carregar();
    }

    async function marcarEntregue(id) {
        await mudarStatus(id, 'entregue');
    }

    let _toastTimer;
    function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg; el.classList.add('show');
        clearTimeout(_toastTimer);
        _toastTimer = setTimeout(() => el.classList.remove('show'), 4000);
    }

    carregar();
    setInterval(carregar, 8000);
</script>
</body>
</html>
