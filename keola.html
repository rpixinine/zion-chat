<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Keola — Zion Church Lisboa</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="config.js"></script>
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        :root {
            --k-bg:       #f7f4ee;
            --k-surface:  #ffffff;
            --k-amber:    #c8832a;
            --k-amber-lt: #f5e8d4;
            --k-teal:     #00838b;
            --k-dark:     #1a1814;
            --k-mid:      #6b6458;
            --k-faint:    #b0a898;
            --k-border:   rgba(200, 131, 42, 0.18);
            --k-r-sm:     10px;
            --k-r-md:     16px;
            --k-r-lg:     24px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { width: 100%; min-height: 100vh; }

        body {
            background: var(--k-bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--k-dark);
        }

        /* ═══════════════════════════════════════════════════
           HERO
        ═══════════════════════════════════════════════════ */
        .hero {
            position: relative;
            width: 100%;
            background: var(--k-dark);
            overflow: hidden;
            padding: 56px 5vw 54px;
            text-align: center;
        }
        @media (min-width: 768px)  { .hero { padding: 80px 8vw 72px; } }
        @media (min-width: 1280px) { .hero { padding: 100px 10vw 92px; } }

        .hero::before {
            content: '';
            position: absolute; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
            opacity: 0.4; pointer-events: none;
        }
        .hero::after {
            content: '';
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw; height: 40vh;
            background: radial-gradient(ellipse, rgba(200,131,42,0.22) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-ring {
            position: absolute; border-radius: 50%;
            border: 1px solid rgba(200,131,42,0.10);
            pointer-events: none;
        }
        .hero-ring-1 {
            width: min(320px, 60vw); height: min(320px, 60vw);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            animation: ringPulse 6s ease-in-out infinite;
        }
        .hero-ring-2 {
            width: min(520px, 90vw); height: min(520px, 90vw);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            border-color: rgba(200,131,42,0.05);
            animation: ringPulse 6s 1s ease-in-out infinite;
        }
        @keyframes ringPulse {
            0%,100% { opacity:.4; transform: translate(-50%,-50%) scale(1);    }
            50%      { opacity:1;  transform: translate(-50%,-50%) scale(1.04); }
        }

        .hero-content { position: relative; z-index: 2; }

        .hero-tag {
            display: inline-block;
            font-size: clamp(9px, 1.2vw, 11px);
            font-weight: 500; letter-spacing: 3.5px; text-transform: uppercase;
            color: var(--k-amber);
            border: 1px solid rgba(200,131,42,0.35);
            border-radius: 100px; padding: 5px 16px; margin-bottom: 20px;
            animation: fadeDown .6s ease both;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(48px, 9vw, 96px);
            font-weight: 900; color: #fff;
            line-height: .95; letter-spacing: -2px;
            animation: fadeDown .6s .1s ease both;
        }
        .hero-title span { color: var(--k-amber); font-style: italic; }

        .hero-divider {
            width: clamp(32px, 4vw, 56px); height: 2px;
            background: linear-gradient(90deg, var(--k-amber), transparent);
            margin: 22px auto;
            animation: fadeDown .6s .2s ease both;
        }

        .hero-sub {
            font-size: clamp(13px, 1.6vw, 18px);
            font-weight: 300; color: rgba(255,255,255,.55); line-height: 1.7;
            animation: fadeDown .6s .3s ease both;
        }
        .hero-sub strong { color: rgba(255,255,255,.9); font-weight: 500; }

        .hero-wave {
            position: absolute; bottom: -1px; left: 0; right: 0;
            height: 32px; overflow: hidden;
        }
        .hero-wave svg { display: block; width: 100%; height: 100%; }

        @keyframes fadeDown {
            from { opacity:0; transform:translateY(-14px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* ═══════════════════════════════════════════════════
           CATEGORY NAV
        ═══════════════════════════════════════════════════ */
        .cat-nav {
            display: flex; gap: 8px; overflow-x: auto;
            padding: 14px 5vw;
            background: var(--k-surface);
            border-bottom: 1px solid var(--k-border);
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .cat-nav::-webkit-scrollbar { display: none; }

        .cat-pill {
            flex-shrink: 0; padding: 7px 20px; border-radius: 100px;
            font-size: clamp(11px, 1.2vw, 13px); font-weight: 500;
            border: 1.5px solid var(--k-border); cursor: pointer;
            transition: all .2s; white-space: nowrap;
            background: var(--k-bg); color: var(--k-mid);
        }
        .cat-pill.active, .cat-pill:hover {
            background: var(--k-dark); color: #fff; border-color: var(--k-dark);
        }

        /* ═══════════════════════════════════════════════════
           CONTENT — fully fluid, no max-width
        ═══════════════════════════════════════════════════ */
        .content {
            width: 100%;
            padding: 24px 5vw 40px;
        }
        @media (min-width: 768px)  { .content { padding: 32px 5vw 48px; } }
        @media (min-width: 1280px) { .content { padding: 40px 6vw 60px; } }

        /* ═══════════════════════════════════════════════════
           ESPECIAL BANNER
        ═══════════════════════════════════════════════════ */
        .especial-banner {
            background: linear-gradient(135deg, var(--k-dark) 0%, #2a2318 100%);
            border-radius: var(--k-r-lg);
            padding: clamp(18px, 3vw, 36px);
            margin-bottom: 24px;
            position: relative; overflow: hidden;
            animation: slideUp .5s ease both;
        }
        .especial-banner::before {
            content: '';
            position: absolute; top: -40px; right: -40px;
            width: 240px; height: 240px;
            background: radial-gradient(circle, rgba(200,131,42,.22), transparent 70%);
            pointer-events: none;
        }

        .especial-grid {
            display: grid; grid-template-columns: 1fr; gap: 0;
        }
        @media (min-width: 700px)  { .especial-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } }
        @media (min-width: 1100px) { .especial-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; } }
        @media (min-width: 1500px) { .especial-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } }

        .especial-label {
            font-size: 10px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
            color: var(--k-amber); margin-bottom: 16px;
        }

        .especial-item {
            display: flex; align-items: center; gap: 14px;
            padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,.06);
        }
        .especial-item:last-child { border-bottom: none; padding-bottom: 0; }

        .especial-img {
            width: clamp(56px, 7vw, 80px); height: clamp(56px, 7vw, 80px);
            border-radius: 12px; object-fit: cover; flex-shrink: 0;
            background: rgba(255,255,255,.05);
        }
        .especial-img-ph {
            width: clamp(56px, 7vw, 80px); height: clamp(56px, 7vw, 80px);
            border-radius: 12px; flex-shrink: 0;
            background: rgba(255,255,255,.06);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .especial-img-ph img {
            width: 100%; height: 100%; object-fit: cover; display: block;
        }
        .especial-info { flex: 1; min-width: 0; }
        .especial-name { font-size: clamp(14px, 1.6vw, 18px); font-weight: 600; color: #fff; margin-bottom: 3px; }
        .especial-desc { font-size: clamp(11px, 1.1vw, 13px); color: rgba(255,255,255,.4); line-height: 1.4; }
        .especial-price {
            font-family: 'Playfair Display', serif;
            font-size: clamp(17px, 2.2vw, 26px);
            font-weight: 700; color: var(--k-amber); flex-shrink: 0;
        }

        /* ═══════════════════════════════════════════════════
           SECTION LABEL
        ═══════════════════════════════════════════════════ */
        .section-label {
            font-size: clamp(9px, 1vw, 11px); font-weight: 600;
            letter-spacing: 3px; text-transform: uppercase;
            color: var(--k-faint); margin: 28px 0 14px;
        }

        /* ═══════════════════════════════════════════════════
           PRODUCT GRID — fluid breakpoints, no max-width cap
        ═══════════════════════════════════════════════════ */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }
        @media (min-width:  520px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; } }
        @media (min-width:  780px) { .product-grid { grid-template-columns: repeat(4, 1fr); gap: 18px; } }
        @media (min-width: 1050px) { .product-grid { grid-template-columns: repeat(5, 1fr); gap: 20px; } }
        @media (min-width: 1350px) { .product-grid { grid-template-columns: repeat(6, 1fr); gap: 22px; } }
        @media (min-width: 1700px) { .product-grid { grid-template-columns: repeat(7, 1fr); gap: 24px; } }
        @media (min-width: 2000px) { .product-grid { grid-template-columns: repeat(8, 1fr); gap: 26px; } }

        /* Wide grid (almoço) — horizontal cards */
        .product-grid.wide-grid { grid-template-columns: 1fr; }
        @media (min-width:  640px) { .product-grid.wide-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1000px) { .product-grid.wide-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1350px) { .product-grid.wide-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 1700px) { .product-grid.wide-grid { grid-template-columns: repeat(5, 1fr); } }

        /* ═══════════════════════════════════════════════════
           PRODUCT CARD
        ═══════════════════════════════════════════════════ */
        .product-card {
            background: var(--k-surface);
            border-radius: var(--k-r-md);
            overflow: hidden;
            border: 1px solid var(--k-border);
            position: relative;
            animation: slideUp .45s ease both;
            transition: transform .2s, box-shadow .2s;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 36px rgba(26,24,20,.11);
        }
        .product-card:active { transform: scale(.97); }
        .product-card.esgotado { opacity: .6; }

        .badge-esgotado {
            position: absolute; top: 8px; right: 8px; z-index: 2;
            background: rgba(26,24,20,.82); color: #fff;
            font-size: 9px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
            padding: 3px 8px; border-radius: 100px; backdrop-filter: blur(4px);
        }

        .product-img-wrap {
            width: 100%; aspect-ratio: 1/1;
            overflow: hidden; background: var(--k-amber-lt); position: relative;
        }
        .product-img-wrap img {
            width: 100%; height: 100%; object-fit: cover; display: block;
            transition: transform .4s ease;
        }
        .product-card:hover .product-img-wrap img { transform: scale(1.06); }

        .product-img-ph {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }
        .product-img-ph img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
        }

        .product-body { padding: clamp(10px, 1.4vw, 18px); }

        .product-name {
            font-size: clamp(12px, 1.2vw, 15px); font-weight: 600;
            color: var(--k-dark); line-height: 1.3; margin-bottom: 4px;
        }
        .product-desc {
            font-size: clamp(10px, .95vw, 12px); color: var(--k-faint); line-height: 1.4;
            margin-bottom: 10px; display: -webkit-box;
            -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .product-price {
            font-family: 'Playfair Display', serif;
            font-size: clamp(15px, 1.6vw, 20px); font-weight: 700; color: var(--k-amber);
        }

        /* Wide card (almoço) */
        .product-card.wide-card { display: flex; flex-direction: row; }
        .product-card.wide-card .product-img-wrap {
            width: clamp(90px, 12vw, 160px); flex-shrink: 0; aspect-ratio: auto;
        }
        .product-card.wide-card .product-body {
            flex: 1; display: flex; flex-direction: column; justify-content: center;
        }
        .product-card.wide-card .product-name  { font-size: clamp(13px, 1.5vw, 17px); }
        .product-card.wide-card .product-price { font-size: clamp(16px, 1.8vw, 22px); }

        /* ═══════════════════════════════════════════════════
           FOOTER
        ═══════════════════════════════════════════════════ */
        .footer {
            width: 100%; padding: 24px 5vw 36px;
            text-align: center; border-top: 1px solid var(--k-border);
        }
        .footer-links { display: flex; gap: 20px; justify-content: center; margin-bottom: 14px; }
        .footer-link {
            display: flex; align-items: center; gap: 5px;
            font-size: clamp(11px, 1.1vw, 13px); font-weight: 500;
            color: var(--k-teal); text-decoration: none;
        }
        .footer-copy    { font-size: clamp(10px, 1vw, 12px); color: var(--k-faint); margin-bottom: 4px; }
        .footer-address { font-size: clamp(9px, .9vw, 11px); color: var(--k-faint); opacity: .7; }

        /* ═══════════════════════════════════════════════════
           ANIMATIONS + SKELETON
        ═══════════════════════════════════════════════════ */
        @keyframes slideUp {
            from { opacity:0; transform:translateY(18px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .d1{animation-delay:.05s} .d2{animation-delay:.10s}
        .d3{animation-delay:.15s} .d4{animation-delay:.20s}
        .d5{animation-delay:.25s} .d6{animation-delay:.30s}

        .skeleton {
            background: linear-gradient(90deg, #ece9e2 25%, #f5f3ee 50%, #ece9e2 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: var(--k-r-md);
        }
        .skeleton-card { aspect-ratio: 1/1; }
        @keyframes shimmer {
            0%   { background-position:  200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

<!-- ═══ HERO ═════════════════════════════════════════════ -->
<div class="hero">
    <div class="hero-ring hero-ring-1"></div>
    <div class="hero-ring hero-ring-2"></div>
    <div class="hero-content">
        <div class="hero-tag">Zion Lisboa · Cafetaria</div>
        <h1 class="hero-title">Cardápio<br><span>Keola</span></h1>
        <div class="hero-divider"></div>
        <p class="hero-sub">
            Um espaço para a família.<br>
            <strong>Comunhão à mesa,</strong> sabores que aquecem o coração.
        </p>
    </div>
    <div class="hero-wave">
        <svg viewBox="0 0 1440 32" preserveAspectRatio="none" fill="#f7f4ee">
            <path d="M0,32 L0,16 Q360,0 720,16 Q1080,32 1440,16 L1440,32 Z"/>
        </svg>
    </div>
</div>

<!-- ═══ CATEGORY NAV ═════════════════════════════════════ -->
<nav class="cat-nav" id="cat-nav">
    <button class="cat-pill active" data-cat="all">Todos</button>
</nav>

<!-- ═══ CONTENT ══════════════════════════════════════════ -->
<div class="content">
    <div id="especial-section"></div>
    <div id="menu-section">
        <div class="section-label">A carregar...</div>
        <div class="product-grid">
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
        </div>
    </div>
</div>

<!-- ═══ FOOTER ═══════════════════════════════════════════ -->
<div class="footer">
    <div class="footer-links">
        <a class="footer-link" href="https://zionchurch.org.br/" target="_blank">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            Site Oficial
        </a>
        <a class="footer-link" href="https://www.instagram.com/zionlisboa/?hl=en" target="_blank">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
            @ZionLisboa
        </a>
    </div>
    <div class="footer-copy">© 2026 Zion Lisboa — Todos os direitos reservados</div>
    <div class="footer-address">Rua do Centro Cultural, 11 · 1700-036 Alvalade · Lisboa, Portugal</div>
</div>

<script>
    const CATS = {
        almoco:     { l: '🍽️ Refeições',    o: 1 },
        bebidas:    { l: '☕ Bebidas Frescas',    o: 2 },
        sumos:      { l: '🧃 Bebidas Quentes',      o: 3 },
        snacks:     { l: '🥪 Salgados',     o: 4 },
        sobremesas: { l: '🍰 Doces', o: 5 },
        outro:      { l: '🛒 Outros',     o: 6 },
    };

    const SUPA_URL = window.SUPABASE_URL      || '';
    const SUPA_KEY = window.SUPABASE_ANON_KEY || '';

    let allItems     = [];
    let activeFilter = 'all';

    async function load() {
        try {
            const r = await fetch(
                `${SUPA_URL}/rest/v1/keola_menu?select=*&tipo_item=not.eq.componente&order=ordem.asc`,
                { headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` } }
            );
            if (!r.ok) throw new Error(`Supabase ${r.status}`);
            const data = await r.json();
            if (!Array.isArray(data) || !data.length) throw new Error('empty');
            allItems = data;
            buildCatNav(data);
            render(data);
        } catch (e) {
            console.error('Keola load error:', e);
            document.getElementById('menu-section').innerHTML =
                `<div style="text-align:center;color:#b0a898;font-size:14px;padding:60px 24px">
                    ⚠️ Erro ao carregar o cardápio.<br>
                    <span style="font-size:12px;opacity:.7">Tenta novamente mais tarde.</span>
                </div>`;
        }
    }

    const p = v => Number(v).toFixed(2) + '€';

    function isEsgotado(item) {
        if (!item.disponivel) return true;
        if (item.controlar_estoque && !item.venda_sem_estoque) {
            const stock = item.stock_kits ?? item.stock ?? 0;
            const min   = item.stock_minimo ?? 0;
            if (stock <= min) return true;
        }
        return false;
    }

    function imgDefault() {
        return `<img src="assets/item_zion.jpg" alt="Keola" loading="lazy" onerror="this.src='assets/item_zion.png'">`;
    }

    function buildCatNav(items) {
        const cats = [...new Set(items.map(i => i.categoria).filter(Boolean))];
        cats.sort((a, b) => (CATS[a]?.o || 99) - (CATS[b]?.o || 99));
        const nav = document.getElementById('cat-nav');
        cats.forEach(cat => {
            const btn = document.createElement('button');
            btn.className   = 'cat-pill';
            btn.dataset.cat = cat;
            btn.textContent = CATS[cat]?.l || cat;
            btn.onclick     = () => setFilter(cat);
            nav.appendChild(btn);
        });
    }

    function setFilter(cat) {
        activeFilter = cat;
        document.querySelectorAll('.cat-pill').forEach(b =>
            b.classList.toggle('active', b.dataset.cat === cat)
        );
        render(cat === 'all' ? allItems : allItems.filter(i => i.categoria === cat));
    }

    document.querySelector('.cat-pill[data-cat="all"]').onclick = () => setFilter('all');

    function render(items) {
        // Especial do dia
        const esps = items.filter(i => i.especial_hoje);
        document.getElementById('especial-section').innerHTML = esps.length ? `
            <div class="especial-banner d1">
                <div class="especial-label">⭐ Especial do Dia</div>
                <div class="especial-grid">
                    ${esps.map(esp => {
            const esg = isEsgotado(esp);
            return `
                        <div class="especial-item" style="${esg ? 'opacity:.5' : ''}">
                            ${esp.imagem_url
                ? `<img src="${esp.imagem_url}" alt="${esp.nome}" class="especial-img" loading="lazy"
                                       onerror="this.src='assets/item_zion.jpg'">`
                : `<div class="especial-img-ph">${imgDefault()}</div>`
            }
                            <div class="especial-info">
                                <div class="especial-name">${esp.nome}${esg ? ' <small style="color:#777;font-size:10px;font-weight:400">esgotado</small>' : ''}</div>
                                ${esp.descricao ? `<div class="especial-desc">${esp.descricao}</div>` : ''}
                            </div>
                            <div class="especial-price">${p(esp.preco)}</div>
                        </div>`;
        }).join('')}
                </div>
            </div>` : '';

        // Menu por categoria
        const byCat = {};
        items.forEach(i => {
            const c = i.categoria || 'outro';
            if (!byCat[c]) byCat[c] = [];
            byCat[c].push(i);
        });

        const sorted = Object.entries(byCat)
            .sort(([a],[b]) => (CATS[a]?.o || 99) - (CATS[b]?.o || 99));

        let delay = 2;

        document.getElementById('menu-section').innerHTML = sorted.map(([cat, its]) => {
            const wide = cat === 'almoco';
            const d    = Math.min(delay++, 6);
            return `
                <p class="section-label">${CATS[cat]?.l || cat}</p>
                <div class="product-grid${wide ? ' wide-grid' : ''}">
                    ${its.map(item => {
                const esg = isEsgotado(item);
                return `
                        <div class="product-card ${wide ? 'wide-card' : ''} ${esg ? 'esgotado' : ''} d${d}">
                            ${esg ? '<span class="badge-esgotado">Esgotado</span>' : ''}
                            <div class="product-img-wrap">
                                ${item.imagem_url
                    ? `<img src="${item.imagem_url}" alt="${item.nome}" loading="lazy"
                                            onerror="this.src='assets/item_zion.jpg'">`
                    : `<div class="product-img-ph">${imgDefault()}</div>`
                }
                            </div>
                            <div class="product-body">
                                <div class="product-name">${item.nome}</div>
                                ${item.descricao ? `<div class="product-desc">${item.descricao}</div>` : ''}
                                <div class="product-price">${p(item.preco)}</div>
                            </div>
                        </div>`;
            }).join('')}
                </div>`;
        }).join('');
    }

    load();
</script>
</body>
</html>
