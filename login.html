<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso — Zion Lisboa</title>

    <!-- Favicon -->
    <link rel="icon" href="/assets/icons/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/icons/icon-512.png">

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#009098">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zion Lisboa">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --cta: #009098;
            --cta-dark: #007078;
            --cta-light: #00adb6;
            --cta-faint: rgba(0, 144, 152, 0.12);
            --bg: #02161e;
            --bg-panel: #071c26;
            --bg-input: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.12);
            --border-cta: rgba(0, 144, 152, 0.40);
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --text-faint: rgba(255, 255, 255, 0.45);
            --red: #fc8a8a;
            --red-bg: rgba(252, 138, 138, 0.08);
            --red-border: rgba(252, 138, 138, 0.25);
            --font: 'Montserrat', sans-serif;
            --radius: 10px;
        }

        html, body {
            height: 100%;
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            overflow: hidden;
        }

        /* ── Carrossel ────────────────────────────────── */
        .auth-image {
            flex: 0 0 40%; /* 1 */
            position: relative;
            min-width: 0;
            overflow: hidden;
            background: #02161e; /* fallback enquanto carrega */
        }

        .carousel-slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
        }

        .carousel-slide.active {
            opacity: 1;
        }

        /* A imagem em si — usa <img> para controlar object-fit */
        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* preenche sempre sem distorcer */
            object-position: center; /* centra horizontal e verticalmente */
            display: block;
        }

        /* Overlay escuro sobre a imagem */
        .carousel-slide::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg,
            rgba(2, 22, 30, 0.55) 0%,
            rgba(0, 40, 50, 0.25) 50%,
            rgba(0, 0, 0, 0.50) 100%);
            pointer-events: none;
        }

        /* Logo topo esquerdo */
        .auth-image-logo {
            position: absolute;
            top: 28px;
            left: 32px;
            z-index: 2;
        }

        .auth-image-logo img.logo-img {
            height: 36px;
            width: auto;
            object-fit: contain;
            filter: brightness(0) invert(1);
            opacity: 0.90;
            /* reset do object-position do carrossel */
            object-position: initial;
        }

        .auth-image-logo-text {
            font-family: var(--font);
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 6px;
            color: #fff;
            opacity: 0.90;
            text-transform: uppercase;
            display: none;
        }

        /* Dots */
        .carousel-dots {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .carousel-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .carousel-dot.active {
            background: var(--cta-light);
            width: 20px;
            border-radius: 3px;
        }

        /* ── Form ─────────────────────────────────────── */
        .auth-form {
            flex: 0 0 40%; /* 1 */
            min-width: 0;
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }

        .auth-form::-webkit-scrollbar {
            width: 3px;
        }

        .auth-form::-webkit-scrollbar-thumb {
            background: rgba(0, 144, 152, 0.2);
            border-radius: 2px;
        }

        .auth-inner {
            width: 100%;
            max-width: 420px;
            padding: 48px 40px;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }

        .auth-logo-line {
            width: 28px;
            height: 2px;
            background: var(--cta);
            border-radius: 2px;
        }

        .auth-logo-text {
            font-family: var(--font);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--cta-light);
        }

        .tabs {
            display: flex;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 28px;
        }

        .tab {
            flex: 1;
            padding: 11px;
            cursor: pointer;
            background: var(--bg-input);
            border: none;
            font-family: var(--font);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-faint);
            transition: all 0.2s;
        }

        .tab:first-child {
            border-right: 1px solid var(--border);
        }

        .tab.active {
            background: var(--cta);
            color: #fff;
        }

        .tab:hover:not(.active) {
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 13px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 11px;
            margin-bottom: 13px;
        }

        .form-label {
            display: block;
            font-family: var(--font);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-faint);
            margin-bottom: 6px;
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: 11px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            font-family: var(--font);
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input::placeholder, .form-textarea::placeholder {
            color: var(--text-faint);
        }

        .form-input:focus, .form-textarea:focus {
            border-color: var(--cta);
            box-shadow: 0 0 0 3px var(--cta-faint);
        }

        .form-input.error {
            border-color: var(--red);
            box-shadow: 0 0 0 3px var(--red-bg);
        }

        .form-textarea {
            resize: none;
            height: 68px;
            line-height: 1.5;
        }

        /* Olhinho */
        .input-password-wrap {
            position: relative;
        }

        .input-password-wrap .form-input {
            padding-right: 42px;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: var(--text-faint);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .password-toggle:hover {
            color: var(--cta-light);
        }

        .password-toggle svg {
            width: 17px;
            height: 17px;
            pointer-events: none;
        }

        .password-toggle .eye-off {
            display: none;
        }

        .password-toggle.visible .eye-on {
            display: none;
        }

        .password-toggle.visible .eye-off {
            display: block;
        }

        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px #0d2535 inset !important;
            -webkit-text-fill-color: #fff !important;
            caret-color: #fff;
        }

        /* Foto */
        .photo-upload-wrap {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
            padding: 13px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        .photo-preview {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: var(--cta-faint) center center / cover no-repeat;
            border: 2px solid var(--border-cta);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .photo-preview svg {
            width: 20px;
            height: 20px;
            color: var(--cta-light);
        }

        .photo-preview.has-image svg {
            display: none;
        }

        .photo-preview.error-photo {
            border-color: var(--red);
        }

        .photo-info {
            flex: 1;
        }

        .photo-info-title {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .photo-info-sub {
            font-size: 10px;
            color: var(--text-faint);
            margin-bottom: 7px;
            line-height: 1.5;
        }

        .photo-btns {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .photo-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid var(--border-cta);
            background: transparent;
            font-family: var(--font);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--cta-light);
            cursor: pointer;
            transition: all 0.2s;
        }

        .photo-btn:hover {
            background: var(--cta-faint);
            border-color: var(--cta-light);
        }

        .photo-btn svg {
            width: 10px;
            height: 10px;
        }

        #foto-input-galeria, #foto-input-camera {
            display: none;
        }

        .submit-btn {
            width: 100%;
            padding: 13px;
            border: 1px solid var(--cta);
            border-radius: 8px;
            background: var(--cta);
            color: #fff;
            font-family: var(--font);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 4px;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(0, 144, 152, 0.25);
        }

        .submit-btn:hover {
            background: var(--cta-light);
            border-color: var(--cta-light);
            box-shadow: 0 6px 28px rgba(0, 144, 152, 0.35);
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        .forgot-link {
            background: none;
            border: none;
            cursor: pointer;
            font-family: var(--font);
            font-size: 11px;
            letter-spacing: 1px;
            color: var(--text-faint);
            text-decoration: underline;
            text-underline-offset: 3px;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: var(--cta-light);
        }

        .msg-box {
            padding: 10px 13px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 14px;
            display: none;
            line-height: 1.5;
        }

        .msg-box.error {
            background: var(--red-bg);
            border: 1px solid var(--red-border);
            color: var(--red);
            display: block;
        }

        .msg-box.success {
            background: var(--cta-faint);
            border: 1px solid var(--border-cta);
            color: var(--cta-light);
            display: block;
        }

        .form-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 4px 0 13px;
        }

        .form-divider-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .form-divider-txt {
            font-family: var(--font);
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--text-faint);
            text-transform: uppercase;
        }

        /* Modal */
        #forgot-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .forgot-modal {
            width: 100%;
            max-width: 400px;
            background: #0a2030;
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
            animation: scaleIn 0.2s ease;
        }

        .forgot-modal-head {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .forgot-modal-title {
            font-family: var(--font);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--cta-light);
        }

        .forgot-modal-x {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: none;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-faint);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .forgot-modal-x:hover {
            border-color: var(--red-border);
            color: var(--red);
        }

        .forgot-modal-body {
            padding: 20px;
        }

        .forgot-modal-body p {
            font-size: 13px;
            color: var(--text-faint);
            line-height: 1.6;
            margin-bottom: 16px;
        }

        /* Responsivo */
        @media (max-width: 900px) {
            body {
                flex-direction: column;
                overflow-y: auto;
                height: auto;
                min-height: 100vh;
            }

            .auth-image {
                height: 240px;
                flex: none;
                width: 100%;
            }

            .auth-image-logo {
                top: 20px;
                left: 20px;
            }

            .auth-image-logo .logo-img {
                height: 28px;
            }

            .auth-form {
                flex: none;
                width: 100%;
                border-left: none;
                border-top: 1px solid var(--border);
                align-items: stretch;
            }

            .auth-inner {
                max-width: 100%;
                padding: 30px 22px 48px;
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95)
            }
            to {
                opacity: 1;
                transform: scale(1)
            }
        }
    </style>
</head>
<body>

<!-- ESQUERDA: carrossel -->
<div class="auth-image">

    <!--
        Usa <img> em vez de background-image para ter controlo total
        com object-fit: cover — todas as fotos ficam ao mesmo tamanho
        sem distorção independentemente das dimensões originais.

        object-position: center center  → centra a foto
        Podes ajustar por foto, ex: object-position: center top
        para fotos de pessoas (mostra o rosto em vez dos pés)
    -->
    <div class="carousel-slide active">
        <img src="assets/zion-alto.avif" alt="" loading="eager" object-position="center center">
    </div>
    <div class="carousel-slide">
        <img src="assets/zion-somos.avif" alt="" loading="lazy">
    </div>
    <div class="carousel-slide">
        <img src="assets/zion-visao.avif" alt="" loading="lazy">
    </div>
    <div class="carousel-slide">
        <img src="assets/palco-zion.avif" alt="" loading="lazy">
    </div>
    <div class="carousel-slide">
        <img src="assets/zion-adoracao.png" alt="" loading="lazy">
    </div>

    <!-- Logo no topo -->
    <div class="auth-image-logo">
        <img class="logo-img" src="assets/logo-zion-branca.svg" alt="Zion Lisboa"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
        <span class="auth-image-logo-text">ZION</span>
    </div>

    <!-- Dots -->
    <div class="carousel-dots" id="carousel-dots"></div>
</div>

<!-- DIREITA: form -->
<div class="auth-form">
    <div class="auth-inner">

        <div class="auth-logo">
            <div class="auth-logo-line"></div>
            <div class="auth-logo-text">Lisboa · Portugal</div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Entrar</button>
            <button class="tab" onclick="switchTab('register')">Registar</button>
        </div>

        <!-- LOGIN -->
        <div class="form-section active" id="tab-login">
            <div class="msg-box" id="login-msg"></div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input class="form-input" id="login-email" type="email" placeholder="o.teu@email.com"
                       onkeydown="if(event.key==='Enter') doLogin()">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-password-wrap">
                    <input class="form-input" id="login-password" type="password" placeholder="••••••••"
                           onkeydown="if(event.key==='Enter') doLogin()">
                    <button type="button" class="password-toggle" onclick="togglePassword('login-password', this)"
                            tabindex="-1">
                        <svg class="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                             stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                             stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
            </div>
            <button class="submit-btn" id="login-btn" onclick="doLogin()">Entrar</button>
            <div style="text-align:center;margin-top:16px">
                <button class="forgot-link" onclick="abrirForgot()">Esqueci a password</button>
            </div>
        </div>

        <!-- REGISTER -->
        <div class="form-section" id="tab-register">
            <div class="msg-box" id="reg-msg"></div>

            <div class="photo-upload-wrap">
                <div class="photo-preview" id="photo-preview"
                     onclick="document.getElementById('foto-input-galeria').click()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                         stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
                <div class="photo-info">
                    <div class="photo-info-title">Foto de perfil</div>
                    <div class="photo-info-sub">Obrigatória · JPG, PNG ou HEIC</div>
                    <div class="photo-btns">
                        <button type="button" class="photo-btn"
                                onclick="document.getElementById('foto-input-galeria').click()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21 15 16 10 5 21"/>
                            </svg>
                            Galeria
                        </button>
                        <button type="button" class="photo-btn"
                                onclick="document.getElementById('foto-input-camera').click()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                                <circle cx="12" cy="13" r="4"/>
                            </svg>
                            Câmera
                        </button>
                    </div>
                    <input type="file" id="foto-input-galeria" accept="image/*" onchange="previewFoto(event)">
                    <input type="file" id="foto-input-camera" accept="image/*" capture="user"
                           onchange="previewFoto(event)">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group" style="margin-bottom:0">
                    <label class="form-label">Nome</label>
                    <input class="form-input" id="reg-nome" type="text" placeholder="Primeiro nome"
                           autocomplete="given-name">
                </div>
                <div class="form-group" style="margin-bottom:0">
                    <label class="form-label">Apelido</label>
                    <input class="form-input" id="reg-apelido" type="text" placeholder="Apelido"
                           autocomplete="family-name">
                </div>
            </div>

            <div class="form-divider">
                <div class="form-divider-line"></div>
                <div class="form-divider-txt">Identificação &amp; Contacto</div>
                <div class="form-divider-line"></div>
            </div>

            <div class="form-row">
                <div class="form-group" style="margin-bottom:0">
                    <label class="form-label">NIF</label>
                    <input class="form-input" id="reg-nif" type="text" inputmode="numeric" maxlength="9"
                           placeholder="123456789" autocomplete="off">
                </div>
                <div class="form-group" style="margin-bottom:0">
                    <label class="form-label">Telefone</label>
                    <input class="form-input" id="reg-telefone" type="tel" placeholder="+351 9XX XXX XXX"
                           autocomplete="tel">
                </div>
            </div>

            <div class="form-group" style="margin-top:13px">
                <label class="form-label">Email</label>
                <input class="form-input" id="reg-email" type="email" placeholder="o.teu@email.com"
                       autocomplete="email">
            </div>

            <div class="form-divider">
                <div class="form-divider-line"></div>
                <div class="form-divider-txt">Sobre ti</div>
                <div class="form-divider-line"></div>
            </div>

            <div class="form-group">
                <label class="form-label">Como conheceste a Zion?</label>
                <textarea class="form-textarea" id="reg-onde"
                          placeholder="Ex: através de um amigo, redes sociais, evento..."></textarea>
            </div>

            <div class="form-divider">
                <div class="form-divider-line"></div>
                <div class="form-divider-txt">Acesso</div>
                <div class="form-divider-line"></div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-password-wrap">
                    <input class="form-input" id="reg-password" type="password" placeholder="Mínimo 6 caracteres"
                           autocomplete="new-password">
                    <button type="button" class="password-toggle" onclick="togglePassword('reg-password', this)"
                            tabindex="-1">
                        <svg class="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                             stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                             stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Confirmar password</label>
                <div class="input-password-wrap">
                    <input class="form-input" id="reg-password2" type="password" placeholder="Repete a password"
                           onkeydown="if(event.key==='Enter') doRegister()" autocomplete="new-password">
                    <button type="button" class="password-toggle" onclick="togglePassword('reg-password2', this)"
                            tabindex="-1">
                        <svg class="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                             stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                             stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button class="submit-btn" id="reg-btn" onclick="doRegister()">Criar Conta</button>
        </div>

    </div>
</div>

<!-- Modal recuperar password -->
<div id="forgot-overlay">
    <div class="forgot-modal">
        <div class="forgot-modal-head">
            <span class="forgot-modal-title">Recuperar Password</span>
            <button class="forgot-modal-x" onclick="fecharForgot()">✕</button>
        </div>
        <div class="forgot-modal-body">
            <p>Introduz o teu email e enviaremos um link para definires uma nova password.</p>
            <div class="msg-box" id="forgot-msg"></div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input class="form-input" id="forgot-email" type="email" placeholder="o.teu@email.com"
                       onkeydown="if(event.key==='Enter') enviarReset()">
            </div>
            <button class="submit-btn" id="forgot-btn" onclick="enviarReset()" style="margin-top:0">
                Enviar Link de Recuperação
            </button>
        </div>
    </div>
</div>

<script>
    // ── Carrossel ──────────────────────────────────────
    const slides = document.querySelectorAll('.carousel-slide');
    const dotsWrap = document.getElementById('carousel-dots');
    let current = 0, timer = null;

    slides.forEach((_, i) => {
        const dot = document.createElement('button');
        dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
        dot.setAttribute('aria-label', `Slide ${i + 1}`);
        dot.addEventListener('click', () => {
            goTo(i);
            resetTimer();
        });
        dotsWrap.appendChild(dot);
    });

    function goTo(index) {
        slides[current].classList.remove('active');
        dotsWrap.children[current].classList.remove('active');
        current = index;
        slides[current].classList.add('active');
        dotsWrap.children[current].classList.add('active');
    }

    function next() {
        goTo((current + 1) % slides.length);
    }

    function startTimer() {
        timer = setInterval(next, 3000);
    }

    function resetTimer() {
        clearInterval(timer);
        startTimer();
    }

    document.querySelector('.auth-image').addEventListener('mouseenter', () => clearInterval(timer));
    document.querySelector('.auth-image').addEventListener('mouseleave', startTimer);
    startTimer();

    // ── Toggle password ────────────────────────────────
    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const isText = input.type === 'text';
        input.type = isText ? 'password' : 'text';
        btn.classList.toggle('visible', !isText);
    }

    // ── Tabs ───────────────────────────────────────────
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach((t, i) =>
            t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register')));
        document.getElementById('tab-login').classList.toggle('active', tab === 'login');
        document.getElementById('tab-register').classList.toggle('active', tab === 'register');
        clearMsgs();
    }

    function clearMsgs() {
        ['login-msg', 'reg-msg'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.className = 'msg-box';
        });
        document.querySelectorAll('.form-input.error').forEach(el => el.classList.remove('error'));
        document.querySelectorAll('.photo-preview.error-photo').forEach(el => el.classList.remove('error-photo'));
    }

    function showMsg(id, txt, tipo) {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = txt;
        el.className = `msg-box ${tipo}`;
        el.scrollIntoView({behavior: 'smooth', block: 'nearest'});
    }

    function markError(inputId) {
        const el = document.getElementById(inputId);
        if (el) el.classList.add('error');
    }

    // ── Foto ───────────────────────────────────────────
    let fotoFile = null;

    function previewFoto(event) {
        const file = event.target.files[0];
        if (!file) return;
        fotoFile = file;
        if (event.target.id === 'foto-input-galeria') document.getElementById('foto-input-camera').value = '';
        else document.getElementById('foto-input-galeria').value = '';
        const reader = new FileReader();
        reader.onload = function () {
            const preview = document.getElementById('photo-preview');
            preview.style.backgroundImage = `url('${reader.result}')`;
            preview.classList.add('has-image');
            preview.classList.remove('error-photo');
        };
        reader.readAsDataURL(file);
    }

    //funcao hostname
    function getDefaultRedirect() {
        const host = window.location.hostname;
        if (host.startsWith('portal.')) return 'admin';
        return 'index';
    }

    // ── Login ──────────────────────────────────────────
    async function doLogin() {
        clearMsgs();
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        if (!email) {
            markError('login-email');
            return showMsg('login-msg', 'Email obrigatório.', 'error');
        }
        if (!password) {
            markError('login-password');
            return showMsg('login-msg', 'Password obrigatória.', 'error');
        }
        const btn = document.getElementById('login-btn');
        btn.disabled = true;
        btn.textContent = 'A entrar...';
        try {
            await ZionAuth.login(email, password);
            showMsg('login-msg', 'Bem-vindo! A redirecionar...', 'success');
            setTimeout(() => {
                const redirect = sessionStorage.getItem('zion_redirect');
                sessionStorage.removeItem('zion_redirect');
                window.location.href = redirect || getDefaultRedirect();
            }, 800);
        } catch (e) {
            showMsg('login-msg', e.message || 'Email ou password incorretos.', 'error');
            btn.disabled = false;
            btn.textContent = 'Entrar';
        }
    }

    // ── Register ───────────────────────────────────────
    async function doRegister() {
        clearMsgs();
        const nome = document.getElementById('reg-nome').value.trim();
        const apelido = document.getElementById('reg-apelido').value.trim();
        const nif = document.getElementById('reg-nif').value.trim().replace(/\D/g, '');
        const email = document.getElementById('reg-email').value.trim();
        const telefone = document.getElementById('reg-telefone').value.trim();
        const onde = document.getElementById('reg-onde').value.trim();
        const password = document.getElementById('reg-password').value;
        const password2 = document.getElementById('reg-password2').value;

        let ok = true;
        if (!fotoFile) {
            document.getElementById('photo-preview').classList.add('error-photo');
            showMsg('reg-msg', 'A foto de perfil é obrigatória.', 'error');
            ok = false;
        }
        if (!nome) {
            markError('reg-nome');
            if (ok) showMsg('reg-msg', 'Nome obrigatório.', 'error');
            ok = false;
        }
        if (!apelido) {
            markError('reg-apelido');
            if (ok) showMsg('reg-msg', 'Apelido obrigatório.', 'error');
            ok = false;
        }
        if (!email) {
            markError('reg-email');
            if (ok) showMsg('reg-msg', 'Email obrigatório.', 'error');
            ok = false;
        }
        if (nif && nif.length !== 9) {
            markError('reg-nif');
            if (ok) showMsg('reg-msg', 'NIF deve ter 9 dígitos.', 'error');
            ok = false;
        }
        if (!password) {
            markError('reg-password');
            if (ok) showMsg('reg-msg', 'Password obrigatória.', 'error');
            ok = false;
        }
        if (password.length < 6) {
            markError('reg-password');
            if (ok) showMsg('reg-msg', 'Password deve ter pelo menos 6 caracteres.', 'error');
            ok = false;
        }
        if (password !== password2) {
            markError('reg-password2');
            if (ok) showMsg('reg-msg', 'As passwords não coincidem.', 'error');
            ok = false;
        }
        if (!ok) return;

        const btn = document.getElementById('reg-btn');
        btn.disabled = true;
        btn.textContent = 'A criar conta...';
        try {
            let fotoUrl = null;
            if (fotoFile) {
                const ext = fotoFile.name.split('.').pop();
                const filename = `visitantes/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
                const SUPA_URL = window.SUPABASE_URL || '';
                const SUPA_KEY = window.SUPABASE_ANON_KEY || '';
                const uploadRes = await fetch(`${SUPA_URL}/storage/v1/object/imagens/${filename}`, {
                    method: 'POST',
                    headers: {'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': fotoFile.type},
                    body: fotoFile,
                });
                if (uploadRes.ok) {
                    fotoUrl = `${SUPA_URL}/storage/v1/object/public/imagens/${filename}`;
                } else {
                    const uploadErr = await uploadRes.json().catch(() => ({}));
                    console.warn('[upload foto]', uploadRes.status, uploadErr);
                    // Continua sem foto — não bloqueia o registo
                }
            }
            await ZionAuth.register({
                nome: `${nome} ${apelido}`.trim(),
                nif: nif || null,
                email,
                telefone: telefone || null,
                onde_conheceu: onde || null,
                foto_url: fotoUrl,
                password,
            });
            showMsg('reg-msg', 'Conta criada! A redirecionar...', 'success');
            setTimeout(() => {
                const redirect = sessionStorage.getItem('zion_redirect');
                sessionStorage.removeItem('zion_redirect');
                window.location.href = redirect || getDefaultRedirect();
            }, 900);
        } catch (e) {
            showMsg('reg-msg', e.message || 'Erro ao criar conta. Tenta novamente.', 'error');
            btn.disabled = false;
            btn.textContent = 'Criar Conta';
        }
    }

    // ── Forgot password ────────────────────────────────
    function abrirForgot() {
        document.getElementById('forgot-overlay').style.display = 'flex';
        document.getElementById('forgot-email').value = document.getElementById('login-email').value || '';
        document.getElementById('forgot-msg').className = 'msg-box';
        document.getElementById('forgot-btn').disabled = false;
        document.getElementById('forgot-btn').textContent = 'Enviar Link de Recuperação';
        setTimeout(() => document.getElementById('forgot-email').focus(), 100);
    }

    function fecharForgot() {
        document.getElementById('forgot-overlay').style.display = 'none';
    }

    document.getElementById('forgot-overlay').addEventListener('click', function (e) {
        if (e.target === this) fecharForgot();
    });
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') fecharForgot();
    });

    async function enviarReset() {
        const email = document.getElementById('forgot-email').value.trim();
        const msgEl = document.getElementById('forgot-msg');
        msgEl.className = 'msg-box';
        if (!email) {
            msgEl.textContent = 'Introduz o teu email.';
            msgEl.className = 'msg-box error';
            return;
        }
        const btn = document.getElementById('forgot-btn');
        btn.disabled = true;
        btn.textContent = 'A enviar...';
        try {
            await fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email})
            });
            msgEl.textContent = 'Se este email tiver conta, receberás instruções em breve.';
            msgEl.className = 'msg-box success';
            btn.textContent = 'Email enviado';
            setTimeout(() => fecharForgot(), 4000);
        } catch (e) {
            msgEl.textContent = 'Erro ao enviar. Tenta novamente.';
            msgEl.className = 'msg-box error';
            btn.disabled = false;
            btn.textContent = 'Enviar Link de Recuperação';
        }
    }

    if (typeof ZionAuth !== 'undefined' && ZionAuth.isLoggedIn()) {
        const redirect = sessionStorage.getItem('zion_redirect');
        sessionStorage.removeItem('zion_redirect');
        window.location.href = redirect || getDefaultRedirect();
    }
</script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('SW registado:', reg.scope))
                .catch(err => console.error('SW erro:', err));
        });
    }
</script>
</body>
</html>
