<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso — Zion Lisboa</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        :root {
            --cta:           #009098;
            --cta-dark:      #007078;
            --cta-light:     #00adb6;
            --cta-faint:     rgba(0, 144, 152, 0.12);
            --bg:            #02161e;
            --bg-panel:      #071c26;
            --bg-input:      rgba(255, 255, 255, 0.06);
            --border:        rgba(255, 255, 255, 0.12);
            --border-cta:    rgba(0, 144, 152, 0.40);
            --text:          #ffffff;
            --text-muted:    rgba(255, 255, 255, 0.75);
            --text-faint:    rgba(255, 255, 255, 0.45);
            --red:           #fc8a8a;
            --red-bg:        rgba(252, 138, 138, 0.08);
            --red-border:    rgba(252, 138, 138, 0.25);
            --font:          'Montserrat', sans-serif;
        }

        html, body {
            height: 100%;
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            overflow: hidden;
        }

        /* ── Lado esquerdo — imagem ───────────────────── */
        .auth-image {
            flex: 1;
            background: url('assets/zion_auth.png') center center / cover no-repeat,
                        linear-gradient(135deg, #02161e 0%, #0a3040 100%);
            position: relative;
            min-width: 0;
        }
        .auth-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg,
                rgba(0, 60, 70, 0.65) 0%,
                rgba(0, 20, 25, 0.35) 60%,
                rgba(0, 0, 0, 0.20) 100%);
        }
        .auth-image-brand {
            position: absolute;
            bottom: 48px;
            left: 48px;
            z-index: 2;
        }
        .auth-image-brand-line {
            width: 40px;
            height: 2px;
            background: var(--cta);
            margin-bottom: 14px;
            border-radius: 2px;
            opacity: 0.7;
        }
        .auth-image-brand-title {
            font-family: var(--font);
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 12px;
            color: #fff;
            line-height: 1;
        }
        .auth-image-brand-sub {
            font-family: var(--font);
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.55);
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* ── Lado direito — form (ESCURO) ────────────── */
        .auth-form {
            width: 460px;
            flex-shrink: 0;
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .auth-form::-webkit-scrollbar { width: 3px; }
        .auth-form::-webkit-scrollbar-thumb { background: rgba(0,144,152,0.2); border-radius: 2px; }

        .auth-inner {
            padding: 52px 44px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Logo */
        .auth-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px;
        }
        .auth-logo-line {
            width: 28px;
            height: 2px;
            background: var(--cta);
            border-radius: 2px;
        }
        .auth-logo-text {
            font-family: var(--font);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--cta-light);
        }

        /* ── Tabs ─────────────────────────────────────── */
        .tabs {
            display: flex;
            border-radius: var(--radius, 10px);
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 32px;
            flex-shrink: 0;
        }
        .tab {
            flex: 1;
            padding: 11px;
            cursor: pointer;
            background: var(--bg-input);
            border: none;
            font-family: var(--font);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-faint);
            transition: all 0.2s;
        }
        .tab:first-child { border-right: 1px solid var(--border); }
        .tab.active {
            background: var(--cta);
            color: #fff;
        }
        .tab:hover:not(.active) { color: var(--text-muted); background: rgba(255,255,255,0.08); }

        /* ── Form section ─────────────────────────────── */
        .form-section { display: none; }
        .form-section.active { display: block; }

        .form-group { margin-bottom: 14px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }

        .form-label {
            display: block;
            font-family: var(--font);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-faint);
            margin-bottom: 6px;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 11px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            font-family: var(--font);
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input::placeholder,
        .form-textarea::placeholder { color: var(--text-faint); }
        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            border-color: var(--cta);
            box-shadow: 0 0 0 3px var(--cta-faint);
        }
        .form-input.error { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-bg); }
        .form-textarea { resize: none; height: 72px; line-height: 1.5; }

        /* Autocomplete dark fix */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px #0d2535 inset !important;
            -webkit-text-fill-color: #fff !important;
            caret-color: #fff;
        }

        /* ── Foto upload ──────────────────────────────── */
        .photo-upload-wrap {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding: 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
        }
        .photo-preview {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--cta-faint) center center / cover no-repeat;
            border: 2px solid var(--border-cta);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s;
        }
        .photo-preview svg { width: 22px; height: 22px; color: var(--cta-light); }
        .photo-preview.has-image svg { display: none; }
        .photo-preview.error-photo { border-color: var(--red); }
        .photo-info { flex: 1; }
        .photo-info-title {
            font-family: var(--font);
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 3px;
        }
        .photo-info-sub { font-size: 11px; color: var(--text-faint); margin-bottom: 8px; }
        .photo-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-cta);
            background: transparent;
            font-family: var(--font);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--cta-light);
            cursor: pointer;
            transition: all 0.2s;
        }
        .photo-btn:hover { background: var(--cta-faint); border-color: var(--cta-light); }
        .photo-btn svg { width: 11px; height: 11px; }
        #foto-input { display: none; }

        /* ── Botão CTA ────────────────────────────────── */
        .submit-btn {
            width: 100%;
            padding: 13px;
            border: 1px solid var(--cta);
            border-radius: 8px;
            background: var(--cta);
            color: #fff;
            font-family: var(--font);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 4px;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(0, 144, 152, 0.25);
        }
        .submit-btn:hover {
            background: var(--cta-light);
            border-color: var(--cta-light);
            box-shadow: 0 6px 28px rgba(0, 144, 152, 0.35);
            transform: translateY(-1px);
        }
        .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

        /* Esqueci a password link */
        .forgot-link {
            background: none;
            border: none;
            cursor: pointer;
            font-family: var(--font);
            font-size: 11px;
            letter-spacing: 1px;
            color: var(--text-faint);
            text-decoration: underline;
            text-underline-offset: 3px;
            transition: color 0.2s;
        }
        .forgot-link:hover { color: var(--cta-light); }

        /* ── Mensagens ────────────────────────────────── */
        .msg-box {
            padding: 10px 13px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 14px;
            display: none;
            line-height: 1.5;
        }
        .msg-box.error   {
            background: var(--red-bg);
            border: 1px solid var(--red-border);
            color: var(--red);
            display: block;
        }
        .msg-box.success {
            background: var(--cta-faint);
            border: 1px solid var(--border-cta);
            color: var(--cta-light);
            display: block;
        }

        /* ── Divider de secção ────────────────────────── */
        .form-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 6px 0 14px;
        }
        .form-divider-line { flex: 1; height: 1px; background: var(--border); }
        .form-divider-txt {
            font-family: var(--font);
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--text-faint);
            text-transform: uppercase;
        }

        /* ── Modal recuperar password ─────────────────── */
        #forgot-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }
        .forgot-modal {
            width: 100%;
            max-width: 400px;
            background: #0a2030;
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
            animation: scaleIn 0.2s ease;
        }
        .forgot-modal-head {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .forgot-modal-title {
            font-family: var(--font);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--cta-light);
        }
        .forgot-modal-x {
            width: 26px; height: 26px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: none;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-faint);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .forgot-modal-x:hover { border-color: var(--red-border); color: var(--red); }
        .forgot-modal-body { padding: 20px; }
        .forgot-modal-body p {
            font-size: 13px;
            color: var(--text-faint);
            line-height: 1.6;
            margin-bottom: 16px;
        }

        /* ── Responsivo ───────────────────────────────── */
        @media (max-width: 900px) {
            body { flex-direction: column; overflow-y: auto; height: auto; min-height: 100vh; }
            .auth-image { height: 200px; flex: none; width: 100%; }
            .auth-image-brand { bottom: 18px; left: 22px; }
            .auth-image-brand-title { font-size: 26px; letter-spacing: 8px; }
            .auth-form { width: 100%; flex-shrink: 0; border-left: none; border-top: 1px solid var(--border); }
            .auth-inner { padding: 32px 24px 48px; }
        }

        @keyframes scaleIn { from { opacity:0; transform:scale(0.95) } to { opacity:1; transform:scale(1) } }
    </style>
</head>
<body>

<!-- ESQUERDA: imagem -->
<div class="auth-image">
    <div class="auth-image-brand">
        <div class="auth-image-brand-line"></div>
        <div class="auth-image-brand-title">ZION</div>
        <div class="auth-image-brand-sub">Lisboa · Portugal</div>
    </div>
</div>

<!-- DIREITA: form escuro -->
<div class="auth-form">
    <div class="auth-inner">

        <div class="auth-logo">
            <div class="auth-logo-line"></div>
            <div class="auth-logo-text">Lisboa · Portugal</div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Entrar</button>
            <button class="tab" onclick="switchTab('register')">Registar</button>
        </div>

        <!-- ── LOGIN ──────────────────────────────────── -->
        <div class="form-section active" id="tab-login">
            <div class="msg-box" id="login-msg"></div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input class="form-input" id="login-email" type="email" placeholder="o.teu@email.com"
                       onkeydown="if(event.key==='Enter') doLogin()">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input class="form-input" id="login-password" type="password" placeholder="••••••••"
                       onkeydown="if(event.key==='Enter') doLogin()">
            </div>
            <button class="submit-btn" id="login-btn" onclick="doLogin()">Entrar</button>
            <div style="text-align:center;margin-top:16px">
                <button class="forgot-link" onclick="abrirForgot()">Esqueci a password</button>
            </div>
        </div>

        <!-- ── REGISTER ───────────────────────────────── -->
        <div class="form-section" id="tab-register">
            <div class="msg-box" id="reg-msg"></div>

            <!-- Foto -->
            <div class="photo-upload-wrap">
                <div class="photo-preview" id="photo-preview">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
                <div class="photo-info">
                    <div class="photo-info-title">Foto de perfil</div>
                    <div class="photo-info-sub">Obrigatória · JPG, PNG ou HEIC</div>
                    <button class="photo-btn" onclick="document.getElementById('foto-input').click()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        Escolher foto
                    </button>
                    <input type="file" id="foto-input" accept="image/*" capture="environment" onchange="previewFoto(event)">
                </div>
            </div>

            <!-- Nome -->
            <div class="form-row">
                <div class="form-group" style="margin-bottom:0">
                    <label class="form-label">Nome</label>
                    <input class="form-input" id="reg-nome" type="text" placeholder="Primeiro nome">
                </div>
                <div class="form-group" style="margin-bottom:0">
                    <label class="form-label">Apelido</label>
                    <input class="form-input" id="reg-apelido" type="text" placeholder="Apelido">
                </div>
            </div>

            <div class="form-divider">
                <div class="form-divider-line"></div>
                <div class="form-divider-txt">Contacto</div>
                <div class="form-divider-line"></div>
            </div>

            <div class="form-group">
                <label class="form-label">Email</label>
                <input class="form-input" id="reg-email" type="email" placeholder="o.teu@email.com">
            </div>
            <div class="form-group">
                <label class="form-label">Telefone</label>
                <input class="form-input" id="reg-telefone" type="tel" placeholder="+351 9XX XXX XXX">
            </div>

            <div class="form-divider">
                <div class="form-divider-line"></div>
                <div class="form-divider-txt">Sobre ti</div>
                <div class="form-divider-line"></div>
            </div>

            <div class="form-group">
                <label class="form-label">Como conheceste a Zion?</label>
                <textarea class="form-textarea" id="reg-onde" placeholder="Ex: através de um amigo, redes sociais, evento..."></textarea>
            </div>

            <div class="form-divider">
                <div class="form-divider-line"></div>
                <div class="form-divider-txt">Acesso</div>
                <div class="form-divider-line"></div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input class="form-input" id="reg-password" type="password" placeholder="Mínimo 6 caracteres">
            </div>
            <div class="form-group">
                <label class="form-label">Confirmar password</label>
                <input class="form-input" id="reg-password2" type="password" placeholder="Repete a password"
                       onkeydown="if(event.key==='Enter') doRegister()">
            </div>

            <button class="submit-btn" id="reg-btn" onclick="doRegister()">Criar Conta</button>
        </div>

    </div>
</div>

<!-- Modal: Esqueci a password -->
<div id="forgot-overlay">
    <div class="forgot-modal">
        <div class="forgot-modal-head">
            <span class="forgot-modal-title">Recuperar Password</span>
            <button class="forgot-modal-x" onclick="fecharForgot()">✕</button>
        </div>
        <div class="forgot-modal-body">
            <p>Introduz o teu email e enviaremos um link para definires uma nova password.</p>
            <div class="msg-box" id="forgot-msg"></div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input class="form-input" id="forgot-email" type="email" placeholder="o.teu@email.com"
                       onkeydown="if(event.key==='Enter') enviarReset()">
            </div>
            <button class="submit-btn" id="forgot-btn" onclick="enviarReset()" style="margin-top:0">
                Enviar Link de Recuperação
            </button>
        </div>
    </div>
</div>

<script>
    // ── Tabs ───────────────────────────────────────────
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach((t, i) =>
            t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
        document.getElementById('tab-login').classList.toggle('active', tab==='login');
        document.getElementById('tab-register').classList.toggle('active', tab==='register');
        clearMsgs();
    }

    function clearMsgs() {
        ['login-msg','reg-msg'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.className = 'msg-box';
        });
        document.querySelectorAll('.form-input.error').forEach(el => el.classList.remove('error'));
        document.querySelectorAll('.photo-preview.error-photo').forEach(el => el.classList.remove('error-photo'));
    }

    function showMsg(id, txt, tipo) {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = txt;
        el.className = `msg-box ${tipo}`;
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function markError(inputId) {
        const el = document.getElementById(inputId);
        if (el) el.classList.add('error');
    }

    // ── Foto preview ───────────────────────────────────
    let fotoFile = null;
    function previewFoto(event) {
        const file = event.target.files[0];
        if (!file) return;
        fotoFile = file;
        const reader = new FileReader();
        reader.onload = function() {
            const preview = document.getElementById('photo-preview');
            preview.style.backgroundImage = `url('${reader.result}')`;
            preview.classList.add('has-image');
            preview.classList.remove('error-photo');
        };
        reader.readAsDataURL(file);
    }

    // ── LOGIN ──────────────────────────────────────────
    async function doLogin() {
        clearMsgs();
        const email    = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        if (!email)    { markError('login-email');    return showMsg('login-msg', 'Email obrigatório.', 'error'); }
        if (!password) { markError('login-password'); return showMsg('login-msg', 'Password obrigatória.', 'error'); }
        const btn = document.getElementById('login-btn');
        btn.disabled = true; btn.textContent = 'A entrar...';
        try {
            await ZionAuth.login(email, password);
            showMsg('login-msg', 'Bem-vindo! A redirecionar...', 'success');
            setTimeout(() => {
                const redirect = sessionStorage.getItem('zion_redirect');
                sessionStorage.removeItem('zion_redirect');
                window.location.href = redirect || 'admin.html';
            }, 800);
        } catch(e) {
            showMsg('login-msg', e.message || 'Email ou password incorretos.', 'error');
            btn.disabled = false; btn.textContent = 'Entrar';
        }
    }

    // ── REGISTER ───────────────────────────────────────
    async function doRegister() {
        clearMsgs();
        const nome      = document.getElementById('reg-nome').value.trim();
        const apelido   = document.getElementById('reg-apelido').value.trim();
        const email     = document.getElementById('reg-email').value.trim();
        const telefone  = document.getElementById('reg-telefone').value.trim();
        const onde      = document.getElementById('reg-onde').value.trim();
        const password  = document.getElementById('reg-password').value;
        const password2 = document.getElementById('reg-password2').value;

        let ok = true;
        if (!fotoFile) { document.getElementById('photo-preview').classList.add('error-photo'); showMsg('reg-msg', 'A foto de perfil é obrigatória.', 'error'); ok = false; }
        if (!nome)    { markError('reg-nome');    if (ok) showMsg('reg-msg', 'Nome obrigatório.', 'error'); ok = false; }
        if (!apelido) { markError('reg-apelido'); if (ok) showMsg('reg-msg', 'Apelido obrigatório.', 'error'); ok = false; }
        if (!email)   { markError('reg-email');   if (ok) showMsg('reg-msg', 'Email obrigatório.', 'error'); ok = false; }
        if (!password)         { markError('reg-password');  if (ok) showMsg('reg-msg', 'Password obrigatória.', 'error'); ok = false; }
        if (password.length<6) { markError('reg-password');  if (ok) showMsg('reg-msg', 'Password deve ter pelo menos 6 caracteres.', 'error'); ok = false; }
        if (password !== password2) { markError('reg-password2'); if (ok) showMsg('reg-msg', 'As passwords não coincidem.', 'error'); ok = false; }
        if (!ok) return;

        const btn = document.getElementById('reg-btn');
        btn.disabled = true; btn.textContent = 'A criar conta...';
        try {
            let fotoUrl = null;
            if (fotoFile) {
                const ext = fotoFile.name.split('.').pop();
                const filename = `visitantes/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
                const SUPA_URL = window.SUPABASE_URL || '';
                const SUPA_KEY = window.SUPABASE_ANON_KEY || '';
                const uploadRes = await fetch(`${SUPA_URL}/storage/v1/object/fotos/${filename}`, {
                    method: 'POST',
                    headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': fotoFile.type },
                    body: fotoFile,
                });
                if (uploadRes.ok) fotoUrl = `${SUPA_URL}/storage/v1/object/public/fotos/${filename}`;
            }
            await ZionAuth.register({
                nome: `${nome} ${apelido}`.trim(),
                email,
                telefone: telefone || null,
                onde_conheceu: onde || null,
                foto_url: fotoUrl,
                password,
            });
            showMsg('reg-msg', 'Conta criada! A redirecionar...', 'success');
            setTimeout(() => {
                const redirect = sessionStorage.getItem('zion_redirect');
                sessionStorage.removeItem('zion_redirect');
                window.location.href = redirect || 'admin.html';
            }, 900);
        } catch(e) {
            showMsg('reg-msg', e.message || 'Erro ao criar conta. Tenta novamente.', 'error');
            btn.disabled = false; btn.textContent = 'Criar Conta';
        }
    }

    // ── ESQUECI A PASSWORD ─────────────────────────────
    function abrirForgot() {
        const overlay = document.getElementById('forgot-overlay');
        overlay.style.display = 'flex';
        document.getElementById('forgot-email').value = document.getElementById('login-email').value || '';
        document.getElementById('forgot-msg').className = 'msg-box';
        document.getElementById('forgot-btn').disabled = false;
        document.getElementById('forgot-btn').textContent = 'Enviar Link de Recuperação';
        setTimeout(() => document.getElementById('forgot-email').focus(), 100);
    }
    function fecharForgot() { document.getElementById('forgot-overlay').style.display = 'none'; }
    document.getElementById('forgot-overlay').addEventListener('click', function(e) { if (e.target === this) fecharForgot(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharForgot(); });

    async function enviarReset() {
        const email = document.getElementById('forgot-email').value.trim();
        const msgEl = document.getElementById('forgot-msg');
        msgEl.className = 'msg-box';
        if (!email) { msgEl.textContent = 'Introduz o teu email.'; msgEl.className = 'msg-box error'; return; }
        const btn = document.getElementById('forgot-btn');
        btn.disabled = true; btn.textContent = 'A enviar...';
        try {
            await fetch('/api/auth/forgot-password', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email}) });
            msgEl.textContent = 'Email enviado! Verifica a tua caixa de entrada.';
            msgEl.className = 'msg-box success';
            btn.textContent = 'Email enviado';
            setTimeout(() => fecharForgot(), 4000);
        } catch(e) {
            msgEl.textContent = 'Erro ao enviar. Tenta novamente.';
            msgEl.className = 'msg-box error';
            btn.disabled = false; btn.textContent = 'Enviar Link de Recuperação';
        }
    }

    if (typeof ZionAuth !== 'undefined' && ZionAuth.isLoggedIn()) {
        const redirect = sessionStorage.getItem('zion_redirect');
        sessionStorage.removeItem('zion_redirect');
        window.location.href = redirect || 'admin.html';
    }
</script>
</body>
</html>
