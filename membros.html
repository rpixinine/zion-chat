<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Membros — Zion Church Lisboa</title>

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#009098">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zion Lisboa">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>

    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        /* ══════════════════════════════════════════════════════
     MEMBROS CHAT Acesso Geral
     ══════════════════════════════════════════════════════ */
        .banner {
            min-height: 28vh !important; background-image: url('assets/zion-somos.avif') !important;
            background-size: cover !important; background-position: center !important;
            align-items: flex-end !important; justify-content: space-between !important;
            display: flex !important; padding: 0 14px 14px !important; overflow: hidden !important;
        }
        .banner img, .banner-fallback { display: none !important; }
        .banner-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.50); }
        .banner-gradient { position: absolute; left: 0; right: 0; bottom: 0; height: 120px;
            background: linear-gradient(to bottom, rgba(2,22,30,0), rgba(2,22,30,1)); }
        .back-btn {
            position: relative; z-index: 2; display: flex; align-items: center; gap: 6px;
            background: rgba(2,22,30,0.65); border: 1px solid rgba(216,195,165,0.35);
            border-radius: 999px; padding: 6px 14px; font-family: var(--font-title);
            font-size: 10px; letter-spacing: 1.5px; color: var(--primary); text-decoration: none;
            backdrop-filter: blur(8px); transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(216,195,165,0.12); border-color: var(--primary-light); color: var(--primary-light); }
        .page-badge {
            position: relative; z-index: 2; font-family: var(--font-title); font-size: 10px;
            letter-spacing: 2px; color: var(--primary); text-transform: uppercase;
            background: rgba(2,22,30,0.65); border: 1px solid rgba(216,195,165,0.35);
            border-radius: 999px; padding: 6px 14px; backdrop-filter: blur(8px);
        }
        .content { flex: 1; overflow-y: auto; background: var(--bg-input); }
        .content::-webkit-scrollbar { width: 4px; }
        .content::-webkit-scrollbar-thumb { background: rgba(0,144,152,0.25); border-radius: 2px; }
        .user-bar {
            display: flex; align-items: center; gap: 10px; padding: 10px 16px;
            background: linear-gradient(135deg, var(--primary-faint), rgba(0,144,152,0.01));
            border-bottom: 1px solid var(--border); flex-shrink: 0;
        }
        .user-bar-avatar {
            width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-title); font-size: 12px; color: #fff; font-weight: 700;
            overflow: hidden; border: 2px solid rgba(0,144,152,0.25);
        }
        .user-bar-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }
        .user-bar-info { flex: 1; }
        .user-bar-nome { font-family: var(--font-title); font-size: 12px; color: var(--primary-dark); }
        .user-bar-tipo { font-size: 10px; color: var(--text-faint); }
        .logout-btn {
            display: flex; align-items: center; gap: 5px; padding: 5px 10px;
            border-radius: var(--radius-sm); border: 1px solid rgba(220,80,60,0.3);
            background: rgba(220,80,60,0.06); color: var(--red);
            font-family: var(--font-title); font-size: 9px; letter-spacing: 1px;
            cursor: pointer; flex-shrink: 0; transition: all 0.2s;
        }
        .logout-btn:hover { background: rgba(220,80,60,0.12); }
        .search-bar {
            display: flex; align-items: center; gap: 8px; padding: 10px 16px;
            border-bottom: 1px solid var(--border); background: var(--bg-card); flex-shrink: 0;
        }
        .search-wrap { flex: 1; position: relative; }
        .search-icon {
            position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
            width: 14px; height: 14px; color: var(--text-faint); pointer-events: none;
        }
        .search-input {
            width: 100%; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: var(--radius-full); padding: 8px 14px 8px 32px;
            font-family: var(--font-body); font-size: 13px; color: var(--text-main);
            outline: none; transition: border-color 0.2s;
        }
        .search-input::placeholder { color: var(--text-faint); }
        .search-input:focus { border-color: var(--primary-light); box-shadow: 0 0 0 3px var(--primary-faint); }
        .filter-btn {
            display: flex; align-items: center; gap: 5px; padding: 7px 12px;
            border-radius: var(--radius-full); border: 1px solid var(--border);
            background: var(--bg-input); font-family: var(--font-title); font-size: 9px;
            letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted);
            cursor: pointer; transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
        }
        .filter-btn.active { background: linear-gradient(135deg, var(--primary-dark), var(--primary-light)); color: #fff; border-color: transparent; }
        .stats-bar { display: flex; gap: 8px; padding: 12px 16px 4px; }
        .stat-pill { flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 9px; text-align: center; }
        .stat-num { font-family: var(--font-title); font-size: 18px; font-weight: 700; color: var(--primary-dark); }
        .stat-label { font-size: 10px; color: var(--text-faint); margin-top: 1px; }
        .birthday-banner { margin: 8px 16px 0; background: var(--primary-faint); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
        .birthday-banner svg { width: 22px; height: 22px; color: var(--primary-light); flex-shrink: 0; }
        .birthday-txt strong { font-family: var(--font-title); font-size: 11px; color: var(--primary-dark); display: block; }
        .birthday-txt span   { font-size: 11px; color: var(--text-faint); }
        .section-label { font-family: var(--font-title); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-faint); padding: 12px 16px 6px; }
        .member-list { display: flex; flex-direction: column; gap: 6px; padding: 0 16px 16px; }
        .member-row {
            display: flex; align-items: center; gap: 12px; background: var(--bg-card);
            border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px 14px;
            cursor: pointer; transition: all 0.2s; animation: fadeUp 0.3s ease both;
        }
        .member-row:hover { box-shadow: var(--shadow); border-color: var(--primary-light); transform: translateX(2px); }
        .member-avatar { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; overflow: hidden; background: linear-gradient(135deg, var(--primary-dark), var(--primary-light)); display: flex; align-items: center; justify-content: center; border: 2px solid rgba(0,144,152,0.2); }
        .member-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }
        .member-avatar-initials { font-family: var(--font-title); font-size: 14px; font-weight: 700; color: #fff; }
        .member-row-info { flex: 1; min-width: 0; }
        .member-row-nome-wrap { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .member-row-nome { font-family: var(--font-title); font-size: 13px; font-weight: 600; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
        .btn-wpp-inline { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; background: #25D366; border: none; cursor: pointer; transition: transform 0.18s, box-shadow 0.18s; box-shadow: 0 1px 5px rgba(37,211,102,0.35); text-decoration: none; }
        .btn-wpp-inline:hover { transform: scale(1.15); box-shadow: 0 2px 8px rgba(37,211,102,0.55); }
        .btn-wpp-inline svg { width: 11px; height: 11px; fill: #fff; display: block; }
        .member-row-badges { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
        .mbadge { font-size: 9px; padding: 2px 7px; border-radius: var(--radius-sm); font-family: var(--font-title); letter-spacing: 0.5px; border: 1px solid transparent; white-space: nowrap; display: inline-flex; align-items: center; gap: 3px; }
        .mb-membro  { background: var(--primary-faint); color: var(--primary-dark); border-color: var(--border); }
        .mb-lider   { background: rgba(0,100,80,0.08); color: #006450; border-color: rgba(0,100,80,0.2); }
        .mb-vol     { background: rgba(46,125,50,0.08); color: var(--green); border-color: rgba(46,125,50,0.25); }
        .mb-presb   { background: rgba(90,20,150,0.08); color: #5a1496; border-color: rgba(90,20,150,0.2); }
        .mb-aniv    { background: rgba(230,81,0,0.08); color: var(--orange,#e65100); border-color: rgba(230,81,0,0.2); }
        .mb-area    { background: rgba(0,144,152,0.06); color: var(--primary-dark); border-color: rgba(0,144,152,0.18); font-size: 8px; padding: 2px 6px; }
        .member-row-arrow { color: var(--text-faint); font-size: 14px; flex-shrink: 0; }

        /* ── Modal ── */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(5px); animation: fadeIn 0.2s ease; }
        .overlay.hidden { display: none; }
        .perfil-sheet { width: 640px; max-width: 100vw; background: var(--bg-card); border-radius: 18px 18px 0 0; max-height: 90vh; overflow-y: auto; animation: slideUp 0.3s ease; }
        .perfil-sheet::-webkit-scrollbar { width: 4px; }
        .perfil-sheet::-webkit-scrollbar-thumb { background: rgba(0,144,152,0.25); border-radius: 2px; }
        .perfil-hero { position: relative; height: 100px; background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-light) 100%); overflow: visible; flex-shrink: 0; }
        .perfil-hero-pattern { position: absolute; inset: 0; opacity: 0.08; background-image: radial-gradient(circle, #fff 1px, transparent 1px); background-size: 20px 20px; }
        .perfil-hero-actions { position: absolute; top: 10px; right: 12px; display: flex; align-items: center; gap: 7px; z-index: 5; }
        .perfil-close { width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.25); color: rgba(255,255,255,0.9); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .perfil-close:hover { background: rgba(200,50,50,0.5); }
        .btn-edit-perfil { display: flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.35); background: rgba(0,0,0,0.28); color: rgba(255,255,255,0.92); font-family: var(--font-title); font-size: 9px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; backdrop-filter: blur(4px); }
        .btn-edit-perfil:hover { background: rgba(0,144,152,0.5); border-color: var(--primary-light); }
        .btn-edit-perfil svg { width: 11px; height: 11px; stroke: currentColor; fill: none; }
        .perfil-avatar-wrap { position: absolute; bottom: -44px; left: 20px; width: 88px; height: 88px; border-radius: 50%; border: 3px solid var(--bg-card); overflow: hidden; background: linear-gradient(135deg, var(--primary-dark), var(--primary-light)); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(0,0,0,0.15); z-index: 3; }
        .perfil-avatar-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }
        .perfil-avatar-initials { font-family: var(--font-title); font-size: 26px; font-weight: 700; color: #fff; }
        .perfil-body { padding: 56px 18px 28px; }
        .perfil-nome { font-family: var(--font-title); font-size: 18px; font-weight: 700; color: var(--primary-dark); margin-bottom: 2px; }
        .perfil-subtipo { font-size: 11px; color: var(--text-faint); margin-bottom: 10px; }
        .perfil-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
        .pbadge { display: flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: var(--radius-full); font-family: var(--font-title); font-size: 9px; letter-spacing: 1px; border: 1px solid transparent; }
        .pb-membro { background: var(--primary-faint); color: var(--primary-dark); border-color: var(--border); }
        .pb-lider  { background: rgba(0,100,80,0.08); color: #006450; border-color: rgba(0,100,80,0.2); }
        .pb-vol    { background: rgba(46,125,50,0.08); color: var(--green); border-color: rgba(46,125,50,0.25); }
        .pb-presb  { background: rgba(90,20,150,0.08); color: #5a1496; border-color: rgba(90,20,150,0.2); }
        .pb-batiz  { background: rgba(21,101,192,0.08); color: #1565c0; border-color: rgba(21,101,192,0.2); }
        .pb-aniv   { background: rgba(230,81,0,0.08); color: var(--orange,#e65100); border-color: rgba(230,81,0,0.2); }
        .pb-curso  { background: rgba(0,90,156,0.08); color: #005a9c; border-color: rgba(0,90,156,0.2); }
        .perfil-actions { display: flex; gap: 8px; margin-bottom: 18px; }
        .btn-wpp-perfil { display: flex; align-items: center; gap: 7px; padding: 9px 16px; border-radius: var(--radius-sm); border: none; background: #25D366; color: #fff; cursor: pointer; transition: all 0.2s; font-family: var(--font-title); font-size: 10px; letter-spacing: 1px; box-shadow: 0 2px 10px rgba(37,211,102,0.3); }
        .btn-wpp-perfil:hover { filter: brightness(1.08); transform: translateY(-1px); }
        .btn-wpp-perfil svg { width: 15px; height: 15px; fill: #fff; }
        .p-section { margin-bottom: 14px; }
        .p-section-title { font-family: var(--font-title); font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-faint); margin-bottom: 7px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
        .p-grid { background: var(--bg-input); border-radius: var(--radius-md); border: 1px solid var(--border); overflow: hidden; display: grid; grid-template-columns: 1fr 1fr; }
        .p-grid .p-cell:nth-child(odd) { border-right: 1px solid rgba(0,144,152,0.08); }
        .p-grid-full { grid-template-columns: 1fr; }
        .p-cell { padding: 9px 12px; border-bottom: 1px solid rgba(0,144,152,0.07); }
        .p-cell:last-child, .p-cell:nth-last-child(2):not(.p-grid-full .p-cell) { border-bottom: none; }
        .p-cell-full { grid-column: 1 / -1; border-right: none !important; }
        .p-cell-label { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-faint); font-family: var(--font-title); margin-bottom: 2px; }
        .p-cell-value { font-size: 12px; color: var(--text-main); line-height: 1.4; }
        .p-cell-value.faint { color: var(--text-faint); font-style: italic; font-size: 11px; }

        /* ── Edit mode inputs ── */
        .p-cell-input { width: 100%; background: var(--bg-card); border: 1px solid var(--primary-light); border-radius: var(--radius-sm); padding: 5px 8px; font-family: var(--font-body); font-size: 12px; color: var(--text-main); outline: none; transition: box-shadow 0.2s; box-sizing: border-box; }
        .p-cell-input:focus { box-shadow: 0 0 0 3px var(--primary-faint); }
        .p-cell-input::placeholder { color: var(--text-faint); font-style: italic; }
        textarea.p-cell-input { resize: vertical; min-height: 80px; line-height: 1.6; }
        select.p-cell-input { cursor: pointer; }
        .edit-mode-banner { display: none; align-items: center; gap: 10px; background: rgba(0,144,152,0.08); border: 1px solid rgba(0,144,152,0.25); border-radius: var(--radius-md); padding: 10px 14px; margin-bottom: 14px; }
        .edit-mode-banner.visible { display: flex; }
        .edit-mode-banner svg { width: 16px; height: 16px; stroke: var(--primary-light); fill: none; flex-shrink: 0; }
        .edit-mode-banner span { font-size: 11px; color: var(--primary-dark); flex: 1; }
        .btn-save { padding: 6px 16px; border-radius: var(--radius-full); border: none; background: linear-gradient(135deg, var(--primary-dark), var(--primary-light)); color: #fff; font-family: var(--font-title); font-size: 9px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .btn-save:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-save:disabled { opacity: 0.5; cursor: default; transform: none; }
        .btn-cancel-edit { padding: 6px 12px; border-radius: var(--radius-full); border: 1px solid var(--border); background: transparent; color: var(--text-faint); font-family: var(--font-title); font-size: 9px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .btn-cancel-edit:hover { border-color: var(--primary-light); color: var(--primary-dark); }

        /* ── Chip sections ── */
        .chip-section { margin-top: 10px; }
        .chip-list { display: flex; flex-wrap: wrap; gap: 5px; min-height: 10px; margin-bottom: 6px; }
        .chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px 3px 11px; border-radius: 20px; background: var(--primary-faint); border: 1px solid var(--border); color: var(--primary-dark); font-size: 11px; font-family: var(--font-title); letter-spacing: 0.5px; }
        .chip-del { background: none; border: none; color: var(--text-faint); cursor: pointer; font-size: 12px; line-height: 1; padding: 0 2px; transition: color 0.12s; display: none; }
        .chip-del:hover { color: var(--red); }
        .edit-mode-on .chip-del { display: inline; }
        .chip-empty { font-size: 11px; color: var(--text-faint); font-style: italic; }
        .chip-add-row { display: none; gap: 7px; align-items: stretch; margin-top: 6px; }
        .edit-mode-on .chip-add-row { display: flex; }
        .chip-add-select { flex: 1; background: var(--bg-card); border: 1px solid var(--primary-light); border-radius: var(--radius-sm); padding: 5px 8px; font-family: var(--font-body); font-size: 12px; color: var(--text-main); outline: none; cursor: pointer; }
        .chip-add-select option { background: var(--bg-card); }
        .chip-add-btn { padding: 0 12px; border-radius: var(--radius-sm); border: 1px solid rgba(0,144,152,0.3); background: var(--primary-faint); color: var(--primary-dark); font-size: 18px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; transition: all 0.15s; }
        .chip-add-btn:hover { background: var(--primary-light); color: #fff; border-color: var(--primary-light); }

        /* ── Batismo toggle ── */
        .batismo-view { }
        .edit-mode-on .batismo-view { display: none; }
        .toggle-row-edit { display: none; align-items: center; justify-content: space-between; padding: 8px 10px; border-radius: var(--radius-sm); border: 1px solid var(--primary-light); background: var(--bg-card); margin-top: 4px; cursor: pointer; }
        .edit-mode-on .toggle-row-edit { display: flex; }
        .toggle-label-sm { font-size: 12px; color: var(--text-main); }
        .toggle-sw { position: relative; width: 38px; height: 20px; background: var(--border); border-radius: 10px; transition: background 0.2s; flex-shrink: 0; }
        .toggle-sw.on { background: var(--primary-light); }
        .toggle-sw::after { content: ''; position: absolute; width: 14px; height: 14px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: left 0.2s; }
        .toggle-sw.on::after { left: 21px; }
        .bat-date-wrap { display: none; margin-top: 6px; }
        .bat-date-wrap.visible { display: block; }

        /* ── Min / Cursos tags ── */
        .ministerios-wrap, .cursos-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
        .min-tag { display: flex; align-items: center; gap: 5px; padding: 5px 11px; border-radius: var(--radius-full); background: var(--primary-faint); border: 1px solid var(--border); font-family: var(--font-title); font-size: 9px; letter-spacing: 1px; color: var(--primary-dark); }
        .min-tag svg { width: 11px; height: 11px; }
        .curso-tag { display: flex; align-items: center; gap: 5px; padding: 5px 11px; border-radius: var(--radius-full); background: rgba(0,90,156,0.06); border: 1px solid rgba(0,90,156,0.2); font-family: var(--font-title); font-size: 9px; letter-spacing: 1px; color: #005a9c; }
        .curso-tag svg { width: 11px; height: 11px; stroke: #005a9c; fill: none; }

        /* ── Família ── */
        .familia-list { display: flex; flex-direction: column; gap: 6px; }
        .fam-card { display: flex; align-items: center; gap: 10px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; cursor: pointer; transition: all 0.2s; }
        .fam-card:hover { border-color: var(--primary-light); background: var(--primary-faint); }
        .fam-avatar { width: 36px; height: 36px; border-radius: 50%; overflow: hidden; background: linear-gradient(135deg, var(--primary-dark), var(--primary-light)); display: flex; align-items: center; justify-content: center; font-family: var(--font-title); font-size: 12px; color: #fff; font-weight: 700; flex-shrink: 0; }
        .fam-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
        .fam-nome { font-family: var(--font-title); font-size: 12px; color: var(--primary-dark); }
        .fam-rel  { font-size: 10px; color: var(--text-faint); margin-top: 1px; }
        .fam-arrow { margin-left: auto; color: var(--text-faint); font-size: 13px; }

        /* ── Extra section box (for chips under grid) ── */
        .p-section-extra {
            background: var(--bg-input); border: 1px solid var(--border);
            border-top: none; border-radius: 0 0 var(--radius-md) var(--radius-md);

<script>

    const SUPA_URL    = window.SUPABASE_URL      || '';

    /* ═══════════════════════════════════════════════════

    const ESTADO_CIVIL_LIST = [

        { v: 'casado',      l: 'Casado/a' },

    const GENERO_LIST = [

    const NACIONALIDADES_LIST = [

    ].sort();

    /* ═══════════════════════════════════════════════════
       ESTADO
    ═══════════════════════════════════════════════════ */
    let todosMembros   = [];
    let currentUser  = null;
    let ministeriosMap = {};
    let linksMap       = {};
    let membroMinMap   = {};
    let filtroBirthday = false;
    let perfilEditMode = false;
    let perfilMembroId = null;
    let _editIdiomas   = [];
    let _editNacs      = [];
    let _editBatizado  = false;

    async function sb(path) {
        const token = await ZionAuth.getToken();
        const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
            headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
        });
        return r.json();
    }

    async function sbPatch(table, id, data) {
        const token = await ZionAuth.getToken();
        const r = await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, {
            method: 'PATCH',
            headers: {
                'apikey': SUPA_KEY, 'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json', 'Prefer': 'return=representation'
            },
            body: JSON.stringify(data)
        });
        return r.json();
    }

    async function init() {
        const session = await ZionAuth.protect();
        if (!session) return;
        currentUser = await ZionAuth.getUser();

        try {
            const [membros, minsData, linksData, memMinAll] = await Promise.all([
                sb('membros?select=*&ativo=eq.true&order=nome.asc'),
                sb('ministerios?select=id,nome&ativo=eq.true'),
                sb('links?select=id,nome,responsavel&ativo=eq.true'),
                sb('membro_ministerios?select=membro_id,ministerio_id&ativo=eq.true'),
            ]);
            
            renderUserBar();
            renderMembros(todosMembros);
        } catch(e) {
            document.getElementById('main-content').innerHTML = '<div class="loading">Erro ao carregar membros.</div>';
        }
    }

    function renderUserBar() {
        const u   = currentUser;
        const ini = (u.nome||'U').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
        const lbl = { visitante:'Visitante', membro:'Membro', admin:'Administrador' };
        const mm  = todosMembros.find(m => m.email?.toLowerCase() === u.email?.toLowerCase());
        const av  = mm?.foto_url ? `<img src="${mm.foto_url}" alt="${u.nome}">` : ini;
        document.getElementById('user-bar').innerHTML = `
    <div class="user-bar-avatar">${av}</div>
    <div class="user-bar-info"><div class="user-bar-nome">${u.nome}</div><div class="user-bar-tipo">${lbl[u.tipo]||u.tipo}</div></div>
    <button class="logout-btn" onclick="ZionAuth.logout()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
    </button>`;
    }

    /* helpers */
    const fDate = d => d ? new Date(d+'T12:00:00').toLocaleDateString('pt-PT',{day:'2-digit',month:'2-digit',year:'numeric'}) : null;
    const getMes   = () => new Date().getMonth()+1;
    const isAniv   = m => m.data_nascimento && parseInt(m.data_nascimento.split('-')[1]) === getMes();
    const getInits = n => (n||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    const limTel   = t => t ? t.replace(/\s+/g,'').replace(/[^0-9+]/g,'') : null;
    const wppUrl   = t => { const n=limTel(t); if(!n)return null; return `https://wa.me/${n.startsWith('+')?n.slice(1):n}`; };
    const isMeu    = m => m.email?.toLowerCase() === currentUser?.email?.toLowerCase();
    const esc      = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const parseArr = v => { if(Array.isArray(v))return v; try{const p=JSON.parse(v||'[]');return Array.isArray(p)?p:[];}catch{return [];} };

    const SVG_WPP  = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>`;
    const SVG_MIN  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`;
    const SVG_CURSO= `<svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>`;

    function filtrar() {
        const q = document.getElementById('search-input').value.toLowerCase().trim();
        let l = [...todosMembros];
        if (filtroBirthday) l = l.filter(isAniv);
        if (q) l = l.filter(m => (m.nome||'').toLowerCase().includes(q));
        renderMembros(l);
    }
    function toggleAniversariantes() {
        filtroBirthday = !filtroBirthday;
        document.getElementById('btn-aniv').classList.toggle('active', filtroBirthday);
        document.getElementById('search-input').value = '';
        filtrar();
    }

    function renderMembros(lista) {
        const total   = todosMembros.length;
        const anivCnt = todosMembros.filter(isAniv).length;
        const lideres = todosMembros.filter(m => m.e_lider).length;
        const MESES   = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
        const mesNome = MESES[getMes()-1];

        let html = `<div class="stats-bar">
        <div class="stat-pill"><div class="stat-num">${total}</div><div class="stat-label">Membros</div></div>
        <div class="stat-pill"><div class="stat-num">${lideres}</div><div class="stat-label">Líderes</div></div>
        <div class="stat-pill"><div class="stat-num">${anivCnt}</div><div class="stat-label">Aniv. ${mesNome}</div></div>
    </div>`;
        if (filtroBirthday) html += `<div class="birthday-banner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <div class="birthday-txt"><strong>Aniversariantes de ${mesNome}</strong>
            <span>${lista.length===0?'Nenhum este mês.':`${lista.length} membro${lista.length!==1?'s':''} fazem anos este mês`}</span></div></div>`;

        if (!lista.length) {
            html += `<div class="empty"><div class="empty-txt">${filtroBirthday?'Nenhum aniversariante este mês.':'Nenhum membro encontrado.'}</div></div>`;
            document.getElementById('main-content').innerHTML = html; return;
        }

        html += `<div class="section-label">${filtroBirthday?`Aniversários · ${mesNome}`:'Comunidade'} · ${lista.length} ${lista.length===1?'membro':'membros'}</div>`;
        html += '<div class="member-list">';
        lista.forEach((m, i) => {
            const an  = isAniv(m), wpp = wppUrl(m.telefone);
            const ids = membroMinMap[m.id]||[], nomes = ids.map(id=>ministeriosMap[id]?.nome).filter(Boolean);
            const areaBadges = nomes.slice(0,2).map(n=>`<span class="mbadge mb-area">${n}</span>`).join('');
            const badges = [
                m.e_presbitero ? `<span class="mbadge mb-presb">Presbítero</span>` : '',
                m.e_lider      ? `<span class="mbadge mb-lider">Líder</span>${areaBadges}` : '',
                m.e_voluntario && !m.e_lider ? `<span class="mbadge mb-vol">Voluntário</span>${areaBadges}` : '',
                (!m.e_lider&&!m.e_presbitero&&!m.e_voluntario) ? `<span class="mbadge mb-membro">Membro</span>` : '',
                an ? `<span class="mbadge mb-aniv">🎂 Aniversário</span>` : '',
            ].filter(Boolean).join('');
            const av = m.foto_url ? `<img src="${m.foto_url}" alt="${m.nome}">` : `<div class="member-avatar-initials">${getInits(m.nome)}</div>`;
            html += `<div class="member-row" style="animation-delay:${Math.min(i,15)*0.025}s" onclick="abrirPerfil('${m.id}')">
            <div class="member-avatar">${av}</div>
            <div class="member-row-info">
                <div class="member-row-nome-wrap">
                    <div class="member-row-nome">${m.nome}</div>
                    ${wpp?`<a class="btn-wpp-inline" href="${wpp}" target="_blank" title="WhatsApp" onclick="event.stopPropagation()">${SVG_WPP}</a>`:''}
                </div>
                <div class="member-row-badges">${badges}</div>
            </div>
            <div class="member-row-arrow">›</div>
        </div>`;
        });
        html += '</div>';
        document.getElementById('main-content').innerHTML = html;
    }

    function showToast(msg, err=false) {
        const t=document.getElementById('toast'); t.textContent=msg;
        t.style.background=err?'rgba(180,40,40,0.95)':'';
        t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000);
    }

    /* ═══════════════════════════════════════════════════
       ABRIR PERFIL
    ═══════════════════════════════════════════════════ */
    async function abrirPerfil(id) {
        const m = todosMembros.find(x=>x.id===id); if(!m) return;
        perfilMembroId=id; perfilEditMode=false;
        document.getElementById('overlay').classList.remove('hidden');
        document.getElementById('perfil-sheet').classList.remove('edit-mode-on');
        document.body.style.overflow='hidden';
        document.getElementById('p-body').innerHTML='<div class="loading"><div class="spin"></div></div>';

        const eb = document.getElementById('btn-edit-toggle');
        eb.style.display = isMeu(m) ? 'flex' : 'none';
        setEditBtnState(false);

        const av=document.getElementById('p-avatar');
        av.innerHTML = m.foto_url ? `<img src="${m.foto_url}" alt="${m.nome}">` : `<div class="perfil-avatar-initials">${getInits(m.nome)}</div>`;

        const [cjRes,paiRes,maeRes,filhosRes,memMinRes,cursosRes] = await Promise.all([
            m.conjuge_id ? sb(`membros?select=id,nome,foto_url&id=eq.${m.conjuge_id}`) : Promise.resolve([]),
            m.pai_id     ? sb(`membros?select=id,nome,foto_url&id=eq.${m.pai_id}`)     : Promise.resolve([]),
            m.mae_id     ? sb(`membros?select=id,nome,foto_url&id=eq.${m.mae_id}`)     : Promise.resolve([]),
            sb(`membros_filhos?select=filho_id&pai_id=eq.${id}`),
            sb(`membro_ministerios?select=ministerio_id&membro_id=eq.${id}&ativo=eq.true`),
            isMeu(m) ? sb(`membro_cursos?select=curso_id,cursos(nome)&membro_id=eq.${id}`) : Promise.resolve([]),
        ]);

        let filhos=[];
        if(filhosRes?.length>0){const ids=filhosRes.map(f=>f.filho_id).join(','); const fi=await sb(`membros?select=id,nome,foto_url&id=in.(${ids})`); filhos=Array.isArray(fi)?fi:[];}

        const meusMin = Array.isArray(memMinRes) ? memMinRes.map(r=>ministeriosMap[r.ministerio_id]).filter(Boolean) : [];
        const meusCursos = Array.isArray(cursosRes) ? cursosRes.map(r=>r.cursos?.nome||r.curso_id).filter(Boolean) : [];

        renderPerfil(m, {conjuge:cjRes?.[0]||null, pai:paiRes?.[0]||null, mae:maeRes?.[0]||null, filhos, meusMin, meusCursos});
    }

    function renderPerfil(m, {conjuge, pai, mae, filhos, meusMin, meusCursos}) {
        const an   = isAniv(m);
        const MESES= ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
        const wpp  = wppUrl(m.telefone);
        const link = m.link_id ? linksMap[m.link_id] : null;
        const eu   = isMeu(m);

        _editIdiomas  = parseArr(m.idiomas || m['Idiomas']);
        _editNacs     = parseArr(m.nacionalidade);
        _editBatizado = !!m.foi_batizado;

        const badges = [
            m.e_presbitero ? `<span class="pbadge pb-presb">Presbítero</span>` : '',
            m.e_lider      ? `<span class="pbadge pb-lider">Líder</span>`      : '',
            m.e_voluntario ? `<span class="pbadge pb-vol">Voluntário</span>`   : '',
            (!m.e_lider&&!m.e_presbitero&&!m.e_voluntario) ? `<span class="pbadge pb-membro">Membro</span>` : '',
            m.foi_batizado ? `<span class="pbadge pb-batiz">Batizado</span>`   : '',
            an             ? `<span class="pbadge pb-aniv">🎂 Aniversariante</span>` : '',
            ...meusCursos.map(c=>`<span class="pbadge pb-curso">${c}</span>`),
        ].filter(Boolean).join('');

        function cell(label, value, field=null, type='text') {
            const empty=!value;
            return `<div class="p-cell"${field?` data-field="${field}" data-type="${type}"`:''}><div class="p-cell-label">${label}</div><div class="p-cell-value${empty?' faint':''}" data-original="${esc(value||'')}">${empty?'—':esc(value)}</div></div>`;
        }
        function cellFull(label, value, field=null, type='text') {
            const empty=!value;
            return `<div class="p-cell p-cell-full"${field?` data-field="${field}" data-type="${type}"`:''}><div class="p-cell-label">${label}</div><div class="p-cell-value${empty?' faint':''}" data-original="${esc(value||'')}">${empty?'—':esc(value)}</div></div>`;
        }
        function famCard(p, rel) {
            if(!p) return '';
            const av=p.foto_url?`<div class="fam-avatar"><img src="${p.foto_url}" alt="${p.nome}"></div>`:`<div class="fam-avatar">${getInits(p.nome)}</div>`;
            return `<div class="fam-card" onclick="closePerfil();setTimeout(()=>abrirPerfil('${p.id}'),250)">${av}<div><div class="fam-nome">${p.nome}</div><div class="fam-rel">${rel}</div></div><div class="fam-arrow">›</div></div>`;
        }

        const famCards = [famCard(conjuge,'Cônjuge'),famCard(pai,'Pai'),famCard(mae,'Mãe'),...filhos.map(f=>famCard(f,'Filho/a'))].filter(Boolean);

        // Labels com fallback para display
        const escLabel = ESC_LABEL[m.escolaridade] || m.escolaridade || null;
        const ecLabel  = EC_LABEL[m.estado_civil]  || m.estado_civil  || null;
        const genLabel = m.genero==='masculino'?'Masculino':m.genero==='feminino'?'Feminino':(m.genero||null);

        // Chip section helper
        function chipBlock(id, label, arr) {
            const chips = arr.length
                ? arr.map((v,i)=>`<span class="chip">${esc(v)}<button class="chip-del" onclick="delChip('${id}',${i})">✕</button></span>`).join('')
                : `<span class="chip-empty">—</span>`;
            const opts = (id==='idiomas'?IDIOMAS_LIST:NACIONALIDADES_LIST)
                .map(l=>`<option value="${esc(l)}">${esc(l)}</option>`).join('');
            return `<div class="chip-section"><div class="extra-label">${label}</div>
                <div class="chip-list" id="chips-${id}">${chips}</div>
                <div class="chip-add-row" id="addrow-${id}">
                    <select class="chip-add-select" id="sel-${id}"><option value="">— Adicionar —</option>${opts}</select>
                    <button class="chip-add-btn" onclick="addChip('${id}')">+</button>
                </div></div>`;
        }

        // Batismo cell
        const batDisplay = m.foi_batizado ? (m.data_batismo ? fDate(m.data_batismo) : 'Sim') : 'Não';
        const batCell = `<div class="p-cell p-cell-full" id="bat-cell">
            <div class="p-cell-label">Batismo</div>
            <div class="batismo-view"><div class="p-cell-value${!m.foi_batizado?' faint':''}">${batDisplay}</div></div>
            ${eu ? `<div class="toggle-row-edit" onclick="toggleBatismo()">
                <span class="toggle-label-sm">Batizado nas águas</span>
                <div class="toggle-sw${_editBatizado?' on':''}" id="toggle-bat"></div>
            </div>
            <div class="bat-date-wrap${_editBatizado?' visible':''}" id="bat-date-wrap">
                <input type="date" id="inp-data_batismo" class="p-cell-input" value="${m.data_batismo||''}" placeholder="Data do batismo">
            </div>` : ''}
        </div>`;

        // Endereco (only own)
        const enderecoSection = eu ? `
    <div class="p-section">
        <div class="p-section-title">Endereço & Documentos</div>
        <div class="p-grid">
            ${cellFull('Rua', m.rua, 'rua')}
            ${cell('Número', m.numero, 'numero')}
            ${cell('Andar / Frac.', m.complemento, 'complemento')}
            ${cell('Bairro', m.bairro, 'bairro')}
            ${cell('Cidade', m.cidade, 'cidade')}
            ${cell('Distrito / Estado', m.distrito_estado, 'distrito_estado')}
            ${cell('Código Postal', m.codigo_postal, 'codigo_postal')}
            ${cell('País', m.pais, 'pais')}
            ${cell('Zona', m.zona, 'zona')}
            ${cell('NIF', m.nif, 'nif')}
        </div>
    </div>` : '';

        document.getElementById('p-body').innerHTML = `
    <div id="edit-banner" class="edit-mode-banner">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        <span>A editar o meu perfil</span>
        <button class="btn-cancel-edit" onclick="cancelEdit()">Cancelar</button>
        <button class="btn-save" id="btn-save" onclick="salvarPerfil()">Guardar</button>
    </div>

    <div class="perfil-nome">${m.nome}</div>
    <div class="perfil-subtipo">Membro · Zion Lisboa${an?` · 🎂 ${MESES[new Date(m.data_nascimento+'T12:00:00').getMonth()]}`:''}</div>
    ${badges?`<div class="perfil-badges">${badges}</div>`:''}
    ${wpp?`<div class="perfil-actions"><button class="btn-wpp-perfil" onclick="window.open('${wpp}','_blank')">${SVG_WPP} WhatsApp</button></div>`:''}

    <!-- Informação Pessoal -->
    <div class="p-section">
        <div class="p-section-title">Informação Pessoal</div>
        <div class="p-grid">
            ${cellFull('Email', m.email)}
            ${cell('Telefone', m.telefone, eu?'telefone':null)}
            ${cell('Data de Nascimento', m.data_nascimento?`${fDate(m.data_nascimento)}${an?' 🎉':''}`:null, eu?'data_nascimento':null, 'date')}
            ${cell('Género', genLabel, eu?'genero':null, 'select-genero')}
            ${cell('Estado Civil', ecLabel, eu?'estado_civil':null, 'select-estado')}
            ${cell('Profissão', m.profissao, eu?'profissao':null)}
            ${cell('Escolaridade', escLabel, eu?'escolaridade':null, 'select-escolaridade')}
        </div>
        <!-- Idiomas + Nacionalidade: chips para o próprio, texto para outros -->
        <div class="p-section-extra">
            ${eu ? chipBlock('idiomas','Idiomas',_editIdiomas) + chipBlock('nacs','Nacionalidade',_editNacs)
            : `<div class="extra-label">Idiomas</div>
                    <div class="extra-value${_editIdiomas.length?'':' faint'}" style="margin-bottom:8px">${_editIdiomas.length?_editIdiomas.join(' · '):'—'}</div>
                    <div class="extra-label">Nacionalidade</div>
                    <div class="extra-value${_editNacs.length?'':' faint'}">${_editNacs.length?_editNacs.join(', '):'—'}</div>`}
        </div>
    </div>

    ${famCards.length?`<div class="p-section"><div class="p-section-title">Família</div><div class="familia-list">${famCards.join('')}</div></div>`:''}

    <!-- Na Igreja -->
    <div class="p-section">
        <div class="p-section-title">Na Igreja</div>
        <div class="p-grid">
            ${cell('Membro desde', fDate(m.data_entrada), eu?'data_entrada':null, 'date')}
            ${cell('Onde conheceu', m.onde_conheceu, eu?'onde_conheceu':null)}
            ${batCell}
            ${cellFull('Link', link?`${link.nome}${link.responsavel?' · '+link.responsavel:''}`:null)}
        </div>
    </div>

    ${meusMin.length?`<div class="p-section"><div class="p-section-title">Ministérios</div><div class="ministerios-wrap">${meusMin.map(mn=>`<div class="min-tag">${SVG_MIN}${mn.nome}</div>`).join('')}</div></div>`:''}
    ${eu&&meusCursos.length?`<div class="p-section"><div class="p-section-title">Cursos & Formações</div><div class="cursos-wrap">${meusCursos.map(c=>`<div class="curso-tag">${SVG_CURSO}${c}</div>`).join('')}</div></div>`:''}

    ${enderecoSection}

    <div class="p-section">
        <div class="p-section-title">História</div>
        <div class="p-grid p-grid-full">
            <div class="p-cell p-cell-full"${eu?' data-field="historia" data-type="textarea"':''}>
                ${m.historia
            ? `<div class="p-cell-value" style="white-space:pre-line;line-height:1.7" data-original="${esc(m.historia)}">${esc(m.historia)}</div>`
            : `<div class="p-cell-value faint" data-original="">—</div>`}
            </div>
        </div>
    </div>`;
    }

    /* ═══════════════════════════════════════════════════
       CHIPS
    ═══════════════════════════════════════════════════ */
    function renderChips(id) {
        const arr  = id==='idiomas' ? _editIdiomas : _editNacs;
        const list = document.getElementById(`chips-${id}`); if(!list) return;
        list.innerHTML = arr.length
            ? arr.map((v,i)=>`<span class="chip">${esc(v)}<button class="chip-del" style="${perfilEditMode?'display:inline':''}" onclick="delChip('${id}',${i})">✕</button></span>`).join('')
            : `<span class="chip-empty">—</span>`;
    }
    window.addChip = function(id) {
        const sel=document.getElementById(`sel-${id}`); if(!sel||!sel.value) return;
        const arr=id==='idiomas'?_editIdiomas:_editNacs;
        if(!arr.includes(sel.value)){arr.push(sel.value);renderChips(id);} sel.value='';
    };
    window.delChip = function(id,idx) {
        (id==='idiomas'?_editIdiomas:_editNacs).splice(idx,1); renderChips(id);
    };

    /* ═══════════════════════════════════════════════════
       TOGGLE BATISMO
    ═══════════════════════════════════════════════════ */
    window.toggleBatismo = function() {
        _editBatizado = !_editBatizado;
        const sw=document.getElementById('toggle-bat'), wr=document.getElementById('bat-date-wrap');
        if(sw) sw.className='toggle-sw'+(_editBatizado?' on':'');
        if(wr) wr.className='bat-date-wrap'+(_editBatizado?' visible':'');
    };

    /* ═══════════════════════════════════════════════════
       EDIT MODE
    ═══════════════════════════════════════════════════ */
    function setEditBtnState(editing) {
        const b=document.getElementById('btn-edit-toggle'); if(!b) return;
        if(editing) {
            b.innerHTML=`<svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:11px;height:11px;stroke:currentColor;fill:none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Sair`;
        } else {
            b.innerHTML=`<svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:11px;height:11px;stroke:currentColor;fill:none"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Editar`;
        }
    }

    function toggleEdit() { if(!perfilEditMode) enterEdit(); else cancelEdit(); }

    function enterEdit() {
        perfilEditMode=true;
        document.getElementById('edit-banner').classList.add('visible');
        document.getElementById('perfil-sheet').classList.add('edit-mode-on');
        setEditBtnState(true);

        const membro = todosMembros.find(x=>x.id===perfilMembroId);

        document.querySelectorAll('[data-field]').forEach(cell => {
            const field=cell.dataset.field, type=cell.dataset.type||'text'; if(!field) return;
            const valueEl=cell.querySelector('.p-cell-value'); if(!valueEl) return;
            const raw=membro?.[field]??'';

            let inp;
            if(type==='textarea') {
                inp=document.createElement('textarea'); inp.className='p-cell-input';
                inp.value=raw; inp.placeholder='Escreve aqui...';
            } else if(type==='date') {
                inp=document.createElement('input'); inp.type='date'; inp.className='p-cell-input'; inp.value=raw||'';
            } else if(type==='select-genero') {
                inp=document.createElement('select'); inp.className='p-cell-input';
                GENERO_LIST.forEach(o=>{const opt=document.createElement('option');opt.value=o.v;opt.textContent=o.l;opt.selected=raw===o.v;inp.appendChild(opt);});
            } else if(type==='select-estado') {
                inp=document.createElement('select'); inp.className='p-cell-input';
                ESTADO_CIVIL_LIST.forEach(o=>{const opt=document.createElement('option');opt.value=o.v;opt.textContent=o.l;opt.selected=raw===o.v;inp.appendChild(opt);});
            } else if(type==='select-escolaridade') {
                inp=document.createElement('select'); inp.className='p-cell-input';
                ESCOLARIDADE_LIST.forEach(o=>{const opt=document.createElement('option');opt.value=o.v;opt.textContent=o.l;opt.selected=raw===o.v;inp.appendChild(opt);});
            } else {
                inp=document.createElement('input'); inp.type='text'; inp.className='p-cell-input'; inp.value=raw; inp.placeholder='—';
            }
            inp.dataset.field=field;
            valueEl.replaceWith(inp);
        });
    }

    function cancelEdit() {
        perfilEditMode=false;
        document.getElementById('edit-banner').classList.remove('visible');
        document.getElementById('perfil-sheet').classList.remove('edit-mode-on');
        setEditBtnState(false);
        abrirPerfil(perfilMembroId); // re-render clean
    }

    async function salvarPerfil() {
        const btn=document.getElementById('btn-save');
        btn.disabled=true; btn.textContent='A guardar...';

        const payload={};
        document.querySelectorAll('input.p-cell-input, textarea.p-cell-input, select.p-cell-input').forEach(inp=>{
            if(inp.dataset.field) payload[inp.dataset.field]=inp.value||null;
        });
        payload['idiomas']       = _editIdiomas.length ? JSON.stringify(_editIdiomas) : null;
        payload['nacionalidade'] = _editNacs.length    ? JSON.stringify(_editNacs)    : null;
        payload['foi_batizado']  = _editBatizado;
        const db=document.getElementById('inp-data_batismo');
        payload['data_batismo']  = db?.value||null;

        try {
            await sbPatch('membros', perfilMembroId, payload);
            const idx=todosMembros.findIndex(x=>x.id===perfilMembroId);
            if(idx!==-1) Object.assign(todosMembros[idx], payload);
            showToast('✓ Perfil actualizado com sucesso');
            perfilEditMode=false;
            abrirPerfil(perfilMembroId);
        } catch(e) {
            showToast('Erro ao guardar. Tenta novamente.',true);
            btn.disabled=false; btn.textContent='Guardar';
        }
    }

    function closePerfil() {
        document.getElementById('overlay').classList.add('hidden');
        document.getElementById('perfil-sheet').classList.remove('edit-mode-on');
        document.body.style.overflow='';
        perfilEditMode=false;
    }
    function closeOutside(e) { if(e.target===document.getElementById('overlay')) closePerfil(); }
    document.addEventListener('keydown', e=>{ if(e.key==='Escape') closePerfil(); });

    init();
</script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('SW registado:', reg.scope))
                .catch(err => console.error('SW erro:', err));
        });
    }
</script>
</body>
</html>
