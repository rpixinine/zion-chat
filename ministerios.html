<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Ministérios — Zion Church Lisboa</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="config.js"></script>
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        /* ── Hero banner ─────────────────────────────────── */
        .banner {
            min-height: 28vh !important;
            background-image: url('https://storage2.snappages.site/2CD49G/assets/images/11060006_2160x976_2500.png') !important;
            background-size: cover !important;
            background-position: center !important;
            align-items: flex-end !important;
            justify-content: space-between !important;
            display: flex !important;
            padding: 0 14px 14px !important;
            overflow: hidden !important;
        }
        .banner img,
        .banner-fallback { display: none !important; }

        .banner-overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.50);
        }
        .banner-gradient {
            position: absolute; left: 0; right: 0; bottom: 0;
            height: 120px;
            background: linear-gradient(to bottom, rgba(2,22,30,0), rgba(2,22,30,1));
        }

        /* ── Nav pills (dark style) ──────────────────────── */
        .back-btn {
            position: relative; z-index: 2;
            display: flex; align-items: center; gap: 6px;
            background: rgba(2,22,30,0.65);
            border: 1px solid rgba(216,195,165,0.35);
            border-radius: 999px; padding: 6px 14px;
            font-family: var(--font-title); font-size: 10px; letter-spacing: 1.5px;
            color: var(--primary); text-decoration: none;
            backdrop-filter: blur(8px); transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(216,195,165,0.12); border-color: var(--primary-light); color: var(--primary-light); }

        .page-badge {
            position: relative; z-index: 2;
            font-family: var(--font-title); font-size: 10px; letter-spacing: 2px;
            color: var(--primary); text-transform: uppercase;
            background: rgba(2,22,30,0.65); border: 1px solid rgba(216,195,165,0.35);
            border-radius: 999px; padding: 6px 14px; backdrop-filter: blur(8px);
        }

        /* ── Content ─────────────────────────────────────── */
        .content {
            flex: 1; overflow-y: auto;
            padding: 20px 18px 24px;
            background: var(--bg-input);
        }
        .content::-webkit-scrollbar { width: 4px; }
        .content::-webkit-scrollbar-thumb { background: rgba(0,144,152,0.25); border-radius: 2px; }

        /* ── Cards ───────────────────────────────────────── */
        .card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-md); padding: 18px; margin-bottom: 10px;
            box-shadow: var(--shadow-sm); animation: fadeUp 0.4s ease both;
        }
        .card-badge {
            display: inline-block; padding: 2px 10px;
            border-radius: var(--radius-full);
            background: var(--primary-faint); border: 1px solid var(--border);
            font-family: var(--font-title); font-size: 9px; letter-spacing: 1.5px;
            text-transform: uppercase; color: var(--primary-dark); margin-bottom: 8px;
        }
        .card-title {
            font-family: var(--font-title); font-size: 16px; font-weight: 600;
            color: var(--primary-dark); margin-bottom: 6px;
        }
        .card-text { font-size: 14px; color: var(--text-muted); line-height: 1.75; }

        /* ── Ministério meta ─────────────────────────────── */
        .min-meta { display: flex; align-items: center; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .min-meta-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-faint); }
        .min-meta-item a { color: var(--primary); text-decoration: none; font-size: 11px; }
        .min-meta-item a:hover { text-decoration: underline; }
        .min-meta-item svg { width: 12px; height: 12px; flex-shrink: 0; }

        /* ── Section label ───────────────────────────────── */
        .section-label {
            font-family: var(--font-title); font-size: 10px; letter-spacing: 3px;
            text-transform: uppercase; color: var(--text-faint); margin: 18px 0 10px;
        }
        .section-label:first-child { margin-top: 0; }

        .d1{animation-delay:0.05s}
    </style>
</head>
<body>
<div class="page-wrapper">

    <div class="banner">
        <div class="banner-overlay"></div>
        <div class="banner-gradient"></div>
        <a href="index.html" class="back-btn">← Início</a>
        <span class="page-badge">Ministérios</span>
    </div>

    <div class="gold-line"></div>

    <div class="content" id="main-content">
        <div class="loading"><div class="spin"></div>A carregar ministérios...</div>
    </div>

    <div class="footer">
        <div class="footer-links" id="footer-links">
            <a class="footer-link" href="https://zionchurch.org.br/" target="_blank">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                Site Oficial
            </a>
            <a class="footer-link" href="https://www.instagram.com/zionlisboa/" target="_blank">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
                @ZionLisboa
            </a>
        </div>
        <div class="footer-divider"></div>
        <div class="footer-bottom">
            <div class="footer-copy" id="footer-copy">© 2026 Zion Lisboa — Todos os direitos reservados</div>
            <div class="footer-address" id="footer-addr">Rua do Centro Cultural, 11 · 1700-036 Alvalade · Lisboa, Portugal</div>
        </div>
    </div>

</div>

<script>
const SUPA_URL = window.SUPABASE_URL      || '';
const SUPA_KEY = window.SUPABASE_ANON_KEY || '';

const SVG_IG   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>`;
const SVG_USER = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;

async function sb(path) {
    const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
        headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
    });
    if (!r.ok) throw new Error(`Supabase ${r.status}`);
    return r.json();
}

async function init() {
    try {
        const [ministerios, configs] = await Promise.all([
            sb('ministerios?select=*&ativo=eq.true&tipo=eq.ministerio&order=created_at.asc'),
            sb('configuracoes?select=chave,valor'),
        ]);
        const cfg = {};
        (Array.isArray(configs) ? configs : []).forEach(r => { cfg[r.chave] = r.valor; });

        if (cfg['copy']) document.getElementById('footer-copy').textContent = cfg['copy'];
        const addrLine = [cfg['endereco']||'', [cfg['codigo_postal']||'', cfg['cidade']||''].filter(Boolean).join(' ')].filter(Boolean).join(' · ');
        if (addrLine) document.getElementById('footer-addr').textContent = addrLine;

        const instagram = cfg['instagram'] || 'https://www.instagram.com/zionlisboa/';
        const site      = cfg['site']      || 'https://zionchurch.org.br/';
        document.getElementById('footer-links').innerHTML = `
            <a class="footer-link" href="${site}" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>Site Oficial</a>
            <a class="footer-link" href="${instagram}" target="_blank">${SVG_IG} @ZionLisboa</a>`;

        renderMinisterios(Array.isArray(ministerios) ? ministerios : []);
    } catch (e) {
        console.error(e);
        document.getElementById('main-content').innerHTML = `<div class="empty"><div class="empty-txt">Erro ao carregar. Tenta novamente.</div></div>`;
    }
}

function renderMinisterios(list) {
    if (!list.length) {
        document.getElementById('main-content').innerHTML = `<div class="empty"><div class="empty-txt">Nenhum ministério disponível de momento.</div></div>`;
        return;
    }
    let html = `
    <div class="card d1">
        <div class="card-text">Temos ministérios para todas as faixas etárias e áreas de serviço. Cada ministério é um espaço de crescimento, conexão e propósito dentro da Zion Lisboa.</div>
    </div>
    <p class="section-label">Nossos Ministérios</p>`;

    list.forEach((m, i) => {
        const metaItems = [];
        if (m.faixa_etaria) metaItems.push(`<span class="min-meta-item">${SVG_USER} ${m.faixa_etaria}</span>`);
        if (m.instagram)    metaItems.push(`<span class="min-meta-item">${SVG_IG}<a href="${m.instagram}" target="_blank">Instagram</a></span>`);
        html += `
        <div class="card" style="animation-delay:${(i+2)*0.04}s">
            ${m.faixa_etaria ? `<div class="card-badge">${m.faixa_etaria}</div>` : ''}
            <div class="card-title">${m.nome}</div>
            ${m.descricao ? `<div class="card-text">${m.descricao}</div>` : ''}
            ${metaItems.length ? `<div class="min-meta">${metaItems.join('')}</div>` : ''}
        </div>`;
    });
    document.getElementById('main-content').innerHTML = html;
}

init();
</script>
</body>
</html>
