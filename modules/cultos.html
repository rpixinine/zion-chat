<style>
    /* ══════════════════════════════════════════════════════
       CULTOS MODULE v2 — Campus + Cultos
       Layout: 3 paineis | Fontes brancas | Auto-inativar
    ══════════════════════════════════════════════════════ */

    .cu-wrap {
        display: flex;
        height: 100%;
        min-height: 0;
        overflow: hidden;
        font-family: var(--font-body);
        color: #fff;
    }

    .cu-wrap * {
        box-sizing: border-box;
    }

    /* ── SIDEBAR BASE ── */
    .cu-side {
        flex-shrink: 0;
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        background: var(--bg-card);
        overflow: hidden;
    }

    .cu-side-head {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        gap: 6px;
        align-items: center;
        flex-shrink: 0;
        min-height: 48px;
    }

    .cu-search {
        flex: 1;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 7px 10px;
        font-size: 12px;
        font-family: var(--font-body);
        color: #fff;
        outline: none;
        min-width: 0;
    }

    .cu-search::placeholder {
        color: rgba(255, 255, 255, 0.3);
    }

    .cu-search:focus {
        border-color: var(--primary);
    }

    .cu-btn-novo {
        padding: 7px 11px;
        border-radius: 8px;
        border: none;
        background: var(--primary);
        color: #fff;
        font-family: var(--font-title);
        font-size: 9px;
        letter-spacing: 1px;
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
    }

    .cu-btn-novo:hover {
        background: var(--primary-dark);
    }

    .cu-list {
        flex: 1;
        overflow-y: auto;
    }

    /* ── CAMPUS SIDEBAR (esquerda, 210px) ── */
    .cu-campus-side {
        width: 210px;
    }

    .cu-campus-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 13px;
        cursor: pointer;
        border-left: 3px solid transparent;
        border-bottom: 1px solid var(--border);
        transition: background 0.12s;
    }

    .cu-campus-item:hover {
        background: rgba(255, 255, 255, 0.04);
    }

    .cu-campus-item.active {
        border-left-color: var(--primary);
        background: rgba(0, 144, 152, 0.09);
    }

    .cu-campus-item.inativo {
        opacity: 0.45;
    }

    .cu-campus-thumb {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        object-fit: cover;
        flex-shrink: 0;
        border: 1px solid var(--border);
        background: var(--bg-input);
    }

    .cu-campus-thumb-ph {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        background: rgba(0, 144, 152, 0.15);
        border: 1px solid var(--border);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-title);
        font-size: 14px;
        font-weight: 700;
        color: var(--primary);
    }

    .cu-campus-info {
        flex: 1;
        min-width: 0;
    }

    .cu-campus-nome {
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .cu-campus-sub {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.4);
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .cu-campus-badge {
        font-size: 9px;
        font-family: var(--font-title);
        padding: 2px 7px;
        border-radius: 10px;
        background: var(--primary);
        color: #fff;
        flex-shrink: 0;
    }

    /* ── CULTOS SIDEBAR (meio, 235px) ── */
    .cu-cultos-side {
        width: 235px;
    }

    .cu-cultos-head-label {
        flex: 1;
        font-size: 11px;
        font-family: var(--font-title);
        letter-spacing: 0.5px;
        color: rgba(255, 255, 255, 0.6);
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    /* Agrupamento por dia */
    .cu-dia-header {
        padding: 4px 13px 3px;
        font-family: var(--font-title);
        font-size: 8px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        border-bottom: 1px solid var(--border);
    }

    /* Item de culto */
    .cu-item {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 10px 13px;
        cursor: pointer;
        border-left: 3px solid transparent;
        border-bottom: 1px solid var(--border);
        transition: filter 0.1s;
    }

    .cu-item:hover {
        filter: brightness(1.15);
    }

    .cu-item.active {
        filter: brightness(1.25);
    }

    .cu-item.inativo {

    }

    }

    .cu-dia-1 {
        background: rgba(46, 125, 50, 0.07);
    }

    .cu-dia-2 {
        background: rgba(130, 60, 200, 0.07);
    }

    .cu-dia-3 {
        background: rgba(200, 100, 0, 0.07);
    }

    .cu-dia-4 {
        background: rgba(0, 80, 180, 0.07);
    }

    .cu-dia-5 {
        background: rgba(160, 0, 80, 0.07);
    }

    .cu-dia-6 {
        background: rgba(80, 120, 0, 0.07);
    }

    .cu-item.cu-dia-0.active {
        border-left-color: rgba(0, 144, 152, 0.9);
    }

    .cu-item.cu-dia-1.active {
        border-left-color: rgba(46, 125, 50, 0.9);
    }

    .cu-item.cu-dia-2.active {
        border-left-color: rgba(130, 60, 200, 0.9);
    }

    .cu-item.cu-dia-3.active {
        border-left-color: rgba(200, 100, 0, 0.9);
    }

    .cu-item.cu-dia-4.active {
        border-left-color: rgba(0, 80, 180, 0.9);
    }

    .cu-item.cu-dia-5.active {
        border-left-color: rgba(160, 0, 80, 0.9);
    }

    .cu-item.cu-dia-6.active {

    }

    .cu-avatar {

        height: 36px;

        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: var(--font-title);
        font-size: 7.5px;
        letter-spacing: 0.5px;
        text-transform: uppercase;

        line-height: 1.2;
        text-align: center;

    .cu-avatar .hora {

        font-weight: 700;

    }

    .cu-item-info {

        min-width: 0;
    }

    .cu-item-nome {
        font-size: 12.5px;
        font-weight: 600;
        color: #fff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .cu-item-sub {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.4);
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .cu-pill-off {

    /* ── PAINEL DIREITO ── */
    .cu-panel {

    /* Breadcrumb */

    /* Form header */

    .cu-form-header-av {

    /* Formulario */
    .cu-form {

    }

    .cu-section-title {

    .cu-label {

    .cu-input, .cu-select, .cu-textarea {

        border: 1px solid var(--border);

    .cu-toggle-row {

    .cu-img-preview.visible {

    /* Mensagem feedback */

    /* Accoes */
    .cu-actions {

    /* Imagem campus — igual ao pastores */

<div class="cu-wrap" style="position:relative">
    <button class="cu-toggle-btn" id="cu-toggle-btn" onclick="cu_toggleSide()" title="Mostrar/ocultar lista">☰</button>
    <!-- SIDEBAR CAMPUS -->
    <div class="cu-side cu-campus-side">
        <div class="cu-side-head">
            <input class="cu-search" id="cu-campus-search"
                   placeholder="Campus..." oninput="cu_filtrarCampus()">
            <button class="cu-btn-novo" onclick="cu_novoCampus()">+ Campus</button>
        </div>
        <div class="cu-list" id="cu-campus-list">
            <div style="padding:20px;text-align:center;font-size:12px;color:rgba(255,255,255,0.3)">
                A carregar...
            </div>
        </div>
    </div>

    <!-- SIDEBAR CULTOS -->
    <div class="cu-side cu-cultos-side">
        <div class="cu-side-head" id="cu-cultos-head">
            <span class="cu-cultos-head-label" style="color:rgba(255,255,255,0.3)">
                Seleciona um campus
            </span>
        </div>
        <div class="cu-list" id="cu-culto-list"></div>
    </div>

    <!-- PAINEL DIREITO -->
    <div class="cu-panel" id="cu-panel">
        <div class="cu-panel-empty">
            <div class="cu-panel-empty-icon">
                <svg width="24" height="24" fill="none" stroke="currentColor"
                     stroke-width="1.5" viewBox="0 0 24 24">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
            </div>
            <div class="cu-panel-empty-txt">Seleciona um campus</div>
        </div>
    </div>

</div>

<script>
    // ── ESTADO ────────────────────────────────────────────────────────────────────
    var cu = {
        campus: [],
        cultos: [],
        campusId: null,
        cultoId: null,
    };

    var CU_DIAS_MAP = {
        'Domingo': 0, 'Segunda-feira': 1, 'Terca-feira': 2,
        'Quarta-feira': 3, 'Quinta-feira': 4, 'Sexta-feira': 5, 'Sabado': 6,
    };
    var CU_CORES = [
        {bg: 'rgba(0,144,152,0.15)', fg: 'var(--primary)'},
        {bg: 'rgba(46,125,50,0.15)', fg: '#4caf50'},
        {bg: 'rgba(130,60,200,0.15)', fg: '#ab73e8'},
        {bg: 'rgba(200,100,0,0.15)', fg: '#ffa040'},
        {bg: 'rgba(0,80,180,0.15)', fg: '#5090e0'},
        {bg: 'rgba(160,0,80,0.15)', fg: '#e060a0'},
        {bg: 'rgba(80,120,0,0.15)', fg: '#a0c030'},
    ];
    var DIAS_OPCOES = [
        'Domingo', 'Segunda-feira', 'Terca-feira', 'Quarta-feira',
        'Quinta-feira', 'Sexta-feira', 'Sabado'
    ];

    function cu_cor(dia) {
        var idx = CU_DIAS_MAP[dia];
        return CU_CORES[idx !== undefined ? idx : 0];
    }

    function cu_diaIdx(dia) {
        var idx = CU_DIAS_MAP[dia];
        return idx !== undefined ? idx : 0;
    }

    window.cu_toggleSide = function() {
        const wrap = document.querySelector('.cu-wrap');
        const s1   = document.getElementById('cu-campus-list').closest('.cu-side');
        const s2   = document.getElementById('cu-culto-list').closest('.cu-side');
        const btn  = document.getElementById('cu-toggle-btn');
        const collapsed = s1.classList.toggle('collapsed');
        s2.classList.toggle('collapsed', collapsed);
        wrap.classList.toggle('cu-sides-collapsed', collapsed);
        btn.textContent = collapsed ? '▶' : '☰';
    };

    // ── INIT ──────────────────────────────────────────────────────────────────────
    async function cu_init() {
        try {
            cu.campus = await sb('campus?select=*&order=nome') || [];
            cu.cultos = await sb('cultos?select=*&order=dia_semana,hora_inicio') || [];
            await cu_autoInativar();
        } catch (e) {
            console.error('[Cultos] Erro ao carregar:', e);
            cu.campus = [];
            cu.cultos = [];
        }
        cu_renderCampusList();
        cu_renderCultoList();
    }

    // ── AUTO-INATIVAR cultos com data especifica expirada ─────────────────────────
    async function cu_autoInativar() {
        var hoje = new Date().toISOString().split('T')[0];
        var expirados = cu.cultos.filter(function (c) {
            return c.data_especifica && c.data_especifica < hoje && c.ativo === true;
        });
        if (!expirados.length) return;
        console.log('[Cultos] Auto-inativando ' + expirados.length + ' culto(s) expirado(s)...');
        for (var c of expirados) {
            try {
                await sb('cultos?id=eq.' + c.id, {
                    method: 'PATCH',
                    body: JSON.stringify({ativo: false})
                });
                c.ativo = false;
            } catch (e) {
                console.warn('[Cultos] Erro ao auto-inativar ' + c.id, e);
            }
        }
    }

    // ── SIDEBAR CAMPUS ────────────────────────────────────────────────────────────
    function cu_renderCampusList() {
        var el = document.getElementById('cu-campus-list');
        if (!el) return;
        var q = (document.getElementById('cu-campus-search')?.value || '').toLowerCase();
        var lista = cu.campus.filter(function (c) {
            return !q ||
                (c.nome || '').toLowerCase().includes(q) ||
                (c.cidade || '').toLowerCase().includes(q);
        });

        if (!lista.length) {
            el.innerHTML = '<div class="cu-empty-side">Nenhum campus.<br>Clica em + Campus para adicionar.</div>';
            return;
        }

        var html = '';
        lista.forEach(function (c) {
            var ativo = c.ativo !== false;
            var active = cu.campusId === c.id ? ' active' : '';
            var inati = !ativo ? ' inativo' : '';
            var nCultos = cu.cultos.filter(function (x) {
                return x.campus_id === c.id;
            }).length;

            var thumb = c.imagem_url
                ? '<img class="cu-campus-thumb" src="' + c.imagem_url.replace(/"/g, '') + '" onerror="this.style.display=\'none\'">'
                : '<div class="cu-campus-thumb-ph">' + (c.nome || '?').charAt(0).toUpperCase() + '</div>';

            html +=
                '<div class="cu-campus-item' + active + inati + '" onclick="cu_selecionarCampus(\'' + c.id + '\')">' +
                thumb +
                '<div class="cu-campus-info">' +
                '<div class="cu-campus-nome">' + (c.nome || '—') + '</div>' +
                '<div class="cu-campus-sub">' + (c.cidade || (ativo ? 'Ativo' : 'Inativo')) + '</div>' +
                '</div>' +
                (nCultos ? '<span class="cu-campus-badge">' + nCultos + '</span>' : '') +
                '</div>';
        });
        el.innerHTML = html;
    }

    // ── SIDEBAR CULTOS ────────────────────────────────────────────────────────────
    function cu_renderCultoList() {
        var headEl = document.getElementById('cu-cultos-head');
        var el = document.getElementById('cu-culto-list');
        if (!el) return;

        if (!cu.campusId) {
            if (headEl) headEl.innerHTML =
                '<span class="cu-cultos-head-label" style="color:rgba(255,255,255,0.3)">Seleciona um campus</span>';
            el.innerHTML = '';
            return;
        }

        var campus = cu.campus.find(function (c) {
            return c.id === cu.campusId;
        });
        if (headEl) headEl.innerHTML =
            '<span class="cu-cultos-head-label">' + (campus ? campus.nome : '') + '</span>' +
            '<button class="cu-btn-novo" onclick="cu_novoCulto()">+ Culto</button>';

        var lista = cu.cultos.filter(function (c) {
            return c.campus_id === cu.campusId;
        });
        if (!lista.length) {
            el.innerHTML = '<div class="cu-empty-side">Sem cultos neste campus.<br>Clica em + Culto para adicionar.</div>';
            return;
        }

        // Agrupar por dia da semana
        var grupos = {};
        lista.forEach(function (c) {
            var d = c.dia_semana || 'Sem dia';
            if (!grupos[d]) grupos[d] = [];
            grupos[d].push(c);
        });

        var html = '';
        var ordem = ['Domingo', 'Segunda-feira', 'Terca-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sabado', 'Sem dia'];
        ordem.forEach(function (dia) {
            if (!grupos[dia]) return;
            var cor = cu_cor(dia);
            var idx = cu_diaIdx(dia);

            html += '<div class="cu-dia-header cu-dia-' + idx +
                '" style="color:' + cor.fg + ';background:' + cor.bg + '">' + dia + '</div>';

            grupos[dia].forEach(function (c) {
                var ativo = c.ativo !== false;
                var horaStr = c.hora_inicio ? c.hora_inicio.slice(0, 5) : '—';
                var diaAb = c.dia_semana ? c.dia_semana.slice(0, 3).toUpperCase() : 'ESP';
                var active = cu.cultoId === c.id ? ' active' : '';
                var sub = c.data_especifica
                    ? 'Data: ' + c.data_especifica
                    : [c.hora_inicio ? c.hora_inicio.slice(0, 5) : null,
                        c.hora_fim ? c.hora_fim.slice(0, 5) : null]
                        .filter(Boolean).join(' – ')
                    + (c.recorrente ? ' · Recorrente' : '');

                html +=
                    '<div class="cu-item cu-dia-' + idx + (ativo ? '' : ' inativo') + active +
                    '" onclick="cu_selecionarCulto(\'' + c.id + '\')">' +
                    '<div class="cu-avatar" style="background:' + cor.bg + ';color:' + cor.fg + '">' +
                    '<span class="hora">' + horaStr + '</span>' + diaAb +
                    '</div>' +
                    '<div class="cu-item-info">' +
                    '<div class="cu-item-nome">' + (c.nome || '—') + '</div>' +
                    '<div class="cu-item-sub">' + (sub || '—') + '</div>' +
                    '</div>' +

                    '</div>';

    function cu_atualizarPreview(url) {
        var box = document.getElementById('cu-img-box');
        if (!box) return;
        box.innerHTML = '<img src="' + url + '" alt="" style="max-width:100%;max-height:100%;object-fit:contain;border-radius:8px" onerror="this.parentElement.innerHTML=cu_imgPlaceholder()">';
    }

    window.cu_handleFile = async function (input) {
        var file = input.files?.[0];
        if (!file) return;
        cu_atualizarPreview(URL.createObjectURL(file));
        var status = document.getElementById('cu-img-status');
        if (status) {
            status.textContent = 'A comprimir...';
            status.style.color = 'rgba(255,255,255,0.35)';
        }
        try {
            var blob = await new Promise(function (resolve) {
                var img = new Image();
                var url = URL.createObjectURL(file);
                img.onload = function () {
                    var w = img.width, h = img.height, max = 800;
                    if (w > max || h > max) {
                        var r = Math.min(max / w, max / h);
                        w = Math.round(w * r);
                        h = Math.round(h * r);
                    }
                    var cv = document.createElement('canvas');
                    cv.width = w;
                    cv.height = h;
                    cv.getContext('2d').drawImage(img, 0, 0, w, h);
                    URL.revokeObjectURL(url);
                    cv.toBlob(function (b) {
                        resolve(b);
                    }, 'image/jpeg', 0.82);
                };
                img.onerror = function () {
                    URL.revokeObjectURL(url);
                    resolve(file);
                };
                img.src = url;
            });
            var fname = 'campus/' + Date.now() + '-' + Math.random().toString(36).slice(2) + '.jpg';
            if (status) status.textContent = 'A fazer upload...';
            var res = await fetch(window.SUPABASE_URL + '/storage/v1/object/imagens/' + fname, {
                method: 'POST',
                headers: {
                    'apikey': window.SUPABASE_ANON_KEY,
                    'Authorization': 'Bearer ' + window.SUPABASE_ANON_KEY,
                    'Content-Type': 'image/jpeg',
                    'x-upsert': 'true',
                },
                body: blob,
            });
            if (!res.ok) {
                var err = await res.json().catch(function () {
                    return {};
                });
                throw new Error(err?.error || err?.message || 'Erro ' + res.status);
            }
            var pub = window.SUPABASE_URL + '/storage/v1/object/public/imagens/' + fname;
            document.getElementById('cu-foto-url').value = pub;
            document.getElementById('cu-img-url-text').value = pub;
            cu_atualizarPreview(pub);
            if (status) {
                status.textContent = 'Upload concluido (' + Math.round(blob.size / 1024) + ' KB)';
                status.style.color = '#70d988';
            }
        } catch (e) {
            if (status) {
                status.textContent = 'Erro: ' + e.message;
                status.style.color = '#ff7070';
            }
        }
        input.value = '';
    };

    window.cu_previewImg = function () {
        var inp = document.getElementById('cf-camp-img');
        var img = document.getElementById('cu-img-preview');
        if (!inp || !img) return;
        var url = inp.value.trim();
        if (url) {
            img.src = url;
            img.classList.add('visible');
            img.onerror = function () {
                img.classList.remove('visible');

        } else {
            img.classList.remove('visible');
            img.src = '';

    };

    // ── GUARDAR CAMPUS ────────────────────────────────────────────────────────────
    window.cu_guardarCampus = async function (id) {
        var get = function (k) {
            var el = document.getElementById('cf-camp-' + k);
            return el ? (el.value || '').trim() || null : null;
        };
        var nome = get('nome');
        if (!nome) {
            cu_showMsg('Nome obrigatorio.', 'error');
            return;
        }

        var body = {
            nome: nome,
            cidade: get('cidade'),
            endereco: get('endereco'),
            descricao: get('descricao'),
            imagem_url: document.getElementById('cu-foto-url')?.value?.trim() || null,
            ativo: document.getElementById('cf-camp-ativo')?.checked ?? true,
        };

        var btn = document.getElementById('cu-btn-save');
        if (btn) {
            btn.disabled = true;
            btn.textContent = 'A guardar...';
        }

        try {
            if (!id) {
                await sb('campus', {method: 'POST', body: JSON.stringify(body)});
            } else {
                await sb('campus?id=eq.' + id, {method: 'PATCH', body: JSON.stringify(body)});
            }
            cu_showMsg('Campus guardado!', 'success');
            cu.campus = await sb('campus?select=*&order=nome') || [];
            cu_renderCampusList();

            if (!id) {
                var criado = cu.campus.find(function (x) {
                    return x.nome === nome;
                });
                if (criado) {
                    cu.campusId = criado.id;
                    cu_renderCampusList();
                    cu_renderCultoList();
                    setTimeout(function () {
                        cu_renderFormCampus(criado);
                    }, 600);
                }
            } else {
                var updated = cu.campus.find(function (x) {
                    return x.id === id;
                });
                if (updated) setTimeout(function () {
                    cu_renderFormCampus(updated);
                }, 600);
            }
        } catch (e) {
            cu_showMsg('Erro: ' + (e?.message || JSON.stringify(e)), 'error');
            if (btn) {
                btn.disabled = false;
                btn.textContent = id ? 'Guardar Alteracoes' : 'Criar Campus';
            }
        }
    };

    // ── TOGGLE CAMPUS ─────────────────────────────────────────────────────────────
    window.cu_toggleCampus = async function (id, ativoAtual) {
        if (!confirm(ativoAtual ? 'Inativar este campus?' : 'Ativar este campus?')) return;
        try {
            await sb('campus?id=eq.' + id, {method: 'PATCH', body: JSON.stringify({ativo: !ativoAtual})});
            cu.campus = await sb('campus?select=*&order=nome') || [];
            cu_renderCampusList();
            var c = cu.campus.find(function (x) {
                return x.id === id;
            });
            if (c) cu_renderFormCampus(c);
        } catch (e) {
            alert('Erro: ' + (e?.message || JSON.stringify(e)));
        }
    };

    // ── FORM CULTO — existente ────────────────────────────────────────────────────
    function cu_renderFormCulto(c) {
        var panel = document.getElementById('cu-panel');
        if (!panel) return;
        var ativo = c.ativo !== false;
        var cor = cu_cor(c.dia_semana);
        var horaStr = c.hora_inicio ? c.hora_inicio.slice(0, 5) : '—';
        var diaAb = (c.dia_semana || '').slice(0, 3).toUpperCase() || 'ESP';
        var campus = cu.campus.find(function (x) {
            return x.id === c.campus_id;
        });

        panel.innerHTML =
            '<div class="cu-breadcrumb">' +
            (campus
                ? '<span class="cu-breadcrumb-link" onclick="cu_selecionarCampus(\'' + campus.id + '\')">' + campus.nome + '</span> › '
                : '') +
            '<span class="cu-breadcrumb-cur">' + (c.nome || '—') + '</span>' +
            '</div>' +
            '<div class="cu-form-header">' +
            '<div class="cu-form-header-av" style="background:' + cor.bg + ';color:' + cor.fg + '">' +
            '<span class="hora">' + horaStr + '</span>' + diaAb +
            '</div>' +
            '<div class="cu-form-header-info">' +
            '<div class="cu-form-title">' + (c.nome || '—') + '</div>' +
            '<div class="cu-form-sub">' +
            (c.dia_semana || '') +
            (c.hora_inicio ? ' · ' + c.hora_inicio.slice(0, 5) : '') +
            (c.hora_fim ? ' – ' + c.hora_fim.slice(0, 5) : '') +
            (c.data_especifica ? ' · ' + c.data_especifica : '') +
            (!ativo ? ' · <span style="color:rgba(255,255,255,0.3)">Inativo</span>' : '') +
            '</div>' +
            '</div>' +
            '</div>' +
            cu_buildFormCulto(c);
    }

    // ── FORM CULTO — novo ─────────────────────────────────────────────────────────
    function cu_renderFormNovoCulto() {
        var panel = document.getElementById('cu-panel');
        if (!panel) return;
        var campus = cu.campus.find(function (x) {
            return x.id === cu.campusId;
        });

        panel.innerHTML =
            '<div class="cu-breadcrumb">' +
            (campus
                ? '<span class="cu-breadcrumb-link" onclick="cu_selecionarCampus(\'' + campus.id + '\')">' + campus.nome + '</span> › '
                : '') +
            '<span class="cu-breadcrumb-cur">Novo Culto</span>' +
            '</div>' +
            '<div class="cu-form-header">' +
            '<div class="cu-form-header-av" style="background:rgba(0,144,152,0.15);color:var(--primary);font-size:16px">+</div>' +
            '<div class="cu-form-header-info">' +
            '<div class="cu-form-title">Novo Culto</div>' +
            '<div class="cu-form-sub">' + (campus ? campus.nome : 'Campus') + '</div>' +
            '</div>' +
            '</div>' +
            cu_buildFormCulto(null);
    }

    // ── HTML FORM CULTO ───────────────────────────────────────────────────────────
    function cu_buildFormCulto(c) {
        var fv = function (k, d) {
            var v = c ? c[k] : undefined;
            return (v === undefined || v === null) ? (d !== undefined ? d : '') : v;
        };
        var diaOpts = '<option value="">Selecionar...</option>' +
            DIAS_OPCOES.map(function (d) {
                return '<option value="' + d + '" ' + (fv('dia_semana') === d ? 'selected' : '') + '>' + d + '</option>';
            }).join('');
        var id = c ? c.id : '';
        var ativo = c ? (c.ativo !== false) : true;

        return '<div class="cu-form">' +
            '<div class="cu-msg" id="cu-msg"></div>' +

            '<div class="cu-section-title">Identificacao</div>' +
            '<div class="cu-field-grid">' +
            '<div class="cu-field full">' +
            '<label class="cu-label">Nome *</label>' +
            '<input class="cu-input" id="cf-nome" type="text" value="' + fv('nome') + '" placeholder="Ex: Culto de Domingo">' +
            '</div>' +
            '<div class="cu-field">' +
            '<label class="cu-label">Dia da Semana</label>' +
            '<select class="cu-select" id="cf-dia">' + diaOpts + '</select>' +
            '</div>' +
            '<div class="cu-field">' +
            '<label class="cu-label">Data Especifica</label>' +
            '<input class="cu-input" id="cf-data" type="date" value="' + fv('data_especifica') + '" title="So para cultos de data unica">' +
            '</div>' +
            '</div>' +

            '<div class="cu-section-title">Horario</div>' +
            '<div class="cu-field-grid">' +
            '<div class="cu-field">' +
            '<label class="cu-label">Hora de Inicio</label>' +
            '<input class="cu-input" id="cf-inicio" type="time" value="' + fv('hora_inicio') + '">' +
            '</div>' +
            '<div class="cu-field">' +
            '<label class="cu-label">Hora de Fim</label>' +
            '<input class="cu-input" id="cf-fim" type="time" value="' + fv('hora_fim') + '">' +
            '</div>' +
            '<div class="cu-field">' +
            '<label class="cu-toggle-row">' +
            '<input type="checkbox" id="cf-recorrente" ' + (fv('recorrente', true) ? 'checked' : '') + '>' +
            'Recorrente (todas as semanas)' +
            '</label>' +
            '</div>' +
            '<div class="cu-field">' +
            '<label class="cu-toggle-row">' +
            '<input type="checkbox" id="cf-ativo" ' + (ativo ? 'checked' : '') + '>' +
            'Ativo' +
            '</label>' +
            '</div>' +
            '</div>' +

            '<div class="cu-section-title">Descricao</div>' +
            '<div class="cu-field-grid">' +
            '<div class="cu-field full">' +
            '<label class="cu-label">Descricao / Notas</label>' +
            '<textarea class="cu-textarea" id="cf-descricao" placeholder="Informacoes adicionais...">' + fv('descricao') + '</textarea>' +
            '</div>' +
            '</div>' +

            '<div class="cu-actions">' +
            (c ? '<button class="cu-btn-toggle ' + (ativo ? 'inativar' : 'ativar') +
                '" onclick="cu_toggleCulto(\'' + id + '\',' + ativo + ')">' +
                (ativo ? 'Inativar' : 'Ativar') + '</button>' : '') +
            '<button class="cu-btn-cancel" onclick="cu_selecionarCampus(\'' + cu.campusId + '\')">Cancelar</button>' +
            '<button class="cu-btn-save" id="cu-btn-save" onclick="cu_guardarCulto(\'' + id + '\')">' +
            (c ? 'Guardar Alteracoes' : 'Criar Culto') +
            '</button>' +
            '</div>' +
            '</div>';
    }

    // ── GUARDAR CULTO ─────────────────────────────────────────────────────────────
    window.cu_guardarCulto = async function (id) {
        var get = function (k) {
            var el = document.getElementById('cf-' + k);
            return el ? (el.value || '').trim() || null : null;
        };
        var chk = function (k) {
            var el = document.getElementById('cf-' + k);
            return el ? el.checked : false;
        };

        var nome = get('nome');
        if (!nome) {
            cu_showMsg('Nome obrigatorio.', 'error');
            return;
        }
        if (!cu.campusId) {
            cu_showMsg('Campus nao definido.', 'error');
            return;
        }

        var body = {
            nome: nome,
            campus_id: cu.campusId,
            dia_semana: get('dia'),
            data_especifica: get('data'),
            hora_inicio: get('inicio'),
            hora_fim: get('fim'),
            recorrente: chk('recorrente'),
            descricao: get('descricao'),
            ativo: chk('ativo'),
        };

        var btn = document.getElementById('cu-btn-save');
        if (btn) {
            btn.disabled = true;
            btn.textContent = 'A guardar...';
        }

        try {
            if (!id) {
                await sb('cultos', {method: 'POST', body: JSON.stringify(body)});
            } else {
                await sb('cultos?id=eq.' + id, {method: 'PATCH', body: JSON.stringify(body)});
            }
            cu_showMsg('Guardado com sucesso!', 'success');
            cu.cultos = await sb('cultos?select=*&order=dia_semana,hora_inicio') || [];
            cu_renderCultoList();
            cu_renderCampusList(); // atualizar badges de contagem

            if (id) {
                var updated = cu.cultos.find(function (x) {
                    return x.id === id;
                });
                if (updated) setTimeout(function () {
                    cu_renderFormCulto(updated);
                }, 600);
            } else {
                var criado = cu.cultos.find(function (x) {
                    return x.nome === nome && x.campus_id === cu.campusId;
                });
                if (criado) {
                    cu.cultoId = criado.id;
                    cu_renderCultoList();
                    setTimeout(function () {
                        cu_renderFormCulto(criado);
                    }, 600);
                }
            }
        } catch (e) {
            cu_showMsg('Erro: ' + (e?.message || JSON.stringify(e)), 'error');
            if (btn) {
                btn.disabled = false;
                btn.textContent = id ? 'Guardar Alteracoes' : 'Criar Culto';
            }
        }
    };

    // ── TOGGLE CULTO ──────────────────────────────────────────────────────────────
    window.cu_toggleCulto = async function (id, ativoAtual) {
        if (!confirm(ativoAtual ? 'Inativar este culto?' : 'Ativar este culto?')) return;
        try {
            await sb('cultos?id=eq.' + id, {method: 'PATCH', body: JSON.stringify({ativo: !ativoAtual})});
            cu.cultos = await sb('cultos?select=*&order=dia_semana,hora_inicio') || [];
            cu_renderCultoList();
            var c = cu.cultos.find(function (x) {
                return x.id === id;
            });
            if (c) cu_renderFormCulto(c);
        } catch (e) {
            alert('Erro: ' + (e?.message || JSON.stringify(e)));
        }
    };

    // ── FECHAR ────────────────────────────────────────────────────────────────────
    window.cu_fechar = function () {
        cu.campusId = null;
        cu.cultoId = null;
        cu_renderCampusList();
        cu_renderCultoList();
        var panel = document.getElementById('cu-panel');
        if (panel) panel.innerHTML =
            '<div class="cu-panel-empty">' +
            '<div class="cu-panel-empty-icon">' +
            '<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">' +
            '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>' +
            '<polyline points="9 22 9 12 15 12 15 22"/>' +
            '</svg>' +
            '</div>' +
            '<div class="cu-panel-empty-txt">Seleciona um campus</div>' +
            '</div>';
    };

    // ── MENSAGEM ──────────────────────────────────────────────────────────────────
    function cu_showMsg(txt, tipo) {
        var el = document.getElementById('cu-msg');
        if (!el) return;
        el.textContent = txt;
        el.className = 'cu-msg ' + tipo;
        el.scrollIntoView({behavior: 'smooth', block: 'nearest'});
        if (tipo === 'success') setTimeout(function () {
            el.className = 'cu-msg';
        }, 3000);
    }

    // ── ARRANCAR ──────────────────────────────────────────────────────────────────
    window.cu_init = cu_init;
    cu_init();
</script>
