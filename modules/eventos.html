<div class="ev-wrap" id="ev-wrap">
    <!-- SIDEBAR -->
    <div class="ev-side" id="ev-side">
        <div class="ev-side-head">
            <div class="ev-tabs">
                <button class="ev-tab active" id="ev-tab-0" onclick="evSetTab(0)">Eventos</button>
                <button class="ev-tab" id="ev-tab-1" onclick="evSetTab(1)">Tipos</button>
            </div>
            <div id="ev-filtros-wrap">
                <input class="ev-search" id="ev-search" type="text" placeholder="Pesquisar evento..."
                       oninput="evFiltrar()">
                <div class="ev-filtros">
                    <div class="ev-filtro-titulo">Tipo de Reuniao</div>
                    <select class="ev-filtro-select" id="ev-filtro-tipo" onchange="evFiltrar()">
                        <option value="">Todos os tipos</option>
                    </select>
                    <div class="ev-filtro-titulo">Estado</div>
                    <div class="ev-filtro-grupo">
                        <button class="ev-filtro-chip" data-st="aberto" onclick="evToggleSt(this)">Aberto</button>
                        <button class="ev-filtro-chip" data-st="em_curso" onclick="evToggleSt(this)">Em Curso</button>
                        <button class="ev-filtro-chip" data-st="concluido" onclick="evToggleSt(this)">Concluido</button>
                        <button class="ev-filtro-chip" data-st="cancelado" onclick="evToggleSt(this)">Cancelado</button>

<script>
    (function () {

        /* ── STATE ────────────────────────────────────────────────────────────── */
        let evInscricoes = [];
        let evTab = 0;
        let evEventos = [];
        let evPresencas = [];
        let evLidMin = {};
        let evAtivo = null;
        let evView = 'info';   // 'info' | 'presencas' | 'inscricoes'
        let evFiltroQ = '';
        let evFiltroSt = new Set();
        let evFiltroTipo = '';
        let evPresSearchQ = '';
        let _motivoId = null;
        let evTipoIdx = null;

        const ST = {
            aberto: {label: 'Aberto', cls: 'badge-green'},
            em_curso: {label: 'Em Curso', cls: 'badge-primary'},
            concluido: {label: 'Concluido', cls: 'badge-gray'},
            cancelado: {label: 'Cancelado', cls: 'badge-red'}
        };

        const PAG_LABEL = {
            dinheiro: 'Dinheiro',
            mbway: 'MBWay',
            multibanco: 'Multibanco',
            transferencia: 'Transferência',
            presencial: 'Presencial',
            outro: 'Outro'
        };

        const _sb = window.sb;

        /* ── HELPERS ──────────────────────────────────────────────────────────── */
        function getTipos() {
            try {
                const s = localStorage.getItem('zion_tipos_evento');
                return s ? JSON.parse(s) : [
                    'Reuniao de Lideres', 'Culto Especial', 'Conferencia', 'Retiro',
                    'Treinamento', 'Workshop', 'Conferencia de Jovens', 'Encontro de Casais',
                    'Culto de Oracao', 'Seminario', 'Outro'
                ];
            } catch {
                return [];
            }
        }

        function saveTipos(l) {
            localStorage.setItem('zion_tipos_evento', JSON.stringify(l));
        }

        /* Extrai nome de uma linha de presença (membro ou visitante) */
        function _presNome(p) {
            if (p.membros?.nome) return p.membros.nome;
            try {
                const obs = JSON.parse(p.observacoes || '{}');
                if (obs.nome) return obs.nome;
                if (obs.email) return obs.email; 
            } catch {}
            return '(Visitante)';
        }

        function _presObs(p) {
            try {
                return JSON.parse(p.observacoes || '{}');
            } catch {
                return {};
            }
        }

        function _isVisitante(p) {
            return !p.membro_id;
        }

        /* ── AUTO-FILL ────────────────────────────────────────────────────────── */
        function evOnTipoChange(tipo) {
            const v = document.getElementById('fe_valor');
            if (!v || v.value) return;
            if (tipo === 'Workshop') v.value = '10.00';
        }

        /* ── LINK PÚBLICO ────────────────────────────────────────────────────── */
        function evCopiarLinkInscricao(evId) {
            const base = window.location.origin + window.location.pathname.replace(/[^/]*$/, '');
            const url = `${base}inscricao.html?e=${evId}`;
            navigator.clipboard?.writeText(url)
                .then(() => alert('Link de inscrição copiado!'))
                .catch(() => {
                    const el = document.createElement('textarea');
                    el.value = url;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    el.remove();
                    alert('Link copiado!');
                });
        }

        /* ════════════════════════════════════════════════════════════════════════
           FILA DE PAGAMENTO / INSCRIÇÕES
        ════════════════════════════════════════════════════════════════════════ */
        async function evVerInscricoes(id) {
            evView = 'inscricoes';
            evAtivo = evEventos.find(e => e.id === id) || evAtivo;
            evInscricoes = await _sb(`evento_inscricoes?evento_id=eq.${id}&order=created_at`) || [];
            evRenderFilaPagamento();
        }

        function evRenderFilaPagamento() {
            const ev = evAtivo;
            if (!ev) return;
            const pendentes = evInscricoes.filter(i => i.status === 'pendente');
            const pagos = evInscricoes.filter(i => i.status === 'pago');
            const cancelados = evInscricoes.filter(i => i.status === 'cancelado');
            const valor = Number(ev.valor) || 0;

            /* Capacidade -------------------------------------------------------- */
            const capBase = Number(ev.capacidade) || 0;
            const capExtra = Number(ev.capacidade_extra) || 0;
            const capTotal = capBase + capExtra;
            const ocupados = pendentes.length + pagos.length; // activos (não cancelados)
            const capAtingida = capTotal > 0 && ocupados >= capTotal;
            const capPct = capTotal > 0 ? Math.min(100, Math.round(ocupados / capTotal * 100)) : 0;

            /* Numeração global por ordem de entrada (created_at) ---------------- */
            /* evInscricoes já vem sorted por created_at da query              */
            const numMap = {};
            evInscricoes.forEach((i, idx) => {
                numMap[i.id] = idx + 1;
            });

            const totalPago = pagos.length * valor;
            const totalPendente = pendentes.length * valor;
            const totalGeral = (pagos.length + pendentes.length) * valor;

            const _igLabel = {
                membro: 'Membro',
                em_processo: 'Em Processo',
                visitante: 'Visitante',
                nao_membro: 'Não Membro'
            };
            const _igCls = {
                membro: 'badge-primary',
                em_processo: 'badge-gray',
                visitante: 'badge-gray',
                nao_membro: 'badge-gray'
            };

            /* Linha de inscrição ------------------------------------------------ */
            const _row = (i, tipo) => {
                // tipo: 'pendente' | 'pago' | 'cancelado'
                const lbl = _igLabel[i.status_igreja] || i.status_igreja || '—';
                const cls = _igCls[i.status_igreja] || 'badge-gray';
                const link = i.membro_id
                    ? `<span style="font-size:9px;color:var(--primary-dark)">✓ Membro vinculado</span>`
                    : `<span style="font-size:9px;color:var(--text-faint)">Sem vínculo automático</span>`;
                const pagoDt = i.pago_em
                    ? `<div style="font-size:10px;color:var(--text-faint);margin-top:2px">
                       Pago em ${new Date(i.pago_em).toLocaleDateString('pt-PT', {
                        day: '2-digit',
                        month: 'short',
                        hour: '2-digit',
                        minute: '2-digit'
                    })}
                       ${i.forma_pagamento ? ` · <strong>${PAG_LABEL[i.forma_pagamento] || i.forma_pagamento}</strong>` : ''}
                   </div>` : '';

                /* Badge de número global */
                const numGlobal = numMap[i.id] || '—';
                const numBadgeColor = tipo === 'cancelado' ? 'var(--text-faint)' : tipo === 'pago' ? 'var(--green)' : 'var(--primary-dark)';
                const numBadgeBg = tipo === 'cancelado' ? 'var(--bg-input)' : tipo === 'pago' ? 'rgba(46,125,50,.12)' : 'var(--primary-faint)';

                let btnsHtml = '';
                if (tipo === 'pendente') {
                    btnsHtml = `<div style="display:flex;gap:5px;flex-wrap:wrap">
                    <button class="ev-btn success" style="font-size:9px;padding:5px 10px"
                        onclick="evMarcarPago('${i.id}')">✓ Pago${valor > 0 ? ' (' + valor.toFixed(2) + '€)' : ''}</button>
                    <button class="ev-btn danger" style="font-size:9px;padding:5px 10px"

        /* ── CONFIRMAR PAGAMENTO ───────────────────────────────────────────────── */
        async function evMarcarPago(inscricaoId) {
            const insc = evInscricoes.find(i => i.id === inscricaoId);
            if (!insc) return;
            const valor = Number(evAtivo?.valor) || 0;

            if (!confirm(`Confirmar pagamento${valor > 0 ? ' de ' + valor.toFixed(2) + ' €' : ''} de:\n\n${insc.nome}\n${insc.email}\n${insc.telemovel || ''}`)) return;

            const metodo = await evEscolherMetodoPagamento();
            if (metodo === null) return;

            try {
                /* PATCH único — sem duplicação */
                await _sb(`evento_inscricoes?id=eq.${inscricaoId}`, {
                    method: 'PATCH',
                    body: JSON.stringify({status: 'pago', pago_em: new Date().toISOString(), forma_pagamento: metodo})
                });

                /* Adiciona à lista de presenças */
                if (evAtivo) {
                    if (insc.membro_id) {
                        const existing = await _sb(`evento_presencas?evento_id=eq.${evAtivo.id}&membro_id=eq.${insc.membro_id}&select=id`).catch(() => []);
                        if (!existing?.length) {
                            await _sb('evento_presencas', {
                                method: 'POST',
                                body: JSON.stringify([{
                                    evento_id: evAtivo.id,
                                    membro_id: insc.membro_id,
                                    status: 'pendente'
                                }])
                            });
                        }
                    } else {
                        /* Visitante: guarda nome/email em observacoes */
                        /* Verifica duplicado por inscricao_id antes de inserir */
                        const existingVisit = await _sb(
                            `evento_presencas?evento_id=eq.${evAtivo.id}&membro_id=is.null&select=id,observacoes`
                        ).catch(() => []) || [];
                        const jaAdicionado = existingVisit.some(p => {
                            try { return JSON.parse(p.observacoes || '{}').inscricao_id === inscricaoId; }
                            catch { return false; }
                        });
                        if (!jaAdicionado) {
                            await _sb('evento_presencas', {
                                method: 'POST',
                                body: JSON.stringify([{
                                    evento_id: evAtivo.id,
                                    membro_id: null,
                                    status: 'pendente',
                                    observacoes: JSON.stringify({
                                        nome: insc.nome,
                                        email: insc.email,
                                        inscricao_id: insc.id,
                                        tipo: 'visitante'
                                    })
                                }])
                            }); /* SEM .catch silencioso — erro sobe para o try/catch principal e aparece no alert */
                        }
                    }
                }

                /* Atualiza cache local */
                const idx = evInscricoes.findIndex(i => i.id === inscricaoId);
                if (idx >= 0) {
                    evInscricoes[idx].status = 'pago';
                    evInscricoes[idx].pago_em = new Date().toISOString();
                    evInscricoes[idx].forma_pagamento = metodo;
                }
                evRenderFilaPagamento();

            } catch (err) {
                alert('Erro ao confirmar pagamento: ' + (err?.message || JSON.stringify(err)));
            }
        }

        /* ── CANCELAR PAGAMENTO CONFIRMADO (DESISTÊNCIA) ──────────────────────── */
        async function evCancelarPagamento(inscricaoId) {
            const insc = evInscricoes.find(i => i.id === inscricaoId);
            if (!insc) return;
            const valor = Number(evAtivo?.valor) || 0;

            if (!confirm(
                `Registar desistência de ${insc.nome}?\n\n` +
                `${valor > 0 ? `Valor a devolver: ${valor.toFixed(2)} €\n\n` : ''}` +
                `Esta acção irá:\n• Cancelar a inscrição\n• Remover da lista de presenças\n\n` +
                `A devolução do pagamento deve ser feita manualmente.`
            )) return;

            try {
                /* Cancela inscrição */
                await _sb(`evento_inscricoes?id=eq.${inscricaoId}`, {
                    method: 'PATCH',
                    body: JSON.stringify({status: 'cancelado'})
                });

                /* Remove da lista de presenças */
                if (evAtivo) {
                    if (insc.membro_id) {
                        await _sb(`evento_presencas?evento_id=eq.${evAtivo.id}&membro_id=eq.${insc.membro_id}`, {method: 'DELETE'}).catch(() => {
                        });
                    } else {
                        /* Visitante: tenta apagar por inscricao_id guardado em observacoes */
                        /* Não há FK directa — apaga presença null do evento se só houver uma */
                        const nullPres = await _sb(`evento_presencas?evento_id=eq.${evAtivo.id}&membro_id=is.null&select=id,observacoes`).catch(() => []) || [];
                        const match = nullPres.find(p => {
                            try {
                                return JSON.parse(p.observacoes || '{}').inscricao_id === inscricaoId;
                            } catch {
                                return false;
                            }
                        });
                        if (match) {
                            await _sb(`evento_presencas?id=eq.${match.id}`, {method: 'DELETE'}).catch(() => {
                            });
                        }
                    }
                }

                /* Atualiza cache */
                const idx = evInscricoes.findIndex(i => i.id === inscricaoId);
                if (idx >= 0) evInscricoes[idx].status = 'cancelado';

                evRenderFilaPagamento();

                if (valor > 0) {
                    alert(`Desistência registada.\n\nLembrete: devolução de ${valor.toFixed(2)} € para ${insc.nome} deve ser processada manualmente.`);
                }

            } catch (err) {
                alert('Erro ao registar desistência: ' + (err?.message || JSON.stringify(err)));
            }
        }

        /* ── CANCELAR INSCRIÇÃO PENDENTE ──────────────────────────────────────── */
        async function evCancelarInscricao(inscricaoId) {
            const insc = evInscricoes.find(i => i.id === inscricaoId);
            if (!insc || !confirm(`Cancelar inscrição de ${insc.nome}?`)) return;
            try {
                await _sb(`evento_inscricoes?id=eq.${inscricaoId}`, {
                    method: 'PATCH',
                    body: JSON.stringify({status: 'cancelado'})
                });
                const idx = evInscricoes.findIndex(i => i.id === inscricaoId);
                if (idx >= 0) evInscricoes[idx].status = 'cancelado';
                evRenderFilaPagamento();
            } catch (err) {
                alert('Erro ao cancelar: ' + (err?.message || JSON.stringify(err)));
            }
        }

            const tipos = getTipos();
            const sel = document.getElementById('ev-filtro-tipo');

            let lista = [...evEventos].sort((a, b) => new Date(b.data_inicio) - new Date(a.data_inicio));
            if (evFiltroQ) lista = lista.filter(e => (e.titulo || '').toLowerCase().includes(evFiltroQ.toLowerCase()));
            if (evFiltroSt.size) lista = lista.filter(e => evFiltroSt.has(e.status));
            if (evFiltroTipo) lista = lista.filter(e => e.tipo === evFiltroTipo);

            const ct = document.getElementById('ev-count');
            if (ct) ct.textContent = `${lista.length} evento(s)`;

            const list = document.getElementById('ev-list');
            if (!lista.length) {
                list.innerHTML = `<div style="padding:16px;font-size:12px;color:var(--text-faint)">Nenhum evento encontrado.</div>`;
                return;
            }

            const grupos = {em_curso: [], aberto: [], concluido: [], cancelado: []};
            lista.forEach(e => {
                (grupos[e.status || 'aberto'] = grupos[e.status || 'aberto'] || []).push(e);
            });
            const ord = ['em_curso', 'aberto', 'concluido', 'cancelado'];
            const lbs = {em_curso: 'Em Curso', aberto: 'Abertos', concluido: 'Concluidos', cancelado: 'Cancelados'};

            ord.forEach(g => {
                if (!grupos[g]?.length) return;

                        day: '2-digit',

                    </div>
                </div>`;
                });

        function evFiltrar() {

        function evToggleSt(btn) {
            const st = btn.dataset.st;
            if (evFiltroSt.has(st)) {
                evFiltroSt.delete(st);
                btn.classList.remove('active');

                evFiltroSt.add(st);
                btn.classList.add('active');
            }
            evRenderSide();
        }

           DETALHE EVENTO
           FIX: removido auto-redirect para presencas no fim da função

            evAtivo = evEventos.find(e => e.id === id) || null;

        function evRenderDetalhe() {
            const e = evAtivo;
            if (!e) {
                evPanelEmpty('Seleciona um evento.');
                return;
            }

            const st = ST[e.status] || ST.aberto;
            const dI = e.data_inicio ? new Date(e.data_inicio).toLocaleDateString('pt-PT', {
                weekday: 'long',
                day: 'numeric',
                month: 'long',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            }) : '—';
            const dF = e.data_fim ? new Date(e.data_fim).toLocaleDateString('pt-PT', {
                day: '2-digit',
                month: 'short',
                hour: '2-digit',
                minute: '2-digit'
            }) : '';
            const emC = e.status === 'em_curso';
            const ab = e.status === 'aberto';
            const conc = e.status === 'concluido';
            const canc = e.status === 'cancelado';

        /* ════════════════════════════════════════════════════════════════════════
           ACOES
        ════════════════════════════════════════════════════════════════════════ */
        async function evIniciar(id) {
            const ev = evEventos.find(e => e.id === id);
            if (!ev) return;
            const isL = ev.tipo === 'Reuniao de Lideres' || ev.tipo === 'Reunião de Líderes';
            if (!confirm(`Iniciar "${ev.titulo}"?${isL ? ' Todos os lideres serao adicionados automaticamente.' : ''}`)) return;
            await _sb(`eventos?id=eq.${id}`, {method: 'PATCH', body: JSON.stringify({status: 'em_curso'})});
            if (isL) {
                const l = await _sb('membros?select=id,nome&e_lider=eq.true&ativo=eq.true').catch(() => []);
                if (l?.length) await _sb('evento_presencas', {
                    method: 'POST',
                    body: JSON.stringify(l.map(x => ({evento_id: id, membro_id: x.id, status: 'pendente'})))
                });
            }
            await evRecarregar();
            evSelEvento(id);
        }

        async function evConcluir(id) {
            if (!confirm('Concluir evento? Pendentes serao marcados como faltaram.')) return;
            await _sb(`evento_presencas?evento_id=eq.${id}&status=eq.pendente`, {
                method: 'PATCH',
                body: JSON.stringify({status: 'faltou'})
            });
            await _sb(`eventos?id=eq.${id}`, {method: 'PATCH', body: JSON.stringify({status: 'concluido'})});
            evView = 'info';
            await evRecarregar();
            evSelEvento(id);
        }

        async function evCancelar(id) {
            if (!confirm('Cancelar este evento?')) return;
            await _sb(`eventos?id=eq.${id}`, {method: 'PATCH', body: JSON.stringify({status: 'cancelado'})});
            await evRecarregar();
            evSelEvento(id);
        }

        async function evExcluir(id) {
            const ev = evEventos.find(e => e.id === id);
            if (!ev) return;
            if (!confirm(`Excluir permanentemente "${ev.titulo}"?\n\nEsta acao nao pode ser desfeita. As presenças associadas tambem serao removidas.`)) return;
            await _sb(`evento_presencas?evento_id=eq.${id}`, {method: 'DELETE'}).catch(() => {
            });
            await _sb(`eventos?id=eq.${id}`, {method: 'DELETE'});
            evAtivo = null;
            evView = 'info';
            evEventos = evEventos.filter(e => e.id !== id);
            evRenderSide();
            evPanelEmpty('Evento excluido.');
        }

        async function evRecarregar() {
            evEventos = await _sb('eventos?select=*&order=data_inicio') || [];
            if (evAtivo) evAtivo = evEventos.find(e => e.id === evAtivo.id) || null;
            evRenderSide();
        }

        /* ════════════════════════════════════════════════════════════════════════
           QR CODE
        ════════════════════════════════════════════════════════════════════════ */
        async function evMostrarQR(id) {
            const ev = evEventos.find(e => e.id === id);
            if (!ev) return;
            let token = ev.qr_token;
            if (!token) {
                token = evGerarToken();
                await _sb(`eventos?id=eq.${id}`, {method: 'PATCH', body: JSON.stringify({qr_token: token})});
                ev.qr_token = token;
            }
            const base = window.location.origin + window.location.pathname.replace(/[^/]*$/, '');
            const url = `${base}presenca.html?e=${id}&t=${token}`;
            const safeNome = (ev.titulo || 'evento').replace(/'/g, '').replace(/\s+/g, '-').toLowerCase();

            const ov = document.createElement('div');
            ov.className = 'ev-qr-overlay';
            ov.id = 'ev-qr-ov';
            ov.onclick = x => {
                if (x.target === ov) ov.remove();
            };
            ov.innerHTML = `<div class="ev-qr-modal">
            <div class="ev-qr-title">QR Code de Presenca</div>
            <div class="ev-qr-sub">${ev.titulo}</div>
            <div class="ev-qr-canvas-wrap"><canvas id="ev-qr-cv" width="200" height="200"></canvas></div>
            <div class="ev-qr-url">${url}</div>
            <div class="ev-qr-btns">
                <button class="ev-btn" onclick="evCopiarURL('${url}')">Copiar Link</button>
                <button class="ev-btn primary" onclick="evDownloadQR('${safeNome}')">Download PNG</button>
                <button class="ev-btn" onclick="document.getElementById('ev-qr-ov').remove()">Fechar</button>
            </div></div>`;
            document.body.appendChild(ov);
            setTimeout(() => evDrawQR(document.getElementById('ev-qr-cv'), url), 60);
        }

        function evGerarToken() {
            const a = new Uint8Array(20);
            crypto.getRandomValues(a);
            return Array.from(a).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function evCopiarURL(url) {
            navigator.clipboard?.writeText(url).then(() => alert('Link copiado!')).catch(() => {
                const el = document.createElement('textarea');
                el.value = url;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                el.remove();
                alert('Link copiado!');
            });
        }

        function evDownloadQR(nome) {
            const c = document.getElementById('ev-qr-cv');
            if (!c) return;
            const a = document.createElement('a');
            a.download = `qr-${nome}.png`;
            a.href = c.toDataURL('image/png');
            a.click();
        }

        function evDrawQR(canvas, text) {
            if (window.QRCode) {
                _evRenderQR(canvas, text);
                return;
            }
            const s = document.createElement('script');
            s.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
            s.onload = () => _evRenderQR(canvas, text);
            s.onerror = () => _evQRFallback(canvas, text);
            document.head.appendChild(s);
        }

        function _evRenderQR(canvas, text) {
            try {
                const tmp = document.createElement('div');
                tmp.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:200px;height:200px';
                document.body.appendChild(tmp);
                new QRCode(tmp, {
                    text,
                    width: 200,
                    height: 200,
                    colorDark: '#005f65',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.M
                });
                setTimeout(() => {
                    const src = tmp.querySelector('canvas');
                    if (src) {
                        canvas.getContext('2d').drawImage(src, 0, 0, 200, 200);
                    } else {
                        const img = tmp.querySelector('img');
                        if (img) {
                            const i = new Image();
                            i.onload = () => canvas.getContext('2d').drawImage(i, 0, 0, 200, 200);
                            i.src = img.src;
                        }
                    }
                    tmp.remove();
                }, 150);
            } catch (e) {
                _evQRFallback(canvas, text);
            }
        }

        function _evQRFallback(canvas, text) {
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, 200, 200);
            ctx.fillStyle = '#005f65';
            ctx.textAlign = 'center';
            ctx.font = 'bold 11px monospace';
            ctx.fillText('Abrir link abaixo', 100, 90);
            ctx.font = '9px monospace';
            let y = 110, line = '';
            for (const c of text) {
                line += c;
                if (line.length > 30) {
                    ctx.fillText(line, 100, y);
                    y += 13;
                    line = '';
                }
            }
            if (line) ctx.fillText(line, 100, y);
        }

        function evSetPresSearch(v) {

        async function evVerPresencas(id) {
            evView = 'presencas';
            evAtivo = evEventos.find(e => e.id === id) || evAtivo;
            evPresencas = await _sb(`evento_presencas?select=*,membros(id,nome,telefone,foto_url)&evento_id=eq.${id}&order=created_at`) || [];

            if (!window.membros?.length) {
                window.membros = await _sb('membros?select=id,nome&ativo=eq.true&order=nome').catch(() => []) || [];
            }

            const mIds = evPresencas.map(p => p.membro_id).filter(Boolean);
            evLidMin = {};
            if (mIds.length) {
                const vs = await _sb(`membro_ministerios?select=membro_id,papel,ministerios(id,nome,tipo)&membro_id=in.(${mIds.join(',')})&ativo=eq.true`) || [];
                vs.forEach(v => {
                    if (!evLidMin[v.membro_id]) evLidMin[v.membro_id] = [];
                    evLidMin[v.membro_id].push({
                        papel: v.papel,
                        nome: v.ministerios?.nome || '—',
                        tipo: v.ministerios?.tipo || '—'
                    });
                });
            }
            evRenderPresencas();
        }
