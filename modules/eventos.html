        /* ── MARCAR PRESENÇA ──────────────────────────────────────────────────── */
        async function evMarcarPres(presId, st) {
            const patch = {status: st, registado_em: new Date().toISOString()};
            if (st === 'pendente') patch.motivo = '';
            await _sb(`evento_presencas?id=eq.${presId}`, {method: 'PATCH', body: JSON.stringify(patch)});
            const i = evPresencas.findIndex(x => x.id === presId);
            if (i >= 0) {
                evPresencas[i].status = st;
                if (st === 'pendente') evPresencas[i].motivo = '';
            }

            /* Atualiza contador do stats sem recriar o painel inteiro */
            const nP = evPresencas.filter(q => q.status === 'presente').length;
            const nF = evPresencas.filter(q => q.status === 'faltou').length;
            const nM = evPresencas.filter(q => q.status === 'faltou_motivo').length;
            const nPend = evPresencas.filter(q => q.status === 'pendente').length;
            const tot = evPresencas.length;
            const ev = evAtivo;
            const statsEl = document.getElementById('ev-pres-stats');
            if (statsEl && ev) {
                statsEl.innerHTML = `<div style="font-size:15px;font-weight:700;margin-bottom:6px">${ev.titulo}</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
                <span class="badge ${(ST[ev.status] || ST.aberto).cls}">${(ST[ev.status] || ST.aberto).label}</span>
                <span class="badge badge-green">Presentes: ${nP}</span>
                <span class="badge badge-red">Faltaram: ${nF + nM}</span>
                ${nM ? `<span class="badge badge-primary">Com motivo: ${nM}</span>` : ''}
                ${nPend ? `<span class="badge badge-gray">Pendentes: ${nPend}</span>` : ''}
                <span class="badge badge-gray">Total: ${tot}</span>
            </div>`;
            }
            evRenderPresBody();
        }

        /* ── REMOVER PRESENÇA ─────────────────────────────────────────────────── */
        async function evRemoverPresenca(presId) {
            const p = evPresencas.find(x => x.id === presId);
            const nome = _presNome(p);
            if (!confirm(`Remover "${nome}" da lista de presenças?\n\nO registo será apagado.`)) return;
            try {
                await _sb(`evento_presencas?id=eq.${presId}`, {method: 'DELETE'});
                evPresencas = evPresencas.filter(x => x.id !== presId);
                evRenderPresencas();
            } catch (err) {
                alert('Erro ao remover: ' + (err?.message || JSON.stringify(err)));
            }
        }

        /* ── ADICIONAR PARTICIPANTE ───────────────────────────────────────────── */
        async function evAddParticipante() {
            const sel = document.getElementById('ev-add-mb'), memId = sel?.value;
            if (!memId) {
                alert('Seleciona um membro.');
                return;
            }
            if (evPresencas.find(p => p.membro_id === memId)) {
                alert('Membro ja na lista.');
                return;
            }
            const btn = sel.nextElementSibling;
            if (btn) {
                btn.disabled = true;
                btn.textContent = 'A adicionar...';
            }
            try {
                await _sb('evento_presencas', {
                    method: 'POST',
                    body: JSON.stringify([{evento_id: evAtivo.id, membro_id: memId, status: 'pendente'}])
                });
                await evVerPresencas(evAtivo.id);
            } catch (err) {
                alert('Erro ao adicionar: ' + (err?.message || JSON.stringify(err)));
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = 'Adicionar';
                }
            }
        }

        async function evFinalizarEntradas() {
            if (!evAtivo) return;
            if (!confirm('Pendentes serao marcados como faltaram.')) return;
            await _sb(`evento_presencas?evento_id=eq.${evAtivo.id}&status=eq.pendente`, {
                method: 'PATCH',
                body: JSON.stringify({status: 'faltou'})
            });
            evPresencas.forEach(p => {
                if (p.status === 'pendente') p.status = 'faltou';
            });
            evRenderPresBody();
        }

        function evAbrirMotivo(presId, nome) {
            _motivoId = presId;
            document.getElementById('drawer-title').textContent = `Motivo — ${nome}`;
            document.getElementById('drawer-body').innerHTML = `<div class="form-grid"><div class="msg-form" id="form-msg"></div>
            <div class="form-group form-full"><label class="form-label">Motivo da Falta</label>
            <textarea class="form-textarea" id="ev-mot-txt" style="height:100px" placeholder="Descreve o motivo..."></textarea></div>
            <div class="form-actions"><button class="btn-cancel-form" onclick="closeDrawer()">Cancelar</button>
            <button class="btn-save" onclick="evGuardarMotivo()">Guardar</button></div></div>`;
            document.getElementById('overlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        async function evGuardarMotivo() {
            const m = document.getElementById('ev-mot-txt')?.value?.trim();
            if (!m) {
                alert('Escreve o motivo.');
                return;
            }
            await _sb(`evento_presencas?id=eq.${_motivoId}`, {
                method: 'PATCH',
                body: JSON.stringify({status: 'faltou_motivo', motivo: m, registado_em: new Date().toISOString()})
            });
            const i = evPresencas.findIndex(p => p.id === _motivoId);
            if (i >= 0) {
                evPresencas[i].status = 'faltou_motivo';
                evPresencas[i].motivo = m;
            }
            closeDrawer();
            evRenderPresBody();
        }

        /* ── Helpers tipo/cor ──────────────────────────────────────────────────── */
        const _EV_TIPOS = [
            {key: 'ae', label: 'AE', cor: '#1976d2', corFaint: 'rgba(25,118,210,.1)'},
            {key: 'ministerio', label: 'MINISTÉRIO', cor: '#7b1fa2', corFaint: 'rgba(123,31,162,.1)'},
            {key: 'links', label: 'LINKS', cor: '#00897b', corFaint: 'rgba(0,137,123,.1)'},
        ];

        function _evTipoLabel(tipo) {
            const t = (tipo || '').toLowerCase().trim();
            const found = _EV_TIPOS.find(x => t === x.key || t.includes(x.key));
            return found ? found.label : (tipo && tipo !== 'Sem area' ? tipo.toUpperCase() : '—');
        }

        function _evTipoCor(tipo) {
            const t = (tipo || '').toLowerCase().trim();
            const found = _EV_TIPOS.find(x => t === x.key || t.includes(x.key));
            return found ? found.cor : 'var(--text-faint)';
        }

        /* ════════════════════════════════════════════════════════════════════════
           RESUMO / GRÁFICOS
        ════════════════════════════════════════════════════════════════════════ */
        function evRenderResumo(pres, mMap) {
            const nP = pres.filter(p => p.status === 'presente').length;
            const nF = pres.filter(p => p.status === 'faltou').length;
            const nM = pres.filter(p => p.status === 'faltou_motivo').length;
            const tot = pres.length;
            const pct = tot > 0 ? Math.round(nP / tot * 100) : 0;

            let html = `<div style="font-family:var(--font-title);font-size:8px;letter-spacing:2px;color:var(--text-faint);margin-bottom:10px">RESUMO</div>
        <div class="ev-stats-grid">
            <div class="ev-stat-box"><div class="ev-stat-num" style="color:var(--green)">${nP}</div><div class="ev-stat-lbl">Presentes</div><div style="font-size:10px;font-weight:700;color:var(--green)">${pct}%</div></div>
            <div class="ev-stat-box"><div class="ev-stat-num" style="color:var(--red)">${nF}</div><div class="ev-stat-lbl">Faltaram</div><div style="font-size:10px;color:var(--red)">${tot > 0 ? Math.round(nF / tot * 100) : 0}%</div></div>
            <div class="ev-stat-box"><div class="ev-stat-num" style="color:#e65100">${nM}</div><div class="ev-stat-lbl">Com motivo</div><div style="font-size:10px;color:#e65100">${tot > 0 ? Math.round(nM / tot * 100) : 0}%</div></div>
            <div class="ev-stat-box"><div class="ev-stat-num" style="color:var(--text-muted)">${tot}</div><div class="ev-stat-lbl">Total</div></div>
        </div>`;

            if (tot > 0) {
                const d = [{v: nP, c: '#2e7d32', l: 'Presentes'}, {v: nM, c: '#e65100', l: 'Com Motivo'}, {
                    v: nF,
                    c: '#c62828',
                    l: 'Faltaram'
                }];
                const r = 55, cx = 65, cy = 65;
                let paths = '', s = -Math.PI / 2;
                d.forEach(x => {
                    if (!x.v) return;
                    const a = x.v / tot * Math.PI * 2, en = s + a, x1 = cx + r * Math.cos(s), y1 = cy + r * Math.sin(s),
                        x2 = cx + r * Math.cos(en), y2 = cy + r * Math.sin(en);
                    paths += `<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${a > Math.PI ? 1 : 0},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${x.c}" opacity=".85"/>`;
                    s = en;
                });
                paths += `<circle cx="${cx}" cy="${cy}" r="26" fill="var(--bg-card)"/><text x="${cx}" y="${cy - 3}" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-main)">${tot}</text><text x="${cx}" y="${cy + 10}" text-anchor="middle" font-size="8" fill="var(--text-faint)">TOTAL</text>`;
                const leg = d.map(x => `<div class="ev-legend-item"><div class="ev-legend-dot" style="background:${x.c}"></div><span>${x.l}: <strong>${x.v}</strong> (${tot > 0 ? Math.round(x.v / tot * 100) : 0}%)</span></div>`).join('');
                html += `<div class="ev-chart-box"><div class="ev-chart-title">Distribuicao Geral</div><div class="ev-pizza-row"><svg width="130" height="130" viewBox="0 0 130 130">${paths}</svg><div class="ev-legend">${leg}</div></div></div>`;
            }

            const porArea = {};
            pres.forEach(p => {
                (mMap[p.membro_id] || [{tipo: 'semarea', nome: 'Sem area', papel: ''}]).forEach(m => {
                    const k = `${m.tipo}||${m.nome}`;
                    if (!porArea[k]) porArea[k] = {tipo: m.tipo, nome: m.nome, pres: 0, falt: 0, total: 0};
                    porArea[k].total++;
                    if (p.status === 'presente') porArea[k].pres++;
                    else if (p.status === 'faltou' || p.status === 'faltou_motivo') porArea[k].falt++;
                });
            });

            const porTipo = {};
            _EV_TIPOS.forEach(t => porTipo[t.key] = {
                label: t.label,
                cor: t.cor,
                corFaint: t.corFaint,
                pres: 0,
                falt: 0,
                total: 0
            });
            Object.values(porArea).forEach(a => {
                const tk = (a.tipo || '').toLowerCase().trim();
                const def = _EV_TIPOS.find(x => tk === x.key || tk.includes(x.key));
                if (def) {
                    porTipo[def.key].pres += a.pres;
                    porTipo[def.key].falt += a.falt;
                    porTipo[def.key].total += a.total;
                }
            });
            const tipoVals = Object.values(porTipo).filter(t => t.total > 0);

            if (tipoVals.length) {
                const boxes = tipoVals.map(t => {
                    const pA = t.total > 0 ? Math.round(t.pres / t.total * 100) : 0;
                    const cor = pA >= 80 ? 'var(--green)' : pA >= 50 ? '#e65100' : 'var(--red)';
                    return `<div class="ev-stat-box" style="border-top:3px solid ${t.cor}"><div style="font-size:8px;font-weight:700;color:${t.cor};letter-spacing:1px;margin-bottom:4px">${t.label}</div><div class="ev-stat-num" style="color:${t.cor};font-size:18px">${t.pres}</div><div class="ev-stat-lbl">presentes</div><div style="font-size:10px;font-weight:700;color:${cor};margin-top:2px">${pA}%</div><div style="font-size:9px;color:var(--text-faint)">de ${t.total}</div></div>`;
                }).join('');
                html += `<div class="ev-chart-box"><div class="ev-chart-title">Presentes por Tipo</div><div style="display:grid;grid-template-columns:repeat(${Math.min(tipoVals.length, 3)},1fr);gap:8px">${boxes}</div></div>`;
            }

            const totPres = tipoVals.reduce((s, t) => s + t.pres, 0);
            if (tipoVals.length > 1 && totPres > 0) {
                const dT = tipoVals.filter(t => t.pres > 0).map(t => ({v: t.pres, c: t.cor, l: t.label}));
                const r2 = 55, cx2 = 65, cy2 = 65;
                let paths2 = '', s2 = -Math.PI / 2;
                dT.forEach(x => {
                    if (!x.v) return;
                    const a = x.v / totPres * Math.PI * 2, en = s2 + a, x1 = cx2 + r2 * Math.cos(s2),
                        y1 = cy2 + r2 * Math.sin(s2), x2 = cx2 + r2 * Math.cos(en), y2 = cy2 + r2 * Math.sin(en);
                    paths2 += `<path d="M${cx2},${cy2} L${x1.toFixed(1)},${y1.toFixed(1)} A${r2},${r2} 0 ${a > Math.PI ? 1 : 0},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${x.c}" opacity=".85"/>`;
                    s2 = en;
                });
                paths2 += `<circle cx="${cx2}" cy="${cy2}" r="26" fill="var(--bg-card)"/><text x="${cx2}" y="${cy2 - 3}" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-main)">${totPres}</text><text x="${cx2}" y="${cy2 + 10}" text-anchor="middle" font-size="8" fill="var(--text-faint)">PRES.</text>`;
                const leg2 = dT.map(x => `<div class="ev-legend-item"><div class="ev-legend-dot" style="background:${x.c}"></div><span>${x.l}: <strong>${x.v}</strong> (${Math.round(x.v / totPres * 100)}%)</span></div>`).join('');
                html += `<div class="ev-chart-box"><div class="ev-chart-title">Distribuicao de Presentes por Tipo</div><div class="ev-pizza-row"><svg width="130" height="130" viewBox="0 0 130 130">${paths2}</svg><div class="ev-legend">${leg2}</div></div></div>`;
            }

            if (tipoVals.length) {
                const bs2 = tipoVals.map(t => {
                    const pA = t.total > 0 ? Math.round(t.pres / t.total * 100) : 0;
                    const cor = pA >= 80 ? 'var(--green)' : pA >= 50 ? '#e65100' : 'var(--red)';
                    return `<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:11px;font-weight:700;color:${t.cor}">${t.label}</span><span style="font-size:10px;font-weight:bold;color:${cor}">${pA}%</span></div><div style="display:flex;gap:2px;height:12px;border-radius:4px;overflow:hidden"><div style="flex:${t.pres || 0};background:#2e7d32;opacity:.85;min-width:${t.pres ? '3px' : '0'}"></div><div style="flex:${t.falt || 0};background:#c62828;opacity:.75;min-width:${t.falt ? '3px' : '0'}"></div></div><div style="font-size:9px;color:var(--text-faint);margin-top:2px">${t.pres} presentes · ${t.falt} faltaram · ${t.total} total</div></div>`;
                }).join('');
                html += `<div class="ev-chart-box"><div class="ev-chart-title">Taxa de Presenca por Tipo</div>${bs2}</div>`;
            }

            const areas = Object.values(porArea).sort((a, b) => b.total - a.total);
            if (areas.length) {
                const bs = areas.map(a => {
                    const pA = Math.round(a.pres / (a.total || 1) * 100);
                    const tL = _evTipoLabel(a.tipo);
                    const tC = _evTipoCor(a.tipo);
                    return `<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:11px"><span style="font-size:8px;background:var(--bg-input);padding:1px 5px;border-radius:3px;color:${tC};font-weight:700;margin-right:4px">${tL}</span>${a.nome}</span><span style="font-size:10px;font-weight:bold;color:${pA >= 80 ? 'var(--green)' : pA >= 50 ? '#e65100' : 'var(--red)'}">${pA}%</span></div><div style="display:flex;gap:2px;height:10px"><div style="flex:${a.pres || 0};background:#2e7d32;border-radius:3px;opacity:.8;min-width:${a.pres ? '3px' : '0'}"></div><div style="flex:${a.falt || 0};background:#c62828;border-radius:3px;opacity:.8;min-width:${a.falt ? '3px' : '0'}"></div></div><div style="font-size:9px;color:var(--text-faint);margin-top:1px">${a.pres} pres. · ${a.falt} falt. · ${a.total} total</div></div>`;
                }).join('');
                html += `<div class="ev-chart-box"><div class="ev-chart-title">Presencas por Area / Ministerio</div>${bs}</div>`;
            }
            return html;
        }

        /* ════════════════════════════════════════════════════════════════════════
           PDF
        ════════════════════════════════════════════════════════════════════════ */
        async function evGerarPDF(evId) {
            const ev = evEventos.find(e => e.id === evId);
            if (!ev) return;
            const pres = await _sb(`evento_presencas?select=*,membros(id,nome)&evento_id=eq.${evId}&order=created_at`) || [];
            const mIds = pres.map(p => p.membro_id).filter(Boolean);
            let mMap = {};
            if (mIds.length) {
                const v = await _sb(`membro_ministerios?select=membro_id,papel,ministerios(nome,tipo)&membro_id=in.(${mIds.join(',')})&ativo=eq.true`) || [];
                v.forEach(x => {
                    if (!mMap[x.membro_id]) mMap[x.membro_id] = [];
                    mMap[x.membro_id].push({
                        tipo: x.ministerios?.tipo || 'outro',
                        nome: x.ministerios?.nome || '—',
                        papel: x.papel || '',
                        tipoLabel: _pdfTipoLabel(x.ministerios?.tipo)
                    });
                });
            }

            const nP = pres.filter(p => p.status === 'presente'), nF = pres.filter(p => p.status === 'faltou'),
                nM = pres.filter(p => p.status === 'faltou_motivo'), tot = pres.length;
            const dE = ev.data_inicio ? new Date(ev.data_inicio).toLocaleDateString('pt-PT', {
                weekday: 'long',
                day: 'numeric',
                month: 'long',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            }) : '—';

            const _pizza = (dados, total, r, cx, cy) => {
                if (!total) return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#eee"/>`;
                let paths = '', start = -Math.PI / 2;
                dados.forEach(d => {
                    if (!d.v) return;
                    const a = d.v / total * Math.PI * 2, en = start + a, x1 = cx + r * Math.cos(start),
                        y1 = cy + r * Math.sin(start), x2 = cx + r * Math.cos(en), y2 = cy + r * Math.sin(en);
                    paths += `<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${a > Math.PI ? 1 : 0},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${d.c}" opacity="0.9"/>`;
                    start = en;
                });
                paths += `<circle cx="${cx}" cy="${cy}" r="${Math.round(r * .42)}" fill="white"/>`;
                paths += `<text x="${cx}" y="${cy - 4}" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">${total}</text>`;
                paths += `<text x="${cx}" y="${cy + 10}" text-anchor="middle" font-size="8" fill="#999">TOTAL</text>`;
                return paths;
            };

            const _PDF_TIPOS = [{
                key: 'ae',
                label: 'AE — Áreas Executivas',
                cor: '#1565c0',
                bg: '#e3f2fd'
            }, {key: 'ministerio', label: 'Ministério', cor: '#6a1b9a', bg: '#f3e5f5'}, {
                key: 'links',
                label: 'Links',
                cor: '#00695c',
                bg: '#e0f2f1'
            }];
            const _pdfClassificar = tipo => {
                const t = (tipo || '').toLowerCase().trim();
                if (t === 'ae' || t.includes('extensao')) return 'ae';
                if (t === 'ministerio' || t.includes('minister')) return 'ministerio';
                if (t === 'links' || t.includes('link')) return 'links';
                return null;
            };

            const porArea = {};
            pres.forEach(p => {
                const mins = mMap[p.membro_id];
                if (!mins || !mins.length) {
                    const k = '__semarea__';
                    if (!porArea[k]) porArea[k] = {
                        label: 'Sem area',
                        tipo: null,
                        tipoLabel: '—',
                        pres: 0,
                        falt: 0,
                        mot: 0,
                        total: 0
                    };
                    porArea[k].total++;
                    if (p.status === 'presente') porArea[k].pres++; else if (p.status === 'faltou_motivo') porArea[k].mot++; else if (p.status === 'faltou') porArea[k].falt++;
                } else {
                    mins.forEach(m => {
                        const k = m.tipo + '||' + m.nome;
                        if (!porArea[k]) porArea[k] = {
                            label: m.nome,
                            tipo: _pdfClassificar(m.tipo),
                            tipoLabel: m.tipoLabel,
                            pres: 0,
                            falt: 0,
                            mot: 0,
                            total: 0
                        };
                        porArea[k].total++;
                        if (p.status === 'presente') porArea[k].pres++; else if (p.status === 'faltou_motivo') porArea[k].mot++; else if (p.status === 'faltou') porArea[k].falt++;
                    });
                }
            });

            const porTipo = {};
            _PDF_TIPOS.forEach(t => porTipo[t.key] = {
                label: t.label,
                cor: t.cor,
                bg: t.bg,
                pres: 0,
                falt: 0,
                mot: 0,
                total: 0
            });
            Object.values(porArea).forEach(a => {
                if (a.tipo && porTipo[a.tipo]) {
                    porTipo[a.tipo].pres += a.pres;
                    porTipo[a.tipo].falt += a.falt;
                    porTipo[a.tipo].mot += a.mot;
                    porTipo[a.tipo].total += a.total;
                }
            });

            const areasPorTipo = {};
            Object.values(porArea).forEach(a => {
                if (a.tipo) {
                    if (!areasPorTipo[a.tipo]) areasPorTipo[a.tipo] = [];
                    areasPorTipo[a.tipo].push(a);
                }
            });
            const tipoValsAtivos = _PDF_TIPOS.filter(t => porTipo[t.key]?.total > 0);

            const _hora = ts => {
                if (!ts) return '—';
                try {
                    return new Date(ts).toLocaleTimeString('pt-PT', {hour: '2-digit', minute: '2-digit'});
                } catch {
                    return '—';
                }
            };

            const _barrasHTML = items => {
                if (!items.length) return '';
                return `<table style="width:100%;border-collapse:collapse;margin:6px 0 14px">${items.map(it => {
                    const pP = it.total > 0 ? it.pres / it.total : 0, pM = it.total > 0 ? it.mot / it.total : 0,
                        pF = it.total > 0 ? it.falt / it.total : 0;
                    const pct = Math.round(pP * 100), cor = pct >= 80 ? '#2e7d32' : pct >= 50 ? '#e65100' : '#c62828';
                    const lbl = it.label.length > 26 ? it.label.slice(0, 26) + '…' : it.label;
                    return `<tr><td style="font-size:11px;color:#333;padding:5px 10px 5px 0;white-space:nowrap;width:150px;vertical-align:middle">${lbl}</td><td style="padding:5px 0;vertical-align:middle"><div style="display:flex;height:20px;background:#f0f0f0;border-radius:4px;overflow:hidden">${pP > 0 ? `<div style="width:${Math.round(pP * 100)}%;background:#2e7d32;opacity:.9;min-width:2px"></div>` : ''} ${pM > 0 ? `<div style="width:${Math.round(pM * 100)}%;background:#e65100;opacity:.85;min-width:2px"></div>` : ''} ${pF > 0 ? `<div style="width:${Math.round(pF * 100)}%;background:#c62828;opacity:.8;min-width:2px"></div>` : ''}</div></td><td style="font-size:12px;font-weight:700;color:${cor};padding:5px 0 5px 10px;white-space:nowrap;width:40px;text-align:right;vertical-align:middle">${pct}%</td><td style="font-size:10px;color:#999;padding:5px 0 5px 8px;white-space:nowrap;vertical-align:middle">${it.pres}/${it.total}</td></tr>`;
                }).join('')}</table>`;
            };

            const gDados = [{v: nP.length, c: '#2e7d32', l: 'Presentes'}, {
                v: nM.length,
                c: '#e65100',
                l: 'Com Motivo'
            }, {v: nF.length, c: '#c62828', l: 'Faltaram'}];
            const pizzaGeral = `<svg width="160" height="160" viewBox="0 0 160 160">${_pizza(gDados, tot, 65, 80, 80)}</svg>`;
            const legendaGeral = gDados.map(d => `<div style="display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:4px"><div style="width:12px;height:12px;border-radius:50%;background:${d.c};flex-shrink:0"></div>${d.l}: <strong>${d.v}</strong> (${tot > 0 ? Math.round(d.v / tot * 100) : 0}%)</div>`).join('');
            const barrasTypes = tipoValsAtivos.length > 0 ? _barrasHTML(tipoValsAtivos.map(t => ({
                label: t.label,
                pres: porTipo[t.key].pres,
                falt: porTipo[t.key].falt,
                mot: porTipo[t.key].mot,
                total: porTipo[t.key].total
            }))) : '<p style="color:#999;font-size:12px">Sem dados.</p>';
            const totPresentes = tipoValsAtivos.reduce((s, t) => s + porTipo[t.key].pres, 0);
            let pizzaTipo = '';
            if (totPresentes > 0 && tipoValsAtivos.length > 1) {
                const dT = tipoValsAtivos.filter(t => porTipo[t.key].pres > 0).map(t => ({
                    v: porTipo[t.key].pres,
                    c: t.cor,
                    l: t.label
                }));
                const svgP = `<svg width="160" height="160" viewBox="0 0 160 160">${_pizza(dT, totPresentes, 65, 80, 80)}</svg>`;
                const legT = dT.map(d => `<div style="display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:6px"><div style="width:12px;height:12px;border-radius:50%;background:${d.c};flex-shrink:0"></div>${d.l}: <strong>${d.v}</strong> (${Math.round(d.v / totPresentes * 100)}%)</div>`).join('');
                pizzaTipo = `<div class="grafico-row">${svgP}<div class="legenda">${legT}</div></div>`;
            }

            const statsTipoBoxes = tipoValsAtivos.map(t => {
                const tv = porTipo[t.key];
                const pA = tv.total > 0 ? Math.round(tv.pres / tv.total * 100) : 0;
                const cor = pA >= 80 ? '#2e7d32' : pA >= 50 ? '#e65100' : '#c62828';
                return `<div style="border:1px solid #e0e0e0;border-top:4px solid ${t.cor};border-radius:8px;padding:14px 16px;min-width:140px;flex:1;background:${t.bg}33"><div style="font-size:9px;font-weight:700;color:${t.cor};letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px">${t.label}</div><div style="display:flex;align-items:baseline;gap:6px;margin-bottom:8px"><span style="font-size:30px;font-weight:800;color:${t.cor};line-height:1">${tv.pres}</span><span style="font-size:11px;color:#888">de ${tv.total}</span></div><div style="height:6px;background:#e0e0e0;border-radius:3px;margin-bottom:7px;overflow:hidden"><div style="width:${pA}%;height:100%;background:${cor};border-radius:3px"></div></div><div style="font-size:15px;font-weight:700;color:${cor}">${pA}% presença</div><div style="font-size:10px;color:#aaa;margin-top:3px">${tv.falt} faltaram · ${tv.mot} com motivo</div></div>`;
            }).join('');

            const rowM = p => {
                const nome = p.membros?.nome || (() => {
                    try {
                        return JSON.parse(p.observacoes || '{}').nome || '(Visitante)';
                    } catch {
                        return '(Visitante)';
                    }
                })();
                const ms = (mMap[p.membro_id] || []).map(m => `[${m.tipoLabel}] ${m.nome}${m.papel ? ' · ' + m.papel : ''}`).join(' | ');
                return `<tr><td>${nome}</td><td style="font-size:11px;color:#555">${ms || '—'}</td><td style="text-align:center;font-size:11px;color:#1565c0;font-weight:600">${_hora(p.registado_em)}</td><td style="font-size:11px;color:#e65100">${p.motivo || '—'}</td></tr>`;
            };

            let secoesTipo = '';
            for (const tDef of _PDF_TIPOS) {
                const tv = porTipo[tDef.key];
                if (!tv?.total) continue;
                const areas = (areasPorTipo[tDef.key] || []).sort((a, b) => b.total - a.total);
                const membrosArea = pres.filter(p => mMap[p.membro_id]?.some(m => _pdfClassificar(m.tipo) === tDef.key));
                const presArea = membrosArea.filter(p => p.status === 'presente'),
                    motArea = membrosArea.filter(p => p.status === 'faltou_motivo'),
                    faltArea = membrosArea.filter(p => p.status === 'faltou');
                const totArea = membrosArea.length, nPresArea = presArea.length, nMotArea = motArea.length,
                    nFaltArea = faltArea.length;
                const pctT = totArea > 0 ? Math.round(nPresArea / totArea * 100) : 0,
                    corT = pctT >= 80 ? '#2e7d32' : pctT >= 50 ? '#e65100' : '#c62828';
                const _papelDaPessoa = p => {
                    const mins = (mMap[p.membro_id] || []).filter(m => _pdfClassificar(m.tipo) === tDef.key);
                    return mins.map(m => (m.papel || '').trim() || 'Sem papel definido').join(' / ');
                };
                const _subAreaDaPessoa = p => {
                    const mins = (mMap[p.membro_id] || []).filter(m => _pdfClassificar(m.tipo) === tDef.key);
                    return mins.map(m => m.nome + (m.papel ? ' · ' + m.papel : '')).join(', ');
                };
                const _agruparPorPapel = lista => {
                    const grupos = {};
                    lista.forEach(p => {
                        const papel = _papelDaPessoa(p) || 'Sem papel definido';
                        if (!grupos[papel]) grupos[papel] = [];
                        grupos[papel].push(p);
                    });
                    return Object.entries(grupos).sort((a, b) => b[1].length - a[1].length);
                };
                const rowArea = p => `<tr><td>${p.membros?.nome || '—'}</td><td style="font-size:11px;color:#555">${_subAreaDaPessoa(p) || '—'}</td><td style="text-align:center;font-size:11px;color:#1565c0;font-weight:600">${_hora(p.registado_em)}</td><td style="font-size:11px;color:#e65100">${p.motivo || '—'}</td></tr>`;
                const _tabelaAgrupada = (lista, thExtra, corTitulo, icone) => {
                    if (!lista.length) return '';
                    const grupos = _agruparPorPapel(lista);
                    let h = `<h3 style="color:${corTitulo};border-bottom-color:${corTitulo}33">${icone} ${icone === '✓' ? 'Presentes' : icone === '⚠' ? 'Com Motivo' : 'Faltaram'} — ${lista.length}</h3>`;
                    grupos.forEach(([papel, pessoas]) => {
                        const pctG = lista.length > 0 ? Math.round(pessoas.length / lista.length * 100) : 0;
                        h += `<div style="margin:10px 0 4px;display:flex;align-items:center;gap:8px"><span style="font-size:10px;font-weight:700;color:${corTitulo};text-transform:uppercase;letter-spacing:1px;background:${corTitulo}15;padding:2px 8px;border-radius:10px">${papel}</span><span style="font-size:10px;color:#aaa">${pessoas.length} pessoa${pessoas.length !== 1 ? 's' : ''} &middot; ${pctG}% deste grupo</span></div><table style="margin-bottom:8px"><thead><tr><th>Nome</th><th>Sub-área</th><th style="width:70px;text-align:center">${thExtra}</th><th>${icone === '⚠' ? 'Motivo' : '—'}</th></tr></thead><tbody>${pessoas.map(rowArea).join('')}</tbody></table>`;
                    });
                    return h;
                };
                secoesTipo += `<div style="page-break-before:always;padding-top:8px"><div style="border-left:6px solid ${tDef.cor};padding-left:16px;margin-bottom:20px"><div style="font-size:10px;color:${tDef.cor};letter-spacing:2px;text-transform:uppercase;margin-bottom:3px">Detalhe por Área</div><h2 style="color:${tDef.cor};border-bottom:2px solid ${tDef.cor};margin:0 0 16px;font-size:18px;text-transform:none;letter-spacing:0;padding-bottom:6px">${tDef.label}</h2><div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px"><div class="scard" style="border-top-color:${tDef.cor}"><div style="font-size:26px;font-weight:800;color:${tDef.cor}">${nPresArea}</div><div class="sl">Presentes</div></div><div class="scard"><div style="font-size:26px;font-weight:800;color:#c62828">${nFaltArea}</div><div class="sl">Faltaram</div></div><div class="scard"><div style="font-size:26px;font-weight:800;color:#e65100">${nMotArea}</div><div class="sl">Com Motivo</div></div><div class="scard"><div style="font-size:26px;font-weight:800;color:#555">${totArea}</div><div class="sl">Total</div></div><div class="scard" style="border-top-color:${corT}"><div style="font-size:26px;font-weight:800;color:${corT}">${pctT}%</div><div class="sl">Taxa</div></div></div><div style="font-size:10px;font-weight:700;color:#888;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px">Taxa por sub-área</div>${_barrasHTML(areas.map(a => ({
                    label: a.label,
                    pres: a.pres,
                    falt: a.falt,
                    mot: a.mot,
                    total: a.total
                })))}${_tabelaAgrupada(presArea, 'Chegada', '#2e7d32', '✓')}${_tabelaAgrupada(motArea, 'Registo', '#e65100', '⚠')}${_tabelaAgrupada(faltArea, '—', '#c62828', '✗')}</div></div>`;
            }

            const htm = `<!DOCTYPE html><html lang="pt"><head><meta charset="UTF-8"><title>Relatório — ${ev.titulo}</title><style>*{box-sizing:border-box}body{font-family:'Segoe UI',Arial,sans-serif;color:#1a1a1a;padding:36px 44px;max-width:960px;margin:0 auto;font-size:13px}h1{font-size:26px;color:#005f65;margin-bottom:3px;font-weight:800;letter-spacing:-.3px}h2{font-size:11px;margin:28px 0 12px;color:#005f65;border-bottom:2px solid #009098;padding-bottom:5px;text-transform:uppercase;letter-spacing:1.5px;font-weight:700}h3{font-size:11px;margin:16px 0 8px;color:#444;text-transform:uppercase;letter-spacing:1px;font-weight:700;border-bottom:1px solid #eee;padding-bottom:4px}.meta{font-size:12px;color:#666;line-height:2;margin-bottom:4px}.badges{display:flex;gap:8px;margin:14px 0 22px;flex-wrap:wrap}.badge{padding:5px 16px;border-radius:20px;font-size:12px;font-weight:700}.g{background:#e8f5e9;color:#2e7d32}.r{background:#ffebee;color:#c62828}.o{background:#fff8e1;color:#e65100}.gr{background:#f5f5f5;color:#555}.b{background:#e0f7fa;color:#006b70}table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px}th{background:#f0f7f8;padding:8px 10px;text-align:left;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#888;border-bottom:2px solid #c8e6e8;white-space:nowrap}td{padding:6px 10px;border-bottom:1px solid #f2f2f2;vertical-align:middle}tr:nth-child(even) td{background:#fafcfc}tr:last-child td{border-bottom:none}.grafico-row{display:flex;align-items:center;gap:32px;margin:14px 0 22px;flex-wrap:wrap}.legenda{display:flex;flex-direction:column;gap:7px}.legenda-bar{display:flex;gap:16px;font-size:11px;margin-bottom:8px;color:#666;align-items:center;flex-wrap:wrap}.legenda-bar span{display:flex;align-items:center;gap:5px}.legenda-bar i{display:inline-block;width:12px;height:12px;border-radius:3px}.scard{border:1px solid #e8e8e8;border-top:3px solid #009098;border-radius:7px;padding:10px 16px;text-align:center;min-width:80px}.sl{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-top:3px}.cover{background:linear-gradient(135deg,#004c52 0%,#007d85 60%,#009098 100%);color:#fff;padding:44px 48px;border-radius:14px;margin-bottom:36px}.cover h1{color:#fff;font-size:30px;margin-bottom:6px}.cover .meta{color:rgba(255,255,255,.8);font-size:13px}.cover .brow{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}.cover .bc{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:7px 18px;border-radius:22px;font-size:12px;font-weight:700}.footer{margin-top:60px;padding-top:14px;border-top:1px solid #e8e8e8;font-size:10px;color:#bbb;text-align:center;line-height:2}@media print{body{padding:20px 28px}.cover{border-radius:6px;padding:28px 32px}h2{page-break-after:avoid}tr{page-break-inside:avoid}table{page-break-inside:auto}}</style></head><body>
        <div class="cover"><div style="font-size:10px;letter-spacing:3px;text-transform:uppercase;opacity:.65;margin-bottom:8px">Relatório de Presenças · Zion Lisboa</div><h1>${ev.titulo}</h1><div class="meta">📅&nbsp; ${dE}${ev.local ? `<br>📍&nbsp; ${ev.local}` : ''}${ev.tipo ? `<br>🏷&nbsp; ${ev.tipo}` : ''}</div><div class="brow"><span class="bc">✓ ${nP.length} Presentes</span><span class="bc">✗ ${nF.length + nM.length} Faltaram</span><span class="bc">📊 ${tot > 0 ? Math.round(nP.length / tot * 100) : 0}% de presença</span><span class="bc">👥 ${tot} Total</span></div></div>
        <h2>Visão Geral</h2><div class="badges"><span class="badge g">✓ Presentes: ${nP.length}</span><span class="badge r">✗ Faltaram: ${nF.length}</span><span class="badge o">⚠ Com motivo: ${nM.length}</span><span class="badge gr">👥 Total: ${tot}</span><span class="badge b">📊 Taxa: ${tot > 0 ? Math.round(nP.length / tot * 100) : 0}%</span></div><div class="grafico-row">${pizzaGeral}<div class="legenda">${legendaGeral}</div>${tipoValsAtivos.length ? `<div style="display:flex;flex-direction:column;gap:6px"><div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#aaa;margin-bottom:4px">Resumo por Área</div>${tipoValsAtivos.map(t => {
                const tv = porTipo[t.key];
                const pA = tv.total > 0 ? Math.round(tv.pres / tv.total * 100) : 0;
                const cor = pA >= 80 ? '#2e7d32' : pA >= 50 ? '#e65100' : '#c62828';
                return `<div style="display:flex;align-items:center;gap:8px;font-size:11px"><div style="width:10px;height:10px;border-radius:2px;background:${t.cor}"></div><span style="font-weight:700;color:${t.cor};min-width:90px">${t.label}</span><span style="font-weight:700;color:${cor};width:34px">${pA}%</span><span style="color:#aaa">${tv.pres}/${tv.total}</span></div>`;
            }).join('')}</div>` : ''}</div>
        ${tipoValsAtivos.length ? `<h2>Presença por Área</h2><div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:22px">${statsTipoBoxes}</div>` : ''}
        ${tipoValsAtivos.length > 1 && totPresentes > 0 ? `<h2>Distribuição de Presentes por Área</h2>${pizzaTipo}` : ''}
        <h2>Taxa de Presença por Área</h2><div class="legenda-bar"><span><i style="background:#2e7d32"></i>Presentes</span><span><i style="background:#e65100"></i>Com Motivo</span><span><i style="background:#c62828"></i>Faltaram</span></div>${barrasTypes}
        <h2>Lista Geral — Presentes (${nP.length})</h2><table><thead><tr><th>Nome</th><th>Áreas</th><th style="width:70px;text-align:center">Chegada</th><th>Obs.</th></tr></thead><tbody>${nP.map(rowM).join('')}</tbody></table>
        ${nM.length ? `<h2>Lista Geral — Faltaram com Motivo (${nM.length})</h2><table><thead><tr><th>Nome</th><th>Áreas</th><th style="width:70px;text-align:center">Registo</th><th>Motivo</th></tr></thead><tbody>${nM.map(rowM).join('')}</tbody></table>` : ''}
        ${nF.length ? `<h2>Lista Geral — Faltaram (${nF.length})</h2><table><thead><tr><th>Nome</th><th>Áreas</th><th style="width:70px">—</th><th>—</th></tr></thead><tbody>${nF.map(rowM).join('')}</tbody></table>` : ''}
        ${secoesTipo}
        <div class="footer">Gerado em ${new Date().toLocaleDateString('pt-PT', {
                day: '2-digit',
                month: 'long',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            })} &nbsp;&middot;&nbsp; Zion Lisboa &nbsp;&middot;&nbsp; Sistema de Eventos criado pela <strong>Devs Zion</strong></div>
        <script>window.onload=()=>window.print();<\/script></body></html>`;

            const w = window.open('', '_blank');
            w.document.write(htm);
            w.document.close();
        }

        function _pdfTipoLabel(tipo) {
            const t = (tipo || '').toLowerCase().trim();
            if (t === 'ae' || t.includes('extensao')) return 'AE';
            if (t === 'ministerio' || t.includes('minister')) return 'MINISTÉRIO';
            if (t === 'links' || t.includes('link')) return 'LINKS';
            return tipo || '—';
        }

        /* ════════════════════════════════════════════════════════════════════════
           FORM EVENTO
        ════════════════════════════════════════════════════════════════════════ */
        function evAbrirForm(id) {
            const e = id ? evEventos.find(x => x.id === id) : null;
            const fv = (k, d = '') => e?.[k] ?? d;
            const fdt = k => {
                const v = e?.[k];
                if (!v) return '';
                return new Date(v).toISOString().slice(0, 16);
            };
            const tipos = getTipos(),
                tOpts = tipos.map(t => `<option value="${t}" ${fv('tipo') === t ? 'selected' : ''}>${t}</option>`).join('');
            const body = `<div class="form-grid"><div class="msg-form" id="form-msg"></div>
        <div class="ev-form-section">Identificacao</div>
        <div class="form-group form-full"><label class="form-label">Titulo *</label><input class="form-input" id="fe_titulo" type="text" placeholder="Nome do evento" value="${fv('titulo')}"></div>
        <div class="form-group"><label class="form-label">Tipo</label><select class="form-select" id="fe_tipo" onchange="evOnTipoChange(this.value)"><option value="">-- Seleciona --</option>${tOpts}</select></div>
        <div class="form-group"><label class="form-label">Local</label><input class="form-input" id="fe_local" type="text" placeholder="Ex: Sede Lisboa" value="${fv('local')}"></div>
        <div class="form-group form-full"><label class="form-label">Descricao</label><textarea class="form-textarea" id="fe_descricao">${fv('descricao')}</textarea></div>
        <div class="ev-form-section">Data e Hora</div>
        <div class="form-group"><label class="form-label">Data Inicio</label><input class="form-input" id="fe_data_inicio" type="datetime-local" value="${fdt('data_inicio')}"></div>
        <div class="form-group"><label class="form-label">Data Fim</label><input class="form-input" id="fe_data_fim" type="datetime-local" value="${fdt('data_fim')}"></div>
        <div class="ev-form-section">Inscricao</div>
        <div class="form-group"><label class="form-label">Valor (€)</label><input class="form-input" id="fe_valor" type="number" placeholder="0.00" value="${fv('valor')}"></div>
        <div class="form-group"><label class="form-label">Capacidade <span style="font-size:9px;color:var(--text-faint)">(máx. pessoas)</span></label><input class="form-input" id="fe_capacidade" type="number" min="0" placeholder="Sem limite" value="${fv('capacidade')}"></div>
        <div class="form-group"><label class="form-label">Vagas Extra <span style="font-size:9px;color:var(--text-faint)">(soma à capacidade)</span></label><input class="form-input" id="fe_capacidade_extra" type="number" min="0" placeholder="0" value="${fv('capacidade_extra')}"></div>
        <div class="form-group"><label class="form-label">Link Inscricao</label><input class="form-input" id="fe_link" type="url" placeholder="https://..." value="${fv('link_inscricao')}"></div>
        <div class="form-group"><label class="form-toggle"><input type="checkbox" id="fe_gratuito" ${fv('gratuito') ? 'checked' : ''}><span>Gratuito</span></label></div>
        <div class="form-group"><label class="form-toggle"><input type="checkbox" id="fe_destaque" ${fv('destaque') ? 'checked' : ''}><span>Destaque</span></label></div>
        <div class="form-group"><label class="form-toggle"><input type="checkbox" id="fe_ativo" ${fv('ativo') !== false ? 'checked' : ''}><span>Ativo</span></label></div>
        <div class="form-actions"><button class="btn-cancel-form" onclick="closeDrawer()">Cancelar</button><button class="btn-save" id="btn-ev-save" onclick="evSalvar('${e?.id || ''}')">Guardar</button></div>
        </div>`;
            document.getElementById('drawer-title').textContent = e ? 'Editar Evento' : 'Novo Evento';
            document.getElementById('drawer-body').innerHTML = body;
            document.getElementById('overlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        async function evSalvar(id) {
            const get = k => {
                const el = document.getElementById('fe_' + k);
                return el ? el.value || null : null;
            };
            const chk = k => {
                const el = document.getElementById('fe_' + k);
                return el ? el.checked : false;
            };
            const body = {
                titulo: get('titulo'),
                tipo: get('tipo'),
                local: get('local'),
                descricao: get('descricao'),
                data_inicio: get('data_inicio'),
                data_fim: get('data_fim'),
                valor: get('valor') ? Number(get('valor')) : null,
                link_inscricao: get('link'),
                capacidade: get('capacidade') ? Number(get('capacidade')) : null,
                capacidade_extra: get('capacidade_extra') ? Number(get('capacidade_extra')) : null,
                gratuito: chk('gratuito'),
                destaque: chk('destaque'),
                ativo: chk('ativo')
            };
            if (!body.titulo) {
                document.getElementById('form-msg').textContent = 'Titulo obrigatorio.';
                document.getElementById('form-msg').className = 'msg-form error';
                return;
            }
            const btn = document.getElementById('btn-ev-save');
            btn.disabled = true;
            btn.textContent = 'A guardar...';
            try {
                if (!id) {
                    body.status = 'aberto';
                    await _sb('eventos', {method: 'POST', body: JSON.stringify(body)});
                } else await _sb(`eventos?id=eq.${id}`, {method: 'PATCH', body: JSON.stringify(body)});
                document.getElementById('form-msg').textContent = 'Guardado!';
                document.getElementById('form-msg').className = 'msg-form success';
                await evRecarregar();
                setTimeout(() => {
                    closeDrawer();
                    if (id) evSelEvento(id); else {
                        const n = evEventos.find(e => e.titulo === body.titulo);
                        if (n) evSelEvento(n.id);
                    }
                }, 700);
            } catch (err) {
                document.getElementById('form-msg').textContent = 'Erro: ' + (err?.message || JSON.stringify(err));
                document.getElementById('form-msg').className = 'msg-form error';
                btn.disabled = false;
                btn.textContent = 'Guardar';
            }
        }

        /* ════════════════════════════════════════════════════════════════════════
           TIPOS DE EVENTO
        ════════════════════════════════════════════════════════════════════════ */
        function evRenderSideTipos() {
            const lista = getTipos();
            document.getElementById('ev-list').innerHTML = '<div style="padding:8px 6px 2px;font-size:10px;color:var(--text-faint)">' + lista.length + ' tipo(s)</div>' +
                lista.map((t, i) => `<div class="ev-list-item ${evTipoIdx === i ? 'active' : ''}" onclick="evSelTipo(${i})" id="evt-item-${i}">
                <div class="ev-list-avatar" style="border-radius:6px;font-size:10px">${i + 1}</div>
                <div class="ev-list-info"><div class="ev-list-nome">${t}</div>
                ${t === 'Reuniao de Lideres' || t === 'Reunião de Líderes' ? '<div class="ev-list-sub">Auto-adiciona lideres</div>' : ''}</div>
            </div>`).join('');
        }

        function evSelTipo(idx) {
            evTipoIdx = idx;
            document.querySelectorAll('[id^="evt-item-"]').forEach((el, i) => el.classList.toggle('active', i === idx));
            const lista = getTipos(), t = lista[idx], isL = t === 'Reuniao de Lideres' || t === 'Reunião de Líderes';
            document.getElementById('ev-panel-inner').innerHTML = `<div style="animation:fadeIn .2s ease">
            <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px">
                <div style="font-size:18px;font-weight:700;margin-bottom:6px">${t}</div>
                ${isL ? `<div style="font-size:12px;color:var(--primary-dark);background:var(--primary-faint);padding:8px 12px;border-radius:8px;margin-bottom:10px">Ao iniciar um evento com este tipo, todos os lideres sao adicionados automaticamente.</div>` : ''}
                <div style="display:flex;gap:6px;flex-wrap:wrap">
                    ${!isL ? `<button class="ev-btn" onclick="evAbrirFormTipo(${idx})">Editar Nome</button>` : ''}
                    ${idx > 0 ? `<button class="ev-btn" onclick="evMoverTipo(${idx},-1)">Subir</button>` : ''}
                    ${idx < lista.length - 1 ? `<button class="ev-btn" onclick="evMoverTipo(${idx},1)">Descer</button>` : ''}
                    ${!isL ? `<button class="ev-btn danger" onclick="evRemoverTipo(${idx})">Remover</button>` : ''}
                </div>
            </div>
            <div style="background:var(--bg-input);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:12px;color:var(--text-faint)">Posicao: <strong>${idx + 1}</strong> de <strong>${lista.length}</strong></div>
        </div>`;
        }

        function evAbrirFormTipo(idx) {
            const lista = getTipos(), isN = idx === null, v = isN ? '' : lista[idx];
            document.getElementById('drawer-title').textContent = isN ? 'Novo Tipo' : 'Editar Tipo';
            document.getElementById('drawer-body').innerHTML = `<div class="form-grid"><div class="msg-form" id="form-msg"></div><div class="form-group form-full"><label class="form-label">Nome *</label><input class="form-input" id="ft_nome" type="text" placeholder="Ex: Encontro de Jovens" value="${v}"></div><div class="form-actions"><button class="btn-cancel-form" onclick="closeDrawer()">Cancelar</button><button class="btn-save" onclick="evSalvarTipo(${idx})">Guardar</button></div></div>`;
            document.getElementById('overlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function evSalvarTipo(idx) {
            const nome = document.getElementById('ft_nome')?.value?.trim();
            if (!nome) {
                document.getElementById('form-msg').textContent = 'Nome obrigatorio.';
                document.getElementById('form-msg').className = 'msg-form error';
                return;
            }
            const lista = getTipos();
            if (idx === null) lista.splice(lista.length - 1, 0, nome); else lista[idx] = nome;
            saveTipos(lista);
            closeDrawer();
            evRenderSideTipos();
            if (idx !== null) evSelTipo(idx);
        }

        function evRemoverTipo(idx) {
            const lista = getTipos();
            if (!confirm(`Remover "${lista[idx]}"?`)) return;
            lista.splice(idx, 1);
            saveTipos(lista);
            evRenderSideTipos();
            evPanelEmpty('Seleciona um tipo.');
            evTipoIdx = null;
        }

        function evMoverTipo(idx, dir) {
            const lista = getTipos(), n = idx + dir;
            if (n < 0 || n >= lista.length) return;
            [lista[idx], lista[n]] = [lista[n], lista[idx]];
            saveTipos(lista);
            evRenderSideTipos();
            evSelTipo(n);
            evTipoIdx = n;
        }

        /* ── Wrapper Voltar ─────────────────────────────────────────────────────
           FIX: usa a variável de closure (evView), não a global window.evView     */
        function evVoltarDetalhe() {
            evView = 'info';
            evRenderDetalhe();
        }

        /* ── Modal forma de pagamento ─────────────────────────────────────────── */
        function evEscolherMetodoPagamento() {
            return new Promise(resolve => {
                const ov = document.createElement('div');
                ov.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)`;
                const metodos = [{key: 'dinheiro', label: 'Dinheiro'}, {
                    key: 'mbway',
                    label: 'MBWay'
                }, {key: 'multibanco', label: 'Multibanco'}, {
                    key: 'transferencia',
                    label: 'Transferência'
                }, {key: 'presencial', label: 'Outro/Presencial'}];
                ov.innerHTML = `<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:24px;width:92%;max-width:320px">
                <div style="font-family:var(--font-title);font-size:9px;letter-spacing:2px;color:var(--text-faint);margin-bottom:14px">FORMA DE PAGAMENTO</div>
                <div style="display:flex;flex-direction:column;gap:8px">
                    ${metodos.map(m => `<button class="ev-btn" style="text-align:left;padding:11px 14px;font-size:12px" data-key="${m.key}">${m.label}</button>`).join('')}
                </div>
                <button class="ev-btn danger" style="width:100%;margin-top:12px;font-size:10px" id="_ev-pag-cancel">Cancelar</button>
            </div>`;
                document.body.appendChild(ov);
                ov.querySelectorAll('[data-key]').forEach(btn => {
                    btn.onclick = () => {
                        ov.remove();
                        resolve(btn.dataset.key);
                    };
                });
                document.getElementById('_ev-pag-cancel').onclick = () => {
                    ov.remove();
                    resolve(null);
                };
            });
        }

        /* ── Fechar Caixa ─────────────────────────────────────────────────────── */
        async function evFecharCaixaEvento(evId) {
            const ev = evEventos.find(e => e.id === evId);
            if (!ev) return;
            const valor = Number(ev.valor) || 0;
            const pagos = evInscricoes.filter(i => i.status === 'pago');
            const totalPago = pagos.length * valor;
            if (totalPago === 0) {
                alert('Nenhum pagamento confirmado.');
                return;
            }

            const totaisPag = {};
            for (const p of pagos) {
                const metodo = p.forma_pagamento || 'presencial';
                totaisPag[metodo] = (totaisPag[metodo] || 0) + valor;
            }

            const hoje = new Date().toISOString().split('T')[0];
            const hojeStr = new Date().toLocaleDateString('pt-PT');
            const evRef = 'EV-' + evId.substring(0, 8).toUpperCase();
            const dataEvento = ev.data_inicio ? new Date(ev.data_inicio).toLocaleDateString('pt-PT') : hojeStr;

            const confirmMsg = `Fechar caixa do evento "${ev.titulo}"?\n\nPagamentos confirmados: ${pagos.length} pessoa(s)\n` + Object.entries(totaisPag).map(([m, v]) => `  ${PAG_LABEL[m] || m}: ${v.toFixed(2)} €`).join('\n') + `\n\nTotal: ${totalPago.toFixed(2)} €\n\nSerá lançado em Contas a Receber (status: recebido).`;
            if (!confirm(confirmMsg)) return;

            const btn = document.querySelector(`[onclick*="evFecharCaixaEvento"]`);
            if (btn) {
                btn.disabled = true;
                btn.textContent = 'A fechar...';
            }

            try {
                for (const [metodo, valorMetodo] of Object.entries(totaisPag)) {
                    if (valorMetodo <= 0) continue;
                    const nPax = pagos.filter(p => (p.forma_pagamento || 'presencial') === metodo).length;
                    await _sb('contas_receber', {
                        method: 'POST',
                        body: JSON.stringify({
                            descricao: `Evento · ${PAG_LABEL[metodo] || metodo} · ${dataEvento} · ${ev.titulo}`,
                            tipo: 'venda',
                            valor_total: Number(valorMetodo.toFixed(2)),
                            valor_recebido: Number(valorMetodo.toFixed(2)),
                            data_emissao: hoje,
                            data_vencimento: hoje,
                            data_recebimento: hoje,
                            data_pagamento: hoje,
                            forma_pagamento: metodo,
                            status: 'recebido',
                            referencia: evRef,
                            observacoes: `Fecho Evento · ${nPax} inscrição(ões) · ${valor.toFixed(2)} €/pax · ${ev.titulo}`
                        })
                    }).catch(e => console.warn('Erro ao lançar contas_receber:', e));
                }
                await _sb(`eventos?id=eq.${evId}`, {
                    method: 'PATCH',
                    body: JSON.stringify({caixa_fechada: true, caixa_fechada_em: new Date().toISOString()})
                });
                ev.caixa_fechada = true;
                ev.caixa_fechada_em = new Date().toISOString();
                if (evAtivo?.id === evId) {
                    evAtivo.caixa_fechada = true;
                    evAtivo.caixa_fechada_em = new Date().toISOString();
                }
                evRenderFilaPagamento();
                if (window.toast) toast(`Caixa fechada · ${pagos.length} inscrições · € ${totalPago.toFixed(2)}`, 'ok');
            } catch (err) {
                console.error('Erro ao fechar caixa do Evento:', err);
                alert('Erro ao fechar caixa do Evento: ' + (err?.message || JSON.stringify(err)));
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = `Fechar Caixa do Evento e Gerar Receita (${totalPago.toFixed(2)} €)`;
                }
            }
        }

        /* ════════════════════════════════════════════════════════════════════════
           EXPORT
        ════════════════════════════════════════════════════════════════════════ */
        Object.assign(window, {
            evSetTab, evFiltrar, evToggleSt,
            evSelEvento, evAbrirForm, evSalvar,
            evIniciar, evConcluir, evCancelar, evExcluir,
            evMostrarQR, evCopiarURL, evDownloadQR,
            evVerPresencas, evRenderPresencas, evRenderPresBody, evSetPresSearch,
            evMarcarPres, evRemoverPresenca,
            evAddParticipante, evFinalizarEntradas,
            evAbrirMotivo, evGuardarMotivo,
            evGerarPDF, _pdfTipoLabel,
            evRenderSideTipos, evSelTipo,
            evAbrirFormTipo, evSalvarTipo, evRemoverTipo, evMoverTipo,
            evOnTipoChange,
            evCopiarLinkInscricao, evVerInscricoes,
            evRenderFilaPagamento, evMarcarPago, evCancelarInscricao, evCancelarPagamento,
            evRenderDetalhe, evVoltarDetalhe,
            evFecharCaixaEvento, evEscolherMetodoPagamento
        });

        evInit();
    })();
</script>
