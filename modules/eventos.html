<style>
/* ══ EVENTOS MODULE ══════════════════════════════════════════════════════ */
.ev-wrap { display:flex; height:100%; overflow:hidden; background:var(--bg); }

/* ── SIDEBAR ─────────────────────────────────────────────────────────── */
.ev-side { width:260px; flex-shrink:0; display:flex; flex-direction:column; border-right:1px solid var(--border); background:var(--bg-card); overflow:hidden; }
.ev-side-head { padding:10px 10px 0; flex-shrink:0; border-bottom:1px solid var(--border); }

.ev-tabs { display:flex; gap:2px; margin-bottom:8px; }
.ev-tab { flex:1; padding:6px 4px; font-family:var(--font-title); font-size:8px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-faint); border:1px solid transparent; border-radius:8px; background:none; cursor:pointer; transition:all .15s; text-align:center; }
.ev-tab.active { background:var(--primary-faint); border-color:var(--primary); color:var(--primary-dark); }
.ev-tab:hover:not(.active) { color:var(--text-muted); background:var(--bg-input); }

.ev-search { width:100%; background:var(--bg-input); border:1px solid var(--border); border-radius:8px; padding:7px 10px; font-size:12px; font-family:var(--font-body); color:var(--text-main); outline:none; box-sizing:border-box; margin-bottom:6px; }
.ev-search:focus { border-color:var(--primary); }

.ev-filtros { display:flex; flex-direction:column; gap:4px; padding-bottom:8px; }
.ev-filtro-titulo { font-family:var(--font-title); font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--text-faint); padding:2px 0; }
.ev-filtro-grupo { display:flex; flex-wrap:wrap; gap:3px; }
.ev-filtro-chip { padding:3px 8px; border-radius:20px; border:1px solid var(--border); background:var(--bg-input); font-size:10px; color:var(--text-faint); cursor:pointer; transition:all .12s; white-space:nowrap; }
.ev-filtro-chip:hover { border-color:var(--primary); color:var(--primary-dark); }
.ev-filtro-chip.active { background:var(--primary-faint); border-color:var(--primary); color:var(--primary-dark); font-weight:700; }
.ev-filtro-select { width:100%; background:var(--bg-input); border:1px solid var(--border); border-radius:8px; padding:5px 8px; font-size:11px; font-family:var(--font-body); color:var(--text-main); outline:none; box-sizing:border-box; cursor:pointer; }
.ev-count { font-size:10px; color:var(--text-faint); padding:4px 0 0; text-align:right; }

.ev-list { flex:1; overflow-y:auto; padding:6px; -webkit-overflow-scrolling:touch; }
.ev-list-item { display:flex; align-items:flex-start; gap:8px; padding:8px; border-radius:8px; cursor:pointer; transition:background .12s; border:1px solid transparent; }
.ev-list-item:hover { background:var(--primary-faint); }
.ev-list-item.active { background:var(--primary-faint); border-color:var(--primary); }
.ev-list-avatar { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0; background:var(--primary-faint); color:var(--primary-dark); }
.ev-list-info { flex:1; min-width:0; }
.ev-list-nome { font-size:12px; font-weight:600; color:var(--text-main); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ev-list-sub { font-size:10px; color:var(--text-faint); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
.ev-list-badges { display:flex; gap:3px; margin-top:2px; flex-wrap:wrap; }
.ev-list-sep { font-family:var(--font-title); font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--text-faint); padding:8px 8px 3px; border-top:1px solid var(--border); margin-top:4px; }
.ev-list-sep:first-child { border-top:none; margin-top:0; }

.ev-btn-novo { width:calc(100% - 12px); margin:6px; padding:7px; border-radius:8px; border:1px dashed var(--primary); background:var(--primary-faint); color:var(--primary-dark); font-family:var(--font-title); font-size:9px; letter-spacing:1px; cursor:pointer; transition:all .15s; flex-shrink:0; }
.ev-btn-novo:hover { background:var(--primary); color:#fff; border-style:solid; }

/* ── PAINEL DIREITO ──────────────────────────────────────────────────── */
.ev-panel { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; background:var(--bg); }
.ev-panel-inner { flex:1; overflow-y:auto; padding:16px; -webkit-overflow-scrolling:touch; }
.ev-panel-inner::-webkit-scrollbar { width:4px; }
.ev-panel-inner::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.ev-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; min-height:300px; gap:10px; padding:40px; text-align:center; }
.ev-empty-icon { font-size:28px; opacity:.25; }
.ev-empty-txt { font-size:13px; color:var(--text-faint); line-height:1.6; max-width:260px; }

/* Botoes */
.ev-btn { padding:7px 14px; border-radius:8px; font-family:var(--font-title); font-size:9px; letter-spacing:1px; text-transform:uppercase; border:1px solid var(--border); background:var(--bg-input); color:var(--text-muted); cursor:pointer; transition:all .12s; }
.ev-btn:hover { border-color:var(--primary); color:var(--primary-dark); background:var(--primary-faint); }
.ev-btn.primary { background:var(--primary); color:#fff; border-color:var(--primary); }
.ev-btn.primary:hover { background:var(--primary-dark); }
.ev-btn.success { color:#2e7d32; border-color:rgba(46,125,50,.35); }
.ev-btn.success:hover { background:rgba(46,125,50,.08); }
.ev-btn.danger  { color:#c62828; border-color:rgba(198,40,40,.35); }
.ev-btn.danger:hover  { background:rgba(198,40,40,.08); }
.ev-btn.qr      { color:var(--primary-dark); border-color:var(--primary); background:var(--primary-faint); }
.ev-btn:disabled { opacity:.4; cursor:not-allowed; }

/* Presencas */
.ev-pres-add { background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:10px 12px; margin-bottom:12px; }
.ev-pres-add-title { font-family:var(--font-title); font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--text-faint); margin-bottom:6px; }
.ev-pres-add-row { display:flex; gap:6px; align-items:center; }
.ev-grupo-label { font-family:var(--font-title); font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--text-faint); padding:10px 0 5px; border-top:1px solid var(--border); margin-top:6px; }
.ev-pres-row { background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:10px 12px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:5px; }
.ev-pres-foto { width:36px; height:36px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:bold; background:var(--primary-faint); color:var(--primary-dark); overflow:hidden; }
.ev-pres-foto img { width:100%; height:100%; object-fit:cover; }
.ev-pres-info { flex:1; min-width:0; }
.ev-pres-nome { font-size:13px; font-weight:600; color:var(--text-main); }
.ev-pres-areas { display:flex; gap:3px; flex-wrap:wrap; margin-top:3px; }
.ev-pres-btns { display:flex; gap:4px; flex-wrap:wrap; }

/* Stats */
.ev-stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px; }
.ev-stat-box { background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:12px 8px; text-align:center; }
.ev-stat-num { font-family:var(--font-title); font-size:22px; font-weight:700; }
.ev-stat-lbl { font-size:9px; color:var(--text-faint); margin-top:2px; }
.ev-chart-box { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:12px; }
.ev-chart-title { font-family:var(--font-title); font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--text-faint); margin-bottom:12px; }
.ev-pizza-row { display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
.ev-legend { display:flex; flex-direction:column; gap:6px; }
.ev-legend-item { display:flex; align-items:center; gap:6px; font-size:12px; }
.ev-legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

/* QR Modal */
.ev-qr-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:9999; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(3px); }
.ev-qr-modal { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:28px 24px; max-width:340px; width:92%; text-align:center; }
.ev-qr-title { font-family:var(--font-title); font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--primary-dark); margin-bottom:3px; }
.ev-qr-sub { font-size:12px; color:var(--text-faint); margin-bottom:18px; }
.ev-qr-canvas-wrap { background:#fff; border-radius:10px; padding:14px; display:inline-block; margin-bottom:14px; }
.ev-qr-url { font-size:10px; color:var(--text-faint); word-break:break-all; background:var(--bg-input); padding:8px 10px; border-radius:8px; margin-bottom:14px; text-align:left; }
.ev-qr-btns { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }

.ev-form-section { font-family:var(--font-title); font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--text-faint); padding:14px 0 6px; border-bottom:1px solid var(--border); margin-bottom:10px; grid-column:1/-1; }
</style>

<div class="ev-wrap" id="ev-wrap">
    <!-- SIDEBAR -->
    <div class="ev-side" id="ev-side">
        <div class="ev-side-head">
            <div class="ev-tabs">
                <button class="ev-tab active" id="ev-tab-0" onclick="evSetTab(0)">Eventos</button>
                <button class="ev-tab"        id="ev-tab-1" onclick="evSetTab(1)">Tipos</button>
            </div>
            <div id="ev-filtros-wrap">
                <input class="ev-search" id="ev-search" type="text" placeholder="Pesquisar evento..." oninput="evFiltrar()">
                <div class="ev-filtros">
                    <div class="ev-filtro-titulo">Tipo de Reuniao</div>
                    <select class="ev-filtro-select" id="ev-filtro-tipo" onchange="evFiltrar()">
                        <option value="">Todos os tipos</option>
                    </select>
                    <div class="ev-filtro-titulo">Estado</div>
                    <div class="ev-filtro-grupo">
                        <button class="ev-filtro-chip" data-st="aberto"    onclick="evToggleSt(this)">Aberto</button>
                        <button class="ev-filtro-chip" data-st="em_curso"  onclick="evToggleSt(this)">Em Curso</button>
                        <button class="ev-filtro-chip" data-st="concluido" onclick="evToggleSt(this)">Concluido</button>
                        <button class="ev-filtro-chip" data-st="cancelado" onclick="evToggleSt(this)">Cancelado</button>
                    </div>
                    <div class="ev-count" id="ev-count"></div>
                </div>
            </div>
        </div>
        <div class="ev-list" id="ev-list"><div style="padding:16px;font-size:12px;color:var(--text-faint)">A carregar...</div></div>
        <button class="ev-btn-novo" id="ev-btn-novo" onclick="evAbrirForm(null)">+ Novo Evento</button>
    </div>

    <!-- PAINEL -->
    <div class="ev-panel" id="ev-panel">
        <div class="ev-panel-inner" id="ev-panel-inner">
            <div class="ev-empty"><div class="ev-empty-icon">—</div><div class="ev-empty-txt">Seleciona um evento na lista lateral ou cria um novo.</div></div>
        </div>
    </div>
</div>

<script>
(function(){

let evTab=0, evEventos=[], evPresencas=[], evLidMin={}, evAtivo=null, evView='info';
let evFiltroQ='', evFiltroSt=new Set(), evFiltroTipo='', evPresSearchQ='', _motivoId=null, evTipoIdx=null;

const ST={aberto:{label:'Aberto',cls:'badge-green'},em_curso:{label:'Em Curso',cls:'badge-primary'},concluido:{label:'Concluido',cls:'badge-gray'},cancelado:{label:'Cancelado',cls:'badge-red'}};
const _sb=window.sb;

function getTipos(){try{const s=localStorage.getItem('zion_tipos_evento');return s?JSON.parse(s):['Reuniao de Lideres','Culto Especial','Conferencia','Retiro','Treinamento','Workshop','Conferencia de Jovens','Encontro de Casais','Culto de Oracao','Seminario','Outro'];}catch{return[];}}
function saveTipos(l){localStorage.setItem('zion_tipos_evento',JSON.stringify(l));}

async function evInit(){
    evEventos=await _sb('eventos?select=*&order=data_inicio')||[];
    evSetTab(0);
}

function evSetTab(t){
    evTab=t;
    document.querySelectorAll('.ev-tab').forEach((b,i)=>b.classList.toggle('active',i===t));
    const fw=document.getElementById('ev-filtros-wrap');
    if(fw) fw.style.display=t===0?'':'none';
    const nb=document.getElementById('ev-btn-novo');
    if(t===0){if(nb){nb.textContent='+ Novo Evento';nb.onclick=()=>evAbrirForm(null);} evRenderSide(); evAtivo?evRenderDetalhe():evPanelEmpty('Seleciona um evento.');}
    if(t===1){if(nb){nb.textContent='+ Novo Tipo';nb.onclick=()=>evAbrirFormTipo(null);} evRenderSideTipos(); evPanelEmpty('Seleciona um tipo para editar ou cria um novo.');}
}

function evPanelEmpty(msg){document.getElementById('ev-panel-inner').innerHTML=`<div class="ev-empty"><div class="ev-empty-icon">—</div><div class="ev-empty-txt">${msg}</div></div>`;}

// ── SIDEBAR EVENTOS ────────────────────────────────────────────────────
function evRenderSide(){
    const tipos=getTipos();
    const sel=document.getElementById('ev-filtro-tipo');
    if(sel) sel.innerHTML='<option value="">Todos os tipos</option>'+tipos.map(t=>`<option value="${t}" ${evFiltroTipo===t?'selected':''}>${t}</option>`).join('');

    let lista=[...evEventos].sort((a,b)=>new Date(b.data_inicio)-new Date(a.data_inicio));
    if(evFiltroQ) lista=lista.filter(e=>(e.titulo||'').toLowerCase().includes(evFiltroQ.toLowerCase()));
    if(evFiltroSt.size) lista=lista.filter(e=>evFiltroSt.has(e.status));
    if(evFiltroTipo) lista=lista.filter(e=>e.tipo===evFiltroTipo);

    const ct=document.getElementById('ev-count'); if(ct) ct.textContent=`${lista.length} evento(s)`;
    const list=document.getElementById('ev-list');
    if(!lista.length){list.innerHTML=`<div style="padding:16px;font-size:12px;color:var(--text-faint)">Nenhum evento encontrado.</div>`;return;}

    const grupos={em_curso:[],aberto:[],concluido:[],cancelado:[]};
    lista.forEach(e=>{(grupos[e.status||'aberto']=grupos[e.status||'aberto']||[]).push(e);});
    const ord=['em_curso','aberto','concluido','cancelado'];
    const lbs={em_curso:'Em Curso',aberto:'Abertos',concluido:'Concluidos',cancelado:'Cancelados'};

    let html='';
    ord.forEach(g=>{
        if(!grupos[g]?.length) return;
        html+=`<div class="ev-list-sep">${lbs[g]} (${grupos[g].length})</div>`;
        grupos[g].forEach(e=>{
            const st=ST[e.status]||ST.aberto;
            const dI=e.data_inicio?new Date(e.data_inicio).toLocaleDateString('pt-PT',{day:'2-digit',month:'short'}):'—';
            html+=`<div class="ev-list-item ${evAtivo?.id===e.id?'active':''}" onclick="evSelEvento('${e.id}')">
                <div class="ev-list-avatar">${(e.titulo||'E')[0]}</div>
                <div class="ev-list-info">
                    <div class="ev-list-nome">${e.titulo||'—'}</div>
                    <div class="ev-list-sub">${dI}${e.local?' · '+e.local:''}</div>
                    <div class="ev-list-badges">
                        <span class="badge ${st.cls}" style="font-size:8px;padding:1px 6px">${st.label}</span>
                        ${e.tipo?`<span class="badge badge-gray" style="font-size:8px;padding:1px 6px">${e.tipo}</span>`:''}
                    </div>
                </div>
            </div>`;
        });
    });
    list.innerHTML=html;
}

function evFiltrar(){evFiltroQ=document.getElementById('ev-search')?.value||'';evFiltroTipo=document.getElementById('ev-filtro-tipo')?.value||'';evRenderSide();}
function evToggleSt(btn){const st=btn.dataset.st;if(evFiltroSt.has(st)){evFiltroSt.delete(st);btn.classList.remove('active');}else{evFiltroSt.add(st);btn.classList.add('active');}evRenderSide();}

// ── DETALHE EVENTO ─────────────────────────────────────────────────────
function evSelEvento(id){evAtivo=evEventos.find(e=>e.id===id)||null;evView='info';evRenderSide();evRenderDetalhe();}

function evRenderDetalhe(){
    const e=evAtivo; if(!e){evPanelEmpty('Seleciona um evento.');return;}
    const st=ST[e.status]||ST.aberto;
    const dI=e.data_inicio?new Date(e.data_inicio).toLocaleDateString('pt-PT',{weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
    const dF=e.data_fim?new Date(e.data_fim).toLocaleDateString('pt-PT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'';
    const emC=e.status==='em_curso',ab=e.status==='aberto',conc=e.status==='concluido',canc=e.status==='cancelado';

    let btns='';
    if(ab)       btns+=`<button class="ev-btn" onclick="evAbrirForm('${e.id}')">Editar</button>`;
    if(ab)       btns+=`<button class="ev-btn success" onclick="evIniciar('${e.id}')">Iniciar Evento</button>`;
    if(emC)      btns+=`<button class="ev-btn primary" onclick="evVerPresencas('${e.id}')">Presencas</button>`;
    if(emC)      btns+=`<button class="ev-btn qr" onclick="evMostrarQR('${e.id}')">QR Code</button>`;
    if(emC)      btns+=`<button class="ev-btn success" onclick="evConcluir('${e.id}')">Concluir</button>`;
    if(conc||canc) btns+=`<button class="ev-btn" onclick="evVerPresencas('${e.id}')">Ver Resumo</button>`;
    if(conc)     btns+=`<button class="ev-btn danger" onclick="evGerarPDF('${e.id}')">PDF</button>`;
    if(!conc&&!canc) btns+=`<button class="ev-btn danger" onclick="evCancelar('${e.id}')">Cancelar</button>`;
    btns+=`<button class="ev-btn danger" onclick="evExcluir('${e.id}')" style="margin-left:auto;opacity:.7" title="Excluir permanentemente">Excluir</button>`;

    let html=`<div style="animation:fadeIn .2s ease">
        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:14px">
            <div style="font-size:18px;font-weight:700;color:var(--text-main);margin-bottom:4px">${e.titulo||'—'}</div>
            <div style="font-size:12px;color:var(--text-faint);margin-bottom:10px">${dI}${dF?' — '+dF:''}${e.local?' · '+e.local:''}</div>
            <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px">
                <span class="badge ${st.cls}">${st.label}</span>
                ${e.tipo?`<span class="badge badge-gray">${e.tipo}</span>`:''}
                ${e.gratuito?'<span class="badge badge-green">Gratuito</span>':''}
                ${e.destaque?'<span class="badge badge-primary">Destaque</span>':''}
            </div>
            <div style="display:flex;gap:6px;flex-wrap:wrap">${btns}</div>
        </div>`;

    if(e.descricao) html+=`<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;font-size:13px;color:var(--text-muted);line-height:1.6">${e.descricao}</div>`;
    if(e.link_inscricao) html+=`<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:14px"><div style="font-family:var(--font-title);font-size:8px;letter-spacing:2px;color:var(--text-faint);margin-bottom:6px">LINK DE INSCRICAO</div><a href="${e.link_inscricao}" target="_blank" style="font-size:12px;color:var(--primary-dark)">${e.link_inscricao}</a></div>`;
    if(e.valor) html+=`<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:14px"><span style="font-family:var(--font-title);font-size:8px;letter-spacing:2px;color:var(--text-faint)">VALOR</span><span style="font-size:16px;font-weight:700;color:var(--primary-dark);margin-left:10px">${Number(e.valor).toFixed(2)} €</span></div>`;
    html+='</div>';

    document.getElementById('ev-panel-inner').innerHTML=html;
    if(evView==='presencas') evVerPresencas(e.id);
}

// ── ACOES ──────────────────────────────────────────────────────────────
async function evIniciar(id){
    const ev=evEventos.find(e=>e.id===id);if(!ev)return;
    const isL=ev.tipo==='Reuniao de Lideres'||ev.tipo==='Reunião de Líderes';
    if(!confirm(`Iniciar "${ev.titulo}"?${isL?' Todos os lideres serao adicionados automaticamente.':''}`))return;
    await _sb(`eventos?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status:'em_curso'})});
    if(isL){const l=await _sb('membros?select=id,nome&e_lider=eq.true&ativo=eq.true').catch(()=>[]);if(l?.length)await _sb('evento_presencas',{method:'POST',body:JSON.stringify(l.map(x=>({evento_id:id,membro_id:x.id,status:'pendente'})))});}
    await evRecarregar();evSelEvento(id);
}
async function evConcluir(id){
    if(!confirm('Concluir evento? Pendentes serao marcados como faltaram.'))return;
    await _sb(`evento_presencas?evento_id=eq.${id}&status=eq.pendente`,{method:'PATCH',body:JSON.stringify({status:'faltou'})});
    await _sb(`eventos?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status:'concluido'})});
    evView='info';await evRecarregar();evSelEvento(id);
}
async function evCancelar(id){
    if(!confirm('Cancelar este evento?'))return;
    await _sb(`eventos?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status:'cancelado'})});
    await evRecarregar();evSelEvento(id);
}
async function evExcluir(id){
    const ev=evEventos.find(e=>e.id===id);if(!ev)return;
    if(!confirm(`Excluir permanentemente "${ev.titulo}"?\n\nEsta acao nao pode ser desfeita. As presenças associadas tambem serao removidas.`))return;
    // Remove presenças primeiro (FK constraint)

}

// ── QR CODE NATIVO ─────────────────────────────────────────────────────
async function evMostrarQR(id){
    const ev=evEventos.find(e=>e.id===id);if(!ev)return;
    let token=ev.qr_token;
    if(!token){token=evGerarToken();await _sb(`eventos?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({qr_token:token})});ev.qr_token=token;}
    const base=window.location.origin+window.location.pathname.replace(/[^/]*$/,'');
    const url=`${base}presenca.html?e=${id}&t=${token}`;
    const safeNome=(ev.titulo||'evento').replace(/'/g,'').replace(/\s+/g,'-').toLowerCase();

    const ov=document.createElement('div');
    ov.className='ev-qr-overlay';ov.id='ev-qr-ov';
    ov.onclick=x=>{if(x.target===ov)ov.remove();};
    ov.innerHTML=`<div class="ev-qr-modal">
        <div class="ev-qr-title">QR Code de Presenca</div>
        <div class="ev-qr-sub">${ev.titulo}</div>
        <div class="ev-qr-canvas-wrap"><canvas id="ev-qr-cv" width="200" height="200"></canvas></div>
        <div class="ev-qr-url">${url}</div>
        <div class="ev-qr-btns">
            <button class="ev-btn" onclick="evCopiarURL('${url}')">Copiar Link</button>
            <button class="ev-btn primary" onclick="evDownloadQR('${safeNome}')">Download PNG</button>
            <button class="ev-btn" onclick="document.getElementById('ev-qr-ov').remove()">Fechar</button>
        </div></div>`;
    document.body.appendChild(ov);
    setTimeout(()=>evDrawQR(document.getElementById('ev-qr-cv'),url),60);
}

function evGerarToken(){const a=new Uint8Array(20);crypto.getRandomValues(a);return Array.from(a).map(b=>b.toString(16).padStart(2,'0')).join('');}
function evCopiarURL(url){navigator.clipboard?.writeText(url).then(()=>alert('Link copiado!')).catch(()=>{const el=document.createElement('textarea');el.value=url;document.body.appendChild(el);el.select();document.execCommand('copy');el.remove();alert('Link copiado!');});}
function evDownloadQR(nome){const c=document.getElementById('ev-qr-cv');if(!c)return;const a=document.createElement('a');a.download=`qr-${nome}.png`;a.href=c.toDataURL('image/png');a.click();}

function evDrawQR(canvas,text){
    if(window.QRCode){_evRenderQR(canvas,text);return;}
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    s.onload=()=>_evRenderQR(canvas,text);
    s.onerror=()=>_evQRFallback(canvas,text);
    document.head.appendChild(s);
}
function _evRenderQR(canvas,text){
    try{
        const tmp=document.createElement('div');tmp.style.cssText='position:fixed;left:-9999px;top:-9999px;width:200px;height:200px';document.body.appendChild(tmp);
        new QRCode(tmp,{text,width:200,height:200,colorDark:'#005f65',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
        setTimeout(()=>{
            const src=tmp.querySelector('canvas');
            if(src){const ctx=canvas.getContext('2d');ctx.drawImage(src,0,0,200,200);}
            else{const img=tmp.querySelector('img');if(img){const i=new Image();i.onload=()=>canvas.getContext('2d').drawImage(i,0,0,200,200);i.src=img.src;}}
            tmp.remove();
        },150);
    }catch(e){_evQRFallback(canvas,text);}
}
function _evQRFallback(canvas,text){
    const ctx=canvas.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,200,200);
    ctx.fillStyle='#005f65';ctx.textAlign='center';ctx.font='bold 11px monospace';ctx.fillText('Abrir link abaixo',100,90);
    ctx.font='9px monospace';let y=110,line='';
    for(const c of text){line+=c;if(line.length>30){ctx.fillText(line,100,y);y+=13;line='';}}
    if(line)ctx.fillText(line,100,y);
}

// ── RESUMO GRAFICOS ─────────────────────────────────────────────────────
function evRenderResumo(pres,mMap){
    const nP=pres.filter(p=>p.status==='presente').length,nF=pres.filter(p=>p.status==='faltou').length,nM=pres.filter(p=>p.status==='faltou_motivo').length,tot=pres.length,pct=tot>0?Math.round(nP/tot*100):0;
    let html=`<div style="font-family:var(--font-title);font-size:8px;letter-spacing:2px;color:var(--text-faint);margin-bottom:10px">RESUMO</div>
    <div class="ev-stats-grid">
        <div class="ev-stat-box"><div class="ev-stat-num" style="color:var(--green)">${nP}</div><div class="ev-stat-lbl">Presentes</div><div style="font-size:10px;font-weight:700;color:var(--green)">${pct}%</div></div>
        <div class="ev-stat-box"><div class="ev-stat-num" style="color:var(--red)">${nF}</div><div class="ev-stat-lbl">Faltaram</div><div style="font-size:10px;color:var(--red)">${tot>0?Math.round(nF/tot*100):0}%</div></div>
        <div class="ev-stat-box"><div class="ev-stat-num" style="color:#e65100">${nM}</div><div class="ev-stat-lbl">Com motivo</div><div style="font-size:10px;color:#e65100">${tot>0?Math.round(nM/tot*100):0}%</div></div>
        <div class="ev-stat-box"><div class="ev-stat-num" style="color:var(--text-muted)">${tot}</div><div class="ev-stat-lbl">Total</div></div>
    </div>`;
    if(tot>0){
        const d=[{v:nP,c:'#2e7d32',l:'Presentes'},{v:nM,c:'#e65100',l:'Com Motivo'},{v:nF,c:'#c62828',l:'Faltaram'}];
        const r=55,cx=65,cy=65;let paths='',s=-Math.PI/2;
        d.forEach(x=>{if(!x.v)return;const a=x.v/tot*Math.PI*2,en=s+a,x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s),x2=cx+r*Math.cos(en),y2=cy+r*Math.sin(en);paths+=`<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${a>Math.PI?1:0},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${x.c}" opacity=".85"/>`;s=en;});
        paths+=`<circle cx="${cx}" cy="${cy}" r="26" fill="var(--bg-card)"/><text x="${cx}" y="${cy-3}" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-main)">${tot}</text><text x="${cx}" y="${cy+10}" text-anchor="middle" font-size="8" fill="var(--text-faint)">TOTAL</text>`;
        const leg=d.map(x=>`<div class="ev-legend-item"><div class="ev-legend-dot" style="background:${x.c}"></div><span>${x.l}: <strong>${x.v}</strong> (${tot>0?Math.round(x.v/tot*100):0}%)</span></div>`).join('');
        html+=`<div class="ev-chart-box"><div class="ev-chart-title">Distribuicao Geral</div><div class="ev-pizza-row"><svg width="130" height="130" viewBox="0 0 130 130">${paths}</svg><div class="ev-legend">${leg}</div></div></div>`;
    }
    const porArea={};
    pres.forEach(p=>{(mMap[p.membro_id]||[{tipo:'Sem area',nome:'Sem area',papel:''}]).forEach(m=>{const k=`${m.tipo}||${m.nome}`;if(!porArea[k])porArea[k]={tipo:m.tipo,nome:m.nome,pres:0,falt:0,total:0};porArea[k].total++;if(p.status==='presente')porArea[k].pres++;else if(p.status==='faltou'||p.status==='faltou_motivo')porArea[k].falt++;});});
    const areas=Object.values(porArea).sort((a,b)=>b.total-a.total);
    if(areas.length){
        const bs=areas.map(a=>{const pA=Math.round(a.pres/(a.total||1)*100),tL=a.tipo==='ministerio'?'MIN':a.tipo==='Sem area'?'—':'AE';return`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:11px"><span style="font-size:8px;background:var(--bg-input);padding:1px 4px;border-radius:3px;color:var(--text-faint);margin-right:4px">${tL}</span>${a.nome}</span><span style="font-size:10px;font-weight:bold;color:${pA>=80?'var(--green)':pA>=50?'#e65100':'var(--red)'}">${pA}%</span></div><div style="display:flex;gap:2px;height:10px"><div style="flex:${a.pres||0};background:#2e7d32;border-radius:3px;opacity:.8;min-width:${a.pres?'3px':'0'}"></div><div style="flex:${a.falt||0};background:#c62828;border-radius:3px;opacity:.8;min-width:${a.falt?'3px':'0'}"></div></div><div style="font-size:9px;color:var(--text-faint);margin-top:1px">${a.pres} pres. · ${a.falt} falt. · ${a.total} total</div></div>`;}).join('');
        html+=`<div class="ev-chart-box"><div class="ev-chart-title">Presencas por Area / Ministerio</div>${bs}</div>`;
    }
    return html;
}

async function evGerarPDF(evId){
    const ev=evEventos.find(e=>e.id===evId);if(!ev)return;
    const pres=await _sb(`evento_presencas?select=*,membros(id,nome)&evento_id=eq.${evId}&order=created_at`)||[];
    const mIds=pres.map(p=>p.membro_id).filter(Boolean);
    let mMap={};
    if(mIds.length){
        const v=await _sb(`membro_ministerios?select=membro_id,papel,ministerios(nome,tipo)&membro_id=in.(${mIds.join(',')})&ativo=eq.true`)||[];
        v.forEach(x=>{if(!mMap[x.membro_id])mMap[x.membro_id]=[];mMap[x.membro_id].push({tipo:x.ministerios?.tipo||'outro',nome:x.ministerios?.nome||'—',papel:x.papel||'',tipoLabel:_pdfTipoLabel(x.ministerios?.tipo)});});
    }

    const nP=pres.filter(p=>p.status==='presente'),nF=pres.filter(p=>p.status==='faltou'),nM=pres.filter(p=>p.status==='faltou_motivo'),tot=pres.length;
    const dE=ev.data_inicio?new Date(ev.data_inicio).toLocaleDateString('pt-PT',{weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';

    // ── helpers row ────────────────────────────────────────────────────────
    const rowM=p=>{
        const ms=(mMap[p.membro_id]||[]).map(m=>`[${m.tipoLabel}] ${m.nome}${m.papel?' · '+m.papel:''}`).join(' | ');
        return`<tr><td>${p.membros?.nome||'—'}</td><td style="font-size:11px;color:#555">${ms||'—'}</td><td style="font-size:11px;color:#c07000">${p.motivo||'—'}</td></tr>`;
    };

    // ── gráfico pizza SVG ──────────────────────────────────────────────────
    const _pizza=(dados,total,r,cx,cy)=>{
        if(!total) return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#eee"/>`;
        let paths='',start=-Math.PI/2;
        dados.forEach(d=>{
            if(!d.v)return;
            const a=d.v/total*Math.PI*2,en=start+a;
            const x1=cx+r*Math.cos(start),y1=cy+r*Math.sin(start);
            const x2=cx+r*Math.cos(en),y2=cy+r*Math.sin(en);
            paths+=`<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${a>Math.PI?1:0},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${d.c}" opacity="0.9"/>`;
            start=en;
        });
        // anel central
        paths+=`<circle cx="${cx}" cy="${cy}" r="${Math.round(r*.42)}" fill="white"/>`;
        paths+=`<text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">${total}</text>`;
        paths+=`<text x="${cx}" y="${cy+10}" text-anchor="middle" font-size="8" fill="#999">TOTAL</text>`;
        return paths;
    };

    // ── gráfico barras horizontais ─────────────────────────────────────────
    const _barras=(items,maxW)=>{
        // items: [{label, pres, falt, mot, total}]
        const H=22,gap=6,pad=4;
        const svgH=items.length*(H+gap)+pad*2;
        let rects='';
        items.forEach((it,i)=>{
            const y=pad+i*(H+gap);
            const pPres=it.total>0?it.pres/it.total:0;
            const pFalt=it.total>0?it.falt/it.total:0;
            const pMot =it.total>0?it.mot/it.total:0;
            const wPres=Math.round(pPres*maxW),wFalt=Math.round(pFalt*maxW),wMot=Math.round(pMot*maxW);
            const pct=Math.round(pPres*100);
            const cor=pct>=80?'#2e7d32':pct>=50?'#e65100':'#c62828';
            rects+=`<rect x="0" y="${y}" width="${maxW}" height="${H}" rx="4" fill="#f5f5f5"/>`;
            if(wPres>0) rects+=`<rect x="0" y="${y}" width="${wPres}" height="${H}" rx="4" fill="#2e7d32" opacity=".85"/>`;
            if(wMot>0)  rects+=`<rect x="${wPres}" y="${y}" width="${wMot}" height="${H}" rx="0" fill="#e65100" opacity=".8"/>`;
            if(wFalt>0) rects+=`<rect x="${wPres+wMot}" y="${y}" width="${wFalt}" height="${H}" rx="0" fill="#c62828" opacity=".7"/>`;
            const lblX=maxW+6;
            rects+=`<text x="${lblX}" y="${y+H/2+4}" font-size="10" fill="${cor}" font-weight="bold">${pct}%</text>`;
            rects+=`<text x="-4" y="${y+H/2+4}" font-size="10" fill="#333" text-anchor="end">${it.label.length>22?it.label.slice(0,22)+'…':it.label}</text>`;
        });
        return`<svg width="${maxW+80}" height="${svgH}" viewBox="-75 0 ${maxW+80} ${svgH}" style="max-width:100%">${rects}</svg>`;
    };

    // ── separar por tipo ───────────────────────────────────────────────────
    // Tipos a separar: 'ae' (area de extensao), 'presbitero'/'presbiterio', 'ministerio', outros
    const _TIPOS={
        ae:{label:'Areas de Extensao (AE)',tipos:['ae','area_extensao','area extensao']},
        presbitero:{label:'Presbiterio',tipos:['presbitero','presbiterio','presbytery']},
        ministerio:{label:'Ministerios',tipos:['ministerio','ministry']},
        outro:{label:'Outras Areas',tipos:['outro','other','',null,undefined]},
    };

    const _classificar=tipo=>{
        const t=(tipo||'').toLowerCase().trim();
        for(const [k,v] of Object.entries(_TIPOS)){if(v.tipos.some(x=>x&&t.includes(x)))return k;}
        return 'outro';
    };

    // Calcular stats por area (independente do tipo)
    const porArea={};
    pres.forEach(p=>{
        const mins=mMap[p.membro_id];
        if(!mins||!mins.length){
            const k='__semarea__';
            if(!porArea[k])porArea[k]={label:'Sem area',tipo:'outro',tipoLabel:'—',pres:0,falt:0,mot:0,total:0};
            porArea[k].total++;
            if(p.status==='presente')porArea[k].pres++;
            else if(p.status==='faltou_motivo')porArea[k].mot++;
            else if(p.status==='faltou')porArea[k].falt++;
        } else {
            mins.forEach(m=>{
                const k=m.tipo+'||'+m.nome;
                if(!porArea[k])porArea[k]={label:m.nome,tipo:_classificar(m.tipo),tipoLabel:m.tipoLabel,pres:0,falt:0,mot:0,total:0};
                porArea[k].total++;
                if(p.status==='presente')porArea[k].pres++;
                else if(p.status==='faltou_motivo')porArea[k].mot++;
                else if(p.status==='faltou')porArea[k].falt++;
            });
        }
    });

    // Calcular stats por tipo
    const porTipo={ae:{pres:0,falt:0,mot:0,total:0},presbitero:{pres:0,falt:0,mot:0,total:0},ministerio:{pres:0,falt:0,mot:0,total:0},outro:{pres:0,falt:0,mot:0,total:0}};
    Object.values(porArea).forEach(a=>{
        const t=porTipo[a.tipo]||porTipo.outro;
        t.pres+=a.pres;t.falt+=a.falt;t.mot+=a.mot;t.total+=a.total;
    });

    // Agrupar areas por tipo (para gráficos)
    const areasPorTipo={};
    Object.values(porArea).forEach(a=>{
        if(!areasPorTipo[a.tipo])areasPorTipo[a.tipo]=[];
        areasPorTipo[a.tipo].push(a);
    });

    // ── Construir HTML do PDF ──────────────────────────────────────────────
    const gDados=[{v:nP.length,c:'#2e7d32',l:'Presentes'},{v:nM.length,c:'#e65100',l:'Com Motivo'},{v:nF.length,c:'#c62828',l:'Faltaram'}];
    const pizzaGeral=`<svg width="160" height="160" viewBox="0 0 160 160">${_pizza(gDados,tot,65,80,80)}</svg>`;

    const legendaGeral=gDados.map(d=>`<div style="display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:4px"><div style="width:12px;height:12px;border-radius:50%;background:${d.c};flex-shrink:0"></div>${d.l}: <strong>${d.v}</strong> (${tot>0?Math.round(d.v/tot*100):0}%)</div>`).join('');

    // Gráfico por tipo de área
    const tipoItems=Object.entries(_TIPOS).map(([k,v])=>{
        const t=porTipo[k]||{pres:0,falt:0,mot:0,total:0};
        return{label:v.label.replace(' (AE)',''),pres:t.pres,falt:t.falt,mot:t.mot,total:t.total};
    }).filter(x=>x.total>0);

    const barrasTypes=tipoItems.length>0?_barras(tipoItems,300):'<p style="color:#999;font-size:12px">Sem dados de areas para exibir.</p>';

    // Secções por tipo de área
    let secoesTipo='';
    for(const [tipoKey,tipoInfo] of Object.entries(_TIPOS)){
        const areas=(areasPorTipo[tipoKey]||[]).sort((a,b)=>b.total-a.total);
        if(!areas.length)continue;
        const areaItems=areas.map(a=>({label:a.label,pres:a.pres,falt:a.falt,mot:a.mot,total:a.total}));
        secoesTipo+=`<h2>${tipoInfo.label}</h2>
        <div style="display:flex;align-items:flex-start;gap:20px;margin-bottom:16px;flex-wrap:wrap">
            <div>${_barras(areaItems,260)}</div>
            <div style="font-size:11px;color:#666;line-height:1.8">
                ${areas.map(a=>{const pct=a.total>0?Math.round(a.pres/a.total*100):0;const cor=pct>=80?'#2e7d32':pct>=50?'#e65100':'#c62828';return`<div><strong>${a.label}</strong>: <span style="color:${cor}">${pct}%</span> presentes (${a.pres}/${a.total})</div>`;}).join('')}
            </div>
        </div>`;
    }

    const htm=`<!DOCTYPE html>

    const w=window.open('','_blank');w.document.write(htm);w.document.close();

// helper label tipo para o PDF
function _pdfTipoLabel(tipo){
    const t=(tipo||'').toLowerCase();
    if(t.includes('ae')||t.includes('extensao'))return'AE';
    if(t.includes('presbit'))return'PRESB';
    if(t.includes('minister'))return'MIN';
    return tipo||'—';
}

// ── FORM EVENTO ────────────────────────────────────────────────────────
function evAbrirForm(id){
    const e=id?evEventos.find(x=>x.id===id):null;
    const fv=(k,d='')=>e?.[k]??d;const fdt=k=>{const v=e?.[k];if(!v)return'';return new Date(v).toISOString().slice(0,16);};
    const tipos=getTipos(),tOpts=tipos.map(t=>`<option value="${t}" ${fv('tipo')===t?'selected':''}>${t}</option>`).join('');
    const body=`<div class="form-grid"><div class="msg-form" id="form-msg"></div>
        <div class="ev-form-section">Identificacao</div>
        <div class="form-group form-full"><label class="form-label">Titulo *</label><input class="form-input" id="fe_titulo" type="text" placeholder="Nome do evento" value="${fv('titulo')}"></div>
        <div class="form-group"><label class="form-label">Tipo</label><select class="form-select" id="fe_tipo"><option value="">-- Seleciona --</option>${tOpts}</select></div>
        <div class="form-group"><label class="form-label">Local</label><input class="form-input" id="fe_local" type="text" placeholder="Ex: Sede Lisboa" value="${fv('local')}"></div>
        <div class="form-group form-full"><label class="form-label">Descricao</label><textarea class="form-textarea" id="fe_descricao">${fv('descricao')}</textarea></div>
        <div class="ev-form-section">Data e Hora</div>
        <div class="form-group"><label class="form-label">Data Inicio</label><input class="form-input" id="fe_data_inicio" type="datetime-local" value="${fdt('data_inicio')}"></div>
        <div class="form-group"><label class="form-label">Data Fim</label><input class="form-input" id="fe_data_fim" type="datetime-local" value="${fdt('data_fim')}"></div>
        <div class="ev-form-section">Inscricao</div>
        <div class="form-group"><label class="form-label">Valor (€)</label><input class="form-input" id="fe_valor" type="number" placeholder="0.00" value="${fv('valor')}"></div>
        <div class="form-group"><label class="form-label">Link Inscricao</label><input class="form-input" id="fe_link" type="url" placeholder="https://..." value="${fv('link_inscricao')}"></div>
        <div class="form-group"><label class="form-toggle"><input type="checkbox" id="fe_gratuito" ${fv('gratuito')?'checked':''}><span>Gratuito</span></label></div>
        <div class="form-group"><label class="form-toggle"><input type="checkbox" id="fe_destaque" ${fv('destaque')?'checked':''}><span>Destaque</span></label></div>
        <div class="form-group"><label class="form-toggle"><input type="checkbox" id="fe_ativo" ${fv('ativo')!==false?'checked':''}><span>Ativo</span></label></div>
        <div class="form-actions"><button class="btn-cancel-form" onclick="closeDrawer()">Cancelar</button><button class="btn-save" id="btn-ev-save" onclick="evSalvar('${e?.id||''}')">Guardar</button></div>
    </div>`;
    document.getElementById('drawer-title').textContent=e?'Editar Evento':'Novo Evento';
    document.getElementById('drawer-body').innerHTML=body;
    document.getElementById('overlay').classList.remove('hidden');
    document.body.style.overflow='hidden';
}
async function evSalvar(id){
    const get=k=>{const el=document.getElementById('fe_'+k);return el?el.value||null:null;},chk=k=>{const el=document.getElementById('fe_'+k);return el?el.checked:false;};
    const body={titulo:get('titulo'),tipo:get('tipo'),local:get('local'),descricao:get('descricao'),data_inicio:get('data_inicio'),data_fim:get('data_fim'),valor:get('valor')?Number(get('valor')):null,link_inscricao:get('link'),gratuito:chk('gratuito'),destaque:chk('destaque'),ativo:chk('ativo')};
    if(!body.titulo){document.getElementById('form-msg').textContent='Titulo obrigatorio.';document.getElementById('form-msg').className='msg-form error';return;}
    const btn=document.getElementById('btn-ev-save');btn.disabled=true;btn.textContent='A guardar...';
    try{
        if(!id){body.status='aberto';await _sb('eventos',{method:'POST',body:JSON.stringify(body)});}else await _sb(`eventos?id=eq.${id}`,{method:'PATCH',body:JSON.stringify(body)});
        document.getElementById('form-msg').textContent='Guardado!';document.getElementById('form-msg').className='msg-form success';
        await evRecarregar();
        setTimeout(()=>{closeDrawer();if(id)evSelEvento(id);else{const n=evEventos.find(e=>e.titulo===body.titulo);if(n)evSelEvento(n.id);}},700);
    }catch(err){document.getElementById('form-msg').textContent='Erro: '+(err?.message||JSON.stringify(err));document.getElementById('form-msg').className='msg-form error';btn.disabled=false;btn.textContent='Guardar';}
}

function evRenderSideTipos(){
    const lista=getTipos();
    document.getElementById('ev-list').innerHTML='<div style="padding:8px 6px 2px;font-size:10px;color:var(--text-faint)">'+lista.length+' tipo(s)</div>'+
        lista.map((t,i)=>`<div class="ev-list-item ${evTipoIdx===i?'active':''}" onclick="evSelTipo(${i})" id="evt-item-${i}">
            <div class="ev-list-avatar" style="border-radius:6px;font-size:10px">${i+1}</div>

                ${t==='Reuniao de Lideres'||t==='Reunião de Líderes'?'<div class="ev-list-sub">Auto-adiciona lideres</div>':''}
            </div>
        </div>`).join('');
}
function evSelTipo(idx){
    evTipoIdx=idx;
    document.querySelectorAll('[id^="evt-item-"]').forEach((el,i)=>el.classList.toggle('active',i===idx));
    const lista=getTipos(),t=lista[idx],isL=t==='Reuniao de Lideres'||t==='Reunião de Líderes';
    document.getElementById('ev-panel-inner').innerHTML=`<div style="animation:fadeIn .2s ease">
        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px">
            <div style="font-size:18px;font-weight:700;margin-bottom:6px">${t}</div>
            ${isL?`<div style="font-size:12px;color:var(--primary-dark);background:var(--primary-faint);padding:8px 12px;border-radius:8px;margin-bottom:10px">Ao iniciar um evento com este tipo, todos os lideres sao adicionados automaticamente.</div>`:''}
            <div style="display:flex;gap:6px;flex-wrap:wrap">
                ${!isL?`<button class="ev-btn" onclick="evAbrirFormTipo(${idx})">Editar Nome</button>`:''}
                ${idx>0?`<button class="ev-btn" onclick="evMoverTipo(${idx},-1)">Subir</button>`:''}
                ${idx<lista.length-1?`<button class="ev-btn" onclick="evMoverTipo(${idx},1)">Descer</button>`:''}
                ${!isL?`<button class="ev-btn danger" onclick="evRemoverTipo(${idx})">Remover</button>`:''}
            </div>
        </div>
        <div style="background:var(--bg-input);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:12px;color:var(--text-faint)">Posicao: <strong>${idx+1}</strong> de <strong>${lista.length}</strong></div>
    </div>`;
}
function evAbrirFormTipo(idx){
    const lista=getTipos(),isN=idx===null,v=isN?'':lista[idx];
    document.getElementById('drawer-title').textContent=isN?'Novo Tipo':'Editar Tipo';
    document.getElementById('drawer-body').innerHTML=`<div class="form-grid"><div class="msg-form" id="form-msg"></div><div class="form-group form-full"><label class="form-label">Nome *</label><input class="form-input" id="ft_nome" type="text" placeholder="Ex: Encontro de Jovens" value="${v}"></div><div class="form-actions"><button class="btn-cancel-form" onclick="closeDrawer()">Cancelar</button><button class="btn-save" onclick="evSalvarTipo(${idx})">Guardar</button></div></div>`;
    document.getElementById('overlay').classList.remove('hidden');document.body.style.overflow='hidden';
}
function evSalvarTipo(idx){
    const nome=document.getElementById('ft_nome')?.value?.trim();if(!nome){document.getElementById('form-msg').textContent='Nome obrigatorio.';document.getElementById('form-msg').className='msg-form error';return;}
    const lista=getTipos();if(idx===null)lista.splice(lista.length-1,0,nome);else lista[idx]=nome;
    saveTipos(lista);closeDrawer();evRenderSideTipos();if(idx!==null)evSelTipo(idx);
}
function evRemoverTipo(idx){const lista=getTipos();if(!confirm(`Remover "${lista[idx]}"?`))return;lista.splice(idx,1);saveTipos(lista);evRenderSideTipos();evPanelEmpty('Seleciona um tipo.');evTipoIdx=null;}
function evMoverTipo(idx,dir){const lista=getTipos(),n=idx+dir;if(n<0||n>=lista.length)return;[lista[idx],lista[n]]=[lista[n],lista[idx]];saveTipos(lista);evRenderSideTipos();evSelTipo(n);evTipoIdx=n;}

// ── EXPOR ──────────────────────────────────────────────────────────────
Object.assign(window,{evSetTab,evFiltrar,evToggleSt,evSelEvento,evAbrirForm,evSalvar,evIniciar,evConcluir,evCancelar,evExcluir,evMostrarQR,evCopiarURL,evDownloadQR,evVerPresencas,evRenderPresencas,evMarcarPres,evAddParticipante,evFinalizarEntradas,evAbrirMotivo,evGuardarMotivo,evGerarPDF,_pdfTipoLabel,evRenderSideTipos,evSelTipo,evAbrirFormTipo,evSalvarTipo,evRemoverTipo,evMoverTipo});

evInit();
})();
