<style>
    /* ── ENTRADA DE FATURAS ──────────────────────────────────── */
    .fat-wrap { display:flex; flex-direction:column; height:100%; overflow:hidden; }

    .fat-kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:8px; padding:12px 16px 6px; flex-shrink:0; }
    .fat-kpi  { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:12px 14px; }
    .fat-kpi-val   { font-family:var(--font-title); font-size:19px; font-weight:700; line-height:1; color:var(--text); }
    .fat-kpi-label { font-size:9px; color:var(--text-faint); margin-top:4px; text-transform:uppercase; letter-spacing:1px; }
    .fat-kpi-sub   { font-size:10px; color:var(--text-faint); margin-top:3px; }

    .fat-filter-bar { display:flex; align-items:center; gap:6px; padding:8px 16px; flex-wrap:wrap; border-bottom:1px solid var(--border); flex-shrink:0; background:var(--bg-input); }
    .fat-filter-label { font-size:9px; color:var(--text-faint); text-transform:uppercase; letter-spacing:1px; white-space:nowrap; }
    .fat-filter-bar select, .fat-filter-bar input[type=date] { font-size:11px; padding:5px 8px; border:1px solid var(--border); border-radius:6px; background:var(--bg-card); color:var(--text); }
    .fat-filter-clear { font-size:10px; color:var(--text-faint); cursor:pointer; background:none; border:1px solid var(--border); border-radius:5px; padding:4px 10px; white-space:nowrap; }
    .fat-filter-clear:hover { border-color:var(--primary); color:var(--text); }

    .fat-sec-bar { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:8px 16px; border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; }
    .fat-sec-title { font-family:var(--font-title); font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--text-faint); }

    .fat-body-scroll { flex:1; overflow-y:auto; display:flex; flex-direction:column; }
    .fat-table-wrap  { padding:0 16px 16px; overflow-x:auto; }

    .fat-table { width:100%; border-collapse:collapse; font-size:12px; }
    .fat-table th { background:var(--bg-input); padding:8px 10px; text-align:left; font-family:var(--font-title); font-size:9px; letter-spacing:1.5px; color:var(--text-faint); border-bottom:1px solid var(--border); white-space:nowrap; position:sticky; top:0; z-index:2; }
    .fat-table td { padding:9px 10px; border-bottom:1px solid var(--border); vertical-align:middle; color:var(--text); }
    .fat-table tr:last-child td { border-bottom:none; }
    .fat-table tr:hover td { background:var(--primary-faint); }

    .st-badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; white-space:nowrap; color:var(--text); }

    .fat-act { display:flex; gap:4px; justify-content:flex-end; flex-wrap:wrap; }
    .fat-btn { padding:4px 9px; border-radius:6px; border:1px solid var(--border); background:var(--bg-input); font-size:10px; color:var(--text); cursor:pointer; font-family:var(--font-title); letter-spacing:.5px; transition:all .15s; white-space:nowrap; }
    .fat-btn:hover { border-color:var(--primary); }
    .fat-btn.outline-p { border-color:var(--primary); }
    .fat-btn.primary   { background:var(--primary); color:var(--text); border-color:var(--primary); }
    .fat-btn.primary:hover { background:var(--primary-dark); }

    /* Items table */
    .fat-items-wrap { overflow-x:auto; border:1px solid var(--border); border-radius:10px; background:var(--bg-input); }
    .fat-items-table { width:100%; border-collapse:collapse; font-size:11px; min-width:700px; }
    .fat-items-table th { background:var(--bg-card); padding:7px 8px; text-align:left; font-family:var(--font-title); font-size:9px; letter-spacing:1px; color:var(--text-faint); border-bottom:1px solid var(--border); white-space:nowrap; }
    .fat-items-table th span.sub { display:block; font-size:8px; font-weight:400; opacity:.6; margin-top:2px; letter-spacing:0; text-transform:none; font-family:inherit; }
    .fat-items-table td { padding:5px 5px; border-bottom:1px solid var(--border); vertical-align:middle; }
    .fat-items-table tbody tr:last-child td { border-bottom:none; }
    .fat-items-table input, .fat-items-table select { width:100%; font-size:11px; padding:5px 6px; border:1px solid var(--border); border-radius:5px; background:var(--bg-card); color:var(--text); box-sizing:border-box; }
    .fat-items-table input:focus, .fat-items-table select:focus { border-color:var(--primary); outline:none; }
    .fat-items-table input[readonly] { background:var(--bg-input); color:var(--text); font-weight:700; cursor:default; border-color:transparent; }
    .fat-items-table tfoot td { padding:7px 8px; background:var(--bg-card); font-size:12px; color:var(--text); }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
    input[type=number] { -moz-appearance:textfield; }

    .fat-iva-flag { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--bg-input); border:1px solid var(--border); border-radius:8px; font-size:12px; cursor:pointer; user-select:none; color:var(--text); }
    .fat-iva-flag input[type=checkbox] { width:16px; height:16px; accent-color:var(--primary-dark); cursor:pointer; }

    .fat-btn-additem { padding:6px 14px; border-radius:6px; background:var(--primary); color:var(--text); border:none; font-size:11px; cursor:pointer; font-family:var(--font-title); letter-spacing:.5px; transition:background .15s; }
    .fat-btn-additem:hover { background:var(--primary-dark); }

    .fat-form-actions { display:flex; gap:8px; flex-wrap:wrap; padding-top:12px; border-top:1px solid var(--border); margin-top:4px; }
    .fat-cp-saved { font-size:11px; color:var(--text-faint); padding:6px 10px; display:flex; align-items:center; font-style:italic; }

    /* Gerir button next to label */
    .fat-gerir-btn { font-size:9px; color:var(--text-faint); background:none; border:1px solid var(--border); border-radius:4px; cursor:pointer; margin-left:8px; font-family:inherit; padding:2px 7px; vertical-align:middle; }
    .fat-gerir-btn:hover { border-color:var(--primary); color:var(--text); }

    /* Inline config panel — lives inside the form, below the select */
    .fat-cfg-panel { display:none; margin-top:8px; background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:12px; }
    .fat-cfg-panel.open { display:block; }
    .fat-cfg-panel h4 { font-family:var(--font-title); font-size:10px; letter-spacing:1px; color:var(--text-faint); margin:0 0 10px; text-transform:uppercase; }
    .fat-cfg-row { display:flex; align-items:center; gap:6px; margin-bottom:5px; }
    .fat-cfg-row input { flex:1; font-size:12px; padding:6px 8px; border:1px solid var(--border); border-radius:6px; background:var(--bg-input); color:var(--text); }
    .fat-cfg-row input:focus { border-color:var(--primary); outline:none; }
    .fat-cfg-del { color:var(--text-faint); background:none; border:1px solid var(--border); border-radius:4px; cursor:pointer; padding:4px 9px; font-size:12px; }
    .fat-cfg-del:hover { color:var(--text); }
    .fat-cfg-bottom { display:flex; gap:8px; margin-top:8px; }
    .fat-cfg-add   { font-size:11px; color:var(--text); background:var(--primary); border:none; border-radius:6px; padding:6px 14px; cursor:pointer; }
    .fat-cfg-add:hover { background:var(--primary-dark); }
    .fat-cfg-close { font-size:11px; color:var(--text-faint); background:var(--bg-input); border:1px solid var(--border); border-radius:6px; padding:6px 14px; cursor:pointer; }
    .fat-cfg-close:hover { color:var(--text); }

    /* NIF lookup row */
    .fat-nif-row { display:flex; gap:6px; align-items:center; }
    .fat-nif-row input { flex:1; }

    /* Nav links below supplier */
    .fat-nav-links { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
    .fat-nav-link { font-size:10px; color:var(--text-faint); background:none; border:1px solid var(--border); border-radius:5px; cursor:pointer; padding:4px 10px; font-family:inherit; }
    .fat-nav-link:hover { border-color:var(--primary); color:var(--text); }

    @media(max-width:640px){
        .fat-kpis { grid-template-columns:repeat(2,1fr); }
        .fat-filter-bar { gap:4px; }
        .fat-table th:nth-child(3), .fat-table td:nth-child(3) { display:none; }
    }
</style>

<div class="fat-wrap">
    <div class="fat-body-scroll" id="fat-body">
        <div class="loading"><div class="spin"></div>A carregar faturas...</div>
    </div>
</div>

<script>
    // ════════════════════════════════════════════════════════════
    // ENTRADA DE FATURAS — prefixo fat_
    // ════════════════════════════════════════════════════════════
    var fat_compras      = [];
    var fat_contasPagar  = [];
    var fat_fornecedores = [];
    var fat_itensTemp    = [];
    var fat_produtosCache= [];
    var fat_savedId      = null;

    // ── Editable lists (localStorage) ───────────────────────────
    var fat_cats = [];
    var fat_pags = [];
    var FAT_CAT_DEF = [
        {key:'stock',       label:'Stock / Mercadoria'},
        {key:'servicos',    label:'Servicos'},
        {key:'manutencao',  label:'Manutencao'},
        {key:'utilities',   label:'Utilities'},
        {key:'renda',       label:'Renda'},
        {key:'outros',      label:'Outros'}
    ];
    var FAT_PAG_DEF = [
        {key:'transferencia', label:'Transferencia'},
        {key:'mbway',         label:'MBWay'},
        {key:'multibanco',    label:'Multibanco'},
        {key:'dinheiro',      label:'Dinheiro'},
        {key:'cheque',        label:'Cheque'}
    ];
    (function(){
        try { fat_cats = JSON.parse(localStorage.getItem('zion_fat_cats')) || FAT_CAT_DEF.slice(); } catch(e){ fat_cats = FAT_CAT_DEF.slice(); }
        try { fat_pags = JSON.parse(localStorage.getItem('zion_fat_pags')) || FAT_PAG_DEF.slice(); } catch(e){ fat_pags = FAT_PAG_DEF.slice(); }
    })();
    function fat_cfgPersist(){
        localStorage.setItem('zion_fat_cats', JSON.stringify(fat_cats));
        localStorage.setItem('zion_fat_pags', JSON.stringify(fat_pags));
    }

    // ── Status definitions ────────────────────────────────────────
    var FAT_SBG  = {pendente:'rgba(100,100,100,.18)',pago:'rgba(0,144,152,.18)',parcial:'rgba(0,144,152,.12)',cancelado:'rgba(80,80,80,.12)',atrasado:'rgba(150,50,50,.18)',sem_cp:'rgba(80,50,130,.18)'};
    var FAT_SLBL = {pendente:'Pendente',pago:'Pago',parcial:'Parcial',cancelado:'Cancelado',atrasado:'Atrasado',sem_cp:'Aguarda Liberar'};

    var fat_F = {fornecedor:'',categoria:'',status:'',data_de:'',data_ate:'',venc_de:'',venc_ate:''};

    // ── Utils ─────────────────────────────────────────────────────
    function fat_hoje(){ return new Date().toISOString().split('T')[0]; }
    function fat_eur(v){ return '\u20AC'+Number(v||0).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2}); }
    function fat_dt(s){
        if(!s) return '\u2014';
        return new Date(s+(s.length===10?'T00:00:00':'')).toLocaleDateString('pt-PT',{day:'2-digit',month:'short',year:'numeric'});
    }
    function fat_hasCP(cid){ return fat_contasPagar.some(function(cp){ return cp.compra_id===cid; }); }
    function fat_displayStatus(c){
        if(c.status==='pago'||c.status==='cancelado') return c.status;
        if(!fat_hasCP(c.id)) return 'sem_cp';
        if(c.data_vencimento&&c.data_vencimento<fat_hoje()) return 'atrasado';
        return c.status||'pendente';
    }
    function fat_catLabel(key){ return (fat_cats.find(function(x){ return x.key===key; })||{label:key||'\u2014'}).label; }
    function fat_nifNorm(s){ return (s||'').replace(/[^0-9]/g,''); }

    // ── Init ──────────────────────────────────────────────────────
    async function fat_init(){
        document.getElementById('fat-body').innerHTML='<div class="loading"><div class="spin"></div>A carregar...</div>';
        await fat_loadAll();
        fat_render();
    }
    async function fat_loadAll(){
        var res=await Promise.all([
            sb('compras?select=*,fornecedores(id,nome,nif)&order=data_fatura.desc').catch(function(){return[];}),
            sb('contas_pagar?select=id,compra_id,valor_total&order=created_at').catch(function(){return[];}),
            sb('fornecedores?select=id,nome,email,telefone,nif&ativo=eq.true&order=nome').catch(function(){return[];})
        ]);
        fat_compras     =res[0]||[];
        fat_contasPagar =res[1]||[];
        fat_fornecedores=res[2]||[];
    }

    // ── Filters ───────────────────────────────────────────────────
    function fat_filtered(){
        return fat_compras.filter(function(c){
            if(fat_F.fornecedor&&c.fornecedor_id!==fat_F.fornecedor) return false;
            if(fat_F.categoria &&c.categoria!==fat_F.categoria)      return false;
            if(fat_F.status    &&fat_displayStatus(c)!==fat_F.status) return false;
            if(fat_F.data_de  &&c.data_fatura<fat_F.data_de)   return false;
            if(fat_F.data_ate &&c.data_fatura>fat_F.data_ate)  return false;
            if(fat_F.venc_de  &&c.data_vencimento<fat_F.venc_de)  return false;
            if(fat_F.venc_ate &&c.data_vencimento>fat_F.venc_ate) return false;
            return true;
        });
    }

    // ── Render main ───────────────────────────────────────────────
    function fat_render(){
        var body=document.getElementById('fat-body');
        if(!body) return;
        var all=fat_compras;
        var total=all.reduce(function(a,c){return a+Number(c.total||0);},0);
        var pendV=all.filter(function(c){return c.status==='pendente';}).reduce(function(a,c){return a+Number(c.total||0);},0);
        var pagoV=all.filter(function(c){return c.status==='pago';}).reduce(function(a,c){return a+Number(c.total||0);},0);
        var semCP=all.filter(function(c){return !fat_hasCP(c.id)&&c.status!=='cancelado';});
        var semCV=semCP.reduce(function(a,c){return a+Number(c.total||0);},0);

        var fOpts='<option value="">Todos fornecedores</option>'
            +fat_fornecedores.map(function(f){return '<option value="'+f.id+'"'+(fat_F.fornecedor===f.id?' selected':'')+'>'+f.nome+'</option>';}).join('');
        var cOpts='<option value="">Todas categorias</option>'
            +fat_cats.map(function(c){return '<option value="'+c.key+'"'+(fat_F.categoria===c.key?' selected':'')+'>'+c.label+'</option>';}).join('');
        var sOpts='<option value="">Todos estados</option>'
            +Object.keys(FAT_SLBL).map(function(k){return '<option value="'+k+'"'+(fat_F.status===k?' selected':'')+'>'+FAT_SLBL[k]+'</option>';}).join('');

        var list=fat_filtered();
        var rows=!list.length
            ?'<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-faint)">Nenhuma fatura encontrada.</td></tr>'
            :list.map(function(c){
                var forn=(c.fornecedores&&c.fornecedores.nome)||c.fornecedor_nome||'\u2014';
                var ds=fat_displayStatus(c);
                return '<tr>'
                    +'<td>'+fat_dt(c.data_fatura)+'<div style="font-size:10px;color:var(--text-faint)">Vence '+fat_dt(c.data_vencimento)+'</div></td>'
                    +'<td style="font-weight:600">'+forn+'<div style="font-size:10px;color:var(--text-faint)">'+(c.numero_fatura||'')+'</div></td>'
                    +'<td><span class="badge badge-gray" style="font-size:9px">'+fat_catLabel(c.categoria)+'</span></td>'
                    +'<td><span class="st-badge" style="background:'+(FAT_SBG[ds]||'rgba(100,100,100,.15)')+'">'+FAT_SLBL[ds]+'</span></td>'
                    +'<td style="text-align:right">'
                    +'<div style="font-family:var(--font-title);font-weight:700">'+fat_eur(c.total)+'</div>'
                    +'<div style="font-size:10px;color:var(--text-faint)">IVA '+fat_eur(c.iva)+'</div>'
                    +'</td>'
                    +'<td><div class="fat-act">'
                    +'<button class="fat-btn" onclick="fat_abrirForm(\''+c.id+'\')">Editar</button>'
                    +'<button class="fat-btn outline-p" onclick="fat_duplicar(\''+c.id+'\')">Duplic.</button>'
                    +(!fat_hasCP(c.id)&&c.status!=='cancelado'?'<button class="fat-btn primary" onclick="fat_criarCP(\''+c.id+'\')">Gerar CP</button>':'')
                    +(c.status!=='pago'&&fat_hasCP(c.id)?'<button class="fat-btn" onclick="fat_marcarPago(\''+c.id+'\')">Marcar Pago</button>':'')
                    +'</div></td></tr>';
            }).join('');

        body.innerHTML=''
            +'<div class="fat-kpis">'
            +'<div class="fat-kpi"><div class="fat-kpi-val">'+fat_eur(total)+'</div><div class="fat-kpi-label">Total Faturas</div><div class="fat-kpi-sub">'+all.length+' registos</div></div>'
            +'<div class="fat-kpi"><div class="fat-kpi-val">'+fat_eur(pendV)+'</div><div class="fat-kpi-label">Pendentes</div><div class="fat-kpi-sub">'+all.filter(function(c){return c.status==='pendente';}).length+' faturas</div></div>'
            +'<div class="fat-kpi"><div class="fat-kpi-val">'+fat_eur(pagoV)+'</div><div class="fat-kpi-label">Pagas</div><div class="fat-kpi-sub">'+all.filter(function(c){return c.status==='pago';}).length+' faturas</div></div>'
            +'<div class="fat-kpi"><div class="fat-kpi-val">'+fat_eur(semCV)+'</div><div class="fat-kpi-label">Aguarda Liberar</div><div class="fat-kpi-sub">'+semCP.length+' sem CP</div></div>'
            +'</div>'
            +'<div class="fat-filter-bar">'
            +'<span class="fat-filter-label">Filtros:</span>'
            +'<select onchange="fat_F.fornecedor=this.value;fat_render()">'+fOpts+'</select>'
            +'<select onchange="fat_F.categoria=this.value;fat_render()">'+cOpts+'</select>'
            +'<select onchange="fat_F.status=this.value;fat_render()">'+sOpts+'</select>'
            +'<span class="fat-filter-label" style="margin-left:4px">Criacao:</span>'
            +'<input type="date" value="'+fat_F.data_de+'"  onchange="fat_F.data_de=this.value;fat_render()">'
            +'<input type="date" value="'+fat_F.data_ate+'" onchange="fat_F.data_ate=this.value;fat_render()">'
            +'<span class="fat-filter-label" style="margin-left:4px">Vencimento:</span>'
            +'<input type="date" value="'+fat_F.venc_de+'"  onchange="fat_F.venc_de=this.value;fat_render()">'
            +'<input type="date" value="'+fat_F.venc_ate+'" onchange="fat_F.venc_ate=this.value;fat_render()">'
            +'<button class="fat-filter-clear" onclick="fat_F={fornecedor:\'\',categoria:\'\',status:\'\',data_de:\'\',data_ate:\'\',venc_de:\'\',venc_ate:\'\'};fat_render()">Limpar</button>'
            +'</div>'
            +'<div class="fat-sec-bar">'
            +'<span class="fat-sec-title">Entrada de Faturas de Compra</span>'
            +'<button class="btn-new" onclick="fat_abrirForm(null)">+ Nova Fatura</button>'
            +'</div>'
            +'<div class="fat-table-wrap"><table class="fat-table">'
            +'<thead><tr><th>Data / Venc.</th><th>Fornecedor / Nr</th><th>Categoria</th><th>Estado</th><th style="text-align:right">Valor / IVA</th><th>Acoes</th></tr></thead>'
            +'<tbody>'+rows+'</tbody></table></div>';
    }

    // ── Form ──────────────────────────────────────────────────────
    async function fat_abrirForm(id){
        fat_savedId  =id||null;
        fat_itensTemp=[];
        if(id){
            var its=await sb('compra_itens?select=*&compra_id=eq.'+id+'&order=created_at').catch(function(){return[];});
            fat_itensTemp=its.map(function(it){return Object.assign({_t:Date.now()+Math.random()},it);});
        }
        if(!fat_produtosCache.length){
            var pr=await Promise.all([
                sb('loja_produtos?select=id,nome,categoria,preco_custo,stock&ativo=eq.true&order=categoria,nome').catch(function(){return[];}),
                sb('keola_menu?select=id,nome,categoria&disponivel=eq.true&order=categoria,nome').catch(function(){return[];})
            ]);
            fat_produtosCache=(pr[0]||[]).map(function(p){
                return Object.assign({},p,{origem:'loja',label:'[Loja] '+(p.categoria?p.categoria+' \u2014 ':'')+p.nome});
            }).concat((pr[1]||[]).map(function(p){
                return Object.assign({},p,{origem:'keola',label:'[Keola] '+(p.categoria?p.categoria+' \u2014 ':'')+p.nome});
            }));
        }

        var c=id?fat_compras.find(function(x){return x.id===id;}):null;
        var fv=function(k,d){return c&&c[k]!=null?c[k]:(d!=null?d:'');};
        var hasCP=id&&fat_hasCP(id);

        var fornOpts='<option value="">-- Seleciona o fornecedor --</option>'
            +fat_fornecedores.map(function(f){
                return '<option value="'+f.id+'" data-nif="'+(f.nif||'')+'"'+(fv('fornecedor_id')===f.id?' selected':'')+'>'+f.nome+(f.nif?' ('+f.nif+')':'')+'</option>';
            }).join('');
        var catOpts=fat_cats.map(function(x){return '<option value="'+x.key+'"'+(fv('categoria','stock')===x.key?' selected':'')+'>'+x.label+'</option>';}).join('');
        var pagOpts=fat_pags.map(function(x){return '<option value="'+x.key+'"'+(fv('forma_pagamento','transferencia')===x.key?' selected':'')+'>'+x.label+'</option>';}).join('');

        document.getElementById('drawer-title').textContent=c
            ?'Fatura \u2014 '+(c.numero_fatura||c.id.slice(0,8))
            :'Nova Entrada de Fatura';

        document.getElementById('drawer-body').innerHTML='<div class="form-grid">'
            +'<div class="msg-form" id="form-msg"></div>'
            +'<div class="form-section-title">Fornecedor e Identificacao</div>'

            // NIF lookup
            +'<div class="form-group"><label class="form-label">Pesquisar por NIF</label>'
            +'<div class="fat-nif-row">'
            +'<input class="form-input" id="fc_nif" placeholder="Ex: 509123456">'
            +'<button class="fat-btn outline-p" style="padding:6px 12px;white-space:nowrap" onclick="fat_lookupNIF()">Buscar</button>'
            +'</div></div>'

    function fat_buildActions(id, hasCP){
        var html='<button class="btn-cancel-form" onclick="closeDrawer()">Cancelar</button>';
        if(!id){
            html+='<button class="btn-save" id="btn-fat-save" onclick="fat_salvar(null)">Guardar Fatura</button>';
        } else {
            html+='<button class="btn-save" id="btn-fat-save" onclick="fat_salvar(\''+id+'\')">Guardar Alteracoes</button>';
            if(!hasCP){
                html+='<button class="btn-save" style="background:var(--bg-input);border:1px solid var(--primary)" id="btn-fat-cp" onclick="fat_criarCPForm()">Gerar Conta a Pagar</button>';
            } else {
                html+='<span class="fat-cp-saved">Conta a Pagar ja criada</span>';
            }
        }
        return html;
    }

    // ── NIF Lookup ────────────────────────────────────────────────
    function fat_lookupNIF(){
        var raw=(document.getElementById('fc_nif').value||'').trim();
        var norm=fat_nifNorm(raw);
        if(!norm){showFormMsg('Insere um NIF.','error');return;}
        var found=fat_fornecedores.find(function(f){return fat_nifNorm(f.nif)===norm;});
        if(!found){
            showFormMsg('NIF '+raw+' nao encontrado. Verifica se o fornecedor esta ativo e tem NIF registado.','error');
            return;
        }
        var sel=document.getElementById('fc_fornecedor_id');
        if(sel) sel.value=found.id;
        showFormMsg('Fornecedor selecionado: '+found.nome,'success');
    }

    // ── Inline config ─────────────────────────────────────────────
    function fat_toggleCfg(key){
        var panel=document.getElementById('fat-cfg-'+key);
        if(!panel) return;
        var wasOpen=panel.classList.contains('open');
        ['cats','pag'].forEach(function(k){
            var p=document.getElementById('fat-cfg-'+k);
            if(p) p.classList.remove('open');
        });
        if(!wasOpen){
            panel.classList.add('open');
            fat_renderCfgRows(key);
        }
    }
    function fat_renderCfgRows(key){
        var list=key==='cats'?fat_cats:fat_pags;
        var el=document.getElementById('fat-cfg-'+key+'-rows');
        if(!el) return;
        el.innerHTML=list.map(function(it,i){
            return '<div class="fat-cfg-row">'
                +'<input type="text" value="'+it.label.replace(/"/g,'&quot;')+'" oninput="fat_cfgUpdate(\''+key+'\','+i+',this.value)">'
                +'<button class="fat-cfg-del" onclick="fat_cfgRemove(\''+key+'\','+i+')">x</button>'
                +'</div>';
        }).join('');
    }
    function fat_cfgUpdate(key,i,val){
        var list=key==='cats'?fat_cats:fat_pags;
        if(list[i]){list[i].label=val;list[i].key=val.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');}
        fat_cfgPersist(); fat_refreshSel(key);
    }
    function fat_cfgAdd(key){
        var list=key==='cats'?fat_cats:fat_pags;
        list.push({key:'item_'+Date.now(),label:'Novo item'});
        fat_renderCfgRows(key); fat_cfgPersist(); fat_refreshSel(key);
    }
    function fat_cfgRemove(key,i){
        var list=key==='cats'?fat_cats:fat_pags;
        if(!confirm('Remover "'+list[i].label+'"?')) return;
        list.splice(i,1); fat_renderCfgRows(key); fat_cfgPersist(); fat_refreshSel(key);
    }
    function fat_refreshSel(key){
        if(key==='cats'){
            var cs=document.getElementById('fc_categoria');
            if(cs){var cv=cs.value;cs.innerHTML=fat_cats.map(function(x){return '<option value="'+x.key+'"'+(cv===x.key?' selected':'')+'>'+x.label+'</option>';}).join('');}
        } else {
            var ps=document.getElementById('fc_forma_pagamento');
            if(ps){var pv=ps.value;ps.innerHTML=fat_pags.map(function(x){return '<option value="'+x.key+'"'+(pv===x.key?' selected':'')+'>'+x.label+'</option>';}).join('');}
        }
    }

    // ── Items table ───────────────────────────────────────────────
    function fat_addRow(){
        fat_itensTemp.push({_t:Date.now()+Math.random(),produto_id:null,origem:'outro',descricao:'',quantidade:1,preco_unitario:0,iva_pct:23,atualizar_stock:false});
        fat_renderItens(); fat_calcTotais();
    }
    function fat_removeRow(i){
        fat_itensTemp.splice(i,1); fat_renderItens(); fat_calcTotais();
    }
    function fat_selectProd(i,sel){
        var it=fat_itensTemp[i]; if(!it) return;
        var opt=sel.options[sel.selectedIndex];
        it.produto_id=sel.value||null;
        if(it.produto_id){
            it.origem=(opt.dataset&&opt.dataset.origem)||'outro';
            it.atualizar_stock=(it.origem==='loja');
            var custo=parseFloat((opt.dataset&&opt.dataset.custo)||0);
            if(custo){it.preco_unitario=custo;var pu=document.getElementById('fi-pu-'+i);if(pu) pu.value=custo.toFixed(2);}
            if(!it.descricao&&opt.dataset&&opt.dataset.nome){it.descricao=opt.dataset.nome;var dd=document.getElementById('fi-desc-'+i);if(dd) dd.value=it.descricao;}
        }
        fat_recalcRow(i); fat_calcTotais();
    }
    function fat_syncRow(i,field,rawVal){
        var it=fat_itensTemp[i]; if(!it) return;
        var numF={quantidade:1,preco_unitario:1,iva_pct:1};
        it[field]=numF[field]?(parseFloat(rawVal)||0):rawVal;
        fat_recalcRow(i); fat_calcTotais();
    }
    function fat_recalcRow(i){
        var it=fat_itensTemp[i]; if(!it) return;
        var sub=it.quantidade*it.preco_unitario;
        var iva=sub*(it.iva_pct/100);
        var tEl=document.getElementById('fi-tot-'+i);
        var vEl=document.getElementById('fi-iva-'+i);
        if(tEl) tEl.value=sub.toFixed(2);
        if(vEl) vEl.value=iva.toFixed(2);
    }
    function fat_syncFromDOM(){
        fat_itensTemp.forEach(function(it,i){
            var d=document.getElementById('fi-desc-'+i);
            var q=document.getElementById('fi-qty-'+i);
            var p=document.getElementById('fi-pu-'+i);
            var v=document.getElementById('fi-ivap-'+i);
            if(d) it.descricao=d.value;
            if(q) it.quantidade=parseFloat(q.value)||0;
            if(p) it.preco_unitario=parseFloat(p.value)||0;
            if(v) it.iva_pct=parseFloat(v.value)||0;
        });
    }
    function fat_renderItens(){
        var tbody=document.getElementById('fat-itens-tbody');
        if(!tbody) return;
        if(!fat_itensTemp.length){
            tbody.innerHTML='<tr><td colspan="8" style="text-align:center;padding:16px;color:var(--text-faint);font-size:12px">Nenhum item. Clica em + Adicionar Item.</td></tr>';
            return;
        }
        var prodOpts='<option value="">-- Produto --</option>'
            +fat_produtosCache.map(function(p){
                return '<option value="'+p.id+'" data-origem="'+p.origem+'" data-nome="'+(p.nome||'').replace(/"/g,'&quot;')+'" data-custo="'+(p.preco_custo||0)+'">'+(p.label)+'</option>';
            }).join('');
        tbody.innerHTML=fat_itensTemp.map(function(it,i){
            var sub=it.quantidade*it.preco_unitario;
            var iva=sub*(it.iva_pct/100);
            var opts=prodOpts;
            if(it.produto_id) opts=opts.replace('value="'+it.produto_id+'"','value="'+it.produto_id+'" selected');
            return '<tr>'
                +'<td><select onchange="fat_selectProd('+i+',this)">'+opts+'</select></td>'
                +'<td><input id="fi-desc-'+i+'" type="text" value="'+((it.descricao||'').replace(/"/g,'&quot;'))+'" placeholder="Descricao..." oninput="fat_syncRow('+i+',\'descricao\',this.value)"></td>'
                +'<td><input id="fi-qty-'+i+'"  type="number" value="'+it.quantidade+'"     step="0.001" style="text-align:center" oninput="fat_syncRow('+i+',\'quantidade\',this.value)"></td>'
                +'<td><input id="fi-pu-'+i+'"   type="number" value="'+it.preco_unitario+'" step="0.01"  style="text-align:right"  oninput="fat_syncRow('+i+',\'preco_unitario\',this.value)"></td>'
                +'<td><input id="fi-ivap-'+i+'" type="number" value="'+it.iva_pct+'"        step="1"     style="text-align:center" oninput="fat_syncRow('+i+',\'iva_pct\',this.value)"></td>'
                +'<td><input id="fi-tot-'+i+'"  type="number" value="'+sub.toFixed(2)+'" readonly style="text-align:right"></td>'
                +'<td><input id="fi-iva-'+i+'"  type="number" value="'+iva.toFixed(2)+'" readonly style="text-align:right"></td>'
                +'<td style="text-align:center"><button onclick="fat_removeRow('+i+')" style="color:var(--text-faint);background:none;border:1px solid var(--border);border-radius:4px;cursor:pointer;padding:2px 8px;font-size:13px">x</button></td>'
                +'</tr>';
        }).join('');
    }
    function fat_calcTotais(){
        var tfoot=document.getElementById('fat-itens-tfoot');
        if(!tfoot) return;
        var sumQ=0,sumSub=0,sumIVA=0;
        fat_itensTemp.forEach(function(it){
            sumQ+=it.quantidade;
            var b=it.quantidade*it.preco_unitario;
            sumSub+=b; sumIVA+=b*(it.iva_pct/100);
        });
        var chk=document.getElementById('fc_iva_no_total');
        var inclIVA=chk?chk.checked:true;
        var totalFat=sumSub+(inclIVA?sumIVA:0);
        var totalCP =sumSub+sumIVA;
        tfoot.innerHTML=''
            +'<tr style="border-top:2px solid var(--border)">'
            +'<td colspan="2" style="font-family:var(--font-title);font-size:9px;letter-spacing:1px;color:var(--text-faint);padding:8px">TOTAIS</td>'
            +'<td style="text-align:center;font-weight:700;padding:8px">'+sumQ.toFixed(2)+'</td>'
            +'<td></td><td></td>'
            +'<td style="text-align:right;font-weight:700;padding:8px">'+fat_eur(sumSub)+'</td>'
            +'<td style="text-align:right;font-weight:700;padding:8px">'+fat_eur(sumIVA)+'</td>'
            +'<td></td>'
            +'</tr>'
            +'<tr style="background:var(--primary-faint)">'
            +'<td colspan="5" style="text-align:right;font-size:11px;color:var(--text-faint);padding:8px">'
            +'Subtotal: <strong style="color:var(--text)">'+fat_eur(sumSub)+'</strong>'
            +'&nbsp;&nbsp;IVA: <strong style="color:var(--text)">'+fat_eur(sumIVA)+'</strong>'
            +(inclIVA?'':'&nbsp;&nbsp;<em style="font-size:10px">(IVA excluido do total da fatura)</em>')
            +'&nbsp;&nbsp;CP: <strong style="color:var(--text)">'+fat_eur(totalCP)+'</strong>'
            +'</td>'
            +'<td colspan="2" style="text-align:right;font-family:var(--font-title);font-size:17px;font-weight:700;padding:8px 10px;color:var(--text)">'+fat_eur(totalFat)+'</td>'
            +'<td></td>'
            +'</tr>';
    }

    // ── Salvar (step 1) ───────────────────────────────────────────
    async function fat_salvar(id){
        fat_syncFromDOM();
        var gv=function(k){var el=document.getElementById('fc_'+k);return el?el.value||null:null;};
        var fornId=gv('fornecedor_id');
        if(!fornId){showFormMsg('Seleciona um fornecedor.','error');return;}
        if(!fat_itensTemp.length){showFormMsg('Adiciona pelo menos 1 item.','error');return;}
        var dataFatura=gv('data_fatura');
        if(!dataFatura){showFormMsg('Data obrigatoria.','error');return;}

        var sumSub=0,sumIVA=0;
        fat_itensTemp.forEach(function(it){var b=it.quantidade*it.preco_unitario;sumSub+=b;sumIVA+=b*(it.iva_pct/100);});
        var chk=document.getElementById('fc_iva_no_total');
        var inclIVA=chk?chk.checked:true;
        var totalFat=parseFloat((sumSub+(inclIVA?sumIVA:0)).toFixed(2));

        var dataVenc=gv('data_vencimento');
        if(!dataVenc){var dv=new Date(dataFatura);dv.setDate(dv.getDate()+30);dataVenc=dv.toISOString().split('T')[0];}

        var forn=fat_fornecedores.find(function(f){return f.id===fornId;})||{};
        // Only send columns that exist in the schema
        var body={
            fornecedor_id:fornId,
            fornecedor_nome:forn.nome||null,
            numero_fatura:gv('numero_fatura'),
            data_fatura:dataFatura,
            data_vencimento:dataVenc,
            categoria:gv('categoria'),
            forma_pagamento:gv('forma_pagamento'),
            observacoes:gv('observacoes'),
            subtotal:parseFloat(sumSub.toFixed(2)),
            iva:parseFloat(sumIVA.toFixed(2)),
            total:totalFat,
            status:'pendente',
            updated_at:new Date().toISOString(),
            operador:(typeof currentUser!=='undefined'&&currentUser)?currentUser.nome||null:null
        };

        var btn=document.getElementById('btn-fat-save');
        if(btn){btn.disabled=true;btn.textContent='A guardar...';}
        try {
            var cid=id;
            if(!id){
                var r=await sb('compras',{method:'POST',body:JSON.stringify(body)});
                cid=r&&r[0]&&r[0].id;
                fat_savedId=cid;
            } else {
                await sb('compras?id=eq.'+id,{method:'PATCH',body:JSON.stringify(body)});
                await sb('compra_itens?compra_id=eq.'+id,{method:'DELETE'});
                fat_savedId=id;
            }
            if(!cid) throw new Error('Sem ID da compra.');

            for(var i=0;i<fat_itensTemp.length;i++){
                var it=fat_itensTemp[i];
                var ib={compra_id:cid,produto_id:it.produto_id||null,origem:it.origem||'outro',
                    descricao:it.descricao||'\u2014',quantidade:it.quantidade,
                    preco_unitario:it.preco_unitario,iva_pct:it.iva_pct,atualizar_stock:!!(it.atualizar_stock)};
                if(it.produto_id&&it.atualizar_stock&&it.origem==='loja'){
                    var p=await sb('loja_produtos?id=eq.'+it.produto_id+'&select=stock').catch(function(){return[];});
                    var nst=(p&&p[0]&&p[0].stock||0)+Math.round(it.quantidade);
                    ib.stock_depois=nst;
                    await sb('loja_produtos?id=eq.'+it.produto_id,{method:'PATCH',body:JSON.stringify({stock:nst})});
                }
                await sb('compra_itens',{method:'POST',body:JSON.stringify(ib)});
            }

            await fat_loadAll();
            showFormMsg('Fatura guardada.','success');
            fat_render();
            var aw=document.getElementById('fat-form-actions');
            if(aw) aw.innerHTML=fat_buildActions(cid,fat_hasCP(cid));
            if(btn){btn.disabled=false;btn.textContent='Guardar Alteracoes';}
        } catch(e){
            showFormMsg('Erro: '+(e&&e.message||JSON.stringify(e)),'error');
            if(btn){btn.disabled=false;btn.textContent=id?'Guardar Alteracoes':'Guardar Fatura';}
        }
    }

    // ── Gerar CP (step 2) ─────────────────────────────────────────
    async function fat_criarCPForm(){
        var cid=fat_savedId;
        if(!cid){showFormMsg('Guarda a fatura primeiro.','error');return;}
        await fat_loadAll();
        await fat_criarCP(cid);
        var aw=document.getElementById('fat-form-actions');
        if(aw) aw.innerHTML=fat_buildActions(cid,true);
    }
    async function fat_criarCP(cid){
        var c=fat_compras.find(function(x){return x.id===cid;});
        if(!c) return;
        if(fat_hasCP(cid)){if(typeof showFormMsg==='function')showFormMsg('CP ja existe para esta fatura.','error');return;}
        var forn=fat_fornecedores.find(function(f){return f.id===c.fornecedor_id;})||{};
        var tvenc=c.data_vencimento||(function(){var d=new Date(c.data_fatura||fat_hoje());d.setDate(d.getDate()+30);return d.toISOString().split('T')[0];}());
        // CP always uses the real total: subtotal + iva
        var cpVal=parseFloat(((c.subtotal||0)+(c.iva||0)).toFixed(2));
        await sb('contas_pagar',{method:'POST',body:JSON.stringify({
                compra_id:cid,fornecedor_id:c.fornecedor_id,fornecedor_nome:forn.nome||c.fornecedor_nome||null,
                descricao:'Fatura '+(c.numero_fatura||cid.slice(0,8))+' \u2014 '+(forn.nome||c.fornecedor_nome||'Fornecedor'),
                numero_documento:c.numero_fatura,categoria:c.categoria||'fornecedor',
                valor_total:cpVal,valor_pago:0,
                data_emissao:c.data_fatura,data_vencimento:tvenc,
                forma_pagamento:c.forma_pagamento,status:'pendente',
                updated_at:new Date().toISOString()
            })});
        await fat_loadAll();
        fat_render();
        if(typeof showFormMsg==='function') showFormMsg('Conta a Pagar criada.','success');
    }

    async function fat_marcarPago(id){
        await sb('compras?id=eq.'+id,{method:'PATCH',body:JSON.stringify({status:'pago',updated_at:new Date().toISOString()})});
        var cp=fat_contasPagar.find(function(c){return c.compra_id===id;});
        if(cp) await sb('contas_pagar?id=eq.'+cp.id,{method:'PATCH',body:JSON.stringify({
                status:'pago',valor_pago:cp.valor_total,data_pagamento:fat_hoje(),updated_at:new Date().toISOString()
            })});
        await fat_loadAll(); fat_render();
    }

    async function fat_duplicar(id){
        await fat_abrirForm(null);
        var c=fat_compras.find(function(x){return x.id===id;});
        if(!c) return;
        var fs=document.getElementById('fc_fornecedor_id');if(fs&&c.fornecedor_id) fs.value=c.fornecedor_id;
        var cs=document.getElementById('fc_categoria');    if(cs&&c.categoria)     cs.value=c.categoria;
        fat_itensTemp=(await sb('compra_itens?select=*&compra_id=eq.'+id+'&order=created_at').catch(function(){return[];}))
            .map(function(it){return Object.assign({_t:Date.now()+Math.random()},it);});
        fat_renderItens(); fat_calcTotais();
        showFormMsg('Duplicado! Ajusta e guarda.','success');
    }

    // ── Open module in new tab ────────────────────────────────────
    function fat_openTab(mod){
        // Constroi a URL do admin com o modulo como query param
        // Ex: https://admin.zionlisboa.pt/admin.html?module=fornecedores
        var base = window.location.origin + window.location.pathname;
        window.open(base + '?module=' + mod, '_blank');
    }

    fat_init();
</script>
