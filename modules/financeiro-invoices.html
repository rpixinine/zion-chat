<style>
    /* в”Җв”Җ FATURAS EMITIDAS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    .fem-wrap { display:flex; flex-direction:column; height:100%; overflow:hidden; }
    .fem-kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:8px; padding:12px 16px 6px; flex-shrink:0; }
    .fem-kpi  { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:12px 14px; }
    .fem-kpi-val   { font-family:var(--font-title); font-size:19px; font-weight:700; line-height:1; color:var(--text); }
    .fem-kpi-label { font-size:9px; color:var(--text-faint); margin-top:4px; text-transform:uppercase; letter-spacing:1px; }
    .fem-kpi-sub   { font-size:10px; color:var(--text-faint); margin-top:3px; }
    .fem-filter-bar { display:flex; gap:6px; padding:8px 16px; flex-wrap:wrap; align-items:center; background:var(--bg-input); border-bottom:1px solid var(--border); flex-shrink:0; }
    .fem-filter-label { font-size:9px; color:var(--text-faint); text-transform:uppercase; letter-spacing:1px; white-space:nowrap; }
    .fem-filter-bar select,.fem-filter-bar input { font-size:11px; padding:5px 8px; border:1px solid var(--border); border-radius:6px; background:var(--bg-card); color:var(--text); }
    .fem-filter-bar input[type=text] { width:140px; }
    .fem-filter-clear { font-size:10px; color:var(--text-faint); cursor:pointer; background:none; border:1px solid var(--border); border-radius:5px; padding:4px 10px; white-space:nowrap; }
    .fem-filter-clear:hover { border-color:var(--primary); color:var(--text); }
    .fem-sec-bar { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:8px 16px; border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; }
    .fem-sec-title { font-family:var(--font-title); font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--text-faint); }
    .fem-body-scroll { flex:1; overflow-y:auto; display:flex; flex-direction:column; }
    .fem-table-wrap  { padding:0 16px 16px; overflow-x:auto; }
    .fem-table { width:100%; border-collapse:collapse; font-size:12px; }
    .fem-table th { background:var(--bg-input); padding:8px 10px; text-align:left; font-family:var(--font-title); font-size:9px; letter-spacing:1.5px; color:var(--text-faint); border-bottom:1px solid var(--border); white-space:nowrap; position:sticky; top:0; z-index:2; }
    .fem-table td { padding:9px 10px; border-bottom:1px solid var(--border); vertical-align:middle; color:var(--text); }
    .fem-table tr:last-child td { border-bottom:none; }
    .fem-table tr:hover td { background:var(--primary-faint); }
    .st-badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; white-space:nowrap; color:var(--text); }
    .fem-act { display:flex; gap:4px; justify-content:flex-end; flex-wrap:wrap; }
    .fem-btn { padding:4px 9px; border-radius:6px; border:1px solid var(--border); background:var(--bg-input); font-size:10px; color:var(--text); cursor:pointer; font-family:var(--font-title); letter-spacing:.5px; transition:all .15s; white-space:nowrap; }
    .fem-btn:hover { border-color:var(--primary); }
    .fem-btn.primary { background:var(--primary); border-color:var(--primary); }
    .fem-btn.primary:hover { background:var(--primary-dark); }
    .fem-btn.outline-p { border-color:var(--primary); }
    .fem-rec-list { max-height:240px; overflow-y:auto; border:1px solid var(--border); border-radius:8px; background:var(--bg-input); }
    .fem-rec-item { display:flex; align-items:center; gap:10px; padding:8px 12px; border-bottom:1px solid var(--border); font-size:12px; cursor:pointer; }
    .fem-rec-item:last-child { border-bottom:none; }
    .fem-rec-item:hover { background:var(--primary-faint); }
    .fem-rec-item input[type=checkbox] { width:15px; height:15px; accent-color:var(--primary-dark); cursor:pointer; flex-shrink:0; }
    .fem-rec-item-info { flex:1; }
    .fem-rec-item-val  { font-family:var(--font-title); font-size:12px; font-weight:700; white-space:nowrap; }
    .fem-lines-wrap { overflow-x:auto; border:1px solid var(--border); border-radius:10px; background:var(--bg-input); }
    .fem-lines-table { width:100%; border-collapse:collapse; font-size:11px; min-width:580px; }
    .fem-lines-table th { background:var(--bg-card); padding:7px 8px; text-align:left; font-family:var(--font-title); font-size:9px; letter-spacing:1px; color:var(--text-faint); border-bottom:1px solid var(--border); }
    .fem-lines-table th span.sub { display:block; font-size:8px; font-weight:400; opacity:.6; margin-top:2px; letter-spacing:0; text-transform:none; font-family:inherit; }
    .fem-lines-table td { padding:5px 5px; border-bottom:1px solid var(--border); vertical-align:middle; }
    .fem-lines-table tbody tr:last-child td { border-bottom:none; }
    .fem-lines-table input,.fem-lines-table select { width:100%; font-size:11px; padding:5px 6px; border:1px solid var(--border); border-radius:5px; background:var(--bg-card); color:var(--text); box-sizing:border-box; }
    .fem-lines-table input:focus,.fem-lines-table select:focus { border-color:var(--primary); outline:none; }
    .fem-lines-table input[readonly] { background:var(--bg-input); color:var(--text); font-weight:700; cursor:default; border-color:transparent; }
    .fem-lines-table tfoot td { padding:7px 8px; background:var(--bg-card); font-size:12px; color:var(--text); }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
    input[type=number] { -moz-appearance:textfield; }
    .fem-iva-flag { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--bg-input); border:1px solid var(--border); border-radius:8px; font-size:12px; cursor:pointer; user-select:none; color:var(--text); }
    .fem-iva-flag input[type=checkbox] { width:16px; height:16px; accent-color:var(--primary-dark); cursor:pointer; }
    .fem-btn-addline { padding:6px 14px; border-radius:6px; background:var(--primary); color:var(--text); border:none; font-size:11px; cursor:pointer; font-family:var(--font-title); letter-spacing:.5px; }
    .fem-btn-addline:hover { background:var(--primary-dark); }
    .fem-form-actions { display:flex; gap:8px; flex-wrap:wrap; padding-top:12px; border-top:1px solid var(--border); margin-top:4px; }
    .fem-emitter-box { background:var(--bg-input); border:1px solid var(--border); border-radius:10px; padding:14px; }
    .fem-emitter-box .lbl { font-family:var(--font-title); font-size:9px; letter-spacing:1px; color:var(--text-faint); text-transform:uppercase; margin-bottom:8px; display:block; }
    .fem-emitter-box input { width:100%; font-size:12px; padding:6px 8px; border:1px solid var(--border); border-radius:5px; background:var(--bg-card); color:var(--text); box-sizing:border-box; margin-bottom:5px; }
    .fem-emitter-box input:focus { border-color:var(--primary); outline:none; }
    .fem-member-tag { display:inline-flex; align-items:center; gap:8px; background:var(--primary-faint); border:1px solid var(--primary); border-radius:6px; padding:5px 10px; font-size:12px; margin-top:6px; }
    .fem-member-tag-x { cursor:pointer; color:var(--text-faint); font-size:14px; margin-left:4px; }
    .fem-member-tag-x:hover { color:var(--text); }
    .fem-gerir-btn { font-size:9px; color:var(--text-faint); background:none; border:1px solid var(--border); border-radius:4px; cursor:pointer; margin-left:8px; font-family:inherit; padding:2px 7px; vertical-align:middle; }
    .fem-gerir-btn:hover { border-color:var(--primary); color:var(--text); }
    .fem-cfg-panel { display:none; margin-top:8px; background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:12px; }
    .fem-cfg-panel.open { display:block; }
    .fem-cfg-panel h4 { font-family:var(--font-title); font-size:10px; letter-spacing:1px; color:var(--text-faint); margin:0 0 10px; text-transform:uppercase; }
    .fem-cfg-row { display:flex; align-items:center; gap:6px; margin-bottom:5px; }
    .fem-cfg-row input { flex:1; font-size:12px; padding:6px 8px; border:1px solid var(--border); border-radius:6px; background:var(--bg-input); color:var(--text); }
    .fem-cfg-row input:focus { border-color:var(--primary); outline:none; }
    .fem-cfg-del { color:var(--text-faint); background:none; border:1px solid var(--border); border-radius:4px; cursor:pointer; padding:4px 9px; font-size:12px; }
    .fem-cfg-del:hover { color:var(--text); }
    .fem-cfg-bottom { display:flex; gap:8px; margin-top:8px; }
    .fem-cfg-add   { font-size:11px; color:var(--text); background:var(--primary); border:none; border-radius:6px; padding:6px 14px; cursor:pointer; }
    .fem-cfg-add:hover { background:var(--primary-dark); }
    .fem-cfg-close { font-size:11px; color:var(--text-faint); background:var(--bg-input); border:1px solid var(--border); border-radius:6px; padding:6px 14px; cursor:pointer; }
    @media(max-width:640px){
        .fem-kpis { grid-template-columns:repeat(2,1fr); }
        .fem-table th:nth-child(3),.fem-table td:nth-child(3) { display:none; }
    }
</style>

<div class="fem-wrap">
    <div class="fem-body-scroll" id="fem-body">
        <div class="loading"><div class="spin"></div>A carregar faturas emitidas...</div>
    </div>
</div>

<script>
    // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
    // FATURAS EMITIDAS вҖ” prefixo fem_
    // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
    var fem_faturas   = [];
    var fem_membros   = [];
    var fem_receber   = [];
    var fem_linhasTemp= [];
    var fem_selectedMembro = null;
    var fem_recSelecionados= {};
    var fem_igrejaCfg = {};  // loaded from configuracoes table

    // в”Җв”Җ Forma pagamento editable list в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    var fem_pags = [];
    var FEM_PAG_DEF = [
        {key:'transferencia', label:'Transferencia'},
        {key:'mbway',         label:'MBWay'},
        {key:'multibanco',    label:'Multibanco'},
        {key:'dinheiro',      label:'Dinheiro'},
        {key:'cheque',        label:'Cheque'}
    ];
    (function(){
        try { fem_pags = JSON.parse(localStorage.getItem('zion_fem_pags')) || FEM_PAG_DEF.slice(); } catch(e){ fem_pags = FEM_PAG_DEF.slice(); }
    })();
    function fem_pagsPersist(){ localStorage.setItem('zion_fem_pags', JSON.stringify(fem_pags)); }

    // в”Җв”Җ Status в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    var FEM_SBG  = {emitida:'rgba(0,144,152,.18)',anulada:'rgba(80,80,80,.15)',paga:'rgba(0,100,60,.18)'};
    var FEM_SLBL = {emitida:'Emitida',anulada:'Anulada',paga:'Paga'};
    var fem_F = {cliente:'',status:'',data_de:'',data_ate:''};

    // в”Җв”Җ Utils в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function fem_hoje(){ return new Date().toISOString().split('T')[0]; }
    function fem_eur(v){ return '\u20AC'+Number(v||0).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2}); }
    function fem_dt(s){
        if(!s) return '\u2014';
        return new Date(s+(s.length===10?'T00:00:00':'')).toLocaleDateString('pt-PT',{day:'2-digit',month:'short',year:'numeric'});
    }
    function fem_nifNorm(s){ return (s||'').replace(/[^0-9]/g,''); }
    function fem_S(s){
        return (s||'')
            .replace(/[Г ГЎГўГЈГӨ]/g,'a').replace(/[ГЁГ©ГӘГ«]/g,'e').replace(/[Г¬ГӯГ®ГҜ]/g,'i')
            .replace(/[ГІГіГҙГөГ¶]/g,'o').replace(/[Г№ГәГ»Гј]/g,'u').replace(/Г§/g,'c').replace(/Гұ/g,'n')
            .replace(/[ГҖГҒГӮГғГ„]/g,'A').replace(/[ГҲГүГҠГӢ]/g,'E').replace(/[ГҢГҚГҺГҸ]/g,'I')
            .replace(/[Г’Г“Г”Г•Г–]/g,'O').replace(/[ГҷГҡГӣГң]/g,'U').replace(/ГҮ/g,'C').replace(/Г‘/g,'N')
            .replace(/[В°Вә]/g,'o');
    }

    // в”Җв”Җ Load church config from DB в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    async function fem_loadIgrejaCfg(){
        var rows = await sb("configuracoes?chave=in.(igreja,ig_nome,ig_nif,ig_email,endereco,codigo_postal,cidade,telefone)").catch(function(){return[];});
        var map = {};
        (rows||[]).forEach(function(r){ map[r.chave]=r.valor; });
        // Parse the 'igreja' JSON blob if present
        var ig = {};
        if(map.igreja){ try{ ig=JSON.parse(map.igreja); }catch(e){} }
        fem_igrejaCfg = {
            nome:     ig.nome      || map.ig_nome    || 'Associacao Zion Lisboa',
            nif:      ig.nif       || map.ig_nif     || '516294822',
            email:    ig.email     || map.ig_email   || 'financeiro@zionlisboa.pt',
            telefone: ig.tel       || map.telefone   || '',
            morada:   ig.morada    || map.endereco   || 'Rua do Centro Cultural, 11',
            cidade:   (map.codigo_postal?map.codigo_postal+' ':'')+(map.cidade||'Alvalade, Lisboa, Portugal')
        };
    }

    // в”Җв”Җ Emitter вҖ” reads from form fields and persists to localStorage в”Җв”Җ
    var FEM_EMIT_KEY = 'zion_fem_emitente';
    var fem_emit = null; // will be set from DB or localStorage
    function fem_getEmitente(){
        // Priority: form > localStorage > DB config
        var stored = null;
        try { stored = JSON.parse(localStorage.getItem(FEM_EMIT_KEY)); } catch(e){}
        return stored || fem_igrejaCfg;
    }
    function fem_emitPersist(){
        var e = {
            nome:     (document.getElementById('fem_e_nome')    ||{}).value || '',
            nif:      (document.getElementById('fem_e_nif')     ||{}).value || '',
            morada:   (document.getElementById('fem_e_morada')  ||{}).value || '',
            cidade:   (document.getElementById('fem_e_cidade')  ||{}).value || '',
            email:    (document.getElementById('fem_e_email')   ||{}).value || '',
            telefone: (document.getElementById('fem_e_telefone')||{}).value || ''
        };
        localStorage.setItem(FEM_EMIT_KEY, JSON.stringify(e));
        return e;
    }

    // в”Җв”Җ Next invoice number (no sequencia col вҖ” parse numero_fatura) в”Җ
    function fem_nextNum(){
        var ano = new Date().getFullYear();
        var prefix = 'FT '+ano+'/';
        var max = 0;
        fem_faturas.forEach(function(f){
            var nr = f.numero_fatura||'';
            // Accept any type prefix FT/FR/FS/FB
            var m = nr.match(/\d{4}\/(\d+)$/);
            if(m){ var n=parseInt(m[1]); if(n>max) max=n; }
        });
        return prefix+String(max+1).padStart(4,'0');
    }

    // в”Җв”Җ Init в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    async function fem_init(){
        document.getElementById('fem-body').innerHTML='<div class="loading"><div class="spin"></div>A carregar...</div>';
        await Promise.all([fem_loadAll(), fem_loadIgrejaCfg()]);
        fem_render();
    }
    async function fem_loadAll(){
        var res=await Promise.all([
            sb('faturas_emitidas?select=*&order=created_at.desc').catch(function(){return[];}),
            (typeof membros!=='undefined'?Promise.resolve(membros):sb('membros?select=id,nome,nif&ativo=eq.true&order=nome').catch(function(){return[];}))
        ]);
        fem_faturas = res[0]||[];
        fem_membros = res[1]||[];
    }

    // в”Җв”Җ Filtered в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function fem_filtered(){
        return fem_faturas.filter(function(f){
            if(fem_F.cliente&&!(f.cliente_nome||'').toLowerCase().includes(fem_F.cliente.toLowerCase())) return false;
            if(fem_F.status && f.status!==fem_F.status) return false;
            if(fem_F.data_de  && f.data_emissao<fem_F.data_de)  return false;
            if(fem_F.data_ate && f.data_emissao>fem_F.data_ate) return false;
            return true;
        });
    }

    // в”Җв”Җ Render main в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function fem_render(){
        var body=document.getElementById('fem-body'); if(!body) return;
        var all=fem_faturas;
        var totalEmit=all.filter(function(f){return f.status==='emitida';}).reduce(function(a,f){return a+Number(f.total||0);},0);
        var totalPago=all.filter(function(f){return f.status==='paga';}).reduce(function(a,f){return a+Number(f.total||0);},0);
        var sOpts='<option value="">Todos os estados</option>'+Object.keys(FEM_SLBL).map(function(k){return '<option value="'+k+'"'+(fem_F.status===k?' selected':'')+'>'+FEM_SLBL[k]+'</option>';}).join('');
        var lista=fem_filtered();
        var rows=!lista.length
            ?'<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-faint)">Nenhuma fatura emitida. Clica em + Nova Fatura.</td></tr>'
            :lista.map(function(f){

        function fem_buildTag(m){
            return '<div class="fem-member-tag"><strong>'+m.nome+'</strong>'
                +'<span style="color:var(--text-faint);font-size:10px">&nbsp;NIF: '+(m.nif||'\u2014')+'</span>'
                +'<span class="fem-member-tag-x" onclick="fem_clearMembro()">x</span></div>';

// в”Җв”Җ Member search / select в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
        function fem_filtrarMembros(q){
            var el=document.getElementById('fem-membro-results'); if(!el) return;
            if(!q||q.length<2){ el.innerHTML=''; return; }
            var ql=q.toLowerCase(), nq=fem_nifNorm(q);
            var matches=fem_membros.filter(function(m){
                return (m.nome&&m.nome.toLowerCase().includes(ql))||(nq&&m.nif&&fem_nifNorm(m.nif).includes(nq));
            }).slice(0,8);
            if(!matches.length){ el.innerHTML='<div style="font-size:11px;color:var(--text-faint);padding:4px">Nenhum membro encontrado.</div>'; return; }
            el.innerHTML='<div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--bg-card)">'
                +matches.map(function(m){
                    return '<div style="padding:8px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border)"'
                        +' onclick="fem_selecionarMembro({id:\''+m.id+'\',nome:\''+m.nome.replace(/'/g,"\\'")+'\',nif:\''+(m.nif||'')+'\'});return false;"'
                        +' onmouseover="this.style.background=\'var(--primary-faint)\'" onmouseout="this.style.background=\'\'">'
                        +'<strong>'+m.nome+'</strong>'
                        +'<span style="font-size:10px;color:var(--text-faint);margin-left:8px">NIF: '+(m.nif||'\u2014')+'</span>'
                        +'</div>';
                }).join('')+'</div>';
        }
        function fem_selecionarPorLista(sel){
            var id=sel.value; if(!id){ sel.value=''; return; }
            var m=fem_membros.find(function(x){return x.id===id;}); if(!m) return;
            fem_selecionarMembro({id:m.id,nome:m.nome,nif:m.nif||''});
            sel.value='';
        }
        function fem_selecionarMembro(m){
            fem_selectedMembro=m;
            var tag=document.getElementById('fem-membro-tag'); if(tag) tag.innerHTML=fem_buildTag(m);
            var re=document.getElementById('fem-membro-results'); if(re) re.innerHTML='';
            var si=document.getElementById('fem_search'); if(si) si.value='';
            var cn=document.getElementById('fem_cli_nome'); if(cn&&!cn.value) cn.value=m.nome;
            var cv=document.getElementById('fem_cli_nif');  if(cv&&!cv.value) cv.value=m.nif||'';

        }
        function fem_clearMembro(){
            fem_selectedMembro=null;
            var tag=document.getElementById('fem-membro-tag'); if(tag) tag.innerHTML='';

// в”Җв”Җ Load receber в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Dual search: by membro_id AND by membro_nome (fallback for records without ID)
        async function fem_carregarReceber(membro){
            var rp=document.getElementById('fem-rec-picker'); if(!rp) return;
            rp.innerHTML='<div style="font-size:12px;color:var(--text-faint);padding:8px">A carregar recebimentos...</div>';

            // Build set of already invoiced IDs (from non-anulada faturas)
            var jaInvoicados={};
            fem_faturas.forEach(function(f){
                if(f.status==='anulada') return;
                var ids=[];try{ids=JSON.parse(typeof f.contas_receber_ids==='string'?f.contas_receber_ids:'[]');}catch(e){}
                ids.forEach(function(id){ jaInvoicados[id]=true; });
            });

            var baseFields = 'id,descricao,tipo,valor_total,valor_recebido,data_recebimento,status,membro_id,membro_nome';

            // Query 1: by membro_id (exact match)
            var byId = await sb('contas_receber?select='+baseFields+'&membro_id=eq.'+membro.id+'&status=in.(recebido,parcial)&order=data_recebimento.desc').catch(function(){return[];});

            // Query 2: by membro_nome (catches records entered by name without ID)
            var byNome = [];
            if(membro.nome){
                byNome = await sb('contas_receber?select='+baseFields+'&membro_nome=ilike.*'+encodeURIComponent(membro.nome)+'*&status=in.(recebido,parcial)&order=data_recebimento.desc').catch(function(){return[];});
            }

            // Merge, deduplicate by id
            var seen={};
            var merged=(byId||[]).concat(byNome||[]).filter(function(c){
                if(seen[c.id]) return false;
                seen[c.id]=true;
                return true;
            });

            // Filter out already invoiced
            fem_receber=merged.filter(function(c){
                if(jaInvoicados[c.id]) return false;
                if(c.fatura_emitida_id) return false;
                return true;
            });

            if(!fem_receber.length){
                rp.innerHTML='<div style="font-size:12px;color:var(--text-faint);padding:12px;text-align:center;border:1px dashed var(--border);border-radius:8px">'
                    +'Nenhum recebimento pendente de faturacao para este membro.<br>'
                    +'<span style="font-size:10px">(Buscou por ID e por nome: '+membro.nome+')</span></div>';
                return;
            }

            rp.innerHTML='<div style="font-size:10px;color:var(--text-faint);margin-bottom:6px">'+fem_receber.length+' recebimento(s) disponivel(is) para '+membro.nome+':</div>'
                +'<div class="fem-rec-list">'
                +fem_receber.map(function(c){
                    var chk=fem_recSelecionados[c.id]?'checked':'';
                    return '<div class="fem-rec-item" onclick="fem_toggleRec(\''+c.id+'\')">'
                        +'<input type="checkbox" id="rec-chk-'+c.id+'" '+chk+' onclick="event.stopPropagation();fem_toggleRec(\''+c.id+'\')">'
                        +'<div class="fem-rec-item-info">'
                        +'<div style="font-weight:600">'+(c.descricao||c.tipo||'Recebimento')+'</div>'
                        +'<div style="font-size:10px;color:var(--text-faint)">'+(c.tipo||'')+' '+(c.data_recebimento?'В· '+fem_dt(c.data_recebimento):'')
                        +(c.membro_nome&&!c.membro_id?'<span style="color:var(--primary-dark)"> [por nome]</span>':'')
                        +'</div>'
                        +'</div>'
                        +'<div class="fem-rec-item-val">'+fem_eur(c.valor_total||c.valor_recebido||0)+'</div>'
                        +'</div>';
                }).join('')
                +'</div>'
                +'<div style="margin-top:6px;display:flex;gap:8px">'
                +'<button class="fem-btn" style="font-size:11px;padding:4px 10px" onclick="fem_selecionarTodos()">Selecionar todos</button>'
                +'<button class="fem-btn" style="font-size:11px;padding:4px 10px" onclick="fem_desselecionarTodos()">Desselecionar</button>'
                +'</div>';
        }

        function fem_toggleRec(id){
            fem_recSelecionados[id]=!fem_recSelecionados[id];
            var chk=document.getElementById('rec-chk-'+id); if(chk) chk.checked=!!fem_recSelecionados[id];
        }
        function fem_selecionarTodos(){
            fem_receber.forEach(function(c){ fem_recSelecionados[c.id]=true; var chk=document.getElementById('rec-chk-'+c.id); if(chk) chk.checked=true; });
        }
        function fem_desselecionarTodos(){
            fem_receber.forEach(function(c){ fem_recSelecionados[c.id]=false; var chk=document.getElementById('rec-chk-'+c.id); if(chk) chk.checked=false; });
        }
        function fem_addSelecionados(){
            var ids=Object.keys(fem_recSelecionados).filter(function(k){return fem_recSelecionados[k];});
            if(!ids.length){showFormMsg('Seleciona pelo menos um recebimento.','error');return;}
            var added=0;
            ids.forEach(function(id){
                var c=fem_receber.find(function(x){return x.id===id;}); if(!c) return;
                if(fem_linhasTemp.find(function(l){return l._recId===id;})) return;
                fem_linhasTemp.push({_t:Date.now()+Math.random(),_recId:id,descricao:(c.descricao||c.tipo||'Recebimento'),quantidade:1,preco_unitario:Number(c.valor_total||c.valor_recebido||0),iva_pct:0});
                added++;
            });
            if(!added){showFormMsg('Itens ja adicionados.','error');return;}
            fem_renderLinhas(); fem_calcTotais();
            showFormMsg(added+' linha(s) adicionada(s).','success');
        }

// в”Җв”Җ Lines в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
        function fem_addLinhaManual(){ fem_linhasTemp.push({_t:Date.now()+Math.random(),_recId:null,descricao:'',quantidade:1,preco_unitario:0,iva_pct:0}); fem_renderLinhas(); fem_calcTotais(); }
        function fem_removeLinha(i){ fem_linhasTemp.splice(i,1); fem_renderLinhas(); fem_calcTotais(); }
        function fem_syncLinha(i,field,rawVal){ var it=fem_linhasTemp[i];if(!it)return; var num={quantidade:1,preco_unitario:1,iva_pct:1}; it[field]=num[field]?(parseFloat(rawVal)||0):rawVal; fem_recalcLinha(i); fem_calcTotais(); }
        function fem_recalcLinha(i){ var it=fem_linhasTemp[i];if(!it)return; var sub=it.quantidade*it.preco_unitario,iva=sub*(it.iva_pct/100); var t=document.getElementById('fl-tot-'+i);if(t)t.value=sub.toFixed(2); var v=document.getElementById('fl-iva-'+i);if(v)v.value=iva.toFixed(2); }
        function fem_syncFromDOM(){ fem_linhasTemp.forEach(function(it,i){ var d=document.getElementById('fl-desc-'+i),q=document.getElementById('fl-qty-'+i),p=document.getElementById('fl-pu-'+i),v=document.getElementById('fl-ivap-'+i); if(d)it.descricao=d.value; if(q)it.quantidade=parseFloat(q.value)||0; if(p)it.preco_unitario=parseFloat(p.value)||0; if(v)it.iva_pct=parseFloat(v.value)||0; }); }
        function fem_renderLinhas(){
            var tbody=document.getElementById('fem-lines-tbody');if(!tbody)return;
            if(!fem_linhasTemp.length){ tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:16px;color:var(--text-faint);font-size:12px">Nenhuma linha. Adiciona recebimentos ou clica em + Linha Manual.</td></tr>'; return; }
            tbody.innerHTML=fem_linhasTemp.map(function(it,i){ var sub=it.quantidade*it.preco_unitario,iva=sub*(it.iva_pct/100);
                return '<tr>'+'<td><input id="fl-desc-'+i+'" type="text" value="'+((it.descricao||'').replace(/"/g,'&quot;'))+'" oninput="fem_syncLinha('+i+',\'descricao\',this.value)"></td>'+'<td><input id="fl-qty-'+i+'" type="number" value="'+it.quantidade+'" step="0.001" style="text-align:center" oninput="fem_syncLinha('+i+',\'quantidade\',this.value)"></td>'+'<td><input id="fl-pu-'+i+'" type="number" value="'+it.preco_unitario+'" step="0.01" style="text-align:right" oninput="fem_syncLinha('+i+',\'preco_unitario\',this.value)"></td>'+'<td><input id="fl-ivap-'+i+'" type="number" value="'+it.iva_pct+'" step="1" style="text-align:center" oninput="fem_syncLinha('+i+',\'iva_pct\',this.value)"></td>'+'<td><input id="fl-tot-'+i+'" type="number" value="'+sub.toFixed(2)+'" readonly style="text-align:right"></td>'+'<td><input id="fl-iva-'+i+'" type="number" value="'+iva.toFixed(2)+'" readonly style="text-align:right"></td>'+'<td style="text-align:center"><button onclick="fem_removeLinha('+i+')" style="color:var(--text-faint);background:none;border:1px solid var(--border);border-radius:4px;cursor:pointer;padding:2px 8px;font-size:13px">x</button></td></tr>';
            }).join('');
        }
        function fem_calcTotais(){
            var tfoot=document.getElementById('fem-lines-tfoot');if(!tfoot)return;
            var sumSub=0,sumIVA=0;
            fem_linhasTemp.forEach(function(it){var b=it.quantidade*it.preco_unitario;sumSub+=b;sumIVA+=b*(it.iva_pct/100);});
            var chk=document.getElementById('fem_isento');var isento=chk?chk.checked:true;
            var ivaReal=isento?0:sumIVA,total=sumSub+ivaReal;
            tfoot.innerHTML='<tr style="border-top:2px solid var(--border)"><td colspan="3" style="font-family:var(--font-title);font-size:9px;letter-spacing:1px;color:var(--text-faint);padding:8px">TOTAIS</td><td></td><td style="text-align:right;font-weight:700;padding:8px">'+fem_eur(sumSub)+'</td><td style="text-align:right;font-weight:700;padding:8px">'+fem_eur(ivaReal)+'</td><td></td></tr>'
                +'<tr style="background:var(--primary-faint)"><td colspan="4" style="text-align:right;font-size:11px;color:var(--text-faint);padding:8px">Subtotal: <strong style="color:var(--text)">'+fem_eur(sumSub)+'</strong>'+(isento?'&nbsp;&nbsp;<em style="font-size:10px">Isento de IVA</em>':'&nbsp;&nbsp;IVA: <strong style="color:var(--text)">'+fem_eur(sumIVA)+'</strong>')+'</td><td colspan="2" style="text-align:right;font-family:var(--font-title);font-size:17px;font-weight:700;padding:8px 10px;color:var(--text)">'+fem_eur(total)+'</td><td></td></tr>';
        }

// в”Җв”Җ Config pagamento inline в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
        function fem_toggleCfgPag(){ var p=document.getElementById('fem-cfg-pag');if(!p)return; if(p.classList.toggle('open')) fem_renderCfgPagRows(); }
        function fem_renderCfgPagRows(){ var el=document.getElementById('fem-cfg-pag-rows');if(!el)return; el.innerHTML=fem_pags.map(function(it,i){ return '<div class="fem-cfg-row"><input type="text" value="'+it.label.replace(/"/g,'&quot;')+'" oninput="fem_cfgPagUpdate('+i+',this.value)"><button class="fem-cfg-del" onclick="fem_cfgPagRemove('+i+')">x</button></div>'; }).join(''); }
        function fem_cfgPagUpdate(i,val){ if(fem_pags[i]){fem_pags[i].label=val;fem_pags[i].key=val.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');} fem_pagsPersist(); var ps=document.getElementById('fem_forma');if(ps){var pv=ps.value;ps.innerHTML=fem_pags.map(function(x){return '<option value="'+x.key+'"'+(pv===x.key?' selected':'')+'>'+x.label+'</option>';}).join('');} }
        function fem_cfgPagAdd(){ fem_pags.push({key:'item_'+Date.now(),label:'Novo item'}); fem_renderCfgPagRows(); fem_pagsPersist(); var ps=document.getElementById('fem_forma');if(ps)ps.innerHTML=fem_pags.map(function(x){return '<option value="'+x.key+'">'+x.label+'</option>';}).join(''); }
        function fem_cfgPagRemove(i){ if(!confirm('Remover "'+fem_pags[i].label+'"?'))return; fem_pags.splice(i,1); fem_renderCfgPagRows(); fem_pagsPersist(); }

// в”Җв”Җ Salvar в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
        async function fem_salvar(id){
            fem_syncFromDOM();
            var emit = fem_emitPersist(); // reads form fields and saves to localStorage
            if(!fem_linhasTemp.length){showFormMsg('Adiciona pelo menos uma linha.','error');return null;}
            var cliNome=(document.getElementById('fem_cli_nome')||{}).value||(fem_selectedMembro?fem_selectedMembro.nome:null);
            if(!cliNome){showFormMsg('Preenche o nome do cliente.','error');return null;}
            var sumSub=0,sumIVA=0;
            fem_linhasTemp.forEach(function(it){var b=it.quantidade*it.preco_unitario;sumSub+=b;sumIVA+=b*(it.iva_pct/100);});
            var chk=document.getElementById('fem_isento');var isento=chk?chk.checked:true;
            var ivaReal=isento?0:sumIVA,total=sumSub+ivaReal;
            var recIds=fem_linhasTemp.filter(function(l){return l._recId;}).map(function(l){return l._recId;});
            var nrEl=document.getElementById('fem_numero');

            // Only send columns that exist in the schema
            var body={
                numero_fatura:(nrEl||{}).value||null,
                data_emissao:(document.getElementById('fem_data')||{}).value||fem_hoje(),
                emitente_nome:emit.nome, emitente_nif:emit.nif,
                emitente_morada:emit.morada, emitente_cidade:emit.cidade,
                emitente_email:emit.email, emitente_telefone:emit.telefone,
                cliente_id:fem_selectedMembro?fem_selectedMembro.id:null,
                cliente_nome:cliNome,
                cliente_nif:fem_selectedMembro?fem_selectedMembro.nif:((document.getElementById('fem_cli_nif')||{}).value||null),
                cliente_morada:(document.getElementById('fem_cli_morada')||{}).value||null,
                itens:JSON.stringify(fem_linhasTemp),
                contas_receber_ids:JSON.stringify(recIds),
                subtotal:parseFloat(sumSub.toFixed(2)),
                iva:parseFloat(ivaReal.toFixed(2)),
                total:parseFloat(total.toFixed(2)),
                iva_incluido:!isento,
                isento_iva:isento,
                motivo_isencao:(document.getElementById('fem_isencao_txt')||{}).value||'Isento nos termos do artigo 9.o do CIVA',
                forma_pagamento:(document.getElementById('fem_forma')||{}).value||null,
                observacoes:(document.getElementById('fem_obs')||{}).value||null,
                status:'emitida', updated_at:new Date().toISOString()
            };
            var btn=document.getElementById('btn-fem-save'); if(btn){btn.disabled=true;btn.textContent='A guardar...';}
            try {
                var savedId=id;
                if(!id){
                    var r=await sb('faturas_emitidas',{method:'POST',body:JSON.stringify(body)});
                    savedId=r&&r[0]&&r[0].id;
                } else {
                    await sb('faturas_emitidas?id=eq.'+id,{method:'PATCH',body:JSON.stringify(body)});
                }
                // Link contas_receber
                for(var i=0;i<recIds.length;i++){
                    await sb('contas_receber?id=eq.'+recIds[i],{method:'PATCH',body:JSON.stringify({fatura_emitida_id:savedId})}).catch(function(){});
                }
                await fem_loadAll();
                showFormMsg('Fatura guardada.','success');
                fem_render();
                if(btn){btn.disabled=false;btn.textContent='Guardar Fatura';}
                return savedId;
            } catch(e){
                showFormMsg('Erro: '+(e&&e.message||JSON.stringify(e)),'error');
                if(btn){btn.disabled=false;btn.textContent='Guardar Fatura';}
                return null;
            }
        }
        async function fem_salvarEVer(id){ var sid=await fem_salvar(id); if(sid) setTimeout(function(){ fem_verPDF(sid); },400); }
        async function fem_marcarPaga(id){ await sb('faturas_emitidas?id=eq.'+id,{method:'PATCH',body:JSON.stringify({status:'paga',updated_at:new Date().toISOString()})}); await fem_loadAll(); fem_render(); }
        async function fem_anular(id){ if(!confirm('Anular esta fatura?'))return; await sb('faturas_emitidas?id=eq.'+id,{method:'PATCH',body:JSON.stringify({status:'anulada',updated_at:new Date().toISOString()})}); await fem_loadAll(); fem_render(); }

// в”Җв”Җ PDF в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
        function fem_loadJsPDF(cb){
            if(window.jspdf){cb();return;}
            var s=document.createElement('script');
            s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
            s.onload=function(){setTimeout(cb,150);};
            s.onerror=function(){alert('Erro ao carregar biblioteca PDF.');};
            document.head.appendChild(s);
        }
        async function fem_verPDF(id){
            var f=fem_faturas.find(function(x){return x.id===id;});
            if(!f){await fem_loadAll();f=fem_faturas.find(function(x){return x.id===id;});}
            if(!f){alert('Fatura nao encontrada.');return;}
            fem_loadJsPDF(function(){ fem_buildPDF(f); });
        }

// в”Җв”Җ Build PDF вҖ” 2 PAGES в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
        function fem_buildPDF(f){
            try {
                var jsPDF=window.jspdf.jsPDF;
                var doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
                var W=210,H=297,S=fem_S;

                var itens=[];
                try{itens=(typeof f.itens==='string'?JSON.parse(f.itens):f.itens)||[];}catch(e){}
                var isento=f.isento_iva!==false;
                var sumSub=itens.reduce(function(a,it){return a+it.quantidade*it.preco_unitario;},0);
                var sumIVA=isento?0:itens.reduce(function(a,it){return a+it.quantidade*it.preco_unitario*(it.iva_pct/100);},0);
                var total=sumSub+sumIVA;

                // Draw one full page
                function drawPage(duplicata){
                    var ml=12,mr=12,cw=W-ml-mr;
                    var y=0;

                    // Header
                    doc.setFillColor(2,22,30); doc.rect(0,y,W,28,'F');
                    doc.setTextColor(255,255,255);
                    doc.setFont('helvetica','bold'); doc.setFontSize(16);
                    doc.text(S(f.emitente_nome||'Zion Lisboa'), ml, y+10);
                    doc.setFontSize(8); doc.setFont('helvetica','normal');
                    doc.text(S(f.emitente_morada||''), ml, y+16);
                    doc.text(S(f.emitente_cidade||''), ml, y+21);
                    if(f.emitente_email) doc.text(S(f.emitente_email), ml, y+26);

                    doc.setFont('helvetica','bold'); doc.setFontSize(22);
                    doc.setTextColor(0,144,152);
                    doc.text('FATURA', W-mr, y+14, {align:'right'});
                    doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(200,200,200);
                    doc.text(S(f.numero_fatura||''), W-mr, y+20, {align:'right'});
                    doc.text(S(fem_dt(f.data_emissao)), W-mr, y+25, {align:'right'});

                    if(duplicata){
                        doc.setFont('helvetica','bold'); doc.setFontSize(7);
                        doc.setTextColor(0,144,152);
                        doc.text('DUPLICADO', W-mr, y+8, {align:'right'});
                    }
                    y+=32;

                    // Emitter + client blocks
                    var bH=36;
                    doc.setFillColor(245,247,248); doc.roundedRect(ml, y, cw/2-4, bH, 2, 2, 'F');
                    doc.setFillColor(245,247,248); doc.roundedRect(ml+cw/2+4, y, cw/2-4, bH, 2, 2, 'F');

                    doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(0,144,152);
                    doc.text('EMITENTE', ml+4, y+5);
                    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(30,30,30);
                    doc.text(S(f.emitente_nome||''), ml+4, y+11);
                    doc.setFont('helvetica','normal'); doc.setFontSize(7.5);
                    doc.text('NIF: '+S(f.emitente_nif||'---'), ml+4, y+17);
                    doc.text(S(f.emitente_morada||''), ml+4, y+22);
                    doc.text(S(f.emitente_cidade||''), ml+4, y+27);
                    doc.text(S(f.emitente_email||''), ml+4, y+32);

                    var cx=ml+cw/2+8;
                    doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(0,144,152);
                    doc.text('CLIENTE', cx, y+5);
                    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(30,30,30);
                    doc.text(S(f.cliente_nome||'---'), cx, y+11);
                    doc.setFont('helvetica','normal'); doc.setFontSize(7.5);
                    doc.text('NIF: '+S(f.cliente_nif||'---'), cx, y+17);
                    if(f.cliente_morada) doc.text(S(f.cliente_morada), cx, y+22);
                    y+=bH+5;

                    // Meta
                    doc.setFontSize(8); doc.setTextColor(100,100,100); doc.setFont('helvetica','normal');
                    doc.text('Data de emissao: '+S(fem_dt(f.data_emissao)), ml, y);
                    if(f.forma_pagamento) doc.text('Forma de pagamento: '+S(f.forma_pagamento), ml+80, y);
                    y+=5;
                    doc.setDrawColor(0,144,152); doc.setLineWidth(0.4);
                    doc.line(ml, y, W-mr, y); y+=5;

                    // Table header
                    doc.setFillColor(2,22,30); doc.rect(ml, y, cw, 7, 'F');
                    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(7.5);
                    doc.text('DESCRICAO',   ml+2,   y+5);
                    doc.text('QTD',        ml+95,  y+5, {align:'right'});
                    doc.text('PRECO UNIT.',ml+118, y+5, {align:'right'});
                    doc.text('IVA %',      ml+133, y+5, {align:'right'});
                    doc.text('IVA EUR',    ml+151, y+5, {align:'right'});
                    doc.text('TOTAL',      W-mr,   y+5, {align:'right'});
                    y+=9;

                    doc.setTextColor(30,30,30); doc.setFont('helvetica','normal'); doc.setFontSize(8);
                    itens.forEach(function(it,idx){
                        if(idx%2===0){doc.setFillColor(248,250,251);doc.rect(ml,y-1,cw,7,'F');}
                        var sub=it.quantidade*it.preco_unitario;
                        var iva=isento?0:sub*(it.iva_pct/100);
                        var desc=S(it.descricao||''); if(desc.length>46) desc=desc.slice(0,44)+'..';
                        doc.text(desc,          ml+2,   y+5);
                        doc.text(Number(it.quantidade).toFixed(2),     ml+95,  y+5,{align:'right'});
                        doc.text(Number(it.preco_unitario).toFixed(2), ml+118, y+5,{align:'right'});
                        doc.text(isento?'Isento':String(Number(it.iva_pct||0).toFixed(0))+'%', ml+133, y+5,{align:'right'});
                        doc.text(iva.toFixed(2),  ml+151, y+5,{align:'right'});
                        doc.text(sub.toFixed(2),  W-mr,   y+5,{align:'right'});
                        y+=7;
                    });

                    // Totals
                    y+=4;
                    doc.setDrawColor(210,210,210); doc.setLineWidth(0.2);
                    doc.line(ml, y, W-mr, y); y+=2;
                    var tx=W-mr-58;
                    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(80,80,80);
                    doc.text('Subtotal:', tx, y+5);
                    doc.text(sumSub.toFixed(2)+' EUR', W-mr, y+5, {align:'right'});
                    doc.text('IVA:', tx, y+11);
                    if(isento){doc.setFontSize(8);doc.text('Isento', W-mr, y+11,{align:'right'});doc.setFontSize(9);}
                    else doc.text(sumIVA.toFixed(2)+' EUR', W-mr, y+11,{align:'right'});
                    doc.setFillColor(2,22,30); doc.roundedRect(tx-2, y+13, W-mr-tx+2, 9, 1.5, 1.5, 'F');
                    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(10.5);
                    doc.text('TOTAL:', tx+1, y+19);
                    doc.text(total.toFixed(2)+' EUR', W-mr-2, y+19,{align:'right'});
                    y+=26;

                    if(isento&&f.motivo_isencao){
                        doc.setTextColor(120,120,120); doc.setFont('helvetica','italic'); doc.setFontSize(7);
                        doc.text(S(f.motivo_isencao), ml, y); y+=6;
                    }
                    if(f.observacoes){
                        doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(80,80,80);
                        doc.text('Obs: '+S(f.observacoes), ml, y);
                    }

                    // Footer
                    doc.setFillColor(2,22,30); doc.rect(0,H-12,W,12,'F');
                    doc.setTextColor(160,160,160); doc.setFont('helvetica','normal'); doc.setFontSize(7);
                    doc.text(S(f.emitente_nome||'')+'  В·  NIF: '+S(f.emitente_nif||'')+'  В·  '+S(f.emitente_email||''), W/2, H-7, {align:'center'});
                    doc.text('Documento emitido por sistema informatico  В·  '+S(f.numero_fatura||''), W/2, H-3, {align:'center'});
                }

                // Page 1 вҖ” original
                drawPage(false);

                // Page 2 вҖ” duplicado (new page)
                doc.addPage();
                drawPage(true);

                // Open in new tab
                var blob=doc.output('blob');
                window.open(URL.createObjectURL(blob),'_blank');

            } catch(err){
                console.error(err);
                alert('Erro ao gerar PDF: '+err.message);
            }
        }

        fem_init();
</script>
