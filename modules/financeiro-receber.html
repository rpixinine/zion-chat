<style>
    /* ── CONTAS A RECEBER ─────────────────────────────────────── */
    .rec-wrap { display:flex; flex-direction:column; height:100%; overflow:hidden; }

    .rec-kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:8px; padding:12px 16px 6px; }
    .rec-kpi  { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:12px 14px; }
    .rec-kpi-val   { font-family:var(--font-title); font-size:19px; font-weight:700; line-height:1; }
    .rec-kpi-label { font-size:9px; color:var(--text-faint); margin-top:4px; text-transform:uppercase; letter-spacing:1px; }
    .rec-kpi-sub   { font-size:10px; color:var(--text-faint); margin-top:3px; }

    .rec-filters { display:flex; gap:6px; padding:8px 16px; flex-wrap:wrap; align-items:center; background:var(--bg-input); border-bottom:1px solid var(--border); flex-shrink:0; }
    .rec-filter-sel { padding:6px 10px; border-radius:20px; border:1px solid var(--border); background:var(--bg-card); font-size:11px; color:var(--text-muted); cursor:pointer; font-family:var(--font-body,Lato); }
    .rec-filter-sel:focus { outline:none; border-color:var(--primary); }

    .rec-sec-bar { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:8px 16px; border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; }
    .rec-sec-bar .rec-title { font-family:var(--font-title); font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--text-faint); }

    .rec-table-wrap { padding:0 16px 16px; overflow-x:auto; flex:1; overflow-y:auto; }
    .rec-table { width:100%; border-collapse:collapse; font-size:12px; }
    .rec-table th { background:var(--bg-input); padding:8px 10px; text-align:left; font-family:var(--font-title); font-size:9px; letter-spacing:1.5px; color:var(--text-faint); border-bottom:1px solid var(--border); white-space:nowrap; position:sticky; top:0; z-index:2; }
    .rec-table td { padding:9px 10px; border-bottom:1px solid var(--border); vertical-align:middle; }
    .rec-table tr:last-child td { border-bottom:none; }
    .rec-table tr:hover td { background:var(--primary-faint); }

    .st-badge    { display:inline-block; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; white-space:nowrap; }
    .st-pendente { background:rgba(230,81,0,.1);  color:#e65100; border:1px solid rgba(230,81,0,.3); }
    .st-pago     { background:rgba(46,125,50,.1); color:#2e7d32; border:1px solid rgba(46,125,50,.3); }
    .st-atrasado { background:rgba(198,40,40,.1); color:#c62828; border:1px solid rgba(198,40,40,.3); }
    .st-parcial  { background:rgba(0,144,152,.1); color:var(--primary-dark); border:1px solid rgba(0,144,152,.3); }
    .st-cancelado{ background:var(--bg-input);    color:var(--text-faint);   border:1px solid var(--border); }
    .st-recebido { background:rgba(46,125,50,.1); color:#2e7d32; border:1px solid rgba(46,125,50,.3); }

    .rec-act { display:flex; gap:4px; justify-content:flex-end; flex-wrap:wrap; }
    .rec-btn { padding:4px 9px; border-radius:6px; border:1px solid var(--border); background:var(--bg-input); font-size:10px; color:var(--text-muted); cursor:pointer; font-family:var(--font-title); letter-spacing:.5px; transition:all .15s; white-space:nowrap; }
    .rec-btn:hover { border-color:var(--primary); color:var(--primary-dark); }
    .rec-btn.g { background:rgba(46,125,50,.08); color:#2e7d32; border-color:rgba(46,125,50,.3); }
    .rec-btn.p { background:var(--primary-faint); color:var(--primary-dark); border-color:var(--primary); }

    .rec-body-scroll { flex:1; overflow-y:auto; }

    @media(max-width:600px){
        .rec-kpis { grid-template-columns:repeat(2,1fr); }
        .rec-table th:nth-child(3), .rec-table td:nth-child(3) { display:none; }
    }
</style>

<!-- ╔══════════════════════════════════════════════════════╗ -->
<!-- ║           CONTAS A RECEBER                           ║ -->
<!-- ╚══════════════════════════════════════════════════════╝ -->
<div class="rec-wrap">
    <div class="rec-body-scroll" id="rec-body">
        <div class="loading"><div class="spin"></div>A carregar contas a receber...</div>
    </div>
</div>

<script>
    // ════════════════════════════════════════════════════════════
    // CONTAS A RECEBER  —  prefixo rec_
    // ════════════════════════════════════════════════════════════
    var rec_data      = [];
    var rec_membros   = [];
    var rec_filtros   = { tipo:'', membro:'', status:'', mes:'' };

    // ── UTILS ────────────────────────────────────────────────────
    var rec_hoje = function(){ return new Date().toISOString().split('T')[0]; };
    function rec_eur(v){ return '€'+Number(v||0).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2}); }
    function rec_dt(s,opts){
        if(!s) return '—';
        var d = new Date(s+(s.length===10?'T00:00:00':''));
        return d.toLocaleDateString('pt-PT', Object.assign({day:'2-digit',month:'short',year:'numeric'}, opts||{}));
    }
    function rec_stBadge(st){
        var cls = {pendente:'st-pendente',pago:'st-pago',atrasado:'st-atrasado',parcial:'st-parcial',cancelado:'st-cancelado',recebido:'st-recebido'};
        var lbl = {pendente:'Pendente',pago:'Pago',atrasado:'Atrasado',parcial:'Parcial',cancelado:'Cancelado',recebido:'Recebido'};
        return '<span class="st-badge '+(cls[st]||'st-pendente')+'">'+(lbl[st]||st)+'</span>';
    }
    function rec_kpiCard(label,val,cor,sub,subCor){
        return '<div class="rec-kpi"><div class="rec-kpi-val" style="color:'+cor+'">'+val+'</div><div class="rec-kpi-label">'+label+'</div>'+(sub?'<div class="rec-kpi-sub" style="color:'+(subCor||'var(--text-faint)')+'">'+sub+'</div>':'')+'</div>';
    }

    // ── INIT ─────────────────────────────────────────────────────
    async function rec_init(){
        document.getElementById('rec-body').innerHTML = '<div class="loading"><div class="spin"></div>A carregar...</div>';
        await rec_loadAll();
        rec_render();
    }

    async function rec_loadAll(){
        var hoje = rec_hoje();
        var res = await Promise.all([
            sb('contas_receber?select=*&order=data_vencimento.asc').catch(function(){ return []; }),
            (typeof membros !== 'undefined' ? Promise.resolve(membros) : sb('membros?select=id,nome&ativo=eq.true&order=nome').catch(function(){ return []; })),
        ]);
        rec_data    = res[0] || [];
        rec_membros = res[1] || [];
        rec_data.forEach(function(c){
            if(c.status === 'pendente' && c.data_vencimento && c.data_vencimento < hoje) c.status = 'atrasado';
        });
    }

    function rec_render(){
        var body = document.getElementById('rec-body');
        if(!body) return;
        body.innerHTML = rec_renderMain();
    }

    // ── RENDER PRINCIPAL ─────────────────────────────────────────
    function rec_renderMain(){
        var f    = rec_filtros;
        var lista = rec_data.slice();

        if(f.tipo)   lista = lista.filter(function(c){ return c.tipo === f.tipo; });
        if(f.membro) lista = lista.filter(function(c){ return c.membro_id === f.membro; });
        if(f.status) lista = lista.filter(function(c){ return c.status === f.status; });
        if(f.mes)    lista = lista.filter(function(c){ return (c.data_vencimento||'').startsWith(f.mes); });

        var totalPend  = lista.filter(function(c){ return c.status==='pendente'||c.status==='atrasado'; }).reduce(function(a,c){ return a+Number(c.valor_pendente||c.valor_total||0); }, 0);
        var totalRec   = lista.filter(function(c){ return c.status==='recebido'; }).reduce(function(a,c){ return a+Number(c.valor_total||0); }, 0);
        var totalAtras = lista.filter(function(c){ return c.status==='atrasado'; }).reduce(function(a,c){ return a+Number(c.valor_pendente||c.valor_total||0); }, 0);

        var TIPO_LABEL = {dizimo:'Dízimo',oferta:'Oferta',venda:'Venda',evento:'Evento',curso:'Curso',outro:'Outro'};

        // Filtros de mês disponíveis
        var meses = [...new Set(rec_data.map(function(c){ return (c.data_vencimento||'').slice(0,7); }).filter(Boolean))].sort().reverse();
        var mOpts = meses.map(function(m){
            var p=m.split('-'), l=new Date(p[0],p[1]-1).toLocaleDateString('pt-PT',{month:'short',year:'numeric'});
            return '<option value="'+m+'" '+(f.mes===m?'selected':'')+'>'+l+'</option>';
        }).join('');
        var membOpts = rec_membros.map(function(m){
            return '<option value="'+m.id+'" '+(f.membro===m.id?'selected':'')+'>'+(m.nome||'')+'</option>';
        }).join('');

        // Linhas da tabela
        var rows = '';
        if(!lista.length){
            rows = '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-faint)">Nenhuma conta com este filtro.</td></tr>';
        } else {
            lista.forEach(function(c){
                var isAtr = c.status === 'atrasado';
                rows += '<tr style="'+(isAtr?'background:rgba(198,40,40,.04)':'')+'">'
                    +'<td>'+rec_dt(c.data_emissao)+'<br><span style="font-size:10px;color:'+(isAtr?'#c62828':'var(--text-faint)')+'">Vence '+rec_dt(c.data_vencimento)+'</span>'
                    +(c.data_recebimento?'<br><span style="font-size:10px;color:#2e7d32">Recebido '+rec_dt(c.data_recebimento)+'</span>':'')+'</td>'
                    +'<td><div style="font-weight:600;font-size:12px">'+(c.descricao||'—')+'</div>'
                    +'<div style="font-size:10px;color:var(--text-faint)">'+(c.membro_nome||'Sem membro')+(c.referencia?' · Ref: '+c.referencia:'')+'</div></td>'
                    +'<td><span class="badge badge-gray" style="font-size:9px">'+(TIPO_LABEL[c.tipo]||c.tipo||'—')+'</span></td>'
                    +'<td>'+rec_stBadge(c.status)+'</td>'
                    +'<td style="text-align:right">'
                    +'<div style="font-family:var(--font-title);font-weight:700;color:'+(isAtr?'#c62828':'var(--primary-dark)')+'">'+rec_eur(c.valor_total)+'</div>'
                    +(c.valor_recebido>0?'<div style="font-size:10px;color:#2e7d32">Rec. '+rec_eur(c.valor_recebido)+'</div>':'')
                    +((c.valor_pendente||0)>0&&(c.valor_recebido||0)>0?'<div style="font-size:10px;color:#e65100">Rest. '+rec_eur(c.valor_pendente)+'</div>':'')
                    +'</td>'
                    +'<td><div class="rec-act">'
                    +(c.status!=='recebido'&&c.status!=='cancelado'?'<button class="rec-btn g" onclick="rec_marcarRecebido(\''+c.id+'\','+Number(c.valor_total||0)+')">✓ Recebido</button>':'')
                    +'<button class="rec-btn" onclick="rec_abrirForm(\''+c.id+'\')">Editar</button>'
                    +'<button class="rec-btn p" onclick="rec_duplicar(\''+c.id+'\')">Duplic.</button>'
                    +'</div></td></tr>';
            });
        }

        return ''
            +'<div class="rec-kpis">'
            +rec_kpiCard('A Receber', rec_eur(totalPend), 'var(--primary-dark)', lista.filter(function(c){return c.status==='pendente'||c.status==='atrasado';}).length+' contas')
            +rec_kpiCard('Em Atraso', rec_eur(totalAtras), '#c62828', lista.filter(function(c){return c.status==='atrasado';}).length+' contas', '#c62828')
            +rec_kpiCard('Recebido',  rec_eur(totalRec),   '#2e7d32', lista.filter(function(c){return c.status==='recebido';}).length+' contas')
            +'</div>'
            +'<div class="rec-filters">'
            +'<select class="rec-filter-sel" onchange="rec_filtros.mes=this.value;rec_render()"><option value="">Todos os meses</option>'+mOpts+'</select>'
            +'<select class="rec-filter-sel" onchange="rec_filtros.tipo=this.value;rec_render()"><option value="">Todos os tipos</option><option value="dizimo">Dízimo</option><option value="oferta">Oferta</option><option value="venda">Venda</option><option value="evento">Evento</option><option value="curso">Curso</option><option value="outro">Outro</option></select>'
            +'<select class="rec-filter-sel" onchange="rec_filtros.membro=this.value;rec_render()"><option value="">Todos os membros</option>'+membOpts+'</select>'
            +'<select class="rec-filter-sel" onchange="rec_filtros.status=this.value;rec_render()"><option value="">Todos os estados</option><option value="pendente">Pendente</option><option value="recebido">Recebido</option><option value="atrasado">Atrasado</option><option value="parcial">Parcial</option></select>'
            +'<button class="btn-new" style="margin-left:auto" onclick="rec_abrirForm(null)">+ Novo</button>'
            +'</div>'
            +'<div class="rec-table-wrap"><table class="rec-table">'
            +'<thead><tr><th>Datas</th><th>Descrição / Membro</th><th>Tipo</th><th>Estado</th><th style="text-align:right">Valores</th><th>Ações</th></tr></thead>'
            +'<tbody>'+rows+'</tbody></table></div>';
    }

    // ── FORM ─────────────────────────────────────────────────────
    function rec_abrirForm(id, prefill){
        var c = id ? rec_data.find(function(x){ return x.id === id; }) : prefill || null;
        var isDup = !id && !!prefill;
        var fv = function(k,d){ return c && c[k] != null ? c[k] : (d != null ? d : ''); };
        var TIPOS  = ['dizimo','oferta','venda','evento','curso','outro'];
        var TIPOL  = {dizimo:'Dízimo',oferta:'Oferta',venda:'Venda',evento:'Evento',curso:'Curso',outro:'Outro'};
        var FORMAS = ['transferencia','mbway','multibanco','dinheiro','cheque'];
        var FORMAL = {transferencia:'Transferência',mbway:'MBWay',multibanco:'Multibanco',dinheiro:'Dinheiro',cheque:'Cheque'};
        var membOpts = rec_membros.map(function(m){
            return '<option value="'+m.id+'" '+(fv('membro_id')===m.id?'selected':'')+'>'+(m.nome||'')+'</option>';
        }).join('');

        document.getElementById('drawer-title').textContent = id ? 'Editar Conta a Receber' : 'Nova Conta a Receber';
        document.getElementById('drawer-body').innerHTML = '<div class="form-grid">'
            +'<div class="msg-form" id="form-msg"></div>'
            +'<div class="form-section-title">Identificação</div>'
            +'<div class="form-group form-full"><label class="form-label">Descrição *</label>'
            +'<input class="form-input" id="cr_descricao" value="'+fv('descricao')+'" placeholder="Ex: Dízimo João — Março 2026"></div>'
            +'<div class="form-group"><label class="form-label">Tipo</label>'
            +'<select class="form-select" id="cr_tipo">'+TIPOS.map(function(v){ return '<option value="'+v+'" '+(fv('tipo','dizimo')===v?'selected':'')+'>'+(TIPOL[v]||v)+'</option>'; }).join('')+'</select></div>'
            +'<div class="form-group"><label class="form-label">Referência</label>'
            +'<input class="form-input" id="cr_referencia" value="'+(isDup?'':fv('referencia'))+'" placeholder="Ex: PIX, Ref MB..."></div>'
            +'<div class="form-group form-full"><label class="form-label">Membro</label>'
            +'<select class="form-select" id="cr_membro_id"><option value="">— Sem membro —</option>'+membOpts+'</select></div>'
            +'<div class="form-section-title">Valores e Datas</div>'
            +'<div class="form-group"><label class="form-label">Valor Total (€) *</label>'
            +'<input class="form-input" id="cr_valor_total" type="number" step="0.01" value="'+fv('valor_total',0)+'"></div>'
            +'<div class="form-group"><label class="form-label">Forma Pagamento</label>'
            +'<select class="form-select" id="cr_forma_pagamento">'+FORMAS.map(function(v){ return '<option value="'+v+'" '+(fv('forma_pagamento','transferencia')===v?'selected':'')+'>'+(FORMAL[v]||v)+'</option>'; }).join('')+'</select></div>'
            +'<div class="form-group"><label class="form-label">Data Emissão</label>'
            +'<input class="form-input" id="cr_data_emissao" type="date" value="'+(isDup?rec_hoje():fv('data_emissao',rec_hoje()))+'"></div>'
            +'<div class="form-group"><label class="form-label">Data Vencimento</label>'
            +'<input class="form-input" id="cr_data_vencimento" type="date" value="'+(isDup?rec_hoje():fv('data_vencimento',rec_hoje()))+'"></div>'
            +'<div class="form-group form-full"><label class="form-label">Observações</label>'
            +'<textarea class="form-textarea" id="cr_observacoes">'+fv('observacoes')+'</textarea></div>'
            +'<div class="form-actions"><button class="btn-cancel-form" onclick="closeDrawer()">Cancelar</button>'
            +'<button class="btn-save" id="btn-save" onclick="rec_salvar(\''+( id||'')+'\')">Guardar</button></div>'
            +'</div>';

        document.getElementById('overlay').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }

    async function rec_salvar(id){
        var get = function(k){ var el = document.getElementById('cr_'+k); return el ? el.value && el.value.trim() || null : null; };
        var desc = get('descricao'), val = parseFloat(get('valor_total')||0);
        if(!desc){ showFormMsg('Descrição obrigatória.','error'); return; }
        if(!val){  showFormMsg('Valor obrigatório.','error'); return; }
        var memId   = get('membro_id');
        var memNome = memId ? ((rec_membros.find(function(m){ return m.id === memId; })||{}).nome||null) : null;
        var body = {
            descricao: desc, tipo: get('tipo'), valor_total: val,
            membro_id: memId||null, membro_nome: memNome,
            referencia: get('referencia'), data_emissao: get('data_emissao'),
            data_vencimento: get('data_vencimento'), forma_pagamento: get('forma_pagamento'),
            observacoes: get('observacoes'), status: 'pendente', updated_at: new Date().toISOString()
        };
        var btn = document.getElementById('btn-save');
        btn.disabled = true; btn.textContent = 'A guardar...';
        try {
            if(!id) await sb('contas_receber', {method:'POST', body:JSON.stringify(body)});
            else    await sb('contas_receber?id=eq.'+id, {method:'PATCH', body:JSON.stringify(body)});
            showFormMsg('Guardado!','success');
            await rec_loadAll();
            setTimeout(function(){ closeDrawer(); rec_render(); }, 700);
        } catch(e){
            showFormMsg('Erro: '+(e&&e.message||JSON.stringify(e)),'error');
            btn.disabled = false; btn.textContent = 'Guardar';
        }
    }

    async function rec_marcarRecebido(id, valorTotal){
        await sb('contas_receber?id=eq.'+id, {method:'PATCH', body:JSON.stringify({
                status:'recebido', valor_recebido:valorTotal,
                data_recebimento: rec_hoje(), updated_at: new Date().toISOString()
            })});
        await rec_loadAll();
        rec_render();
    }

    function rec_duplicar(id){
        var c = rec_data.find(function(x){ return x.id === id; });
        if(!c) return;
        rec_abrirForm(null, Object.assign({}, c, {status:'pendente', data_recebimento:null, valor_recebido:0, referencia:null}));
    }

    // ── ENTRY POINT ───────────────────────────────────────────────
    rec_init();
</script>
