<style>
/* ── CONTAS A RECEBER ─────────────────────────────────────── */
.rec-wrap { display:flex; flex-direction:column; height:100%; overflow:hidden; }

.rec-kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:8px; padding:12px 16px 6px; flex-shrink:0; }
.rec-kpi  { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:12px 14px; }
.rec-kpi-val   { font-family:var(--font-title); font-size:19px; font-weight:700; line-height:1; color:var(--text); }
.rec-kpi-label { font-size:9px; color:var(--text-faint); margin-top:4px; text-transform:uppercase; letter-spacing:1px; }
.rec-kpi-sub   { font-size:10px; color:var(--text-faint); margin-top:3px; }

/* Filter bar */
.rec-filter-bar { display:flex; gap:6px; padding:8px 16px; flex-wrap:wrap; align-items:center; background:var(--bg-input); border-bottom:1px solid var(--border); flex-shrink:0; }
.rec-filter-label { font-size:9px; color:var(--text-faint); text-transform:uppercase; letter-spacing:1px; white-space:nowrap; }
.rec-filter-bar select, .rec-filter-bar input[type=date] { font-size:11px; padding:5px 8px; border:1px solid var(--border); border-radius:6px; background:var(--bg-card); color:var(--text); }
.rec-filter-clear { font-size:10px; color:var(--text-faint); cursor:pointer; background:none; border:1px solid var(--border); border-radius:5px; padding:4px 10px; white-space:nowrap; }
.rec-filter-clear:hover { border-color:var(--primary); color:var(--text); }

/* Section bar */
.rec-sec-bar { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:8px 16px; border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; }
.rec-sec-title { font-family:var(--font-title); font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--text-faint); }

.rec-body-scroll { flex:1; overflow-y:auto; display:flex; flex-direction:column; }
.rec-table-wrap  { padding:0 16px 16px; overflow-x:auto; }

.rec-table { width:100%; border-collapse:collapse; font-size:12px; }
.rec-table th { background:var(--bg-input); padding:8px 10px; text-align:left; font-family:var(--font-title); font-size:9px; letter-spacing:1.5px; color:var(--text-faint); border-bottom:1px solid var(--border); white-space:nowrap; position:sticky; top:0; z-index:2; }
.rec-table td { padding:9px 10px; border-bottom:1px solid var(--border); vertical-align:middle; color:var(--text); }
.rec-table tr:last-child td { border-bottom:none; }
.rec-table tr:hover td { background:var(--primary-faint); }

.st-badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; white-space:nowrap; color:var(--text); }

.rec-act { display:flex; gap:4px; justify-content:flex-end; flex-wrap:wrap; }
.rec-btn { padding:4px 9px; border-radius:6px; border:1px solid var(--border); background:var(--bg-input); font-size:10px; color:var(--text); cursor:pointer; font-family:var(--font-title); letter-spacing:.5px; transition:all .15s; white-space:nowrap; }
.rec-btn:hover { border-color:var(--primary); }
.rec-btn.primary   { background:var(--primary); border-color:var(--primary); }
.rec-btn.primary:hover { background:var(--primary-dark); }
.rec-btn.outline-p { border-color:var(--primary); }

/* Gerir inline config */
.rec-gerir-btn { font-size:9px; color:var(--text-faint); background:none; border:1px solid var(--border); border-radius:4px; cursor:pointer; margin-left:8px; font-family:inherit; padding:2px 7px; vertical-align:middle; }
.rec-gerir-btn:hover { border-color:var(--primary); color:var(--text); }

.rec-cfg-panel { display:none; margin-top:8px; background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:12px; }
.rec-cfg-panel.open { display:block; }
.rec-cfg-panel h4 { font-family:var(--font-title); font-size:10px; letter-spacing:1px; color:var(--text-faint); margin:0 0 10px; text-transform:uppercase; }
.rec-cfg-row { display:flex; align-items:center; gap:6px; margin-bottom:5px; }
.rec-cfg-row input { flex:1; font-size:12px; padding:6px 8px; border:1px solid var(--border); border-radius:6px; background:var(--bg-input); color:var(--text); }
.rec-cfg-row input:focus { border-color:var(--primary); outline:none; }
.rec-cfg-del { color:var(--text-faint); background:none; border:1px solid var(--border); border-radius:4px; cursor:pointer; padding:4px 9px; font-size:12px; }
.rec-cfg-del:hover { color:var(--text); }
.rec-cfg-bottom { display:flex; gap:8px; margin-top:8px; }
.rec-cfg-add   { font-size:11px; color:var(--text); background:var(--primary); border:none; border-radius:6px; padding:6px 14px; cursor:pointer; }
.rec-cfg-add:hover { background:var(--primary-dark); }
.rec-cfg-close { font-size:11px; color:var(--text-faint); background:var(--bg-input); border:1px solid var(--border); border-radius:6px; padding:6px 14px; cursor:pointer; }
.rec-cfg-close:hover { color:var(--text); }

/* NIF lookup row */
.rec-nif-row { display:flex; gap:6px; align-items:center; margin-bottom:6px; }
.rec-nif-row input { flex:1; }

/* Origem toggle */
.rec-origem-tabs { display:flex; gap:6px; margin-bottom:10px; }
.rec-origem-tab  { flex:1; padding:7px; border:1px solid var(--border); border-radius:6px; background:var(--bg-input); font-size:11px; color:var(--text-faint); cursor:pointer; text-align:center; font-family:var(--font-title); letter-spacing:.5px; }
.rec-origem-tab.active { background:var(--primary); border-color:var(--primary); color:var(--text); }

@media(max-width:600px){
    .rec-kpis { grid-template-columns:repeat(2,1fr); }
    .rec-table th:nth-child(3), .rec-table td:nth-child(3) { display:none; }
}
</style>

<div class="rec-wrap">
    <div class="rec-body-scroll" id="rec-body">
        <div class="loading"><div class="spin"></div>A carregar contas a receber...</div>
    </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
// CONTAS A RECEBER — prefixo rec_
// ════════════════════════════════════════════════════════════
var rec_data    = [];
var rec_membros = [];

// ── Editable lists ───────────────────────────────────────────
var rec_tipos = [];
var rec_pags  = [];
var REC_TIPO_DEF = [
    {key:'dizimo',  label:'Dizimo'},
    {key:'oferta',  label:'Oferta'},
    {key:'venda',   label:'Venda'},
    {key:'evento',  label:'Evento'},
    {key:'curso',   label:'Curso'},
    {key:'outro',   label:'Outro'}
];
var REC_PAG_DEF = [
    {key:'transferencia', label:'Transferencia'},
    {key:'mbway',         label:'MBWay'},
    {key:'multibanco',    label:'Multibanco'},
    {key:'dinheiro',      label:'Dinheiro'},
    {key:'cheque',        label:'Cheque'}
];
(function(){
    try { rec_tipos = JSON.parse(localStorage.getItem('zion_rec_tipos')) || REC_TIPO_DEF.slice(); } catch(e){ rec_tipos = REC_TIPO_DEF.slice(); }
    try { rec_pags  = JSON.parse(localStorage.getItem('zion_rec_pags'))  || REC_PAG_DEF.slice();  } catch(e){ rec_pags  = REC_PAG_DEF.slice();  }
})();
function rec_cfgPersist(){
    localStorage.setItem('zion_rec_tipos', JSON.stringify(rec_tipos));
    localStorage.setItem('zion_rec_pags',  JSON.stringify(rec_pags));
}

// ── Filter state ─────────────────────────────────────────────
var rec_F = {tipo:'', membro:'', status:'', rec_de:'', rec_ate:'', emis_de:'', emis_ate:''};

// ── Status config ─────────────────────────────────────────────
var REC_SBG  = {pendente:'rgba(100,100,100,.18)',recebido:'rgba(0,144,152,.18)',atrasado:'rgba(150,50,50,.18)',parcial:'rgba(0,100,120,.18)',cancelado:'rgba(60,60,60,.15)'};
var REC_SLBL = {pendente:'Pendente',recebido:'Recebido',atrasado:'Atrasado',parcial:'Parcial',cancelado:'Cancelado'};

// ── Utils ─────────────────────────────────────────────────────
function rec_hoje(){ return new Date().toISOString().split('T')[0]; }
function rec_eur(v){ return '\u20AC'+Number(v||0).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function rec_dt(s){
    if(!s) return '\u2014';
    return new Date(s+(s.length===10?'T00:00:00':'')).toLocaleDateString('pt-PT',{day:'2-digit',month:'short',year:'numeric'});
}
function rec_tipoLabel(key){ return (rec_tipos.find(function(x){return x.key===key;})||{label:key||'\u2014'}).label; }
function rec_stBadge(st){
    return '<span class="st-badge" style="background:'+(REC_SBG[st]||'rgba(100,100,100,.15)')+'">'+(REC_SLBL[st]||st)+'</span>';
}
function rec_nifNorm(s){ return (s||'').replace(/[^0-9]/g,''); }

// ── Init ──────────────────────────────────────────────────────
async function rec_init(){
    document.getElementById('rec-body').innerHTML='<div class="loading"><div class="spin"></div>A carregar...</div>';
    await rec_loadAll();
    rec_render();
}
async function rec_loadAll(){
    var hoje=rec_hoje();
    var res=await Promise.all([
        sb('contas_receber?select=*&order=data_vencimento.asc').catch(function(){return[];}),
        (typeof membros!=='undefined'?Promise.resolve(membros):sb('membros?select=id,nome,nif&ativo=eq.true&order=nome').catch(function(){return[];}))
    ]);
    rec_data    = res[0]||[];
    rec_membros = res[1]||[];
    rec_data.forEach(function(c){
        if(c.status==='pendente'&&c.data_vencimento&&c.data_vencimento<hoje) c.status='atrasado';
    });
}

// ── Filtered ─────────────────────────────────────────────────
function rec_filtered(){
    return rec_data.filter(function(c){
        if(rec_F.tipo   && c.tipo!==rec_F.tipo)          return false;
        if(rec_F.membro && c.membro_id!==rec_F.membro)   return false;
        if(rec_F.status && c.status!==rec_F.status)      return false;
        if(rec_F.rec_de  && (c.data_recebimento||'')<rec_F.rec_de)  return false;
        if(rec_F.rec_ate && (c.data_recebimento||'')>rec_F.rec_ate) return false;
        if(rec_F.emis_de  && (c.data_emissao||'')<rec_F.emis_de)  return false;
        if(rec_F.emis_ate && (c.data_emissao||'')>rec_F.emis_ate) return false;
        return true;
    });
}

// ── Render main ───────────────────────────────────────────────
function rec_render(){
    var body=document.getElementById('rec-body');
    if(!body) return;

    var all=rec_data;
    var totalPend =all.filter(function(c){return c.status==='pendente'||c.status==='atrasado';}).reduce(function(a,c){return a+Number(c.valor_pendente||c.valor_total||0);},0);
    var totalRec  =all.filter(function(c){return c.status==='recebido';}).reduce(function(a,c){return a+Number(c.valor_total||0);},0);
    var totalAtras=all.filter(function(c){return c.status==='atrasado';}).reduce(function(a,c){return a+Number(c.valor_pendente||c.valor_total||0);},0);
    var totalParc =all.filter(function(c){return c.status==='parcial';}).reduce(function(a,c){return a+Number(c.valor_pendente||0);},0);

    // Filter options
    var tOpts='<option value="">Todos os tipos</option>'
        +rec_tipos.map(function(t){return '<option value="'+t.key+'"'+(rec_F.tipo===t.key?' selected':'')+'>'+t.label+'</option>';}).join('');
    var mOpts='<option value="">Todos os membros</option>'
        +rec_membros.map(function(m){return '<option value="'+m.id+'"'+(rec_F.membro===m.id?' selected':'')+'>'+m.nome+'</option>';}).join('');
    var sOpts='<option value="">Todos os estados</option>'
        +Object.keys(REC_SLBL).map(function(k){return '<option value="'+k+'"'+(rec_F.status===k?' selected':'')+'>'+REC_SLBL[k]+'</option>';}).join('');

    // Rows
    var lista=rec_filtered();
    var rows=!lista.length
        ?'<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-faint)">Nenhuma conta encontrada.</td></tr>'
        :lista.map(function(c){
            var origem=c.membro_nome||c.origem_descricao||'\u2014';
            return '<tr>'
                +'<td>'+rec_dt(c.data_emissao)
                +'<div style="font-size:10px;color:var(--text-faint)">Vence '+rec_dt(c.data_vencimento)+'</div>'
                +(c.data_recebimento?'<div style="font-size:10px;color:var(--text-faint)">Recebido '+rec_dt(c.data_recebimento)+'</div>':'')
                +'</td>'
                +'<td>'
                +'<div style="font-weight:600;font-size:12px">'+(c.descricao||'\u2014')+'</div>'
                +'<div style="font-size:10px;color:var(--text-faint)">'+origem+(c.referencia?' · Ref: '+c.referencia:'')+'</div>'
                +'</td>'
                +'<td><span class="badge badge-gray" style="font-size:9px">'+rec_tipoLabel(c.tipo)+'</span></td>'
                +'<td>'+rec_stBadge(c.status)+'</td>'
                +'<td style="text-align:right">'
                +'<div style="font-family:var(--font-title);font-weight:700">'+rec_eur(c.valor_total)+'</div>'
                +(c.valor_recebido>0?'<div style="font-size:10px;color:var(--text-faint)">Rec. '+rec_eur(c.valor_recebido)+'</div>':'')
                +((c.valor_pendente||0)>0&&(c.valor_recebido||0)>0?'<div style="font-size:10px;color:var(--text-faint)">Rest. '+rec_eur(c.valor_pendente)+'</div>':'')
                +'</td>'
                +'<td><div class="rec-act">'
                +(c.status!=='recebido'&&c.status!=='cancelado'?'<button class="rec-btn primary" onclick="rec_marcarRecebido(\''+c.id+'\','+Number(c.valor_total||0)+')">Recebido</button>':'')
                +'<button class="rec-btn" onclick="rec_abrirForm(\''+c.id+'\')">Editar</button>'
                +'<button class="rec-btn outline-p" onclick="rec_duplicar(\''+c.id+'\')">Duplic.</button>'
                +'</div></td></tr>';
        }).join('');

    body.innerHTML=''
        // KPIs
        +'<div class="rec-kpis">'
        +'<div class="rec-kpi"><div class="rec-kpi-val">'+rec_eur(totalPend)+'</div><div class="rec-kpi-label">A Receber</div><div class="rec-kpi-sub">'+all.filter(function(c){return c.status==='pendente'||c.status==='atrasado';}).length+' contas</div></div>'
        +'<div class="rec-kpi"><div class="rec-kpi-val">'+rec_eur(totalAtras)+'</div><div class="rec-kpi-label">Em Atraso</div><div class="rec-kpi-sub">'+all.filter(function(c){return c.status==='atrasado';}).length+' contas</div></div>'
        +'<div class="rec-kpi"><div class="rec-kpi-val">'+rec_eur(totalParc)+'</div><div class="rec-kpi-label">Parciais</div><div class="rec-kpi-sub">'+all.filter(function(c){return c.status==='parcial';}).length+' contas</div></div>'
        +'<div class="rec-kpi"><div class="rec-kpi-val">'+rec_eur(totalRec)+'</div><div class="rec-kpi-label">Recebido</div><div class="rec-kpi-sub">'+all.filter(function(c){return c.status==='recebido';}).length+' contas</div></div>'
        +'</div>'
        // Filters
        +'<div class="rec-filter-bar">'
        +'<span class="rec-filter-label">Filtros:</span>'
        +'<select onchange="rec_F.tipo=this.value;rec_render()">'+tOpts+'</select>'
        +'<select onchange="rec_F.membro=this.value;rec_render()">'+mOpts+'</select>'
        +'<select onchange="rec_F.status=this.value;rec_render()">'+sOpts+'</select>'
        +'<span class="rec-filter-label" style="margin-left:4px">Emissao:</span>'
        +'<input type="date" value="'+rec_F.emis_de+'"  onchange="rec_F.emis_de=this.value;rec_render()">'
        +'<input type="date" value="'+rec_F.emis_ate+'" onchange="rec_F.emis_ate=this.value;rec_render()">'
        +'<span class="rec-filter-label" style="margin-left:4px">Recebimento:</span>'
        +'<input type="date" value="'+rec_F.rec_de+'"  onchange="rec_F.rec_de=this.value;rec_render()">'
        +'<input type="date" value="'+rec_F.rec_ate+'" onchange="rec_F.rec_ate=this.value;rec_render()">'
        +'<button class="rec-filter-clear" onclick="rec_F={tipo:\'\',membro:\'\',status:\'\',rec_de:\'\',rec_ate:\'\',emis_de:\'\',emis_ate:\'\'};rec_render()">Limpar</button>'
        +'</div>'
        // Sec bar
        +'<div class="rec-sec-bar">'
        +'<span class="rec-sec-title">Contas a Receber</span>'
        +'<button class="btn-new" onclick="rec_abrirForm(null)">+ Novo</button>'
        +'</div>'
        // Table
        +'<div class="rec-table-wrap"><table class="rec-table">'
        +'<thead><tr><th>Datas</th><th>Descricao / Origem</th><th>Tipo</th><th>Estado</th><th style="text-align:right">Valores</th><th>Acoes</th></tr></thead>'
        +'<tbody>'+rows+'</tbody></table></div>';
}

// ── Form ──────────────────────────────────────────────────────
// rec_origemMode: 'membro' | 'outro'
var rec_origemMode = 'membro';

function rec_abrirForm(id, prefill){
    var c=id?rec_data.find(function(x){return x.id===id;}):prefill||null;
    var isDup=!id&&!!prefill;
    var fv=function(k,d){return c&&c[k]!=null?c[k]:(d!=null?d:'');};

    // Determine initial origem mode
    rec_origemMode = (c&&c.origem_descricao&&!c.membro_id) ? 'outro' : 'membro';

    var tipoOpts=rec_tipos.map(function(x){return '<option value="'+x.key+'"'+(fv('tipo','dizimo')===x.key?' selected':'')+'>'+x.label+'</option>';}).join('');
    var pagOpts =rec_pags.map(function(x){ return '<option value="'+x.key+'"'+(fv('forma_pagamento','transferencia')===x.key?' selected':'')+'>'+x.label+'</option>';}).join('');
    var membOpts='<option value="">-- Seleciona membro --</option>'
        +rec_membros.map(function(m){return '<option value="'+m.id+'"'+(fv('membro_id')===m.id?' selected':'')+'>'+m.nome+'</option>';}).join('');

    document.getElementById('drawer-title').textContent=id?'Editar Conta a Receber':'Nova Conta a Receber';
    document.getElementById('drawer-body').innerHTML='<div class="form-grid">'
        +'<div class="msg-form" id="form-msg"></div>'
        +'<div class="form-section-title">Identificacao</div>'

        +'<div class="form-group form-full"><label class="form-label">Descricao *</label>'
        +'<input class="form-input" id="cr_descricao" value="'+fv('descricao')+'" placeholder="Ex: Dizimo Joao \u2014 Marco 2026"></div>'

        // Tipo + inline config
        +'<div class="form-group">'
        +'<label class="form-label">Tipo <button class="rec-gerir-btn" onclick="rec_toggleCfg(\'tipos\')">Gerir</button></label>'
        +'<select class="form-select" id="cr_tipo">'+tipoOpts+'</select>'
        +'<div class="rec-cfg-panel" id="rec-cfg-tipos">'
        +'<h4>Gerir Tipos</h4>'
        +'<div id="rec-cfg-tipos-rows"></div>'
        +'<div class="rec-cfg-bottom">'
        +'<button class="rec-cfg-add" onclick="rec_cfgAdd(\'tipos\')">+ Adicionar</button>'
        +'<button class="rec-cfg-close" onclick="rec_toggleCfg(\'tipos\')">Fechar</button>'
        +'</div></div></div>'

        +'<div class="form-group"><label class="form-label">Referencia</label>'
        +'<input class="form-input" id="cr_referencia" value="'+(isDup?'':fv('referencia'))+'" placeholder="Ex: PIX, Ref MB..."></div>'

        // Origem: membro ou texto livre
        +'<div class="form-section-title form-full">Origem do Recebimento</div>'
        +'<div class="form-full">'
        +'<div class="rec-origem-tabs">'
        +'<div class="rec-origem-tab'+(rec_origemMode==='membro'?' active':'')+'" onclick="rec_setOrigem(\'membro\')">Membro</div>'
        +'<div class="rec-origem-tab'+(rec_origemMode==='outro'?' active':'')+'" onclick="rec_setOrigem(\'outro\')">Outra Origem</div>'
        +'</div>'
        +'<div id="rec-origem-membro" style="display:'+(rec_origemMode==='membro'?'block':'none')+'">'
        // NIF lookup
        +'<div class="rec-nif-row">'
        +'<input class="form-input" id="cr_nif" placeholder="Pesquisar por NIF do membro">'
        +'<button class="rec-btn outline-p" style="padding:6px 12px;white-space:nowrap" onclick="rec_lookupNIF()">Buscar</button>'
        +'</div>'
        +'<select class="form-select" id="cr_membro_id">'+membOpts+'</select>'
        +'</div>'
        +'<div id="rec-origem-outro" style="display:'+(rec_origemMode==='outro'?'block':'none')+'">'
        +'<input class="form-input" id="cr_origem_descricao" value="'+fv('origem_descricao')+'" placeholder="Ex: Caixa do evento, Loja, Keola, Empresa...">'
        +'</div>'
        +'</div>'

        +'<div class="form-section-title">Valores e Datas</div>'

        +'<div class="form-group"><label class="form-label">Valor Total (EUR) *</label>'
        +'<input class="form-input" id="cr_valor_total" type="number" step="0.01" value="'+fv('valor_total',0)+'"></div>'

        // Forma pagamento + inline config
        +'<div class="form-group">'
        +'<label class="form-label">Forma de Pagamento <button class="rec-gerir-btn" onclick="rec_toggleCfg(\'pags\')">Gerir</button></label>'
        +'<select class="form-select" id="cr_forma_pagamento">'+pagOpts+'</select>'
        +'<div class="rec-cfg-panel" id="rec-cfg-pags">'
        +'<h4>Gerir Formas de Pagamento</h4>'
        +'<div id="rec-cfg-pags-rows"></div>'
        +'<div class="rec-cfg-bottom">'
        +'<button class="rec-cfg-add" onclick="rec_cfgAdd(\'pags\')">+ Adicionar</button>'
        +'<button class="rec-cfg-close" onclick="rec_toggleCfg(\'pags\')">Fechar</button>'
        +'</div></div></div>'

        +'<div class="form-group"><label class="form-label">Data Emissao</label>'
        +'<input class="form-input" id="cr_data_emissao" type="date" value="'+(isDup?rec_hoje():fv('data_emissao',rec_hoje()))+'"></div>'

        +'<div class="form-group"><label class="form-label">Data Vencimento</label>'
        +'<input class="form-input" id="cr_data_vencimento" type="date" value="'+(isDup?rec_hoje():fv('data_vencimento',rec_hoje()))+'"></div>'

        +'<div class="form-group form-full"><label class="form-label">Observacoes</label>'
        +'<textarea class="form-textarea" id="cr_observacoes">'+fv('observacoes')+'</textarea></div>'

        +'<div class="form-actions">'
        +'<button class="btn-cancel-form" onclick="closeDrawer()">Cancelar</button>'
        +'<button class="btn-save" id="btn-rec-save" onclick="rec_salvar(\''+( id||'')+'\')">Guardar</button>'
        +'</div></div>';

    document.getElementById('overlay').classList.remove('hidden');
    document.body.style.overflow='hidden';
}

// ── Origem toggle ─────────────────────────────────────────────
function rec_setOrigem(modo){
    rec_origemMode=modo;
    var tabs=document.querySelectorAll('.rec-origem-tab');
    tabs.forEach(function(t,i){ t.classList.toggle('active', (i===0&&modo==='membro')||(i===1&&modo==='outro')); });
    var elM=document.getElementById('rec-origem-membro');
    var elO=document.getElementById('rec-origem-outro');
    if(elM) elM.style.display=modo==='membro'?'block':'none';
    if(elO) elO.style.display=modo==='outro'?'block':'none';
}

// ── NIF lookup ────────────────────────────────────────────────
function rec_lookupNIF(){
    var raw=(document.getElementById('cr_nif').value||'').trim();
    var norm=rec_nifNorm(raw);
    if(!norm){showFormMsg('Insere um NIF.','error');return;}
    var found=rec_membros.find(function(m){return rec_nifNorm(m.nif)===norm;});
    if(!found){showFormMsg('Membro com NIF '+raw+' nao encontrado.','error');return;}
    var sel=document.getElementById('cr_membro_id');
    if(sel) sel.value=found.id;
    showFormMsg('Membro selecionado: '+found.nome,'success');
}

// ── Inline config ─────────────────────────────────────────────
function rec_toggleCfg(key){
    var panel=document.getElementById('rec-cfg-'+key);
    if(!panel) return;
    var wasOpen=panel.classList.contains('open');
    ['tipos','pags'].forEach(function(k){
        var p=document.getElementById('rec-cfg-'+k);
        if(p) p.classList.remove('open');
    });
    if(!wasOpen){ panel.classList.add('open'); rec_renderCfgRows(key); }
}
function rec_renderCfgRows(key){
    var list=key==='tipos'?rec_tipos:rec_pags;
    var el=document.getElementById('rec-cfg-'+key+'-rows');
    if(!el) return;
    el.innerHTML=list.map(function(it,i){
        return '<div class="rec-cfg-row">'
            +'<input type="text" value="'+it.label.replace(/"/g,'&quot;')+'" oninput="rec_cfgUpdate(\''+key+'\','+i+',this.value)">'
            +'<button class="rec-cfg-del" onclick="rec_cfgRemove(\''+key+'\','+i+')">x</button>'
            +'</div>';
    }).join('');
}
function rec_cfgUpdate(key,i,val){
    var list=key==='tipos'?rec_tipos:rec_pags;
    if(list[i]){list[i].label=val;list[i].key=val.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');}
    rec_cfgPersist(); rec_refreshSel(key);
}
function rec_cfgAdd(key){
    var list=key==='tipos'?rec_tipos:rec_pags;
    list.push({key:'item_'+Date.now(),label:'Novo item'});
    rec_renderCfgRows(key); rec_cfgPersist(); rec_refreshSel(key);
}
function rec_cfgRemove(key,i){
    var list=key==='tipos'?rec_tipos:rec_pags;
    if(!confirm('Remover "'+list[i].label+'"?')) return;
    list.splice(i,1); rec_renderCfgRows(key); rec_cfgPersist(); rec_refreshSel(key);
}
function rec_refreshSel(key){
    if(key==='tipos'){
        var ts=document.getElementById('cr_tipo');
        if(ts){var tv=ts.value;ts.innerHTML=rec_tipos.map(function(x){return '<option value="'+x.key+'"'+(tv===x.key?' selected':'')+'>'+x.label+'</option>';}).join('');}
    } else {
        var ps=document.getElementById('cr_forma_pagamento');
        if(ps){var pv=ps.value;ps.innerHTML=rec_pags.map(function(x){return '<option value="'+x.key+'"'+(pv===x.key?' selected':'')+'>'+x.label+'</option>';}).join('');}
    }
}

// ── Salvar ────────────────────────────────────────────────────
async function rec_salvar(id){
    var gv=function(k){var el=document.getElementById('cr_'+k);return el?el.value&&el.value.trim()||null:null;};
    var desc=gv('descricao'), val=parseFloat(gv('valor_total')||0);
    if(!desc){showFormMsg('Descricao obrigatoria.','error');return;}
    if(!val) {showFormMsg('Valor obrigatorio.','error');return;}

    var memId=null, memNome=null, origDesc=null;
    if(rec_origemMode==='membro'){
        memId=gv('membro_id');
        memNome=memId?(rec_membros.find(function(m){return m.id===memId;})||{}).nome||null:null;
    } else {
        origDesc=gv('origem_descricao');
    }

    var body={
        descricao:desc, tipo:gv('tipo'), valor_total:val,
        membro_id:memId||null, membro_nome:memNome||null,
        origem_descricao:origDesc||null,
        referencia:gv('referencia'),
        data_emissao:gv('data_emissao'), data_vencimento:gv('data_vencimento'),
        forma_pagamento:gv('forma_pagamento'), observacoes:gv('observacoes'),
        status:'pendente', updated_at:new Date().toISOString()
    };
    var btn=document.getElementById('btn-rec-save');
    if(btn){btn.disabled=true;btn.textContent='A guardar...';}
    try {
        if(!id) await sb('contas_receber',{method:'POST',body:JSON.stringify(body)});
        else    await sb('contas_receber?id=eq.'+id,{method:'PATCH',body:JSON.stringify(body)});
        showFormMsg('Guardado!','success');
        await rec_loadAll();
        setTimeout(function(){closeDrawer();rec_render();},700);
    } catch(e){
        showFormMsg('Erro: '+(e&&e.message||JSON.stringify(e)),'error');
        if(btn){btn.disabled=false;btn.textContent='Guardar';}
    }
}

async function rec_marcarRecebido(id, valorTotal){
    await sb('contas_receber?id=eq.'+id,{method:'PATCH',body:JSON.stringify({
        status:'recebido', valor_recebido:valorTotal,
        data_recebimento:rec_hoje(), updated_at:new Date().toISOString()
    })});
    await rec_loadAll(); rec_render();
}

function rec_duplicar(id){
    var c=rec_data.find(function(x){return x.id===id;});
    if(!c) return;
    rec_abrirForm(null,Object.assign({},c,{status:'pendente',data_recebimento:null,valor_recebido:0,referencia:null}));
}

rec_init();
</script>
