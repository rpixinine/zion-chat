<style>
#kl-root{display:flex;flex-direction:column;height:100%;overflow:hidden;}

.kl-toolbar{
  display:flex;align-items:center;gap:6px;padding:8px 14px;
  background:var(--bg-card);border-bottom:1px solid var(--border);
  flex-shrink:0;flex-wrap:wrap;
}
.kl-search{
  flex:1;min-width:140px;background:var(--bg-input);border:1px solid var(--border);
  border-radius:20px;padding:6px 14px;font-size:12px;font-family:var(--font-body);
  color:var(--text-main);outline:none;
}
.kl-search:focus{border-color:var(--primary);}
.kl-fsel{
  background:var(--bg-input);border:1px solid var(--border);border-radius:20px;
  padding:6px 10px;font-size:11px;font-family:var(--font-title);color:var(--text-muted);cursor:pointer;outline:none;
}
.kl-fbtn{
  padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg-input);
  font-size:11px;font-family:var(--font-title);color:var(--text-muted);cursor:pointer;
}
.kl-fbtn:hover,.kl-fbtn.active{border-color:var(--primary);color:var(--primary-dark);background:var(--primary-faint);}
.kl-btn-new{
  padding:7px 16px;border-radius:20px;border:none;background:var(--primary);
  color:#fff;font-size:11px;font-family:var(--font-title);letter-spacing:1px;cursor:pointer;flex-shrink:0;
}
.kl-btn-new:hover{background:var(--primary-dark);}

.kl-stats{display:flex;gap:6px;padding:6px 14px;flex-shrink:0;overflow-x:auto;border-bottom:1px solid var(--border);}
.kl-stat{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:4px 12px;flex-shrink:0;display:flex;align-items:center;gap:7px;}
.kl-stat-n{font-family:var(--font-title);font-size:16px;font-weight:700;}
.kl-stat-l{font-size:9px;color:var(--text-faint);text-transform:uppercase;letter-spacing:1px;}

.kl-scroll{flex:1;overflow-y:auto;padding-bottom:32px;}

/* ── TABLE ──────────────────────────────────────────────────────────
   Colunas: img(36) | nome+sub(1fr) | tipo(70) | cat(72) | especial(52) | preco(72) | stock(80) | pdv(38) | ativo(40) | vse(40) | menu(32)
*/
.kl-grid{
  display:grid;
  grid-template-columns: 36px 1fr 70px 72px 52px 72px 80px 38px 40px 40px 32px;
  align-items:center;
  gap:0;
}
.kl-thead{
  padding:4px 14px;
  background:var(--bg-input);
  border-bottom:2px solid var(--border);
  position:sticky;top:0;z-index:10;
}
.kl-th{
  font-family:var(--font-title);font-size:8px;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--text-faint);padding:0 5px;display:flex;align-items:center;white-space:nowrap;
}
.kl-th.c{justify-content:center;}
.kl-th.r{justify-content:flex-end;}

.kl-row{
  padding:0 14px;border-bottom:1px solid var(--border);
  min-height:46px;cursor:default;
  transition:background .1s;
  animation:klIn .15s ease both;
}
.kl-row:hover{background:var(--primary-faint);}
.kl-row.inativo{opacity:.4;}
@keyframes klIn{from{opacity:0;transform:translateX(-3px)}to{opacity:1;transform:translateX(0)}}

.kl-td{padding:0 5px;display:flex;flex-direction:column;justify-content:center;min-width:0;overflow:hidden;}
.kl-td.c{align-items:center;}
.kl-td.r{align-items:flex-end;}

.kl-img{width:30px;height:30px;border-radius:6px;object-fit:cover;display:block;flex-shrink:0;}
.kl-img-ph{width:30px;height:30px;border-radius:6px;overflow:hidden;background:var(--primary-faint);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.kl-img-ph img{width:100%;height:100%;object-fit:cover;opacity:.45;}

.kl-nome{font-size:12px;font-weight:600;color:var(--text-main);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.25;}
.kl-sub{font-size:10px;color:var(--text-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}

.kl-pill{
  font-family:var(--font-title);font-size:9px;letter-spacing:.5px;
  padding:2px 7px;border-radius:10px;white-space:nowrap;text-align:center;
  border:1px solid var(--border);background:var(--bg-input);color:var(--text-muted);
}
.kl-pill.kit {background:rgba(230,81,0,.08);color:#c75000;border-color:rgba(230,81,0,.25);}
.kl-pill.venda{background:var(--primary-faint);color:var(--primary-dark);border-color:var(--border);}

.kl-preco{font-family:var(--font-title);font-size:12px;font-weight:700;color:var(--primary-dark);}
.kl-custo{font-size:9px;color:var(--text-faint);margin-top:1px;}

.kl-stk{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-main);}
.kl-sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.kl-sbar{width:34px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0;margin-top:2px;}
.kl-sbf{height:100%;border-radius:2px;}

.kl-yes{font-size:12px;color:var(--green);}
.kl-noo{font-size:12px;color:var(--border);}

/* ── ACTION MENU ── */
.kl-act{position:relative;display:flex;align-items:center;justify-content:center;}
.kl-act-btn{
  width:26px;height:26px;display:flex;align-items:center;justify-content:center;
  border-radius:6px;border:1px solid var(--border);background:var(--bg-card);
  color:var(--text-muted);cursor:pointer;font-size:16px;line-height:1;
  transition:all .12s;
}
.kl-act-btn:hover{border-color:var(--primary);color:var(--primary-dark);background:var(--primary-faint);}
.kl-drop{
  position:fixed;min-width:130px;
  background:var(--bg-card);border:1px solid var(--border);border-radius:8px;
  box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:9999;overflow:hidden;
}
.kl-drop-item{
  padding:8px 12px;font-size:11px;font-family:var(--font-title);letter-spacing:.4px;
  color:var(--text-main);cursor:pointer;transition:background .1s;
  display:flex;align-items:center;gap:8px;white-space:nowrap;
}
.kl-drop-item:hover{background:var(--primary-faint);}
.kl-drop-item.red{color:var(--red);}
.kl-drop-item.red:hover{background:rgba(192,57,43,.07);}
.kl-drop-item.orange{color:#c75000;}
.kl-drop-item.orange:hover{background:rgba(230,81,0,.08);}

.kl-empty{padding:40px;text-align:center;font-size:12px;color:var(--text-faint);}

/* kit form */
.kl-kit-panel{background:var(--bg-input);border:1px solid var(--primary);border-radius:10px;padding:12px;margin:4px 0 8px;}
.kl-kit-title{font-family:var(--font-title);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--primary-dark);margin-bottom:8px;}
.kl-kit-item{display:flex;align-items:center;gap:8px;background:var(--bg-card);border-radius:6px;padding:6px 10px;margin-bottom:3px;font-size:12px;}
.kl-kit-item span{flex:1;}
.kl-kit-val{color:var(--primary-dark);font-weight:700;flex-shrink:0;}
.kl-kit-rm{color:var(--red);background:none;border:none;cursor:pointer;padding:2px 6px;flex-shrink:0;}
</style>

<div id="kl-root">
  <div class="kl-toolbar">
    <input class="kl-search" id="kl-search" placeholder="Pesquisar nome ou descricao..." oninput="kl_onSearch()">
    <select class="kl-fsel" id="kl-f-tipo" onchange="kl_applyFilters()">
      <option value="">Todos os tipos</option>
      <option value="venda">Itens de Venda</option>
      <option value="kit">Kits / Pratos</option>
      <option value="componente">Componentes</option>
    </select>
    <select class="kl-fsel" id="kl-f-cat" onchange="kl_applyFilters()">
      <option value="">Todas as categorias</option>
      <option value="almoco">Refeicoes</option>
      <option value="bebidas">Bebidas Frescas</option>
      <option value="sumos">Bebidas Quentes</option>
      <option value="snacks">Salgados</option>
      <option value="sobremesas">Doces</option>
      <option value="outro">Outros</option>
    </select>
    <button class="kl-fbtn" id="kl-f-inativo-btn" onclick="kl_toggleInativo()">Inativos</button>
    <button class="kl-btn-new" onclick="kl_abrirForm(null)">+ Novo Item</button>
  </div>
  <div class="kl-stats" id="kl-stats"></div>
  <div class="kl-scroll" id="kl-scroll">
    <div class="loading"><div class="spin"></div>A carregar Keola...</div>
  </div>
</div>

<!-- dropdown global -->
<div id="kl-drop-global" class="kl-drop" style="display:none"></div>

<script>
(function(){
'use strict';
var kl_data=[],kl_inativo=false,kl_kitCache={},kl_kitItensTemp=[],kl_stimer=null;
var kl_openMenu=null; // {drop, id}

var KL_CAT ={almoco:'Refeicoes',bebidas:'Beb. Frescas',sumos:'Beb. Quentes',snacks:'Salgados',sobremesas:'Doces',outro:'Outros'};
var KL_TIPO={venda:'Venda',kit:'Kit',componente:'Componente'};
var KL_FOOD={carne:'Carne',frango:'Frango',peixe:'Peixe',sopa:'Sopa',massa:'Massa',
  petisco:'Petisco',prato_do_dia:'Prato do Dia',vegetariano:'Vegetariano',
  vegan:'Vegan',sem_gluten:'Sem Gluten',sobremesa:'Sobremesa',bebida:'Bebida',outro:'Outro'};

/* INIT */
async function kl_init(){
  kl_data=await sb('keola_menu?select=*&order=categoria,nome')||[];
  await kl_loadKit();
  kl_renderStats();
  kl_renderList();
}
window.kl_init=kl_init;

async function kl_loadKit(){
  try{
    var rows=await sb('keola_kit_componentes?select=*,keola_menu!keola_kit_componentes_componente_id_fkey(id,nome,stock,unidade,preco_custo)')||[];
    kl_kitCache={};
    rows.forEach(function(x){
      if(!kl_kitCache[x.kit_id])kl_kitCache[x.kit_id]=[];
      kl_kitCache[x.kit_id].push({
        componente_id:x.componente_id,quantidade:x.quantidade,
        unidade:x.unidade||(x.keola_menu&&x.keola_menu.unidade)||'un',
        stock:(x.keola_menu&&x.keola_menu.stock)||0,
        nome:(x.keola_menu&&x.keola_menu.nome)||'—',
      });
    });
  }catch(e){console.error(e);}
}

/* FILTERS */
function kl_onSearch(){clearTimeout(kl_stimer);kl_stimer=setTimeout(kl_applyFilters,200);}
window.kl_onSearch=kl_onSearch;

function kl_toggleInativo(){
  kl_inativo=!kl_inativo;
  var b=document.getElementById('kl-f-inativo-btn');
  if(b)b.classList.toggle('active',kl_inativo);
  kl_applyFilters();
}
window.kl_toggleInativo=kl_toggleInativo;

function kl_applyFilters(){kl_renderStats();kl_renderList();}
window.kl_applyFilters=kl_applyFilters;

function kl_getFiltered(){
  var q=(document.getElementById('kl-search')||{value:''}).value.toLowerCase();
  var ft=(document.getElementById('kl-f-tipo')||{value:''}).value;
  var fc=(document.getElementById('kl-f-cat')||{value:''}).value;
  return kl_data.filter(function(r){
    if(!kl_inativo&&r.disponivel===false)return false;
    if(kl_inativo&&r.disponivel!==false)return false;
    if(ft&&(r.tipo_item||'venda')!==ft)return false;
    if(fc&&r.categoria!==fc)return false;
    if(q&&!(r.nome||'').toLowerCase().includes(q)&&!(r.descricao||'').toLowerCase().includes(q))return false;
    return true;
  });
}

/* STATS */
function kl_renderStats(){
  var el=document.getElementById('kl-stats');if(!el)return;
  var a=kl_data.filter(function(r){return r.disponivel!==false;});
  var k=a.filter(function(r){return r.tipo_item==='kit';}).length;
  var v=a.filter(function(r){return r.tipo_item==='venda'||!r.tipo_item;}).length;
  var c=a.filter(function(r){return r.tipo_item==='componente';}).length;
  var b=a.filter(function(r){return r.controlar_estoque&&r.stock!=null&&r.stock_minimo>0&&r.stock<=r.stock_minimo;}).length;
  function s(n,l,cor){return'<div class="kl-stat"><span class="kl-stat-n" style="color:'+cor+'">'+n+'</span><span class="kl-stat-l">'+l+'</span></div>';}
  el.innerHTML=s(a.length,'Total','var(--primary-dark)')+s(k,'Kits','#c75000')+s(v,'Venda','var(--green)')+s(c,'Componentes','var(--text-muted)')+
    (b?'<div class="kl-stat" style="border-color:var(--red)"><span class="kl-stat-n" style="color:var(--red)">'+b+'</span><span class="kl-stat-l">Stock Baixo</span></div>':'');
}

/* RENDER LIST */
function kl_renderList(){
  kl_closeDrop();
  var lista=kl_getFiltered();
  var s=document.getElementById('kl-scroll');if(!s)return;
  if(!lista.length){s.innerHTML='<div class="kl-empty">Nenhum item encontrado.</div>';return;}

  var header='<div class="kl-grid kl-thead">'+
    '<div class="kl-th"></div>'+
    '<div class="kl-th">Nome</div>'+
    '<div class="kl-th c">Tipo</div>'+
    '<div class="kl-th c">Categoria</div>'+
    '<div class="kl-th c">Especial</div>'+
    '<div class="kl-th r">Preco</div>'+
    '<div class="kl-th">Stock</div>'+
    '<div class="kl-th c">PDV</div>'+
    '<div class="kl-th c">Ativo</div>'+
    '<div class="kl-th c" title="Vender sem estoque">V.s.E</div>'+
    '<div class="kl-th"></div>'+
  '</div>';

  var rows=lista.map(function(r,i){return kl_buildRow(r,i);}).join('');
  s.innerHTML=header+rows;
}

function kl_buildRow(r,idx){
  var ativo=r.disponivel!==false;
  var tipo=r.tipo_item||'venda';
  var id=r.id;

  /* imagem */
  var img=r.imagem_url
    ?'<img class="kl-img" src="'+r.imagem_url+'" alt="" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'"><div class="kl-img-ph" style="display:none"><img src="assets/item_zion.jpg" onerror="this.src=\'assets/item_zion.png\'"></div>'
    :'<div class="kl-img-ph"><img src="assets/item_zion.jpg" onerror="this.src=\'assets/item_zion.png\'"></div>';

  /* tipo pill */
  var tipoPill='<span class="kl-pill'+(tipo==='kit'?' kit':tipo==='componente'?'':' venda')+'">'+KL_TIPO[tipo]+'</span>';

  /* cat pill */
  var catPill='<span class="kl-pill" style="font-size:8px">'+(KL_CAT[r.categoria||'outro']||'—')+'</span>';

  /* preco */
  var preco='<span style="color:var(--text-faint);font-size:11px">—</span>';
  if(tipo!=='componente'&&r.preco)preco='<div class="kl-preco">€'+Number(r.preco).toFixed(2)+'</div>'+(r.preco_custo?'<div class="kl-custo">c:€'+Number(r.preco_custo).toFixed(2)+'</div>':'');

  /* stock */
  var stk='<span style="color:var(--text-faint);font-size:10px">—</span>';
  if(tipo==='kit'){
    var mk=kl_calcMax(id),ck=mk===0?'#c62828':mk<5?'#e65100':'#2e7d32';
    stk='<div class="kl-stk"><div class="kl-sdot" style="background:'+ck+'"></div><span>'+mk+' poss.</span></div>';
  }else if(r.stock!=null){
    var mn=r.stock_minimo||0,cor=r.stock<=mn&&mn>0?'#c62828':r.stock<=mn*2&&mn>0?'#e65100':'#2e7d32';
    var mx=Math.max(mn*3||30,r.stock,1),pct=Math.min(100,Math.round(r.stock/mx*100));
    stk='<div class="kl-stk"><div class="kl-sdot" style="background:'+cor+'"></div><span>'+r.stock+' '+(r.unidade||'un')+'</span></div>'+
        '<div class="kl-sbar"><div class="kl-sbf" style="width:'+pct+'%;background:'+cor+'"></div></div>';
  }

  function bool(v){return v?'<span class="kl-yes">&#10003;</span>':'<span class="kl-noo">&#8212;</span>';}
  var pdv=tipo==='componente'?'<span class="kl-noo">&#8212;</span>':bool(r.mostrar_pdv!==false);

  return '<div class="kl-grid kl-row'+(ativo?'':' inativo')+'" style="animation-delay:'+(Math.min(idx,20)*.012)+'s">'+
    '<div class="kl-td c">'+img+'</div>'+
    '<div class="kl-td"><div class="kl-nome">'+(r.nome||'—')+'</div><div class="kl-sub">'+(KL_FOOD[r.tipo_comida]||'')+'</div></div>'+
    '<div class="kl-td c">'+tipoPill+'</div>'+
    '<div class="kl-td c">'+catPill+'</div>'+
    '<div class="kl-td c">'+bool(r.especial_hoje)+'</div>'+
    '<div class="kl-td r">'+preco+'</div>'+
    '<div class="kl-td">'+stk+'</div>'+
    '<div class="kl-td c">'+pdv+'</div>'+
    '<div class="kl-td c">'+bool(ativo)+'</div>'+
    '<div class="kl-td c">'+bool(r.venda_sem_estoque)+'</div>'+
    '<div class="kl-td c kl-act">'+
      '<button class="kl-act-btn" data-id="'+id+'" data-tipo="'+tipo+'" data-nome="'+encodeURIComponent(r.nome||'')+'" data-ativo="'+ativo+'" onclick="kl_openDrop(this,event)">&#8942;</button>'+
    '</div>'+
  '</div>';
}

/* ── DROPDOWN MENU ─────────────────────────────────────────────── */
function kl_openDrop(btn,e){
  e.stopPropagation();
  var drop=document.getElementById('kl-drop-global');
  if(!drop)return;
  var id=btn.dataset.id,tipo=btn.dataset.tipo,ativo=btn.dataset.ativo==='true';
  var nm=decodeURIComponent(btn.dataset.nome||'').replace(/'/g,"\\'");
  var html=
    '<div class="kl-drop-item" onclick="kl_closeDrop();kl_abrirForm(\''+id+'\')">Editar</div>'+
    '<div class="kl-drop-item" onclick="kl_closeDrop();kl_duplicar(\''+id+'\')">Duplicar</div>'+
    (tipo==='kit'?'<div class="kl-drop-item orange" onclick="kl_closeDrop();kl_abrirMontar(\''+id+'\',\''+nm+'\')">Montar</div>':'')+
    '<div class="kl-drop-item red" onclick="kl_closeDrop();kl_toggleAtivo(\''+id+'\','+ativo+')">'+(ativo?'Inativar':'Ativar')+'</div>';
  drop.innerHTML=html;
  var rect=btn.getBoundingClientRect();
  drop.style.display='block';
  // position
  var tw=drop.offsetWidth||130,th=drop.offsetHeight||110;
  var left=rect.right-tw;
  var top=rect.bottom+4;
  if(top+th>window.innerHeight)top=rect.top-th-4;
  if(left<4)left=4;
  drop.style.left=left+'px';
  drop.style.top=top+'px';
  kl_openMenu=btn;
}
window.kl_openDrop=kl_openDrop;

function kl_closeDrop(){
  var drop=document.getElementById('kl-drop-global');
  if(drop)drop.style.display='none';
  kl_openMenu=null;
}
window.kl_closeDrop=kl_closeDrop;

document.addEventListener('click',function(e){
  var drop=document.getElementById('kl-drop-global');
  if(drop&&drop.style.display!=='none'&&!drop.contains(e.target))kl_closeDrop();
});

/* TOGGLE ATIVO */
async function kl_toggleAtivo(id,ativo){
  await sb('keola_menu?id=eq.'+id,{method:'PATCH',body:JSON.stringify({disponivel:!ativo})});
  kl_data=await sb('keola_menu?select=*&order=categoria,nome')||[];
  kl_renderStats();kl_renderList();
}
window.kl_toggleAtivo=kl_toggleAtivo;

/* DUPLICAR */
async function kl_duplicar(id){
  var orig=kl_data.find(function(r){return r.id===id;});if(!orig)return;
  var body=Object.assign({},orig);delete body.id;delete body.created_at;delete body.updated_at;
  body.nome=(orig.nome||'')+' (copia)';body.disponivel=false;
  try{
    var res=await sb('keola_menu',{method:'POST',body:JSON.stringify(body)});
    var nid=res&&res[0]&&res[0].id;
    if(orig.tipo_item==='kit'&&nid&&kl_kitCache[id]){
      for(var c of kl_kitCache[id])await sb('keola_kit_componentes',{method:'POST',body:JSON.stringify({kit_id:nid,componente_id:c.componente_id,quantidade:c.quantidade,unidade:c.unidade})});
    }
    kl_data=await sb('keola_menu?select=*&order=categoria,nome')||[];
    await kl_loadKit();kl_renderStats();kl_renderList();
    setTimeout(function(){kl_abrirForm(nid);},200);
  }catch(e){alert('Erro ao duplicar: '+(e&&e.message?e.message:JSON.stringify(e)));}
}
window.kl_duplicar=kl_duplicar;

/* CALC MAX */
function kl_calcMax(kitId){
  var c=kl_kitCache[kitId];if(!c||!c.length)return 0;
  var m=Infinity;c.forEach(function(x){if(x.quantidade>0)m=Math.min(m,Math.floor(x.stock/x.quantidade));});
  return m===Infinity?0:m;
}

/* FORM */
async function kl_abrirForm(id){
  var r=id?kl_data.find(function(x){return x.id===id;}):null;
  kl_kitItensTemp=[];
  if(id&&r&&r.tipo_item==='kit')(kl_kitCache[id]||[]).forEach(function(c){
    kl_kitItensTemp.push({componente_id:c.componente_id,nome:c.nome,quantidade:c.quantidade,unidade:c.unidade});
  });
  document.getElementById('drawer-title').textContent=r?('Editar — '+r.nome):'Novo Item Keola';
  document.getElementById('drawer-body').innerHTML=kl_buildForm(r);
  document.getElementById('overlay').classList.remove('hidden');
  document.body.style.overflow='hidden';
  setTimeout(function(){
    var st=document.getElementById('kf_tipo_item');
    if(st){kl_ajustaTipo(st.value);kl_renderKitPanel(st.value);
      st.addEventListener('change',function(){kl_ajustaTipo(this.value);kl_renderKitPanel(this.value);});}
  },30);
}
window.kl_abrirForm=kl_abrirForm;

function kl_buildForm(r){
  function fv(k,d){var v=r&&r[k]!==undefined?r[k]:(d!==undefined?d:'');return(v===null||v===undefined)?'':(v===true?true:v===false?false:v);}
  function opt(arr,val){return arr.map(function(o){return'<option value="'+o[0]+'"'+(String(val)===String(o[0])?' selected':'')+'>'+o[1]+'</option>';}).join('');}
  var dTipo=r?(r.tipo_item||'venda'):'venda';
  var catO=opt([['almoco','Refeicoes'],['bebidas','Bebidas Frescas'],['sumos','Bebidas Quentes'],['snacks','Salgados'],['sobremesas','Doces'],['outro','Outros']],fv('categoria'));
  var foodO=opt([['','Nenhum'],['carne','Carne'],['frango','Frango'],['peixe','Peixe'],['sopa','Sopa'],['massa','Massa'],['petisco','Petisco'],['prato_do_dia','Prato do Dia'],['vegetariano','Vegetariano'],['vegan','Vegan'],['sem_gluten','Sem Gluten'],['sobremesa','Sobremesa'],['bebida','Bebida'],['outro','Outro']],fv('tipo_comida'));
  var tipoO=opt([['venda','Item de Venda'],['kit','Kit / Prato (componentes)'],['componente','Componente (ingrediente)']],dTipo);
  var unitO=opt([['un','un'],['g','g'],['kg','kg'],['ml','ml'],['l','l']],r?(r.unidade||'un'):'un');
  var imgH=typeof buildImageUpload==='function'
    ?buildImageUpload('imagem_url','Foto do Produto',fv('imagem_url',''),'imagens')
    :'<div class="form-group form-full"><label class="form-label">URL da Imagem</label><input class="form-input" id="f_imagem_url" type="text" value="'+fv('imagem_url','')+'" placeholder="https://..."></div>';
  var dPdv=r?r.mostrar_pdv!==false:true;
  var dDis=r?r.disponivel!==false:true;
  var isNew=!r;
  return '<div class="form-grid">'+
  '<div class="msg-form" id="form-msg"></div>'+
  '<div class="form-section-title">Identificacao</div>'+
  '<div class="form-group form-full"><label class="form-label">Nome *</label><input class="form-input" id="kf_nome" type="text" value="'+fv('nome')+'" placeholder="Ex: Bitoque, Cafe Duplo..."></div>'+
  '<div class="form-group"><label class="form-label">Tipo de Item</label><select class="form-select" id="kf_tipo_item">'+tipoO+'</select></div>'+
  '<div class="form-group"><label class="form-label">Categoria</label><select class="form-select" id="kf_categoria">'+catO+'</select></div>'+
  '<div class="form-group"><label class="form-label">Tipo de Comida</label><select class="form-select" id="kf_tipo_comida">'+foodO+'</select></div>'+
  '<div class="form-group form-full"><label class="form-label">Descricao</label><textarea class="form-textarea" id="kf_descricao" placeholder="Breve descricao...">'+fv('descricao')+'</textarea></div>'+
  '<div class="form-group form-full"><label class="form-label">Alergenos</label><input class="form-input" id="kf_alergenos" type="text" value="'+fv('alergenos')+'" placeholder="Gluten, Lactose..."></div>'+
  '<div class="form-section-title">Precos</div>'+
  '<div class="form-group" id="kf-g-preco"><label class="form-label">Preco de Venda (€)</label><input class="form-input" id="kf_preco" type="number" step="0.01" value="'+fv('preco')+'"></div>'+
  '<div class="form-group"><label class="form-label">Custo Unitario (€)</label><input class="form-input" id="kf_preco_custo" type="number" step="0.0001" value="'+fv('preco_custo')+'"></div>'+
  '<div class="form-group"><label class="form-label">IVA (%)</label><input class="form-input" id="kf_iva_pct" type="number" step="1" value="'+fv('iva_pct',13)+'"></div>'+
  '<div class="form-section-title">Stock</div>'+
  '<div class="form-group"><label class="form-label">Unidade</label><select class="form-select" id="kf_unidade">'+unitO+'</select></div>'+
  '<div class="form-group"><label class="form-label">Stock Actual</label><input class="form-input" id="kf_stock" type="number" step="0.001" value="'+fv('stock',0)+'"></div>'+
  '<div class="form-group"><label class="form-label">Stock Minimo</label><input class="form-input" id="kf_stock_minimo" type="number" step="1" value="'+fv('stock_minimo',10)+'"></div>'+
  '<div class="form-group"><label class="form-toggle"><input type="checkbox" id="kf_controlar_estoque" '+(fv('controlar_estoque',true)!==false?'checked':'')+' ><span>Controlar Estoque</span></label></div>'+
  '<div class="form-group"><label class="form-toggle"><input type="checkbox" id="kf_venda_sem_estoque" '+(fv('venda_sem_estoque')?'checked':'')+' ><span>Vender sem Estoque</span></label></div>'+
  '<div class="form-section-title">Visibilidade</div>'+
  '<div class="form-group"><label class="form-label">Ordem no Menu</label><input class="form-input" id="kf_ordem" type="number" value="'+fv('ordem',1)+'"></div>'+
  '<div class="form-group" id="kf-g-pdv"><label class="form-toggle"><input type="checkbox" id="kf_mostrar_pdv" '+(dPdv?'checked':'')+' ><span>Mostrar no PDV</span></label></div>'+
  '<div class="form-group"><label class="form-toggle"><input type="checkbox" id="kf_disponivel" '+(dDis?'checked':'')+' ><span>Disponivel</span></label></div>'+
  '<div class="form-group"><label class="form-toggle"><input type="checkbox" id="kf_especial_hoje" '+(fv('especial_hoje')?'checked':'')+' ><span>Especial Hoje</span></label></div>'+
  '<div class="form-section-title">Imagem</div>'+
  imgH+
  '<div id="kl-kit-panel-wrap" style="grid-column:1/-1"></div>'+
  '<div class="form-actions">'+
    '<button class="btn-cancel-form" onclick="closeDrawer()">Cancelar</button>'+
    '<button class="btn-save" id="kf-btn-save" onclick="kl_salvar(\''+(r?r.id:'')+'\','+isNew+')">Guardar</button>'+
  '</div></div>';
}

function kl_ajustaTipo(tipo){
  var gp=document.getElementById('kf-g-preco');if(gp)gp.style.display=tipo==='componente'?'none':'';
  var gd=document.getElementById('kf-g-pdv');if(gd)gd.style.display=tipo==='componente'?'none':'';
}

/* KIT PANEL */
function kl_renderKitPanel(tipo){
  var w=document.getElementById('kl-kit-panel-wrap');if(!w)return;
  if(tipo!=='kit'){w.innerHTML='';return;}
  var comps=kl_data.filter(function(r){return r.tipo_item==='componente'&&r.disponivel!==false;});
  var cOpts=comps.map(function(c){return'<option value="'+c.id+'" data-nome="'+(c.nome||'').replace(/"/g,'&quot;')+'" data-unidade="'+(c.unidade||'un')+'">'+c.nome+' (Stock: '+(c.stock||0)+' '+(c.unidade||'un')+')</option>';}).join('');
  w.innerHTML='<div class="kl-kit-panel">'+
    '<div class="kl-kit-title">Componentes por unidade deste prato</div>'+
    '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">'+
      '<select class="form-select" id="kc-sel" style="flex:2;min-width:150px"><option value="">Seleciona componente...</option>'+cOpts+'</select>'+
      '<input class="form-input" id="kc-qty" type="number" value="1" step="0.001" min="0.001" style="width:75px" placeholder="Qtd">'+
      '<input class="form-input" id="kc-unit" type="text" style="width:60px" placeholder="Un." readonly>'+
      '<button class="btn-sub-add" onclick="kl_addComp()">+ Add</button>'+
    '</div><div id="kl-kit-lista"></div></div>';
  var s=document.getElementById('kc-sel');
  if(s)s.addEventListener('change',function(){var o=this.options[this.selectedIndex],u=document.getElementById('kc-unit');if(u)u.value=(o&&o.dataset&&o.dataset.unidade)||'un';});
  kl_renderCompList();
}
window.kl_renderKitPanel=kl_renderKitPanel;

function kl_addComp(){
  var s=document.getElementById('kc-sel'),o=s&&s.options[s.selectedIndex];
  var qty=parseFloat((document.getElementById('kc-qty')||{value:0}).value||0);
  var unit=(document.getElementById('kc-unit')||{value:'un'}).value||'un';
  var cid=s&&s.value;
  if(!cid){alert('Seleciona um componente.');return;}
  if(qty<=0){alert('Quantidade > 0.');return;}
  if(kl_kitItensTemp.find(function(c){return c.componente_id===cid;})){alert('Ja adicionado.');return;}
  kl_kitItensTemp.push({componente_id:cid,nome:(o&&o.dataset&&o.dataset.nome)||'—',quantidade:qty,unidade:unit});
  s.value='';document.getElementById('kc-qty').value='1';document.getElementById('kc-unit').value='';
  kl_renderCompList();
}
window.kl_addComp=kl_addComp;

function kl_rmComp(i){kl_kitItensTemp.splice(i,1);kl_renderCompList();}
window.kl_rmComp=kl_rmComp;

function kl_renderCompList(){
  var el=document.getElementById('kl-kit-lista');if(!el)return;
  if(!kl_kitItensTemp.length){el.innerHTML='<div style="font-size:11px;color:var(--text-faint);padding:4px 0">Nenhum componente definido.</div>';return;}
  el.innerHTML=kl_kitItensTemp.map(function(c,i){
    return'<div class="kl-kit-item"><span>'+c.nome+'</span><span class="kl-kit-val">'+c.quantidade+' '+c.unidade+'</span><button class="kl-kit-rm" onclick="kl_rmComp('+i+')">x</button></div>';
  }).join('');
}

/* GUARDAR
   isNovo=true  → guarda, reabre com o ID criado (novo item continua editavel)
   isNovo=false → guarda e fecha o drawer
*/
async function kl_salvar(id,isNovo){
  var get=function(k){var el=document.getElementById('kf_'+k);return el?(el.value||null):null;};
  var chk=function(k){var el=document.getElementById('kf_'+k);return el?el.checked:false;};
  var imgEl=document.getElementById('f_imagem_url');
  var nome=get('nome');
  if(!nome){if(typeof showFormMsg==='function')showFormMsg('Nome obrigatorio.','error');return;}
  var body={
    nome,tipo_item:get('tipo_item'),categoria:get('categoria'),tipo_comida:get('tipo_comida'),
    descricao:get('descricao'),alergenos:get('alergenos'),
    preco:get('preco')?parseFloat(get('preco')):null,
    preco_custo:get('preco_custo')?parseFloat(get('preco_custo')):null,
    iva_pct:get('iva_pct')?parseFloat(get('iva_pct')):null,
    unidade:get('unidade'),
    stock:get('stock')!==null?parseFloat(get('stock')):0,
    stock_minimo:get('stock_minimo')?parseFloat(get('stock_minimo')):0,
    controlar_estoque:chk('controlar_estoque'),venda_sem_estoque:chk('venda_sem_estoque'),
    ordem:get('ordem')?parseInt(get('ordem')):1,
    mostrar_pdv:chk('mostrar_pdv'),disponivel:chk('disponivel'),especial_hoje:chk('especial_hoje'),
    imagem_url:imgEl?(imgEl.value||null):get('imagem_url'),
    updated_at:new Date().toISOString(),
  };
  var btn=document.getElementById('kf-btn-save');
  if(btn){btn.disabled=true;btn.textContent='A guardar...';}
  try{
    var sid=id;
    if(!id){
      var res=await sb('keola_menu',{method:'POST',body:JSON.stringify(body)});
      sid=res&&res[0]&&res[0].id;
    }else{
      await sb('keola_menu?id=eq.'+id,{method:'PATCH',body:JSON.stringify(body)});
    }
    if(!sid)throw new Error('Sem ID retornado.');
    if(body.tipo_item==='kit'){
      await sb('keola_kit_componentes?kit_id=eq.'+sid,{method:'DELETE'}).catch(function(){});
      for(var c of kl_kitItensTemp)await sb('keola_kit_componentes',{method:'POST',body:JSON.stringify({kit_id:sid,componente_id:c.componente_id,quantidade:c.quantidade,unidade:c.unidade})});
    }
    kl_data=await sb('keola_menu?select=*&order=categoria,nome')||[];
    await kl_loadKit();kl_renderStats();kl_renderList();
    if(isNovo===true||isNovo==='true'){
      // novo: reabre com ID para continuar a preencher
      if(typeof showFormMsg==='function')showFormMsg('Item criado! Podes continuar a editar ou fechar.','success');
      setTimeout(function(){kl_abrirForm(sid);},600);
    }else{
      // edicao existente: fecha
      if(typeof closeDrawer==='function')closeDrawer();
    }
  }catch(e){
    if(typeof showFormMsg==='function')showFormMsg('Erro: '+(e&&e.message?e.message:(e&&e.details?e.details:JSON.stringify(e))),'error');
    if(btn){btn.disabled=false;btn.textContent='Guardar';}
  }
}
window.kl_salvar=kl_salvar;

/* MONTAR KIT */
function kl_abrirMontar(kitId,kitNome){
  var comps=kl_kitCache[kitId]||[],mk=kl_calcMax(kitId);
  var linhas=comps.map(function(c){
    var p=c.quantidade>0?Math.floor(c.stock/c.quantidade):'inf';
    return'<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--bg-card);border-radius:6px;margin-bottom:3px;font-size:12px">'+
      '<span>'+c.nome+'</span><span style="color:var(--text-faint)">'+c.quantidade+' '+c.unidade+' x prato · Stock: <strong>'+c.stock+'</strong> · Possivel: <strong style="color:'+(typeof p==='number'&&p<5?'var(--red)':'var(--green)')+'">'+p+'</strong></span></div>';
  }).join('');
  document.getElementById('drawer-title').textContent='Montar: '+kitNome;
  document.getElementById('drawer-body').innerHTML='<div class="form-grid">'+
  '<div class="msg-form" id="form-msg"></div>'+
  '<div class="form-section-title">Componentes por prato</div>'+
  '<div class="form-full">'+(linhas||'<div style="color:var(--text-faint);font-size:12px">Nenhum componente configurado.</div>')+'</div>'+
  '<div class="form-section-title" style="grid-column:1/-1;display:flex;justify-content:space-between;align-items:center">'+
    '<span>Quantos pratos montar?</span><span style="font-size:11px;color:'+(mk>0?'var(--green)':'var(--red)')+'">Maximo: <strong>'+mk+'</strong></span>'+
  '</div>'+
  '<div class="form-group form-full"><input class="form-input" id="mk_qty" type="number" min="1" max="'+mk+'" value="'+Math.max(1,Math.min(1,mk))+'" style="font-size:22px;text-align:center;height:58px;font-family:var(--font-title)"></div>'+
  '<div class="form-actions">'+
    '<button class="btn-cancel-form" onclick="closeDrawer()">Cancelar</button>'+
    '<button class="btn-save" id="btn-save" onclick="kl_execMontar(\''+kitId+'\',\''+kitNome.replace(/'/g,"\\'")+'\','+mk+')" '+(mk<=0?'disabled':'')+'>Confirmar Montagem</button>'+
  '</div></div>';
  document.getElementById('overlay').classList.remove('hidden');
  document.body.style.overflow='hidden';
}
window.kl_abrirMontar=kl_abrirMontar;

async function kl_execMontar(kitId,kitNome,maxK){
  var qty=parseInt((document.getElementById('mk_qty')||{value:0}).value||0);
  if(!qty||qty<=0){if(typeof showFormMsg==='function')showFormMsg('Quantidade invalida.','error');return;}
  if(qty>maxK){if(typeof showFormMsg==='function')showFormMsg('Maximo: '+maxK,'error');return;}
  var btn=document.getElementById('btn-save');if(btn){btn.disabled=true;btn.textContent='A montar...';}
  var comps=kl_kitCache[kitId]||[],cons=[];
  try{
    for(var c of comps){
      var cn=c.quantidade*qty,ns=Math.max(0,c.stock-cn);
      await sb('keola_menu?id=eq.'+c.componente_id,{method:'PATCH',body:JSON.stringify({stock:ns})});
      cons.push({id:c.componente_id,nome:c.nome,consumido:cn,stock_depois:ns});c.stock=ns;
    }
    var ki=kl_data.find(function(r){return r.id===kitId;}),ant=(ki&&ki.stock_kits)||0,dep=ant+qty;
    await sb('keola_menu?id=eq.'+kitId,{method:'PATCH',body:JSON.stringify({stock_kits:dep})});
    await sb('keola_montagens',{method:'POST',body:JSON.stringify({kit_id:kitId,kit_nome:kitNome,quantidade:qty,stock_antes:ant,stock_depois:dep,componentes_consumidos:cons,operador:(typeof currentUser!=='undefined'&&currentUser?currentUser.nome:null)})}).catch(function(){});
    if(typeof showFormMsg==='function')showFormMsg(qty+' prato(s) montado(s)!','success');
    kl_data=await sb('keola_menu?select=*&order=categoria,nome')||[];
    await kl_loadKit();kl_renderStats();
    setTimeout(function(){if(typeof closeDrawer==='function')closeDrawer();kl_renderList();},900);
  }catch(e){
    if(typeof showFormMsg==='function')showFormMsg('Erro: '+(e&&e.message?e.message:JSON.stringify(e)),'error');
    if(btn){btn.disabled=false;btn.textContent='Confirmar Montagem';}
  }
}
window.kl_execMontar=kl_execMontar;

kl_init();
})();
</script>
