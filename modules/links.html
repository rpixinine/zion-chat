<!-- modules/links.html — Módulo completo de Links -->
<style>
.mod-page   { display:flex; height:100%; overflow:hidden; }
.mod-sidebar { width:240px; flex-shrink:0; background:var(--bg-card); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.mod-sidebar-hd { padding:12px 14px 10px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.mod-sidebar-title { font-family:var(--font-title); font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--text-faint); }
.mod-list { flex:1; overflow-y:auto; padding:6px; }
.mod-item { padding:10px 12px; border-radius:8px; cursor:pointer; margin-bottom:2px; border:1px solid transparent; transition:all 0.15s; }
.mod-item:hover  { background:var(--bg-panel); border-color:var(--border); }
.mod-item.active { background:var(--primary-faint); border-color:var(--border-md); }
.mod-item-nome { font-size:13px; font-weight:600; }
.mod-item-sub  { font-size:11px; color:var(--text-faint); margin-top:2px; }
.mod-content { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
.mod-tabs { display:flex; gap:2px; padding:10px 18px 0; border-bottom:1px solid var(--border); background:var(--bg-card); flex-shrink:0; flex-wrap:wrap; }
.mod-tab { padding:7px 14px; border-radius:8px 8px 0 0; font-size:12px; font-weight:600; cursor:pointer; border:1px solid transparent; color:var(--text-faint); background:transparent; font-family:var(--font-body); transition:all 0.12s; }
.mod-tab.active { background:var(--primary-faint); border-color:var(--border); border-bottom-color:var(--bg-card); color:var(--primary-dark); }
.mod-tab-body { flex:1; overflow-y:auto; padding:18px; display:none; min-height:0; }
.mod-tab-body.active { display:block; }
.lk-new-wrap { flex:1; overflow-y:auto; padding:20px; }
.mod-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; color:var(--text-faint); text-align:center; gap:6px; height:100%; }
.mod-empty-title { font-family:var(--font-title); font-size:10px; letter-spacing:2px; }
.stats-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:10px; margin-bottom:18px; }
.stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:12px; text-align:center; }
.stat-num  { font-family:var(--font-title); font-size:24px; font-weight:700; color:var(--primary-dark); }
.stat-lbl  { font-size:9px; color:var(--text-faint); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
.mod-table-wrap { overflow-x:auto; }
table.mod-table { width:100%; border-collapse:collapse; font-size:13px; }
table.mod-table th { font-family:var(--font-title); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-faint); padding:8px 12px; border-bottom:1px solid var(--border); text-align:left; white-space:nowrap; }
table.mod-table td { padding:10px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }
table.mod-table tr:last-child td { border-bottom:none; }
table.mod-table tr:hover td { background:var(--bg-panel); }
.reun-filters { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:12px; padding:10px 12px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); }
.reun-filters input, .reun-filters select { padding:6px 10px; border-radius:8px; border:1px solid var(--border); background:var(--bg-input); font-size:12px; color:var(--text-main); outline:none; font-family:var(--font-body); }
.reun-filters input:focus { border-color:var(--primary); }
.reun-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:8px; overflow:hidden; }
.reun-card.realizada { border-left:3px solid var(--green); }
.reun-card.pendente  { border-left:3px solid var(--text-faint); }
.reun-head { padding:11px 14px; display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none; }
.reun-head:hover { background:var(--bg-panel); }
.reun-data  { font-family:var(--font-title); font-size:11px; color:var(--primary-dark); min-width:100px; }
.reun-titulo { flex:1; font-size:13px; font-weight:600; }
.reun-body  { padding:0 14px 14px; border-top:1px solid var(--border); display:none; }
.reun-body.open { display:block; }
.fg-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:12px 0; }
.fg-item.full { grid-column:1/-1; }
.fg-item label { display:block; font-size:9px; font-family:var(--font-title); letter-spacing:1px; text-transform:uppercase; color:var(--text-faint); margin-bottom:4px; }
.fg-item input, .fg-item textarea { width:100%; padding:8px 10px; border-radius:8px; border:1px solid var(--border); background:var(--bg-input); font-size:12px; font-family:var(--font-body); color:var(--text-main); outline:none; }
.fg-item input:focus, .fg-item textarea:focus { border-color:var(--primary); }
.fg-item textarea { resize:vertical; min-height:52px; }
.pres-row { display:flex; align-items:center; padding:8px 12px; border-bottom:1px solid var(--border); gap:10px; }
.pres-row:last-child { border-bottom:none; }
.pres-nome  { flex:1; font-size:13px; font-weight:600; }
.pres-papel { font-size:10px; color:var(--text-faint); width:64px; }
.pres-toggle { width:42px; height:22px; border-radius:11px; border:none; cursor:pointer; background:var(--bg-panel); position:relative; transition:background 0.2s; flex-shrink:0; }
.pres-toggle.on { background:var(--green); }
.pres-toggle::after { content:''; position:absolute; width:16px; height:16px; border-radius:8px; background:white; top:3px; left:3px; transition:left 0.2s; }
.pres-toggle.on::after { left:23px; }
.pbar { height:5px; border-radius:3px; background:var(--bg-panel); min-width:50px; overflow:hidden; }
.pbar-fill { height:100%; border-radius:3px; }
.pbar-ok { background:var(--green); } .pbar-med { background:var(--orange); } .pbar-low { background:var(--red); }
.crud-form { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:16px; display:none; }
.crud-form.open { display:block; }
.crud-form-title { font-family:var(--font-title); font-size:11px; letter-spacing:2px; color:var(--primary-dark); margin-bottom:14px; }
.crud-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.crud-section { grid-column:1/-1; font-family:var(--font-title); font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--text-faint); padding:6px 0 2px; border-bottom:1px solid var(--border); margin-bottom:4px; }
.crud-full { grid-column:1/-1; }
.crud-group label { display:block; font-size:9px; font-family:var(--font-title); letter-spacing:1px; text-transform:uppercase; color:var(--text-faint); margin-bottom:4px; }
.crud-group input, .crud-group select, .crud-group textarea { width:100%; padding:8px 10px; border-radius:8px; border:1px solid var(--border); background:var(--bg-input); font-size:12px; font-family:var(--font-body); color:var(--text-main); outline:none; }
.crud-group input:focus, .crud-group select:focus { border-color:var(--primary); }
.crud-actions { grid-column:1/-1; display:flex; gap:8px; margin-top:6px; align-items:center; }
.sec-hd { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.sec-lbl { font-family:var(--font-title); font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--text-faint); }
.btn-add { padding:5px 12px; border-radius:7px; background:var(--primary); color:white; border:none; font-size:12px; cursor:pointer; font-family:var(--font-body); font-weight:600; }
.btn-add:hover { background:var(--primary-dark); }
.btn-sm { padding:5px 12px; border-radius:8px; border:1px solid var(--border); background:var(--bg-input); font-size:11px; cursor:pointer; color:var(--text-main); transition:all 0.15s; white-space:nowrap; }
.btn-sm:hover { border-color:var(--primary); color:var(--primary-dark); background:var(--primary-faint); }
.btn-sm.danger { color:var(--red); }
.btn-sm.danger:hover { border-color:var(--red); background:rgba(192,57,43,0.06); }
.btn-sm.primary { background:var(--primary); color:white; border-color:var(--primary); }
.btn-sm.primary:hover { background:var(--primary-dark); }
.form-msg-inline { font-size:12px; padding:6px 10px; border-radius:8px; display:none; flex:1; }
.form-msg-inline.ok  { background:rgba(46,125,50,0.1); color:var(--green); display:block; }
.form-msg-inline.err { background:rgba(192,57,43,0.08); color:var(--red); display:block; }
.badge { padding:3px 8px; border-radius:20px; font-size:10px; white-space:nowrap; }
.badge-lider  { background:rgba(0,144,152,0.1); color:var(--primary-dark); }
.badge-co     { background:rgba(0,112,120,0.08); color:var(--primary-dark); }
.badge-anf    { background:rgba(192,144,64,0.1); color:var(--gold); }
.badge-membro { background:rgba(0,0,0,0.05); color:var(--text-muted); }
.badge-green  { background:rgba(46,125,50,0.1); color:var(--green); }
.badge-gray   { background:rgba(0,0,0,0.06); color:var(--text-faint); }
.badge-orange { background:rgba(230,81,0,0.1); color:var(--orange); }
</style>

<div class="mod-page" id="links-page">
    <div class="mod-sidebar">
        <div class="mod-sidebar-hd">
            <div class="mod-sidebar-title">Links</div>
            <button class="btn-add" onclick="lk_novoLink()">+ Novo</button>
        </div>
        <div class="mod-list" id="lk-sidebar"></div>
    </div>
    <div class="mod-content" id="lk-content">
        <div class="mod-empty">
            <div class="mod-empty-title">Selecciona um Link</div>
            <div style="font-size:12px;margin-top:4px">ou cria um novo</div>
        </div>
    </div>
</div>

<!-- MODAL CALENDÁRIO -->
<div id="lk-modal-cal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300;align-items:center;justify-content:center">
    <div style="background:var(--bg-card);border-radius:var(--radius);padding:24px;width:340px;box-shadow:var(--shadow-md)">
        <div style="font-family:var(--font-title);font-size:12px;letter-spacing:1px;color:var(--primary-dark);margin-bottom:16px">Gerar Calendário</div>
        <div class="crud-group" style="margin-bottom:12px"><label>Ano</label><input type="number" id="lk-cal-ano"></div>
        <div class="crud-group" style="margin-bottom:12px">
            <label>Dia da Semana (opcional)</label>
            <select id="lk-cal-dia">
                <option value="">— Usar o dia do Link —</option>
                <option>Segunda-feira</option><option>Terça-feira</option><option>Quarta-feira</option>
                <option>Quinta-feira</option><option>Sexta-feira</option><option>Sábado</option><option>Domingo</option>
            </select>
        </div>
        <div class="form-msg-inline" id="lk-cal-msg"></div>
        <div style="display:flex;gap:8px;margin-top:14px">
            <button class="btn-sm" style="flex:1" onclick="lk_fecharCal()">Cancelar</button>
            <button class="btn-sm primary" style="flex:1" onclick="lk_gerarCalendario()">Gerar</button>
        </div>
    </div>
</div>

<!-- MODAL ADICIONAR MEMBRO -->
<div id="lk-modal-membro" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300;align-items:center;justify-content:center">
    <div style="background:var(--bg-card);border-radius:var(--radius);padding:24px;width:400px;max-height:80vh;display:flex;flex-direction:column;box-shadow:var(--shadow-md)">
        <div style="font-family:var(--font-title);font-size:12px;letter-spacing:1px;color:var(--primary-dark);margin-bottom:12px">Adicionar Membro</div>
        <div class="crud-group" style="margin-bottom:8px"><label>Pesquisar</label><input id="lk-m-search" placeholder="Nome..." oninput="lk_filtrarMembros()"></div>
        <div class="crud-group" style="margin-bottom:10px">
            <label>Papel</label>
            <select id="lk-m-papel">
                <option value="membro">Membro</option><option value="anfitriao">Anfitrião</option>
                <option value="co_lider">Co-Líder</option><option value="lider">Líder</option>
            </select>
        </div>
        <div id="lk-m-lista" style="flex:1;overflow-y:auto;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;min-height:100px"></div>
        <div class="form-msg-inline" id="lk-m-msg"></div>
        <button class="btn-sm" style="width:100%;margin-top:8px" onclick="lk_fecharModalMembro()">Fechar</button>
    </div>
</div>

<script>
var lk_links          = [];
var lk_membrosAll     = [];
var lk_linkAtivo      = null;
var lk_linkMembros    = [];
var lk_membroJaNoLink = new Set();
var lk_editId         = null;
var lk_reunioesCache  = [];
var lk_reunFiltroStatus = 'todos';
var lk_reunFiltroData   = '';

const PAPEL_LABEL = { lider:'Líder', co_lider:'Co-Líder', anfitriao:'Anfitrião', membro:'Membro' };
const PAPEL_BADGE = { lider:'badge-lider', co_lider:'badge-co', anfitriao:'badge-anf', membro:'badge-membro' };

function lk_toast(m,t='ok') { if(window.toast) window.toast(m,t); }
function lk_sb(p,o) { return window.sb ? window.sb(p,o) : Promise.reject('no sb'); }
function fmtD(d) { if(!d) return '—'; return new Date(d+'T00:00:00').toLocaleDateString('pt-PT',{weekday:'short',day:'2-digit',month:'short'}); }
function lk_showMsg(id,msg,tipo) { const el=document.getElementById(id); if(!el) return; el.textContent=msg; el.className='form-msg-inline '+tipo; }

async function lk_init() {
    lk_linkAtivo=null; lk_editId=null; lk_reunFiltroStatus='todos'; lk_reunFiltroData='';
    const [ls,ms] = await Promise.all([
        lk_sb('links?select=*&ativo=eq.true&order=nome').catch(()=>[]),
        lk_sb('membros?select=id,nome&ativo=eq.true&order=nome').catch(()=>[]),
    ]);
    lk_links=ls||[]; lk_membrosAll=ms||[];
    lk_renderSidebar();
    const c=document.getElementById('lk-content');
    if(c) c.innerHTML=`<div class="mod-empty"><div class="mod-empty-title">Selecciona um Link</div><div style="font-size:12px;margin-top:4px">ou cria um novo</div></div>`;
}

function lk_renderSidebar() {
    const el=document.getElementById('lk-sidebar'); if(!el) return;
    if(!lk_links.length){el.innerHTML=`<div style="padding:20px;text-align:center;color:var(--text-faint);font-size:12px">Nenhum link</div>`;return;}
    el.innerHTML=lk_links.map(l=>`<div class="mod-item ${lk_linkAtivo?.id===l.id?'active':''}" onclick="lk_selLink('${l.id}')">
        <div class="mod-item-nome">${l.nome}</div>
        <div class="mod-item-sub">${[l.tipo,l.dia,l.horario].filter(Boolean).join(' · ')}</div>
    </div>`).join('');
}

async function lk_selLink(id) {
    lk_linkAtivo=lk_links.find(l=>l.id===id); lk_editId=null;
    lk_reunFiltroStatus='todos'; lk_reunFiltroData='';
    lk_renderSidebar(); await lk_carregarLink();
}

async function lk_carregarLink() {
    if(!lk_linkAtivo) return;
    const [lms,totalR]=await Promise.all([
        lk_sb(`link_membros?link_id=eq.${lk_linkAtivo.id}&select=*,membros(id,nome)&ativo=eq.true&order=papel,created_at`).catch(()=>[]),
        lk_sb(`link_reunioes?link_id=eq.${lk_linkAtivo.id}&select=id&realizada=eq.true`).catch(()=>[]),
    ]);
    lk_linkMembros=lms||[]; lk_membroJaNoLink=new Set(lk_linkMembros.map(m=>m.membro_id));
    const l=lk_linkAtivo;
    document.getElementById('lk-content').innerHTML=`
    <div class="mod-tabs">
        <button class="mod-tab active" id="lkt-detalhes" onclick="lk_setTab('detalhes')">Detalhes</button>
        <button class="mod-tab" id="lkt-membros" onclick="lk_setTab('membros')">Membros (${lk_linkMembros.length})</button>
        <button class="mod-tab" id="lkt-reunioes" onclick="lk_setTab('reunioes')">Reuniões</button>
        <button class="mod-tab" id="lkt-stats" onclick="lk_setTab('stats')">Estatísticas</button>
    </div>
    <div class="mod-tab-body active" id="lktb-detalhes">
        <div class="sec-hd">
            <div style="font-family:var(--font-title);font-size:14px;color:var(--primary-dark)">${l.nome}</div>
            <div style="display:flex;gap:8px">
                <button class="btn-sm" onclick="lk_editarLink('${l.id}')">Editar</button>
                <button class="btn-sm danger" onclick="lk_desativarLink('${l.id}')">Desativar</button>
            </div>
        </div>
        <div class="crud-form" id="lk-form-link"></div>
        <div class="stats-row">
            <div class="stat-card"><div class="stat-num">${lk_linkMembros.length}</div><div class="stat-lbl">Membros</div></div>
            <div class="stat-card"><div class="stat-num" style="color:var(--green)">${totalR.length}</div><div class="stat-lbl">Reuniões</div></div>
            <div class="stat-card"><div class="stat-num">${lk_linkMembros.filter(m=>m.papel==='lider').length}</div><div class="stat-lbl">Líderes</div></div>
        </div>
        <div style="font-size:13px;display:grid;grid-template-columns:1fr 1fr;gap:10px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px">
            <div><strong>Tipo:</strong> ${l.tipo||'—'}</div>
            <div><strong>Dia:</strong> ${l.dia||'—'} ${l.horario||''}</div>
            <div><strong>Zona:</strong> ${l.zona||'—'}</div>
            <div><strong>Faixa Etária:</strong> ${l.faixa_etaria||'—'}</div>
            <div style="grid-column:1/-1"><strong>Morada:</strong> ${[l.morada,l.zona,l.codigo_postal].filter(Boolean).join(', ')||'—'}</div>
            <div style="grid-column:1/-1"><strong>WhatsApp:</strong> ${l.contato||'—'}</div>
        </div>
    </div>
    <div class="mod-tab-body" id="lktb-membros">
        <div class="sec-hd"><div class="sec-lbl">Membros do Link</div><button class="btn-add" onclick="lk_abrirModalMembro()">+ Adicionar</button></div>
        <div id="lk-tabela-membros"></div>
    </div>
    <div class="mod-tab-body" id="lktb-reunioes">
        <div class="sec-hd">
            <div class="sec-lbl">Reuniões</div>
            <div style="display:flex;gap:6px">
                <button class="btn-sm" onclick="lk_abrirCal()">Gerar Calendário</button>
                <button class="btn-add" onclick="lk_novaReuniaoForm()">+ Nova</button>
            </div>
        </div>
        <div class="reun-filters">
            <input type="date" id="lk-rf-data" onchange="lk_aplicarFiltroReun()" style="flex:1;min-width:130px">
            <select id="lk-rf-status" onchange="lk_aplicarFiltroReun()">
                <option value="todos">Todas</option>
                <option value="realizada">Realizadas</option>
                <option value="pendente">Pendentes</option>
            </select>
            <button class="btn-sm" onclick="lk_limparFiltroReun()">✕ Limpar</button>
        </div>
        <div class="crud-form" id="lk-form-reuniao"></div>
        <div id="lk-lista-reunioes"><div style="padding:20px;text-align:center;color:var(--text-faint);font-size:12px">A carregar...</div></div>
    </div>
    <div class="mod-tab-body" id="lktb-stats">
        <div id="lk-stats-content"><div style="padding:20px;text-align:center;color:var(--text-faint);font-size:12px">A carregar...</div></div>
    </div>`;
    lk_renderTabelaMembros(); lk_carregarPresencasResumo(); lk_carregarReunioes();
}

function lk_setTab(tab) {
    ['detalhes','membros','reunioes','stats'].forEach(t=>{
        document.getElementById(`lkt-${t}`)?.classList.toggle('active',t===tab);
        document.getElementById(`lktb-${t}`)?.classList.toggle('active',t===tab);
    });
    if(tab==='stats') lk_carregarStats();
}

// ── CRUD LINKS ────────────────────────────────────────────────────────────────
function lk_novoLink() {
    lk_linkAtivo=null; lk_editId=null; lk_renderSidebar();
    document.getElementById('lk-content').innerHTML=`<div class="lk-new-wrap" id="lk-new-scroll">
        <div style="font-family:var(--font-title);font-size:12px;letter-spacing:2px;color:var(--primary-dark);margin-bottom:16px">NOVO LINK</div>
        <div id="lk-form-link"></div>
    </div>`;
    lk_renderFormLink(null);
}

function lk_editarLink(id) {
    lk_renderFormLink(lk_linkAtivo);
    document.getElementById('lk-form-link')?.classList.add('open');
}

function lk_renderFormLink(l) {
    const el=document.getElementById('lk-form-link'); if(!el) return;
    const isNew=!l;
    if(!isNew) { el.className='crud-form open'; }
    el.innerHTML=`
    ${!isNew?'<div class="crud-form-title">Editar Link</div>':''}
    <div class="crud-grid">
        <div class="crud-section">Identificação</div>
        <div class="crud-group crud-full"><label>Nome *</label><input id="lkf-nome" value="${l?.nome||''}" placeholder="Ex: Link Montijo"></div>
        <div class="crud-group"><label>Tipo</label><select id="lkf-tipo">${['Familias','FLOW','VOX','Diamantes','EKLECTOS'].map(t=>`<option value="${t}" ${l?.tipo===t?'selected':''}>${t==='Familias'?'Famílias':t}</option>`).join('')}</select></div>
        <div class="crud-group"><label>Faixa Etária</label><input id="lkf-faixa" value="${l?.faixa_etaria||''}" placeholder="Ex: 18-35 anos"></div>
        <div class="crud-group"><label>Capacidade</label><input type="number" id="lkf-cap" value="${l?.capacidade||''}" placeholder="20"></div>
        <div class="crud-section">Horário</div>

async function lk_salvarLink(id) {
    const nome=document.getElementById('lkf-nome')?.value.trim();
    if(!nome){lk_showMsg('lkf-msg','Nome obrigatório','err');return;}
    const body={nome,tipo:document.getElementById('lkf-tipo')?.value||null,faixa_etaria:document.getElementById('lkf-faixa')?.value||null,
        capacidade:parseInt(document.getElementById('lkf-cap')?.value)||null,dia:document.getElementById('lkf-dia')?.value||null,
        horario:document.getElementById('lkf-horario')?.value||null,zona:document.getElementById('lkf-zona')?.value||null,
        distrito:document.getElementById('lkf-dist')?.value||null,morada:document.getElementById('lkf-morada')?.value||null,
        codigo_postal:document.getElementById('lkf-cp')?.value||null,contato:document.getElementById('lkf-contato')?.value||null,ativo:true};
    try {
        if(id) await lk_sb(`links?id=eq.${id}`,{method:'PATCH',body:JSON.stringify(body)});
        else   await lk_sb('links',{method:'POST',body:JSON.stringify(body)});
        lk_showMsg('lkf-msg','Guardado!','ok');
        lk_links=await lk_sb('links?select=*&ativo=eq.true&order=nome').catch(()=>[]);
        lk_renderSidebar();
        const alvo=id?lk_links.find(l=>l.id===id):lk_links.find(l=>l.nome===nome);
        if(alvo){lk_linkAtivo=alvo; setTimeout(async()=>{await lk_carregarLink();},500);}
    }catch(e){lk_showMsg('lkf-msg',e.message,'err');}
}

function lk_cancelarForm() {
    const f=document.getElementById('lk-form-link');
    if(f){f.classList.remove('open');f.innerHTML='';}
    if(!lk_linkAtivo){
        document.getElementById('lk-content').innerHTML=`<div class="mod-empty"><div class="mod-empty-title">Selecciona um Link</div></div>`;
    }
}

async function lk_desativarLink(id) {
    if(!confirm('Desativar este Link?')) return;
    await lk_sb(`links?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({ativo:false})});
    lk_links=await lk_sb('links?select=*&ativo=eq.true&order=nome').catch(()=>[]);
    lk_linkAtivo=null; lk_renderSidebar();
    document.getElementById('lk-content').innerHTML=`<div class="mod-empty"><div class="mod-empty-title">Selecciona um Link</div></div>`;
    lk_toast('Link desativado');
}

    const pres=await lk_sb(`link_presencas?reuniao_id=in.(${reunioes.map(r=>r.id).join(',')})&select=membro_id,presente`).catch(()=>[]);
    const pMap={};

// ── CALENDÁRIO ────────────────────────────────────────────────────────────────
function lk_abrirCal(){document.getElementById('lk-cal-ano').value=new Date().getFullYear();document.getElementById('lk-cal-dia').value='';document.getElementById('lk-cal-msg').className='form-msg-inline';document.getElementById('lk-modal-cal').style.display='flex';}
function lk_fecharCal(){document.getElementById('lk-modal-cal').style.display='none';}

async function lk_gerarCalendario(){
    const ano=parseInt(document.getElementById('lk-cal-ano').value)||new Date().getFullYear();
    const diaOver=document.getElementById('lk-cal-dia').value;
    const diaLink=diaOver||lk_linkAtivo?.dia;
    if(!diaLink){lk_showMsg('lk-cal-msg','O Link não tem dia definido','err');return;}
    const DM={'Segunda-feira':1,'Terça-feira':2,'Quarta-feira':3,'Quinta-feira':4,'Sexta-feira':5,'Sábado':6,'Domingo':0};
    const diaN=DM[diaLink];
    if(diaN===undefined){lk_showMsg('lk-cal-msg',`Dia "${diaLink}" não reconhecido`,'err');return;}
    const datas=[]; let cur=new Date(ano,0,1);
    while(cur.getDay()!==diaN) cur.setDate(cur.getDate()+1);
    const fim=new Date(ano,11,31);
    while(cur<=fim){datas.push(cur.toISOString().split('T')[0]);cur.setDate(cur.getDate()+7);}
    const exist=await lk_sb(`link_reunioes?link_id=eq.${lk_linkAtivo.id}&select=data_reuniao`).catch(()=>[]);
    const existSet=new Set(exist.map(r=>r.data_reuniao));
    const novas=datas.filter(d=>!existSet.has(d));
    if(!novas.length){lk_showMsg('lk-cal-msg','Todas as reuniões já existem','ok');return;}
    const nomeBase=lk_linkAtivo.nome.replace(/^Link\s*/i,'');
    for(const d of novas){
        await lk_sb('link_reunioes',{method:'POST',body:JSON.stringify({link_id:lk_linkAtivo.id,data_reuniao:d,titulo:`Link ${nomeBase} — ${fmtD(d)}`,tipo:'regular'})}).catch(()=>{});
    }
    lk_showMsg('lk-cal-msg',`${novas.length} reuniões criadas`,'ok');
    lk_toast(`${novas.length} reuniões geradas`);
    setTimeout(async()=>{lk_fecharCal();await lk_carregarReunioes();},700);
}

// ── ESTATÍSTICAS ──────────────────────────────────────────────────────────────
async function lk_carregarStats(){
    const el=document.getElementById('lk-stats-content'); if(!el||!lk_linkAtivo) return;
    const reunioes=await lk_sb(`link_reunioes?link_id=eq.${lk_linkAtivo.id}&realizada=eq.true&select=id&order=data_reuniao.desc&limit=10`).catch(()=>[]);
    if(!reunioes.length){el.innerHTML=`<div class="mod-empty" style="height:auto;padding:40px"><div class="mod-empty-title">Sem reuniões realizadas ainda</div></div>`;return;}
    const pres=await lk_sb(`link_presencas?reuniao_id=in.(${reunioes.map(r=>r.id).join(',')})&select=membro_id,presente`).catch(()=>[]);
    const pMap={};
    pres.forEach(p=>{if(!pMap[p.membro_id])pMap[p.membro_id]=0;if(p.presente)pMap[p.membro_id]++;});
    const rows=[...lk_linkMembros].sort((a,b)=>(pMap[b.membro_id]||0)-(pMap[a.membro_id]||0));
    el.innerHTML=`<p style="font-size:12px;color:var(--text-faint);margin-bottom:14px">Últimas ${reunioes.length} reuniões realizadas.</p>
    <div class="mod-table-wrap"><table class="mod-table">
        <thead><tr><th>Membro</th><th>Papel</th><th>Presenças</th><th>%</th></tr></thead>
        <tbody>${rows.map(m=>{const p=pMap[m.membro_id]||0,pct=Math.round(p/reunioes.length*100),cls=pct>=75?'pbar-ok':pct>=50?'pbar-med':'pbar-low';
            return`<tr><td style="font-weight:600">${m.membros?.nome||'—'}</td>
            <td><span class="badge ${PAPEL_BADGE[m.papel]||'badge-membro'}">${PAPEL_LABEL[m.papel]||m.papel}</span></td>
            <td>${p}/${reunioes.length}</td>
            <td><div style="display:flex;align-items:center;gap:8px"><div class="pbar" style="min-width:70px"><div class="pbar-fill ${cls}" style="width:${pct}%"></div></div><span style="font-size:12px">${pct}%</span></div></td></tr>`;
        }).join('')}</tbody>
    </table></div>`;
}

lk_init();
</script>
