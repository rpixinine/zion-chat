<style>
    /* ══════════════════════════════════════════════════════
       MEMBROS MODULE — refactored
       Layout: sidebar filtros + painel direito
       ══════════════════════════════════════════════════════ */

    /* ── fonte única ── */
    .mb-wrap * {
        font-family: var(--font-body, 'Lato', sans-serif);
        color: var(--text-main, #fff);
        box-sizing: border-box;
    }

    .mb-wrap {
        display: flex;
        height: 100%;
        min-height: 0;
        overflow: hidden;
    }

    /* ── SIDEBAR ──────────────────────────────────────── */
    .mb-side {
        width: 380px;
        flex-shrink: 0;
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        background: var(--bg-card);
        overflow: hidden;
    }

    .mb-side-head {
        padding: 10px 12px 8px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
    }

    /* cabeçalho do módulo */
    .mb-module-title {
        font-family: var(--font-title, 'Cinzel', serif);
        font-size: 11px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--primary, #009098);
        margin-bottom: 8px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--border);
    }

    .mb-search {
        width: 100%;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 7px 10px;
        font-size: 12px;
        color: #fff;
        outline: none;
        margin-bottom: 6px;
    }

    .mb-search::placeholder {
        color: var(--text-faint);
    }

    .mb-search:focus {
        border-color: var(--primary);
    }

    /* filtros */
    .mb-filtros {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .mb-filtros-titulo {
        font-family: var(--font-title, 'Cinzel', serif);
        font-size: 8px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-faint);
        padding: 2px 0;
    }

    .mb-filtro-grupo {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
    }

    .mb-filtro-chip {
        padding: 3px 8px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--bg-input);
        font-size: 10px;
        color: var(--text-faint);
        cursor: pointer;
        transition: all 0.12s;
        white-space: nowrap;
    }

    .mb-filtro-chip:hover {
        border-color: var(--primary);
        color: var(--primary);
    }

    .mb-filtro-chip.active {
        background: rgba(0, 144, 152, 0.25);
        border-color: var(--primary);
        color: #fff;
        font-weight: 700;
    }

    .mb-filtro-chip.chip-red.active {
        background: rgba(198, 40, 40, 0.3);
        border-color: rgba(198, 40, 40, 0.7);
        color: #ff8a80;
    }

    .mb-filtro-chip.chip-green.active {
        background: rgba(46, 125, 50, 0.3);
        border-color: rgba(46, 125, 50, 0.7);
        color: #69f0ae;
    }

    .mb-filtro-select {
        width: 100%;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 5px 8px;
        font-size: 11px;
        color: #fff;
        outline: none;
        cursor: pointer;
    }

    .mb-filtro-select:focus {
        border-color: var(--primary);
    }

    .mb-filtro-select option {
        background: var(--bg-card, #0d2733);
    }

    .mb-filtro-clear {
        padding: 4px 10px;
        border-radius: 6px;
        border: 1px dashed var(--border);
        background: none;
        font-size: 10px;
        color: var(--text-faint);
        cursor: pointer;
        transition: all 0.12s;
        width: 100%;
        margin-top: 2px;
    }

    .mb-filtro-clear:hover {
        color: #ff8a80;
        border-color: rgba(198, 40, 40, 0.6);
    }

    .mb-count {
        font-size: 10px;
        color: var(--text-faint);
        padding: 4px 0 0;
        text-align: right;
    }

    /* lista */
    .mb-list {
        flex: 1;
        overflow-y: auto;
        padding: 6px;
    }

    .mb-list-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 10px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.12s;
        border: 1px solid transparent;
    }

    .mb-list-item:hover {
        background: rgba(0, 144, 152, 0.12);
    }

    .mb-list-item.active {
        background: rgba(0, 144, 152, 0.18);
        border-color: var(--primary);
    }

    .mb-list-avatar {
        width: 48px !important;
        height: 48px !important;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 17px !important;
        font-weight: 700;
        flex-shrink: 0;
        overflow: hidden;
        background: rgba(0, 144, 152, 0.2);
        color: var(--primary);
        border: 1px solid rgba(0, 144, 152, 0.3);
    }

    .mb-list-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .mb-list-info {
        flex: 1;
        min-width: 0;
    }

    .mb-list-nome {
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .mb-list-sub {
        font-size: 11px;
        color: var(--text-faint);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 1px;
    }

    .mb-list-badges {
        display: flex;
        gap: 3px;
        margin-top: 2px;
        flex-wrap: wrap;
    }

    .mb-list-sep {
        font-family: var(--font-title, 'Cinzel', serif);
        font-size: 8px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-faint);
        padding: 8px 8px 3px;
        border-top: 1px solid var(--border);
        margin-top: 4px;
    }

    .mb-list-sep:first-child {
        border-top: none;
        margin-top: 0;
    }

    .mb-list-item.inativo .mb-list-nome {
        opacity: 0.4;
    }

    .mb-list-item.inativo .mb-list-avatar {
        opacity: 0.3;
    }

    /* botão novo */
    .mb-btn-novo {
        width: calc(100% - 12px);
        margin: 6px;
        padding: 8px;
        border-radius: 8px;
        border: 1px dashed var(--primary);
        background: rgba(0, 144, 152, 0.1);
        color: var(--primary);
        font-family: var(--font-title, 'Cinzel', serif);
        font-size: 9px;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.15s;
        flex-shrink: 0;
    }

    .mb-btn-novo:hover {
        background: var(--primary);
        color: #fff;
        border-style: solid;
    }

    /* loading */
    .mb-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
        color: var(--text-faint);
        font-size: 12px;
        gap: 10px;
    }

    /* ── BADGES ───────────────────────────────────────── */
    .mb-badge {
        padding: 2px 8px;
        border-radius: 20px;
        font-size: 9px;
        font-family: var(--font-title, 'Cinzel', serif);
        letter-spacing: 0.5px;
        white-space: nowrap;
        font-weight: 600;
    }

    .mb-badge-red {
        background: rgba(198, 40, 40, 0.35);
        color: #ff8a80;
        border: 1px solid rgba(198, 40, 40, 0.6);
    }

    .mb-badge-green {
        background: rgba(46, 125, 50, 0.35);
        color: #69f0ae;
        border: 1px solid rgba(46, 125, 50, 0.6);
    }

    .mb-badge-blue {
        background: rgba(0, 100, 180, 0.35);
        color: #82b1ff;
        border: 1px solid rgba(0, 100, 180, 0.6);
    }

    .mb-badge-teal {
        background: rgba(0, 144, 152, 0.25);
        color: var(--primary);
        border: 1px solid rgba(0, 144, 152, 0.5);
    }

    .mb-badge-gray {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text-faint);
        border: 1px solid var(--border);
    }

    .mb-badge-orange {
        background: rgba(230, 81, 0, 0.3);
        color: #ffab40;
        border: 1px solid rgba(230, 81, 0, 0.6);
    }

    /* ── PAINEL DIREITO ───────────────────────────────── */
    .mb-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-width: 0;
    }

    .mb-panel-inner {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
    }

    /* empty state */
    .mb-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: 10px;
        color: var(--text-faint);
        text-align: center;
        padding: 40px;
    }

    .mb-empty-icon {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(0, 144, 152, 0.1);
        border: 1px solid rgba(0, 144, 152, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--primary);
    }

    .mb-empty-title {
        font-family: var(--font-title, 'Cinzel', serif);
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-faint);
    }

    /* ── PERFIL HEADER ────────────────────────────────── */
    .mb-profile-header {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        padding: 16px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        background: var(--bg-card);
    }

    .mb-profile-foto {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        overflow: hidden;
        flex-shrink: 0;
        background: rgba(0, 144, 152, 0.15);
        border: 2px solid rgba(0, 144, 152, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        font-weight: 700;
        color: var(--primary);
    }

    .mb-profile-foto img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .mb-profile-info {
        flex: 1;
        min-width: 0;
    }

    .mb-profile-nome {
        font-family: var(--font-title, 'Cinzel', serif);
        font-size: 18px;
        color: #fff;
        letter-spacing: 1px;
        margin-bottom: 3px;
    }

    .mb-profile-sub {
        font-size: 12px;
        color: var(--text-faint);
        margin-bottom: 6px;
    }

    .mb-profile-badges {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
    }

    .mb-profile-actions {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
        align-items: flex-start;
    }

    /* sub-tabs */
    .mb-panel-tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        background: var(--bg-card);
        flex-shrink: 0;
        overflow-x: auto;
    }

    .mb-panel-tab {
        padding: 9px 14px;
        font-family: var(--font-title, 'Cinzel', serif);
        font-size: 9px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--text-faint);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        white-space: nowrap;
        transition: all 0.12s;
        background: none;
        border-top: none;
        border-left: none;
        border-right: none;
    }

    .mb-panel-tab:hover {
        color: #fff;
    }

    .mb-panel-tab.active {
        color: #fff;
        border-bottom-color: var(--primary);
    }

    /* ── DATA CARDS ───────────────────────────────────── */
    .mb-data-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 12px;
    }

    .mb-data-full {
        grid-column: 1 / -1;
    }

    .mb-data-card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        padding: 12px;
    }

    .mb-data-card-title {
        font-family: var(--font-title, 'Cinzel', serif);
        font-size: 9px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--primary);
        margin-bottom: 10px;
        padding-bottom: 6px;
        border-bottom: 1px solid rgba(0, 144, 152, 0.2);
    }

    .mb-field-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 5px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        gap: 8px;
    }

    .mb-field-row:last-child {
        border-bottom: none;
    }

    .mb-field-label {
        font-size: 10px;
        color: var(--text-faint);
        flex-shrink: 0;
        min-width: 100px;
        font-family: var(--font-title, 'Cinzel', serif);
        letter-spacing: 0.5px;
    }

    .mb-field-val {
        font-size: 12px;
        color: #fff;
        text-align: right;
        word-break: break-word;
    }

    .mb-field-val.empty {
        color: var(--text-faint);
        font-style: italic;
    }

    /* ── FORMULÁRIO ───────────────────────────────────── */
    .mb-form {
        display: flex;
        flex-direction: column;
        gap: 0;
    }

    .mb-form-section {
        font-family: var(--font-title, 'Cinzel', serif);
        font-size: 9px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--primary);
        padding: 10px 0 6px;
        border-bottom: 1px solid rgba(0, 144, 152, 0.25);
        margin-bottom: 8px;
        margin-top: 4px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .mb-form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
    }

    .mb-form-full {
        grid-column: 1 / -1;
    }

    .mb-form-group {
        display: flex;
        flex-direction: column;
        gap: 3px;
    }

    .mb-form-label {
        font-size: 10px;
        color: var(--text-faint);
        font-family: var(--font-title, 'Cinzel', serif);
        letter-spacing: 0.5px;
    }

    .mb-form-input {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 12px;
        color: #fff;
        outline: none;
        transition: border-color 0.15s;
    }

    .mb-form-input::placeholder {
        color: var(--text-faint);
    }

    .mb-form-input:focus {
        border-color: var(--primary);
        background: rgba(0, 144, 152, 0.08);
    }

    .mb-form-input[readonly] {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .mb-form-select {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 12px;
        color: #fff;
        outline: none;
    }

    .mb-form-select:focus {
        border-color: var(--primary);
    }

    .mb-form-select option {
        background: var(--bg-card, #0d2733);
        color: #fff;
    }

    .mb-form-textarea {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 12px;
        color: #fff;
        outline: none;
        resize: vertical;
        min-height: 80px;
    }

    .mb-form-textarea::placeholder {
        color: var(--text-faint);
    }

    .mb-form-textarea:focus {
        border-color: var(--primary);
    }

    .mb-form-toggle {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 12px;
        color: #fff;
        cursor: pointer;
        padding: 7px 0;
    }

    .mb-form-toggle input[type="checkbox"] {
        accent-color: var(--primary);
        width: 14px;
        height: 14px;
    }

    /* ── MENSAGENS ────────────────────────────────────── */
    .mb-msg {
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 12px;
        margin-bottom: 10px;
        display: none;
        font-weight: 600;
    }

    .mb-msg.error {
        display: block;
        background: rgba(198, 40, 40, 0.75);
        color: #fff;
        border: 1px solid rgba(198, 40, 40, 0.9);
    }

    .mb-msg.success {
        display: block;
        background: rgba(46, 125, 50, 0.75);
        color: #fff;
        border: 1px solid rgba(46, 125, 50, 0.9);
    }

    /* ── BOTÕES ───────────────────────────────────────── */
    .mb-form-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        padding-top: 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        margin-top: 10px;
    }

    .mb-btn-cancel {
        padding: 8px 16px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.05);
        font-family: var(--font-title, 'Cinzel', serif);
        font-size: 9px;
        letter-spacing: 1px;
        color: var(--text-faint);
        cursor: pointer;
        transition: all 0.12s;
    }

    .mb-btn-cancel:hover {
        border-color: rgba(255, 255, 255, 0.4);
        color: #fff;
    }

    .mb-btn-save {
        padding: 8px 18px;
        border-radius: 8px;
        border: none;
        background: var(--primary);
        color: #fff;
        font-family: var(--font-title, 'Cinzel', serif);
        font-size: 9px;
        letter-spacing: 1px;
        cursor: pointer;
        transition: background 0.15s;
        font-weight: 700;
    }

    .mb-btn-save:hover {
        background: var(--primary-dark);
    }

    .mb-btn-save:disabled {
        opacity: 0.4;
        cursor: not-allowed;
    }

    .mb-btn-danger {
        padding: 7px 14px;
        border-radius: 8px;
        border: 1px solid rgba(198, 40, 40, 0.5);
        background: rgba(198, 40, 40, 0.2);
        color: #ff8a80;
        font-family: var(--font-title, 'Cinzel', serif);
        font-size: 9px;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.12s;
    }

    .mb-btn-danger:hover {
        background: rgba(198, 40, 40, 0.4);
        color: #fff;
    }

    .mb-btn-edit {
        padding: 7px 12px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.05);
        font-family: var(--font-title, 'Cinzel', serif);
        font-size: 9px;
        letter-spacing: 1px;
        color: var(--text-faint);
        cursor: pointer;
        transition: all 0.12s;
    }

    .mb-btn-edit:hover {
        border-color: var(--primary);
        color: var(--primary);
    }

    /* ── MINISTÉRIOS / ITEMS ──────────────────────────── */
    .mb-min-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 10px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        margin-bottom: 4px;
    }

    .mb-min-nome {
        flex: 1;
        font-size: 12px;
        color: #fff;
    }

    .mb-min-papel {
        font-size: 10px;
        color: var(--text-faint);
    }

    .mb-min-remove {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: none;
        background: rgba(198, 40, 40, 0.3);
        color: #ff8a80;
        font-size: 11px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: background 0.12s;
    }

    .mb-min-remove:hover {
        background: rgba(198, 40, 40, 0.6);
        color: #fff;
    }

    .mb-sub-add {
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 8px;
    }

    /* ── IMAGE BOX ────────────────────────────────────── */
    .mb-img-box {
        width: 100%;
        height: 180px;
        border: 2px dashed rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.03);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition: border-color 0.2s;
        position: relative;
    }

    .mb-img-box:hover {
        border-color: var(--primary);
    }

    .mb-img-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* ── ANIVERSÁRIOS ─────────────────────────────────── */
    .mb-aniv-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 8px;
        margin-bottom: 12px;
    }

    .mb-aniv-card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        padding: 10px 8px;
        text-align: center;
        transition: border-color .15s;
    }

    .mb-aniv-card:hover {
        border-color: var(--primary);
    }

    .mb-aniv-card-foto {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: rgba(0, 144, 152, 0.2);
        color: var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: 700;
        overflow: hidden;
        margin: 0 auto 7px;
        border: 2px solid rgba(0, 144, 152, 0.3);
    }

    .mb-aniv-card-foto img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

<script>

    /* ── Supabase helper ─────────────────────────────── */
    //const sb = window.sb;

    /* ════════════════════════════════════════════════════
       MEMBROS MODULE — state & constants
       ════════════════════════════════════════════════════ */

    const IDIOMAS_LIST = [

    const ESTADO_CIVIL_LABEL_MAP = {
        solteiro: 'Solteiro/a', casado: 'Casado/a', divorciado: 'Divorciado/a',
        viuvo: 'Viúvo/a', uniao_facto: 'União de Facto',
    };

    const NACIONALIDADES_LIST = [
        'Afegã', 'Albanesa', 'Alemã', 'Andorrana', 'Angolana', 'Argentina', 'Arménia', 'Australiana',
        'Austríaca', 'Azerbaijana', 'Bangladiana', 'Belga', 'Boliviana', 'Bósnia', 'Brasileira',
        'Búlgara', 'Cabo-verdiana', 'Camaronesa', 'Canadiana', 'Chilena', 'Chinesa', 'Cipriota',
        'Colombiana', 'Congolesa', 'Costa-riquenha', 'Croata', 'Cubana', 'Dinamarquesa', 'Dominicana',
        'Egípcia', 'Emiratense', 'Equatoriana', 'Eritreia', 'Eslovaca', 'Eslovena', 'Espanhola',
        'Estadunidense', 'Estoniana', 'Etíope', 'Filipina', 'Finlandesa', 'Francesa', 'Ganesa',
        'Georgiana', 'Guatemalteca', 'Guineense', 'Guineense-Bissau', 'Haitiana', 'Hondurenha',
        'Húngara', 'Indiana', 'Indonésia', 'Iraniana', 'Iraquiana', 'Irlandesa', 'Islandesa',
        'Israelita', 'Italiana', 'Jamaicana', 'Japonesa', 'Jordaniana', 'Libanesa', 'Liberiana',
        'Líbia', 'Lituana', 'Luxemburguesa', 'Malaia', 'Marroquina', 'Mexicana', 'Moçambicana',
        'Moldava', 'Mongoliana', 'Montenegrina', 'Namibiana', 'Nepalesa', 'Nigeriana', 'Norueguesa',
        'Neozelandesa', 'Paquistanesa', 'Palestiniana', 'Paraguaia', 'Peruana', 'Polaca', 'Portuguesa',
        'Queniana', 'Romena', 'Ruandesa', 'Russa', 'São-tomense', 'Senegalesa', 'Sérvia', 'Sul-coreana',
        'Sri-lankesa', 'Suíça', 'Sueca', 'Tailandesa', 'Tanzaniana', 'Timorense', 'Tunisina', 'Turca',
        'Ucraniana', 'Uruguaia', 'Venezuelana', 'Vietnamita', 'Zambiana', 'Zimbabueana',
    ].sort();

    (function () {
        let mb_membros = [];
        let mb_links_cache = [];
        let mb_ministerios_cache = [];
        let mb_cursos_cache = [];
        let mb_membros_min = {};
        let mb_familia_cache = {};

        let mb_activoId = null;
        let mb_panelTab = 'info';
        let mb_editMode = false;
        let mb_isNovo = false;
        let _mb_editIdiomas = [];
        let _mb_editNacs = [];
        let mb_filtros = new Set();


        /* ── helpers ─────────────────────────────────────── */
        function mb_parseArr(val) {
            if (Array.isArray(val)) return val;
            try {
                const p = JSON.parse(val || '[]');
                return Array.isArray(p) ? p : [];
            } catch {
                return [];
            }
        }

        /* ── chips idiomas/nacs ──────────────────────────── */
        function mb_renderChips(key) {
            const arr = key === 'idiomas' ? _mb_editIdiomas : _mb_editNacs;
            const el = document.getElementById('mb-chips-' + key);
            if (!el) return;
            if (!arr.length) {
                el.innerHTML = '<span style="font-size:11px;color:var(--text-faint);font-style:italic">Nenhum adicionado</span>';
                return;
            }
            el.innerHTML = arr.map((v, i) =>
                `<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px 3px 11px;border-radius:20px;
            background:rgba(0,144,152,0.25);border:1px solid rgba(0,144,152,0.5);color:#fff;
            font-size:11px;font-family:var(--font-title,'Cinzel',serif);letter-spacing:.5px">
            ${v}
            <button onclick="mb_delChip('${key}',${i})" style="background:none;border:none;color:var(--text-faint);
            cursor:pointer;font-size:13px;line-height:1;padding:0 2px"
            onmouseover="this.style.color='#ff8a80'" onmouseout="this.style.color='var(--text-faint)'">×</button>
            </span>`
            ).join('');
        }

        function mb_addChip(key) {
            const sel = document.getElementById('mb-sel-' + key);
            if (!sel || !sel.value) return;
            const arr = key === 'idiomas' ? _mb_editIdiomas : _mb_editNacs;
            if (!arr.includes(sel.value)) {
                arr.push(sel.value);
                mb_renderChips(key);
            }
            sel.value = '';
        }

        function mb_delChip(key, idx) {
            (key === 'idiomas' ? _mb_editIdiomas : _mb_editNacs).splice(idx, 1);
            mb_renderChips(key);
        }

        function mb_chipBlock(key, label, list) {
            const opts = list.map(l => `<option value="${l}">${l}</option>`).join('');
            return `<div style="margin-bottom:10px">
            <div style="font-size:10px;color:var(--text-faint);font-family:var(--font-title,'Cinzel',serif);
            letter-spacing:.5px;margin-bottom:5px">${label}</div>
            <div id="mb-chips-${key}" style="display:flex;flex-wrap:wrap;gap:5px;min-height:10px;margin-bottom:6px"></div>
            <div style="display:flex;gap:6px;align-items:stretch">
                <select id="mb-sel-${key}" class="mb-form-select" style="flex:1">
                    <option value="">-- Adicionar --</option>${opts}
                </select>
                <button onclick="mb_addChip('${key}')"
                    style="padding:0 14px;border-radius:8px;border:1px solid rgba(0,144,152,0.4);
                    background:rgba(0,144,152,0.15);color:var(--primary);font-size:18px;cursor:pointer;
                    transition:all .15s"
                    onmouseover="this.style.background='var(--primary)';this.style.color='#fff'"
                    onmouseout="this.style.background='rgba(0,144,152,0.15)';this.style.color='var(--primary)'">+</button>
            </div>
        </div>`;
        }

        window.mb_toggleSide = function () {
            const side = document.getElementById('mb-side');
            const btn = document.getElementById('mb-toggle-btn');
            const collapsed = side.classList.toggle('collapsed');
            btn.textContent = collapsed ? '▶' : '☰';
            btn.style.left = collapsed ? '10px' : '390px'; // 380px sidebar + 10px margin
        };

        window.mb_openLightbox = function (src) {
            if (!src) return;
            const lb = document.createElement('div');
            lb.className = 'mb-lightbox';
            lb.innerHTML = `<img src="${src}" alt="Foto">`;
            lb.onclick = () => lb.remove();
            document.body.appendChild(lb);
        };

        /* ── INIT ────────────────────────────────────────── */
        async function mb_init() {
            try {
                const [mems, mins, links, cursos] = await Promise.all([
                    sb('membros?select=*&order=nome'),
                    sb('ministerios?select=id,nome,tipo&ativo=eq.true&order=nome'),
                    sb('links?select=id,nome&ativo=eq.true&order=nome'),
                    sb('zao_cursos?select=id,nome,badge_url&ativo=eq.true&order=nome').catch(() => []),
                ]);
                mb_membros = mems || [];
                mb_ministerios_cache = mins || [];
                mb_links_cache = links || [];
                mb_cursos_cache = cursos || [];

                const ids = mb_membros.filter(m => m.ativo !== false).map(m => m.id);
                if (ids.length) {
                    const vincs = await sb(`membro_ministerios?select=id,membro_id,papel,ministerios(id,nome,tipo)&membro_id=in.(${ids.join(',')})&ativo=eq.true`).catch(() => []);
                    mb_membros_min = {};
                    (vincs || []).forEach(v => {
                        if (!mb_membros_min[v.membro_id]) mb_membros_min[v.membro_id] = [];
                        mb_membros_min[v.membro_id].push({
                            tipo: v.ministerios?.tipo || '?', nome: v.ministerios?.nome || '—',
                            papel: v.papel || '', id_vinc: v.id,
                        });
                    });
                }

                const relsFamiliar = await sb('membros_filhos?select=pai_id,filho_id').catch(() => []);
                mb_familia_cache = {};
                mb_membros.forEach(mem => {
                    const conjuge = mem.conjuge_id ? mb_membros.find(x => x.id === mem.conjuge_id) || null : null;
                    const pai = mem.pai_id ? mb_membros.find(x => x.id === mem.pai_id) || null : null;
                    const mae = mem.mae_id ? mb_membros.find(x => x.id === mem.mae_id) || null : null;
                    const filhosIds = (relsFamiliar || []).filter(r => r.pai_id === mem.id).map(r => r.filho_id);
                    const filhos = filhosIds.map(fid => mb_membros.find(x => x.id === fid)).filter(Boolean);
                    mb_familia_cache[mem.id] = {conjuge, pai, mae, filhos};
                });

                mb_renderSide();
            } catch (e) {
                console.error('mb_init error:', e);
                document.getElementById('mb-list').innerHTML =
                    `<div style="padding:20px;font-size:12px;color:#ff8a80">Erro ao carregar: ${e?.message || JSON.stringify(e)}</div>`;
            }
        }

        /* ── SIDEBAR ─────────────────────────────────────── */
        function mb_renderSide() {
            const list = document.getElementById('mb-list');
            if (!list) return;

            const q = (document.getElementById('mb-search')?.value || '').toLowerCase();
            let lista = [...mb_membros];

            const temInativo = mb_filtros.has('inativo');
            const temAtivo = mb_filtros.has('ativo');
            if (temInativo && !temAtivo) lista = lista.filter(m => m.ativo === false);
            else if (!temInativo) lista = lista.filter(m => m.ativo !== false);

            if (mb_filtros.has('batizado')) lista = lista.filter(m => m.foi_batizado === true);
            if (mb_filtros.has('casado')) lista = lista.filter(m => m.estado_civil === 'casado');
            if (mb_filtros.has('tem_filhos')) lista = lista.filter(m => m.tem_filhos === true);
            ['e_lider', 'e_presbitero', 'e_voluntario', 'professor', 'pastor'].forEach(f => {
                if (mb_filtros.has(f)) lista = lista.filter(m => m[f] === true);
            });

            if (q) lista = lista.filter(m =>
                (m.nome || '').toLowerCase().includes(q) ||
                (m.email || '').toLowerCase().includes(q) ||
                (m.telefone || '').toLowerCase().includes(q) ||
                (m.zona || '').toLowerCase().includes(q)
            );

            const countEl = document.getElementById('mb-count');
            if (countEl) countEl.textContent = `${lista.length} de ${mb_membros.filter(m => m.ativo !== false).length} membros`;

            if (!lista.length) {
                list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-faint);font-size:12px">Nenhum membro encontrado.</div>`;
                return;
            }

            const grupos = {};
            lista.forEach(m => {
                const g = m.zona || 'Sem zona';
                if (!grupos[g]) grupos[g] = [];
                grupos[g].push(m);
            });

            let html = '';
            Object.keys(grupos).sort().forEach(zona => {
                html += `<div class="mb-list-sep">${zona} <span style="font-weight:400;opacity:.6">(${grupos[zona].length})</span></div>`;
                grupos[zona].forEach(m => {
                    const badges = [];
                    if (m.e_lider) badges.push(`<span class="mb-badge mb-badge-teal">Líder</span>`);
                    if (m.e_presbitero) badges.push(`<span class="mb-badge mb-badge-blue">Pres.</span>`);
                    if (m.e_voluntario) badges.push(`<span class="mb-badge mb-badge-green">Vol.</span>`);

                    const foto = m.foto_url
                        ? `<div class="mb-list-avatar"><img src="${m.foto_url}" onerror="this.parentElement.innerHTML='${(m.nome || 'M')[0]}'"></div>`
                        : `<div class="mb-list-avatar">${(m.nome || 'M')[0]}</div>`;

                    const minsNomes = (mb_membros_min[m.id] || []).map(mv => mv.nome).join(', ');
                    const sub = [m.genero, m.zona].filter(Boolean).join(' · ');
                    const minsLine = minsNomes
                        ? `<div class="mb-list-sub" style="color:var(--primary);font-size:10px">${minsNomes}</div>` : '';

                    html += `<div class="mb-list-item ${m.ativo === false ? 'inativo' : ''} ${mb_activoId === m.id ? 'active' : ''}"
                    onclick="mb_selectMembro('${m.id}')">
                    ${foto}
                    <div class="mb-list-info">
                        <div class="mb-list-nome">${m.nome}</div>
                        <div class="mb-list-sub">${sub || m.email || '—'}</div>
                        ${minsLine}
                        ${badges.length ? `<div class="mb-list-badges">${badges.join('')}</div>` : ''}
                    </div>
                </div>`;
                });
            });
            list.innerHTML = html;
        }

        /* ── FILTROS ─────────────────────────────────────── */
        function mb_toggleChip(el, filtro) {
            if (el.classList.toggle('active')) mb_filtros.add(filtro);
            else mb_filtros.delete(filtro);
            mb_filtrar();
        }

        function mb_clearFiltros() {
            mb_filtros.clear();
            document.querySelectorAll('.mb-filtro-chip.active').forEach(c => c.classList.remove('active'));
            const s = document.getElementById('mb-search');
            if (s) s.value = '';
            mb_filtrar();
        }

        function mb_filtrar() {
            mb_renderSide();
        }

        /* ── SELECIONAR MEMBRO ───────────────────────────── */
        function mb_selectMembro(id) {
            mb_activoId = id;
            mb_editMode = false;
            mb_isNovo = false;
            mb_panelTab = 'info';
            mb_renderSide();
            mb_renderPerfil();

                    <circle cx="9" cy="7" r="4"/>
                </svg>
            </div>
            <div class="mb-empty-title">Selecciona um registo</div>

            // badges de cursos no header
            let cursosHeader = [];

                cursosHeader = ((typeof r === 'string' ? JSON.parse(r) : r) || []).filter(c => !c.status || c.status === 'concluido');

            }


            const headerCursosHtml = cursosHeader.length ? `
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;align-items:center">

                return `<div title="${nome}" style="display:flex;flex-direction:column;align-items:center;gap:4px;

                    <div style="width:40px;height:40px;position:relative;display:flex;align-items:center;justify-content:center">

            const tabLabels = {

        async function mb_salvar(id) {
            const body = {};

            const campos_simples = [
                'nome', 'email', 'telefone', 'genero', 'data_nascimento', 'estado_civil', 'nif', 'tipo',
                'data_entrada', 'link_id', 'onde_conheceu', 'zona', 'data_batismo', 'conjuge_id',
                'rua', 'numero', 'complemento', 'codigo_postal', 'cidade', 'pais', 'historia',
                'escolaridade', 'profissao', 'resenha_livro_url', 'antecedentes_br_url', 
                'antecedentes_pt_url', 'termo_compromisso_url',
            ];
            campos_simples.forEach(k => {
                const el = document.getElementById('mf_' + k);
                if (el) body[k] = el.value?.trim() || null;
            });

            const fotoHidden = document.getElementById('mf_foto_url');
            if (fotoHidden) body.foto_url = fotoHidden.value || null;

            if (document.getElementById('mb-chips-idiomas')) {
                body['Idiomas'] = _mb_editIdiomas.length ? JSON.stringify(_mb_editIdiomas) : null;
                body['nacionalidade'] = _mb_editNacs.length ? JSON.stringify(_mb_editNacs) : null;
            }

            const checkboxes = [
                'e_lider',
                'e_presbitero',
                'e_lider_link',
                'e_lider_area',
                'e_lider_pilar',
                'e_voluntario',
                'professor',
                'pastor',
                'office',
                'e_jornada',
                'e_gerenciamento',
                'e_dizimista',
                'e_admin',
                'e_escala',
                'e_hub',
                'foi_batizado',
                'fez_processo_raizes',
                'fez_workshop_raizes',
                'fez_retiro_raizes',
                'acesso_pdv',
                'ativo',
            ];
            checkboxes.forEach(k => {
                const el = document.getElementById('mf_' + k);
                if (el) body[k] = el.checked;
            });

            if (!body.nome && mb_panelTab === 'info') {
                mb_showMsg('Nome obrigatório.', 'error');
                return;
            }

            const btn = document.getElementById('mb-btn-save');
            if (btn) {
                btn.disabled = true;
                btn.textContent = 'A guardar...';
            }

            try {
                if (!id) {
                    body.ativo = true;
                    await sb('membros', {method: 'POST', body: JSON.stringify(body)});
                } else {
                    const patch = Object.fromEntries(Object.entries(body).filter(([, v]) => v !== undefined));
                    await sb(`membros?id=eq.${id}`, {method: 'PATCH', body: JSON.stringify(patch)});
                }
                mb_showMsg('Guardado com sucesso!', 'success');
                mb_membros = await sb('membros?select=*&order=nome') || [];
                await mb_recarregarFamilia();
                if (!id) {
                    mb_activoId = null;
                    mb_editMode = false;
                    mb_isNovo = false;
                    mb_renderSide();
                    mb_showEmpty();
                } else {
                    mb_editMode = false;
                    mb_renderSide();
                    mb_renderPerfil();
                }
            } catch (e) {
                mb_showMsg(`Erro: ${e?.message || e?.details || JSON.stringify(e)}`, 'error');
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = 'Guardar';
                }
            }
        }

        function mb_showMsg(txt, tipo) {
            const el = document.getElementById('mb-form-msg');
            if (!el) return;
            el.textContent = txt;
            el.className = `mb-msg ${tipo}`;
            el.scrollIntoView({behavior: 'smooth', block: 'nearest'});
        }

        /* ── TOGGLE ATIVO ────────────────────────────────── */
        async function mb_toggleAtivo(id, ativoAtual) {
            if (!confirm(`${ativoAtual ? 'Inativar' : 'Ativar'} este membro?`)) return;
            await sb(`membros?id=eq.${id}`, {method: 'PATCH', body: JSON.stringify({ativo: !ativoAtual})});
            mb_membros = await sb('membros?select=*&order=nome') || [];
            mb_renderSide();
            mb_renderPerfil();
        }

        /* ── NOVO MEMBRO ─────────────────────────────────── */
        function mb_novoMembro() {
            mb_activoId = null;
            mb_editMode = true;
            mb_isNovo = true;
            mb_panelTab = 'info';
            const panel = document.getElementById('mb-panel');
            if (!panel) return;
            panel.innerHTML = `
        <div class="mb-profile-header">
            <div class="mb-profile-foto">+</div>
            <div class="mb-profile-info">
                <div class="mb-profile-nome">Novo Membro</div>
                <div class="mb-profile-sub">Preenche o formulário abaixo</div>
            </div>
        </div>
        <div class="mb-panel-inner" id="mb-panel-content">${mb_buildForm(null)}</div>`;
        }

        /* ── FOTO ────────────────────────────────────────── */
        function mb_triggerFoto() {
            document.getElementById('mb-foto-file')?.click();
        }

        function mb_applyFotoUrl() {
            const url = document.getElementById('mf_foto_url_txt')?.value?.trim();
            if (!url) return;
            document.getElementById('mf_foto_url').value = url;
            const box = document.getElementById('mb-img-box');
            if (box) box.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.innerHTML='URL inválido'">`;
        }

        async function mb_handleFoto(input) {
            const file = input.files?.[0];
            if (!file) return;
            const box = document.getElementById('mb-img-box');
            if (box) box.innerHTML = `<span style="font-size:11px;color:var(--text-faint)">A fazer upload...</span>`;
            try {
                const filename = `membros/${Date.now()}.jpg`;
                const res = await fetch(`${SUPA_URL}/storage/v1/object/imagens/${filename}`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPA_KEY,
                        'Authorization': `Bearer ${SUPA_KEY}`,
                        'Content-Type': 'image/jpeg',
                        'x-upsert': 'true'
                    },
                    body: file,
                });
                if (!res.ok) throw new Error('Upload falhou');
                const url = `${SUPA_URL}/storage/v1/object/public/imagens/${filename}`;
                document.getElementById('mf_foto_url').value = url;
                const txt = document.getElementById('mf_foto_url_txt');
                if (txt) txt.value = url;
                if (box) box.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover">`;
            } catch (e) {
                if (box) box.innerHTML = `<span style="color:#ff8a80;font-size:11px">Erro: ${e.message}</span>`;
            }
            input.value = '';
        }

        /* ── MINISTÉRIOS ─────────────────────────────────── */
        async function mb_addMinisterio(membroId) {
            const minId = document.getElementById('mb-add-min-id')?.value;
            const papel = document.getElementById('mb-add-min-papel')?.value?.trim();
            if (!minId) {
                alert('Seleciona um ministério.');
                return;
            }
            const mins = mb_membros_min[membroId] || [];
            const minObj = mb_ministerios_cache.find(m => m.id === minId);
            if (mins.some(mv => mv.nome === minObj?.nome)) {
                alert('Já associado.');
                return;
            }
            try {
                await sb('membro_ministerios', {
                    method: 'POST',
                    body: JSON.stringify({membro_id: membroId, ministerio_id: minId, papel: papel || null, ativo: true})
                });
                const vincs = await sb(`membro_ministerios?select=*,ministerios(id,nome,tipo)&membro_id=eq.${membroId}&ativo=eq.true`);
                mb_membros_min[membroId] = (vincs || []).map(v => ({
                    id_vinc: v.id,
                    tipo: v.ministerios?.tipo || '?',
                    nome: v.ministerios?.nome || '—',
                    papel: v.papel || ''
                }));
                mb_panelTab = 'ministerios';
                mb_renderPerfil();
            } catch (e) {
                alert('Erro: ' + JSON.stringify(e));
            }
        }

        async function mb_removerMinisterio(vinculoId, membroId) {
            if (!confirm('Remover este ministério?')) return;
            try {
                await sb('membro_ministerios?id=eq.' + vinculoId, {method: 'DELETE'});
                const rows = await sb('membro_ministerios?select=id,ministerio_id,papel,ministerios(id,nome,tipo)&membro_id=eq.' + membroId).catch(() => []);
                mb_membros_min[membroId] = (rows || []).map(r => ({
                    id_vinc: r.id,
                    id: r.ministerio_id,
                    nome: r.ministerios?.nome || '',
                    tipo: r.ministerios?.tipo || 'ministerio',
                    papel: r.papel || ''
                }));
                mb_panelTab = 'ministerios';
                mb_renderPerfil();
            } catch (e) {
                alert('Erro: ' + JSON.stringify(e));
            }
        }

        function mb_showMinDropdown() {
            mb_filterMinDropdown();
            const dd = document.getElementById('mb-min-dropdown');
            if (dd) dd.style.display = 'block';
        }

        function mb_hideMinDropdown() {
            const dd = document.getElementById('mb-min-dropdown');
            if (dd) dd.style.display = 'none';
        }

        function mb_filterMinDropdown() {
            const q = (document.getElementById('mb-add-min-text')?.value || '').toLowerCase();
            const dd = document.getElementById('mb-min-dropdown');
            if (!dd) return;
            dd.style.display = 'block';
            dd.querySelectorAll('.mb-min-opt').forEach(opt => {
                opt.style.display = (opt.dataset.nome || '').toLowerCase().includes(q) ? '' : 'none';
            });
        }

        function mb_selectMinItem(id, nome) {
            const txt = document.getElementById('mb-add-min-text');
            const hid = document.getElementById('mb-add-min-id');
            if (txt) txt.value = nome;
            if (hid) hid.value = id;
            mb_hideMinDropdown();
        }

        /* ── LINK ────────────────────────────────────────── */
        async function mb_salvarLink(membroId) {
            const sel = document.getElementById('mb-link-sel');
            const linkId = sel?.value || null;
            const msg = document.getElementById('mb-link-msg');
            try {
                await sb('membros?id=eq.' + membroId, {
                    method: 'PATCH',
                    body: JSON.stringify({link_id: linkId || null})
                });
                const idx = mb_membros.findIndex(x => x.id === membroId);
                if (idx >= 0) mb_membros[idx].link_id = linkId || null;
                if (msg) {
                    msg.style.color = 'var(--primary)';
                    msg.textContent = 'Link guardado!';
                }
                setTimeout(() => {
                    if (msg) msg.textContent = '';
                }, 2000);
                mb_renderPerfil();
            } catch (e) {
                if (msg) {
                    msg.style.color = '#ff8a80';
                    msg.textContent = 'Erro: ' + (e?.message || JSON.stringify(e));
                }
            }
        }

        /* ── CURSOS ──────────────────────────────────────── */
        async function mb_addCurso(membroId) {
            const sel = document.getElementById('mb-add-curso-id');
            const cursoId = sel?.value;
            const cursoNome = sel?.options[sel.selectedIndex]?.dataset?.nome || sel?.options[sel.selectedIndex]?.text || '';
            const data = document.getElementById('mb-add-curso-data')?.value || null;
            if (!cursoId) {
                alert('Seleciona um curso.');
                return;
            }
            const mem = mb_membros.find(x => x.id === membroId);
            if (!mem) return;
            let cursos = [];
            try {
                cursos = JSON.parse(mem.cursos_concluidos || '[]') || [];
            } catch (_) {
            }
            if (cursos.some(r => r.curso_id === cursoId)) {
                alert('Curso já adicionado.');
                return;
            }

            const status = document.getElementById('mb-add-curso-status')?.value || 'concluido';
            const dataInicio = document.getElementById('mb-add-curso-data-inicio')?.value || null;
            cursos.push({
                curso_id: cursoId,
                nome: cursoNome,
                status,
                data_inicio: dataInicio || null,
                data: data || null
            });

            try {
                await sb('membros?id=eq.' + membroId, {
                    method: 'PATCH',
                    body: JSON.stringify({cursos_concluidos: JSON.stringify(cursos)})
                });
                const idx = mb_membros.findIndex(x => x.id === membroId);
                if (idx >= 0) mb_membros[idx].cursos_concluidos = JSON.stringify(cursos);
                mb_panelTab = 'cursos';
                mb_renderPerfil();
            } catch (e) {
                alert('Erro: ' + (e?.message || JSON.stringify(e)));
            }
        }

        async function mb_removerCurso(cursoIdx, membroId) {
            if (!confirm('Remover este curso?')) return;
            const mem = mb_membros.find(x => x.id === membroId);
            if (!mem) return;
            let cursos = [];
            try {
                cursos = JSON.parse(mem.cursos_concluidos || '[]') || [];
            } catch (_) {
            }
            cursos.splice(cursoIdx, 1);
            try {
                await sb('membros?id=eq.' + membroId, {
                    method: 'PATCH',
                    body: JSON.stringify({cursos_concluidos: JSON.stringify(cursos)})
                });
                const idx = mb_membros.findIndex(x => x.id === membroId);
                if (idx >= 0) mb_membros[idx].cursos_concluidos = JSON.stringify(cursos);
                mb_panelTab = 'cursos';
                mb_renderPerfil();
            } catch (e) {
                alert('Erro: ' + (e?.message || JSON.stringify(e)));
            }
        }

        /* ── FAMÍLIA ─────────────────────────────────────── */
        async function mb_addFilho(paiId) {
            const filhoId = document.getElementById('mb-add-filho-id')?.value;
            if (!filhoId) {
                alert('Seleciona um membro como filho.');
                return;
            }
            if ((mb_familia_cache[paiId]?.filhos || []).some(f => f.id === filhoId)) {
                alert('Já associado.');
                return;
            }
            try {
                await sb('membros_filhos', {method: 'POST', body: JSON.stringify({pai_id: paiId, filho_id: filhoId})});
                const paiMem = mb_membros.find(x => x.id === paiId);
                if (paiMem) {
                    const campo = paiMem.genero === 'feminino' ? 'mae_id' : 'pai_id';
                    await sb('membros?id=eq.' + filhoId, {method: 'PATCH', body: JSON.stringify({[campo]: paiId})});
                    const fi = mb_membros.findIndex(x => x.id === filhoId);
                    if (fi >= 0) mb_membros[fi][campo] = paiId;
                }
                await mb_recarregarFamilia();
                mb_panelTab = 'filhos';
                mb_renderPerfil();
            } catch (e) {
                alert('Erro: ' + (e?.message || JSON.stringify(e)));
            }
        }

        async function mb_removerFilho(paiId, filhoId) {
            if (!confirm('Remover esta ligação familiar?')) return;
            try {
                await sb('membros_filhos?pai_id=eq.' + paiId + '&filho_id=eq.' + filhoId, {method: 'DELETE'});
                const paiMem = mb_membros.find(x => x.id === paiId);
                if (paiMem) {
                    const campo = paiMem.genero === 'feminino' ? 'mae_id' : 'pai_id';
                    await sb('membros?id=eq.' + filhoId, {method: 'PATCH', body: JSON.stringify({[campo]: null})});
                    const fi = mb_membros.findIndex(x => x.id === filhoId);
                    if (fi >= 0) mb_membros[fi][campo] = null;
                }
                await mb_recarregarFamilia();
                mb_panelTab = 'filhos';
                mb_renderPerfil();
            } catch (e) {
                alert('Erro: ' + (e?.message || JSON.stringify(e)));
            }
        }

        async function mb_recarregarFamilia() {
            const rels = await sb('membros_filhos?select=pai_id,filho_id').catch(() => []);
            mb_membros.forEach(mem => {
                const conjuge = mem.conjuge_id ? mb_membros.find(x => x.id === mem.conjuge_id) || null : null;
                const pai = mem.pai_id ? mb_membros.find(x => x.id === mem.pai_id) || null : null;
                const mae = mem.mae_id ? mb_membros.find(x => x.id === mem.mae_id) || null : null;
                const filhosIds = (rels || []).filter(r => r.pai_id === mem.id).map(r => r.filho_id);
                const filhos = filhosIds.map(fid => mb_membros.find(x => x.id === fid)).filter(Boolean);
                mb_familia_cache[mem.id] = {conjuge, pai, mae, filhos};
            });
        }

        /* ── EXPOR PUBLICAMENTE ──────────────────────────── */
        window.mb_init = mb_init;
        window.mb_filtrar = mb_filtrar;
        window.mb_toggleChip = mb_toggleChip;
        window.mb_clearFiltros = mb_clearFiltros;
        window.mb_novoMembro = mb_novoMembro;
        window.mb_selectMembro = mb_selectMembro;
        window.mb_setPanelTab = mb_setPanelTab;
        window.mb_startEdit = mb_startEdit;
        window.mb_cancelEdit = mb_cancelEdit;
        window.mb_salvar = mb_salvar;
        window.mb_toggleAtivo = mb_toggleAtivo;
        window.mb_triggerFoto = mb_triggerFoto;
        window.mb_handleFoto = mb_handleFoto;
        window.mb_applyFotoUrl = mb_applyFotoUrl;
        window.mb_addMinisterio = mb_addMinisterio;
        window.mb_removerMinisterio = mb_removerMinisterio;
        window.mb_salvarLink = mb_salvarLink;
        window.mb_addCurso = mb_addCurso;
        window.mb_removerCurso = mb_removerCurso;
        window.mb_addFilho = mb_addFilho;
        window.mb_removerFilho = mb_removerFilho;
        window.mb_recarregarFamilia = mb_recarregarFamilia;
        window.mb_showMinDropdown = mb_showMinDropdown;
        window.mb_hideMinDropdown = mb_hideMinDropdown;
        window.mb_filterMinDropdown = mb_filterMinDropdown;
        window.mb_selectMinItem = mb_selectMinItem;
        window.mb_addChip = mb_addChip;
        window.mb_delChip = mb_delChip;

        mb_init();
    })();
</script>
