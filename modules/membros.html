<style>
/* ══════════════════════════════════════════════════════
   MEMBROS MODULE
   Layout: sidebar filtros + conteúdo principal
   3 abas: Dashboard / Membros / Visitantes
   ══════════════════════════════════════════════════════ */

.mb-wrap {
    display: flex;
    height: 100%;
    min-height: 0;
    overflow: hidden;
    font-family: var(--font-body);
}

/* ── SIDEBAR ──────────────────────────────────────── */
.mb-side {
    width: 380px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--bg-card);
    overflow: hidden;
}

.mb-side-head {
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}

.mb-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
}
.mb-tab {
    flex: 1;
    padding: 6px 4px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-input);
    font-family: var(--font-title);
    font-size: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-faint);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
}
.mb-tab.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
}
.mb-tab:hover:not(.active) {
    border-color: var(--primary);
    color: var(--primary-dark);
}

.mb-search {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 12px;
    font-family: var(--font-body);
    color: var(--text-main);
    outline: none;
    box-sizing: border-box;
    margin-bottom: 6px;
}
.mb-search:focus { border-color: var(--primary); }

/* Filtros avançados */
.mb-filtros {
    display: flex;
    flex-direction: column;
    gap: 4px;
}
.mb-filtros-titulo {
    font-family: var(--font-title);
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 2px 0;
}
.mb-filtro-grupo {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
}
.mb-filtro-chip {
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    font-size: 10px;
    color: var(--text-faint);
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
    font-family: var(--font-body);
}
.mb-filtro-chip:hover { border-color: var(--primary); color: var(--primary-dark); }
.mb-filtro-chip.active {
    background: var(--primary-faint);
    border-color: var(--primary);
    color: var(--primary-dark);
    font-weight: 700;
}
.mb-filtro-chip.chip-red.active {
    background: rgba(198,40,40,0.08);
    border-color: rgba(198,40,40,0.4);
    color: #c62828;
}
.mb-filtro-chip.chip-green.active {
    background: rgba(46,125,50,0.08);
    border-color: rgba(46,125,50,0.4);
    color: #2e7d32;
}

.mb-filtro-select {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 8px;
    font-size: 11px;
    font-family: var(--font-body);
    color: var(--text-main);
    outline: none;
    box-sizing: border-box;
    cursor: pointer;
}
.mb-filtro-select:focus { border-color: var(--primary); }

.mb-filtro-clear {
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px dashed var(--border);
    background: none;
    font-size: 10px;
    color: var(--text-faint);
    cursor: pointer;
    font-family: var(--font-body);
    transition: all 0.12s;
    width: 100%;
    margin-top: 2px;
}
.mb-filtro-clear:hover { color: var(--red); border-color: var(--red); }

.mb-count {
    font-size: 10px;
    color: var(--text-faint);
    padding: 4px 0 0;
    text-align: right;
}

/* Lista de membros */
.mb-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
}
.mb-list-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
    border: 1px solid transparent;
}
.mb-list-item:hover { background: var(--primary-faint); }
.mb-list-item.active {
    background: var(--primary-faint);
    border-color: var(--primary);
}
.mb-list-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
    overflow: hidden;
    background: var(--primary-faint);
    color: var(--primary-dark);
}
.mb-list-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.mb-list-info { flex: 1; min-width: 0; }
.mb-list-nome {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-main);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.mb-list-sub {
    font-size: 11px;
    color: var(--text-faint);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
}
.mb-list-badges { display: flex; gap: 3px; margin-top: 2px; flex-wrap: wrap; }
.mb-list-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 4px;
}

/* Secção separadora na lista */
.mb-list-sep {
    font-family: var(--font-title);
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 8px 8px 3px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
}
.mb-list-sep:first-child { border-top: none; margin-top: 0; }

/* Novo membro btn */
.mb-btn-novo {
    width: calc(100% - 12px);
    margin: 6px;
    padding: 7px;
    border-radius: 8px;
    border: 1px dashed var(--primary);
    background: var(--primary-faint);
    color: var(--primary-dark);
    font-family: var(--font-title);
    font-size: 9px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
}
.mb-btn-novo:hover { background: var(--primary); color: #fff; border-style: solid; }

/* ── PAINEL DIREITO ───────────────────────────────── */
.mb-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
}

.mb-panel-inner {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
}

/* Empty state */
.mb-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
    color: var(--text-faint);
    text-align: center;
    padding: 40px;
}
.mb-empty-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--bg-input);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: var(--text-faint);
}
.mb-empty-title {
    font-family: var(--font-title);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-faint);
}

/* ── PERFIL DO MEMBRO ─────────────────────────────── */
.mb-profile-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg-card);
}
.mb-profile-foto {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    background: var(--primary-faint);
    color: var(--primary-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    border: 2px solid var(--border);
}
.mb-profile-foto img { width: 100%; height: 100%; object-fit: cover; }
.mb-profile-info { flex: 1; min-width: 0; }
.mb-profile-nome {
    font-family: var(--font-title);
    font-size: 16px;
    color: var(--primary-dark);
    letter-spacing: 1px;
    margin-bottom: 3px;
}
.mb-profile-sub { font-size: 12px; color: var(--text-faint); margin-bottom: 5px; }
.mb-profile-badges { display: flex; flex-wrap: wrap; gap: 4px; }
.mb-profile-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
}

/* Sub-tabs dentro do painel */
.mb-panel-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg-card);
    flex-shrink: 0;
    overflow-x: auto;
}
.mb-panel-tab {
    padding: 8px 14px;
    font-family: var(--font-title);
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-faint);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.12s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
}
.mb-panel-tab:hover { color: var(--primary-dark); }
.mb-panel-tab.active {
    color: var(--primary-dark);
    border-bottom-color: var(--primary);
}

/* Grid de dados */
.mb-data-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
}
.mb-data-full { grid-column: 1 / -1; }
.mb-data-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
}
.mb-data-card-title {
    font-family: var(--font-title);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
}
.mb-field-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    gap: 8px;
}
.mb-field-row:last-child { border-bottom: none; }
.mb-field-label {
    font-size: 10px;
    color: var(--text-faint);
    flex-shrink: 0;
    min-width: 90px;
    font-family: var(--font-title);
    letter-spacing: 0.5px;
}
.mb-field-val {
    font-size: 12px;
    color: var(--text-main);
    text-align: right;
    word-break: break-word;
}
.mb-field-val.empty { color: var(--text-faint); font-style: italic; }

/* Stat cards no dashboard */
.mb-stat-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 12px;
}
.mb-stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 12px;
    text-align: center;
}
.mb-stat-num {
    font-family: var(--font-title);
    font-size: 26px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
}
.mb-stat-label {
    font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* Formulário inline no painel */
.mb-form { display: flex; flex-direction: column; gap: 0; }
.mb-form-section {
    font-family: var(--font-title);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 10px 0 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    margin-top: 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.mb-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.mb-form-full { grid-column: 1 / -1; }
.mb-form-group { display: flex; flex-direction: column; gap: 3px; }
.mb-form-label { font-size: 10px; color: var(--text-faint); font-family: var(--font-title); letter-spacing: 0.5px; }
.mb-form-input {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 12px;
    font-family: var(--font-body);
    color: var(--text-main);
    outline: none;
    transition: border-color 0.15s;
}
.mb-form-input:focus { border-color: var(--primary); }
.mb-form-input[readonly] { opacity: 0.6; cursor: not-allowed; }
.mb-form-select {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 12px;
    font-family: var(--font-body);
    color: var(--text-main);
    outline: none;
}
.mb-form-select:focus { border-color: var(--primary); }
.mb-form-textarea {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 12px;
    font-family: var(--font-body);
    color: var(--text-main);
    outline: none;
    resize: vertical;
    min-height: 70px;
}
.mb-form-textarea:focus { border-color: var(--primary); }
.mb-form-toggle {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--text-main);
    cursor: pointer;
    padding: 7px 0;
}
.mb-form-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    margin-top: 8px;
}
.mb-btn-cancel {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    font-family: var(--font-title);
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--text-faint);
    cursor: pointer;
}
.mb-btn-save {
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    background: var(--primary);
    color: #fff;
    font-family: var(--font-title);
    font-size: 9px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.15s;
}
.mb-btn-save:hover { background: var(--primary-dark); }
.mb-btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
.mb-btn-danger {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid rgba(198,40,40,0.3);
    background: rgba(198,40,40,0.06);
    color: var(--red);
    font-family: var(--font-title);
    font-size: 9px;
    letter-spacing: 1px;
    cursor: pointer;
}
.mb-btn-edit {
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    font-family: var(--font-title);
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.12s;
}
.mb-btn-edit:hover { border-color: var(--primary); color: var(--primary-dark); }

/* Msg */
.mb-msg {
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    margin-bottom: 8px;
    display: none;
}
.mb-msg.error { display: block; background: rgba(198,40,40,0.1); color: #c62828; border: 1px solid rgba(198,40,40,0.3); }
.mb-msg.success { display: block; background: rgba(46,125,50,0.1); color: #2e7d32; border: 1px solid rgba(46,125,50,0.3); }

/* Ministérios do membro */
.mb-min-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 4px;
    font-size: 12px;
}
.mb-min-nome { flex: 1; font-size: 12px; color: var(--text-main); }
.mb-min-papel { font-size: 10px; color: var(--text-faint); }
.mb-min-remove {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: none;
    background: rgba(198,40,40,0.1);
    color: var(--red);
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

/* Sub-add row */
.mb-sub-add {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 6px;
}

/* Visitante card */
.mb-vis-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 6px;
    transition: border-color 0.12s;
}
.mb-vis-row:hover { border-color: var(--primary); }
.mb-vis-info { flex: 1; min-width: 0; }
.mb-vis-nome { font-size: 13px; font-weight: 600; color: var(--text-main); }
.mb-vis-sub { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
.mb-vis-actions { display: flex; gap: 5px; flex-shrink: 0; }

/* Aniversário */
.mb-aniv-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    margin-bottom: 6px;
}

/* Inativo */
.mb-list-item.inativo .mb-list-nome { opacity: 0.5; }
.mb-list-item.inativo .mb-list-avatar { opacity: 0.4; }

/* Loading */
.mb-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    color: var(--text-faint);
    font-size: 12px;
    gap: 10px;
}

/* Badges inline */
.mb-badge {
    padding: 2px 7px;
    border-radius: 20px;
    font-size: 9px;
    font-family: var(--font-title);
    letter-spacing: 0.5px;
    white-space: nowrap;
}
.mb-badge-red    { background: rgba(198,40,40,0.1); color: #c62828; border: 1px solid rgba(198,40,40,0.25); }
.mb-badge-green  { background: rgba(46,125,50,0.1); color: #2e7d32; border: 1px solid rgba(46,125,50,0.25); }
.mb-badge-blue   { background: rgba(0,100,180,0.1); color: #0064b4; border: 1px solid rgba(0,100,180,0.25); }
.mb-badge-teal   { background: var(--primary-faint); color: var(--primary-dark); border: 1px solid rgba(0,144,152,0.25); }
.mb-badge-gray   { background: var(--bg-input); color: var(--text-faint); border: 1px solid var(--border); }
.mb-badge-orange { background: rgba(230,81,0,0.08); color: #e65100; border: 1px solid rgba(230,81,0,0.25); }

/* Image upload */
.mb-img-box {
    width: 100%;
    height: 180px;
    border: 2px dashed var(--border);
    border-radius: 10px;
    background: var(--bg-input);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: border-color 0.2s;
    position: relative;
}
.mb-img-box:hover { border-color: var(--primary); }
.mb-img-box img { width: 100%; height: 100%; object-fit: cover; }
</style>

<!-- ═══════════════════════════════════════════════════════
     MEMBROS MODULE HTML
     ═══════════════════════════════════════════════════════ -->
<div class="mb-wrap" id="mb-wrap">

    <!-- SIDEBAR -->
    <div class="mb-side" id="mb-side">
        <div class="mb-side-head">
            <!-- Tabs principais -->
            <div class="mb-tabs">
                <button class="mb-tab active" id="mb-tab-dash"      onclick="mb_setTab('dash')">Painel</button>
                <button class="mb-tab"        id="mb-tab-membros"   onclick="mb_setTab('membros')">Membros</button>
                <button class="mb-tab"        id="mb-tab-visitantes" onclick="mb_setTab('visitantes')">Visitantes</button>
            </div>

            <!-- Pesquisa (só na aba membros e visitantes) -->
            <div id="mb-search-wrap">
                <input class="mb-search" id="mb-search" type="text"
                       placeholder="Pesquisar nome, email, tel..."
                       oninput="mb_filtrar()">
            </div>

            <!-- Filtros avançados (só na aba membros) -->
            <div class="mb-filtros" id="mb-filtros-wrap">
                <div class="mb-filtros-titulo">Funções</div>
                <div class="mb-filtro-grupo">
                    <button class="mb-filtro-chip" data-filtro="e_lider"      onclick="mb_toggleChip(this,'e_lider')">Lider</button>
                    <button class="mb-filtro-chip" data-filtro="e_presbitero" onclick="mb_toggleChip(this,'e_presbitero')">Presbitero</button>
                    <button class="mb-filtro-chip" data-filtro="e_voluntario" onclick="mb_toggleChip(this,'e_voluntario')">Voluntario</button>
                    <button class="mb-filtro-chip" data-filtro="professor"    onclick="mb_toggleChip(this,'professor')">Professor</button>
                    <button class="mb-filtro-chip" data-filtro="pastor"       onclick="mb_toggleChip(this,'pastor')">Pastor</button>
                    <button class="mb-filtro-chip" data-filtro="office"       onclick="mb_toggleChip(this,'office')">Office</button>
                    <button class="mb-filtro-chip" data-filtro="e_lider_link" onclick="mb_toggleChip(this,'e_lider_link')">Lider Link</button>
                    <button class="mb-filtro-chip" data-filtro="e_lider_area" onclick="mb_toggleChip(this,'e_lider_area')">Lider Area</button>
                    <button class="mb-filtro-chip" data-filtro="e_lider_pilar" onclick="mb_toggleChip(this,'e_lider_pilar')">Lider Pilar</button>
                </div>

                <div class="mb-filtros-titulo" style="margin-top:8px">Estado</div>
                <div class="mb-filtro-grupo">
                    <button class="mb-filtro-chip chip-green" data-filtro="ativo"    onclick="mb_toggleChip(this,'ativo')">Ativos</button>
                    <button class="mb-filtro-chip chip-red"   data-filtro="inativo"  onclick="mb_toggleChip(this,'inativo')">Inativos</button>
                    <button class="mb-filtro-chip"            data-filtro="batizado" onclick="mb_toggleChip(this,'batizado')">Batizados</button>
                    <button class="mb-filtro-chip"            data-filtro="casado"   onclick="mb_toggleChip(this,'casado')">Casados</button>
                    <button class="mb-filtro-chip"            data-filtro="tem_filhos" onclick="mb_toggleChip(this,'tem_filhos')">Com Filhos</button>
                </div>

                <div class="mb-filtros-titulo" style="margin-top:8px">Genero</div>
                <div class="mb-filtro-grupo">
                    <button class="mb-filtro-chip" data-filtro="masculino" onclick="mb_toggleChip(this,'masculino')">Masculino</button>
                    <button class="mb-filtro-chip" data-filtro="feminino"  onclick="mb_toggleChip(this,'feminino')">Feminino</button>
                </div>

                <button class="mb-filtro-clear" onclick="mb_clearFiltros()">Limpar todos os filtros</button>
                <div class="mb-count" id="mb-count"></div>
            </div>
        </div>

        <!-- Lista -->
        <div class="mb-list" id="mb-list">
            <div class="mb-loading"><div class="spin"></div>A carregar...</div>
        </div>

        <!-- Botão novo -->
        <button class="mb-btn-novo" id="mb-btn-novo" onclick="mb_novoMembro()">+ Novo Membro</button>
    </div>

    <!-- PAINEL PRINCIPAL -->
    <div class="mb-panel" id="mb-panel">
        <div class="mb-empty" id="mb-empty-state">
            <div class="mb-empty-icon">
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
            </div>
            <div class="mb-empty-title">Selecciona um membro</div>
            <div style="font-size:12px;color:var(--text-faint);max-width:220px;line-height:1.6">
                Usa os filtros da barra lateral para encontrar um membro, ou clica em + Novo.
            </div>
        </div>
    </div>
</div>

<script>
(function() {
// ══════════════════════════════════════════════════════
// MEMBROS MODULE — estado
// ══════════════════════════════════════════════════════
let mb_membros       = [];   // todos os membros
let mb_visitantes    = [];   // todos os visitantes
let mb_ministerios   = [];   // para o select de filtro e form
let mb_links_cache   = [];   // links para select
let mb_ministerios_cache = [];
let mb_cursos_cache  = [];
let mb_membros_min   = {};   // membro_id -> [{tipo,nome,papel}]
let mb_familia_cache = {};   // membro_id -> {conjuge,pai,mae,filhos[]}

let mb_tab         = 'dash';       // dash | membros | visitantes
let mb_activoId    = null;         // id do membro/visitante activo
let mb_panelTab    = 'info';       // tab dentro do painel: info | morada | funcoes | ministerios | historia
let mb_editMode    = false;        // painel em modo edição
let mb_isNovo      = false;

// Filtros activos
let mb_filtros = new Set();
let mb_filtroMin   = '';

// ── sb helper (herdado do admin) ──────────────────────
function sb(path, opts = {}) {
    return fetch(`${SUPA_URL}/rest/v1/${path}`, {
        ...opts,
        headers: {
            'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`,
            'Content-Type': 'application/json', 'Prefer': 'return=representation',
            ...opts.headers,
        },
    }).then(async r => {
        if (!r.ok) { const e = await r.json().catch(() => {}); throw e; }
        const txt = await r.text();
        return txt ? JSON.parse(txt) : [];
    });
}

// ── INIT ─────────────────────────────────────────────
async function mb_init() {
    try {
        const [mems, vis, mins, links, cursos] = await Promise.all([
            sb('membros?select=*&order=nome'),
            sb('visitantes?select=*&order=nome'),
            sb('ministerios?select=id,nome,tipo&ativo=eq.true&order=nome'),
            sb('links?select=id,nome&ativo=eq.true&order=nome'),
            sb('zao_cursos?select=id,nome&ativo=eq.true&order=nome').catch(() => []),
        ]);
        mb_membros      = mems  || [];
        mb_visitantes   = vis   || [];
        mb_ministerios  = mins  || [];
        mb_links_cache  = links || [];
        mb_ministerios_cache = mins || [];
        mb_cursos_cache = cursos || [];

        // Carregar ministérios de todos os membros activos
        const ids = mb_membros.filter(m => m.ativo !== false).map(m => m.id);
        if (ids.length) {
            const vincs = await sb(`membro_ministerios?select=id,membro_id,papel,ministerios(id,nome,tipo)&membro_id=in.(${ids.join(',')})&ativo=eq.true`).catch(() => []);
            mb_membros_min = {};
            (vincs || []).forEach(v => {
                if (!mb_membros_min[v.membro_id]) mb_membros_min[v.membro_id] = [];
                mb_membros_min[v.membro_id].push({
                    tipo: v.ministerios?.tipo || '?',
                    nome: v.ministerios?.nome || '—',
                    papel: v.papel || '',
                    id_vinc: v.id,
                });
            });
        }

        // Carregar relações familiares via membros_filhos
                const relsFamiliar = await sb('membros_filhos?select=pai_id,filho_id').catch(() => []);
                mb_familia_cache = {};
                mb_membros.forEach(mem => {
                    const conjuge = mem.conjuge_id
                        ? mb_membros.find(x => x.id === mem.conjuge_id) || null : null;
                    const pai = mem.pai_id
                        ? mb_membros.find(x => x.id === mem.pai_id) || null : null;
                    const mae = mem.mae_id
                        ? mb_membros.find(x => x.id === mem.mae_id) || null : null;
                    const filhosIds = (relsFamiliar || [])
                        .filter(r => r.pai_id === mem.id)
                        .map(r => r.filho_id);
                    const filhos = filhosIds
                        .map(fid => mb_membros.find(x => x.id === fid))
                        .filter(Boolean);
                    mb_familia_cache[mem.id] = { conjuge, pai, mae, filhos };
                });

        // Popular select de ministério no filtro
        const sel = document.getElementById('mb-filtro-min');
        if (sel) {
            mb_ministerios.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.id;
                opt.textContent = `[${m.tipo==='ministerio'?'MIN':'AE'}] ${m.nome}`;
                sel.appendChild(opt);
            });
        }

        mb_renderSide();
        mb_renderDash();
    } catch(e) {
        console.error('mb_init error:', e);
        document.getElementById('mb-list').innerHTML = `<div style="padding:20px;font-size:12px;color:var(--red)">Erro ao carregar: ${e?.message||JSON.stringify(e)}</div>`;
    }
}

// ── TABS ──────────────────────────────────────────────
function mb_setTab(tab) {
    mb_tab = tab;
    mb_activoId = null;
    mb_editMode = false;
    mb_isNovo = false;

    // Update tab buttons
    ['dash','membros','visitantes'].forEach(t => {
        const el = document.getElementById(`mb-tab-${t}`);
        if (el) el.classList.toggle('active', t === tab);
    });

    // Filtros e pesquisa — só visível na aba membros
    const filtrosWrap = document.getElementById('mb-filtros-wrap');
    const searchWrap  = document.getElementById('mb-search-wrap');
    const btnNovo     = document.getElementById('mb-btn-novo');

    if (filtrosWrap) filtrosWrap.style.display = tab === 'membros' ? '' : 'none';
    if (searchWrap)  searchWrap.style.display  = tab !== 'dash'    ? '' : 'none';

    // Limpar filtros ao mudar de aba para não contaminar visitantes/membros
    mb_filtros.clear();
    document.querySelectorAll('.mb-filtro-chip.active').forEach(el => el.classList.remove('active'));
    const selMinT = document.getElementById('mb-filtro-min');
    if (selMinT) selMinT.value = '';
    const srch = document.getElementById('mb-search');
    if (srch) srch.value = '';
    if (btnNovo) {
        btnNovo.style.display = tab === 'dash' ? 'none' : '';
        btnNovo.textContent = tab === 'visitantes' ? '+ Novo Visitante' : '+ Novo Membro';
        btnNovo.onclick = tab === 'visitantes' ? mb_novoVisitante : mb_novoMembro;
    }

    mb_renderSide();

    // Painel
    if (tab === 'dash') {
        mb_renderDash();
    } else {
        mb_showEmpty();
    }
}

// ── RENDER SIDEBAR ────────────────────────────────────
function mb_renderSide() {
    const list = document.getElementById('mb-list');
    if (!list) return;

    if (mb_tab === 'dash') {
        list.innerHTML = `<div style="padding:12px 8px;">
            <div style="font-size:11px;color:var(--text-faint);line-height:1.8">
                Visao geral da comunidade Zion Lisboa.<br>
                Selecciona <strong>Membros</strong> ou <strong>Visitantes</strong> para gerir.
            </div>
        </div>`;
        return;
    }

    if (mb_tab === 'visitantes') {
        mb_renderSideVisitantes();
        return;
    }

    // Tab membros
    const q       = (document.getElementById('mb-search')?.value || '').toLowerCase();
    const filtMin = document.getElementById('mb-filtro-min')?.value || '';

    let lista = [...mb_membros];

    // Filtro de estado (ativo/inativo) — por defeito só ativos se não houver filtro de inativo
    const temInativo = mb_filtros.has('inativo');
    const temAtivo   = mb_filtros.has('ativo');
    if (temInativo && !temAtivo) {
        lista = lista.filter(m => m.ativo === false);
    } else if (!temInativo) {
        lista = lista.filter(m => m.ativo !== false);
    }

    // Filtros de função/genero/estado
    const funcFiltros = ['e_lider','e_presbitero','e_voluntario','professor','pastor','office','e_lider_link','e_lider_area','e_lider_pilar'];
    funcFiltros.forEach(f => {
        if (mb_filtros.has(f)) lista = lista.filter(m => m[f] === true);
    });
    if (mb_filtros.has('batizado'))   lista = lista.filter(m => m.foi_batizado === true);
    if (mb_filtros.has('casado'))     lista = lista.filter(m => m.estado_civil === 'casado');
    if (mb_filtros.has('masculino'))  lista = lista.filter(m => m.genero === 'masculino');
    if (mb_filtros.has('feminino'))   lista = lista.filter(m => m.genero === 'feminino');
    if (mb_filtros.has('tem_filhos')) lista = lista.filter(m => m.tem_filhos === true);



    // Filtro por ministério
    if (filtMin) {
        const idsComMin = Object.keys(mb_membros_min).filter(mid =>
            (mb_membros_min[mid] || []).some(mv => {
                const minObj = mb_ministerios.find(mn => mn.nome === mv.nome);
                return minObj?.id === filtMin;
            })
        );
        lista = lista.filter(m => idsComMin.includes(m.id));
    }

    // Pesquisa por texto
    if (q) {
        lista = lista.filter(m =>
            (m.nome || '').toLowerCase().includes(q) ||
            (m.email || '').toLowerCase().includes(q) ||
            (m.telefone || '').toLowerCase().includes(q) ||
            (m.zona || '').toLowerCase().includes(q) ||
            (m.cidade || '').toLowerCase().includes(q)
        );
    }

    // Contador
    const countEl = document.getElementById('mb-count');
    if (countEl) countEl.textContent = `${lista.length} de ${mb_membros.filter(m=>m.ativo!==false).length} membros`;

    if (!lista.length) {
        list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-faint);font-size:12px">Nenhum membro encontrado.</div>`;
        return;
    }

    // Agrupar por zona/link
    const grupos = {};
    lista.forEach(m => {
        const g = m.zona || m.link_id || 'Sem zona';
        if (!grupos[g]) grupos[g] = [];
        grupos[g].push(m);
    });

    let html = '';
    Object.keys(grupos).sort().forEach(zona => {
        html += `<div class="mb-list-sep">${zona} <span style="font-weight:400">(${grupos[zona].length})</span></div>`;
        grupos[zona].forEach(m => {
            const badges = [];
            if (m.e_lider)      badges.push(`<span class="mb-badge mb-badge-teal">Lider</span>`);
            if (m.e_presbitero) badges.push(`<span class="mb-badge mb-badge-blue">Pres.</span>`);
            if (m.e_voluntario) badges.push(`<span class="mb-badge mb-badge-green">Vol.</span>`);

            const foto = m.foto_url
                ? `<div class="mb-list-avatar"><img src="${m.foto_url}" onerror="this.parentElement.innerHTML='${(m.nome||'M')[0]}'"></div>`
                : `<div class="mb-list-avatar">${(m.nome||'M')[0]}</div>`;

            const mins = (mb_membros_min[m.id] || []).map(mv => mv.nome).slice(0,1).join(', ');
            const sub  = [m.genero, m.zona, mins].filter(Boolean).join(' · ');

            html += `<div class="mb-list-item ${m.ativo===false?'inativo':''} ${mb_activoId===m.id?'active':''}"
                onclick="mb_selectMembro('${m.id}')">
                ${foto}
                <div class="mb-list-info">
                    <div class="mb-list-nome">${m.nome}</div>
                    <div class="mb-list-sub">${sub || m.email || '—'}</div>
                    ${badges.length ? `<div class="mb-list-badges">${badges.join('')}</div>` : ''}
                </div>
            </div>`;
        });
    });

    list.innerHTML = html;
}

function mb_renderSideVisitantes() {
    const list = document.getElementById('mb-list');
    if (!list) return;

    const q = (document.getElementById('mb-search')?.value || '').toLowerCase();
    let lista = [...mb_visitantes];

    const convertido = v => v.convertido === true && v.membro_id;

    if (mb_filtros.has('inativo')) {
        lista = lista.filter(v => convertido(v) || v.ativo === false);
    } else {
        lista = lista.filter(v => !convertido(v) && v.ativo !== false);
    }

    if (q) {
        lista = lista.filter(v =>
            (v.nome || '').toLowerCase().includes(q) ||
            (v.email || '').toLowerCase().includes(q) ||
            (v.telefone || '').toLowerCase().includes(q)
        );
    }

    const countEl = document.getElementById('mb-count');
    if (countEl) countEl.textContent = `${lista.length} visitantes`;

    if (!lista.length) {
        list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-faint);font-size:12px">
            ${mb_filtros.has('inativo') ? 'Nenhum visitante convertido.' : 'Nenhum visitante activo.'}
        </div>`;
        return;
    }

    let html = '';
    lista.forEach(v => {
        const conv = convertido(v);
        const badgeConv = conv
            ? `<span class="mb-badge mb-badge-green">Membro</span>`
            : `<span class="mb-badge mb-badge-gray">Visitante</span>`;
        const sub = [v.telefone, v.onde_conheceu ? `"${v.onde_conheceu}"` : null].filter(Boolean).join(' · ');

        html += `<div class="mb-list-item ${mb_activoId===v.id?'active':''}"
            onclick="mb_selectVisitante('${v.id}')">
            <div class="mb-list-avatar" style="background:rgba(100,70,200,0.08);color:#6446c8">
                ${(v.nome||'V')[0]}
            </div>
            <div class="mb-list-info">
                <div class="mb-list-nome">${v.nome || '—'}</div>
                <div class="mb-list-sub">${sub || '—'}</div>
                <div class="mb-list-badges">${badgeConv}</div>
            </div>
        </div>`;
    });

    list.innerHTML = html;
}

// ── FILTROS ───────────────────────────────────────────
function mb_toggleChip(el, filtro) {
    if (el.classList.toggle('active')) {
        mb_filtros.add(filtro);
    } else {
        mb_filtros.delete(filtro);
    }
    mb_filtrar();
}

function mb_clearFiltros() {
    mb_filtros.clear();
    document.querySelectorAll('.mb-filtro-chip.active').forEach(c => c.classList.remove('active'));
    const selMin = document.getElementById('mb-filtro-min');
    if (selMin) selMin.value = '';
    if (document.getElementById('mb-search')) document.getElementById('mb-search').value = '';
    mb_filtrar();
}

function mb_filtrar() {
    mb_renderSide();
}

// ── DASHBOARD ─────────────────────────────────────────
function mb_renderDash() {
    const panel = document.getElementById('mb-panel');
    if (!panel) return;

    const ativos      = mb_membros.filter(m => m.ativo !== false);
    const lideres     = ativos.filter(m => m.e_lider);
    const presbiteros = ativos.filter(m => m.e_presbitero);
    const voluntarios = ativos.filter(m => m.e_voluntario);
    const inativos    = mb_membros.filter(m => m.ativo === false);
    const visitantesAtivos = mb_visitantes.filter(v => v.ativo !== false && !(v.convertido && v.membro_id));
    const convertidos      = mb_visitantes.filter(v => v.convertido && v.membro_id);

    // Aniversários do mes
    const mesAtual = new Date().getMonth() + 1;
    const anivMes  = ativos.filter(m => {
        if (!m.data_nascimento) return false;
        return parseInt(m.data_nascimento.split('-')[1]) === mesAtual;
    }).sort((a,b) => {
        const da = parseInt(a.data_nascimento?.split('-')[2] || 0);
        const db = parseInt(b.data_nascimento?.split('-')[2] || 0);
        return da - db;
    });

    const statCard = (num, label, cor, onclick='') => `
        <div class="mb-stat-card" style="cursor:${onclick?'pointer':''}" ${onclick?`onclick="${onclick}"`:''}>
            <div class="mb-stat-num" style="color:${cor}">${num}</div>
            <div class="mb-stat-label">${label}</div>
        </div>`;

    // Distribuicao por tipo
    const porGenero = {
        masculino: ativos.filter(m => m.genero === 'masculino').length,
        feminino:  ativos.filter(m => m.genero === 'feminino').length,
    };

    let html = `<div style="padding:14px 16px">
        <div style="font-family:var(--font-title);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px">Comunidade</div>
        <div class="mb-stat-grid">
            ${statCard(ativos.length,      'Total Membros',    'var(--primary-dark)', "mb_setTab('membros')")}
            ${statCard(lideres.length,     'Lideres',          'var(--primary)',       "mb_filtros.add('e_lider');mb_setTab('membros')")}
            ${statCard(presbiteros.length, 'Presbiteros',      'var(--primary)')}
            ${statCard(voluntarios.length, 'Voluntarios',      'var(--green)')}
        </div>

        <div style="font-family:var(--font-title);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);margin:12px 0 8px">Visitantes</div>
        <div class="mb-stat-grid">
            ${statCard(visitantesAtivos.length, 'Visitantes', '#e65100', "mb_setTab('visitantes')")}
            ${statCard(convertidos.length,      'Convertidos', 'var(--green)')}
        </div>

        <div style="font-family:var(--font-title);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);margin:12px 0 8px">Distribuicao por Genero</div>
        <div class="mb-data-card" style="margin-bottom:12px">
            ${mb_barraGenero(porGenero.masculino, porGenero.feminino, porGenero.outro, ativos.length)}
        </div>`;

    if (anivMes.length) {
        html += `<div style="font-family:var(--font-title);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);margin:0 0 8px">
            Aniversarios este mes (${anivMes.length})
        </div>`;
        anivMes.forEach(m => {
            const dia  = m.data_nascimento?.split('-')[2];
            const foto = m.foto_url
                ? `<img src="${m.foto_url}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'">`
                : `<div style="width:36px;height:36px;border-radius:50%;background:var(--primary-faint);color:var(--primary-dark);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;font-weight:700">${(m.nome||'?')[0]}</div>`;
            html += `<div class="mb-aniv-item">
                ${foto}
                <div style="flex:1">
                    <div style="font-size:13px;font-weight:600;color:var(--text-main)">${m.nome}</div>
                    <div style="font-size:11px;color:var(--text-faint)">Dia ${dia}${m.zona?' · '+m.zona:''}</div>
                </div>
                <div style="font-size:18px">*</div>
            </div>`;
        });
    }

    html += `</div>`;
    panel.innerHTML = html;
}

function mb_barraGenero(masc, fem, total) {
    if (!total) return '<div style="font-size:11px;color:var(--text-faint)">Sem dados</div>';
    const pM = Math.round(masc/total*100);
    const pF = Math.round(fem/total*100);
    const pO = 100 - pM - pF;
    return `<div style="display:flex;gap:4px;height:20px;border-radius:6px;overflow:hidden;margin-bottom:8px">
        <div style="flex:${masc||0};background:#1565c0;opacity:0.8;min-width:${masc?'4px':'0'}"></div>
        <div style="flex:${fem||0};background:#ad1457;opacity:0.8;min-width:${fem?'4px':'0'}"></div>
    </div>
    <div style="display:flex;gap:16px;font-size:11px;flex-wrap:wrap">
        <div><span style="color:#1565c0;font-weight:700">${masc}</span> <span style="color:var(--text-faint)">Masc. (${pM}%)</span></div>
        <div><span style="color:#ad1457;font-weight:700">${fem}</span> <span style="color:var(--text-faint)">Fem. (${pF}%)</span></div>
    </div>`;
}

// ── SELECIONAR MEMBRO ─────────────────────────────────
function mb_selectMembro(id) {
    mb_activoId = id;
    mb_editMode = false;
    mb_isNovo = false;
    mb_panelTab = 'info';
    mb_renderSide();
    mb_renderPerfil();
}

function mb_selectVisitante(id) {
    mb_activoId = id;
    mb_editMode = false;
    mb_isNovo = false;
    mb_renderSide();
    mb_renderVisitante();
}

// ── SHOW EMPTY ────────────────────────────────────────
function mb_showEmpty() {
    const panel = document.getElementById('mb-panel');
    if (!panel) return;
    panel.innerHTML = `<div class="mb-empty" id="mb-empty-state">
        <div class="mb-empty-icon">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
            </svg>
        </div>
        <div class="mb-empty-title">Selecciona um registo</div>
    </div>`;
}

// ── PERFIL DO MEMBRO ─────────────────────────────────
async function mb_renderPerfil() {
    const m = mb_membros.find(x => x.id === mb_activoId);
    if (!m) return;

    const panel = document.getElementById('mb-panel');
    const mins  = mb_membros_min[m.id] || [];

    const badgesHtml = [
        m.e_lider      ? `<span class="mb-badge mb-badge-teal">Lider</span>` : '',
        m.e_presbitero ? `<span class="mb-badge mb-badge-blue">Presbítero</span>` : '',
        m.e_voluntario ? `<span class="mb-badge mb-badge-green">Voluntário</span>` : '',
        m.professor    ? `<span class="mb-badge mb-badge-orange">Professor</span>` : '',
        m.e_lider_link ? `<span class="mb-badge mb-badge-teal">Lider Link</span>` : '',
        m.e_lider_area ? `<span class="mb-badge mb-badge-teal">Lider Área</span>` : '',
        m.e_admin      ? `<span class="mb-badge mb-badge-red">Admin</span>` : '',
        m.ativo === false ? `<span class="mb-badge mb-badge-gray">Inativo</span>` : '',
    ].filter(Boolean).join('');

    const fotoHtml = m.foto_url
        ? `<div class="mb-profile-foto"><img src="${m.foto_url}" onerror="this.parentElement.innerHTML='${(m.nome||'M')[0]}'"></div>`
        : `<div class="mb-profile-foto">${(m.nome||'M')[0]}</div>`;

    const sub = [m.tipo, m.zona, m.genero].filter(Boolean).join(' · ');

    const tabsHtml = ['info','morada','funcoes','ministerios','link','cursos','filhos','historia'].map(t => {
        const labels = {info:'Dados',morada:'Morada',funcoes:'Funcoes',ministerios:'Ministerios',link:'Link',cursos:'Cursos',filhos:'Familia',historia:'Historia'};
        return `<button class="mb-panel-tab ${mb_panelTab===t?'active':''}" onclick="mb_setPanelTab('${t}')">${labels[t]}</button>`;
    }).join('');

    let tabContent = '';
    if (mb_editMode) {
        tabContent = mb_buildForm(m);
    } else {
        tabContent = mb_buildView(m, mins);
    }

    panel.innerHTML = `
        <div class="mb-profile-header">
            ${fotoHtml}
            <div class="mb-profile-info">
                <div class="mb-profile-nome">${m.nome}</div>
                <div class="mb-profile-sub">${sub || '—'}</div>
                <div class="mb-profile-badges">${badgesHtml || '<span class="mb-badge mb-badge-gray">Membro</span>'}</div>
            </div>
            <div class="mb-profile-actions">
                ${!mb_editMode ? `<button class="mb-btn-edit" onclick="mb_startEdit()">Editar</button>` : ''}
                <button class="mb-btn-danger" onclick="mb_toggleAtivo('${m.id}',${m.ativo!==false})">
                    ${m.ativo!==false?'Inativar':'Ativar'}
                </button>
            </div>
        </div>
        <div class="mb-panel-tabs">${tabsHtml}</div>
        <div class="mb-panel-inner" id="mb-panel-content">
            ${tabContent}
        </div>`;
}

function mb_setPanelTab(tab) {
    mb_panelTab = tab;
    const m = mb_membros.find(x => x.id === mb_activoId);
    if (!m) return;
    const mins = mb_membros_min[m.id] || [];
    const content = document.getElementById('mb-panel-content');
    if (content) content.innerHTML = mb_editMode ? mb_buildForm(m) : mb_buildView(m, mins);
    // Update tab buttons
    document.querySelectorAll('.mb-panel-tab').forEach(btn => {
        const t = btn.onclick?.toString().match(/'(\w+)'/)?.[1];
        if (t) btn.classList.toggle('active', t === tab);
    });
}

// ── VIEW (leitura) ────────────────────────────────────
function mb_buildView(m, mins) {
    const fld = (label, val) => `<div class="mb-field-row">

    if (mb_panelTab === 'info') {

                <svg width="12" height="12" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                Whatsapp
            </a>`;
        })() : '';

        return `<div>
            <div class="mb-data-grid">
                <div class="mb-data-card mb-data-full">
                    <div class="mb-data-card-title">Identificacao</div>
                    ${fld('Email', m.email ? `<a href="mailto:${m.email}" style="color:var(--primary)">${m.email}</a>` : null)}
                    <div class="mb-field-row">
                        <div class="mb-field-label">Telefone</div>
                        <div class="mb-field-val" style="display:flex;gap:8px;align-items:center">
                            ${m.telefone || '<span class="empty">Nao preenchido</span>'}
                            ${wap}
                        </div>
                    </div>
                    ${fld('Genero', m.genero)}
                    ${fld('Nascimento', dataNasc)}
                    ${fld('Estado Civil', m.estado_civil)}
                    ${fld('NIF', m.nif)}
                    ${fld('Tipo', m.tipo)}
                    ${fld('Zona / Link', m.zona)}
                </div>
                <div class="mb-data-card mb-data-full">
                    <div class="mb-data-card-title">Igreja</div>
                    ${fld('Membro desde', dataEntrada)}
                    ${fld('Onde conheceu', m.onde_conheceu)}
                    ${chkFld('Foi Batizado', m.foi_batizado)}
                    ${m.foi_batizado ? fld('Data Batismo', dataBat) : ''}
                </div>
            </div>
        </div>`;
    }

    if (mb_panelTab === 'morada') {
        const morada = [m.rua, m.numero, m.complemento].filter(Boolean).join(', ');
        const local  = [m.codigo_postal, m.cidade, m.pais].filter(Boolean).join(' · ');
        return `<div>
            <div class="mb-data-card">
                <div class="mb-data-card-title">Morada</div>
                ${fld('Rua', morada)}
                ${fld('Codigo Postal', m.codigo_postal)}
                ${fld('Cidade', m.cidade)}
                ${fld('Pais', m.pais)}
                ${fld('Zona', m.zona)}
                ${fld('Distrito', m.distrito)}
            </div>
        </div>`;
    }

    if (mb_panelTab === 'funcoes') {
        const funcoes = [
            {k:'e_lider',      l:'Lider'},
            {k:'e_presbitero', l:'Presbítero'},
            {k:'e_voluntario', l:'Voluntário'},
            {k:'professor',    l:'Professor'},
            {k:'pastor',       l:'Pastor'},
            {k:'office',       l:'Office'},
            {k:'e_lider_link', l:'Lider de Link'},
            {k:'e_lider_area', l:'Lider de Área'},
            {k:'e_lider_pilar',l:'Lider de Pilar'},
            {k:'e_admin',      l:'Administrador'},
        ];
        return `<div>
            <div class="mb-data-card">
                <div class="mb-data-card-title">Funcoes</div>
                ${funcoes.map(f => `<div class="mb-field-row">
                    <div class="mb-field-label">${f.l}</div>
                    <div class="mb-field-val">${m[f.k] ? `<span class="mb-badge mb-badge-green">Sim</span>` : `<span class="mb-badge mb-badge-gray">Nao</span>`}</div>
                </div>`).join('')}
            </div>
        </div>`;
    }

    if (mb_panelTab === 'ministerios') {
        const minsHtml = mins.length
            ? mins.map(mv => `<div class="mb-min-item">
                <span class="mb-badge ${mv.tipo==='ministerio'?'mb-badge-teal':'mb-badge-blue'}">${mv.tipo==='ministerio'?'MIN':'AE'}</span>
                <div class="mb-min-nome">${mv.nome}</div>
                <div class="mb-min-papel">${mv.papel || ''}</div>
                <button class="mb-min-remove" title="Remover" onclick="mb_removerMinisterio('${mv.id_vinc}','${m.id}')">x</button>
              </div>`).join('')
            : '<div style="font-size:12px;color:var(--text-faint)">Sem ministerios associados.</div>';

        const minOpts = mb_ministerios_cache.map(min =>
            `<option value="${min.id}">[${min.tipo==='ministerio'?'MIN':'AE'}] ${min.nome}</option>`
        ).join('');

        return `<div>
            <div class="mb-data-card">
                <div class="mb-data-card-title">Ministerios e Areas</div>
                <div id="mb-mins-lista">${minsHtml}</div>
                <div class="mb-sub-add" style="margin-top:10px;flex-wrap:wrap">
                    <select class="mb-filtro-select" id="mb-add-min-id" style="flex:1;min-width:130px">
                        <option value="">Selecciona ministerio...</option>${minOpts}
                    </select>
                    <select class="mb-filtro-select" id="mb-add-min-papel" style="width:120px">
                        <option value="">Papel...</option>
                        <option value="Lider">Lider</option>
                        <option value="Co-lider">Co-lider</option>
                        <option value="Voluntario">Voluntario</option>
                    </select>
                    <button class="mb-btn-save" onclick="mb_addMinisterio('${m.id}')">Adicionar</button>
                </div>
            </div>
        </div>`;
    }

    if (mb_panelTab === 'link') {
        const linkAtual = mb_links_cache.find(l => l.id === m.link_id) || null;
        const membrosLink = linkAtual
            ? mb_membros.filter(x => x.link_id === m.link_id && x.id !== m.id && x.ativo !== false)
            : [];
        const linkOpts = mb_links_cache.map(l =>
            `<option value="${l.id}" ${m.link_id === l.id ? 'selected' : ''}>${l.nome}</option>`
        ).join('');

        const memCard = (mem) => {
            const foto = mem.foto_url
                ? `<img src="${mem.foto_url}" style="width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'">`
                : `<div class="mb-list-avatar" style="width:30px;height:30px;font-size:11px;flex-shrink:0">${(mem.nome||'?')[0]}</div>`;
            const badges = [
                mem.e_lider ? '<span class="mb-badge mb-badge-teal">Lider</span>' : '',
                mem.e_presbitero ? '<span class="mb-badge mb-badge-blue">Pres.</span>' : '',
            ].filter(Boolean).join('');
            return `<div class="mb-min-item" style="cursor:pointer" onclick="mb_selectMembro('${mem.id}')">
                ${foto}
                <div style="flex:1;min-width:0">
                    <div class="mb-min-nome">${mem.nome}</div>
                    <div class="mb-min-papel">${mem.zona || ''}</div>
                </div>
                ${badges}
            </div>`;
        };

        return `<div>
            <div class="mb-data-card" style="margin-bottom:10px">
                <div class="mb-data-card-title">Link Atual</div>
                ${linkAtual
                    ? `<div class="mb-field-row">
                        <div class="mb-field-label">Link</div>
                        <div class="mb-field-val" style="font-weight:600;color:var(--primary-dark)">${linkAtual.nome}</div>
                       </div>`
                    : '<div style="font-size:12px;color:var(--text-faint);padding:4px 0">Sem link associado.</div>'
                }
                <div class="mb-sub-add" style="margin-top:10px">
                    <select class="mb-filtro-select" id="mb-link-sel" style="flex:1">
                        <option value="">— Sem Link —</option>${linkOpts}
                    </select>
                    <button class="mb-btn-save" onclick="mb_salvarLink('${m.id}')">Guardar</button>
                </div>
                <div id="mb-link-msg" style="font-size:11px;min-height:14px;margin-top:4px;color:var(--text-faint)"></div>
            </div>
            <div class="mb-data-card">
                <div class="mb-data-card-title">Membros do mesmo Link (${membrosLink.length})</div>
                ${membrosLink.length
                    ? membrosLink.map(memCard).join('')
                    : '<div style="font-size:12px;color:var(--text-faint);padding:4px 0">Nenhum outro membro neste link.</div>'
                }
            </div>
        </div>`;
    }

    if (mb_panelTab === 'cursos') {
        // cursos_concluidos é JSONB/text na própria tabela membros
        let cursosM = [];
        try {
            const raw = m.cursos_concluidos;
            cursosM = (typeof raw === 'string' ? JSON.parse(raw) : raw) || [];
        } catch(_) { cursosM = []; }

        const cursosOpts = mb_cursos_cache.map(c =>
            `<option value="${c.id}" data-nome="${c.nome}">${c.nome}</option>`
        ).join('');

        const cursosHtml = cursosM.length
            ? cursosM.map((r, idx) => {
                const dataStr = r.data
                    ? new Date(r.data + 'T12:00:00').toLocaleDateString('pt-PT') : '';
                const anos = r.data ? (() => {
                    const diff = Date.now() - new Date(r.data).getTime();
                    return Math.floor(diff / (1000*60*60*24*365.25));
                })() : null;
                return `<div class="mb-min-item">
                    <span class="mb-badge mb-badge-blue">ZAO</span>
                    <div class="mb-min-nome">${r.nome || r.curso_id}</div>
                    <div class="mb-min-papel">${dataStr}${anos !== null ? ' · ' + anos + ' ano' + (anos!==1?'s':'') + ' atras' : ''}</div>
                    <button class="mb-min-remove" title="Remover" onclick="mb_removerCurso(${idx},'${m.id}')">x</button>
                </div>`;
            }).join('')
            : '<div style="font-size:12px;color:var(--text-faint);padding:4px 0">Nenhum curso concluido.</div>';

        return `<div>
            <div class="mb-data-card">
                <div class="mb-data-card-title">Cursos ZAO Concluidos (${cursosM.length})</div>
                <div id="mb-cursos-lista">${cursosHtml}</div>
                <div class="mb-sub-add" style="margin-top:10px">
                    <select class="mb-filtro-select" id="mb-add-curso-id" style="flex:1">
                        <option value="">Selecciona curso...</option>${cursosOpts}
                    </select>
                    <input class="mb-form-input" id="mb-add-curso-data" type="date" style="width:140px" title="Data de conclusao">
                    <button class="mb-btn-save" onclick="mb_addCurso('${m.id}')">Adicionar</button>
                </div>
            </div>
        </div>`;
    }

    if (mb_panelTab === 'filhos') {
        // Filhos são membros! Lookup via membros_filhos (pai_id, filho_id)
        // mb_familia_cache[membroId] = { pai, mae, filhos[], conjuge }
        const fam     = mb_familia_cache[m.id] || {};
        const filhos  = fam.filhos || [];
        const conjuge = fam.conjuge || null;
        const pai     = fam.pai || null;
        const mae     = fam.mae || null;

        const membroCard = (rel, mem) => {
            if (!mem) return '';
            const foto = mem.foto_url
                ? `<img src="${mem.foto_url}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'">`
                : `<div class="mb-list-avatar" style="width:36px;height:36px;font-size:13px;flex-shrink:0">${(mem.nome||'?')[0]}</div>`;
            const nasc = mem.data_nascimento
                ? (() => {
                    const diff = Date.now() - new Date(mem.data_nascimento).getTime();
                    const anos = Math.floor(diff / (1000*60*60*24*365.25));
                    return anos + ' anos';
                  })() : null;
            const showRemove = rel === 'Filho';
            return `<div class="mb-min-item" style="cursor:pointer" onclick="mb_selectMembro('${mem.id}')">
                ${foto}
                <div style="flex:1;min-width:0">
                    <div class="mb-min-nome">${mem.nome}</div>
                    <div class="mb-min-papel">${nasc ? nasc + ' · ' : ''}${mem.genero || ''}${mem.estado_civil ? ' · ' + mem.estado_civil : ''}</div>
                </div>
                <span class="mb-badge mb-badge-gray">${rel}</span>
                ${showRemove ? `<button class="mb-min-remove" title="Remover ligacao" onclick="event.stopPropagation();mb_removerFilho('${m.id}','${mem.id}')">x</button>` : ''}
            </div>`;
        };

        // Select para adicionar filho (membros que ainda nao sao filhos)
        const filhosIds = new Set(filhos.map(f => f.id));
        filhosIds.add(m.id);
        const membrosSel = mb_membros.filter(x => !filhosIds.has(x.id) && x.ativo !== false);
        const memOpts = membrosSel.map(x =>
            `<option value="${x.id}">${x.nome}${x.data_nascimento ? ' (' + new Date(x.data_nascimento+'T12:00:00').getFullYear() + ')' : ''}</option>`
        ).join('');

        return `<div>
            <div class="mb-data-card" style="margin-bottom:10px">
                <div class="mb-data-card-title">Nucleo Familiar</div>
                ${conjuge ? membroCard('Conjuge', conjuge) : '<div style="font-size:12px;color:var(--text-faint);padding:4px 0">Sem conjuge registado.</div>'}
                ${pai ? membroCard('Pai', pai) : ''}
                ${mae ? membroCard('Mae', mae) : ''}
            </div>
            <div class="mb-data-card">
                <div class="mb-data-card-title">Filhos (${filhos.length})</div>
                <div id="mb-filhos-lista">
                    ${filhos.length
                        ? filhos.map(f => membroCard('Filho', f)).join('')
                        : '<div style="font-size:12px;color:var(--text-faint);padding:4px 0">Sem filhos registados.</div>'
                    }
                </div>
                <div class="mb-sub-add" style="margin-top:10px">
                    <select class="mb-filtro-select" id="mb-add-filho-id" style="flex:1">
                        <option value="">Selecciona membro...</option>${memOpts}
                    </select>
                    <button class="mb-btn-save" onclick="mb_addFilho('${m.id}')">Associar filho</button>
                </div>
                <div style="margin-top:6px;font-size:11px;color:var(--text-faint)">
                    Clica num familiar para abrir o perfil. Filhos devem ja estar registados como membros.
                </div>
            </div>
        </div>`;
    }

        if (mb_panelTab === 'historia') {
        return `<div>
            <div class="mb-data-card">
                <div class="mb-data-card-title">Historia</div>
                <div style="font-size:13px;color:var(--text-main);line-height:1.8;white-space:pre-wrap">${m.historia || '<span style="color:var(--text-faint);font-style:italic">Sem historia registada.</span>'}</div>
            </div>
        </div>`;
    }

    return '';
}

// ── FORM (edição) ─────────────────────────────────────
function mb_startEdit() {
    mb_editMode = true;
    mb_renderPerfil();
}

function mb_cancelEdit() {
    if (mb_isNovo) {
        mb_isNovo = false;
        mb_editMode = false;
        mb_activoId = null;
        mb_showEmpty();
        return;
    }
    mb_editMode = false;
    mb_renderPerfil();
}

function mb_buildForm(m) {
    const fv  = (k, d='') => m?.[k] ?? d;
    const chk = (k) => (m?.[k] ? 'checked' : '');

    const linksOpts = mb_links_cache.map(l =>
        `<option value="${l.id}" ${fv('link_id')===l.id?'selected':''}>${l.nome}</option>`
    ).join('');
    const membrosOpts = mb_membros.filter(x => x.id !== m?.id).map(x =>
        `<option value="${x.id}" ${fv('conjuge_id')===x.id?'selected':''}>${x.nome}</option>`
    ).join('');

    if (mb_panelTab === 'info') {
        return `<div class="mb-form">
            <div class="mb-msg" id="mb-form-msg"></div>
            <div class="mb-form-section">Identificacao</div>
            <div class="mb-form-grid">
                <div class="mb-form-group mb-form-full">
                    <label class="mb-form-label">Nome</label>
                    <input class="mb-form-input" id="mf_nome" type="text" value="${fv('nome')}">

// ── SALVAR MEMBRO ─────────────────────────────────────
async function mb_salvar(id) {
    const get = k => { const el = document.getElementById('mf_'+k); return el ? el.value?.trim()||null : null; };
    const chk = k => { const el = document.getElementById('mf_'+k); return el ? el.checked : null; };

    const body = {};

    // Colectar campos presentes no DOM
    const campos = [
        'nome','email','telefone','genero','data_nascimento','estado_civil','nif',
        'tipo','data_entrada','link_id','onde_conheceu','zona','data_batismo',
        'conjuge_id','rua','numero','complemento','codigo_postal','cidade','pais',
        'historia','foto_url',
    ];
    campos.forEach(k => {
        const el = document.getElementById('mf_'+k);
        if (el) body[k] = el.value?.trim() || null;
    });

    const checkboxes = ['foi_batizado','e_lider','e_presbitero','e_voluntario',
        'professor','e_lider_link','e_lider_area','e_lider_pilar','e_admin','ativo'];
    checkboxes.forEach(k => {
        const el = document.getElementById('mf_'+k);
        if (el) body[k] = el.checked;
    });

    // foto_url vem do hidden
    const fotoHidden = document.getElementById('mf_foto_url');
    if (fotoHidden) body.foto_url = fotoHidden.value || null;

    if (!body.nome && mb_panelTab === 'info') {
        mb_showMsg('Nome obrigatorio.','error'); return;
    }

    const btn = document.getElementById('mb-btn-save');
    if (btn) { btn.disabled = true; btn.textContent = 'A guardar...'; }

    try {
        if (!id) {
            body.ativo = true;
            await sb('membros', {method:'POST', body:JSON.stringify(body)});
        } else {
            // Enviar só os campos que existem no DOM (não sobrescrever outros)
            const patch = Object.fromEntries(Object.entries(body).filter(([,v]) => v !== undefined));
            await sb(`membros?id=eq.${id}`, {method:'PATCH', body:JSON.stringify(patch)});
        }

        mb_showMsg('Guardado com sucesso!','success');

        // Reload
        mb_membros = await sb('membros?select=*&order=nome') || [];
        await mb_recarregarFamilia();
        if (!id) {
            mb_activoId = null;
            mb_editMode = false;
            mb_isNovo = false;
            mb_renderSide();
            mb_showEmpty();
        } else {
            mb_editMode = false;
            mb_renderSide();
            mb_renderPerfil();
        }
    } catch(e) {
        mb_showMsg(`Erro: ${e?.message||e?.details||JSON.stringify(e)}`,'error');
        if (btn) { btn.disabled = false; btn.textContent = 'Guardar'; }
    }
}

function mb_showMsg(txt, tipo) {
    const el = document.getElementById('mb-form-msg');
    if (!el) return;
    el.textContent = txt;
    el.className = `mb-msg ${tipo}`;
    el.scrollIntoView({behavior:'smooth', block:'nearest'});
}

// ── FOTO UPLOAD ───────────────────────────────────────
function mb_triggerFoto() { document.getElementById('mb-foto-file')?.click(); }

function mb_applyFotoUrl() {
    const url = document.getElementById('mf_foto_url_txt')?.value?.trim();
    if (!url) return;
    document.getElementById('mf_foto_url').value = url;
    const box = document.getElementById('mb-img-box');
    if (box) box.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.innerHTML='URL invalido'">`;
}

async function mb_handleFoto(input) {
    const file = input.files?.[0];
    if (!file) return;
    const box = document.getElementById('mb-img-box');
    if (box) box.innerHTML = `<span style="font-size:11px;color:var(--text-faint)">A fazer upload...</span>`;
    try {
        const filename = `membros/${Date.now()}.jpg`;
        const res = await fetch(`${SUPA_URL}/storage/v1/object/imagens/${filename}`, {
            method: 'POST',
            headers: {'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'image/jpeg','x-upsert':'true'},
            body: file,
        });
        if (!res.ok) throw new Error('Upload falhou');
        const url = `${SUPA_URL}/storage/v1/object/public/imagens/${filename}`;
        document.getElementById('mf_foto_url').value = url;
        if (document.getElementById('mf_foto_url_txt')) document.getElementById('mf_foto_url_txt').value = url;
        if (box) box.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover">`;
    } catch(e) {
        if (box) box.innerHTML = `<span style="color:var(--red);font-size:11px">Erro: ${e.message}</span>`;
    }
    input.value = '';
}

// ── MINISTERIOS DO MEMBRO ─────────────────────────────
async function mb_addMinisterio(membroId) {
    const minId = document.getElementById('mb-add-min-id')?.value;
    const papel = document.getElementById('mb-add-min-papel')?.value?.trim();
    if (!minId) { alert('Selecciona um ministerio.'); return; }

    const mins = mb_membros_min[membroId] || [];
    const minObj = mb_ministerios_cache.find(m => m.id === minId);
    if (mins.some(mv => mv.nome === minObj?.nome)) { alert('Ja associado.'); return; }

    try {
        await sb('membro_ministerios', {method:'POST', body:JSON.stringify({
            membro_id: membroId, ministerio_id: minId, papel: papel||null, ativo: true
        })});
        // Reload vinculacoes deste membro
        const vincs = await sb(`membro_ministerios?select=*,ministerios(id,nome,tipo)&membro_id=eq.${membroId}&ativo=eq.true`);
        mb_membros_min[membroId] = (vincs||[]).map(v => ({
            id_vinc: v.id,
            tipo:    v.ministerios?.tipo||'?',
            nome:    v.ministerios?.nome||'—',
            papel:   v.papel||'',
        }));
        mb_panelTab = 'ministerios';
        mb_renderPerfil();
        document.getElementById('mb-add-min-id').value = '';
        document.getElementById('mb-add-min-papel').value = '';
    } catch(e) { alert('Erro: '+JSON.stringify(e)); }
}

async function mb_salvarVisitante(id) {
    const get = k => { const el = document.getElementById('vf_'+k); return el ? el.value?.trim()||null : null; };
    const chk = k => { const el = document.getElementById('vf_'+k); return el ? el.checked : false; };
    const nome = get('nome');
    if (!nome) { mb_showMsg('Nome obrigatorio.','error'); return; }
    const body = {
        nome, email:get('email'), telefone:get('telefone'), zona:get('zona'),
        data_visita:get('data_visita'), onde_conheceu:get('onde_conheceu'),
        observacoes:get('observacoes'), ativo:chk('ativo'),
    };
    const btn = document.getElementById('mb-btn-save');
    if (btn) { btn.disabled=true; btn.textContent='A guardar...'; }
    try {
        if (!id) await sb('visitantes',{method:'POST',body:JSON.stringify(body)});
        else     await sb(`visitantes?id=eq.${id}`,{method:'PATCH',body:JSON.stringify(body)});
        mb_showMsg('Guardado!','success');
        mb_visitantes = await sb('visitantes?select=*&order=nome') || [];
        mb_isNovo = false;
        mb_editMode = false;
        if (id) { mb_activoId = id; mb_renderSide(); mb_renderVisitante(); }
        else { mb_activoId = null; mb_renderSide(); mb_showEmpty(); }
    } catch(e) {
        mb_showMsg('Erro: '+(e?.message||JSON.stringify(e)),'error');
        if (btn) { btn.disabled=false; btn.textContent='Guardar'; }
    }
}

// ── CONVERSÃO VISITANTE → MEMBRO ──────────────────────

        <div class="mb-msg" id="mb-form-msg"></div>

            <strong>Visitante:</strong> ${v.nome} · ${v.email||'—'} · ${v.telefone||'—'}<br>

        <div class="mb-form-grid">

                <select class="mb-form-select" id="cv_genero">

                    <option value="masculino">Masculino</option>

                <input class="mb-form-input" id="cv_data_entrada" type="date" value="${new Date().toISOString().split('T')[0]}">

                <label class="mb-form-toggle"><input type="checkbox" id="cv_foi_batizado"> Foi Batizado</label>
            </div>
            <div class="mb-form-group">
                <label class="mb-form-toggle"><input type="checkbox" id="cv_e_voluntario"> Voluntario</label>
            </div>
            <div class="mb-form-group">
                <label class="mb-form-toggle"><input type="checkbox" id="cv_e_lider"> Lider</label>

            <button class="mb-btn-cancel" onclick="mb_renderVisitante()">Cancelar</button>
