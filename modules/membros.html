async function mb_confirmarConversao(visitanteId) {
    const v   = mb_visitantes.find(x => x.id === visitanteId);
    if (!v) return;
    const get = k => { const el = document.getElementById('cv_'+k); return el ? el.value?.trim()||null : null; };
    const chk = k => { const el = document.getElementById('cv_'+k); return el ? el.checked : false; };
    const nome = get('nome');
    if (!nome) { mb_showMsg('Nome obrigatorio.','error'); return; }

    const btn = document.getElementById('mb-btn-save');
    if (btn) { btn.disabled=true; btn.textContent='A converter...'; }

    try {
        const membroBody = {
            nome, email:get('email'), telefone:get('telefone'),
            genero:get('genero'), data_nascimento:get('data_nascimento'),
            data_entrada:get('data_entrada'), link_id:get('link_id'),
            onde_conheceu:get('onde_conheceu'), zona:get('zona'),
            foi_batizado:chk('foi_batizado'), e_voluntario:chk('e_voluntario'),
            e_lider:chk('e_lider'), tipo:'membro', ativo:true,
            convertido_de_visitante_id: visitanteId,
        };
        Object.keys(membroBody).forEach(k => { if (membroBody[k] === null) delete membroBody[k]; });

        const novoMembro = await sb('membros', {method:'POST', body:JSON.stringify(membroBody)});
        const membroId   = novoMembro?.[0]?.id;
        if (!membroId) throw new Error('Sem ID retornado pelo servidor.');

        await sb(`visitantes?id=eq.${visitanteId}`, {
            method:'PATCH',
            body:JSON.stringify({convertido:true, membro_id:membroId}),
        });

        mb_showMsg('Convertido com sucesso!','success');
        mb_membros   = await sb('membros?select=*&order=nome') || [];
        mb_visitantes = await sb('visitantes?select=*&order=nome') || [];
        setTimeout(() => {
            mb_tab = 'membros';
            mb_activoId = membroId;
            mb_setTab('membros');
            mb_renderSide();
            mb_renderPerfil();
        }, 800);
    } catch(e) {
        mb_showMsg('Erro: '+(e?.message||JSON.stringify(e)),'error');
        if (btn) { btn.disabled=false; btn.textContent='Converter em Membro'; }
    }
}

// ── CURSOS DO MEMBRO (JSONB em membros.cursos_concluidos) ─────────────────────
async function mb_addCurso(membroId) {
    const sel      = document.getElementById('mb-add-curso-id');
    const cursoId  = sel?.value;
    const cursoNome = sel?.options[sel.selectedIndex]?.dataset?.nome
                   || sel?.options[sel.selectedIndex]?.text || '';
    const data = document.getElementById('mb-add-curso-data')?.value || null;
    if (!cursoId) { alert('Selecciona um curso.'); return; }

    const mem = mb_membros.find(x => x.id === membroId);
    if (!mem) return;
    let cursos = [];
    try { cursos = JSON.parse(mem.cursos_concluidos || '[]') || []; } catch(_) {}
    if (cursos.some(r => r.curso_id === cursoId)) { alert('Curso ja adicionado.'); return; }
    cursos.push({ curso_id: cursoId, nome: cursoNome, data: data || null });

    try {
        await sb('membros?id=eq.' + membroId, {
            method: 'PATCH',
            body: JSON.stringify({ cursos_concluidos: JSON.stringify(cursos) }),
        });
        const idx = mb_membros.findIndex(x => x.id === membroId);
        if (idx >= 0) mb_membros[idx].cursos_concluidos = JSON.stringify(cursos);
        mb_panelTab = 'cursos';
        mb_renderPerfil();
    } catch(e) { alert('Erro: ' + (e?.message || JSON.stringify(e))); }
}

async function mb_removerCurso(cursoIdx, membroId) {
    if (!confirm('Remover este curso?')) return;
    const mem = mb_membros.find(x => x.id === membroId);
    if (!mem) return;
    let cursos = [];
    try { cursos = JSON.parse(mem.cursos_concluidos || '[]') || []; } catch(_) {}
    cursos.splice(cursoIdx, 1);
    try {
        await sb('membros?id=eq.' + membroId, {
            method: 'PATCH',
            body: JSON.stringify({ cursos_concluidos: JSON.stringify(cursos) }),
        });
        const idx = mb_membros.findIndex(x => x.id === membroId);
        if (idx >= 0) mb_membros[idx].cursos_concluidos = JSON.stringify(cursos);
        mb_panelTab = 'cursos';
        mb_renderPerfil();
    } catch(e) { alert('Erro: ' + (e?.message || JSON.stringify(e))); }
}

// ── FAMILIA: filhos via membros_filhos + membros ──────────────────────────────
async function mb_addFilho(paiId) {
    const filhoId = document.getElementById('mb-add-filho-id')?.value;
    if (!filhoId) { alert('Selecciona um membro como filho.'); return; }
    const jaExiste = (mb_familia_cache[paiId]?.filhos || []).some(f => f.id === filhoId);
    if (jaExiste) { alert('Ja associado como filho.'); return; }
    try {
        await sb('membros_filhos', {
            method: 'POST',
            body: JSON.stringify({ pai_id: paiId, filho_id: filhoId }),
        });
        // Actualizar pai_id ou mae_id no registo do filho
        const paiMem = mb_membros.find(x => x.id === paiId);
        if (paiMem) {
            const campo = paiMem.genero === 'feminino' ? 'mae_id' : 'pai_id';
            await sb('membros?id=eq.' + filhoId, {
                method: 'PATCH',
                body: JSON.stringify({ [campo]: paiId }),
            });
            const fi = mb_membros.findIndex(x => x.id === filhoId);
            if (fi >= 0) mb_membros[fi][campo] = paiId;
        }
        await mb_recarregarFamilia();
        mb_panelTab = 'filhos';
        mb_renderPerfil();
    } catch(e) { alert('Erro: ' + (e?.message || JSON.stringify(e))); }
}

async function mb_removerFilho(paiId, filhoId) {
    if (!confirm('Remover esta ligacao familiar?')) return;
    try {
        await sb('membros_filhos?pai_id=eq.' + paiId + '&filho_id=eq.' + filhoId, { method: 'DELETE' });
        const paiMem = mb_membros.find(x => x.id === paiId);
        if (paiMem) {
            const campo = paiMem.genero === 'feminino' ? 'mae_id' : 'pai_id';
            await sb('membros?id=eq.' + filhoId, {
                method: 'PATCH',
                body: JSON.stringify({ [campo]: null }),
            });
            const fi = mb_membros.findIndex(x => x.id === filhoId);
            if (fi >= 0) mb_membros[fi][campo] = null;
        }
        await mb_recarregarFamilia();
        mb_panelTab = 'filhos';
        mb_renderPerfil();
    } catch(e) { alert('Erro: ' + (e?.message || JSON.stringify(e))); }
}

async function mb_removerMinisterio(vinculoId, membroId) {
    if (!confirm('Remover este ministerio?')) return;
    try {
        await sb('membro_ministerios?id=eq.' + vinculoId, { method: 'DELETE' });
        const rows = await sb(
            'membro_ministerios?select=id,ministerio_id,papel,ministerios(id,nome,tipo)&membro_id=eq.' + membroId
        ).catch(() => []);
        mb_membros_min[membroId] = (rows || []).map(r => ({
            id_vinc: r.id,
            id:      r.ministerio_id,
            nome:    r.ministerios?.nome || '',
            tipo:    r.ministerios?.tipo || 'ministerio',
            papel:   r.papel || '',
        }));
        mb_panelTab = 'ministerios';
        mb_renderPerfil();
    } catch(e) { alert('Erro: ' + (e?.message || JSON.stringify(e))); }
}

async function mb_salvarLink(membroId) {
    const sel    = document.getElementById('mb-link-sel');
    const linkId = sel?.value || null;
    const msg    = document.getElementById('mb-link-msg');
    try {
        await sb('membros?id=eq.' + membroId, {
            method: 'PATCH',
            body: JSON.stringify({ link_id: linkId || null }),
        });
        const idx = mb_membros.findIndex(x => x.id === membroId);
        if (idx >= 0) mb_membros[idx].link_id = linkId || null;
        if (msg) { msg.style.color = 'var(--primary)'; msg.textContent = 'Link guardado!'; }
        setTimeout(() => { if (msg) msg.textContent = ''; }, 2000);
        mb_renderPerfil();
    } catch(e) {
        if (msg) { msg.style.color = 'var(--danger)'; msg.textContent = 'Erro: ' + (e?.message || JSON.stringify(e)); }
    }
}


async function mb_recarregarFamilia() {
    const rels = await sb('membros_filhos?select=pai_id,filho_id').catch(() => []);
    mb_membros.forEach(mem => {
        const conjuge = mem.conjuge_id ? mb_membros.find(x => x.id === mem.conjuge_id) || null : null;
        const pai     = mem.pai_id     ? mb_membros.find(x => x.id === mem.pai_id)     || null : null;
        const mae     = mem.mae_id     ? mb_membros.find(x => x.id === mem.mae_id)     || null : null;
        const filhosIds = (rels || []).filter(r => r.pai_id === mem.id).map(r => r.filho_id);
        const filhos    = filhosIds.map(fid => mb_membros.find(x => x.id === fid)).filter(Boolean);
        mb_familia_cache[mem.id] = { conjuge, pai, mae, filhos };
    });
}
