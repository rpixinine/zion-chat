<!-- modules/ministerios.html — v2 · Hierarquia + Organograma -->
<style>
    /* ── LAYOUT BASE ── */
    .mod-page     { display:flex; height:100%; overflow:hidden; }
    .mod-sidebar  { width:300px; min-width:180px; max-width:520px; flex-shrink:0; background:var(--bg-card); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; position:relative; }
    .mod-sidebar-resize { width:5px; position:absolute; right:0; top:0; bottom:0; cursor:col-resize; z-index:10; background:transparent; transition:background 0.15s; }
    .mod-sidebar-resize:hover, .mod-sidebar-resize.dragging { background:var(--primary); opacity:0.4; }
    .mod-sidebar-hd { padding:10px 12px 8px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:6px; flex-shrink:0; }
    .mod-sidebar-title { font-family:var(--font-title); font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--text-faint); flex:1; }
    /* Filtros de tipo */
    .mod-filter-bar { display:flex; gap:4px; padding:6px 8px; border-bottom:1px solid var(--border); flex-wrap:wrap; flex-shrink:0; background:var(--bg-panel); }
    .mod-filter-chip { padding:3px 9px; border-radius:20px; font-size:9px; font-family:var(--font-title); letter-spacing:0.5px; cursor:pointer; border:1px solid var(--border); background:var(--bg-input); color:var(--text-faint); transition:all 0.12s; white-space:nowrap; }
    .mod-filter-chip:hover { border-color:var(--primary); color:var(--primary-dark); }
    .mod-filter-chip.on { background:var(--primary); color:white; border-color:var(--primary); }
    .mod-filter-chip.on.f-ae         { background:#7b1fa2; border-color:#7b1fa2; }
    .mod-filter-chip.on.f-ministerio { background:#1565c0; border-color:#1565c0; }
    .mod-filter-chip.on.f-link       { background:#2e7d32; border-color:#2e7d32; }
    .mod-filter-chip.on.f-office     { background:#e65100; border-color:#e65100; }
    .mod-list     { flex:1; overflow-y:auto; padding:4px 0 8px; }
    .mod-content  { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
    .mod-empty    { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text-faint); text-align:center; gap:6px; }
    .mod-empty-title { font-family:var(--font-title); font-size:10px; letter-spacing:2px; }

    /* ── SIDEBAR ÁRVORE ── */
    .tree-sep { height:1px; background:var(--border); margin:4px 0; }
    .tree-pilar-hd {
        padding:10px 12px 5px;
        font-family:var(--font-title); font-size:8px; letter-spacing:2.5px; text-transform:uppercase;
        color:var(--primary-dark); display:flex; align-items:center; gap:6px; cursor:pointer;
        border-top:1px solid var(--border); margin-top:2px;
    }
    .tree-pilar-hd:first-child { border-top:none; margin-top:0; }
    .tree-pilar-hd:hover { color:var(--primary); }
    .tree-pilar-hd.active-pilar { color:var(--primary); background:var(--primary-faint); border-radius:6px; }
    .tree-ph-nome  { flex:1; }
    .tree-ph-count { font-size:9px; color:var(--text-faint); background:var(--bg-panel);
                     padding:1px 6px; border-radius:20px; font-family:var(--font-title); }
    .tree-item {
        display:flex; align-items:center; gap:0; border-radius:7px; cursor:pointer;
        margin:1px 6px; border:1px solid transparent; transition:all 0.12s; position:relative;
    }
    .tree-item:hover  { background:var(--bg-panel); border-color:var(--border); }
    .tree-item.active { background:var(--primary-faint); border-color:var(--primary); }
    .tree-item-inner  { padding:7px 10px; flex:1; min-width:0; }
    .tree-item-nome   { font-size:12px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .tree-item-sub    { font-size:9px; font-family:var(--font-title); letter-spacing:0.5px; margin-top:2px; display:inline-block; padding:1px 6px; border-radius:20px; }
    .tree-item-count  { font-size:9px; color:var(--text-faint); padding:0 8px; flex-shrink:0; }
    /* tipo badges */
    .tipo-pilar     { color:var(--primary-dark); background:var(--primary-faint); }
    .tipo-ae        { color:#6a1b9a; background:rgba(106,27,154,0.09); }
    .tipo-ministerio{ color:#1565c0; background:rgba(21,101,192,0.09); }
    .tipo-link      { color:#2e7d32; background:rgba(46,125,50,0.09); }
    .tipo-office    { color:#e65100; background:rgba(230,81,0,0.09); }
    .depth-prefix   { font-size:10px; color:var(--border); padding-left:4px; flex-shrink:0; }

    /* ── TABS ── */
    .mod-tabs { display:flex; gap:2px; padding:10px 18px 0; border-bottom:1px solid var(--border); background:var(--bg-card); flex-shrink:0; flex-wrap:wrap; }
    .mod-tab  { padding:7px 14px; border-radius:8px 8px 0 0; font-size:12px; font-weight:600; cursor:pointer; border:1px solid transparent; color:var(--text-faint); background:transparent; font-family:var(--font-body); transition:all 0.12s; white-space:nowrap; }
    .mod-tab.active { background:var(--primary-faint); border-color:var(--border); border-bottom-color:var(--bg-card); color:var(--primary-dark); }
    .mod-tab-body { flex:1; overflow-y:auto; padding:18px; display:none; min-height:0; }
    .mod-tab-body.active { display:block; }

    /* ── FORMULÁRIOS / BOTÕES ── */
    .sec-hd  { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
    .sec-lbl { font-family:var(--font-title); font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--text-faint); }
    .btn-add { padding:5px 12px; border-radius:7px; background:var(--primary); color:white; border:none; font-size:12px; cursor:pointer; font-family:var(--font-body); font-weight:600; white-space:nowrap; }
    .btn-add:hover { background:var(--primary-dark); }
    .btn-sm  { padding:5px 12px; border-radius:8px; border:1px solid var(--border); background:var(--bg-input); font-size:11px; cursor:pointer; color:var(--text-main); transition:all 0.15s; font-family:var(--font-body); white-space:nowrap; }
    .btn-sm:hover   { border-color:var(--primary); color:var(--primary-dark); background:var(--primary-faint); }
    .btn-sm.danger  { color:var(--red); }
    .btn-sm.danger:hover { border-color:var(--red); background:rgba(192,57,43,0.06); }
    .btn-sm.primary { background:var(--primary); color:white; border-color:var(--primary); }
    .btn-sm.primary:hover { background:var(--primary-dark); }
    .btn-icon { width:28px; height:28px; border-radius:8px; border:1px solid var(--border); background:var(--bg-input); font-size:14px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:all 0.15s; }
    .btn-icon:hover { border-color:var(--primary); background:var(--primary-faint); }
    .crud-group label { display:block; font-size:9px; font-family:var(--font-title); letter-spacing:1px; text-transform:uppercase; color:var(--text-faint); margin-bottom:4px; }
    .crud-group input, .crud-group select { width:100%; padding:8px 10px; border-radius:8px; border:1px solid var(--border); background:var(--bg-input); font-size:12px; font-family:var(--font-body); color:var(--text-main); outline:none; }
    .crud-group input:focus, .crud-group select:focus { border-color:var(--primary); }
    .form-msg { font-size:12px; padding:6px 10px; border-radius:8px; display:none; width:100%; margin-top:6px; }
    .form-msg.ok  { background:rgba(46,125,50,0.1); color:var(--green); display:block; }
    .form-msg.err { background:rgba(192,57,43,0.08); color:var(--red); display:block; }

    /* ── TABELA ── */
    table.t { width:100%; border-collapse:collapse; font-size:13px; }
    table.t th { font-family:var(--font-title); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-faint); padding:8px 12px; border-bottom:1px solid var(--border); text-align:left; white-space:nowrap; }
    table.t td { padding:9px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }
    table.t tr:last-child td { border-bottom:none; }
    table.t tr:hover td { background:var(--bg-panel); }
    .badge { padding:3px 9px; border-radius:20px; font-size:10px; font-family:var(--font-title); letter-spacing:0.5px; white-space:nowrap; display:inline-block; }
    .badge-lider    { background:rgba(0,144,152,0.12); color:var(--primary-dark); }
    .badge-membro   { background:rgba(0,0,0,0.05); color:var(--text-muted); }
    .badge-aprendiz { background:rgba(230,81,0,0.1); color:var(--orange); }
    .badge-servindo { background:rgba(0,144,152,0.1); color:var(--primary-dark); }
    .badge-extra    { background:rgba(21,101,192,0.1); color:#1565c0; }
    .badge-green    { background:rgba(46,125,50,0.1); color:var(--green); }
    .badge-gray     { background:rgba(0,0,0,0.06); color:var(--text-faint); }

    /* ── DISPONIBILIDADE ── */
    .disp-table { width:100%; border-collapse:collapse; font-size:12px; }
    .disp-table th { font-family:var(--font-title); font-size:9px; letter-spacing:1px; color:var(--text-faint); padding:8px 10px; border-bottom:1px solid var(--border); text-align:center; white-space:nowrap; }
    .disp-table th:first-child { text-align:left; }
    .disp-table td { padding:8px 10px; border-bottom:1px solid var(--border); text-align:center; vertical-align:middle; }
    .disp-table td:first-child { text-align:left; font-weight:600; }
    .disp-table tr:last-child td { border-bottom:none; }
    .disp-table tr:hover td { background:var(--bg-panel); }
    .disp-toggle { width:36px; height:20px; border-radius:10px; border:none; cursor:pointer; background:var(--bg-panel); position:relative; transition:background 0.2s; flex-shrink:0; display:inline-block; }
    .disp-toggle.on { background:var(--primary); }
    .disp-toggle::after { content:''; position:absolute; width:14px; height:14px; border-radius:7px; background:white; top:3px; left:3px; transition:left 0.15s; }
    .disp-toggle.on::after { left:19px; }

    /* ── CALENDÁRIO COMPACTO ── */
    .ind-layout { display:flex; gap:16px; align-items:flex-start; flex-wrap:wrap; }
    .mes-nav { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
    .mes-titulo { font-family:var(--font-title); font-size:12px; color:var(--primary-dark); font-weight:600; flex:1; text-align:center; }
    .cal-mini { border:1px solid var(--border); border-radius:10px; overflow:hidden; background:var(--bg-card); }
    .cal-mini-hds { display:grid; grid-template-columns:repeat(7,28px); background:var(--primary-faint); }
    .cal-mini-hd  { font-family:var(--font-title); font-size:8px; letter-spacing:0.5px; text-transform:uppercase; color:var(--primary-dark); text-align:center; padding:5px 0; }
    .cal-mini-dias { display:grid; grid-template-columns:repeat(7,28px); padding:4px; gap:2px; }
    .cal-mini-dia  { width:28px; height:28px; border-radius:6px; border:1px solid transparent; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; cursor:pointer; transition:all 0.12s; color:var(--text-main); }
    .cal-mini-dia:hover     { border-color:var(--primary); background:var(--primary-faint); color:var(--primary-dark); }
    .cal-mini-dia.vazio     { background:transparent; border-color:transparent; cursor:default; pointer-events:none; }
    .cal-mini-dia.semana    { opacity:0.2; cursor:default; pointer-events:none; font-weight:400; }
    .cal-mini-dia.bloqueado { background:rgba(192,57,43,0.12); border-color:rgba(192,57,43,0.4); color:var(--red); }
    .cal-mini-dia.hoje      { border-color:var(--primary); box-shadow:0 0 0 2px var(--primary-faint); }
    .mem-chips { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:12px; }
    .mem-chip  { padding:4px 10px; border-radius:20px; font-size:11px; cursor:pointer; border:1px solid var(--border); background:var(--bg-input); transition:all 0.12s; white-space:nowrap; }
    .mem-chip:hover  { border-color:var(--primary); }
    .mem-chip.active { background:var(--primary); color:white; border-color:var(--primary); }

    /* ── ESCALA PLANILHA ── */
    .escala-nav { display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
    .escala-titulo { font-family:var(--font-title); font-size:13px; color:var(--primary-dark); font-weight:600; flex:1; text-align:center; min-width:120px; }
    .esc-table-wrap { overflow-x:auto; border:1px solid var(--border); border-radius:var(--radius); }
    .esc-table { width:100%; border-collapse:collapse; font-size:12px; }
    .esc-table th { background:var(--primary); color:white; font-family:var(--font-title); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; padding:9px 12px; border:1px solid rgba(255,255,255,0.15); text-align:center; white-space:nowrap; }
    .esc-table th.th-culto { text-align:left; min-width:130px; }
    .esc-table td { padding:9px 12px; border:1px solid var(--border); vertical-align:top; text-align:center; font-size:12px; }
    .esc-table td.td-culto { text-align:left; font-weight:600; background:var(--bg-panel); white-space:nowrap; }
    .esc-table tr:hover td { background:var(--primary-faint); }
    .esc-table tr:hover td.td-culto { background:var(--bg-panel); }
    .esc-cell { display:flex; flex-direction:column; gap:2px; align-items:center; }
    .esc-cell-nome { font-weight:600; font-size:12px; }
    .esc-cell-papel { font-size:10px; color:var(--text-faint); font-family:var(--font-title); letter-spacing:0.5px; }
    .esc-cell-notas { font-size:10px; color:var(--orange); }
    .esc-add-btn { display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; border-radius:50%; border:1px dashed var(--border); color:var(--text-faint); font-size:14px; cursor:pointer; transition:all 0.12s; }
    .esc-add-btn:hover { border-color:var(--primary); color:var(--primary-dark); background:var(--primary-faint); }
    .esc-rem-btn { font-size:9px; color:var(--red); cursor:pointer; opacity:0; }
    .esc-cell:hover .esc-rem-btn { opacity:1; }
    .share-txt { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; font-family:monospace; font-size:12px; line-height:1.8; white-space:pre-wrap; max-height:360px; overflow-y:auto; color:var(--text-main); }

    /* ── ORGANOGRAMA ── */
    .org-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:400; display:none; align-items:flex-start; justify-content:center; padding:20px; overflow-y:auto; }
    .org-panel   { background:var(--bg-card); border-radius:var(--radius); box-shadow:var(--shadow-md); width:100%; max-width:1200px; min-height:200px; margin:auto; }
    .org-panel-hd { display:flex; align-items:center; padding:14px 18px; border-bottom:1px solid var(--border); gap:10px; }
    .org-panel-title { font-family:var(--font-title); font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--primary-dark); flex:1; }
    .org-body { padding:24px; overflow-x:auto; }

    /* Árvore por pilar */
    .org-pilar-section { margin-bottom:36px; }
    .org-pilar-lbl { font-family:var(--font-title); font-size:8px; letter-spacing:3px; text-transform:uppercase; color:var(--text-faint); text-align:center; margin-bottom:16px; }

    /* CSS Org Chart */
    .org-tree { display:flex; flex-direction:column; align-items:center; }
    .org-ul {
        display:flex; list-style:none; margin:0; padding:0;
        padding-top:20px; position:relative; justify-content:center;
    }
    .org-ul::before {
        content:''; position:absolute; top:0; left:50%;
        transform:translateX(-50%); width:1px; height:20px;
        background:var(--border-md);
    }
    .org-li {
        display:flex; flex-direction:column; align-items:center;
        padding:0 8px; position:relative;
    }
    .org-li::before {
        content:''; position:absolute; top:0; right:50%;
        width:50%; height:1px; background:var(--border-md);
    }
    .org-li::after {
        content:''; position:absolute; top:0; left:50%;
        width:50%; height:1px; background:var(--border-md);
    }
    .org-li:only-child::before,
    .org-li:only-child::after { display:none; }
    .org-li:first-child::before { display:none; }
    .org-li:last-child::after  { display:none; }

    /* Node boxes */
    .org-has-ch > .org-box-wrap::after {
        content:''; display:block; width:1px; height:20px;
        background:var(--border-md); margin:0 auto;
    }
    .org-box {
        border:2px solid var(--border); border-radius:10px; padding:8px 14px;
        min-width:88px; text-align:center; cursor:pointer; background:var(--bg-card);
        transition:all 0.15s; position:relative;
    }
    .org-box:hover { box-shadow:0 4px 14px rgba(0,0,0,0.12); transform:translateY(-2px); }
    .org-box.nivel-pilar    { border-color:var(--primary); background:var(--primary-faint); }
    .org-box.nivel-1.ae     { border-color:#7b1fa2; background:rgba(123,31,162,0.06); }
    .org-box.nivel-1.ministerio { border-color:#1565c0; background:rgba(21,101,192,0.06); }
    .org-box.nivel-1.link   { border-color:#2e7d32; background:rgba(46,125,50,0.06); }
    .org-box.nivel-1.office { border-color:#e65100; background:rgba(230,81,0,0.06); }
    .org-box.nivel-2 { border-color:var(--border-md); background:var(--bg-panel); }
    .org-box.nivel-3 { border-color:var(--border); background:var(--bg-input); border-style:dashed; }
    .org-box-nome { font-size:11px; font-weight:700; color:var(--text-main); }
    .org-box.nivel-pilar .org-box-nome    { color:var(--primary-dark); }
    .org-box.nivel-1.ae .org-box-nome     { color:#6a1b9a; }
    .org-box.nivel-1.ministerio .org-box-nome { color:#1565c0; }
    .org-box.nivel-1.link .org-box-nome   { color:#2e7d32; }
    .org-box.nivel-1.office .org-box-nome { color:#e65100; }
    .org-box-tipo { font-size:8px; font-family:var(--font-title); letter-spacing:0.5px; opacity:0.65; margin-top:2px; }
    .org-box-count { font-size:8px; color:var(--text-faint); margin-top:1px; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!--  PÁGINA PRINCIPAL                             -->
<!-- ══════════════════════════════════════════════ -->
<div class="mod-page">
    <!-- SIDEBAR -->
    <div class="mod-sidebar" id="min-sidebar-wrap">
        <div class="mod-sidebar-resize" id="min-sidebar-resize"></div>
        <div class="mod-sidebar-hd">
            <div class="mod-sidebar-title">Ministérios</div>
            <button class="btn-icon" title="Organograma" onclick="min_abrirOrg()">🗂</button>
            <button class="btn-add" style="font-size:11px;padding:4px 10px" onclick="min_abrirFormMin(null)">+ Novo</button>
        </div>
        <div class="mod-filter-bar" id="min-filter-bar">
            <span class="mod-filter-chip on" data-tipo="" onclick="min_setFiltro("")">Todos</span>
            <span class="mod-filter-chip f-ae"         data-tipo="ae"          onclick="min_setFiltro("ae")">AE</span>
            <span class="mod-filter-chip f-ministerio" data-tipo="ministerio"  onclick="min_setFiltro("ministerio")">Ministério</span>
            <span class="mod-filter-chip f-link"       data-tipo="link"        onclick="min_setFiltro("link")">Link</span>
            <span class="mod-filter-chip f-office"     data-tipo="office"      onclick="min_setFiltro("office")">Office</span>
        </div>
        <div class="mod-list" id="min-sidebar">
            <div style="padding:20px;text-align:center;color:var(--text-faint);font-size:12px">A carregar…</div>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="mod-content" id="min-content">
        <div class="mod-empty"><div class="mod-empty-title">Selecciona um Ministério</div></div>
    </div>
</div>

<!-- ══════════════════════════════════════════════ -->
<!--  MODAL MINISTÉRIO (criar / editar)            -->
<!-- ══════════════════════════════════════════════ -->
<div id="min-modal-min" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;align-items:center;justify-content:center">
    <div style="background:var(--bg-card);border-radius:var(--radius);padding:24px;width:440px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-md)">
        <div style="font-family:var(--font-title);font-size:12px;letter-spacing:1px;color:var(--primary-dark);margin-bottom:16px" id="min-modal-min-title">Novo Ministério</div>

        <div class="crud-group" style="margin-bottom:12px">
            <label>Nome *</label>
            <input id="min-f-nome" type="text" placeholder="Ex: Louvor, Operações, Pilar AE…">
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
            <div class="crud-group">
                <label>Tipo</label>
                <select id="min-f-tipo">
                    <option value="">— Seleciona —</option>
                    <option value="pilar">Pilar (raiz)</option>
                    <option value="ae">Área Executiva (AE)</option>
                    <option value="ministerio">Ministério</option>
                    <option value="link">Link</option>
                    <option value="office">Office</option>
                </select>
            </div>
            <div class="crud-group">
                <label>Pertence a (pai)</label>
                <select id="min-f-parent">
                    <option value="">— Nível raiz —</option>
                </select>
            </div>
        </div>

        <div class="crud-group" style="margin-bottom:12px">
            <label>Descrição</label>
            <input id="min-f-desc" type="text" placeholder="Breve descrição (opcional)">
        </div>

</div>

<!-- ══════════════════════════════════════════════ -->
<!--  JAVASCRIPT                                   -->
<!-- ══════════════════════════════════════════════ -->
<script>
    /* ── ESTADO GLOBAL ── */
    var min_mins      = [];   // todos os activos (flat)
    var min_memAll    = [];
    var min_cultsAll  = [];
    var min_minAtivo  = null;
    var min_minMems   = [];
    var min_minCults  = [];
    var min_memNoMin  = new Set();
    var min_dispMap   = {};
    var min_indisps   = [];
    var min_escala    = [];
    var min_indMes    = '';
    var min_escMes    = '';
    var min_indMemSel = null;
    var min_eaCtx     = null;
    var min_formEditId = null;

    const PAPEL_LBL = { lider:'Líder', membro:'Membro', aprendiz:'Aprendiz' };
    const MESES_PT  = ['','Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const MESES_ABV = ['','JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
    const DIAS_PT   = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    const TIPO_COR  = { pilar:'var(--primary-dark)', ae:'#6a1b9a', ministerio:'#1565c0', link:'#2e7d32', office:'#e65100' };
    const TIPO_LBL  = { pilar:'Pilar', ae:'AE', ministerio:'Ministério', link:'Link', office:'Office' };

    function min_sb(p,o)  { return window.sb ? window.sb(p,o) : Promise.reject('no sb'); }
    function min_t(m,t)   { if(window.toast) window.toast(m,t||'ok'); }
    function smsg(id,msg,t){ const e=document.getElementById(id); if(!e) return; e.textContent=msg; e.className='form-msg '+t; }
    function fmtD(d)      { if(!d) return '—'; return new Date(d+'T00:00:00').toLocaleDateString('pt-PT',{weekday:'short',day:'2-digit',month:'short'}); }
    function ym()         { const n=new Date(); return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0'); }
    function addM(s,n)    { const [a,m]=s.split('-'); const d=new Date(parseInt(a),parseInt(m)-1+n,1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
    function mesLbl(s)    { const [a,m]=s.split('-'); return MESES_PT[parseInt(m)]+' '+a; }
    function sabDomMes(a,m){ const r=[]; for(let d=1;d<=new Date(a,m,0).getDate();d++){ const dt=new Date(a,m-1,d),dw=dt.getDay(); if(dw===0||dw===6) r.push({d,dw,iso:`${a}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`}); } return r; }
    function isSabado(s)  { return s==='Sabado'||s==='Sábado'; }

    /* ══════════════════════════════════════════════
       ÁRVORE — construção e renderização
    ══════════════════════════════════════════════ */
    function min_buildTree(items) {
        const map = {};
        items.forEach(m => { map[m.id] = { ...m, _ch: [] }; });
        const roots = [];
        items.forEach(m => {
            if (m.parent_id && map[m.parent_id]) map[m.parent_id]._ch.push(map[m.id]);
            else roots.push(map[m.id]);
        });
        function sortAlpha(nodes) {
            nodes.sort((a, b) => a.nome.localeCompare(b.nome, 'pt'));
            nodes.forEach(n => sortAlpha(n._ch));
        }
        sortAlpha(roots);
        return roots;
    }

    function min_countDesc(node) {
        return node._ch.reduce((acc, c) => acc + 1 + min_countDesc(c), 0);
    }

    function min_breadcrumb(id) {
        // Retorna "Pai > Avô > …" para um id dado
        const trail = [];
        let cur = min_mins.find(m => m.id === id);
        while (cur?.parent_id) {
            const p = min_mins.find(m => m.id === cur.parent_id);
            if (p) { trail.unshift(p.nome); cur = p; } else break;
        }
        return trail.join(' › ');
    }

    var min_filtroTipo = '';

    function min_setFiltro(tipo) {
        min_filtroTipo = tipo;
        // atualizar chips
        document.querySelectorAll('#min-filter-bar .mod-filter-chip').forEach(c => {
            const isActive = c.dataset.tipo === tipo;
            c.classList.toggle('on', isActive);
        });
        min_renderSide();
    }

    /* ── SIDEBAR RENDERIZAÇÃO ── */
    function min_renderSide() {
        const el = document.getElementById('min-sidebar');
        if (!el) return;

        // Filtrar por tipo se activo
        let lista = min_mins;
        if (min_filtroTipo) {
            // Mostrar o item e todos os seus ancestrais para manter a hierarquia legível
            const idsRelevantes = new Set();
            min_mins.forEach(m => {
                if (m.tipo === min_filtroTipo) {
                    idsRelevantes.add(m.id);
                    // sobe na hierarquia
                    let cur = m;
                    while (cur?.parent_id) {
                        idsRelevantes.add(cur.parent_id);
                        cur = min_mins.find(x => x.id === cur.parent_id);
                    }
                }
            });
            lista = min_mins.filter(m => idsRelevantes.has(m.id));
        }

        const tree = min_buildTree(lista);
        if (!tree.length) {
            el.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-faint);font-size:12px">Nenhum resultado</div>`;
            return;
        }

        const pilares   = tree.filter(n => n.tipo === 'pilar');
        const semPilar  = tree.filter(n => n.tipo !== 'pilar');

        let html = '';

        pilares.forEach(p => {
            const isActivePilar = min_minAtivo?.id === p.id;
            const desc = min_countDesc(p);
            html += `<div class="tree-pilar-hd ${isActivePilar ? 'active-pilar' : ''}" onclick="min_sel('${p.id}')">
                <span class="tree-ph-nome">${p.nome}</span>
                ${desc ? `<span class="tree-ph-count">${desc}</span>` : ''}
            </div>`;
            p._ch.forEach(c => { html += min_renderTreeItem(c, 1); });
        });

        if (semPilar.length) {
            html += `<div class="tree-sep"></div>`;
            html += `<div class="tree-pilar-hd" title="Itens sem Pilar atribuído. Edita-os para os associar a um Pilar.">
                <span class="tree-ph-nome" style="color:var(--text-faint)">Sem Pilar</span>
                <span class="tree-ph-count">${semPilar.length}</span>
            </div>`;
            semPilar.forEach(n => { html += min_renderTreeItem(n, 1); });
        }

        el.innerHTML = html;
    }

    function min_renderTreeItem(node, depth) {
        const isActive   = min_minAtivo?.id === node.id;
        const indent     = 8 + depth * 14;
        const hasChildren = node._ch.length > 0;
        const tipoClass  = node.tipo ? `tipo-${node.tipo}` : '';
        const tipoLbl    = node.tipo ? (TIPO_LBL[node.tipo] || node.tipo.toUpperCase()) : '';
        const prefix     = depth === 1 ? '├─ ' : depth === 2 ? '└─ ' : '· ';

        let html = `<div class="tree-item ${isActive ? 'active' : ''}" onclick="min_sel('${node.id}')" style="padding-left:${indent}px">
            ${depth > 0 ? `<span class="depth-prefix">${prefix}</span>` : ''}
            <div class="tree-item-inner">
                <div class="tree-item-nome" style="font-size:${Math.max(11,13-depth)}px">${node.nome}</div>
                ${depth === 1 && node.tipo ? `<span class="tree-item-sub ${tipoClass}">${tipoLbl}</span>` : ''}
            </div>
            ${hasChildren ? `<span class="tree-item-count">${node._ch.length}</span>` : ''}
        </div>`;

        node._ch.forEach(c => { html += min_renderTreeItem(c, depth + 1); });
        return html;
    }

    /* ══════════════════════════════════════════════
       INIT
    ══════════════════════════════════════════════ */
    async function min_init() {
        min_minAtivo = null; min_indMes = ym(); min_escMes = ym();
        const [ms, mbs, cs] = await Promise.all([
            min_sb('ministerios?select=*&ativo=eq.true&order=nome').catch(() => []),
            min_sb('membros?select=id,nome&ativo=eq.true&order=nome').catch(() => []),
            min_sb('cultos?select=*&ativo=eq.true&order=dia_semana,hora_inicio').catch(() => []),
        ]);
        min_mins     = ms || [];
        min_memAll   = mbs || [];
        min_cultsAll = (cs || []).filter(c => c.dia_semana === 'Domingo' || isSabado(c.dia_semana));
        min_renderSide();
        const el = document.getElementById('min-content');
        if (el) el.innerHTML = `<div class="mod-empty"><div class="mod-empty-title">Selecciona um Ministério</div></div>`;
    }

    /* ══════════════════════════════════════════════
       SELECIONAR MINISTÉRIO
    ══════════════════════════════════════════════ */
    async function min_sel(id) {
        min_minAtivo = min_mins.find(m => m.id === id);
        min_renderSide();
        const [mems, cults] = await Promise.all([
            min_sb(`ministerio_membros?ministerio_id=eq.${id}&select=*,membros(id,nome)&ativo=eq.true&order=papel,created_at`).catch(() => []),
            min_sb(`ministerio_cultos?ministerio_id=eq.${id}&select=*,cultos(id,nome,dia_semana,hora_inicio,hora_fim)`).catch(() => []),
        ]);
        min_minMems  = mems || [];
        min_minCults = cults || [];
        min_memNoMin = new Set(min_minMems.map(m => m.membro_id));

        // Breadcrumb do caminho
        const bc = min_breadcrumb(id);

        document.getElementById('min-content').innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 18px 0;background:var(--bg-card);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;flex-wrap:wrap">
            <div style="display:flex;flex-direction:column;gap:2px;padding-bottom:8px">
                ${bc ? `<div style="font-size:10px;color:var(--text-faint)">${bc}</div>` : ''}
                <div style="display:flex;align-items:center;gap:8px">
                    <div style="font-family:var(--font-title);font-size:14px;color:var(--primary-dark)">${min_minAtivo.nome}</div>
                    ${min_minAtivo.tipo ? `<span class="tree-item-sub tipo-${min_minAtivo.tipo}" style="font-size:9px">${TIPO_LBL[min_minAtivo.tipo]||min_minAtivo.tipo.toUpperCase()}</span>` : ''}
                </div>
            </div>
            <div class="mod-tabs" style="padding:0;border-bottom:none;flex:1">
                <button class="mod-tab active" id="mint-membros"  onclick="min_tab('membros')">Membros (${min_minMems.length})</button>
                <button class="mod-tab"        id="mint-cultos"   onclick="min_tab('cultos')">Cultos</button>
                <button class="mod-tab"        id="mint-disp"     onclick="min_tab('disp')">Disponibilidade</button>
                <button class="mod-tab"        id="mint-indisp"   onclick="min_tab('indisp')">Indisponibilidades</button>
                <button class="mod-tab"        id="mint-escala"   onclick="min_tab('escala')">Escala</button>
                <button class="mod-tab"        id="mint-partilha" onclick="min_tab('partilha')">Partilhar</button>
                <button class="mod-tab"        id="mint-checkin"  onclick="min_tab('checkin')">Check-in</button>
            </div>
            <div style="display:flex;gap:6px;padding-bottom:8px;flex-shrink:0">
                <button class="btn-sm" onclick="min_abrirFormMin('${id}')">Editar</button>
                <button class="btn-sm danger" onclick="min_inativarMin('${id}')">${min_minAtivo.ativo===false?'Reativar':'Inativar'}</button>
            </div>
        </div>
        <div class="mod-tab-body active" id="mintb-membros"></div>
        <div class="mod-tab-body"        id="mintb-cultos"></div>
        <div class="mod-tab-body"        id="mintb-disp"></div>
        <div class="mod-tab-body"        id="mintb-indisp"></div>
        <div class="mod-tab-body"        id="mintb-escala"></div>
        <div class="mod-tab-body"        id="mintb-partilha"></div>
        <div class="mod-tab-body"        id="mintb-checkin"></div>`;
        min_renderMems();
    }

    function min_tab(t) {
        ['membros','cultos','disp','indisp','escala','partilha','checkin'].forEach(x => {
            document.getElementById(`mint-${x}`)?.classList.toggle('active', x === t);
            document.getElementById(`mintb-${x}`)?.classList.toggle('active', x === t);
        });
        if (t === 'cultos')   min_renderCults();
        if (t === 'disp')     min_renderDisp();
        if (t === 'indisp')   min_renderIndisp();
        if (t === 'escala')   min_renderEscala();
        if (t === 'partilha') min_renderPartilha();
        if (t === 'checkin')  min_renderCheckin();
    }

    /* ══════════════════════════════════════════════
       ORGANOGRAMA
    ══════════════════════════════════════════════ */
    function min_abrirOrg() {
        document.getElementById('min-modal-org').style.display = 'flex';
        min_renderOrg();
    }
    function min_fecharOrg() {
        document.getElementById('min-modal-org').style.display = 'none';
    }

    var min_orgFiltro = 'all';

    function min_orgTab(tipo) {
        min_orgFiltro = tipo;
        ['all','ae','ministerio','link','office'].forEach(t => {
            document.getElementById('org-tab-'+t)?.classList.toggle('on', t === tipo);
        });
        min_renderOrg();
    }

    function min_renderOrg() {
        const el = document.getElementById('min-org-body');
        if (!el) return;

        if (!min_mins.length) {
            el.innerHTML = `<div style="text-align:center;color:var(--text-faint);padding:40px;font-size:12px">Nenhum ministério activo</div>`;
            return;
        }

        // Se filtro por tipo: mostra lista flat agrupada por hierarquia desse tipo
        if (min_orgFiltro !== 'all') {
            // Pegar todos do tipo seleccionado
            const doTipo = min_mins.filter(m => m.tipo === min_orgFiltro);
            if (!doTipo.length) {
                el.innerHTML = `<div style="text-align:center;color:var(--text-faint);padding:40px;font-size:12px">Nenhum item do tipo "${TIPO_LBL[min_orgFiltro]}"</div>`;
                return;
            }
            // Incluir ancestrais para contexto
            const idsSet = new Set();
            doTipo.forEach(m => {
                idsSet.add(m.id);
                let cur = m;
                while (cur?.parent_id) {
                    idsSet.add(cur.parent_id);
                    cur = min_mins.find(x => x.id === cur.parent_id);
                }
            });
            const lista = min_mins.filter(m => idsSet.has(m.id));
            const tree  = min_buildTree(lista);
            const pilares  = tree.filter(n => n.tipo === 'pilar');
            const semPilar = tree.filter(n => n.tipo !== 'pilar');

            let html = '';
            pilares.forEach(p => {
                html += `<div class="org-pilar-section">
                    <div class="org-pilar-lbl">${p.nome}</div>
                    <div class="org-tree">
                        <div class="org-has-ch">
                            <div class="org-box nivel-pilar">
                                <div class="org-box-nome">${p.nome}</div>
                                <div class="org-box-tipo">PILAR</div>
                            </div>
                        </div>
                        <ul class="org-ul">${p._ch.map(c => min_renderOrgLi(c, 1)).join('')}</ul>
                    </div>
                </div>`;
            });
            if (semPilar.length) {
                html += `<div class="org-pilar-section"><div class="org-pilar-lbl">SEM PILAR</div>
                    <div class="org-tree"><ul class="org-ul">${semPilar.map(n => min_renderOrgLi(n, 1)).join('')}</ul></div></div>`;
            }
            el.innerHTML = html || `<div style="text-align:center;color:var(--text-faint);padding:40px;font-size:12px">Nenhum resultado</div>`;
            return;
        }

        // Modo ALL: uma secção por pilar
        const tree    = min_buildTree(min_mins);
        const pilares = tree.filter(n => n.tipo === 'pilar');
        const semPilar = tree.filter(n => n.tipo !== 'pilar');

        let html = '';
        pilares.forEach(p => {
            html += `<div class="org-pilar-section">
                <div class="org-pilar-lbl">${p.nome}</div>
                <div class="org-tree">
                    <div ${p._ch.length ? 'class="org-has-ch"' : ''}>
                        <div class="org-box nivel-pilar" onclick="min_sel('${p.id}');min_fecharOrg()">
                            <div class="org-box-nome">${p.nome}</div>
                            <div class="org-box-tipo">PILAR</div>
                            ${p._ch.length ? `<div class="org-box-count">${min_countDesc(p)} itens</div>` : ''}
                        </div>
                    </div>
                    ${p._ch.length ? `<ul class="org-ul">${p._ch.map(c => min_renderOrgLi(c, 1)).join('')}</ul>` : ''}
                </div>
            </div>`;
        });
        if (semPilar.length) {
            html += `<div class="org-pilar-section">
                <div class="org-pilar-lbl" style="color:var(--text-faint)">SEM PILAR</div>
                <div class="org-tree"><ul class="org-ul">${semPilar.map(n => min_renderOrgLi(n, 1)).join('')}</ul></div>
            </div>`;
        }
        el.innerHTML = html;
    }

    function min_renderOrgLi(node, depth) {
        const hasChildren = node._ch && node._ch.length > 0;
        const lvlClass    = `nivel-${depth}`;
        const tipoClass   = node.tipo || '';

        return `<li class="org-li">
            <div ${hasChildren ? 'class="org-has-ch"' : ''}>
                <div class="org-box ${lvlClass} ${tipoClass}" onclick="min_sel('${node.id}');min_fecharOrg()" title="Clica para seleccionar">
                    <div class="org-box-nome">${node.nome}</div>
                    ${depth <= 1 && node.tipo ? `<div class="org-box-tipo">${TIPO_LBL[node.tipo]||node.tipo.toUpperCase()}</div>` : ''}
                    ${hasChildren ? `<div class="org-box-count">${node._ch.length} sub</div>` : ''}
                </div>
            </div>
            ${hasChildren ? `<ul class="org-ul">${node._ch.map(c => min_renderOrgLi(c, depth + 1)).join('')}</ul>` : ''}
        </li>`;
    }

    /* ══════════════════════════════════════════════
       CRUD MINISTÉRIO
    ══════════════════════════════════════════════ */
    function min_abrirFormMin(id) {
        min_formEditId = id || null;
        const isEdit = !!id;
        const m = isEdit ? min_mins.find(x => x.id === id) : null;

        document.getElementById('min-modal-min-title').textContent = isEdit ? 'Editar Ministério' : 'Novo Ministério';
        document.getElementById('min-f-nome').value  = m?.nome || '';
        document.getElementById('min-f-tipo').value  = m?.tipo || '';
        document.getElementById('min-f-desc').value  = m?.descricao || '';
        document.getElementById('min-f-ativo').checked = m ? m.ativo !== false : true;

        const msg = document.getElementById('min-f-msg');
        msg.textContent = ''; msg.className = 'form-msg';

        // Popular select de pai
        min_popularParents(id, m?.parent_id || '');

        document.getElementById('min-modal-min').style.display = 'flex';
        setTimeout(() => document.getElementById('min-f-nome').focus(), 80);
    }

    function min_popularParents(excludeId, selectedId) {
        const sel = document.getElementById('min-f-parent');
        const tree = min_buildTree(min_mins);

        // Flatten tree em ordem hierárquica com indentação
        const opts = ['<option value="">— Nível raiz —</option>'];
        function addOpts(nodes, depth) {
            nodes.forEach(n => {
                if (n.id === excludeId) return; // não pode ser pai de si mesmo
                const prefix = '·'.repeat(depth * 2);
                const sel_   = n.id === selectedId ? 'selected' : '';
                opts.push(`<option value="${n.id}" ${sel_}>${prefix} ${n.nome}${n.tipo ? ' ['+TIPO_LBL[n.tipo]+']' : ''}</option>`);
                addOpts(n._ch, depth + 1);
            });
        }
        addOpts(tree, 0);
        sel.innerHTML = opts.join('');
        min_atualizarPreviewPai();
        sel.onchange = min_atualizarPreviewPai;
    }

    function min_atualizarPreviewPai() {
        const sel = document.getElementById('min-f-parent');
        const prev = document.getElementById('min-f-parent-preview');
        if (!sel || !prev) return;
        const v = sel.value;
        if (!v) { prev.textContent = ''; return; }
        const bc = min_breadcrumb(v);
        const nome = min_mins.find(m => m.id === v)?.nome || '';
        prev.textContent = bc ? `Caminho: ${bc} › ${nome}` : `Caminho: ${nome}`;
    }

    function min_fecharFormMin() {
        document.getElementById('min-modal-min').style.display = 'none';
    }

    async function min_salvarMin() {
        const nome      = document.getElementById('min-f-nome').value.trim();
        const slug      = nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
        const tipo      = document.getElementById('min-f-tipo').value || null;
        const descricao = document.getElementById('min-f-desc').value.trim() || null;
        const ativo     = document.getElementById('min-f-ativo').checked;
        const parent_id = document.getElementById('min-f-parent').value || null;
        const btn = document.getElementById('min-f-save');
        const msgEl = document.getElementById('min-f-msg');

        if (!nome) { msgEl.textContent = 'Nome é obrigatório.'; msgEl.className = 'form-msg err'; return; }

        btn.disabled = true; btn.textContent = 'A guardar…';
        try {
            if (min_formEditId) {
                await min_sb(`ministerios?id=eq.${min_formEditId}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ slug, nome, tipo, descricao, ativo, parent_id })
                });
                const idx = min_mins.findIndex(m => m.id === min_formEditId);
                if (idx >= 0) Object.assign(min_mins[idx], { nome, tipo, descricao, ativo, parent_id });
                if (min_minAtivo?.id === min_formEditId) Object.assign(min_minAtivo, { nome, tipo, ativo, parent_id });
                min_t('Ministério actualizado');
            } else {
                const res = await min_sb('ministerios', {
                    method: 'POST',
                    body: JSON.stringify({ slug, nome, tipo, descricao, ativo: true, parent_id })
                });
                const novo = Array.isArray(res) ? res[0] : res;
                if (novo) min_mins.push(novo);
                min_t('Ministério criado');
            }
            min_renderSide();
            min_fecharFormMin();
        } catch (e) {
            msgEl.textContent = e.message || JSON.stringify(e);
            msgEl.className = 'form-msg err';
        }
        btn.disabled = false; btn.textContent = 'Guardar';
    }

    async function min_inativarMin(id) {
        const m = min_mins.find(x => x.id === id); if (!m) return;
        const ativar = m.ativo === false;
        const msg = ativar ? `Reativar "${m.nome}"?` : `Inativar "${m.nome}"? Deixará de aparecer na lista principal.`;
        if (!confirm(msg)) return;
        await min_sb(`ministerios?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify({ ativo: ativar }) });
        m.ativo = ativar;
        min_t(ativar ? 'Ministério reativado' : 'Ministério inativado');
        const todos = await min_sb('ministerios?select=*&order=nome').catch(() => []);
        min_mins = (todos || []).filter(x => x.ativo !== false);
        min_renderSide();
        if (!ativar && min_minAtivo?.id === id) {
            min_minAtivo = null;
            const el = document.getElementById('min-content');
            if (el) el.innerHTML = `<div class="mod-empty"><div class="mod-empty-title">Ministério inativado</div></div>`;
        }
    }

    function min_abrirMem() {
        document.getElementById('min-m-search').value = '';
        document.getElementById('min-m-papel').value  = 'membro';
        document.getElementById('min-m-msg').className = 'form-msg';
        min_filtrarMembros();
        document.getElementById('min-modal-mem').style.display = 'flex';

    function min_fecharModalMem() { document.getElementById('min-modal-mem').style.display = 'none'; }

    function min_filtrarMembros() {
        const q  = document.getElementById('min-m-search')?.value.toLowerCase() || '';
        const el = document.getElementById('min-m-lista'); if (!el) return;
        const f  = min_memAll.filter(m => !min_memNoMin.has(m.id) && m.nome?.toLowerCase().includes(q)).slice(0, 30);
        el.innerHTML = f.length ? f.map(m => `<div style="display:flex;align-items:center;padding:9px 12px;border-bottom:1px solid var(--border);gap:10px">
            <span style="flex:1;font-size:13px;font-weight:600">${m.nome}</span>
            <button class="btn-sm primary" onclick="min_addMem('${m.id}','${m.nome.replace(/'/g,"\\'")}')">Adicionar</button>
        </div>`).join('') : `<div style="padding:14px;text-align:center;color:var(--text-faint);font-size:12px">Nenhum disponível</div>`;
    }

    async function min_addMem(mId, nome) {
        const papel = document.getElementById('min-m-papel')?.value || 'membro';
        try {
            await min_sb('ministerio_membros', { method:'POST', body:JSON.stringify({ministerio_id:min_minAtivo.id,membro_id:mId,papel,ativo:true}) });
            min_memNoMin.add(mId); min_filtrarMembros();
            smsg('min-m-msg', `${nome} adicionado`, 'ok'); min_t(`${nome} adicionado`);
            min_minMems = await min_sb(`ministerio_membros?ministerio_id=eq.${min_minAtivo.id}&select=*,membros(id,nome)&ativo=eq.true&order=papel,created_at`).catch(() => []);
            min_renderMems();
            document.getElementById('mint-membros').textContent = `Membros (${min_minMems.length})`;
        } catch (e) { smsg('min-m-msg', e.message, 'err'); }
    }
    async function min_alterPapel(id, p) { await min_sb(`ministerio_membros?id=eq.${id}`, {method:'PATCH',body:JSON.stringify({papel:p})}).catch(console.error); min_t('Papel actualizado'); }
    async function min_remMem(id) {
        if (!confirm('Remover membro do ministério?')) return;
        await min_sb(`ministerio_membros?id=eq.${id}`, { method:'DELETE' });
        min_minMems = min_minMems.filter(m => m.id !== id);
        min_memNoMin = new Set(min_minMems.map(m => m.membro_id));
        min_renderMems(); min_t('Removido');
    }

    function min_renderCults() {
        const el = document.getElementById('mintb-cultos'); if (!el) return;
        const atMap = new Map(min_minCults.map(mc => [mc.culto_id, mc]));
        el.innerHTML = `<div class="sec-hd"><div class="sec-lbl">Cultos que este ministério serve</div></div>
        <div style="display:flex;flex-direction:column;gap:8px">
        ${min_cultsAll.map(c => {
            const mc = atMap.get(c.id); const ok = !!mc;
            return `<div style="display:flex;align-items:center;padding:12px 14px;background:${ok?'var(--primary-faint)':'var(--bg-card)'};border:1px solid ${ok?'var(--primary)':'var(--border)'};border-radius:var(--radius);gap:12px">
                <div style="flex:1"><div style="font-weight:600;font-size:13px">${c.nome}</div>
                <div style="font-size:11px;color:var(--text-faint);margin-top:2px">${c.dia_semana} · ${c.hora_inicio?.slice(0,5)}–${c.hora_fim?.slice(0,5)}</div></div>
                ${ok ? `<div style="display:flex;align-items:center;gap:8px">
                    <label style="font-size:11px;color:var(--text-faint)">Vagas:</label>
                    <input type="number" min="1" max="20" value="${mc.vagas||1}" style="width:52px;padding:4px 8px;border-radius:6px;border:1px solid var(--border);font-size:12px;text-align:center" onchange="min_salvarVagas('${mc.id}',this.value)">
                    <button class="btn-sm danger" onclick="min_remCult('${mc.id}')">Remover</button>
                </div>` : `<button class="btn-sm primary" onclick="min_addCult('${c.id}')">Adicionar</button>`}
            </div>`;
        }).join('')}</div>`;
    }
    async function min_addCult(cId) {
        await min_sb('ministerio_cultos', {method:'POST',body:JSON.stringify({ministerio_id:min_minAtivo.id,culto_id:cId,vagas:1})});
        min_minCults = await min_sb(`ministerio_cultos?ministerio_id=eq.${min_minAtivo.id}&select=*,cultos(id,nome,dia_semana,hora_inicio,hora_fim)`).catch(() => []);
        min_renderCults(); min_t('Culto adicionado');
    }
    async function min_remCult(id) {
        await min_sb(`ministerio_cultos?id=eq.${id}`, {method:'DELETE'});
        min_minCults = min_minCults.filter(x => x.id !== id); min_renderCults(); min_t('Culto removido');
    }
    async function min_salvarVagas(id, v) {
        await min_sb(`ministerio_cultos?id=eq.${id}`, {method:'PATCH',body:JSON.stringify({vagas:parseInt(v)||1})}).catch(console.error);
        const mc = min_minCults.find(x => x.id === id); if (mc) mc.vagas = parseInt(v) || 1;
    }

    /* ══════════════════════════════════════════════
       DISPONIBILIDADE BASE
    ══════════════════════════════════════════════ */
    async function min_renderDisp() {
        const el = document.getElementById('mintb-disp'); if (!el) return;
        if (!min_minCults.length) { el.innerHTML = `<div style="padding:40px;text-align:center;color:var(--text-faint)"><div style="font-family:var(--font-title);font-size:10px;letter-spacing:2px">Configura primeiro os cultos</div></div>`; return; }
        const ds = await min_sb(`ministerio_disponibilidade?ministerio_id=eq.${min_minAtivo.id}&select=*`).catch(() => []);
        min_dispMap = {}; ds.forEach(d => { min_dispMap[d.membro_id+'_'+d.culto_id] = d; });
        const cults = min_minCults.map(mc => mc.cultos).filter(Boolean);
        el.innerHTML = `<div class="sec-hd"><div class="sec-lbl">Disponibilidade base por culto</div><div style="font-size:11px;color:var(--text-faint)">Liga = disponível</div></div>
        <div style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;overflow-x:auto">
        <table class="disp-table">
            <thead><tr><th>Membro</th><th>Papel</th>${cults.map(c=>`<th>${c.nome}<br><span style="font-weight:400;font-size:8px">${c.dia_semana} ${c.hora_inicio?.slice(0,5)}</span></th>`).join('')}</tr></thead>
            <tbody>${min_minMems.map(m => `<tr>
                <td>${m.membros?.nome||'—'}</td>
                <td><span class="badge ${m.papel==='lider'?'badge-lider':m.papel==='aprendiz'?'badge-aprendiz':'badge-membro'}">${PAPEL_LBL[m.papel]||m.papel}</span></td>
                ${cults.map(c => { const k=m.membro_id+'_'+c.id; const d=min_dispMap[k]; const on=d?d.disponivel:true;
                    return `<td><button class="disp-toggle ${on?'on':''}" onclick="min_togDisp('${m.membro_id}','${c.id}','${d?.id||''}',this)"></button></td>`;
                }).join('')}
            </tr>`).join('')}</tbody>
        </table></div>`;
    }
    async function min_togDisp(mId, cId, dId, btn) {
        const n = !btn.classList.contains('on'); btn.classList.toggle('on', n);
        const k = mId+'_'+cId;
        if (dId) { await min_sb(`ministerio_disponibilidade?id=eq.${dId}`,{method:'PATCH',body:JSON.stringify({disponivel:n})}).catch(console.error); if(min_dispMap[k]) min_dispMap[k].disponivel=n; }
        else { const r=await min_sb('ministerio_disponibilidade',{method:'POST',body:JSON.stringify({ministerio_id:min_minAtivo.id,membro_id:mId,culto_id:cId,disponivel:n})}).catch(()=>null);
            if(r?.[0]){min_dispMap[k]=r[0]; btn.setAttribute('onclick',`min_togDisp('${mId}','${cId}','${r[0].id}',this)`);} }
    }

    /* ══════════════════════════════════════════════
       INDISPONIBILIDADES
    ══════════════════════════════════════════════ */
    async function min_renderIndisp() {
        const el = document.getElementById('mintb-indisp'); if (!el) return;
        const [a, m] = min_indMes.split('-').map(Number);
        const fim = new Date(a, m, 0).getDate();
        const ini = `${min_indMes}-01`, fim2 = `${min_indMes}-${fim}`;
        min_indisps = await min_sb(`ministerio_indisponibilidade?ministerio_id=eq.${min_minAtivo.id}&data=gte.${ini}&data=lte.${fim2}&select=*,membros(nome),cultos(nome)`).catch(() => []);
        if (!min_indMemSel && min_minMems.length) min_indMemSel = min_minMems[0].membro_id;
        const inSet = new Set(min_indisps.filter(i => i.membro_id === min_indMemSel).map(i => i.data));
        const hoje  = new Date().toISOString().split('T')[0];
        const primeiroD = new Date(a, m-1, 1).getDay();
        let diasHtml = '';
        for (let i = 0; i < primeiroD; i++) diasHtml += `<div class="cal-mini-dia vazio"></div>`;
        for (let d = 1; d <= fim; d++) {
            const iso = `${a}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dw  = new Date(a, m-1, d).getDay();
            const eSabDom = dw === 0 || dw === 6;
            let cls = 'cal-mini-dia';
            if (!eSabDom) cls += ' semana';
            else if (inSet.has(iso)) cls += ' bloqueado';
            else if (iso === hoje) cls += ' hoje';
            diasHtml += `<div class="${cls}" onclick="${eSabDom?`min_togIndisp('${iso}')`:'void(0)'}" title="${iso}">${d}</div>`;
        }
        el.innerHTML = `
        <div class="sec-hd" style="margin-bottom:10px"><div class="sec-lbl">Indisponibilidades</div></div>
        <div class="sec-lbl" style="margin-bottom:6px">Seleccionar membro</div>
        <div class="mem-chips" style="margin-bottom:14px">${min_minMems.map(mm=>`<div class="mem-chip ${min_indMemSel===mm.membro_id?'active':''}" onclick="min_selIndMem('${mm.membro_id}')">${mm.membros?.nome||'—'}</div>`).join('')}</div>
        <div class="ind-layout">
            <div class="ind-cal-wrap">
                <div class="mes-nav">
                    <button class="btn-sm" style="padding:3px 8px" onclick="min_navInd(-1)">←</button>
                    <div class="mes-titulo">${mesLbl(min_indMes)}</div>
                    <button class="btn-sm" style="padding:3px 8px" onclick="min_navInd(1)">→</button>
                </div>
                <div class="cal-mini">
                    <div class="cal-mini-hds">${['D','S','T','Q','Q','S','S'].map(d=>`<div class="cal-mini-hd">${d}</div>`).join('')}</div>
                    <div class="cal-mini-dias">${diasHtml}</div>
                </div>
                <div style="margin-top:8px;font-size:10px;color:var(--text-faint);text-align:center">Clica Sáb/Dom para marcar</div>
            </div>
            <div style="flex:1;min-width:200px">
                <div class="sec-lbl" style="margin-bottom:8px">Lista do mês</div>
                <div id="min-indisp-lista"></div>
            </div>
        </div>`;
        min_renderIndispLista();
    }

    function min_renderIndispLista() {
        const el = document.getElementById('min-indisp-lista'); if (!el) return;
        const filtradas = min_indisps.filter(i => i.membro_id === min_indMemSel);
        if (!filtradas.length) { el.innerHTML = `<div style="padding:12px;border:1px solid var(--border);border-radius:var(--radius);text-align:center;color:var(--text-faint);font-size:12px">Nenhuma indisponibilidade</div>`; return; }
        const sorted = [...filtradas].sort((a,b) => a.data.localeCompare(b.data));
        el.innerHTML = `<div style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">${sorted.map(i=>`
        <div style="display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);gap:8px;font-size:12px">
            <div style="font-family:var(--font-title);font-size:11px;color:var(--primary-dark);flex:1">${fmtD(i.data)}</div>
            <button class="btn-sm danger" style="padding:2px 7px" onclick="min_remIndisp('${i.id}')">✕</button>
        </div>`).join('')}</div>`;
        const outros = min_indisps.filter(i => i.membro_id !== min_indMemSel);
        if (outros.length) {
            const porData = {};
            outros.forEach(i => { if (!porData[i.data]) porData[i.data] = []; porData[i.data].push(i.membros?.nome||'?'); });
            el.innerHTML += `<div style="margin-top:12px;font-family:var(--font-title);font-size:9px;letter-spacing:1.5px;color:var(--text-faint);margin-bottom:6px">OUTROS NESTE MÊS</div>
            <div style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">${Object.entries(porData).sort().map(([data,nomes])=>`
            <div style="display:flex;align-items:center;padding:7px 12px;border-bottom:1px solid var(--border);gap:8px;font-size:11px">
                <div style="font-family:var(--font-title);font-size:10px;color:var(--primary-dark);min-width:90px">${fmtD(data)}</div>
                <div style="color:var(--text-muted)">${nomes.join(', ')}</div>
            </div>`).join('')}</div>`;
        }
    }

    function min_selIndMem(id) { min_indMemSel = id; min_renderIndisp(); }
    function min_navInd(n)     { min_indMes = addM(min_indMes, n); min_renderIndisp(); }

    async function min_togIndisp(iso) {
        if (!min_indMemSel) return;
        const ex = min_indisps.find(i => i.membro_id === min_indMemSel && i.data === iso);
        if (ex) { await min_sb(`ministerio_indisponibilidade?id=eq.${ex.id}`, {method:'DELETE'}); min_indisps = min_indisps.filter(i => i.id !== ex.id); }
        else {
            const r = await min_sb('ministerio_indisponibilidade', {method:'POST',body:JSON.stringify({ministerio_id:min_minAtivo.id,membro_id:min_indMemSel,data:iso})}).catch(() => null);
            if (r?.[0]) { const nm = min_minMems.find(m => m.membro_id === min_indMemSel); min_indisps.push({...r[0], membros:{nome:nm?.membros?.nome||''}, cultos:null}); }
        }
        min_renderIndisp();
    }

    function min_renderEscCorpo() {
        const el = document.getElementById('min-esc-corpo'); if (!el) return;
        const [a, m] = min_escMes.split('-').map(Number);
        const dias  = sabDomMes(a, m);
        const cults = min_minCults.map(mc => ({...mc.cultos, vagas:mc.vagas||1, mc_id:mc.id})).filter(Boolean);
        if (!dias.length || !cults.length) { el.innerHTML = `<div style="padding:30px;text-align:center;color:var(--text-faint);font-size:12px">Nenhum culto neste mês</div>`; return; }
        const sabDatas = dias.filter(d => d.dw === 6);
        const domDatas = dias.filter(d => d.dw === 0);
        const cultDatas = cults.map(c => ({ c, datas: isSabado(c.dia_semana) ? sabDatas : domDatas }));
        const todasDatas = [...new Set(cultDatas.flatMap(cd => cd.datas.map(d => d.iso)))].sort();
        const dataMap = Object.fromEntries(dias.map(d => [d.iso, d]));
        let html = `<div class="esc-table-wrap"><table class="esc-table">
        <thead><tr>
            <th class="th-culto">Culto</th>
            ${todasDatas.map(iso => { const {d,dw}=dataMap[iso]||{d:'?',dw:0};
                return `<th>${DIAS_PT[dw]}<br><span style="font-size:10px;font-weight:400">${String(d).padStart(2,'0')} ${MESES_ABV[m]}</span></th>`;
            }).join('')}
        </tr></thead><tbody>`;
        cultDatas.forEach(({c, datas}) => {
            const datasSet = new Set(datas.map(d => d.iso));
            html += `<tr>
                <td class="td-culto"><div style="font-weight:700;font-size:12px">${c.nome}</div><div style="font-size:10px;color:var(--text-faint)">${c.hora_inicio?.slice(0,5)}</div></td>
                ${todasDatas.map(iso => {
                    if (!datasSet.has(iso)) return `<td style="background:var(--bg-panel);opacity:0.3">—</td>`;
                    const ps = min_escala.filter(e => e.data === iso && e.culto_id === c.id);
                    const faltam = Math.max(0, c.vagas - ps.filter(p => p.papel_escala === 'servindo').length);
                    if (!ps.length) return `<td class="td-vazia"><div style="display:flex;flex-direction:column;align-items:center;gap:4px"><span style="color:var(--text-faint);font-size:10px">—</span><span class="esc-add-btn" onclick="min_abrirEA('${iso}','${c.id}')">+</span></div></td>`;
                    return `<td><div style="display:flex;flex-direction:column;gap:3px;align-items:center">
                        ${ps.map(p=>`<div class="esc-cell">
                            <span class="esc-cell-nome">${p.membros?.nome||'—'}</span>
                            ${p.papel_escala!=='servindo'?`<span class="esc-cell-papel">${p.papel_escala.toUpperCase()}</span>`:''}
                            ${p.notas?`<span class="esc-cell-notas">${p.notas}</span>`:''}
                            <span class="esc-rem-btn" onclick="min_remEsc('${p.id}')">✕ remover</span>
                        </div>`).join('')}
                        ${faltam>0?`<span style="font-size:9px;color:var(--orange);font-family:var(--font-title)">${faltam} vaga${faltam>1?'s':''}</span>`:''}
                        <span class="esc-add-btn" onclick="min_abrirEA('${iso}','${c.id}')">+</span>
                    </div></td>`;
                }).join('')}
            </tr>`;
        });
        html += `</tbody></table></div>`;
        el.innerHTML = html;
    }

    async function min_gerarEsc() {
        if (!confirm(`Gerar escala para ${mesLbl(min_escMes)}? As entradas automáticas existentes serão substituídas.`)) return;
        const [a, m] = min_escMes.split('-').map(Number);
        const ini = `${min_escMes}-01`, fim2 = `${min_escMes}-${new Date(a,m,0).getDate()}`;
        const [dsAll, indAll, escAnt] = await Promise.all([
            min_sb(`ministerio_disponibilidade?ministerio_id=eq.${min_minAtivo.id}&select=*`).catch(() => []),
            min_sb(`ministerio_indisponibilidade?ministerio_id=eq.${min_minAtivo.id}&data=gte.${ini}&data=lte.${fim2}&select=*`).catch(() => []),
            min_sb(`ministerio_escala?ministerio_id=eq.${min_minAtivo.id}&data=gte.${addM(min_escMes,-2)}-01&data=lt.${ini}&select=membro_id`).catch(() => []),
        ]);
        await min_sb(`ministerio_escala?ministerio_id=eq.${min_minAtivo.id}&data=gte.${ini}&data=lte.${fim2}&gerado_auto=eq.true`, {method:'DELETE'}).catch(() => {});
        const srvRec = {}; escAnt.forEach(e => { srvRec[e.membro_id]=(srvRec[e.membro_id]||0)+1; }); min_minMems.forEach(m => { if(!srvRec[m.membro_id]) srvRec[m.membro_id]=0; });
        const dMap = {}; dsAll.forEach(d => { dMap[d.membro_id+'_'+d.culto_id]=d.disponivel; });
        const dias  = sabDomMes(a, m);
        const cults = min_minCults.map(mc => ({...mc.cultos, vagas:mc.vagas||1})).filter(Boolean);
        const novas = []; const jaEsc = {};
        const memsEscalaveis = min_minMems.filter(m => m.papel !== 'lider');
        dias.forEach(({d, dw, iso}) => {
            cults.forEach(c => {
                const match = (isSabado(c.dia_semana)&&dw===6)||(c.dia_semana==='Domingo'&&dw===0); if (!match) return;
                const indSet = new Set(indAll.filter(i=>i.data===iso&&(!i.culto_id||i.culto_id===c.id)).map(i=>i.membro_id));
                const dispMems = memsEscalaveis.filter(m => {
                    if (indSet.has(m.membro_id)||jaEsc[m.membro_id+'_'+iso]) return false;
                    const v = dMap[m.membro_id+'_'+c.id]; return v===undefined?true:v;
                });
                const ativos = dispMems.filter(m=>m.papel!=='aprendiz').sort((a,b)=>(srvRec[a.membro_id]||0)-(srvRec[b.membro_id]||0));
                const aprs   = dispMems.filter(m=>m.papel==='aprendiz').sort((a,b)=>(srvRec[a.membro_id]||0)-(srvRec[b.membro_id]||0));
                let escalados = 0;
                for (const mm of ativos) { if (escalados>=c.vagas) break;
                    novas.push({ministerio_id:min_minAtivo.id,membro_id:mm.membro_id,culto_id:c.id,data:iso,papel_escala:'servindo',gerado_auto:true});
                    jaEsc[mm.membro_id+'_'+iso]=true; srvRec[mm.membro_id]=(srvRec[mm.membro_id]||0)+1; escalados++;
                }
                if (escalados>0&&aprs.length) { const apr=aprs.find(mm=>!jaEsc[mm.membro_id+'_'+iso]);
                    if (apr) { novas.push({ministerio_id:min_minAtivo.id,membro_id:apr.membro_id,culto_id:c.id,data:iso,papel_escala:'aprendiz',gerado_auto:true});
                        jaEsc[apr.membro_id+'_'+iso]=true; srvRec[apr.membro_id]=(srvRec[apr.membro_id]||0)+1; }
                }
            });
        });
        for (let i=0; i<novas.length; i+=10) await min_sb('ministerio_escala',{method:'POST',body:JSON.stringify(novas.slice(i,i+10))}).catch(console.error);
        min_t(`Escala gerada — ${novas.length} entradas`); await min_renderEscala();
    }

        const todasDatas = [...new Set(cultDatas.flatMap(cd => cd.datas.map(d => d.iso)))].sort();
        const dataMap = Object.fromEntries(dias.map(d => [d.iso, d]));
        todasDatas.forEach(iso => {
            const {d,dw} = dataMap[iso]||{d:'?',dw:0};
            s += `*${DIAS_PT[dw].toUpperCase()}, ${String(d).padStart(2,'0')} ${MESES_ABV[m]}*\n`;

                const datasSet = new Set((isSabado(c.dia_semana)?sabDatas:domDatas).map(d => d.iso));

                const ps = esc.filter(e => e.data===iso && e.culto_id===c.id);
                s += `  _${c.nome}_ (${c.hora_inicio?.slice(0,5)})\n`;
                if (!ps.length) { s += `    — sem escala\n`; return; }
                ps.forEach(p => { s += `    • ${p.membros?.nome||'—'}${p.papel_escala!=='servindo'?' ['+p.papel_escala+']':''}${p.notas?' ('+p.notas+')':''}\n`; });

            s += '\n';
        });
        return s.trim();
    }

            `&select=*,membros(id,nome),cultos(id,nome,hora_inicio)&order=culto_id`
        ).catch(() => []);

            const c = e.cultos; if (!c) return;
            if (!cultosHoje[c.id]) cultosHoje[c.id] = { nome:c.nome, hora:c.hora_inicio?.slice(0,5), membros:[] };
            cultosHoje[c.id].membros.push({ id:e.membro_id, nome:e.membros?.nome||'—' });
        });

        // Map de quem já fez check-in
        const ciMap = {}; // membro_id+culto_id → checkin
        checkins.forEach(c => { ciMap[c.membro_id+'_'+c.culto_id] = c; });

        el.innerHTML = `
        <div class="sec-hd">
            <div>
                <div style="font-family:var(--font-title);font-size:13px;color:var(--primary-dark)">${min_minAtivo.nome}</div>
                <div style="font-size:11px;color:var(--text-faint);margin-top:2px">${new Date().toLocaleDateString('pt-PT',{weekday:'long',day:'2-digit',month:'long'})}</div>
            </div>
            <div style="display:flex;gap:6px">
                <button class="btn-sm" onclick="min_renderCheckin()">↻ Atualizar</button>
                <button class="btn-sm primary" onclick="min_abrirQR()">📱 QR Code</button>
            </div>
        </div>

        <!-- RESUMO -->
        <div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap">
            <div style="flex:1;min-width:100px;background:var(--primary-faint);border:1px solid var(--primary);border-radius:var(--radius);padding:14px;text-align:center">
                <div style="font-family:var(--font-title);font-size:22px;color:var(--primary-dark)">${checkins.filter(c=>!c.atrasado).length}</div>
                <div style="font-size:10px;color:var(--text-faint);font-family:var(--font-title);letter-spacing:1px">NO HORÁRIO</div>
            </div>
            <div style="flex:1;min-width:100px;background:rgba(251,140,0,0.08);border:1px solid rgba(251,140,0,0.3);border-radius:var(--radius);padding:14px;text-align:center">
                <div style="font-family:var(--font-title);font-size:22px;color:var(--orange)">${checkins.filter(c=>c.atrasado).length}</div>
                <div style="font-size:10px;color:var(--text-faint);font-family:var(--font-title);letter-spacing:1px">ATRASADOS</div>
            </div>
            <div style="flex:1;min-width:100px;background:rgba(192,57,43,0.06);border:1px solid rgba(192,57,43,0.2);border-radius:var(--radius);padding:14px;text-align:center">
                <div style="font-family:var(--font-title);font-size:22px;color:var(--red)">${escHoje.length - checkins.length}</div>
                <div style="font-size:10px;color:var(--text-faint);font-family:var(--font-title);letter-spacing:1px">AUSENTES</div>
            </div>
        </div>

        <!-- TABELA POR CULTO -->
        ${Object.entries(cultosHoje).length ? Object.entries(cultosHoje).map(([cId, cult]) => {
            const rows = cult.membros.map(m => {
                const ci = ciMap[m.id+'_'+cId];
                const hora = ci ? new Date(ci.hora_checkin).toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'}) : '—';
                const status = ci ? (ci.atrasado ? 'atrasado' : 'ok') : 'ausente';
                const statusLbl = { ok:'✅ Presente', atrasado:`⚠️ ${ci?.minutos_atraso}min atraso`, ausente:'❌ Ausente' };
                const statusClr = { ok:'var(--green)', atrasado:'var(--orange)', ausente:'var(--red)' };
                const zapBtn = ci?.atrasado && !ci?.notificado_lider
                    ? `<button class="btn-sm" style="font-size:10px;padding:3px 8px" onclick="min_zapLider('${ci.id}','${m.nome}',${ci.minutos_atraso},'${cId}')">📲 Zap</button>`
                    : ci?.atrasado && ci?.notificado_lider ? `<span style="font-size:10px;color:var(--text-faint)">✓ Notificado</span>` : '';
                return `<tr>
                    <td style="font-weight:600">${m.nome}</td>
                    <td style="font-family:var(--font-title);font-size:11px;color:${statusClr[status]}">${statusLbl[status]}</td>
                    <td style="font-family:var(--font-title);font-size:11px;color:var(--text-faint)">${hora}</td>
                    <td>${zapBtn}</td>
                </tr>`;
            }).join('');
            return `
            <div style="margin-bottom:16px">
                <div style="font-family:var(--font-title);font-size:10px;letter-spacing:1.5px;color:var(--primary-dark);margin-bottom:8px;display:flex;align-items:center;gap:6px">
                    ${cult.nome} <span style="color:var(--text-faint);font-weight:400">${cult.hora}</span>
                    <span style="margin-left:auto;font-size:9px;color:var(--text-faint)">${cult.membros.length} escalados</span>
                </div>
                <div style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
                    <table class="t"><thead><tr><th>Nome</th><th>Estado</th><th>Hora</th><th></th></tr></thead>
                    <tbody>${rows}</tbody></table>
                </div>
            </div>`;
        }).join('') : `<div style="padding:30px;text-align:center;color:var(--text-faint)"><div style="font-family:var(--font-title);font-size:10px;letter-spacing:2px">Sem escala para hoje</div></div>`}

        <!-- LINK CHECK-IN -->
        <div style="margin-top:12px;padding:12px 14px;background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;gap:10px">
            <div style="flex:1;font-size:11px;color:var(--text-faint);word-break:break-all">${checkUrl}</div>
            <button class="btn-sm" onclick="navigator.clipboard.writeText('${checkUrl}').then(()=>min_t('Link copiado!'))">Copiar</button>
        </div>`;

        window._ciCheckUrl = checkUrl;
    }

    function min_abrirQR() {
        const url = window._ciCheckUrl;
        if (!url) { min_t('Abre primeiro o tab Check-in', 'err'); return; }
        // Modal com QR
        let modal = document.getElementById('min-modal-qr');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'min-modal-qr';
            modal.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:400;align-items:center;justify-content:center';
            modal.innerHTML = `<div style="background:var(--bg-card);border-radius:var(--radius);padding:28px;text-align:center;box-shadow:var(--shadow-md);max-width:340px;width:90%">
                <div style="font-family:var(--font-title);font-size:10px;letter-spacing:2px;color:var(--primary-dark);margin-bottom:6px">CHECK-IN QR CODE</div>
                <div style="font-size:13px;font-weight:600;margin-bottom:16px" id="min-qr-min-nome"></div>
                <div id="min-qr-container" style="display:flex;justify-content:center;margin-bottom:16px;padding:12px;background:white;border-radius:10px;display:inline-block"></div>
                <div style="font-size:10px;color:var(--text-faint);margin-bottom:16px;word-break:break-all" id="min-qr-url"></div>
                <div style="font-size:11px;color:var(--text-faint);margin-bottom:16px">QR fixo — válido sempre para este ministério</div>
                <button class="btn-sm" onclick="document.getElementById('min-modal-qr').style.display='none'">Fechar</button>
            </div>`;
            modal.onclick = e => { if(e.target===modal) modal.style.display='none'; };
            document.body.appendChild(modal);
        }
        document.getElementById('min-qr-min-nome').textContent = min_minAtivo.nome;
        document.getElementById('min-qr-url').textContent = url;
        modal.style.display = 'flex';
        const container = document.getElementById('min-qr-container');
        container.innerHTML = '';
        if (window.QRCode) {
            new QRCode(container, { text: url, width:180, height:180, colorDark:'#02161e', colorLight:'#ffffff', correctLevel:QRCode.CorrectLevel.M });
        } else {
            container.innerHTML = `<div style="font-size:11px;color:var(--red)">QRCode.js não carregou</div>`;
        }
    }

    async function min_zapLider(ciId, nomeVoluntario, minAtraso, cultoId) {
        // Buscar lideres
        const lidRaw = await min_sb(
            `ministerio_membros?ministerio_id=eq.${min_minAtivo.id}&papel=eq.lider&select=*,membros(nome,telemovel)`
        ).catch(() => []);
        const lider = lidRaw?.[0]?.membros;
        const tel = lider?.telemovel?.replace(/\D/g,'');
        if (!tel) { min_t('Líder sem telemóvel registado', 'err'); return; }
        const cultNome = min_cultsAll.find(c=>c.id===cultoId)?.nome || '';
        const data = new Date().toLocaleDateString('pt-PT');
        const msg = encodeURIComponent(
            `⚠️ *Zion Lisboa – Check-in*\n` +
            `*${nomeVoluntario}* chegou com *${minAtraso} min de atraso*.\n` +
            `Ministério: ${min_minAtivo.nome} · ${cultNome}\n` +
            `Data: ${data}`
        );
        window.open(`https://wa.me/${tel}?text=${msg}`, '_blank');
        // Marcar como notificado
        await min_sb(`ministerio_checkin?id=eq.${ciId}`, {method:'PATCH',body:JSON.stringify({notificado_lider:true})}).catch(console.error);
        min_t('WhatsApp aberto'); min_renderCheckin();
    }

    /* ── START ── */
    min_init();
</script>
