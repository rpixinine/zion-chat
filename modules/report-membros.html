     RELATÓRIO DE MEMBROS — módulo standalone

<style>
    .relmb * {
        font-family: var(--font-body, 'Lato', sans-serif);
        color: var(--text-main, #fff);
        box-sizing: border-box
    }

    .relmb {
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
        overflow: hidden;
        background: transparent
    }

    .relmb-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px 10px;

        background: var(--bg-card);

        gap: 10px;
        flex-wrap: wrap

    .relmb-title {
        font-family: var(--font-title, 'Cinzel', serif);
        font-size: 11px;

        white-space: nowrap

    }

    .relmb-filters {

        flex-direction: column;

        padding: 12px 16px;

        background: var(--bg-card);
        flex-shrink: 0
    }

    .relmb-filters-row {
        display: flex;
        gap: 8px;

        flex-wrap: wrap

    .relmb-filter-group {
        display: flex;
        flex-direction: column;
        gap: 4px

    .relmb-filter-label {
        font-family: var(--font-title, 'Cinzel', serif);

        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-faint)
    }

    .relmb-input {
        background: var(--bg-input, rgba(255, 255, 255, .06));
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 7px 10px;
        font-size: 12px;

        height: 32px;

    }

    .relmb-input:focus {

    .relmb-select {

        border-radius: 8px;

        display: flex;

    .relmb-chip {

        font-size: 10px;
        font-family: var(--font-title, 'Cinzel', serif);

        white-space: nowrap;

    }

    .relmb-chip:hover {

    .relmb-chip.active {

    .relmb-results-bar {

        align-items: center;
        justify-content: space-between;
        padding: 7px 16px;
        border-bottom: 1px solid var(--border);

    .relmb-count {

    .relmb-body {

    .relmb-table thead th {

    .relmb-table thead th.sorted-asc::after {

    }

    .relmb-nome-sub {

    .relmb-badges {

    }

    .relmb-badge {

    }

    .relmb-badge-teal {

    }

    .relmb-badge-green {

    .relmb-badge-blue {

    }

    .relmb-badge-orange {

        border: 1px solid rgba(230, 81, 0, .6)
    }

    .relmb-badge-red {

    }

    .relmb-badge-gray {

    }

    }

    .relmb-list-cell {

        flex-direction: column;

    .relmb-list-item {

</style>

<div class="relmb" id="relmb-wrap" style="position:relative">

    <div class="relmb-header">
        <div class="relmb-title">Relatorio de Membros</div>
        <div class="relmb-header-actions">
            <span id="relmb-last-update" style="font-size:10px;color:var(--text-faint)"></span>
            <button class="relmb-btn relmb-btn-outline" onclick="relmb_exportCSV()">Exportar CSV</button>
            <button class="relmb-btn relmb-btn-outline" onclick="relmb_gerarPDF()">Gerar PDF</button>
            <button class="relmb-btn relmb-btn-primary" onclick="relmb_init()">Actualizar</button>
        </div>
    </div>

    <div class="relmb-filters">

            <div class="relmb-filter-group" style="flex:2;min-width:160px">
                <div class="relmb-filter-label">Nome</div>
                <input class="relmb-input" id="relmb-q" type="text" placeholder="Pesquisar por nome..."
                       oninput="relmb_aplicar()" style="width:100%">

            <div class="relmb-filter-group" style="flex:1;min-width:130px">
                <div class="relmb-filter-label">Area / Zona</div>

            </div>
            <div class="relmb-filter-group">

                    <option value="masculino">Homem</option>
                    <option value="feminino">Mulher</option>

            </div>
            <div class="relmb-filter-group">

                <button class="relmb-chip" data-key="e_lider" onclick="relmb_toggleChip(this)">Lider</button>
                <button class="relmb-chip" data-key="e_presbitero" onclick="relmb_toggleChip(this)">Presbitero</button>
                <button class="relmb-chip" data-key="e_lider_link" onclick="relmb_toggleChip(this)">Lider de Link
                </button>
                <button class="relmb-chip" data-key="e_lider_area" onclick="relmb_toggleChip(this)">Lider de Area
                </button>
                <button class="relmb-chip" data-key="e_lider_pilar" onclick="relmb_toggleChip(this)">Lider de Pilar
                </button>
                <button class="relmb-chip" data-key="e_voluntario" onclick="relmb_toggleChip(this)">Voluntario</button>
                <button class="relmb-chip" data-key="professor" onclick="relmb_toggleChip(this)">Professor</button>
                <button class="relmb-chip" data-key="pastor" onclick="relmb_toggleChip(this)">Pastor</button>
                <button class="relmb-chip" data-key="office" onclick="relmb_toggleChip(this)">Office</button>
                <button class="relmb-chip" data-key="e_admin" onclick="relmb_toggleChip(this)">Admin</button>
                <button class="relmb-chip" data-key="e_dizimista" onclick="relmb_toggleChip(this)">Dizimista</button>

        </div>
        <div class="relmb-drawer-body" id="relmb-drawer-body"></div>
    </div>

<script>
    (function () {

        let _membros = [];
        let _mins_cache = {};
        let _links_map = {};
        let _familia = {};
        let _filtros = new Set();
        let _sortKey = 'nome';
        let _sortDir = 'asc';
        let _listaAtual = [];

        const FUNCOES_MAP = {
            e_lider: {l: 'Lider', badge: 'teal'},
            e_presbitero: {l: 'Presbitero', badge: 'blue'},
            e_lider_link: {l: 'Lider de Link', badge: 'teal'},
            e_lider_area: {l: 'Lider de Area', badge: 'teal'},
            e_lider_pilar: {l: 'Lider de Pilar', badge: 'teal'},
            e_voluntario: {l: 'Voluntario', badge: 'green'},
            professor: {l: 'Professor', badge: 'orange'},
            pastor: {l: 'Pastor', badge: 'purple'},
            office: {l: 'Office', badge: 'gray'},
            e_admin: {l: 'Admin', badge: 'red'},
            e_dizimista: {l: 'Dizimista', badge: 'gray'},
            foi_batizado: {l: 'Batizado', badge: 'blue'},
            e_escala: {l: 'Escala', badge: 'gray'},
            e_hub: {l: 'HUB', badge: 'gray'},
            e_jornada: {l: 'Jornada', badge: 'gray'},
            e_gerenciamento: {l: 'Gerenciamento', badge: 'gray'},
            acesso_pdv: {l: 'PDV', badge: 'orange'},
        };

        async function relmb_init() {
            _mostrarLoading(true);
            try {
                const [mems, mins, links, rels] = await Promise.all([
                    sb('membros?select=*&order=nome'),
                    sb('membro_ministerios?select=id,membro_id,papel,ministerios(id,nome,tipo)&ativo=eq.true').catch(() => []),
                    sb('links?select=id,nome&ativo=eq.true').catch(() => []),
                    sb('membros_filhos?select=pai_id,filho_id').catch(() => []),
                ]);
                _membros = mems || [];
                _links_map = {};
                (links || []).forEach(l => _links_map[l.id] = l.nome);
                _mins_cache = {};
                (mins || []).forEach(v => {
                    if (!_mins_cache[v.membro_id]) _mins_cache[v.membro_id] = [];
                    _mins_cache[v.membro_id].push({
                        nome: v.ministerios?.nome || '—',
                        tipo: v.ministerios?.tipo || '',
                        papel: v.papel || ''
                    });
                });
                _familia = {};
                _membros.forEach(m => {
                    const conjuge = m.conjuge_id ? _membros.find(x => x.id === m.conjuge_id) || null : null;
                    const filhosIds = (rels || []).filter(r => r.pai_id === m.id).map(r => r.filho_id);
                    const filhos = filhosIds.map(fid => _membros.find(x => x.id === fid)).filter(Boolean);
                    _familia[m.id] = {conjuge, filhos};
                });
                const zonas = [...new Set(_membros.map(m => m.zona).filter(Boolean))].sort();
                const selZona = document.getElementById('relmb-zona');
                if (selZona) {
                    const prev = selZona.value;
                    selZona.innerHTML = '<option value="">Todas as areas</option>' +
                        zonas.map(z => `<option value="${z}" ${prev === z ? 'selected' : ''}>${z}</option>`).join('');
                }
                const ts = new Date().toLocaleTimeString('pt-PT', {hour: '2-digit', minute: '2-digit'});
                const el = document.getElementById('relmb-last-update');
                if (el) el.textContent = 'Actualizado ' + ts;
                relmb_aplicar();
            } catch (e) {
                _mostrarLoading(false);
                console.error('relmb_init:', e);
            }
        }

        function relmb_aplicar() {
            const q = (document.getElementById('relmb-q')?.value || '').toLowerCase().trim();
            const zona = document.getElementById('relmb-zona')?.value || '';
            const genero = document.getElementById('relmb-genero')?.value || '';
            const estado = document.getElementById('relmb-estado')?.value || 'ativo';
            let lista = [..._membros];
            if (estado === 'ativo') lista = lista.filter(m => m.ativo !== false);
            if (estado === 'inativo') lista = lista.filter(m => m.ativo === false);
            if (q) lista = lista.filter(m => (m.nome || '').toLowerCase().includes(q));
            if (zona) lista = lista.filter(m => m.zona === zona);
            if (genero) lista = lista.filter(m => m.genero === genero);
            _filtros.forEach(k => {
                lista = lista.filter(m => m[k] === true);
            });
            lista.sort((a, b) => {
                const va = (a[_sortKey] || '').toString().toLowerCase();
                const vb = (b[_sortKey] || '').toString().toLowerCase();
                return _sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
            });
            _listaAtual = lista;
            _renderTabela(lista);
            document.getElementById('relmb-count').innerHTML = `<strong>${lista.length}</strong> membro${lista.length !== 1 ? 's' : ''}`;
            _renderFiltrosActivos(q, zona, genero, estado);
        }

        function _renderTabela(lista) {
            _mostrarLoading(false);
            const table = document.getElementById('relmb-table');
            const empty = document.getElementById('relmb-empty');
            const tbody = document.getElementById('relmb-tbody');
            if (!lista.length) {
                table.style.display = 'none';
                empty.style.display = '';
                return;
            }
            table.style.display = '';
            empty.style.display = 'none';
            tbody.innerHTML = lista.map(m => {
                const avatarInner = m.foto_url
                    ? `<img src="${m.foto_url}" onerror="this.parentElement.innerHTML='${(m.nome || '?')[0]}'">`
                    : (m.nome || '?')[0];
                const genLabel = m.genero === 'masculino' ? 'Homem' : m.genero === 'feminino' ? 'Mulher' : '—';
                const linkNome = m.link_id ? (_links_map[m.link_id] || '') : '';
                const zonaLink = [m.zona, linkNome ? 'Link: ' + linkNome : ''].filter(Boolean).join('<br>');
                const funcBadges = Object.keys(FUNCOES_MAP).filter(k => m[k] === true)
                    .map(k => `<span class="relmb-badge relmb-badge-${FUNCOES_MAP[k].badge}">${FUNCOES_MAP[k].l}</span>`).join('');
                const statusBadge = m.ativo === false
                    ? `<span class="relmb-badge relmb-badge-red">Inactivo</span>`
                    : `<span class="relmb-badge relmb-badge-green">Activo</span>`;
                const mins = _mins_cache[m.id] || [];
                const minsHtml = mins.length
                    ? `<div class="relmb-list-cell">${mins.map(mv => `<div class="relmb-list-item">${mv.nome}${mv.papel ? ` <span>(${mv.papel})</span>` : ''}</div>`).join('')}</div>`
                    : `<span style="font-size:11px;color:var(--text-faint)">—</span>`;
                let ca = [];
                try {
                    ca = JSON.parse(m.cursos_concluidos || '[]') || [];
                } catch (_) {
                }
                const cursosHtml = ca.length
                    ? `<div class="relmb-list-cell">
                    ${ca.filter(r => !r.status || r.status === 'concluido').map(r => `<div class="relmb-list-item"><span class="relmb-badge relmb-badge-green" style="font-size:8px">Conc.</span> ${r.nome || r.curso_id}</div>`).join('')}
                    ${ca.filter(r => r.status === 'cursando').map(r => `<div class="relmb-list-item"><span class="relmb-badge relmb-badge-orange" style="font-size:8px">Curso</span> ${r.nome || r.curso_id}</div>`).join('')}
                  </div>`
                    : `<span style="font-size:11px;color:var(--text-faint)">—</span>`;
                const fam = _familia[m.id] || {};
                const famItems = [];
                if (fam.conjuge) famItems.push(`<div class="relmb-list-item">${fam.conjuge.nome} <span>(Conjuge)</span></div>`);
                (fam.filhos || []).forEach(f => famItems.push(`<div class="relmb-list-item">${f.nome} <span>(Filho)</span></div>`));
                const famHtml = famItems.length ? `<div class="relmb-list-cell">${famItems.join('')}</div>` : `<span style="font-size:11px;color:var(--text-faint)">—</span>`;
                return `<tr class="${m.ativo === false ? 'inativo' : ''}" style="cursor:pointer" onclick="relmb_openDrawer('${m.id}')">
                <td><div class="relmb-cell-nome">
                    <div class="relmb-avatar">${avatarInner}</div>
                    <div class="relmb-nome-stack"><div class="relmb-nome-main">${m.nome}</div><div class="relmb-nome-sub">${m.email || '—'}</div></div>
                </div></td>
                <td style="white-space:nowrap">${genLabel}</td>
                <td style="font-size:11px;line-height:1.7">${zonaLink || '—'}</td>
                <td><div class="relmb-badges">${statusBadge}${funcBadges || '<span class="relmb-badge relmb-badge-gray">Membro</span>'}</div></td>
                <td>${minsHtml}</td>
                <td>${cursosHtml}</td>
                <td>${famHtml}</td>
            </tr>`;
            }).join('');
        }

        function _renderFiltrosActivos(q, zona, genero, estado) {
            const el = document.getElementById('relmb-active-filters');
            if (!el) return;
            const s = `font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(0,144,152,.2);border:1px solid rgba(0,144,152,.4);color:var(--primary)`;
            const tags = [];
            if (q) tags.push(`<span style="${s}">Nome: ${q}</span>`);
            if (zona) tags.push(`<span style="${s}">Area: ${zona}</span>`);
            if (genero) tags.push(`<span style="${s}">Genero: ${genero === 'masculino' ? 'Homem' : 'Mulher'}</span>`);
            if (estado !== 'todos') tags.push(`<span style="${s}">${estado === 'ativo' ? 'Activos' : 'Inactivos'}</span>`);
            _filtros.forEach(k => tags.push(`<span style="${s}">${FUNCOES_MAP[k]?.l || k}</span>`));
            el.innerHTML = tags.join('');
        }

        function _mostrarLoading(show) {
            const l = document.getElementById('relmb-loading'), t = document.getElementById('relmb-table'),
                e = document.getElementById('relmb-empty');
            if (l) l.style.display = show ? '' : 'none';
            if (show) {
                if (t) t.style.display = 'none';
                if (e) e.style.display = 'none';
            }
        }

        function relmb_toggleChip(el) {
            const k = el.dataset.key;
            if (el.classList.toggle('active')) _filtros.add(k); else _filtros.delete(k);
            relmb_aplicar();
        }

        function relmb_limpar() {
            document.getElementById('relmb-q').value = '';
            document.getElementById('relmb-zona').value = '';
            document.getElementById('relmb-genero').value = '';
            document.getElementById('relmb-estado').value = 'ativo';
            _filtros.clear();
            document.querySelectorAll('#relmb-chips .relmb-chip.active').forEach(c => c.classList.remove('active'));
            relmb_aplicar();
        }

        function relmb_sort(key) {
            if (_sortKey === key) _sortDir = _sortDir === 'asc' ? 'desc' : 'asc'; else {
                _sortKey = key;
                _sortDir = 'asc';
            }
            document.querySelectorAll('.relmb-table thead th').forEach(th => th.classList.remove('sorted-asc', 'sorted-desc'));
            const th = [...document.querySelectorAll('.relmb-table thead th')].find(t => t.onclick?.toString().includes(`'${key}'`));
            if (th) th.classList.add(_sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
            relmb_aplicar();
        }

        function relmb_openDrawer(id) {
            const m = _membros.find(x => x.id === id);
            if (!m) return;
            const fotoEl = document.getElementById('relmb-drawer-foto');
            if (fotoEl) {
                if (m.foto_url) fotoEl.innerHTML = `<img src="${m.foto_url}" style="width:100%;height:100%;object-fit:cover">`; else fotoEl.textContent = (m.nome || '?')[0];
            }
            document.getElementById('relmb-drawer-nome').textContent = m.nome;
            const genLabel = m.genero === 'masculino' ? 'Homem' : m.genero === 'feminino' ? 'Mulher' : '';
            document.getElementById('relmb-drawer-sub').textContent = [genLabel, m.zona].filter(Boolean).join(' · ');
            const mins = _mins_cache[m.id] || [];
            const fam = _familia[m.id] || {};
            const linkNome = m.link_id ? (_links_map[m.link_id] || '—') : '—';
            let ca = [];
            try {
                ca = JSON.parse(m.cursos_concluidos || '[]') || [];
            } catch (_) {
            }
            const funcoes = Object.keys(FUNCOES_MAP).filter(k => m[k] === true);
            const dataNasc = m.data_nascimento ? new Date(m.data_nascimento + 'T12:00:00').toLocaleDateString('pt-PT') : null;
            const dataEnt = m.data_entrada ? new Date(m.data_entrada + 'T12:00:00').toLocaleDateString('pt-PT') : null;
            const fn = (label, val) => `<div class="relmb-detail-row"><div class="relmb-detail-key">${label}</div><div class="relmb-detail-val">${val || '<span style="color:var(--text-faint);font-style:italic">—</span>'}</div></div>`;
            document.getElementById('relmb-drawer-body').innerHTML = `
            <div class="relmb-detail-card"><div class="relmb-detail-title">Identificacao</div>
                ${fn('Email', m.email ? `<a href="mailto:${m.email}" style="color:var(--primary)">${m.email}</a>` : null)}
                ${fn('Telefone', m.telefone)}${fn('Nascimento', dataNasc)}${fn('Genero', genLabel || null)}${fn('Profissao', m.profissao)}${fn('NIF', m.nif)}
            </div>
            <div class="relmb-detail-card"><div class="relmb-detail-title">Igreja</div>
                ${fn('Membro desde', dataEnt)}${fn('Link', linkNome)}${fn('Area / Zona', m.zona)}
                ${fn('Estado', m.ativo === false ? '<span class="relmb-badge relmb-badge-red">Inactivo</span>' : '<span class="relmb-badge relmb-badge-green">Activo</span>')}
            </div>
            ${funcoes.length ? `<div class="relmb-detail-card"><div class="relmb-detail-title">Funcoes</div>
                <div class="relmb-badges" style="flex-wrap:wrap;gap:4px;padding:4px 0">${funcoes.map(k => `<span class="relmb-badge relmb-badge-${FUNCOES_MAP[k].badge}">${FUNCOES_MAP[k].l}</span>`).join('')}</div></div>` : ''}
            ${mins.length ? `<div class="relmb-detail-card"><div class="relmb-detail-title">Ministerios</div>
                ${mins.map(mv => `<div class="relmb-detail-row"><div class="relmb-detail-key" style="flex:1">${mv.nome}</div><div class="relmb-detail-val" style="font-size:10px;color:var(--text-faint)">${mv.papel || ''}</div></div>`).join('')}</div>` : ''}
            ${ca.length ? `<div class="relmb-detail-card"><div class="relmb-detail-title">Cursos ZAO</div>
                ${ca.map(r => {
                const s = r.status || 'concluido';
                const cls = s === 'concluido' ? 'green' : s === 'cursando' ? 'orange' : 'red';
                const df = r.data ? new Date(r.data + 'T12:00:00').toLocaleDateString('pt-PT') : '';
                return `<div class="relmb-detail-row"><div class="relmb-detail-key" style="flex:1"><span class="relmb-badge relmb-badge-${cls}" style="margin-right:4px">${s === 'concluido' ? 'Conc.' : s === 'cursando' ? 'Curso' : 'Desist.'}</span>${r.nome || r.curso_id}</div><div class="relmb-detail-val" style="font-size:10px;color:var(--text-faint)">${df}</div></div>`;
            }).join('')}</div>` : ''}
            <div class="relmb-detail-card"><div class="relmb-detail-title">Familia</div>
                ${fam.conjuge ? `<div class="relmb-detail-row"><div class="relmb-detail-key">Conjuge</div><div class="relmb-detail-val" style="cursor:pointer;color:var(--primary)" onclick="relmb_openDrawer('${fam.conjuge.id}')">${fam.conjuge.nome}</div></div>` : ''}
                ${(fam.filhos || []).map(f => `<div class="relmb-detail-row"><div class="relmb-detail-key">Filho</div><div class="relmb-detail-val" style="cursor:pointer;color:var(--primary)" onclick="relmb_openDrawer('${f.id}')">${f.nome}</div></div>`).join('')}
                ${!fam.conjuge && !(fam.filhos || []).length ? `<div style="font-size:11px;color:var(--text-faint);padding:4px 0">Sem registos de familia.</div>` : ''}
            </div>`;
            document.getElementById('relmb-drawer').classList.add('open');
            document.getElementById('relmb-overlay').classList.add('open');
        }

        function relmb_closeDrawer() {
            document.getElementById('relmb-drawer').classList.remove('open');
            document.getElementById('relmb-overlay').classList.remove('open');
        }

        /* ════════════════════════════════════════════════════════
           GERAR PDF — nova janela + auto-print (padrão Eventos)
        ════════════════════════════════════════════════════════ */
        function relmb_gerarPDF() {
            const lista = _listaAtual;
            if (!lista.length) {
                alert('Nenhum membro para gerar PDF. Verifica os filtros.');
                return;
            }

            const geradoEm = new Date().toLocaleDateString('pt-PT', {
                day: '2-digit',
                month: 'long',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
            const q = (document.getElementById('relmb-q')?.value || '').trim();
            const zona = document.getElementById('relmb-zona')?.value || '';
            const genero = document.getElementById('relmb-genero')?.value || '';
            const estado = document.getElementById('relmb-estado')?.value || 'ativo';
            const funcChips = [..._filtros].map(k => FUNCOES_MAP[k]?.l || k);
            const filtrosDesc = [
                q ? `Nome: "${q}"` : '', zona ? `Area: ${zona}` : '',
                genero ? `Genero: ${genero === 'masculino' ? 'Homem' : 'Mulher'}` : '',
                estado !== 'todos' ? (estado === 'ativo' ? 'Activos' : 'Inactivos') : '',
                ...funcChips
            ].filter(Boolean).join(' · ');

            const nHomens = lista.filter(m => m.genero === 'masculino').length;
            const nMulheres = lista.filter(m => m.genero === 'feminino').length;
            const nLideres = lista.filter(m => m.e_lider).length;
            const nVols = lista.filter(m => m.e_voluntario).length;
            const nBat = lista.filter(m => m.foi_batizado).length;

            /* linha da tabela — zona junto ao nome, funções verticais, sem agrupamento */
            const _row = (m, idx) => {
                const genLabel = m.genero === 'masculino' ? 'Homem' : m.genero === 'feminino' ? 'Mulher' : '—';
                const linkNome = m.link_id ? (_links_map[m.link_id] || '') : '';
                const mins = (_mins_cache[m.id] || []).map(mv => mv.nome + (mv.papel ? ' · ' + mv.papel : '')).join(', ') || '—';
                const funcoes = Object.keys(FUNCOES_MAP).filter(k => m[k] === true).map(k => FUNCOES_MAP[k].l);
                let ca = [];
                try {
                    ca = JSON.parse(m.cursos_concluidos || '[]') || [];
                } catch (_) {
                }
                const cursosConc = ca.filter(r => !r.status || r.status === 'concluido').map(r => r.nome || r.curso_id);
                const cursosCurs = ca.filter(r => r.status === 'cursando').map(r => r.nome || r.curso_id);
                const fam = _familia[m.id] || {};
                const famParts = [];
                if (fam.conjuge) famParts.push(fam.conjuge.nome + ' (Cônjuge)');
                (fam.filhos || []).forEach(f => famParts.push(f.nome + ' (Filho)'));
                const ini = (m.nome || '?')[0].toUpperCase();
                const bg = idx % 2 === 0 ? '' : 'background:#fafcfc';

                const fotoCell = m.foto_url
                    ? `<td style="width:36px;padding:3px 5px;text-align:center"><img src="${m.foto_url}" style="width:28px;height:28px;border-radius:50%;object-fit:cover" onerror="this.style.display='none'"></td>`
                    : `<td style="width:36px;padding:3px 5px;text-align:center"><div style="width:28px;height:28px;border-radius:50%;background:#e0f7fa;color:#005f65;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:auto">${ini}</div></td>`;

                /* nome + zona na mesma célula */
                const nomeCell = `<td style="font-weight:600;font-size:11px">
                ${m.nome}
                ${m.zona ? `<span style="font-weight:400;color:#009098;font-size:9px;margin-left:5px">${m.zona}</span>` : ''}
                <br><span style="font-weight:400;color:#888;font-size:10px">${m.email || ''}</span>
                ${linkNome ? `<br><span style="color:#009098;font-size:9px">Link: ${linkNome}</span>` : ''}
            </td>`;

                /* funções uma por linha */
                const funcoesHtml = funcoes.length
                    ? `<div style="display:flex;flex-direction:column;gap:2px">${funcoes.map(f => `<span style="font-size:8px;padding:1px 6px;border-radius:8px;background:#e0f7fa;color:#006b70;font-weight:700;display:inline-block;width:fit-content">${f}</span>`).join('')}</div>`
                    : `<span style="color:#aaa;font-size:10px">Membro</span>`;

                /* cursos uma por linha */
                const cursosHtml = [
                    ...cursosConc.map(c => `<div style="font-size:9px;padding:1px 5px;border-radius:6px;background:#e8f5e9;color:#2e7d32;margin-bottom:2px">${c}</div>`),
                    ...cursosCurs.map(c => `<div style="font-size:9px;padding:1px 5px;border-radius:6px;background:#fff8e1;color:#e65100;margin-bottom:2px">${c}</div>`)
                ].join('') || '<span style="color:#aaa;font-size:10px">—</span>';

                /* família uma por linha */
                const famHtml = famParts.length
                    ? famParts.map(p => `<div style="font-size:10px;color:#555">${p}</div>`).join('')
                    : '<span style="color:#aaa;font-size:10px">—</span>';

                return `<tr style="${bg}">
                ${fotoCell}
                ${nomeCell}
                <td style="font-size:11px;white-space:nowrap">${genLabel}</td>
                <td style="font-size:11px">${funcoesHtml}</td>
                <td style="font-size:10px;color:#555">${mins}</td>
                <td>${cursosHtml}</td>
                <td>${famHtml}</td>
            </tr>`;
            };

            /* ordem alfabética simples, sem agrupamento */
            let corpoHtml = '';
            lista.sort((a, b) => (a.nome || '').localeCompare(b.nome || '')).forEach((m, i) => {
                corpoHtml += _row(m, i);
            });

            const htm = `<!DOCTYPE html>
<html lang="pt"><head><meta charset="UTF-8">
<title>Relatorio de Membros — Zion Lisboa</title>
<style>
*{box-sizing:border-box}

.footer{margin-top:48px;padding-top:12px;border-top:1px solid #e8e8e8;font-size:10px;color:#bbb;text-align:center;line-height:2}

</style></head><body>

<div class="cover">
    <div style="font-size:9px;letter-spacing:3px;text-transform:uppercase;opacity:.65;margin-bottom:6px">Relatorio de Membros · Zion Lisboa</div>
    <h1>Membros</h1>
    <div class="meta">Total: <strong>${lista.length}</strong> membro${lista.length !== 1 ? 's' : ''} &nbsp;·&nbsp; Gerado em ${geradoEm}</div>
    ${filtrosDesc ? `<div style="margin-top:6px;font-size:11px;opacity:.85">Filtros: ${filtrosDesc}</div>` : ''}
    <div class="brow">
        <span class="bc">Total: ${lista.length}</span>
        <span class="bc">Homens: ${nHomens}</span>
        <span class="bc">Mulheres: ${nMulheres}</span>
        <span class="bc">Lideres: ${nLideres}</span>
        <span class="bc">Voluntarios: ${nVols}</span>
        <span class="bc">Batizados: ${nBat}</span>
    </div>
</div>

<div class="stats">

        /* ── CSV ── */
        function relmb_exportCSV() {
            const lista = _listaAtual;
            const esc = v => `"${String(v || '').replace(/"/g, '""')}"`;
            const header = ['Nome', 'Email', 'Telefone', 'Genero', 'Area', 'Link', 'Estado', 'Funcoes', 'Ministerios', 'Cursos Concluidos', 'Cursos em Curso', 'Familia'];
            const rows = lista.map(m => {
                const genLabel = m.genero === 'masculino' ? 'Homem' : m.genero === 'feminino' ? 'Mulher' : '';
                const linkNome = m.link_id ? (_links_map[m.link_id] || '') : '';
                const funcoes = Object.keys(FUNCOES_MAP).filter(k => m[k] === true).map(k => FUNCOES_MAP[k].l).join(', ');
                const mins = (_mins_cache[m.id] || []).map(mv => mv.nome + (mv.papel ? ' (' + mv.papel + ')' : '')).join(', ');
                let ca = [];
                try {
                    ca = JSON.parse(m.cursos_concluidos || '[]') || [];
                } catch (_) {
                }
                const conc = ca.filter(r => !r.status || r.status === 'concluido').map(r => r.nome || r.curso_id).join(', ');
                const curs = ca.filter(r => r.status === 'cursando').map(r => r.nome || r.curso_id).join(', ');
                const fam = _familia[m.id] || {};
                const famParts = [];
                if (fam.conjuge) famParts.push(fam.conjuge.nome + ' (Conjuge)');
                (fam.filhos || []).forEach(f => famParts.push(f.nome + ' (Filho)'));
                return [m.nome, m.email, m.telefone, genLabel, m.zona, linkNome,
                    m.ativo === false ? 'Inactivo' : 'Activo', funcoes, mins, conc, curs, famParts.join(', ')].map(esc).join(',');
            });
            const csv = '\uFEFF' + [header.join(','), ...rows].join('\n');
            const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `relatorio-membros-${new Date().toISOString().slice(0, 10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        window.relmb_init = relmb_init;

        window.relmb_closeDrawer = relmb_closeDrawer;
        window.relmb_gerarPDF = relmb_gerarPDF;
        window.relmb_exportCSV = relmb_exportCSV;

        relmb_init();
    })();
