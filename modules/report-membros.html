<!-- ═══════════════════════════════════════════════════════════
     RELATÓRIO DE MEMBROS — módulo standalone
     Zion Lisboa · Design System: Cinzel / Lato · Navy / Teal
     Depende de: window.sb (helper Supabase), variáveis CSS globais
     ═══════════════════════════════════════════════════════════ -->

<style>
    /* ── reset interno ── */
    .relmb * {
        font-family: var(--font-body, 'Lato', sans-serif);
        color: var(--text-main, #fff);
        box-sizing: border-box;
    }

    .relmb {
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
        overflow: hidden;
        background: transparent;
    }

    /* ── TOPO: título + acções ── */
    .relmb-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px 10px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-card);
        flex-shrink: 0;
        gap: 10px;
        flex-wrap: wrap;
    }

    .relmb-title {
        font-family: var(--font-title, 'Cinzel', serif);
        font-size: 11px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--primary, #009098);
        white-space: nowrap;
    }

    .relmb-header-actions {
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
    }

    /* ── BARRA DE FILTROS ── */
    .relmb-filters {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-card);
        flex-shrink: 0;
    }

    .relmb-filters-row {
        display: flex;
        gap: 8px;
        align-items: flex-end;
        flex-wrap: wrap;
    }

    .relmb-filter-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .relmb-filter-label {
        font-family: var(--font-title, 'Cinzel', serif);
        font-size: 8px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-faint);
    }

    .relmb-input {
        background: var(--bg-input, rgba(255,255,255,0.06));
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 7px 10px;
        font-size: 12px;
        color: #fff;
        outline: none;
        height: 32px;
        transition: border-color 0.15s;
    }

    .relmb-input::placeholder { color: var(--text-faint); }
    .relmb-input:focus { border-color: var(--primary); }

    .relmb-select {
        background: var(--bg-input, rgba(255,255,255,0.06));
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0 10px;
        font-size: 12px;
        color: #fff;
        outline: none;
        height: 32px;
        cursor: pointer;
        transition: border-color 0.15s;
    }

    .relmb-select:focus { border-color: var(--primary); }
    .relmb-select option { background: var(--bg-card, #0d2733); color: #fff; }

    /* chips de função */
    .relmb-chips-row {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        align-items: center;
    }

    .relmb-chip {
        padding: 3px 10px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--bg-input);
        font-size: 10px;
        font-family: var(--font-title, 'Cinzel', serif);
        letter-spacing: 0.5px;
        color: var(--text-faint);
        cursor: pointer;
        transition: all 0.12s;
        white-space: nowrap;
        user-select: none;
    }

    .relmb-chip:hover { border-color: var(--primary); color: var(--primary); }

    .relmb-chip.active {
        background: rgba(0,144,152,0.25);
        border-color: var(--primary);
        color: #fff;
        font-weight: 700;
    }

    /* ── BARRA DE RESULTADOS ── */
    .relmb-results-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 7px 16px;
        border-bottom: 1px solid var(--border);
        background: rgba(0,144,152,0.05);
        flex-shrink: 0;
        gap: 8px;
        flex-wrap: wrap;
    }

    .relmb-count {
        font-size: 11px;
        color: var(--text-faint);
        font-family: var(--font-title, 'Cinzel', serif);
        letter-spacing: 1px;
    }

    .relmb-count strong {
        color: var(--primary);
        font-size: 13px;
    }

    /* ── ÁREA DE SCROLL ── */
    .relmb-body {
        flex: 1;
        overflow-y: auto;
        overflow-x: auto;
        padding: 0;
    }

    /* ── TABELA ── */
    .relmb-table {
        width: 100%;
        border-collapse: collapse;
        min-width: 860px;
    }

    .relmb-table thead {
        position: sticky;
        top: 0;
        z-index: 5;
        background: var(--bg-card);
    }

    .relmb-table thead th {
        font-family: var(--font-title, 'Cinzel', serif);
        font-size: 8px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--primary);
        padding: 10px 12px;
        text-align: left;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
        cursor: pointer;
        user-select: none;
        transition: background 0.12s;
    }

    .relmb-table thead th:hover { background: rgba(0,144,152,0.1); }

    .relmb-table thead th.sorted-asc::after  { content: ' ▲'; font-size: 7px; }
    .relmb-table thead th.sorted-desc::after { content: ' ▼'; font-size: 7px; }

    .relmb-table tbody tr {
        border-bottom: 1px solid rgba(255,255,255,0.05);
        transition: background 0.1s;
    }

    .relmb-table tbody tr:hover { background: rgba(0,144,152,0.08); }

    .relmb-table tbody tr.inativo td { opacity: 0.4; }

    .relmb-table td {
        padding: 9px 12px;
        font-size: 12px;
        vertical-align: top;
        color: #fff;
    }

    /* coluna nome */
    .relmb-cell-nome {
        display: flex;
        align-items: center;
        gap: 9px;
    }

    .relmb-avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: rgba(0,144,152,0.2);
        border: 1px solid rgba(0,144,152,0.35);
        color: var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        flex-shrink: 0;
        overflow: hidden;
    }

    .relmb-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .relmb-nome-stack { display: flex; flex-direction: column; gap: 1px; }
    .relmb-nome-main  { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; }
    .relmb-nome-sub   { font-size: 10px; color: var(--text-faint); white-space: nowrap; }

    /* badges inline */
    .relmb-badges { display: flex; flex-wrap: wrap; gap: 3px; }

    .relmb-badge {
        padding: 2px 7px;
        border-radius: 20px;
        font-size: 9px;
        font-family: var(--font-title, 'Cinzel', serif);
        letter-spacing: 0.4px;
        white-space: nowrap;
        font-weight: 600;
        line-height: 1.6;
    }

    .relmb-badge-teal   { background: rgba(0,144,152,0.25);   color: var(--primary);  border: 1px solid rgba(0,144,152,0.5); }
    .relmb-badge-green  { background: rgba(46,125,50,0.3);    color: #69f0ae;         border: 1px solid rgba(46,125,50,0.6); }
    .relmb-badge-blue   { background: rgba(0,100,180,0.3);    color: #82b1ff;         border: 1px solid rgba(0,100,180,0.6); }
    .relmb-badge-orange { background: rgba(230,81,0,0.3);     color: #ffab40;         border: 1px solid rgba(230,81,0,0.6); }
    .relmb-badge-red    { background: rgba(198,40,40,0.3);    color: #ff8a80;         border: 1px solid rgba(198,40,40,0.6); }
    .relmb-badge-gray   { background: rgba(255,255,255,0.08); color: var(--text-faint);border: 1px solid var(--border); }
    .relmb-badge-purple { background: rgba(123,31,162,0.3);   color: #ce93d8;         border: 1px solid rgba(123,31,162,0.6); }

    /* célula de lista pequena */
    .relmb-list-cell {
        display: flex;
        flex-direction: column;
        gap: 3px;
    }

    .relmb-list-item {
        font-size: 11px;
        color: #ddd;
        line-height: 1.4;
    }

    .relmb-list-item span {
        color: var(--text-faint);
        font-size: 10px;
    }

    /* empty / loading */
    .relmb-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 20px;
        gap: 10px;
        color: var(--text-faint);
        text-align: center;
    }

    .relmb-empty-title {
        font-family: var(--font-title, 'Cinzel', serif);
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
    }

    .relmb-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px;
        gap: 10px;
        color: var(--text-faint);
        font-size: 12px;
    }

    /* ── BOTÕES ── */
    .relmb-btn {
        padding: 6px 14px;
        border-radius: 8px;
        font-family: var(--font-title, 'Cinzel', serif);
        font-size: 9px;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
        height: 30px;
        display: inline-flex;
        align-items: center;
        gap: 5px;
    }

    .relmb-btn-primary {
        background: var(--primary);
        border: none;
        color: #fff;
        font-weight: 700;
    }

    .relmb-btn-primary:hover { filter: brightness(1.15); }

    .relmb-btn-outline {
        background: none;
        border: 1px solid var(--border);
        color: var(--text-faint);
    }

    .relmb-btn-outline:hover { border-color: var(--primary); color: var(--primary); }

    .relmb-btn-clear {
        background: none;
        border: 1px dashed var(--border);
        color: var(--text-faint);
    }

    .relmb-btn-clear:hover { border-color: #ff8a80; color: #ff8a80; }

    /* ── PAINEL DE DETALHE (drawer lateral) ── */
    .relmb-drawer {
        position: absolute;
        top: 0; right: 0; bottom: 0;
        width: 380px;
        background: var(--bg-card);
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        transform: translateX(100%);
        transition: transform 0.25s ease;
        z-index: 50;
        overflow: hidden;
    }

    .relmb-drawer.open { transform: translateX(0); }

    .relmb-drawer-head {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
    }

    .relmb-drawer-head .relmb-avatar {
        width: 48px;
        height: 48px;
        font-size: 18px;
    }

    .relmb-drawer-nome {
        font-family: var(--font-title, 'Cinzel', serif);
        font-size: 14px;
        color: #fff;
        letter-spacing: 0.5px;
    }

    .relmb-drawer-sub { font-size: 11px; color: var(--text-faint); margin-top: 2px; }

    .relmb-drawer-close {
        margin-left: auto;
        background: none;
        border: none;
        color: var(--text-faint);
        font-size: 18px;
        cursor: pointer;
        padding: 4px 6px;
        border-radius: 6px;
        transition: all 0.12s;
    }

    .relmb-drawer-close:hover { color: #ff8a80; background: rgba(198,40,40,0.15); }

    .relmb-drawer-body {
        flex: 1;
        overflow-y: auto;
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .relmb-detail-card {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 10px;
        padding: 12px;
    }

    .relmb-detail-title {
        font-family: var(--font-title, 'Cinzel', serif);
        font-size: 8px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--primary);
        margin-bottom: 8px;
        padding-bottom: 6px;
        border-bottom: 1px solid rgba(0,144,152,0.2);
    }

    .relmb-detail-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 5px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        gap: 8px;
        font-size: 12px;
    }

    .relmb-detail-row:last-child { border-bottom: none; }

    .relmb-detail-key {
        font-size: 10px;
        color: var(--text-faint);
        font-family: var(--font-title, 'Cinzel', serif);
        letter-spacing: 0.4px;
        flex-shrink: 0;
        min-width: 90px;
    }

    .relmb-detail-val { color: #fff; text-align: right; word-break: break-word; }

    /* overlay escuro ao abrir drawer */
    .relmb-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.45);
        z-index: 49;
        display: none;
    }

    .relmb-overlay.open { display: block; }

    /* ── EXPORT PRINT ── */
    @media print {
        .relmb-filters, .relmb-header-actions, .relmb-results-bar button,
        .relmb-drawer, .relmb-overlay { display: none !important; }
        .relmb-body { overflow: visible !important; }
        .relmb-table thead th { background: #f5f5f5 !important; color: #333 !important; }
        .relmb-table tbody tr { border-bottom: 1px solid #ddd !important; }
        .relmb-table td, .relmb-table th { color: #111 !important; }
    }
</style>

<!-- ═══ HTML ═══ -->
<div class="relmb" id="relmb-wrap" style="position:relative">

    <!-- TOPO -->
    <div class="relmb-header">
        <div class="relmb-title">Relatorio de Membros</div>
        <div class="relmb-header-actions">
            <span id="relmb-last-update" style="font-size:10px;color:var(--text-faint)"></span>
            <button class="relmb-btn relmb-btn-outline" onclick="relmb_exportCSV()">Exportar CSV</button>
            <button class="relmb-btn relmb-btn-outline" onclick="window.print()">Imprimir</button>
            <button class="relmb-btn relmb-btn-primary" onclick="relmb_init()">Actualizar</button>
        </div>
    </div>

    <!-- FILTROS -->
    <div class="relmb-filters" id="relmb-filters">

        <!-- linha 1: texto, zona, género -->
        <div class="relmb-filters-row">
            <div class="relmb-filter-group" style="flex:2;min-width:160px">
                <div class="relmb-filter-label">Nome</div>
                <input class="relmb-input" id="relmb-q" type="text"
                       placeholder="Pesquisar por nome..."
                       oninput="relmb_aplicar()" style="width:100%">
            </div>
            <div class="relmb-filter-group" style="flex:1;min-width:130px">
                <div class="relmb-filter-label">Area / Zona</div>
                <select class="relmb-select" id="relmb-zona" onchange="relmb_aplicar()" style="width:100%">
                    <option value="">Todas as areas</option>
                </select>
            </div>
            <div class="relmb-filter-group">
                <div class="relmb-filter-label">Genero</div>
                <select class="relmb-select" id="relmb-genero" onchange="relmb_aplicar()" style="width:120px">
                    <option value="">Todos</option>
                    <option value="masculino">Homem</option>
                    <option value="feminino">Mulher</option>
                </select>
            </div>
            <div class="relmb-filter-group">
                <div class="relmb-filter-label">Estado</div>
                <select class="relmb-select" id="relmb-estado" onchange="relmb_aplicar()" style="width:110px">
                    <option value="ativo">Activos</option>
                    <option value="inativo">Inactivos</option>
                    <option value="todos">Todos</option>
                </select>
            </div>
            <div style="display:flex;align-items:flex-end">
                <button class="relmb-btn relmb-btn-clear" onclick="relmb_limpar()">Limpar</button>
            </div>
        </div>

        <!-- linha 2: chips de funcao -->
        <div class="relmb-filters-row" style="align-items:center">
            <div class="relmb-filter-label" style="white-space:nowrap;margin-right:2px">Funcao:</div>
            <div class="relmb-chips-row" id="relmb-chips">
                <button class="relmb-chip" data-key="e_lider"         onclick="relmb_toggleChip(this)">Lider</button>
                <button class="relmb-chip" data-key="e_presbitero"    onclick="relmb_toggleChip(this)">Presbitero</button>
                <button class="relmb-chip" data-key="e_lider_link"    onclick="relmb_toggleChip(this)">Lider de Link</button>
                <button class="relmb-chip" data-key="e_lider_area"    onclick="relmb_toggleChip(this)">Lider de Area</button>
                <button class="relmb-chip" data-key="e_lider_pilar"   onclick="relmb_toggleChip(this)">Lider de Pilar</button>
                <button class="relmb-chip" data-key="e_voluntario"    onclick="relmb_toggleChip(this)">Voluntario</button>
                <button class="relmb-chip" data-key="professor"       onclick="relmb_toggleChip(this)">Professor</button>
                <button class="relmb-chip" data-key="pastor"          onclick="relmb_toggleChip(this)">Pastor</button>
                <button class="relmb-chip" data-key="office"          onclick="relmb_toggleChip(this)">Office</button>
                <button class="relmb-chip" data-key="e_admin"         onclick="relmb_toggleChip(this)">Admin</button>
                <button class="relmb-chip" data-key="e_dizimista"     onclick="relmb_toggleChip(this)">Dizimista</button>
                <button class="relmb-chip" data-key="foi_batizado"    onclick="relmb_toggleChip(this)">Batizados</button>
                <button class="relmb-chip" data-key="e_escala"        onclick="relmb_toggleChip(this)">Acesso Escala</button>
                <button class="relmb-chip" data-key="e_hub"           onclick="relmb_toggleChip(this)">Acesso HUB</button>
                <button class="relmb-chip" data-key="e_jornada"       onclick="relmb_toggleChip(this)">Acesso Jornada</button>
                <button class="relmb-chip" data-key="e_gerenciamento" onclick="relmb_toggleChip(this)">Acesso Gerenciamento</button>
                <button class="relmb-chip" data-key="acesso_pdv"      onclick="relmb_toggleChip(this)">Acesso PDV</button>
            </div>
        </div>
    </div>

    <!-- BARRA DE RESULTADOS -->
    <div class="relmb-results-bar">
        <div class="relmb-count" id="relmb-count">
            <strong>—</strong> membros
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap" id="relmb-active-filters"></div>
    </div>

    <!-- TABELA -->
    <div class="relmb-body">
        <div class="relmb-loading" id="relmb-loading">
            <div class="spin"></div> A carregar membros...
        </div>

        <table class="relmb-table" id="relmb-table" style="display:none">
            <thead>
            <tr>
                <th onclick="relmb_sort('nome')">Nome</th>
                <th onclick="relmb_sort('genero')">Genero</th>
                <th onclick="relmb_sort('zona')">Area / Link</th>
                <th>Status / Funcoes</th>
                <th>Ministerios</th>
                <th>Cursos ZAO</th>
                <th>Familia</th>
            </tr>
            </thead>
            <tbody id="relmb-tbody"></tbody>
        </table>

        <div class="relmb-empty" id="relmb-empty" style="display:none">
            <div class="relmb-empty-title">Nenhum resultado</div>
            <div style="font-size:12px;color:var(--text-faint);margin-top:4px">
                Ajusta os filtros para encontrar membros.
            </div>
        </div>
    </div>

    <!-- OVERLAY -->
    <div class="relmb-overlay" id="relmb-overlay" onclick="relmb_closeDrawer()"></div>

    <!-- DRAWER DETALHE -->
    <div class="relmb-drawer" id="relmb-drawer">
        <div class="relmb-drawer-head" id="relmb-drawer-head">
            <div class="relmb-avatar" id="relmb-drawer-foto">?</div>
            <div>
                <div class="relmb-drawer-nome" id="relmb-drawer-nome">—</div>
                <div class="relmb-drawer-sub"  id="relmb-drawer-sub">—</div>
            </div>
            <button class="relmb-drawer-close" onclick="relmb_closeDrawer()">x</button>
        </div>
        <div class="relmb-drawer-body" id="relmb-drawer-body"></div>
    </div>
</div>

<script>
    (function () {

        /* ── state ── */
        let _membros    = [];
        let _mins_cache = {};   // { membro_id: [{nome, tipo, papel}] }
        let _links_map  = {};   // { id: nome }
        let _familia    = {};   // { id: {conjuge, filhos:[]} }
        let _filtros    = new Set();
        let _sortKey    = 'nome';
        let _sortDir    = 'asc';

        /* ── mapa de labels das funções ── */
        const FUNCOES_MAP = {
            e_lider:          { l: 'Lider',             badge: 'teal'   },
            e_presbitero:     { l: 'Presbitero',         badge: 'blue'   },
            e_lider_link:     { l: 'Lider de Link',      badge: 'teal'   },
            e_lider_area:     { l: 'Lider de Area',      badge: 'teal'   },
            e_lider_pilar:    { l: 'Lider de Pilar',     badge: 'teal'   },
            e_voluntario:     { l: 'Voluntario',         badge: 'green'  },
            professor:        { l: 'Professor',          badge: 'orange' },
            pastor:           { l: 'Pastor',             badge: 'purple' },
            office:           { l: 'Office',             badge: 'gray'   },
            e_admin:          { l: 'Admin',              badge: 'red'    },
            e_dizimista:      { l: 'Dizimista',          badge: 'gray'   },
            foi_batizado:     { l: 'Batizado',           badge: 'blue'   },
            e_escala:         { l: 'Escala',             badge: 'gray'   },
            e_hub:            { l: 'HUB',                badge: 'gray'   },
            e_jornada:        { l: 'Jornada',            badge: 'gray'   },
            e_gerenciamento:  { l: 'Gerenciamento',      badge: 'gray'   },
            acesso_pdv:       { l: 'PDV',                badge: 'orange' },
        };

        /* ── INIT ── */
        async function relmb_init() {
            _mostrarLoading(true);
            try {
                const [mems, mins, links, rels] = await Promise.all([
                    sb('membros?select=*&order=nome'),
                    sb('membro_ministerios?select=id,membro_id,papel,ministerios(id,nome,tipo)&ativo=eq.true').catch(()=>[]),
                    sb('links?select=id,nome&ativo=eq.true').catch(()=>[]),
                    sb('membros_filhos?select=pai_id,filho_id').catch(()=>[]),
                ]);

                _membros = mems || [];

                /* links map */
                _links_map = {};
                (links||[]).forEach(l => _links_map[l.id] = l.nome);

                /* ministerios por membro */
                _mins_cache = {};
                (mins||[]).forEach(v => {
                    if (!_mins_cache[v.membro_id]) _mins_cache[v.membro_id] = [];
                    _mins_cache[v.membro_id].push({
                        nome:  v.ministerios?.nome  || '—',
                        tipo:  v.ministerios?.tipo  || '',
                        papel: v.papel || '',
                    });
                });

                /* família */
                _familia = {};
                _membros.forEach(m => {
                    const conjuge = m.conjuge_id ? _membros.find(x => x.id === m.conjuge_id) || null : null;
                    const pai     = m.pai_id     ? _membros.find(x => x.id === m.pai_id)     || null : null;
                    const mae     = m.mae_id     ? _membros.find(x => x.id === m.mae_id)     || null : null;
                    const filhosIds = (rels||[]).filter(r => r.pai_id === m.id).map(r => r.filho_id);
                    const filhos    = filhosIds.map(fid => _membros.find(x => x.id === fid)).filter(Boolean);
                    _familia[m.id] = { conjuge, pai, mae, filhos };
                });

                /* preencher select de zonas */
                const zonas = [...new Set(_membros.map(m => m.zona).filter(Boolean))].sort();
                const selZona = document.getElementById('relmb-zona');
                if (selZona) {
                    const prev = selZona.value;
                    selZona.innerHTML = '<option value="">Todas as areas</option>' +
                        zonas.map(z => `<option value="${z}" ${prev===z?'selected':''}>${z}</option>`).join('');
                }

                const ts = new Date().toLocaleTimeString('pt-PT', {hour:'2-digit',minute:'2-digit'});
                const el = document.getElementById('relmb-last-update');
                if (el) el.textContent = 'Actualizado ' + ts;

                relmb_aplicar();
            } catch(e) {
                _mostrarLoading(false);
                console.error('relmb_init:', e);
                const tbody = document.getElementById('relmb-tbody');
                if (tbody) tbody.innerHTML = `<tr><td colspan="7" style="color:#ff8a80;padding:20px">
                Erro ao carregar: ${e?.message||JSON.stringify(e)}</td></tr>`;
                document.getElementById('relmb-table').style.display = '';
            }
        }

        /* ── FILTRAR & RENDERIZAR ── */
        function relmb_aplicar() {
            const q       = (document.getElementById('relmb-q')?.value   || '').toLowerCase().trim();
            const zona    = document.getElementById('relmb-zona')?.value  || '';
            const genero  = document.getElementById('relmb-genero')?.value|| '';
            const estado  = document.getElementById('relmb-estado')?.value|| 'ativo';

            let lista = [..._membros];

            /* estado */
            if (estado === 'ativo')   lista = lista.filter(m => m.ativo !== false);
            if (estado === 'inativo') lista = lista.filter(m => m.ativo === false);

            /* texto */
            if (q) lista = lista.filter(m =>
                (m.nome||'').toLowerCase().includes(q) ||
                (m.email||'').toLowerCase().includes(q)
            );

            /* zona */
            if (zona)   lista = lista.filter(m => m.zona === zona);

            /* género */
            if (genero) lista = lista.filter(m => m.genero === genero);

            /* chips de função — AND entre chips activos */
            _filtros.forEach(k => { lista = lista.filter(m => m[k] === true); });

            /* ordenação */
            lista.sort((a, b) => {
                const va = (a[_sortKey]||'').toString().toLowerCase();
                const vb = (b[_sortKey]||'').toString().toLowerCase();
                return _sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
            });

            _renderTabela(lista);
            _renderCount(lista.length);
            _renderFiltrosActivos(q, zona, genero, estado);
        }

        function _renderTabela(lista) {
            _mostrarLoading(false);

            const table  = document.getElementById('relmb-table');
            const empty  = document.getElementById('relmb-empty');
            const tbody  = document.getElementById('relmb-tbody');

            if (!lista.length) {
                table.style.display = 'none';
                empty.style.display = '';
                return;
            }

            table.style.display = '';
            empty.style.display = 'none';

            tbody.innerHTML = lista.map(m => {
                /* avatar */
                const avatarInner = m.foto_url
                    ? `<img src="${m.foto_url}" onerror="this.parentElement.innerHTML='${(m.nome||'?')[0]}'"><\/img>`
                    : (m.nome||'?')[0];

                /* género label */
                const genLabel = m.genero === 'masculino' ? 'Homem'
                    : m.genero === 'feminino'  ? 'Mulher' : '—';

                /* area / link */
                const linkNome = m.link_id ? (_links_map[m.link_id] || '—') : '';
                const zonaLink = [m.zona, linkNome ? 'Link: '+linkNome : ''].filter(Boolean).join('<br>');

                /* funções badges */
                const funcBadges = Object.keys(FUNCOES_MAP)
                    .filter(k => m[k] === true)
                    .map(k => {
                        const f = FUNCOES_MAP[k];
                        return `<span class="relmb-badge relmb-badge-${f.badge}">${f.l}</span>`;
                    }).join('');

                const statusBadge = m.ativo === false
                    ? `<span class="relmb-badge relmb-badge-red">Inactivo</span>`
                    : `<span class="relmb-badge relmb-badge-green">Activo</span>`;

                /* ministérios */
                const mins = _mins_cache[m.id] || [];
                const minsHtml = mins.length
                    ? `<div class="relmb-list-cell">${mins.map(mv =>
                        `<div class="relmb-list-item">${mv.nome}${mv.papel?` <span>(${mv.papel})</span>`:''}</div>`
                    ).join('')}</div>`
                    : `<span style="font-size:11px;color:var(--text-faint)">—</span>`;

                /* cursos */
                let cursosArr = [];
                try { cursosArr = JSON.parse(m.cursos_concluidos||'[]')||[]; } catch(_){}
                const cursosConc = cursosArr.filter(r => !r.status || r.status === 'concluido');
                const cursosCurs = cursosArr.filter(r => r.status === 'cursando');

                const cursosHtml = cursosArr.length
                    ? `<div class="relmb-list-cell">
                    ${cursosConc.map(r => `<div class="relmb-list-item">
                        <span class="relmb-badge relmb-badge-green" style="font-size:8px">Conc.</span>
                        ${r.nome||r.curso_id}
                    </div>`).join('')}
                    ${cursosCurs.map(r => `<div class="relmb-list-item">
                        <span class="relmb-badge relmb-badge-orange" style="font-size:8px">Curso</span>
                        ${r.nome||r.curso_id}
                    </div>`).join('')}
                  </div>`
                    : `<span style="font-size:11px;color:var(--text-faint)">—</span>`;

                /* família */
                const fam = _familia[m.id] || {};
                const famItems = [];
                if (fam.conjuge) famItems.push(`<div class="relmb-list-item">${fam.conjuge.nome} <span>(Conjuge)</span></div>`);
                if (fam.pai)     famItems.push(`<div class="relmb-list-item">${fam.pai.nome} <span>(Pai)</span></div>`);
                if (fam.mae)     famItems.push(`<div class="relmb-list-item">${fam.mae.nome} <span>(Mae)</span></div>`);
                (fam.filhos||[]).forEach(f => famItems.push(`<div class="relmb-list-item">${f.nome} <span>(Filho)</span></div>`));
                const famHtml = famItems.length
                    ? `<div class="relmb-list-cell">${famItems.join('')}</div>`
                    : `<span style="font-size:11px;color:var(--text-faint)">—</span>`;

                return `<tr class="${m.ativo===false?'inativo':''}"
                        style="cursor:pointer"
                        onclick="relmb_openDrawer('${m.id}')">
                <td>
                    <div class="relmb-cell-nome">
                        <div class="relmb-avatar">${avatarInner}</div>
                        <div class="relmb-nome-stack">
                            <div class="relmb-nome-main">${m.nome}</div>
                            <div class="relmb-nome-sub">${m.email||'—'}</div>
                        </div>
                    </div>
                </td>
                <td style="white-space:nowrap">${genLabel}</td>
                <td style="font-size:11px;line-height:1.7">${zonaLink||'—'}</td>
                <td>
                    <div class="relmb-badges">
                        ${statusBadge}
                        ${funcBadges||'<span class="relmb-badge relmb-badge-gray">Membro</span>'}
                    </div>
                </td>
                <td>${minsHtml}</td>
                <td>${cursosHtml}</td>
                <td>${famHtml}</td>
            </tr>`;
            }).join('');
        }

        function _renderCount(n) {
            const el = document.getElementById('relmb-count');
            if (el) el.innerHTML = `<strong>${n}</strong> membro${n!==1?'s':''}`;
        }

        function _renderFiltrosActivos(q, zona, genero, estado) {
            const el = document.getElementById('relmb-active-filters');
            if (!el) return;
            const tags = [];

            if (q)      tags.push(`<span style="font-size:10px;padding:2px 8px;border-radius:10px;
            background:rgba(0,144,152,0.2);border:1px solid rgba(0,144,152,0.4);color:var(--primary)">
            Nome: ${q}</span>`);
            if (zona)   tags.push(`<span style="font-size:10px;padding:2px 8px;border-radius:10px;
            background:rgba(0,144,152,0.2);border:1px solid rgba(0,144,152,0.4);color:var(--primary)">
            Area: ${zona}</span>`);
            if (genero) tags.push(`<span style="font-size:10px;padding:2px 8px;border-radius:10px;
            background:rgba(0,144,152,0.2);border:1px solid rgba(0,144,152,0.4);color:var(--primary)">
            Genero: ${genero==='masculino'?'Homem':'Mulher'}</span>`);
            if (estado !== 'todos') tags.push(`<span style="font-size:10px;padding:2px 8px;border-radius:10px;
            background:rgba(0,144,152,0.2);border:1px solid rgba(0,144,152,0.4);color:var(--primary)">
            ${estado==='ativo'?'Activos':'Inactivos'}</span>`);

            _filtros.forEach(k => {
                const lbl = FUNCOES_MAP[k]?.l || k;
                tags.push(`<span style="font-size:10px;padding:2px 8px;border-radius:10px;
                background:rgba(0,144,152,0.2);border:1px solid rgba(0,144,152,0.4);color:var(--primary)">
                ${lbl}</span>`);
            });

            el.innerHTML = tags.join('');
        }

        function _mostrarLoading(show) {
            const l = document.getElementById('relmb-loading');
            const t = document.getElementById('relmb-table');
            const e = document.getElementById('relmb-empty');
            if (l) l.style.display = show ? '' : 'none';
            if (show) { if(t) t.style.display='none'; if(e) e.style.display='none'; }
        }

        /* ── CHIPS ── */
        function relmb_toggleChip(el) {
            const k = el.dataset.key;
            if (el.classList.toggle('active')) _filtros.add(k);
            else _filtros.delete(k);
            relmb_aplicar();
        }

        function relmb_limpar() {
            document.getElementById('relmb-q').value     = '';
            document.getElementById('relmb-zona').value  = '';
            document.getElementById('relmb-genero').value= '';
            document.getElementById('relmb-estado').value= 'ativo';
            _filtros.clear();
            document.querySelectorAll('#relmb-chips .relmb-chip.active').forEach(c => c.classList.remove('active'));
            relmb_aplicar();
        }

        /* ── ORDENAÇÃO ── */
        function relmb_sort(key) {
            if (_sortKey === key) _sortDir = _sortDir === 'asc' ? 'desc' : 'asc';
            else { _sortKey = key; _sortDir = 'asc'; }

            document.querySelectorAll('.relmb-table thead th').forEach(th => {
                th.classList.remove('sorted-asc','sorted-desc');
            });
            const th = [...document.querySelectorAll('.relmb-table thead th')]
                .find(t => t.onclick?.toString().includes(`'${key}'`));
            if (th) th.classList.add(_sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');

            relmb_aplicar();
        }

        /* ── DRAWER DETALHE ── */
        function relmb_openDrawer(id) {
            const m = _membros.find(x => x.id === id);
            if (!m) return;

            /* header */
            const fotoEl = document.getElementById('relmb-drawer-foto');
            if (fotoEl) {
                if (m.foto_url) fotoEl.innerHTML = `<img src="${m.foto_url}" style="width:100%;height:100%;object-fit:cover">`;
                else            fotoEl.textContent = (m.nome||'?')[0];
            }
            document.getElementById('relmb-drawer-nome').textContent = m.nome;
            const genLabel = m.genero === 'masculino' ? 'Homem' : m.genero === 'feminino' ? 'Mulher' : '';
            document.getElementById('relmb-drawer-sub').textContent = [genLabel, m.zona].filter(Boolean).join(' · ');

            /* body */
            const mins = _mins_cache[m.id] || [];
            const fam  = _familia[m.id]    || {};
            const linkNome = m.link_id ? (_links_map[m.link_id]||'—') : '—';

            let cursosArr = [];
            try { cursosArr = JSON.parse(m.cursos_concluidos||'[]')||[]; } catch(_){}

            const funcoes = Object.keys(FUNCOES_MAP).filter(k => m[k]===true);

            const fn = (label, val) => `<div class="relmb-detail-row">
            <div class="relmb-detail-key">${label}</div>
            <div class="relmb-detail-val">${val||'<span style="color:var(--text-faint);font-style:italic">—</span>'}</div>
        </div>`;

            const dataNasc = m.data_nascimento
                ? new Date(m.data_nascimento+'T12:00:00').toLocaleDateString('pt-PT') : null;
            const dataEnt  = m.data_entrada
                ? new Date(m.data_entrada+'T12:00:00').toLocaleDateString('pt-PT') : null;

            const body = document.getElementById('relmb-drawer-body');
            body.innerHTML = `

            <div class="relmb-detail-card">
                <div class="relmb-detail-title">Identificacao</div>
                ${fn('Email',      m.email    ? `<a href="mailto:${m.email}" style="color:var(--primary)">${m.email}</a>` : null)}
                ${fn('Telefone',   m.telefone)}
                ${fn('Nascimento', dataNasc)}
                ${fn('Genero',     m.genero==='masculino'?'Homem':m.genero==='feminino'?'Mulher':null)}
                ${fn('Profissao',  m.profissao)}
                ${fn('NIF',        m.nif)}
            </div>

            <div class="relmb-detail-card">
                <div class="relmb-detail-title">Igreja</div>
                ${fn('Membro desde', dataEnt)}
                ${fn('Link',         linkNome)}
                ${fn('Area / Zona',  m.zona)}
                ${fn('Estado',       m.ativo===false
                ? '<span class="relmb-badge relmb-badge-red">Inactivo</span>'
                : '<span class="relmb-badge relmb-badge-green">Activo</span>')}
            </div>

            ${funcoes.length ? `<div class="relmb-detail-card">
                <div class="relmb-detail-title">Funcoes</div>
                <div class="relmb-badges" style="flex-wrap:wrap;gap:4px;padding:4px 0">
                    ${funcoes.map(k=>`<span class="relmb-badge relmb-badge-${FUNCOES_MAP[k].badge}">${FUNCOES_MAP[k].l}</span>`).join('')}
                </div>
            </div>` : ''}

            ${mins.length ? `<div class="relmb-detail-card">
                <div class="relmb-detail-title">Ministerios</div>
                ${mins.map(mv=>`<div class="relmb-detail-row">
                    <div class="relmb-detail-key" style="min-width:0;flex:1">${mv.nome}</div>
                    <div class="relmb-detail-val" style="font-size:10px;color:var(--text-faint)">${mv.papel||''}</div>
                </div>`).join('')}
            </div>` : ''}

            ${cursosArr.length ? `<div class="relmb-detail-card">
                <div class="relmb-detail-title">Cursos ZAO</div>
                ${cursosArr.map(r=>{
                const s = r.status||'concluido';
                const badgeCls = s==='concluido'?'green':s==='cursando'?'orange':'red';
                const dataFim = r.data ? new Date(r.data+'T12:00:00').toLocaleDateString('pt-PT') : '';
                return `<div class="relmb-detail-row">
                        <div class="relmb-detail-key" style="min-width:0;flex:1">
                            <span class="relmb-badge relmb-badge-${badgeCls}" style="margin-right:4px">
                                ${s==='concluido'?'Conc.':s==='cursando'?'Curso':'Desist.'}
                            </span>
                            ${r.nome||r.curso_id}
                        </div>
                        <div class="relmb-detail-val" style="font-size:10px;color:var(--text-faint)">${dataFim}</div>
                    </div>`;
            }).join('')}
            </div>` : ''}

            <div class="relmb-detail-card">
                <div class="relmb-detail-title">Familia</div>
                ${fam.conjuge ? `<div class="relmb-detail-row">
                    <div class="relmb-detail-key">Conjuge</div>
                    <div class="relmb-detail-val" style="cursor:pointer;color:var(--primary)"
                         onclick="relmb_openDrawer('${fam.conjuge.id}')">${fam.conjuge.nome}</div>
                </div>` : ''}
                ${fam.pai ? `<div class="relmb-detail-row">
                    <div class="relmb-detail-key">Pai</div>
                    <div class="relmb-detail-val" style="cursor:pointer;color:var(--primary)"
                         onclick="relmb_openDrawer('${fam.pai.id}')">${fam.pai.nome}</div>
                </div>` : ''}
                ${fam.mae ? `<div class="relmb-detail-row">
                    <div class="relmb-detail-key">Mae</div>
                    <div class="relmb-detail-val" style="cursor:pointer;color:var(--primary)"
                         onclick="relmb_openDrawer('${fam.mae.id}')">${fam.mae.nome}</div>
                </div>` : ''}
                ${(fam.filhos||[]).map(f=>`<div class="relmb-detail-row">
                    <div class="relmb-detail-key">Filho</div>
                    <div class="relmb-detail-val" style="cursor:pointer;color:var(--primary)"
                         onclick="relmb_openDrawer('${f.id}')">${f.nome}</div>
                </div>`).join('')}
                ${!fam.conjuge && !fam.pai && !fam.mae && !(fam.filhos||[]).length
                ? `<div style="font-size:11px;color:var(--text-faint);padding:4px 0">Sem registos de familia.</div>`
                : ''}
            </div>

            ${m.historia ? `<div class="relmb-detail-card">
                <div class="relmb-detail-title">Historia</div>
                <div style="font-size:12px;color:#ddd;line-height:1.7;white-space:pre-wrap">${m.historia}</div>
            </div>` : ''}
        `;

            document.getElementById('relmb-drawer').classList.add('open');
            document.getElementById('relmb-overlay').classList.add('open');
        }

        function relmb_closeDrawer() {
            document.getElementById('relmb-drawer').classList.remove('open');
            document.getElementById('relmb-overlay').classList.remove('open');
        }

        /* ── EXPORT CSV ── */
        function relmb_exportCSV() {
            const q      = (document.getElementById('relmb-q')?.value   || '').toLowerCase().trim();
            const zona   = document.getElementById('relmb-zona')?.value  || '';
            const genero = document.getElementById('relmb-genero')?.value|| '';
            const estado = document.getElementById('relmb-estado')?.value|| 'ativo';

            let lista = [..._membros];
            if (estado === 'ativo')   lista = lista.filter(m => m.ativo !== false);
            if (estado === 'inativo') lista = lista.filter(m => m.ativo === false);
            if (q)      lista = lista.filter(m => (m.nome||'').toLowerCase().includes(q));
            if (zona)   lista = lista.filter(m => m.zona === zona);
            if (genero) lista = lista.filter(m => m.genero === genero);
            _filtros.forEach(k => { lista = lista.filter(m => m[k] === true); });
            lista.sort((a,b) => (a.nome||'').localeCompare(b.nome||''));

            const esc = v => `"${String(v||'').replace(/"/g,'""')}"`;

            const header = ['Nome','Email','Telefone','Genero','Area','Link','Estado','Funcoes','Ministerios','Cursos Concluidos','Cursos em Curso','Familia'];

            const rows = lista.map(m => {
                const genLabel = m.genero==='masculino'?'Homem':m.genero==='feminino'?'Mulher':'';
                const linkNome = m.link_id ? (_links_map[m.link_id]||'') : '';
                const estado_m = m.ativo===false ? 'Inactivo' : 'Activo';
                const funcoes  = Object.keys(FUNCOES_MAP).filter(k=>m[k]===true).map(k=>FUNCOES_MAP[k].l).join(', ');
                const mins     = (_mins_cache[m.id]||[]).map(mv=>mv.nome+(mv.papel?' ('+mv.papel+')':'')).join(', ');

                let cursosArr = [];
                try { cursosArr = JSON.parse(m.cursos_concluidos||'[]')||[]; } catch(_){}
                const conc = cursosArr.filter(r=>!r.status||r.status==='concluido').map(r=>r.nome||r.curso_id).join(', ');
                const curs = cursosArr.filter(r=>r.status==='cursando').map(r=>r.nome||r.curso_id).join(', ');

                const fam = _familia[m.id]||{};
                const famParts = [];
                if (fam.conjuge) famParts.push(fam.conjuge.nome+' (Conjuge)');
                if (fam.pai)     famParts.push(fam.pai.nome+' (Pai)');
                if (fam.mae)     famParts.push(fam.mae.nome+' (Mae)');
                (fam.filhos||[]).forEach(f => famParts.push(f.nome+' (Filho)'));

                return [m.nome, m.email, m.telefone, genLabel, m.zona, linkNome, estado_m,
                    funcoes, mins, conc, curs, famParts.join(', ')].map(esc).join(',');
            });

            const csv = '\uFEFF' + [header.join(','), ...rows].join('\n');
            const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            a.href = url;
            a.download = `relatorio-membros-${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        /* ── expor globalmente ── */
        window.relmb_init        = relmb_init;
        window.relmb_aplicar     = relmb_aplicar;
        window.relmb_toggleChip  = relmb_toggleChip;
        window.relmb_limpar      = relmb_limpar;
        window.relmb_sort        = relmb_sort;
        window.relmb_openDrawer  = relmb_openDrawer;
        window.relmb_closeDrawer = relmb_closeDrawer;
        window.relmb_exportCSV   = relmb_exportCSV;

        /* auto-init */
        relmb_init();
    })();
</script>
