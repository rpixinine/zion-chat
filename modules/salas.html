    window.sl_cancelarAg = function () {
        sl_recDiasSelected = new Set();
        sl_editSerie = false;
        if (sl_tab === 'agenda') sl_renderAgenda();
        else sl_showEmpty();
    };


    // ── GUARDAR AGENDAMENTO  [NEW] ────────────────────────────────────────────
    window.sl_guardarAgendamento = async function (id) {
        var salaId = document.getElementById('slag-sala_id')?.value;
        var titulo = document.getElementById('slag-titulo')?.value?.trim();
        var dataStr = document.getElementById('slag-data')?.value;
        var horaIni = document.getElementById('slag-hora_ini')?.value;
        var horaFim = document.getElementById('slag-hora_fim')?.value;

        if (!salaId) {
            sl_showMsg('error', 'Seleciona uma sala.');
            return;
        }
        if (!titulo) {
            sl_showMsg('error', 'Título obrigatório.');
            return;
        }
        if (!dataStr || !horaIni || !horaFim) {
            sl_showMsg('error', 'Data e hora obrigatórias.');
            return;
        }

        var dataInicioBase = new Date(dataStr + 'T' + horaIni + ':00');
        var dataFimBase = new Date(dataStr + 'T' + horaFim + ':00');

        if (dataFimBase <= dataInicioBase) {
            sl_showMsg('error', 'A hora de fim deve ser posterior à hora de início.');
            return;
        }

        var btn = document.getElementById('sl-btn-ag-guardar');
        if (btn) {
            btn.disabled = true;
            btn.textContent = 'A guardar...';
        }

        var recTipo = document.getElementById('slag-recorrencia_tipo')?.value || null;
        var recFimSt = document.getElementById('slag-recorrencia_fim')?.value || null;
        var recFim = recFimSt ? new Date(recFimSt + 'T23:59:59') : null;
        var diasArr = Array.from(sl_recDiasSelected);

        var dados = {
            sala_id: salaId,
            titulo: titulo,
            nome_evento: document.getElementById('slag-nome_evento')?.value?.trim() || null,
            nome_responsavel: document.getElementById('slag-nome_responsavel')?.value?.trim() || null,
            solicitante_nome: document.getElementById('slag-solicitante_nome')?.value?.trim() || null,
            solicitante_email: document.getElementById('slag-solicitante_email')?.value?.trim() || null,
            solicitante_tel: document.getElementById('slag-solicitante_tel')?.value?.trim() || null,
            status: document.getElementById('slag-status')?.value || 'aprovado',
            descricao: document.getElementById('slag-descricao')?.value?.trim() || null,
            recorrencia_tipo: recTipo || null,
            recorrencia_dias: diasArr.length ? diasArr : null,
            recorrencia_fim: recFimSt || null,
        };

        try {
            if (id) {
                var a = sl_ags.find(function(x) { return x.id === id; }) || {};
                var patchDados = Object.assign({}, dados, {
                    data_inicio: dataInicioBase.toISOString(),
                    data_fim: dataFimBase.toISOString(),
                });

                if (sl_editSerie && a.recorrencia_id) {
                    // Apagar todas as ocorrências da série e recriar
                    await sb('sala_agendamentos?recorrencia_id=eq.' + a.recorrencia_id, { method: 'DELETE' });

                    var ocorrencias;
                    var diasParaGerar = diasArr.length ? diasArr : [dataInicioBase.getDay()];
                    if (recTipo && recFim) {
                        ocorrencias = sl_gerarOcorrencias(dataInicioBase, dataFimBase, recTipo, diasParaGerar, recFim);
                    } else {
                        ocorrencias = [{ inicio: dataInicioBase, fim: dataFimBase }];
                    }

                    var insertData = ocorrencias.map(function(o) {
                        return Object.assign({}, dados, {
                            data_inicio: o.inicio.toISOString(),
                            data_fim: o.fim.toISOString(),
                            recorrencia_id: a.recorrencia_id,
                        });
                    });

                    await sb('sala_agendamentos', {
                        method: 'POST',
                        headers: { Prefer: 'return=minimal' },
                        body: JSON.stringify(insertData.length === 1 ? insertData[0] : insertData),
                    });
                } else {
                    // Só esta ocorrência
                    await sb('sala_agendamentos?id=eq.' + id, {
                        method: 'PATCH',
                        body: JSON.stringify(patchDados),
                    });
                }
            }

            // Reload e voltar à agenda
            sl_ags = await sb('sala_agendamentos?select=*&order=data_inicio.desc').catch(function () {
                return sl_ags;
            });
            sl_updateBadge();
            sl_recDiasSelected = new Set();
            sl_editSerie = false;
            sl_renderAgenda();

        } catch (e) {
            sl_showMsg('error', 'Erro: ' + (e?.message || JSON.stringify(e)));
            if (btn) {
                btn.disabled = false;
                btn.textContent = 'Guardar';
            }
        }
    };


    // ── GERAÇÃO DE OCORRÊNCIAS  [NEW] ─────────────────────────────────────────
    function sl_gerarOcorrencias(dataInicio, dataFim, tipo, diasSemana, dataFimRec) {
        var duracao = dataFim.getTime() - dataInicio.getTime();
        var endTime = dataFimRec.getTime();
        var result = [];

        // Helper: cria uma ocorrência para um dado Date (com horas de dataInicio)
        function addOcc(d) {
            var ini = new Date(d);
            ini.setHours(dataInicio.getHours(), dataInicio.getMinutes(), 0, 0);
            if (ini.getTime() > endTime) return false;
            result.push({inicio: ini, fim: new Date(ini.getTime() + duracao)});
            return true;
        }

        if (tipo === 'diaria') {
            var cur = new Date(dataInicio);
            for (var i = 0; i <= 730; i++) {  // limite: 2 anos
                if (!addOcc(cur)) break;
                cur = new Date(cur);
                cur.setDate(cur.getDate() + 1);
            }

        } else if (tipo === 'semanal') {
            var cur = new Date(dataInicio);
            for (var i = 0; i <= 104; i++) {  // limite: 2 anos
                if (!addOcc(cur)) break;
                cur = new Date(cur);
                cur.setDate(cur.getDate() + 7);
            }

        } else if (tipo === 'mensal') {
            var weekN = Math.floor((dataInicio.getDate() - 1) / 7);
            var dow = diasSemana.length ? diasSemana[0] : dataInicio.getDay();
            var cur = new Date(dataInicio);
            for (var i = 0; i <= 24; i++) {   // limite: 2 anos
                if (i > 0) {
                    cur = new Date(cur);
                    cur.setMonth(cur.getMonth() + 1);
                    var target = sl_nthWeekdayOfMonth(cur.getFullYear(), cur.getMonth(), dow, weekN);
                    if (!target) continue;
                    cur = target;
                }
                if (!addOcc(cur)) break;
            }

        } else if (tipo === 'personalizada') {
            var diasSet = new Set(diasSemana.map(Number));
            var cur = new Date(dataInicio);
            cur.setHours(0, 0, 0, 0);
            for (var i = 0; i <= 730; i++) {
                if (cur.getTime() > endTime) break;
                if (diasSet.has(cur.getDay())) {
                    var occ = new Date(cur);
                    occ.setHours(dataInicio.getHours(), dataInicio.getMinutes(), 0, 0);
                    if (occ.getTime() >= dataInicio.getTime()) {
                        if (!addOcc(occ)) break;
                    }
                }
                cur.setDate(cur.getDate() + 1);
            }
        }

        return result;
    }

    // N-ésima ocorrência de um dia da semana num dado mês (weekN base-0)
    function sl_nthWeekdayOfMonth(year, month, weekday, weekN) {
        var first = new Date(year, month, 1);
        var firstDow = first.getDay();
        var diff = (weekday - firstDow + 7) % 7;
        var date = 1 + diff + weekN * 7;
        var daysInM = new Date(year, month + 1, 0).getDate();
        if (date > daysInM) return null;
        return new Date(year, month, date);
    }

    // UUID v4 simples
    function sl_genUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
            var r = Math.random() * 16 | 0;
            return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
        });
    }

    // Pad zero helper (usado nas horas)
    function _pad2(n) {
        return String(n).padStart(2, '0');
    }

    window.sl_eliminarAg = async function(id) {
        if (!confirm('Eliminar este agendamento? Esta acção não pode ser desfeita.')) return;
        try {
            await sb('sala_agendamentos?id=eq.' + id, { method: 'DELETE' });
            sl_ags = sl_ags.filter(function(a) { return a.id !== id; });
            sl_updateBadge();
            sl_renderAgenda();
        } catch (e) {
            alert('Erro ao eliminar: ' + (e?.message || e));
        }
    };
