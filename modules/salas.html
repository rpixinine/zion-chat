<style>
/* ══════════════════════════════════════════════════════
   SALAS MODULE
   Tabelas: salas, sala_agendamentos
   Prefixo: sl_
   ══════════════════════════════════════════════════════ */

.sl-wrap {
    display: flex;
    height: 100%;
    min-height: 0;
    overflow: hidden;
    font-family: var(--font-body);
}

/* ── SIDEBAR ─────────────────────────────────────────── */
.sl-side {
    width: 280px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--bg-card);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.sl-side-header {
    padding: 14px 12px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.sl-side-title {
    font-family: var(--font-title);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-faint);
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.sl-side-count {
    font-size: 11px;
    font-weight: 700;
    color: var(--primary-dark);
}
.sl-tabs {
    display: flex;
    gap: 4px;
}
.sl-tab {
    flex: 1;
    padding: 7px 0;
    text-align: center;
    font-size: 11px;
    font-family: var(--font-title);
    letter-spacing: 0.5px;
    color: var(--text-faint);
    cursor: pointer;
    border-radius: 8px;
    border: 1px solid transparent;
    transition: all 0.12s;
    position: relative;
    white-space: nowrap;
}
.sl-tab:hover  { background: var(--primary-faint); color: var(--primary-dark); }
.sl-tab.active { background: var(--primary-faint); color: var(--primary-dark); border-color: var(--primary); font-weight: 700; }
.sl-tab-badge {
    position: absolute;
    top: -5px; right: -5px;
    background: #e74c3c;
    color: #fff;
    border-radius: 10px;
    font-size: 9px;
    font-weight: 700;
    min-width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
    line-height: 1;
}
.sl-search-wrap { position: relative; }
.sl-search-icon {
    position: absolute;
    left: 9px; top: 50%; transform: translateY(-50%);
    width: 13px; height: 13px;
    color: var(--text-faint);
    pointer-events: none;
}
.sl-search {
    width: 100%;
    padding: 7px 10px 7px 28px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    font-family: var(--font-body);
    color: var(--text-main);
    outline: none;
    box-sizing: border-box;
    transition: border-color 0.2s;
}
.sl-search:focus { border-color: var(--primary); }
.sl-list { flex: 1; overflow-y: auto; }

/* ── SALA ITEM (sidebar) ──────────────────────────────── */
.sl-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    border-left: 3px solid transparent;
    transition: background 0.1s;
}
.sl-item:hover  { background: var(--primary-faint); }
.sl-item.active { background: var(--primary-faint); border-left-color: var(--primary); }
.sl-item-thumb {
    width: 42px; height: 42px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--bg-input);
    border: 1px solid var(--border);
}
.sl-item-thumb-placeholder {
    width: 42px; height: 42px;
    border-radius: 8px;
    flex-shrink: 0;
    background: var(--primary-faint);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
}
.sl-item-thumb-placeholder svg { width: 20px; height: 20px; color: var(--primary-dark); opacity: 0.5; }
.sl-item-info { flex: 1; min-width: 0; }
.sl-item-nome {
    font-size: 13px; font-weight: 600;
    color: var(--text-main);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sl-item-sub  { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
.sl-item-dot  {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
}
.sl-item-dot.on  { background: #2ecc71; }
.sl-item-dot.off { background: var(--border); }

/* ── PENDING SIDEBAR ITEM ────────────────────────────── */
.sl-pend-item {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    border-left: 3px solid #e74c3c;
    cursor: pointer;
    transition: background 0.1s;
}
.sl-pend-item:hover { background: rgba(231,76,60,0.05); }
.sl-pend-item.active { background: rgba(231,76,60,0.08); }
.sl-pend-nome { font-size: 13px; font-weight: 600; color: var(--text-main); }
.sl-pend-sub  { font-size: 11px; color: var(--text-faint); margin-top: 2px; }

/* ── PAINEL DIREITO ──────────────────────────────────── */
.sl-panel {
    flex: 1;
    overflow-y: auto;
    background: var(--bg-main);
}
.sl-empty {
    height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text-faint); gap: 10px;
}
.sl-empty svg { width: 44px; height: 44px; opacity: 0.25; }
.sl-empty-txt { font-size: 13px; }

/* ── FOTO HEADER ─────────────────────────────────────── */
.sl-foto-header {
    position: relative;
    height: 200px;
    overflow: hidden;
    background: var(--bg-input);
    flex-shrink: 0;
}
.sl-foto-header img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
}
.sl-foto-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: var(--primary-faint);
}
.sl-foto-placeholder svg { width: 48px; height: 48px; color: var(--primary-dark); opacity: 0.3; }
.sl-foto-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 40px 20px 16px;
    background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 100%);
}
.sl-foto-nome {
    font-size: 20px; font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
.sl-foto-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.8);
    margin-top: 3px;
}
.sl-foto-actions {
    position: absolute;
    top: 12px; right: 12px;
    display: flex; gap: 6px;
}

/* ── PANEL BODY ──────────────────────────────────────── */
.sl-panel-body { padding: 18px 20px; }

/* ── DATA CARD ───────────────────────────────────────── */
.sl-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 12px;
}
.sl-card-title {
    font-family: var(--font-title);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
}
.sl-field-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px; font-size: 13px;
}
.sl-field-row:last-child { border-bottom: none; }
.sl-field-label { color: var(--text-faint); font-size: 12px; flex-shrink: 0; }
.sl-field-val   { color: var(--text-main); font-weight: 500; text-align: right; line-height: 1.4; }

/* ── EQUIPAMENTOS ────────────────────────────────────── */
.sl-equip-row {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 8px 0;
}
.sl-equip-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px; font-family: var(--font-title); letter-spacing: 0.3px;
}
.sl-equip-chip.on  { background: rgba(46,125,50,0.1);  color: #2e7d32; border: 1px solid rgba(46,125,50,0.3); }
.sl-equip-chip.off { background: var(--bg-input); color: var(--text-faint); border: 1px solid var(--border); text-decoration: line-through; opacity: 0.5; }

/* ── AGENDAMENTO ITEM ────────────────────────────────── */
.sl-ag-item {
    display: flex; align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
}
.sl-ag-item:last-child { border-bottom: none; }
.sl-ag-titulo { font-size: 13px; font-weight: 600; color: var(--text-main); }
.sl-ag-sub    { font-size: 11px; color: var(--text-faint); margin-top: 2px; line-height: 1.5; }
.sl-ag-status {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 20px;
    font-size: 10px; font-family: var(--font-title); letter-spacing: 0.3px;
    white-space: nowrap; flex-shrink: 0;
}
.sl-ag-status.aprovado { background: rgba(46,125,50,0.1);  color: #2e7d32; border: 1px solid rgba(46,125,50,0.3); }
.sl-ag-status.pendente { background: rgba(230,126,34,0.1); color: #e67e22; border: 1px solid rgba(230,126,34,0.3); }
.sl-ag-status.recusado { background: rgba(192,57,43,0.1);  color: #c0392b; border: 1px solid rgba(192,57,43,0.3); }

/* ── APROVACAO PAINEL ────────────────────────────────── */
.sl-aprov-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 4px solid #e67e22;
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 12px;
}
.sl-aprov-titulo { font-size: 15px; font-weight: 700; color: var(--text-main); margin-bottom: 10px; }
.sl-aprov-row    { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

/* ── FORMULARIO ──────────────────────────────────────── */
.sl-form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}
.sl-form-full { grid-column: 1 / -1; }
.sl-flabel {
    font-size: 10px; font-family: var(--font-title);
    letter-spacing: 1px; color: var(--text-faint);
    margin-bottom: 4px; text-transform: uppercase; display: block;
}
.sl-input, .sl-select, .sl-textarea {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    font-family: var(--font-body);
    color: var(--text-main);
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
    width: 100%;
}
.sl-input:focus, .sl-select:focus, .sl-textarea:focus { border-color: var(--primary); }
.sl-textarea { height: 72px; resize: vertical; }
.sl-check-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text-main); cursor: pointer;
}

/* ── BOTOES ──────────────────────────────────────────── */
.sl-btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    font-size: 11px; font-family: var(--font-title);
    letter-spacing: 0.5px;
    color: var(--text-muted);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.sl-btn:hover    { border-color: var(--primary); color: var(--primary-dark); background: var(--primary-faint); }
.sl-btn.primary  { background: var(--primary); border-color: var(--primary); color: #fff; }
.sl-btn.primary:hover { background: var(--primary-dark); }
.sl-btn.approve  { background: rgba(46,125,50,0.1); border-color: rgba(46,125,50,0.4); color: #2e7d32; }
.sl-btn.approve:hover { background: rgba(46,125,50,0.18); }
.sl-btn.danger   { border-color: rgba(192,57,43,0.3); color: #c0392b; }
.sl-btn.danger:hover { background: rgba(192,57,43,0.08); }
.sl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.sl-btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
.sl-photo-btn {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(0,0,0,0.3);
    font-size: 10px; font-family: var(--font-title);
    letter-spacing: 0.5px; color: #fff;
    cursor: pointer; backdrop-filter: blur(4px);
    transition: all 0.15s;
}
.sl-photo-btn:hover { background: rgba(0,0,0,0.5); }

/* ── MSG ─────────────────────────────────────────────── */
.sl-msg {
    font-size: 12px; padding: 7px 12px; border-radius: 8px;
    margin-bottom: 10px; display: none;
}
.sl-msg.success { display: block; background: rgba(46,125,50,0.1); color: #2e7d32; border: 1px solid rgba(46,125,50,0.3); }
.sl-msg.error   { display: block; background: rgba(198,40,40,0.1); color: #c62828; border: 1px solid rgba(198,40,40,0.3); }

/* Aviso entrega */
.sl-aviso {
    background: rgba(230,126,34,0.08);
    border: 1px solid rgba(230,126,34,0.25);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text-main);
    line-height: 1.6;
    margin-bottom: 12px;
}
.sl-aviso-label {
    font-family: var(--font-title);
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #e67e22;
    margin-bottom: 4px;
}
</style>

<div class="sl-wrap">

    <!-- ── SIDEBAR ──────────────────────────────────────── -->
    <div class="sl-side">
        <div class="sl-side-header">
            <div class="sl-side-title">
                Salas
                <span class="sl-side-count" id="sl-count"></span>
            </div>
            <div class="sl-tabs">
                <div class="sl-tab active" id="sl-tab-salas" onclick="sl_setTab('salas')">Salas</div>
                <div class="sl-tab" id="sl-tab-aprovacoes" onclick="sl_setTab('aprovacoes')" style="position:relative">
                    Aprovacoes
                    <span class="sl-tab-badge" id="sl-badge-aprovacoes" style="display:none">0</span>
                </div>
            </div>
            <div class="sl-search-wrap" id="sl-search-wrap">
                <svg class="sl-search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input class="sl-search" id="sl-search" placeholder="Pesquisar sala..." oninput="sl_filtrar()">
            </div>
        </div>
        <div class="sl-list" id="sl-list">
            <div style="padding:20px;color:var(--text-faint);font-size:12px;text-align:center">A carregar...</div>
        </div>
        <div style="padding:10px 12px;border-top:1px solid var(--border)">
            <button class="sl-btn primary" style="width:100%" onclick="sl_novaSala()">+ Nova Sala</button>
        </div>
    </div>

    <!-- ── PAINEL ────────────────────────────────────────── -->
    <div class="sl-panel" id="sl-panel">
        <div class="sl-empty" id="sl-empty">
            <svg fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <div class="sl-empty-txt">Selecciona uma sala para ver detalhes</div>

    </div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// SALAS MODULE
// Tabelas: salas, sala_agendamentos, notificacoes
// status agendamento: 'pendente' | 'aprovado' | 'recusado'
// ══════════════════════════════════════════════════════════════════════════════

var sl_salas = [];
var sl_ags   = [];       // sala_agendamentos
var sl_activoId  = null;
var sl_activoAgId = null; // agendamento ativo na tab aprovacoes
var sl_editMode  = false;
var sl_isNovo    = false;
var sl_tab       = 'salas';

// ── INIT ──────────────────────────────────────────────────────────────────────
async function sl_init() {
    try {
        var res = await Promise.all([
            sb('salas?select=*&order=nome').catch(function() { return []; }),
            sb('sala_agendamentos?select=*&order=data_inicio.desc').catch(function() { return []; }),
        ]);
        sl_salas = res[0] || [];
        sl_ags   = res[1] || [];
        sl_renderList();
        sl_updateBadge();
    } catch(e) {
        console.error('sl_init:', e);
    }
}

// ── BADGE ─────────────────────────────────────────────────────────────────────
function sl_updateBadge() {
    var n = sl_ags.filter(function(a) { return a.status === 'pendente'; }).length;
    var badge = document.getElementById('sl-badge-aprovacoes');
    if (badge) { badge.textContent = n; badge.style.display = n ? 'flex' : 'none'; }
    // Badge no menu global do admin.html
    var menuBadge = document.querySelector('[data-secao="salas"] .nav-badge');
    if (menuBadge) { menuBadge.textContent = n; menuBadge.style.display = n ? 'flex' : 'none'; }
    window.sl_badgeCount = n;
}

// ── TABS ──────────────────────────────────────────────────────────────────────
window.sl_setTab = function(tab) {
    sl_tab = tab;
    sl_activoId   = null;
    sl_activoAgId = null;
    sl_editMode   = false;
    sl_isNovo     = false;
    document.getElementById('sl-tab-salas')?.classList.toggle('active', tab === 'salas');
    document.getElementById('sl-tab-aprovacoes')?.classList.toggle('active', tab === 'aprovacoes');
    var sw = document.getElementById('sl-search-wrap');
    if (sw) sw.style.display = tab === 'salas' ? '' : 'none';
    sl_renderList();
    sl_showEmpty();
};

// ── RENDER LISTA ──────────────────────────────────────────────────────────────
function sl_renderList() {
    var list  = document.getElementById('sl-list');
    var count = document.getElementById('sl-count');
    if (!list) return;

    if (sl_tab === 'aprovacoes') {
        sl_renderListAprovacoes(list, count); return;
    }

    var q = (document.getElementById('sl-search')?.value || '').toLowerCase();
    var lista = sl_salas.filter(function(s) {
        if (!q) return true;
        return (s.nome || '').toLowerCase().includes(q) ||
               (s.espaco || '').toLowerCase().includes(q);
    });

    if (count) count.textContent = lista.length;

    if (!lista.length) {
        list.innerHTML = '<div style="padding:20px;color:var(--text-faint);font-size:12px;text-align:center">' +
            (q ? 'Nenhuma sala encontrada.' : 'Nenhuma sala registada.') + '</div>';
        return;
    }

    list.innerHTML = lista.map(function(s) {
        var ativa  = sl_activoId === s.id;
        var dotCls = s.ativo !== false ? 'on' : 'off';
        var thumb  = s.foto_url
            ? '<img class="sl-item-thumb" src="' + s.foto_url + '" alt="" onerror="this.style.display=\'none\'">'
            : '<div class="sl-item-thumb-placeholder"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></div>';
        var sub = [s.espaco, s.capacidade ? s.capacidade + ' lug.' : null]
            .filter(Boolean).join(' · ');
        return '<div class="sl-item' + (ativa ? ' active' : '') + '" onclick="sl_selecionar(\'' + s.id + '\')">' +
            thumb +
            '<div class="sl-item-info">' +
                '<div class="sl-item-nome">' + (s.nome || '—') + '</div>' +
                '<div class="sl-item-sub">' + (sub || '—') + '</div>' +
            '</div>' +
            '<div class="sl-item-dot ' + dotCls + '"></div>' +
        '</div>';
    }).join('');
}

function sl_renderListAprovacoes(list, count) {
    var pendentes = sl_ags.filter(function(a) { return a.status === 'pendente'; });
    if (count) count.textContent = pendentes.length;

    if (!pendentes.length) {
        list.innerHTML = '<div style="padding:20px;color:var(--text-faint);font-size:12px;text-align:center">Nenhum pedido pendente.</div>';
        return;
    }
    list.innerHTML = pendentes.map(function(a) {
        var ativa = sl_activoAgId === a.id;
        var sala  = sl_salas.find(function(s) { return s.id === a.sala_id; });
        var dataStr = sl_fmtData(a.data_inicio);
        return '<div class="sl-pend-item' + (ativa ? ' active' : '') + '" onclick="sl_selecionarAg(\'' + a.id + '\')">' +
            '<div class="sl-pend-nome">' + (a.titulo || 'Pedido de sala') + '</div>' +
            '<div class="sl-pend-sub">' + (sala ? sala.nome : '—') + ' · ' + dataStr + '</div>' +
            '<div class="sl-pend-sub">' + (a.solicitante_nome || '') + '</div>' +
        '</div>';
    }).join('');
}

// ── SELECIONAR ────────────────────────────────────────────────────────────────
window.sl_selecionar = function(id) {
    sl_activoId  = id;
    sl_editMode  = false;
    sl_isNovo    = false;
    sl_renderList();
    sl_renderView();
};

window.sl_selecionarAg = function(id) {
    sl_activoAgId = id;
    sl_renderList();
    sl_renderAprovacaoView(id);
};

window.sl_filtrar = function() { sl_renderList(); };

window.sl_novaSala = function() {
    sl_activoId = null;
    sl_editMode = true;
    sl_isNovo   = true;
    sl_tab      = 'salas';
    document.getElementById('sl-tab-salas')?.classList.add('active');
    document.getElementById('sl-tab-aprovacoes')?.classList.remove('active');
    sl_renderList();
    sl_renderForm(null);
};

// ── SHOW EMPTY ────────────────────────────────────────────────────────────────
function sl_showEmpty() {
    var e = document.getElementById('sl-empty');
    var c = document.getElementById('sl-panel-content');
    if (e) e.style.display = 'flex';
    if (c) c.style.display = 'none';
}
function sl_showContent(html) {
    var e = document.getElementById('sl-empty');
    var c = document.getElementById('sl-panel-content');
    if (e) e.style.display = 'none';
    if (c) { c.style.display = 'block'; c.innerHTML = html; }
}

// ── RENDER VIEW SALA ──────────────────────────────────────────────────────────
function sl_renderView() {
    var s = sl_salas.find(function(x) { return x.id === sl_activoId; });
    if (!s) { sl_showEmpty(); return; }

    // Agendamentos desta sala (todos, ordenados)
    var ags_sala = sl_ags.filter(function(a) { return a.sala_id === s.id; });
    var pendentes = ags_sala.filter(function(a) { return a.status === 'pendente'; });
    var futuros   = ags_sala.filter(function(a) {
        return a.status === 'aprovado' && new Date(a.data_inicio) >= new Date();
    }).sort(function(x, y) { return new Date(x.data_inicio) - new Date(y.data_inicio); });
    var historico = ags_sala.filter(function(a) {
        return a.status !== 'pendente' &&
               (a.status !== 'aprovado' || new Date(a.data_inicio) < new Date());
    }).slice(0, 5);

    // Foto header
    var fotoHtml = s.foto_url
        ? '<div class="sl-foto-header">' +
            '<img src="' + s.foto_url + '" alt="' + s.nome + '" onerror="this.parentNode.innerHTML=\'<div class=sl-foto-placeholder><svg fill=none stroke=currentColor stroke-width=1.2 viewBox=\\\'0 0 24 24\\\'><path d=\\\'M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z\\\'/></svg></div>\'">' +
            '<div class="sl-foto-overlay">' +
                '<div class="sl-foto-nome">' + (s.nome || '') + '</div>' +
                '<div class="sl-foto-sub">' + [s.espaco, s.capacidade ? s.capacidade + ' lugares' : null].filter(Boolean).join(' · ') + '</div>' +
            '</div>' +
            '<div class="sl-foto-actions">' +
                '<button class="sl-photo-btn" onclick="sl_editar()">Editar</button>' +
                '<button class="sl-photo-btn" onclick="sl_toggleAtivo(\'' + s.id + '\')">' + (s.ativo !== false ? 'Desativar' : 'Ativar') + '</button>' +
            '</div>' +
        '</div>'
        : '<div class="sl-foto-header"><div class="sl-foto-placeholder"><svg fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>' +
          '<div class="sl-foto-overlay"><div class="sl-foto-nome">' + (s.nome || '') + '</div><div class="sl-foto-sub">' + (s.espaco || '') + '</div></div>' +
          '<div class="sl-foto-actions"><button class="sl-photo-btn" onclick="sl_editar()">Editar</button><button class="sl-photo-btn" onclick="sl_toggleAtivo(\'' + s.id + '\')">' + (s.ativo !== false ? 'Desativar' : 'Ativar') + '</button></div>' +
          '</div>';

    // Equipamentos
    var equips = [
        { key: 'tem_som',        label: 'Som'        },
        { key: 'tem_iluminacao', label: 'Iluminacao' },
        { key: 'tem_projecao',   label: 'Projecao'   },
        { key: 'tem_mesas',      label: 'Mesas'      },
        { key: 'tem_cadeiras',   label: 'Cadeiras'   },
    ];
    var equipHtml = '<div class="sl-equip-row">' +
        equips.map(function(e) {
            var on = s[e.key] === true;
            return '<span class="sl-equip-chip ' + (on ? 'on' : 'off') + '">' + (on ? '✓' : '×') + ' ' + e.label + '</span>';
        }).join('') +
    '</div>';

    // Horario
    var horario = '—';
    if (s.hora_inicio && s.hora_fim) {
        horario = s.hora_inicio.substring(0,5) + ' – ' + s.hora_fim.substring(0,5);
    }

    // Aviso
    var avisoHtml = s.aviso_entrega
        ? '<div class="sl-aviso"><div class="sl-aviso-label">Aviso de Entrega</div>' + s.aviso_entrega + '</div>'
        : '';

    // Pendentes desta sala
    var pendHtml = '';
    if (pendentes.length) {
        pendHtml = '<div class="sl-card">' +
            '<div class="sl-card-title">Pedidos Pendentes (' + pendentes.length + ')</div>' +
            pendentes.map(function(a) {
                return '<div class="sl-ag-item">' +
                    '<div>' +
                        '<div class="sl-ag-titulo">' + (a.titulo || 'Pedido') + '</div>' +
                        '<div class="sl-ag-sub">' +
                            sl_fmtDataHora(a.data_inicio) + ' – ' + sl_fmtHora(a.data_fim) + '<br>' +
                            (a.solicitante_nome || '') +
                            (a.solicitante_email ? ' · ' + a.solicitante_email : '') +
                        '</div>' +
                        '<div style="display:flex;gap:6px;margin-top:6px">' +
                            '<button class="sl-btn approve" style="font-size:10px;padding:4px 10px" onclick="sl_aprovar(\'' + a.id + '\')">Aprovar</button>' +
                            '<button class="sl-btn danger"  style="font-size:10px;padding:4px 10px" onclick="sl_rejeitar(\'' + a.id + '\')">Rejeitar</button>' +
                        '</div>' +
                    '</div>' +
                    '<span class="sl-ag-status pendente">Pendente</span>' +
                '</div>';
            }).join('') +
        '</div>';
    }

    // Futuros aprovados
    var futHtml = '';
    if (futuros.length) {
        futHtml = '<div class="sl-card">' +
            '<div class="sl-card-title">Proximos Agendamentos (' + futuros.length + ')</div>' +
            futuros.slice(0, 5).map(function(a) {
                return '<div class="sl-ag-item">' +
                    '<div>' +
                        '<div class="sl-ag-titulo">' + (a.titulo || 'Agendamento') + '</div>' +
                        '<div class="sl-ag-sub">' + sl_fmtDataHora(a.data_inicio) + ' – ' + sl_fmtHora(a.data_fim) + (a.solicitante_nome ? '<br>' + a.solicitante_nome : '') + '</div>' +
                    '</div>' +
                    '<span class="sl-ag-status aprovado">Aprovado</span>' +
                '</div>';
            }).join('') +
        '</div>';
    }

    // Historico
    var histHtml = '';
    if (historico.length) {
        histHtml = '<div class="sl-card">' +
            '<div class="sl-card-title">Historico Recente</div>' +
            historico.map(function(a) {
                return '<div class="sl-ag-item">' +
                    '<div>' +
                        '<div class="sl-ag-titulo">' + (a.titulo || 'Agendamento') + '</div>' +
                        '<div class="sl-ag-sub">' + sl_fmtDataHora(a.data_inicio) + (a.solicitante_nome ? ' · ' + a.solicitante_nome : '') +
                        (a.status === 'recusado' && a.motivo_recusa ? '<br><em>' + a.motivo_recusa + '</em>' : '') + '</div>' +
                    '</div>' +
                    '<span class="sl-ag-status ' + (a.status || '') + '">' + (a.status || '—') + '</span>' +
                '</div>';
            }).join('') +
        '</div>';
    }

    sl_showContent(
        fotoHtml +
        '<div class="sl-panel-body">' +
            '<div id="sl-msg" class="sl-msg"></div>' +
            avisoHtml +
            '<div class="sl-card">' +
                '<div class="sl-card-title">Detalhes</div>' +
                sl_fr('Espaco',     s.espaco || '—') +
                sl_fr('Capacidade', s.capacidade ? s.capacidade + ' pessoas' : '—') +
                sl_fr('Horario',    horario) +
                (s.descricao ? sl_fr('Descricao', s.descricao) : '') +
                '<div class="sl-field-row"><span class="sl-field-label">Equipamentos</span>' + equipHtml + '</div>' +
            '</div>' +
            pendHtml +
            futHtml +
            histHtml +
        '</div>'
    );
}

// ── RENDER APROVACAO DETALHE ──────────────────────────────────────────────────
function sl_renderAprovacaoView(agId) {
    var a = sl_ags.find(function(x) { return x.id === agId; });
    if (!a) { sl_showEmpty(); return; }
    var sala = sl_salas.find(function(s) { return s.id === a.sala_id; });

    var fotoHtml = '';
    if (sala && sala.foto_url) {
        fotoHtml = '<div class="sl-foto-header" style="height:120px">' +
            '<img src="' + sala.foto_url + '" alt="" style="opacity:0.7">' +
            '<div class="sl-foto-overlay"><div class="sl-foto-nome" style="font-size:15px">' + (sala.nome || '') + '</div></div>' +
        '</div>';
    }

    sl_showContent(
        fotoHtml +
        '<div class="sl-panel-body">' +
            '<div id="sl-msg" class="sl-msg"></div>' +
            '<div class="sl-aprov-card">' +
                '<div class="sl-aprov-titulo">' + (a.titulo || 'Pedido de Sala') + '</div>' +
                sl_fr('Sala',          sala ? sala.nome : (a.sala_id || '—')) +
                sl_fr('Data/Hora',     sl_fmtDataHora(a.data_inicio) + ' – ' + sl_fmtHora(a.data_fim)) +
                sl_fr('Solicitante',   a.solicitante_nome || '—') +
                (a.solicitante_email ? sl_fr('Email', a.solicitante_email) : '') +
                (a.solicitante_tel   ? sl_fr('Telefone', a.solicitante_tel) : '') +
                (a.descricao ? sl_fr('Descricao', a.descricao) : '') +
                sl_fr('Estado', '<span class="sl-ag-status ' + (a.status||'') + '">' + (a.status||'—') + '</span>') +
                (a.status === 'recusado' && a.motivo_recusa ? sl_fr('Motivo Recusa', a.motivo_recusa) : '') +
                (a.aprovado_em ? sl_fr('Respondido em', sl_fmtDataHora(a.aprovado_em)) : '') +
                '<div class="sl-aprov-row">' +
                    (a.status === 'pendente'
                        ? '<button class="sl-btn approve" onclick="sl_aprovar(\'' + a.id + '\')">Aprovar</button>' +
                          '<button class="sl-btn danger" onclick="sl_rejeitar(\'' + a.id + '\')">Rejeitar</button>'
                        : '') +
                    '<button class="sl-btn" onclick="sl_setTab(\'aprovacoes\')">Voltar</button>' +
                '</div>' +
            '</div>' +
        '</div>'
    );
}

// ── RENDER FORM ───────────────────────────────────────────────────────────────
function sl_renderForm(id) {
    var s = id ? (sl_salas.find(function(x) { return x.id === id; }) || {}) : {};
    var fv = function(k, d) { var v = s[k]; return (v !== undefined && v !== null) ? v : (d !== undefined ? d : ''); };
    var ck = function(k, d) { return fv(k, d) === true ? ' checked' : ''; };

    var espacos = ['Salao Principal','Lumen','Escritorios','Sala Externa','Outro'];

    sl_showContent(
        '<div style="background:var(--bg-card);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px">' +
            '<div>' +
                '<div style="font-size:16px;font-weight:700;color:var(--text-main)">' + (sl_isNovo ? 'Nova Sala' : 'Editar — ' + (s.nome || '')) + '</div>' +
                '<div style="font-size:12px;color:var(--text-faint);margin-top:2px">' + (sl_isNovo ? 'Preenche os dados da nova sala.' : '') + '</div>' +
            '</div>' +
            '<div style="display:flex;gap:8px">' +
                '<button class="sl-btn" onclick="sl_cancelar()">Cancelar</button>' +
                '<button class="sl-btn primary" id="sl-btn-guardar" onclick="sl_guardar(\'' + (s.id || '') + '\')">Guardar</button>' +
            '</div>' +
        '</div>' +
        '<div class="sl-panel-body">' +
            '<div id="sl-msg" class="sl-msg"></div>' +
            '<div class="sl-card">' +
                '<div class="sl-card-title">Identificacao</div>' +
                '<div class="sl-form-grid">' +
                    '<div class="sl-form-full"><label class="sl-flabel">Nome</label>' +
                        '<input class="sl-input" id="slf-nome" value="' + sl_esc(fv('nome')) + '" placeholder="Ex: Sala de Culto"></div>' +
                    '<div><label class="sl-flabel">Espaco / Area</label>' +
                        '<select class="sl-select" id="slf-espaco">' +
                        '<option value="">—</option>' +
                        espacos.map(function(e) { return '<option' + (fv('espaco') === e ? ' selected' : '') + '>' + e + '</option>'; }).join('') +
                        '</select></div>' +
                    '<div><label class="sl-flabel">Capacidade (pessoas)</label>' +
                        '<input class="sl-input" id="slf-capacidade" type="number" min="1" value="' + (fv('capacidade')||'') + '" placeholder="Ex: 100"></div>' +
                    '<div><label class="sl-flabel">Hora Inicio</label>' +
                        '<input class="sl-input" id="slf-hora_inicio" type="time" value="' + (fv('hora_inicio','').substring(0,5)) + '"></div>' +
                    '<div><label class="sl-flabel">Hora Fim</label>' +
                        '<input class="sl-input" id="slf-hora_fim" type="time" value="' + (fv('hora_fim','').substring(0,5)) + '"></div>' +
                    '<div class="sl-form-full"><label class="sl-flabel">Descricao</label>' +
                        '<textarea class="sl-textarea" id="slf-descricao">' + sl_esc(fv('descricao')) + '</textarea></div>' +
                    '<div class="sl-form-full"><label class="sl-flabel">URL da Foto</label>' +
                        '<input class="sl-input" id="slf-foto_url" value="' + sl_esc(fv('foto_url')) + '" placeholder="https://..."></div>' +
                    '<div class="sl-form-full"><label class="sl-flabel">Aviso de Entrega</label>' +
                        '<textarea class="sl-textarea" id="slf-aviso_entrega">' + sl_esc(fv('aviso_entrega')) + '</textarea></div>' +
                '</div>' +
            '</div>' +
            '<div class="sl-card">' +
                '<div class="sl-card-title">Equipamentos</div>' +
                '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-top:4px">' +
                    ['tem_som:Som','tem_iluminacao:Iluminacao','tem_projecao:Projecao','tem_mesas:Mesas','tem_cadeiras:Cadeiras'].map(function(e) {
                        var p = e.split(':');
                        return '<label class="sl-check-row"><input type="checkbox" id="slf-' + p[0] + '"' + ck(p[0], false) + '> ' + p[1] + '</label>';
                    }).join('') +
                '</div>' +
            '</div>' +
            '<div class="sl-card">' +
                '<div class="sl-card-title">Opcoes</div>' +
                '<label class="sl-check-row" style="padding:6px 0">' +
                    '<input type="checkbox" id="slf-ativo"' + ck('ativo', true) + '> Sala ativa' +
                '</label>' +
            '</div>' +
        '</div>'
    );
}

// ── ACOES SALA ────────────────────────────────────────────────────────────────
window.sl_editar = function() {
    sl_editMode = true;
    sl_renderForm(sl_activoId);
};

window.sl_cancelar = function() {
    if (sl_isNovo) { sl_isNovo = false; sl_activoId = null; sl_showEmpty(); return; }
    sl_editMode = false;
    sl_renderView();
};

window.sl_guardar = async function(id) {
    var nome = document.getElementById('slf-nome')?.value?.trim();
    if (!nome) { sl_showMsg('error', 'Nome obrigatorio.'); return; }

    var btn = document.getElementById('sl-btn-guardar');
    if (btn) { btn.disabled = true; btn.textContent = 'A guardar...'; }

    var dados = {
        nome:           nome,
        espaco:         document.getElementById('slf-espaco')?.value       || null,
        capacidade:     parseInt(document.getElementById('slf-capacidade')?.value) || null,
        hora_inicio:    document.getElementById('slf-hora_inicio')?.value  || null,
        hora_fim:       document.getElementById('slf-hora_fim')?.value     || null,
        descricao:      document.getElementById('slf-descricao')?.value?.trim()     || null,
        foto_url:       document.getElementById('slf-foto_url')?.value?.trim()      || null,
        aviso_entrega:  document.getElementById('slf-aviso_entrega')?.value?.trim() || null,
        tem_som:        document.getElementById('slf-tem_som')?.checked        ?? false,
        tem_iluminacao: document.getElementById('slf-tem_iluminacao')?.checked ?? false,
        tem_projecao:   document.getElementById('slf-tem_projecao')?.checked   ?? false,
        tem_mesas:      document.getElementById('slf-tem_mesas')?.checked      ?? false,
        tem_cadeiras:   document.getElementById('slf-tem_cadeiras')?.checked   ?? false,
        ativo:          document.getElementById('slf-ativo')?.checked          ?? true,
    };

    try {
        if (id) {
            await sb('salas?id=eq.' + id, { method: 'PATCH', body: JSON.stringify(dados) });
        } else {
            var res = await sb('salas', {
                method: 'POST',
                headers: { Prefer: 'return=representation' },
                body: JSON.stringify(dados),
            });
            if (res && res[0]) sl_activoId = res[0].id;
        }
        sl_salas = await sb('salas?select=*&order=nome').catch(function() { return sl_salas; });
        sl_editMode = false;
        sl_isNovo   = false;
        if (!sl_activoId && id) sl_activoId = id;
        sl_renderList();
        sl_renderView();
    } catch(e) {
        sl_showMsg('error', 'Erro: ' + (e?.message || JSON.stringify(e)));
        if (btn) { btn.disabled = false; btn.textContent = 'Guardar'; }
    }
};

window.sl_toggleAtivo = async function(id) {
    var s = sl_salas.find(function(x) { return x.id === id; });
    if (!s) return;
    var novoEstado = s.ativo === false;
    if (!confirm((novoEstado ? 'Ativar' : 'Desativar') + ' esta sala?')) return;
    try {
        await sb('salas?id=eq.' + id, { method: 'PATCH', body: JSON.stringify({ ativo: novoEstado }) });
        s.ativo = novoEstado;
        sl_renderList();
        sl_renderView();
    } catch(e) { alert('Erro: ' + (e?.message || e)); }
};

// ── APROVACOES ────────────────────────────────────────────────────────────────
window.sl_aprovar = async function(id) {
    if (!confirm('Aprovar este agendamento?')) return;
    try {
        var userId = localStorage.getItem('zion_id') || null;
        await sb('sala_agendamentos?id=eq.' + id, {
            method: 'PATCH',
            body: JSON.stringify({
                status: 'aprovado',
                aprovado_por: userId,
                aprovado_em: new Date().toISOString(),
            }),
        });
        await sl_notificar(id, 'aprovado', null);
        await sl_reloadAgs();
        sl_updateBadge();
        sl_renderList();
        if (sl_tab === 'aprovacoes' && sl_activoAgId === id) sl_showEmpty();
        else if (sl_activoId) sl_renderView();
    } catch(e) { alert('Erro ao aprovar: ' + (e?.message || e)); }
};

window.sl_rejeitar = async function(id) {
    var motivo = prompt('Motivo da recusa (opcional):');
    if (motivo === null) return;
    try {
        var userId = localStorage.getItem('zion_id') || null;
        await sb('sala_agendamentos?id=eq.' + id, {
            method: 'PATCH',
            body: JSON.stringify({
                status: 'recusado',
                aprovado_por: userId,
                aprovado_em: new Date().toISOString(),
                motivo_recusa: motivo || null,
            }),
        });
        await sl_notificar(id, 'recusado', motivo);
        await sl_reloadAgs();
        sl_updateBadge();
        sl_renderList();
        if (sl_tab === 'aprovacoes' && sl_activoAgId === id) sl_showEmpty();
        else if (sl_activoId) sl_renderView();
    } catch(e) { alert('Erro ao recusar: ' + (e?.message || e)); }
};

async function sl_reloadAgs() {
    sl_ags = await sb('sala_agendamentos?select=*&order=data_inicio.desc').catch(function() { return sl_ags; });
}

async function sl_notificar(agId, estado, motivo) {
    try {
        var a = sl_ags.find(function(x) { return x.id === agId; });
        await sb('notificacoes', {
            method: 'POST',
            body: JSON.stringify({
                tipo:            'agendamento_sala',
                referencia_id:   agId,
                destinatario_id: a?.solicitante_id || null,
                titulo:          estado === 'aprovado' ? 'Agendamento aprovado' : 'Agendamento recusado',
                mensagem:        estado === 'aprovado'
                    ? 'O teu pedido de sala foi aprovado.'
                    : 'O teu pedido de sala foi recusado.' + (motivo ? ' Motivo: ' + motivo : ''),
                lida: false,
            }),
        });
    } catch(_) { /* tabela notificacoes pode nao existir */ }
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function sl_fr(label, val) {
    return '<div class="sl-field-row"><span class="sl-field-label">' + label + '</span><span class="sl-field-val">' + val + '</span></div>';
}
function sl_esc(s) {
    return (s || '').toString().replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function sl_fmtData(d) {
    if (!d) return '—';
    try { return new Date(d).toLocaleDateString('pt-PT', {day:'2-digit',month:'short',year:'numeric'}); } catch(_) { return d; }
}
function sl_fmtHora(d) {
    if (!d) return '—';
    try { return new Date(d).toLocaleTimeString('pt-PT', {hour:'2-digit',minute:'2-digit'}); } catch(_) { return d; }
}
function sl_fmtDataHora(d) {
    if (!d) return '—';
    try { return new Date(d).toLocaleDateString('pt-PT', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); } catch(_) { return d; }
}
function sl_showMsg(tipo, txt) {
    var el = document.getElementById('sl-msg');
    if (!el) return;
    el.textContent = txt;
    el.className = 'sl-msg ' + tipo;
    if (tipo === 'success') setTimeout(function() { if (el) el.className = 'sl-msg'; }, 3000);
}

// ── EXPOSE ────────────────────────────────────────────────────────────────────
window.sl_init         = sl_init;
window.sl_setTab       = sl_setTab;
window.sl_filtrar      = sl_filtrar;
window.sl_selecionar   = sl_selecionar;
window.sl_selecionarAg = sl_selecionarAg;
window.sl_novaSala     = sl_novaSala;
window.sl_editar       = sl_editar;
window.sl_cancelar     = sl_cancelar;
window.sl_guardar      = sl_guardar;
window.sl_toggleAtivo  = sl_toggleAtivo;
window.sl_aprovar      = sl_aprovar;
window.sl_rejeitar     = sl_rejeitar;

sl_init();
</script>
