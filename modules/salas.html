<style>
    /* ══════════════════════════════════════════════════════
       SALAS MODULE
       ══════════════════════════════════════════════════════ */

    .sl-wrap {
        display: flex;
        height: 100%;
        min-height: 0;
        overflow: hidden;
        font-family: var(--font-body);
    }

    /* ── SIDEBAR ─────────────────────────────────────────── */
    .sl-side {
        width: 280px;
        flex-shrink: 0;
        border-right: 1px solid var(--border);
        background: var(--bg-card);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .sl-side-header {
        padding: 14px 12px 10px;
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .sl-side-title {
        font-family: var(--font-title);
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-faint);
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .sl-side-count {
        font-size: 11px;
        font-weight: 700;
        color: var(--primary-dark);
    }

    .sl-tabs {
        display: flex;
        gap: 4px;
    }

    .sl-tab {
        flex: 1;
        padding: 7px 0;
        text-align: center;
        font-size: 11px;
        font-family: var(--font-title);
        letter-spacing: 0.5px;
        color: var(--text-faint);
        cursor: pointer;
        border-radius: 8px;
        border: 1px solid transparent;
        transition: all 0.12s;
        position: relative;
        white-space: nowrap;
    }

    .sl-tab:hover {
        background: var(--primary-faint);
        color: var(--primary-dark);
    }

    .sl-tab.active {
        background: var(--primary-faint);
        color: var(--primary-dark);
        border-color: var(--primary);
        font-weight: 700;
    }

    .sl-tab-badge {
        position: absolute;
        top: -5px;
        right: -5px;
        background: #e74c3c;
        color: #fff;
        border-radius: 10px;
        font-size: 9px;
        font-weight: 700;
        min-width: 16px;
        height: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 4px;
        line-height: 1;
    }

    .sl-search-wrap {
        position: relative;
    }

    .sl-search-icon {
        position: absolute;
        left: 9px;
        top: 50%;
        transform: translateY(-50%);
        width: 13px;
        height: 13px;
        color: var(--text-faint);
        pointer-events: none;
    }

    .sl-search {
        width: 100%;
        padding: 7px 10px 7px 28px;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 12px;
        font-family: var(--font-body);
        color: var(--text-main);
        outline: none;
        box-sizing: border-box;
        transition: border-color 0.2s;
    }

    .sl-search:focus {
        border-color: var(--primary);
    }

    .sl-list {
        flex: 1;
        overflow-y: auto;
    }

    /* ── SALA ITEM (sidebar) ──────────────────────────────── */
    .sl-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 12px;
        cursor: pointer;
        border-bottom: 1px solid var(--border);
        border-left: 3px solid transparent;
        transition: background 0.1s;
    }

    .sl-item:hover {
        background: var(--primary-faint);
    }

    .sl-item.active {
        background: var(--primary-faint);
        border-left-color: var(--primary);
    }

    .sl-item-thumb {
        width: 42px;
        height: 42px;
        border-radius: 8px;
        object-fit: cover;
        flex-shrink: 0;
        background: var(--bg-input);
        border: 1px solid var(--border);
    }

    .sl-item-thumb-placeholder {
        width: 42px;
        height: 42px;
        border-radius: 8px;
        flex-shrink: 0;
        background: var(--primary-faint);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .sl-item-thumb-placeholder svg {
        width: 20px;
        height: 20px;
        color: var(--primary-dark);
        opacity: 0.5;
    }

    .sl-item-info {
        flex: 1;
        min-width: 0;
    }

    .sl-item-nome {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-main);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .sl-item-sub {
        font-size: 11px;
        color: var(--text-faint);
        margin-top: 2px;
    }

    .sl-item-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
    }

    .sl-item-dot.on {
        background: #2ecc71;
    }

    .sl-item-dot.off {
        background: var(--border);
    }

    /* ── PENDING SIDEBAR ITEM ────────────────────────────── */
    .sl-pend-item {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        border-left: 3px solid #e74c3c;
        cursor: pointer;
        transition: background 0.1s;
    }

    .sl-pend-item:hover {
        background: rgba(231, 76, 60, 0.05);
    }

    .sl-pend-item.active {
        background: rgba(231, 76, 60, 0.08);
    }

    .sl-pend-nome {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-main);
    }

    .sl-pend-sub {
        font-size: 11px;
        color: var(--text-faint);
        margin-top: 2px;
    }

    /* ── PAINEL DIREITO ──────────────────────────────────── */
    .sl-panel {
        flex: 1;
        overflow-y: auto;
        background: var(--bg-main);
    }

    .sl-empty {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--text-faint);
        gap: 10px;
    }

    .sl-empty svg {
        width: 44px;
        height: 44px;
        opacity: 0.25;
    }

    .sl-empty-txt {
        font-size: 13px;
    }

    /* ── FOTO HEADER (VIEW) ──────────────────────────────── */
    .sl-foto-header {
        position: relative;
        height: 240px;
        overflow: hidden;
        background: var(--bg-input);
        flex-shrink: 0;
    }

    .sl-foto-header img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.3s ease;
    }

    .sl-foto-header:hover img {
        transform: scale(1.02);
    }

    .sl-foto-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--primary-faint);
    }

    .sl-foto-placeholder svg {
        width: 48px;
        height: 48px;
        color: var(--primary-dark);
        opacity: 0.3;
    }

    .sl-foto-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 60px 20px 18px;
        background: linear-gradient(to top, rgba(2, 22, 30, 0.85) 0%, rgba(2, 22, 30, 0.3) 60%, transparent 100%);
    }

    .sl-foto-nome {
        font-size: 22px;
        font-weight: 700;
        color: #fff;
        text-shadow: 0 1px 6px rgba(0, 0, 0, 0.5);
        font-family: var(--font-title);
        letter-spacing: 0.5px;
    }

    .sl-foto-sub {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.75);
        margin-top: 4px;
    }

    .sl-foto-badges {
        display: flex;
        gap: 6px;
        margin-top: 8px;
    }

    .sl-foto-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 9px;
        border-radius: 20px;
        font-size: 10px;
        font-family: var(--font-title);
        letter-spacing: 0.5px;
        backdrop-filter: blur(4px);
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .sl-foto-badge.ativo {
        background: rgba(46, 204, 113, 0.25);
        color: #7effc1;
    }

    .sl-foto-badge.inativo {
        background: rgba(150, 150, 150, 0.25);
        color: #ccc;
    }

    .sl-foto-badge.cap {
        background: rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.85);
    }

    .sl-foto-actions {
        position: absolute;
        top: 12px;
        right: 12px;
        display: flex;
        gap: 6px;
    }

    /* ── PANEL BODY ──────────────────────────────────────── */
    .sl-panel-body {
        padding: 18px 20px;
    }

    /* ── DATA CARD ───────────────────────────────────────── */
    .sl-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px 16px;
        margin-bottom: 12px;
    }

    .sl-card-title {
        font-family: var(--font-title);
        font-size: 9px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-faint);
        margin-bottom: 10px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
    }

    .sl-field-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 6px 0;
        border-bottom: 1px solid var(--border);
        gap: 12px;
        font-size: 13px;
    }

    .sl-field-row:last-child {
        border-bottom: none;
    }

    .sl-field-label {
        color: var(--text-faint);
        font-size: 12px;
        flex-shrink: 0;
    }

    .sl-field-val {
        color: var(--text-main);
        font-weight: 500;
        text-align: right;
        line-height: 1.4;
    }

    /* ── EQUIPAMENTOS ────────────────────────────────────── */
    .sl-equip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        padding: 8px 0;
    }

    .sl-equip-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-family: var(--font-title);
        letter-spacing: 0.3px;
    }

    .sl-equip-chip.on {
        background: rgba(46, 125, 50, 0.1);
        color: #2e7d32;
        border: 1px solid rgba(46, 125, 50, 0.3);
    }

    .sl-equip-chip.off {
        background: var(--bg-input);
        color: var(--text-faint);
        border: 1px solid var(--border);
        text-decoration: line-through;
        opacity: 0.5;
    }

    /* ── AGENDAMENTO ITEM ────────────────────────────────── */
    .sl-ag-item {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
    }

    .sl-ag-item:last-child {
        border-bottom: none;
    }

    .sl-ag-titulo {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-main);
    }

    .sl-ag-sub {
        font-size: 11px;
        color: var(--text-faint);
        margin-top: 2px;
        line-height: 1.5;
    }

    .sl-ag-status {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 20px;
        font-size: 10px;
        font-family: var(--font-title);
        letter-spacing: 0.3px;
        white-space: nowrap;
        flex-shrink: 0;
    }

    .sl-ag-status.aprovado {
        background: rgba(46, 125, 50, 0.1);
        color: #2e7d32;
        border: 1px solid rgba(46, 125, 50, 0.3);
    }

    .sl-ag-status.pendente {
        background: rgba(230, 126, 34, 0.1);
        color: #e67e22;
        border: 1px solid rgba(230, 126, 34, 0.3);
    }

    .sl-ag-status.recusado {
        background: rgba(192, 57, 43, 0.1);
        color: #c0392b;
        border: 1px solid rgba(192, 57, 43, 0.3);
    }

    /* ── APROVACAO PAINEL ────────────────────────────────── */
    .sl-aprov-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-left: 4px solid #e67e22;
        border-radius: 12px;
        padding: 16px 18px;
        margin-bottom: 12px;
    }

    .sl-aprov-titulo {
        font-size: 15px;
        font-weight: 700;
        color: var(--text-main);
        margin-bottom: 10px;
    }

    .sl-aprov-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
    }

    /* ── FORMULARIO ──────────────────────────────────────── */
    .sl-form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    .sl-form-full {
        grid-column: 1 / -1;
    }

    .sl-flabel {
        font-size: 10px;
        font-family: var(--font-title);
        letter-spacing: 1px;
        color: var(--text-faint);
        margin-bottom: 4px;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .sl-input, .sl-select, .sl-textarea {
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 13px;
        font-family: var(--font-body);
        color: var(--text-main);
        outline: none;
        transition: border-color 0.2s;
        box-sizing: border-box;
        width: 100%;
    }

    .sl-input:focus, .sl-select:focus, .sl-textarea:focus {
        border-color: var(--primary);
    }

    .sl-textarea {
        height: 72px;
        resize: vertical;
    }

    .sl-check-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--text-main);
        cursor: pointer;
    }

    /* ── FOTO PICKER (FORM) ──────────────────────────────── */
    .sl-foto-picker-wrap {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .sl-foto-picker-preview {
        width: 100%;
        height: 160px;
        border-radius: 10px;
        border: 1px dashed var(--border);
        background: var(--bg-input);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
        transition: border-color 0.2s;
    }

    .sl-foto-picker-preview:hover {
        border-color: var(--primary);
    }

    .sl-foto-picker-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 10px;
        display: block;
    }

    .sl-foto-picker-preview .sl-fp-placeholder {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        color: var(--text-faint);
        font-size: 12px;
        pointer-events: none;
    }

    .sl-foto-picker-preview .sl-fp-placeholder svg {
        width: 32px;
        height: 32px;
        opacity: 0.4;
    }

    .sl-foto-picker-overlay {
        position: absolute;
        bottom: 6px;
        right: 6px;
        display: flex;
        gap: 4px;
    }

    .sl-fp-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 5px 12px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--bg-card);
        font-size: 11px;
        font-family: var(--font-title);
        letter-spacing: 0.3px;
        color: var(--text-muted);
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
    }

    .sl-fp-btn:hover {
        border-color: var(--primary);
        color: var(--primary-dark);
        background: var(--primary-faint);
    }

    .sl-fp-btn svg {
        width: 12px;
        height: 12px;
        flex-shrink: 0;
    }

    .sl-foto-picker-btns {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
    }

    .sl-foto-status {
        font-size: 11px;
        padding: 5px 10px;
        border-radius: 6px;
        display: none;
    }

    .sl-foto-status.uploading {
        display: block;
        color: var(--primary-dark);
        background: var(--primary-faint);
    }

    .sl-foto-status.ok {
        display: block;
        color: #2e7d32;
        background: rgba(46, 125, 50, 0.08);
    }

    .sl-foto-status.err {
        display: block;
        color: #c0392b;
        background: rgba(192, 57, 43, 0.08);
    }

    .sl-foto-url-toggle {
        font-size: 11px;
        color: var(--primary-dark);
        cursor: pointer;
        text-decoration: underline;
        display: inline-block;
        margin-top: 2px;
    }

    /* ── ESPACOS MANAGER ─────────────────────────────────── */
    .sl-espaco-label-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 4px;
    }

    .sl-espaco-gear {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--bg-input);
        font-size: 10px;
        font-family: var(--font-title);
        color: var(--text-faint);
        cursor: pointer;
        transition: all 0.12s;
    }

    .sl-espaco-gear:hover {
        border-color: var(--primary);
        color: var(--primary-dark);
        background: var(--primary-faint);
    }

    .sl-espacos-mgr {
        margin-top: 8px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        display: none;
        flex-direction: column;
        gap: 6px;
        animation: sl-fadein 0.15s ease;
    }

    .sl-espacos-mgr.open {
        display: flex;
    }

    @keyframes sl-fadein {
        from {
            opacity: 0;
            transform: translateY(-4px);
        }
        to {
            opacity: 1;
            transform: none;
        }
    }

    .sl-espacos-mgr-title {
        font-size: 10px;
        font-family: var(--font-title);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--text-faint);
        margin-bottom: 4px;
    }

    .sl-espacos-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .sl-espaco-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 5px 8px;
        border-radius: 6px;
        background: var(--bg-input);
        border: 1px solid var(--border);
        font-size: 12px;
        color: var(--text-main);
        gap: 8px;
    }

    .sl-espaco-del {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-faint);
        font-size: 14px;
        line-height: 1;
        padding: 0 2px;
        border-radius: 4px;
        transition: all 0.12s;
        flex-shrink: 0;
    }

    .sl-espaco-del:hover {
        background: rgba(192, 57, 43, 0.1);
        color: #c0392b;
    }

    .sl-espaco-add-row {
        display: flex;
        gap: 6px;
        margin-top: 2px;
    }

    .sl-espaco-add-input {
        flex: 1;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 12px;
        font-family: var(--font-body);
        color: var(--text-main);
        outline: none;
        transition: border-color 0.2s;
    }

    .sl-espaco-add-input:focus {
        border-color: var(--primary);
    }

    .sl-espaco-reset {
        font-size: 10px;
        color: var(--text-faint);
        cursor: pointer;
        text-align: right;
        text-decoration: underline;
        margin-top: 4px;
        display: block;
    }

    .sl-espaco-reset:hover {
        color: var(--text-muted);
    }

    /* ── BOTOES ──────────────────────────────────────────── */
    .sl-btn {
        padding: 7px 16px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--bg-input);
        font-size: 11px;
        font-family: var(--font-title);
        letter-spacing: 0.5px;
        color: var(--text-muted);
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
    }

    .sl-btn:hover {
        border-color: var(--primary);
        color: var(--primary-dark);
        background: var(--primary-faint);
    }

    .sl-btn.primary {
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
    }

    .sl-btn.primary:hover {
        background: var(--primary-dark);
    }

    .sl-btn.approve {
        background: rgba(46, 125, 50, 0.1);
        border-color: rgba(46, 125, 50, 0.4);
        color: #2e7d32;
    }

    .sl-btn.approve:hover {
        background: rgba(46, 125, 50, 0.18);
    }

    .sl-btn.danger {
        border-color: rgba(192, 57, 43, 0.3);
        color: #c0392b;
    }

    .sl-btn.danger:hover {
        background: rgba(192, 57, 43, 0.08);
    }

    .sl-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
    }

    .sl-btn-row {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 14px;
    }

    .sl-photo-btn {
        padding: 5px 12px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.4);
        background: rgba(0, 0, 0, 0.3);
        font-size: 10px;
        font-family: var(--font-title);
        letter-spacing: 0.5px;
        color: #fff;
        cursor: pointer;
        backdrop-filter: blur(4px);
        transition: all 0.15s;
    }

    .sl-photo-btn:hover {
        background: rgba(0, 0, 0, 0.5);
    }

    /* ── MSG ─────────────────────────────────────────────── */
    .sl-msg {
        font-size: 12px;
        padding: 7px 12px;
        border-radius: 8px;
        margin-bottom: 10px;
        display: none;
    }

    .sl-msg.success {

<script>
    // ══════════════════════════════════════════════════════════════════════════════
    // SALAS MODULE
    // ══════════════════════════════════════════════════════════════════════════════

    var sl_salas = [];
    var sl_ags = [];
    var sl_activoId = null;
    var sl_activoAgId = null;
    var sl_editMode = false;
    var sl_isNovo = false;
    var sl_tab = 'salas';
    var sl_editSerie = false;


    // Foto state temporário durante edição
    var sl_fotoFile = null;   // File object seleccionado
    var sl_fotoBase64 = null;   // base64 para preview local

    // ── ESPACOS (localStorage) ────────────────────────────────────────────────────
    var SL_ESPACOS_KEY = 'zion_salas_espacos';
    var SL_ESPACOS_DEFAULT = ['Salao Principal', 'Lumen', 'Escritorios', 'Sala Externa', 'Outro'];
    var sl_recDiasSelected = new Set();


    function sl_getEspacos() {
        try {
            var s = localStorage.getItem(SL_ESPACOS_KEY);
            if (s) return JSON.parse(s);
        } catch (_) {
        }
        return SL_ESPACOS_DEFAULT.slice();
    }

    function sl_setEspacos(list) {
        localStorage.setItem(SL_ESPACOS_KEY, JSON.stringify(list));
    }

    window.sl_toggleEspacosMgr = function () {
        var mgr = document.getElementById('sl-espacos-mgr');
        if (!mgr) return;
        mgr.classList.toggle('open');
        if (mgr.classList.contains('open')) sl_renderEspacosMgr();
    };

    function sl_renderEspacosMgr() {
        var mgr = document.getElementById('sl-espacos-mgr');
        if (!mgr) return;
        var list = sl_getEspacos();
        var sel = document.getElementById('slf-espaco');
        var curVal = sel ? sel.value : '';

        mgr.innerHTML =
            '<div class="sl-espacos-mgr-title">Gerir Lista de Espaços</div>' +
            '<div class="sl-espacos-list" id="sl-espacos-list">' +
            list.map(function (e, i) {
                return '<div class="sl-espaco-item">' +
                    '<span>' + sl_esc(e) + '</span>' +
                    '<button class="sl-espaco-del" onclick="sl_removeEspaco(' + i + ')" title="Remover">×</button>' +
                    '</div>';
            }).join('') +
            '</div>' +
            '<div class="sl-espaco-add-row">' +
            '<input class="sl-espaco-add-input" id="sl-espaco-add-input" placeholder="Novo espaço..." ' +
            'onkeydown="if(event.key===\'Enter\')sl_addEspaco()">' +
            '<button class="sl-btn primary" style="padding:5px 12px;font-size:11px" onclick="sl_addEspaco()">Adicionar</button>' +
            '</div>' +
            '<span class="sl-espaco-reset" onclick="sl_resetEspacos()">Repor predefinições</span>';
    }

    window.sl_addEspaco = function () {
        var inp = document.getElementById('sl-espaco-add-input');
        if (!inp) return;
        var val = inp.value.trim();
        if (!val) return;
        var list = sl_getEspacos();
        if (list.indexOf(val) !== -1) {
            inp.focus();
            return;
        }
        list.push(val);
        sl_setEspacos(list);
        inp.value = '';
        sl_renderEspacosMgr();
        sl_refreshEspacoSelect(val);
    };

    window.sl_removeEspaco = function (idx) {
        var list = sl_getEspacos();
        list.splice(idx, 1);
        sl_setEspacos(list);
        sl_renderEspacosMgr();
        sl_refreshEspacoSelect();
    };

    window.sl_resetEspacos = function () {
        if (!confirm('Repor a lista de espaços para os valores predefinidos?')) return;
        localStorage.removeItem(SL_ESPACOS_KEY);
        sl_renderEspacosMgr();
        sl_refreshEspacoSelect();
    };

    function sl_refreshEspacoSelect(selectVal) {
        var sel = document.getElementById('slf-espaco');
        if (!sel) return;
        var cur = selectVal || sel.value;
        var list = sl_getEspacos();
        sel.innerHTML = '<option value="">—</option>' +
            list.map(function (e) {
                return '<option' + (cur === e ? ' selected' : '') + '>' + sl_esc(e) + '</option>';
            }).join('');
    }

    // ── FOTO UPLOAD ───────────────────────────────────────────────────────────────
    window.sl_onFotoChange = function (input) {
        var file = input.files && input.files[0];
        if (!file) return;
        sl_fotoFile = file;
        // Preview imediato
        var reader = new FileReader();
        reader.onload = function (e) {
            sl_fotoBase64 = e.target.result;
            sl_setFotoPreview(sl_fotoBase64, file.name);
        };
        reader.readAsDataURL(file);
    };

    function sl_setFotoPreview(src, label) {
        var preview = document.getElementById('slf-foto-preview');
        if (!preview) return;
        preview.innerHTML =
            '<img src="' + src + '" alt="Preview">' +
            '<div class="sl-foto-picker-overlay">' +
            '<button class="sl-fp-btn" onclick="document.getElementById(\'slf-foto-galeria\').click()">' +
            '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>' +
            'Trocar</button>' +
            '</div>';
        var status = document.getElementById('slf-foto-status');
        if (status && label) {
            status.className = 'sl-foto-status ok';
            status.textContent = '✓ ' + label + ' — foto pronta para guardar';
        }
    }

    async function sl_uploadFoto(salaId) {
        if (!sl_fotoFile) return null;
        var statusEl = document.getElementById('slf-foto-status');
        if (statusEl) {
            statusEl.className = 'sl-foto-status uploading';
            statusEl.textContent = 'A fazer upload...';
        }

        try {
            // Tenta via Supabase JS client (window.supabase)
            if (window.supabase && window.supabase.storage) {
                var ext = sl_fotoFile.name.split('.').pop() || 'jpg';
                var path = 'sala-' + (salaId || 'nova') + '-' + Date.now() + '.' + ext;
                var uploadResult = await window.supabase.storage
                    .from('salas-fotos')
                    .upload(path, sl_fotoFile, {upsert: true, contentType: sl_fotoFile.type});
                if (uploadResult.error) throw uploadResult.error;
                var urlResult = window.supabase.storage.from('salas-fotos').getPublicUrl(path);
                var url = urlResult.data && urlResult.data.publicUrl;
                if (statusEl) {
                    statusEl.className = 'sl-foto-status ok';
                    statusEl.textContent = '✓ Upload concluído';
                }
                sl_fotoFile = null;
                sl_fotoBase64 = null;
                return url;
            }
        } catch (e) {
            console.warn('sl_uploadFoto supabase.storage falhou:', e);
        }

        // Fallback: avisar utilizador que precisa de criar o bucket "salas-fotos"
        if (statusEl) {
            statusEl.className = 'sl-foto-status err';
            statusEl.textContent = '⚠ Bucket "salas-fotos" não encontrado. Cria-o no Supabase Storage e tenta de novo.';
        }
        // Retorna null, a URL que o utilizador escreveu manualmente fica intacta
        return null;
    }

    // ── INIT ──────────────────────────────────────────────────────────────────────
    async function sl_init() {
        try {
            var res = await Promise.all([
                sb('salas?select=*&order=nome').catch(function () { return []; }),
                sb('sala_agendamentos?select=*&order=data_inicio.desc').catch(function () { return []; }),
                sb('eventos?select=id,titulo,data_inicio,data_fim,descricao&ativo=eq.true').catch(function () { return []; }),
            ]);

            sl_salas = res[0] || [];
            sl_ags   = res[1] || [];

            // Mapear eventos directamente — sem sala, cor roxa
            var eventosMapped = (res[2] || []).map(function(e) {
                return {
                    id:               'ev_' + e.id,
                    _evento_id:       e.id,
                    sala_id:          null,
                    titulo:           e.titulo,
                    data_inicio:      e.data_inicio,
                    data_fim:         e.data_fim || e.data_inicio,
                    status:           'aprovado',
                    solicitante_nome: null,
                    descricao:        e.descricao || null,
                    _tipo:            'evento',
                };
            });

            sl_ags = sl_ags.concat(eventosMapped);

            sl_renderList();
            sl_updateBadge();
        } catch (e) {
            console.error('sl_init:', e);
        }
    }

    // ── BADGE ─────────────────────────────────────────────────────────────────────
    function sl_updateBadge() {
        var n = sl_ags.filter(function (a) {
            return a.status === 'pendente';
        }).length;
        var badge = document.getElementById('sl-badge-aprovacoes');
        if (badge) {
            badge.textContent = n;
            badge.style.display = n ? 'flex' : 'none';
        }
        var menuBadge = document.querySelector('[data-secao="salas"] .nav-badge');
        if (menuBadge) {
            menuBadge.textContent = n;
            menuBadge.style.display = n ? 'flex' : 'none';
        }
        window.sl_badgeCount = n;
    }

    // ── TABS ──────────────────────────────────────────────────────────────────────
    window.sl_setTab = function (tab) {
        sl_tab = tab;
        sl_activoId = null;
        sl_activoAgId = null;
        sl_editMode = false;
        sl_isNovo = false;
        sl_fotoFile = null;
        sl_fotoBase64 = null;
        document.getElementById('sl-tab-salas')?.classList.toggle('active', tab === 'salas');
        document.getElementById('sl-tab-aprovacoes')?.classList.toggle('active', tab === 'aprovacoes');
        document.getElementById('sl-tab-agenda')?.classList.toggle('active', tab === 'agenda');
        var sw = document.getElementById('sl-search-wrap');
        if (sw) sw.style.display = tab === 'salas' ? '' : 'none';
        sl_renderList();
        if (tab === 'agenda') sl_renderAgenda();
        else sl_showEmpty();
    };

    // ── RENDER LISTA ──────────────────────────────────────────────────────────────
    function sl_renderList() {
        var list = document.getElementById('sl-list');
        var count = document.getElementById('sl-count');
        if (!list) return;

        if (sl_tab === 'aprovacoes') {
            sl_renderListAprovacoes(list, count);
            return;
        }

        var q = (document.getElementById('sl-search')?.value || '').toLowerCase();
        var lista = sl_salas.filter(function (s) {
            if (!q) return true;
            return (s.nome || '').toLowerCase().includes(q) || (s.espaco || '').toLowerCase().includes(q);
        });

        if (count) count.textContent = lista.length;

        if (!lista.length) {
            list.innerHTML = '<div style="padding:20px;color:var(--text-faint);font-size:12px;text-align:center">' +
                (q ? 'Nenhuma sala encontrada.' : 'Nenhuma sala registada.') + '</div>';
            return;
        }

        list.innerHTML = lista.map(function (s) {
            var ativa = sl_activoId === s.id;
            var dotCls = s.ativo !== false ? 'on' : 'off';
            var thumb = s.foto_url
                ? '<img class="sl-item-thumb" src="' + s.foto_url + '" alt="" onerror="this.style.display=\'none\'">'
                : '<div class="sl-item-thumb-placeholder"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></div>';
            var sub = [s.espaco, s.capacidade ? s.capacidade + ' lug.' : null].filter(Boolean).join(' · ');
            return '<div class="sl-item' + (ativa ? ' active' : '') + '" onclick="sl_selecionar(\'' + s.id + '\')">' +
                thumb +
                '<div class="sl-item-info">' +
                '<div class="sl-item-nome">' + (s.nome || '—') + '</div>' +
                '<div class="sl-item-sub">' + (sub || '—') + '</div>' +
                '</div>' +
                '<div class="sl-item-dot ' + dotCls + '"></div>' +
                '</div>';
        }).join('');
    }

    function sl_renderListAprovacoes(list, count) {
        var pendentes = sl_ags.filter(function (a) {
            return a.status === 'pendente';
        });
        if (count) count.textContent = pendentes.length;
        if (!pendentes.length) {
            list.innerHTML = '<div style="padding:20px;color:var(--text-faint);font-size:12px;text-align:center">Nenhum pedido pendente.</div>';
            return;
        }
        list.innerHTML = pendentes.map(function (a) {
            var ativa = sl_activoAgId === a.id;
            var sala = sl_salas.find(function (s) {
                return s.id === a.sala_id;
            });
            return '<div class="sl-pend-item' + (ativa ? ' active' : '') + '" onclick="sl_selecionarAg(\'' + a.id + '\')">' +
                '<div class="sl-pend-nome">' + (a.titulo || 'Pedido de sala') + '</div>' +
                '<div class="sl-pend-sub">' + (sala ? sala.nome : '—') + ' · ' + sl_fmtData(a.data_inicio) + '</div>' +
                '<div class="sl-pend-sub">' + (a.solicitante_nome || '') + '</div>' +
                '</div>';
        }).join('');
    }

    // ── SELECIONAR ────────────────────────────────────────────────────────────────
    window.sl_selecionar = function (id) {
        sl_activoId = id;
        sl_editMode = false;
        sl_isNovo = false;
        sl_fotoFile = null;
        sl_fotoBase64 = null;
        sl_renderList();
        sl_renderView();
    };

    window.sl_selecionarAg = function (id) {
        sl_activoAgId = id;
        sl_renderList();
        sl_renderAprovacaoView(id);
    };

    window.sl_filtrar = function () {
        sl_renderList();
    };

    window.sl_novaSala = function () {
        sl_activoId = null;
        sl_editMode = true;
        sl_isNovo = true;
        sl_fotoFile = null;
        sl_fotoBase64 = null;
        sl_tab = 'salas';
        document.getElementById('sl-tab-salas')?.classList.add('active');
        document.getElementById('sl-tab-aprovacoes')?.classList.remove('active');
        sl_renderList();
        sl_renderForm(null);
    };

            return fv(k, d) === true ? ' checked' : '';

            ? '<img src="' + (sl_fotoBase64 || sl_esc(currentUrl)) + '" alt="Foto da sala">' +
            '<div class="sl-foto-picker-overlay">' +
            '<button class="sl-fp-btn" onclick="document.getElementById(\'slf-foto-galeria\').click()">' +
            '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>' +

            '<span>Sem foto</span>' +
            '</div>';

        var statusText = sl_fotoFile ? '✓ ' + sl_fotoFile.name + ' — pronto para upload' : '';
        var statusCls = sl_fotoFile ? 'sl-foto-status ok' : 'sl-foto-status';

        sl_showContent(
            '<div style="background:var(--bg-card);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px">' +
            '<div>' +
            '<div style="font-size:16px;font-weight:700;color:var(--text-main)">' + (sl_isNovo ? 'Nova Sala' : 'Editar — ' + sl_esc(s.nome || '')) + '</div>' +

    // Mostrar/esconder input de URL no formulário
    window.sl_toggleUrlInput = function () {
        var wrap = document.getElementById('sl-foto-url-wrap');
        if (!wrap) return;
        wrap.style.display = wrap.style.display === 'none' ? 'block' : 'none';
    };

    // Quando o utilizador escreve um URL manualmente — atualizar preview
    window.sl_onUrlInput = function (input) {
        var url = input.value.trim();
        var preview = document.getElementById('slf-foto-preview');
        if (!preview) return;
        if (!url) {
            preview.innerHTML = '<div class="sl-fp-placeholder"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>Sem foto</span></div>';
            return;
        }
        // Testar se a URL carrega
        var img = new Image();
        img.onload = function () {
            sl_fotoFile = null;
            sl_fotoBase64 = null;
            sl_setFotoPreview(url, '');
        };
        img.onerror = function () {
            var status = document.getElementById('slf-foto-status');
            if (status) {
                status.className = 'sl-foto-status err';
                status.textContent = 'Não foi possível carregar esta imagem.';
            }
        };
        img.src = url;
    };

    // ── ACOES SALA ────────────────────────────────────────────────────────────────
    window.sl_editar = function () {
        sl_editMode = true;
        sl_fotoFile = null;
        sl_fotoBase64 = null;
        sl_renderForm(sl_activoId);
    };

    window.sl_cancelar = function () {
        sl_fotoFile = null;
        sl_fotoBase64 = null;
        if (sl_isNovo) {
            sl_isNovo = false;
            sl_activoId = null;
            sl_showEmpty();
            return;
        }
        sl_editMode = false;
        sl_renderView();
    };

    window.sl_guardar = async function (id) {
        var nome = document.getElementById('slf-nome')?.value?.trim();
        if (!nome) {
            sl_showMsg('error', 'Nome obrigatorio.');
            return;
        }

        var btn = document.getElementById('sl-btn-guardar');
        if (btn) {
            btn.disabled = true;
            btn.textContent = 'A guardar...';
        }

        // 1. Upload foto se ficheiro seleccionado
        var fotoUrl = document.getElementById('slf-foto_url')?.value?.trim() || null;
        if (sl_fotoFile) {
            var uploadedUrl = await sl_uploadFoto(id || null);
            if (uploadedUrl) fotoUrl = uploadedUrl;
            // Se upload falhou mas temos base64, manter URL anterior (não sobrescrever)
        }

        var dados = {
            nome: nome,
            espaco: document.getElementById('slf-espaco')?.value || null,
            capacidade: parseInt(document.getElementById('slf-capacidade')?.value) || null,
            hora_inicio: document.getElementById('slf-hora_inicio')?.value || null,
            hora_fim: document.getElementById('slf-hora_fim')?.value || null,
            descricao: document.getElementById('slf-descricao')?.value?.trim() || null,
            foto_url: fotoUrl,
            aviso_entrega: document.getElementById('slf-aviso_entrega')?.value?.trim() || null,
            tem_som: document.getElementById('slf-tem_som')?.checked ?? false,
            tem_iluminacao: document.getElementById('slf-tem_iluminacao')?.checked ?? false,
            tem_projecao: document.getElementById('slf-tem_projecao')?.checked ?? false,
            tem_televisao: document.getElementById('slf-tem_televisao')?.checked ?? false,
            tem_mesas: document.getElementById('slf-tem_mesas')?.checked ?? false,
            tem_cadeiras: document.getElementById('slf-tem_cadeiras')?.checked ?? false,
            ativo: document.getElementById('slf-ativo')?.checked ?? true,
        };

        try {
            if (id) {
                await sb('salas?id=eq.' + id, {method: 'PATCH', body: JSON.stringify(dados)});
            } else {
                var res = await sb('salas', {
                    method: 'POST',
                    headers: {Prefer: 'return=representation'},
                    body: JSON.stringify(dados),
                });
                if (res && res[0]) sl_activoId = res[0].id;
            }
            sl_salas = await sb('salas?select=*&order=nome').catch(function () {
                return sl_salas;
            });
            sl_editMode = false;
            sl_isNovo = false;
            sl_fotoFile = null;
            sl_fotoBase64 = null;
            if (!sl_activoId && id) sl_activoId = id;
            sl_renderList();
            sl_renderView();
        } catch (e) {
            sl_showMsg('error', 'Erro: ' + (e?.message || JSON.stringify(e)));
            if (btn) {
                btn.disabled = false;
                btn.textContent = 'Guardar';
            }
        }
    };

    window.sl_toggleAtivo = async function (id) {
        var s = sl_salas.find(function (x) {
            return x.id === id;
        });
        if (!s) return;
        var novoEstado = s.ativo === false;
        if (!confirm((novoEstado ? 'Ativar' : 'Desativar') + ' esta sala?')) return;
        try {
            await sb('salas?id=eq.' + id, {method: 'PATCH', body: JSON.stringify({ativo: novoEstado})});
            s.ativo = novoEstado;
            sl_renderList();
            sl_renderView();
        } catch (e) {
            alert('Erro: ' + (e?.message || e));
        }
    };

    // ── APROVACOES ────────────────────────────────────────────────────────────────
    window.sl_aprovar = async function (id) {
        if (!confirm('Aprovar este agendamento?')) return;
        try {
            var userId = localStorage.getItem('zion_id') || null;
            await sb('sala_agendamentos?id=eq.' + id, {
                method: 'PATCH',
                body: JSON.stringify({status: 'aprovado', aprovado_por: userId, aprovado_em: new Date().toISOString()}),
            });
            await sl_notificar(id, 'aprovado', null);
            await sl_reloadAgs();
            sl_updateBadge();
            sl_renderList();
            if (sl_tab === 'aprovacoes' && sl_activoAgId === id) sl_showEmpty();
            else if (sl_activoId) sl_renderView();
        } catch (e) {
            alert('Erro ao aprovar: ' + (e?.message || e));
        }
    };

    window.sl_rejeitar = async function (id) {
        var motivo = prompt('Motivo da recusa (opcional):');
        if (motivo === null) return;
        try {
            var userId = localStorage.getItem('zion_id') || null;
            await sb('sala_agendamentos?id=eq.' + id, {
                method: 'PATCH',
                body: JSON.stringify({
                    status: 'recusado',
                    aprovado_por: userId,
                    aprovado_em: new Date().toISOString(),
                    motivo_recusa: motivo || null
                }),
            });
            await sl_notificar(id, 'recusado', motivo);
            await sl_reloadAgs();
            sl_updateBadge();
            sl_renderList();
            if (sl_tab === 'aprovacoes' && sl_activoAgId === id) sl_showEmpty();
            else if (sl_activoId) sl_renderView();
        } catch (e) {
            alert('Erro ao recusar: ' + (e?.message || e));
        }
    };

    async function sl_reloadAgs() {
        var rawAgs = await sb('sala_agendamentos?select=*&order=data_inicio.desc').catch(function () { return sl_ags; });
        var rawEv  = await sb('eventos?select=id,titulo,data_inicio,data_fim,descricao&ativo=eq.true').catch(function () { return []; });

        var eventosMapped = (Array.isArray(rawEv) ? rawEv : []).map(function(e) {
            return {
                id: 'ev_' + e.id, _evento_id: e.id, sala_id: null,
                titulo: e.titulo, data_inicio: e.data_inicio,
                data_fim: e.data_fim || e.data_inicio,
                status: 'aprovado', solicitante_nome: null,
                descricao: e.descricao || null, _tipo: 'evento',
            };
        });

        sl_ags = (Array.isArray(rawAgs) ? rawAgs : []).concat(eventosMapped);
    }

    async function sl_notificar(agId, estado, motivo) {
        try {
            var a = sl_ags.find(function (x) {
                return x.id === agId;
            });
            await sb('notificacoes', {
                method: 'POST',
                body: JSON.stringify({
                    tipo: 'agendamento_sala', referencia_id: agId, destinatario_id: a?.solicitante_id || null,
                    titulo: estado === 'aprovado' ? 'Agendamento aprovado' : 'Agendamento recusado',
                    mensagem: estado === 'aprovado' ? 'O teu pedido de sala foi aprovado.'
                        : 'O teu pedido de sala foi recusado.' + (motivo ? ' Motivo: ' + motivo : ''),
                    lida: false,
                }),
            });
        } catch (_) {
        }
    }

    // ── UTILS ─────────────────────────────────────────────────────────────────────
    function sl_fr(label, val) {
        return '<div class="sl-field-row"><span class="sl-field-label">' + label + '</span><span class="sl-field-val">' + val + '</span></div>';
    }

    function sl_esc(s) {
        return (s || '').toString().replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function sl_fmtData(d) {
        if (!d) return '—';
        try {
            return new Date(d).toLocaleDateString('pt-PT', {day: '2-digit', month: 'short', year: 'numeric'});
        } catch (_) {
            return d;
        }
    }

    function sl_fmtHora(d) {
        if (!d) return '—';
        try {
            return new Date(d).toLocaleTimeString('pt-PT', {hour: '2-digit', minute: '2-digit'});
        } catch (_) {
            return d;
        }
    }

    function sl_fmtDataHora(d) {
        if (!d) return '—';
        try {
            return new Date(d).toLocaleDateString('pt-PT', {
                day: '2-digit',
                month: 'short',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        } catch (_) {
            return d;
        }
    }

    function sl_showMsg(tipo, txt) {
        var el = document.getElementById('sl-msg');
        if (!el) return;
        el.textContent = txt;
        el.className = 'sl-msg ' + tipo;
        if (tipo === 'success') setTimeout(function () {
            if (el) el.className = 'sl-msg';
        }, 3000);
    }


    // ══════════════════════════════════════════════════════════════════════════════
    // AGENDA MODULE
    // ══════════════════════════════════════════════════════════════════════════════

    var sl_cal = {
        view: 'semana', anchorDate: new Date(), filterSalas: null, popupEl: null,
    };

    function sl_salaColor(salaId) {
        var cores = ['#7b6af0', '#2ecc71', '#e67e22', '#3498db', '#e74c3c', '#9b59b6', '#1abc9c', '#f39c12', '#2980b9', '#c0392b'];
        var h = 0;
        for (var i = 0; i < (salaId || '').length; i++) h = (h * 31 + (salaId || '').charCodeAt(i)) & 0xFFFFFFFF;
        return cores[Math.abs(h) % cores.length];
    }

    function sl_renderAgenda() {
        var e = document.getElementById('sl-empty');
        var c = document.getElementById('sl-panel-content');
        if (e) e.style.display = 'none';
        if (c) {
            c.style.display = 'block';
            c.innerHTML = '<div class="sl-cal-wrap">' + sl_buildToolbar() + sl_buildFilter() + '<div class="sl-cal-body" id="sl-cal-body"></div></div>';
        }
        sl_paintCalBody();
    }

    function sl_buildToolbar() {
        var title = sl_calTitle();
        return '<div class="sl-cal-toolbar">' +
            '<div class="sl-cal-nav">' +
            '<button class="sl-cal-nav-btn" onclick="sl_calNav(-1)">&#8249;</button>' +
            '<span class="sl-cal-title" id="sl-cal-title">' + title + '</span>' +
            '<button class="sl-cal-nav-btn" onclick="sl_calNav(1)">&#8250;</button>' +
            '</div>' +
            '<button class="sl-cal-today-btn" onclick="sl_calToday()">Hoje</button>' +
            '<div class="sl-cal-views">' +
            ['dia', 'semana', 'mes'].map(function (v) {
                var label = {dia: 'Dia', semana: 'Semana', mes: 'Mes'}[v];
                return '<button class="sl-cal-view-btn' + (sl_cal.view === v ? ' active' : '') + '" onclick="sl_calSetView(\'' + v + '\')">' + label + '</button>';
            }).join('') +
            '</div>' +
            '<button class="sl-btn primary" style="padding:6px 14px;font-size:11px;white-space:nowrap;flex-shrink:0" ' +
            'onclick="sl_novoAgendamento()">+ Agendamento</button>' +
            '</div>';
    }

    function sl_buildFilter() {
        return '<div class="sl-cal-filter" id="sl-cal-filter">' +
            '<div class="sl-cal-filter-chip' + (!sl_cal.filterSalas ? ' active' : '') + '" onclick="sl_calFilterAll()">' +
            '<div class="sl-cal-dot" style="background:var(--primary)"></div>Todas</div>' +
            sl_salas.filter(function (s) {
                return s.ativo !== false;
            }).map(function (s) {
                var cor = sl_salaColor(s.id);
                var on = !sl_cal.filterSalas || sl_cal.filterSalas.has(s.id);
                return '<div class="sl-cal-filter-chip' + (on ? ' active' : '') + '" onclick="sl_calFilterSala(\'' + s.id + '\')">' +
                    '<div class="sl-cal-dot" style="background:' + cor + '"></div>' + sl_esc(s.nome || s.id) + '</div>';
            }).join('') +
            '</div>';
    }

    function sl_calTitle() {
        var d = sl_cal.anchorDate;
        if (sl_cal.view === 'dia') return d.toLocaleDateString('pt-PT', {
            weekday: 'long',
            day: 'numeric',
            month: 'long',
            year: 'numeric'
        });
        if (sl_cal.view === 'semana') {
            var seg = sl_weekStart(d), dom = new Date(seg);
            dom.setDate(dom.getDate() + 6);
            if (seg.getMonth() === dom.getMonth()) return seg.getDate() + ' – ' + dom.getDate() + ' ' + seg.toLocaleDateString('pt-PT', {
                month: 'long',
                year: 'numeric'
            });
            return seg.toLocaleDateString('pt-PT', {
                day: 'numeric',
                month: 'short'
            }) + ' – ' + dom.toLocaleDateString('pt-PT', {day: 'numeric', month: 'short', year: 'numeric'});
        }
        return d.toLocaleDateString('pt-PT', {month: 'long', year: 'numeric'});
    }

    window.sl_calNav = function (dir) {
        var d = sl_cal.anchorDate;
        if (sl_cal.view === 'dia') d.setDate(d.getDate() + dir);
        else if (sl_cal.view === 'semana') d.setDate(d.getDate() + dir * 7);
        else d.setMonth(d.getMonth() + dir);
        sl_cal.anchorDate = new Date(d);
        sl_renderAgenda();
    };
    window.sl_calToday = function () {
        sl_cal.anchorDate = new Date();
        sl_renderAgenda();
    };
    window.sl_calSetView = function (v) {
        sl_cal.view = v;
        sl_renderAgenda();
    };
    window.sl_calFilterAll = function () {
        sl_cal.filterSalas = null;
        sl_rebuildFilter();
        sl_paintCalBody();
    };
    window.sl_calFilterSala = function (id) {
        if (!sl_cal.filterSalas) {
            sl_cal.filterSalas = new Set([id]);
        } else {
            if (sl_cal.filterSalas.has(id)) {
                sl_cal.filterSalas.delete(id);
                if (!sl_cal.filterSalas.size) sl_cal.filterSalas = null;
            } else sl_cal.filterSalas.add(id);
        }
        sl_rebuildFilter();
        sl_paintCalBody();
    };

    function sl_rebuildFilter() {
        var el = document.getElementById('sl-cal-filter');
        if (el) el.outerHTML = sl_buildFilter();
    }

    function sl_paintCalBody() {
        var body = document.getElementById('sl-cal-body');
        if (!body) return;
        var title = document.getElementById('sl-cal-title');
        if (title) title.innerHTML = sl_calTitle();

        var ags = sl_ags.slice();
        if (sl_cal.filterSalas) {
            ags = ags.filter(function(a) {
                return a._tipo === 'evento' ||   // eventos aparecem sempre
                    sl_cal.filterSalas.has(a.sala_id);
            });
        }

        if (sl_cal.view === 'dia')    body.innerHTML = sl_buildDia(sl_cal.anchorDate, ags);
        if (sl_cal.view === 'semana') body.innerHTML = sl_buildSemana(sl_cal.anchorDate, ags);
        if (sl_cal.view === 'mes')    body.innerHTML = sl_buildMes(sl_cal.anchorDate, ags);
    }

    function sl_buildDia(ref, ags) {
        return sl_buildTimeGrid([ref], ags, true);
    }

    function sl_buildSemana(ref, ags) {
        var seg = sl_weekStart(ref), dias = [];
        for (var i = 0; i < 7; i++) {
            var d = new Date(seg);
            d.setDate(d.getDate() + i);
            dias.push(d);
        }
        return sl_buildTimeGrid(dias, ags, false);
    }

    function sl_weekStart(d) {
        var day = d.getDay(), diff = (day === 0) ? -6 : 1 - day, seg = new Date(d);
        seg.setDate(d.getDate() + diff);
        seg.setHours(0, 0, 0, 0);
        return seg;
    }

    var HOURS_START = 6, HOURS_END = 24, SLOT_H = 56;

    function sl_buildTimeGrid(dias, ags, isDia) {
        var today = new Date();
        today.setHours(0, 0, 0, 0);
        var nCols = dias.length, totalHours = HOURS_END - HOURS_START;
        var headerCols = isDia ? '48px 1fr' : '48px repeat(' + nCols + ', 1fr)';
        var headerHtml = '<div class="sl-week-header" style="grid-template-columns:' + headerCols + '">' +
            '<div class="sl-week-header-time"></div>' +
            dias.map(function (d) {
                var isToday = d.getTime() === today.getTime();
                var nomeDia = d.toLocaleDateString('pt-PT', {weekday: 'short'}).replace('.', '');
                return '<div class="sl-week-header-day' + (isToday ? ' today' : '') + '" onclick="sl_calSetView(\'dia\');sl_cal.anchorDate=new Date(' + d.getTime() + ');sl_renderAgenda();">' +
                    '<div class="sl-wd-name">' + nomeDia.toUpperCase() + '</div><div class="sl-wd-num">' + d.getDate() + '</div></div>';
            }).join('') + '</div>';
        var bodyCols = isDia ? '48px 1fr' : '48px repeat(' + nCols + ', 1fr)';
        var bodyHtml = '<div class="sl-week-body" style="display:grid;grid-template-columns:' + bodyCols + '">';
        var timeHtml = '<div class="sl-time-col">';
        for (var h = HOURS_START; h < HOURS_END; h++) timeHtml += '<div class="sl-time-slot">' + String(h).padStart(2, '0') + ':00</div>';
        timeHtml += '</div>';
        bodyHtml += timeHtml;
        dias.forEach(function (d) {
            var isToday = d.getTime() === today.getTime();
            bodyHtml += '<div class="sl-day-col' + (isToday ? ' today' : '') + '">';
            for (var h = HOURS_START; h < HOURS_END; h++) bodyHtml += '<div class="sl-hour-line"></div>';
            if (isToday) {
                var now = new Date();
                var pct = ((now.getHours() - HOURS_START) + now.getMinutes() / 60) / totalHours * 100;
                if (pct >= 0 && pct <= 100) bodyHtml += '<div class="sl-now-line" style="top:' + pct + '%"></div>';
            }
            var dayAgs = sl_layoutOverlaps(sl_agsForDay(ags, d), d);
            dayAgs.forEach(function (a) {
                bodyHtml += sl_buildEvEl(a, d);
            });
            bodyHtml += '</div>';
        });
        bodyHtml += '</div>';
        return '<div class="sl-week-grid" style="min-height:' + (totalHours * SLOT_H) + 'px">' + headerHtml + bodyHtml + '</div>';
    }

    function sl_agsForDay(ags, d) {
        var dStart = new Date(d);
        dStart.setHours(0, 0, 0, 0);
        var dEnd = new Date(d);
        dEnd.setHours(23, 59, 59, 999);
        return ags.filter(function (a) {
            var s = new Date(a.data_inicio), e = new Date(a.data_fim);
            return s <= dEnd && e >= dStart;
        });
    }

    function sl_layoutOverlaps(ags, d) {
        ags = ags.slice().sort(function (a, b) {
            return new Date(a.data_inicio) - new Date(b.data_inicio);
        });
        var cols = [];
        ags.forEach(function (a) {
            var aEnd = new Date(a.data_fim), placed = false;
            for (var c = 0; c < cols.length; c++) {
                if (new Date(a.data_inicio) >= new Date(cols[c][cols[c].length - 1]._end)) {
                    cols[c].push(a);
                    a._col = c;
                    placed = true;
                    break;
                }
            }
            if (!placed) {
                a._col = cols.length;
                cols.push([a]);
            }
            a._end = aEnd;
            a._totalCols = 1;
        });
        ags.forEach(function (a) {
            a._totalCols = cols.length;
        });
        return ags;
    }

    function sl_evBgColor(status) {
        var map = {
            aprovado:  'rgba(27, 94, 32, 0.92)',
            pendente:  'rgba(191, 87, 0, 0.90)',
            recusado:  'rgba(136, 14, 14, 0.85)',
            cancelado: 'rgba(55, 55, 55, 0.80)',
        };
        return map[status] || 'rgba(55, 55, 55, 0.80)';
    }

    function sl_buildEvElOld(a, dayRef) {
        var gridStart = new Date(dayRef); gridStart.setHours(HOURS_START, 0, 0, 0);
        var gridEnd   = new Date(dayRef); gridEnd.setHours(HOURS_END, 0, 0, 0);
        var s = Math.max(new Date(a.data_inicio).getTime(), gridStart.getTime());
        var e = Math.min(new Date(a.data_fim).getTime(),    gridEnd.getTime());
        var totalMs  = (HOURS_END - HOURS_START) * 3600000;
        var topPct   = (s - gridStart.getTime()) / totalMs * 100;
        var htPct    = Math.max((e - s) / totalMs * 100, 1.4);
        var colW     = 100 / a._totalCols;
        var leftPct  = a._col * colW;
        var widPct   = colW - 0.5;

        var sala    = sl_salas.find(function(sx) { return sx.id === a.sala_id; });
        var cor = a._tipo === 'evento' ? '#9b59b6' : sl_salaColor(a.sala_id);
        var status  = a.status || 'aprovado';
        var bgColor = sl_evBgColor(status);

        var title = a.titulo || (sala ? sala.nome : '—');
        var sub   = sala ? sala.nome : '';
        var hIni  = new Date(a.data_inicio).toLocaleTimeString('pt-PT', {hour:'2-digit', minute:'2-digit'});
        var hFim  = new Date(a.data_fim).toLocaleTimeString('pt-PT', {hour:'2-digit', minute:'2-digit'});
        var idx   = sl_ags.findIndex(function(x) { return x.id === a.id; });

        // Ícone de status
        var statusIcon = {aprovado:'✓', pendente:'⏳', recusado:'✕', cancelado:'—'}[status] || '';

        return '<div class="sl-ev status-' + status + '" ' +
            'style="top:' + topPct + '%;height:' + htPct + '%;left:' + leftPct + '%;width:' + widPct + '%' +
            ';border-left-color:' + cor +
            ';background:' + bgColor + ';color:#fff"' +
            ' onclick="sl_showEvPopup(event,' + idx + ')" title="' + sl_esc(title) + '">' +
            '<div class="sl-ev-title">' + statusIcon + ' ' + sl_esc(title) + '</div>' +
            '<div class="sl-ev-sub">' + hIni + '–' + hFim + (sub ? ' · ' + sl_esc(sub) : '') + '</div>' +
            '</div>';
    }

    function sl_buildEvEl(a, dayRef) {
        var gridStart = new Date(dayRef); gridStart.setHours(HOURS_START, 0, 0, 0);
        var gridEnd   = new Date(dayRef); gridEnd.setHours(HOURS_END, 0, 0, 0);
        var s = Math.max(new Date(a.data_inicio).getTime(), gridStart.getTime());
        var e = Math.min(new Date(a.data_fim).getTime(),    gridEnd.getTime());
        var totalMs  = (HOURS_END - HOURS_START) * 3600000;
        var topPct   = (s - gridStart.getTime()) / totalMs * 100;
        var htPct    = Math.max((e - s) / totalMs * 100, 1.4);
        var colW     = 100 / a._totalCols;
        var leftPct  = a._col * colW;
        var widPct   = colW - 0.5;

        var sala   = sl_salas.find(function(sx) { return sx.id === a.sala_id; });
        var status = a.status || 'aprovado';

        // Cor base: cada sala tem a sua cor, eventos têm cor própria
        var corBase = a._tipo === 'evento' ? '#7e57c2' : sl_salaColor(a.sala_id);

        // Fundo: aprovado usa cor da sala, outros status têm cor própria
        var bgColor;
        if (status === 'recusado') {
            bgColor = 'rgba(136, 14, 14, 0.88)';
            corBase = '#ef9a9a';
        } else if (status === 'pendente') {
            bgColor = 'rgba(191, 87, 0, 0.88)';
            corBase = '#ffcc80';
        } else if (status === 'cancelado') {
            bgColor = 'rgba(55, 55, 55, 0.80)';
            corBase = '#aaa';
        } else {
            // aprovado — usa cor da sala com opacidade alta
            bgColor = corBase + 'ee';  // hex com alpha ee ≈ 93%
        }

        var title = a.titulo || (sala ? sala.nome : '—');
        var sub   = sala ? sala.nome : (a._tipo === 'evento' ? '📅 Evento' : '');
        var hIni  = new Date(a.data_inicio).toLocaleTimeString('pt-PT', {hour:'2-digit', minute:'2-digit'});
        var hFim  = new Date(a.data_fim).toLocaleTimeString('pt-PT', {hour:'2-digit', minute:'2-digit'});
        var idx   = sl_ags.findIndex(function(x) { return x.id === a.id; });
        var statusIcon = {aprovado:'', pendente:'⏳', recusado:'✕', cancelado:'—'}[status] || '';

        return '<div class="sl-ev status-' + status + '" ' +
            'style="top:' + topPct + '%;height:' + htPct + '%;left:' + leftPct + '%;width:' + widPct + '%' +
            ';border-left-color:' + corBase +
            ';background:' + bgColor + ';color:#fff"' +
            ' onclick="sl_showEvPopup(event,' + idx + ')" title="' + sl_esc(title) + '">' +
            '<div class="sl-ev-title">' + statusIcon + (statusIcon ? ' ' : '') + sl_esc(title) + '</div>' +
            '<div class="sl-ev-sub">' + hIni + '–' + hFim + (sub ? ' · ' + sl_esc(sub) : '') + '</div>' +
            '</div>';
    }

    function sl_buildMes(ref, ags) {
        // ags já chega sem filtro de recusados desde sl_paintCalBody —
        // mas se alguém filtrou lá, respeita. A view de mês mostra todos.
        var year  = ref.getFullYear(), month = ref.getMonth();
        var today = new Date(); today.setHours(0, 0, 0, 0);
        var firstDay = new Date(year, month, 1);
        var startOffset = (firstDay.getDay() + 6) % 7;
        var gridStart   = new Date(firstDay); gridStart.setDate(1 - startOffset);
        var cells = [];
        for (var i = 0; i < 42; i++) {
            var d = new Date(gridStart); d.setDate(gridStart.getDate() + i); cells.push(d);
        }
        var diaNomes = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
        var headerHtml = diaNomes.map(function(n) {
            return '<div class="sl-month-header-day">' + n + '</div>';
        }).join('');

        var bodyHtml = cells.map(function(d) {
            var isToday    = d.getTime() === today.getTime();
            var otherMonth = d.getMonth() !== month;
            var dayAgs = sl_agsForDay(ags, d).sort(function(a, b) {
                return new Date(a.data_inicio) - new Date(b.data_inicio);
            });
            var MAX_SHOW = 3;
            var evHtml = '';
            dayAgs.slice(0, MAX_SHOW).forEach(function(a) {
                var status = a.status || 'aprovado';
                var statusIcon = {aprovado:'', pendente:'⏳', recusado:'✕', cancelado:'—'}[status] || '';

                // Mesma lógica de cor do sl_buildEvEl
                var corBase = a._tipo === 'evento' ? '#7e57c2' : sl_salaColor(a.sala_id);
                var bgColor, textColor;
                if (status === 'recusado') {
                    bgColor = 'rgba(136,14,14,0.88)';
                    textColor = '#fff';
                } else if (status === 'pendente') {
                    bgColor = 'rgba(191,87,0,0.88)';
                    textColor = '#fff';
                } else if (status === 'cancelado') {
                    bgColor = 'rgba(55,55,55,0.80)';
                    textColor = '#ddd';
                } else {
                    bgColor = corBase + 'ee';
                    textColor = '#fff';
                }

                evHtml += '<div class="sl-month-ev" style="background:' + bgColor + ';color:' + textColor + '">' +
                    statusIcon + (statusIcon ? ' ' : '') + sl_esc(a.titulo || '—') + '</div>';
            });
            if (dayAgs.length > MAX_SHOW) {
                evHtml += '<div class="sl-month-more">+' + (dayAgs.length - MAX_SHOW) + ' mais</div>';
            }
            return '<div class="sl-month-cell' +
                (isToday ? ' today' : '') + (otherMonth ? ' other-month' : '') + '" ' +
                'onclick="sl_cal.anchorDate=new Date(' + d.getTime() + ');sl_calSetView(\'dia\')">' +
                '<div class="sl-month-num">' + d.getDate() + '</div>' +
                evHtml + '</div>';
        }).join('');

        return '<div class="sl-month-grid">' +
            '<div class="sl-month-header">' + headerHtml + '</div>' +
            '<div class="sl-month-body">' + bodyHtml + '</div>' +
            '</div>';
    }

        var a = sl_ags[idx];
        if (!a) return;

            (a.solicitante_nome ? '<div class="sl-ev-popup-row"><strong>Solicitante</strong>: ' + sl_esc(a.solicitante_nome) + '</div>' : '') +

            (a.recorrencia_tipo ? '<div class="sl-ev-popup-row"><strong>Recorrência</strong>: ' + (recLabel[a.recorrencia_tipo] || a.recorrencia_tipo) + (a.recorrencia_fim ? ' até ' + sl_fmtData(a.recorrencia_fim) : '') + '</div>' : '') +
            (a.status === 'recusado' && a.motivo_recusa ? '<div class="sl-ev-popup-row" style="margin-top:4px"><em>' + sl_esc(a.motivo_recusa) + '</em></div>' : '') +

                '<button class="sl-btn danger"  style="font-size:10px" onclick="sl_closeEvPopup();sl_rejeitar(\'' + a.id + '\')">Rejeitar</button>'

        document.body.appendChild(pop);

        pop.style.left = x + 'px';
        pop.style.top = y + 'px';
        setTimeout(function () {

    // ── TOGGLE DIA  [NEW] ─────────────────────────────────────────────────────
    window.sl_toggleRecDia = function (dayNum) {
        var tipo = document.getElementById('slag-recorrencia_tipo') &&
            document.getElementById('slag-recorrencia_tipo').value;
        // Semanal/Mensal → single-select; Personalizada → multi-select
        if (tipo === 'semanal' || tipo === 'mensal') {
            sl_recDiasSelected = new Set([dayNum]);
        } else {
            if (sl_recDiasSelected.has(dayNum)) sl_recDiasSelected.delete(dayNum);
            else sl_recDiasSelected.add(dayNum);
        }
        document.querySelectorAll('.sl-day-chip').forEach(function (btn) {
            btn.classList.toggle('active', sl_recDiasSelected.has(parseInt(btn.getAttribute('data-day'))));
        });
        sl_atualizarContadorRec();
    };

    // ── CHANGE TIPO RECORRÊNCIA  [NEW] ────────────────────────────────────────
    window.sl_onRecTipoChange = function (sel) {
        var val = sel.value;
        var recExtra = document.getElementById('sl-rec-extra');
        var dayWrap = document.getElementById('sl-rec-days-wrap');
        var hint = document.getElementById('sl-rec-hint');

        if (recExtra) recExtra.style.display = (val && val !== '') ? 'block' : 'none';
        if (dayWrap) dayWrap.style.display = (val === 'personalizada' || val === 'semanal' || val === 'mensal') ? 'flex' : 'none';

        // Auto-selecionar dia da data de início quando semanal/mensal
        if ((val === 'semanal' || val === 'mensal') && sl_recDiasSelected.size === 0) {
            var dataInput = document.getElementById('slag-data');
            if (dataInput && dataInput.value) {
                var d = new Date(dataInput.value + 'T12:00:00');
                sl_recDiasSelected = new Set([d.getDay()]);
                document.querySelectorAll('.sl-day-chip').forEach(function (btn) {
                    btn.classList.toggle('active', sl_recDiasSelected.has(parseInt(btn.getAttribute('data-day'))));
                });
            }
        }
        // Para semanal/mensal forçar single-select se tiver múltiplos
        if ((val === 'semanal' || val === 'mensal') && sl_recDiasSelected.size > 1) {
            var first = sl_recDiasSelected.values().next().value;
            sl_recDiasSelected = new Set([first]);
            document.querySelectorAll('.sl-day-chip').forEach(function (btn) {
                btn.classList.toggle('active', sl_recDiasSelected.has(parseInt(btn.getAttribute('data-day'))));
            });
        }

        // Atualizar hint
        if (hint) {
            var hints = {
                diaria: 'Repete todos os dias à mesma hora, até à data de fim.',
                semanal: 'Repete todas as semanas no mesmo dia, até à data de fim.',
                mensal: 'Repete todos os meses no mesmo dia da semana (ex: 2.ª terça), até à data de fim.',
                personalizada: 'Escolhe os dias da semana em que o evento se repete.'
            };
            hint.textContent = hints[val] || '';
            hint.style.display = (val && val !== '') ? 'block' : 'none';
        }

        // Auto-fill data de fim de recorrência
        var recFimInput = document.getElementById('slag-recorrencia_fim');
        if (recFimInput && !recFimInput.value) {
            var hoje = new Date();
            var autoFim;
            if (val === 'diaria') {
                autoFim = new Date(hoje);
                autoFim.setDate(hoje.getDate() + 5);
            } else {
                autoFim = new Date(hoje);
                autoFim.setFullYear(hoje.getFullYear() + 1);
            }
            recFimInput.value = autoFim.toISOString().split('T')[0];
            sl_atualizarContadorRec();
        }

        sl_atualizarContadorRec();
    };

    // Calcula preview do nº de ocorrências em tempo real
    function sl_atualizarContadorRec() {
        var counter = document.getElementById('sl-rec-counter');
        if (!counter) return;

        var tipo = document.getElementById('slag-recorrencia_tipo')?.value;
        var dataStr = document.getElementById('slag-data')?.value;
        var horaIni = document.getElementById('slag-hora_ini')?.value;
        var horaFim = document.getElementById('slag-hora_fim')?.value;
        var recFimSt = document.getElementById('slag-recorrencia_fim')?.value;

        if (!tipo || !dataStr || !horaIni || !horaFim || !recFimSt) {
            counter.style.display = 'none';
            return;
        }

        var ini = new Date(dataStr + 'T' + horaIni + ':00');
        var fim = new Date(dataStr + 'T' + horaFim + ':00');
        var rfim = new Date(recFimSt + 'T23:59:59');
        if (rfim <= ini) {
            counter.style.display = 'none';
            return;
        }

        var dias = Array.from(sl_recDiasSelected);
        var ocorrs = sl_gerarOcorrencias(ini, fim, tipo, dias, rfim);
        counter.innerHTML = '<span class="sl-rec-count">📅 ' + ocorrs.length + ' ocorrência' + (ocorrs.length !== 1 ? 's' : '') + '</span>';
        counter.style.display = 'block';
    }


    // ── RENDER FORM AGENDAMENTO  [NEW] ────────────────────────────────────────
    function sl_renderAgForm(id) {
        var a = id ? (sl_ags.find(function (x) {
            return x.id === id;
        }) || {}) : {};
        var isNovo = !id;

        var fv = function (k, d) {
            var v = a[k];
            return (v !== undefined && v !== null) ? v : (d !== undefined ? d : '');
        };

        // Datas
        var dataInicio = a.data_inicio ? new Date(a.data_inicio) : null;
        var dataFim = a.data_fim ? new Date(a.data_fim) : null;
        var defaultD = new Date(sl_cal.anchorDate || new Date());
        var dataStr = dataInicio ? dataInicio.toISOString().split('T')[0] : defaultD.toISOString().split('T')[0];
        var horaIni = dataInicio ? _pad2(dataInicio.getHours()) + ':' + _pad2(dataInicio.getMinutes()) : '09:00';
        var horaFim_v = dataFim ? _pad2(dataFim.getHours()) + ':' + _pad2(dataFim.getMinutes()) : '10:00';

        // Recorrência
        var recTipo = fv('recorrencia_tipo', '');
        var recFimSt = fv('recorrencia_fim', '');
        if (recFimSt && recFimSt.length > 10) recFimSt = recFimSt.substring(0, 10);
        var recDias = a.recorrencia_dias ? a.recorrencia_dias.map(Number) : [];
        sl_recDiasSelected = new Set(recDias);

        // Se semanal/mensal e sem dias seleccionados, pré-selecionar dia da data
        if ((recTipo === 'semanal' || recTipo === 'mensal') && sl_recDiasSelected.size === 0 && dataInicio) {
            sl_recDiasSelected.add(dataInicio.getDay());
        }

        // Sala options
        var salaOpts = '<option value="">— Selecionar Sala —</option>' +
            sl_salas.filter(function (s) {
                return s.ativo !== false;
