<style>
/* ══════════════════════════════════════════════════════
   SALAS MODULE
   Tabelas: salas, sala_agendamentos
   Prefixo: sl_
   ══════════════════════════════════════════════════════ */

.sl-wrap {
    display: flex;
    height: 100%;
    min-height: 0;
    overflow: hidden;
    font-family: var(--font-body);
}

/* ── SIDEBAR ─────────────────────────────────────────── */
.sl-side {
    width: 280px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--bg-card);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.sl-side-header {
    padding: 14px 12px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.sl-side-title {
    font-family: var(--font-title);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-faint);
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.sl-side-count {
    font-size: 11px;
    font-weight: 700;
    color: var(--primary-dark);
}
.sl-tabs {
    display: flex;
    gap: 4px;
}
.sl-tab {
    flex: 1;
    padding: 7px 0;
    text-align: center;
    font-size: 11px;
    font-family: var(--font-title);
    letter-spacing: 0.5px;
    color: var(--text-faint);
    cursor: pointer;
    border-radius: 8px;
    border: 1px solid transparent;
    transition: all 0.12s;
    position: relative;
    white-space: nowrap;
}
.sl-tab:hover  { background: var(--primary-faint); color: var(--primary-dark); }
.sl-tab.active { background: var(--primary-faint); color: var(--primary-dark); border-color: var(--primary); font-weight: 700; }
.sl-tab-badge {
    position: absolute;
    top: -5px; right: -5px;
    background: #e74c3c;
    color: #fff;
    border-radius: 10px;
    font-size: 9px;
    font-weight: 700;
    min-width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
    line-height: 1;
}
.sl-search-wrap { position: relative; }
.sl-search-icon {
    position: absolute;
    left: 9px; top: 50%; transform: translateY(-50%);
    width: 13px; height: 13px;
    color: var(--text-faint);
    pointer-events: none;
}
.sl-search {
    width: 100%;
    padding: 7px 10px 7px 28px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    font-family: var(--font-body);
    color: var(--text-main);
    outline: none;
    box-sizing: border-box;
    transition: border-color 0.2s;
}
.sl-search:focus { border-color: var(--primary); }
.sl-list { flex: 1; overflow-y: auto; }

/* ── SALA ITEM (sidebar) ──────────────────────────────── */
.sl-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    border-left: 3px solid transparent;
    transition: background 0.1s;
}
.sl-item:hover  { background: var(--primary-faint); }
.sl-item.active { background: var(--primary-faint); border-left-color: var(--primary); }
.sl-item-thumb {
    width: 42px; height: 42px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--bg-input);
    border: 1px solid var(--border);
}
.sl-item-thumb-placeholder {
    width: 42px; height: 42px;
    border-radius: 8px;
    flex-shrink: 0;
    background: var(--primary-faint);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
}
.sl-item-thumb-placeholder svg { width: 20px; height: 20px; color: var(--primary-dark); opacity: 0.5; }
.sl-item-info { flex: 1; min-width: 0; }
.sl-item-nome {
    font-size: 13px; font-weight: 600;
    color: var(--text-main);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sl-item-sub  { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
.sl-item-dot  {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
}
.sl-item-dot.on  { background: #2ecc71; }
.sl-item-dot.off { background: var(--border); }

/* ── PENDING SIDEBAR ITEM ────────────────────────────── */
.sl-pend-item {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    border-left: 3px solid #e74c3c;
    cursor: pointer;
    transition: background 0.1s;
}
.sl-pend-item:hover { background: rgba(231,76,60,0.05); }
.sl-pend-item.active { background: rgba(231,76,60,0.08); }
.sl-pend-nome { font-size: 13px; font-weight: 600; color: var(--text-main); }
.sl-pend-sub  { font-size: 11px; color: var(--text-faint); margin-top: 2px; }

/* ── PAINEL DIREITO ──────────────────────────────────── */
.sl-panel {
    flex: 1;
    overflow-y: auto;
    background: var(--bg-main);
}
.sl-empty {
    height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text-faint); gap: 10px;
}
.sl-empty svg { width: 44px; height: 44px; opacity: 0.25; }
.sl-empty-txt { font-size: 13px; }

/* ── FOTO HEADER ─────────────────────────────────────── */
.sl-foto-header {
    position: relative;
    height: 200px;
    overflow: hidden;
    background: var(--bg-input);
    flex-shrink: 0;
}
.sl-foto-header img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
}
.sl-foto-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: var(--primary-faint);
}
.sl-foto-placeholder svg { width: 48px; height: 48px; color: var(--primary-dark); opacity: 0.3; }
.sl-foto-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 40px 20px 16px;
    background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 100%);
}
.sl-foto-nome {
    font-size: 20px; font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
.sl-foto-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.8);
    margin-top: 3px;
}
.sl-foto-actions {
    position: absolute;
    top: 12px; right: 12px;
    display: flex; gap: 6px;
}

/* ── PANEL BODY ──────────────────────────────────────── */
.sl-panel-body { padding: 18px 20px; }

/* ── DATA CARD ───────────────────────────────────────── */
.sl-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 12px;
}
.sl-card-title {
    font-family: var(--font-title);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
}
.sl-field-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px; font-size: 13px;
}
.sl-field-row:last-child { border-bottom: none; }
.sl-field-label { color: var(--text-faint); font-size: 12px; flex-shrink: 0; }
.sl-field-val   { color: var(--text-main); font-weight: 500; text-align: right; line-height: 1.4; }

/* ── EQUIPAMENTOS ────────────────────────────────────── */
.sl-equip-row {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 8px 0;
}
.sl-equip-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px; font-family: var(--font-title); letter-spacing: 0.3px;
}
.sl-equip-chip.on  { background: rgba(46,125,50,0.1);  color: #2e7d32; border: 1px solid rgba(46,125,50,0.3); }
.sl-equip-chip.off { background: var(--bg-input); color: var(--text-faint); border: 1px solid var(--border); text-decoration: line-through; opacity: 0.5; }

/* ── AGENDAMENTO ITEM ────────────────────────────────── */
.sl-ag-item {
    display: flex; align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
}
.sl-ag-item:last-child { border-bottom: none; }
.sl-ag-titulo { font-size: 13px; font-weight: 600; color: var(--text-main); }
.sl-ag-sub    { font-size: 11px; color: var(--text-faint); margin-top: 2px; line-height: 1.5; }
.sl-ag-status {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 20px;
    font-size: 10px; font-family: var(--font-title); letter-spacing: 0.3px;
    white-space: nowrap; flex-shrink: 0;
}
.sl-ag-status.aprovado { background: rgba(46,125,50,0.1);  color: #2e7d32; border: 1px solid rgba(46,125,50,0.3); }
.sl-ag-status.pendente { background: rgba(230,126,34,0.1); color: #e67e22; border: 1px solid rgba(230,126,34,0.3); }
.sl-ag-status.recusado { background: rgba(192,57,43,0.1);  color: #c0392b; border: 1px solid rgba(192,57,43,0.3); }

/* ── APROVACAO PAINEL ────────────────────────────────── */
.sl-aprov-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 4px solid #e67e22;
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 12px;
}
.sl-aprov-titulo { font-size: 15px; font-weight: 700; color: var(--text-main); margin-bottom: 10px; }
.sl-aprov-row    { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

/* ── FORMULARIO ──────────────────────────────────────── */
.sl-form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}
.sl-form-full { grid-column: 1 / -1; }
.sl-flabel {
    font-size: 10px; font-family: var(--font-title);
    letter-spacing: 1px; color: var(--text-faint);
    margin-bottom: 4px; text-transform: uppercase; display: block;
}
.sl-input, .sl-select, .sl-textarea {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    font-family: var(--font-body);
    color: var(--text-main);
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
    width: 100%;
}
.sl-input:focus, .sl-select:focus, .sl-textarea:focus { border-color: var(--primary); }
.sl-textarea { height: 72px; resize: vertical; }
.sl-check-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text-main); cursor: pointer;
}

/* ── BOTOES ──────────────────────────────────────────── */
.sl-btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    font-size: 11px; font-family: var(--font-title);
    letter-spacing: 0.5px;
    color: var(--text-muted);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.sl-btn:hover    { border-color: var(--primary); color: var(--primary-dark); background: var(--primary-faint); }
.sl-btn.primary  { background: var(--primary); border-color: var(--primary); color: #fff; }
.sl-btn.primary:hover { background: var(--primary-dark); }
.sl-btn.approve  { background: rgba(46,125,50,0.1); border-color: rgba(46,125,50,0.4); color: #2e7d32; }
.sl-btn.approve:hover { background: rgba(46,125,50,0.18); }
.sl-btn.danger   { border-color: rgba(192,57,43,0.3); color: #c0392b; }
.sl-btn.danger:hover { background: rgba(192,57,43,0.08); }
.sl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.sl-btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
.sl-photo-btn {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(0,0,0,0.3);
    font-size: 10px; font-family: var(--font-title);
    letter-spacing: 0.5px; color: #fff;
    cursor: pointer; backdrop-filter: blur(4px);
    transition: all 0.15s;
}
.sl-photo-btn:hover { background: rgba(0,0,0,0.5); }

/* ── MSG ─────────────────────────────────────────────── */
.sl-msg {
    font-size: 12px; padding: 7px 12px; border-radius: 8px;
    margin-bottom: 10px; display: none;
}
.sl-msg.success { display: block; background: rgba(46,125,50,0.1); color: #2e7d32; border: 1px solid rgba(46,125,50,0.3); }
.sl-msg.error   { display: block; background: rgba(198,40,40,0.1); color: #c62828; border: 1px solid rgba(198,40,40,0.3); }

/* ── AGENDA CALENDARIO ───────────────────────────────── */
.sl-cal-wrap {
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: 0;
    background: var(--bg-main);
}
.sl-cal-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-card);
    gap: 10px;
    flex-shrink: 0;
}
.sl-cal-nav {
    display: flex;
    align-items: center;
    gap: 6px;
}
.sl-cal-nav-btn {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.12s;
    font-size: 14px;
    flex-shrink: 0;
}
.sl-cal-nav-btn:hover { border-color: var(--primary); color: var(--primary-dark); background: var(--primary-faint); }
.sl-cal-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-main);
    min-width: 160px;
    text-align: center;
}
.sl-cal-today-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    font-size: 10px;
    font-family: var(--font-title);
    letter-spacing: 0.5px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.12s;
}
.sl-cal-today-btn:hover { border-color: var(--primary); color: var(--primary-dark); background: var(--primary-faint); }
.sl-cal-views {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
}
.sl-cal-view-btn {
    padding: 5px 12px;
    font-size: 10px;
    font-family: var(--font-title);
    letter-spacing: 0.5px;
    cursor: pointer;
    border: none;
    background: var(--bg-input);
    color: var(--text-faint);
    transition: all 0.12s;
    border-right: 1px solid var(--border);
}
.sl-cal-view-btn:last-child { border-right: none; }
.sl-cal-view-btn:hover  { background: var(--primary-faint); color: var(--primary-dark); }
.sl-cal-view-btn.active { background: var(--primary); color: #fff; }

/* ── SALA FILTER ────────────────────────────────────── */
.sl-cal-filter {
    padding: 8px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-card);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex-shrink: 0;
}
.sl-cal-filter-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px 3px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.12s;
}
.sl-cal-filter-chip .sl-cal-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
}
.sl-cal-filter-chip.active {
    border-color: var(--primary);
    background: var(--primary-faint);
    color: var(--primary-dark);
    font-weight: 600;
}
.sl-cal-filter-chip.active .sl-cal-dot { outline: 2px solid var(--primary); outline-offset: 1px; }

/* ── GRID SEMANA ─────────────────────────────────────── */
.sl-cal-body { flex: 1; overflow: auto; position: relative; }
.sl-week-grid {
    display: grid;
    min-height: 100%;
}
.sl-week-header {
    display: grid;
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg-card);
    border-bottom: 2px solid var(--border);
}
.sl-week-header-time {
    border-right: 1px solid var(--border);
    padding: 8px 6px;
    font-size: 9px;
    color: var(--text-faint);
    text-align: center;
    width: 48px;
}
.sl-week-header-day {
    padding: 8px 4px;
    text-align: center;
    border-right: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
}
.sl-week-header-day:hover { background: var(--primary-faint); }
.sl-week-header-day.today { background: var(--primary-faint); }
.sl-week-header-day .sl-wd-name { font-size: 10px; color: var(--text-faint); font-family: var(--font-title); letter-spacing: 0.5px; text-transform: uppercase; }
.sl-week-header-day .sl-wd-num  { font-size: 18px; font-weight: 700; color: var(--text-main); line-height: 1.2; }
.sl-week-header-day.today .sl-wd-num { color: var(--primary); }

.sl-week-body {
    display: grid;
    position: relative;
}
.sl-time-col {
    border-right: 1px solid var(--border);
    flex-shrink: 0;
}
.sl-time-slot {
    height: 56px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    padding: 3px 6px 0;
    font-size: 9px;
    color: var(--text-faint);
    width: 48px;
    box-sizing: border-box;
}
.sl-day-col {
    border-right: 1px solid var(--border);
    position: relative;
    min-height: 100%;
}
.sl-day-col.today { background: rgba(123,106,240,0.02); }
.sl-hour-line {
    height: 56px;
    border-bottom: 1px solid var(--border);
    position: relative;
}
.sl-hour-line:nth-child(even) { background: rgba(0,0,0,0.01); }
.sl-now-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: #e74c3c;
    z-index: 5;
    pointer-events: none;
}
.sl-now-line::before {
    content: '';
    position: absolute;
    left: -4px; top: -4px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #e74c3c;
}

/* ── EVENTO CARD ─────────────────────────────────────── */
.sl-ev {
    position: absolute;
    left: 2px; right: 2px;
    border-radius: 6px;
    padding: 3px 6px;
    font-size: 11px;
    cursor: pointer;
    overflow: hidden;
    transition: filter 0.1s, transform 0.1s;
    z-index: 3;
    box-sizing: border-box;
    line-height: 1.3;
}
.sl-ev:hover { filter: brightness(1.1); transform: scale(1.01); z-index: 4; }
.sl-ev-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sl-ev-sub   { font-size: 9px; opacity: 0.85; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sl-ev.status-aprovado { background: rgba(46,125,50,0.18);  border-left: 3px solid #2e7d32; color: #1a5c29; }
.sl-ev.status-pendente { background: rgba(230,126,34,0.18); border-left: 3px solid #e67e22; color: #9a5910; }
.sl-ev.status-recusado { background: rgba(150,150,150,0.12); border-left: 3px solid #aaa;  color: #888; opacity: 0.6; }

/* ── VISTA MES ───────────────────────────────────────── */
.sl-month-grid {
    display: flex;
    flex-direction: column;
    min-height: 100%;
}
.sl-month-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-bottom: 2px solid var(--border);
    background: var(--bg-card);
    position: sticky; top: 0; z-index: 5;
}
.sl-month-header-day {
    padding: 8px 4px;
    text-align: center;
    font-size: 10px;
    font-family: var(--font-title);
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-faint);
    border-right: 1px solid var(--border);
}
.sl-month-header-day:last-child { border-right: none; }
.sl-month-body {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-auto-rows: minmax(100px, 1fr);
    border-left: 1px solid var(--border);
}
.sl-month-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 4px;
    min-height: 100px;
    cursor: pointer;
    transition: background 0.1s;
    overflow: hidden;
}
.sl-month-cell:hover { background: var(--primary-faint); }
.sl-month-cell.today { background: rgba(123,106,240,0.06); }
.sl-month-cell.other-month { opacity: 0.4; }
.sl-month-num {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-main);
    margin-bottom: 3px;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
}
.sl-month-cell.today .sl-month-num { background: var(--primary); color: #fff; }
.sl-month-ev {
    font-size: 10px;
    border-radius: 4px;
    padding: 1px 5px;
    margin-bottom: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-weight: 600;
}
.sl-month-ev.status-aprovado { background: rgba(46,125,50,0.15);  color: #2e7d32; }
.sl-month-ev.status-pendente { background: rgba(230,126,34,0.15); color: #e67e22; }
.sl-month-ev.status-recusado { background: rgba(150,150,150,0.12); color: #888; }
.sl-month-more { font-size: 10px; color: var(--primary-dark); font-weight: 600; padding: 1px 4px; }

/* ── VISTA DIA ───────────────────────────────────────── */
/* Reutiliza week-grid com 1 coluna */

/* ── POPUP EVENTO ─────────────────────────────────────── */
.sl-ev-popup {
    position: fixed;
    z-index: 1000;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    padding: 14px 16px;
    min-width: 240px;
    max-width: 300px;
    pointer-events: all;
    animation: sl-pop 0.12s ease both;
}
@keyframes sl-pop { from { opacity:0; transform:scale(0.95) translateY(-4px); } to { opacity:1; transform:none; } }
.sl-ev-popup-title { font-size: 14px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; }
.sl-ev-popup-row   { font-size: 12px; color: var(--text-faint); margin-bottom: 4px; line-height: 1.5; }
.sl-ev-popup-row strong { color: var(--text-main); }
.sl-ev-popup-close {
    position: absolute; top: 10px; right: 12px;
    background: none; border: none; cursor: pointer;
    font-size: 16px; color: var(--text-faint); line-height: 1;
}
.sl-ev-popup-close:hover { color: var(--text-main); }
.sl-ev-popup-btns { display: flex; gap: 6px; margin-top: 10px; }

/* Aviso entrega */
.sl-aviso {
    background: rgba(230,126,34,0.08);
    border: 1px solid rgba(230,126,34,0.25);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text-main);
    line-height: 1.6;
    margin-bottom: 12px;
}
.sl-aviso-label {
    font-family: var(--font-title);
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #e67e22;
    margin-bottom: 4px;
}
</style>

<div class="sl-wrap">

    <!-- ── SIDEBAR ──────────────────────────────────────── -->
    <div class="sl-side">
        <div class="sl-side-header">
            <div class="sl-side-title">
                Salas
                <span class="sl-side-count" id="sl-count"></span>
            </div>
            <div class="sl-tabs">
                <div class="sl-tab active" id="sl-tab-salas" onclick="sl_setTab('salas')">Salas</div>
                <div class="sl-tab" id="sl-tab-aprovacoes" onclick="sl_setTab('aprovacoes')" style="position:relative">
                    Aprovacoes
                    <span class="sl-tab-badge" id="sl-badge-aprovacoes" style="display:none">0</span>
                </div>
                <div class="sl-tab" id="sl-tab-agenda" onclick="sl_setTab('agenda')">Agenda</div>
            </div>
            <div class="sl-search-wrap" id="sl-search-wrap">
                <svg class="sl-search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input class="sl-search" id="sl-search" placeholder="Pesquisar sala..." oninput="sl_filtrar()">
            </div>
        </div>
        <div class="sl-list" id="sl-list">
            <div style="padding:20px;color:var(--text-faint);font-size:12px;text-align:center">A carregar...</div>
        </div>
        <div style="padding:10px 12px;border-top:1px solid var(--border)">
            <button class="sl-btn primary" style="width:100%" onclick="sl_novaSala()">+ Nova Sala</button>
        </div>
    </div>

    <!-- ── PAINEL ────────────────────────────────────────── -->
    <div class="sl-panel" id="sl-panel">
        <div class="sl-empty" id="sl-empty">
            <svg fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <div class="sl-empty-txt">Selecciona uma sala para ver detalhes</div>
        </div>
        <div id="sl-panel-content" style="display:none"></div>
    </div>

</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// SALAS MODULE
// Tabelas: salas, sala_agendamentos, notificacoes
// status agendamento: 'pendente' | 'aprovado' | 'recusado'
// ══════════════════════════════════════════════════════════════════════════════

var sl_salas = [];
var sl_ags   = [];       // sala_agendamentos
var sl_activoId  = null;
var sl_activoAgId = null; // agendamento ativo na tab aprovacoes
var sl_editMode  = false;
var sl_isNovo    = false;
var sl_tab       = 'salas';

// ── INIT ──────────────────────────────────────────────────────────────────────
async function sl_init() {
    try {
        var res = await Promise.all([
            sb('salas?select=*&order=nome').catch(function() { return []; }),
            sb('sala_agendamentos?select=*&order=data_inicio.desc').catch(function() { return []; }),
        ]);
        sl_salas = res[0] || [];
        sl_ags   = res[1] || [];
        sl_renderList();
        sl_updateBadge();
    } catch(e) {
        console.error('sl_init:', e);
    }
}

// ── BADGE ─────────────────────────────────────────────────────────────────────
function sl_updateBadge() {
    var n = sl_ags.filter(function(a) { return a.status === 'pendente'; }).length;
    var badge = document.getElementById('sl-badge-aprovacoes');
    if (badge) { badge.textContent = n; badge.style.display = n ? 'flex' : 'none'; }
    // Badge no menu global do admin.html
    var menuBadge = document.querySelector('[data-secao="salas"] .nav-badge');
    if (menuBadge) { menuBadge.textContent = n; menuBadge.style.display = n ? 'flex' : 'none'; }
    window.sl_badgeCount = n;
}

// ── TABS ──────────────────────────────────────────────────────────────────────
window.sl_setTab = function(tab) {
    sl_tab = tab;
    sl_activoId   = null;
    sl_activoAgId = null;
    sl_editMode   = false;
    sl_isNovo     = false;
    document.getElementById('sl-tab-salas')?.classList.toggle('active', tab === 'salas');
    document.getElementById('sl-tab-aprovacoes')?.classList.toggle('active', tab === 'aprovacoes');
    document.getElementById('sl-tab-agenda')?.classList.toggle('active', tab === 'agenda');
    var sw = document.getElementById('sl-search-wrap');
    if (sw) sw.style.display = tab === 'salas' ? '' : 'none';
    sl_renderList();
    if (tab === 'agenda') {
        sl_renderAgenda();
    } else {
        sl_showEmpty();
    }
};

// ── RENDER LISTA ──────────────────────────────────────────────────────────────
function sl_renderList() {
    var list  = document.getElementById('sl-list');
    var count = document.getElementById('sl-count');
    if (!list) return;

    if (sl_tab === 'aprovacoes') {
        sl_renderListAprovacoes(list, count); return;
    }

    var q = (document.getElementById('sl-search')?.value || '').toLowerCase();
    var lista = sl_salas.filter(function(s) {
        if (!q) return true;
        return (s.nome || '').toLowerCase().includes(q) ||
               (s.espaco || '').toLowerCase().includes(q);
    });

    if (count) count.textContent = lista.length;

    if (!lista.length) {
        list.innerHTML = '<div style="padding:20px;color:var(--text-faint);font-size:12px;text-align:center">' +
            (q ? 'Nenhuma sala encontrada.' : 'Nenhuma sala registada.') + '</div>';
        return;
    }

    list.innerHTML = lista.map(function(s) {
        var ativa  = sl_activoId === s.id;
        var dotCls = s.ativo !== false ? 'on' : 'off';
        var thumb  = s.foto_url
            ? '<img class="sl-item-thumb" src="' + s.foto_url + '" alt="" onerror="this.style.display=\'none\'">'
            : '<div class="sl-item-thumb-placeholder"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></div>';
        var sub = [s.espaco, s.capacidade ? s.capacidade + ' lug.' : null]
            .filter(Boolean).join(' · ');
        return '<div class="sl-item' + (ativa ? ' active' : '') + '" onclick="sl_selecionar(\'' + s.id + '\')">' +
            thumb +
            '<div class="sl-item-info">' +
                '<div class="sl-item-nome">' + (s.nome || '—') + '</div>' +
                '<div class="sl-item-sub">' + (sub || '—') + '</div>' +
            '</div>' +
            '<div class="sl-item-dot ' + dotCls + '"></div>' +
        '</div>';
    }).join('');
}

function sl_renderListAprovacoes(list, count) {
    var pendentes = sl_ags.filter(function(a) { return a.status === 'pendente'; });
    if (count) count.textContent = pendentes.length;

    if (!pendentes.length) {
        list.innerHTML = '<div style="padding:20px;color:var(--text-faint);font-size:12px;text-align:center">Nenhum pedido pendente.</div>';
        return;
    }
    list.innerHTML = pendentes.map(function(a) {
        var ativa = sl_activoAgId === a.id;
        var sala  = sl_salas.find(function(s) { return s.id === a.sala_id; });
        var dataStr = sl_fmtData(a.data_inicio);
        return '<div class="sl-pend-item' + (ativa ? ' active' : '') + '" onclick="sl_selecionarAg(\'' + a.id + '\')">' +
            '<div class="sl-pend-nome">' + (a.titulo || 'Pedido de sala') + '</div>' +
            '<div class="sl-pend-sub">' + (sala ? sala.nome : '—') + ' · ' + dataStr + '</div>' +
            '<div class="sl-pend-sub">' + (a.solicitante_nome || '') + '</div>' +
        '</div>';
    }).join('');
}

// ── SELECIONAR ────────────────────────────────────────────────────────────────
window.sl_selecionar = function(id) {
    sl_activoId  = id;
    sl_editMode  = false;
    sl_isNovo    = false;
    sl_renderList();
    sl_renderView();
};

window.sl_selecionarAg = function(id) {
    sl_activoAgId = id;
    sl_renderList();
    sl_renderAprovacaoView(id);
};

window.sl_filtrar = function() { sl_renderList(); };

window.sl_novaSala = function() {
    sl_activoId = null;
    sl_editMode = true;
    sl_isNovo   = true;
    sl_tab      = 'salas';
    document.getElementById('sl-tab-salas')?.classList.add('active');
    document.getElementById('sl-tab-aprovacoes')?.classList.remove('active');
    sl_renderList();
    sl_renderForm(null);
};

// ── SHOW EMPTY ────────────────────────────────────────────────────────────────
function sl_showEmpty() {
    var e = document.getElementById('sl-empty');
    var c = document.getElementById('sl-panel-content');
    if (e) e.style.display = 'flex';
    if (c) c.style.display = 'none';
}
function sl_showContent(html) {
    var e = document.getElementById('sl-empty');
    var c = document.getElementById('sl-panel-content');
    if (e) e.style.display = 'none';
    if (c) { c.style.display = 'block'; c.innerHTML = html; }
}

// ── RENDER VIEW SALA ──────────────────────────────────────────────────────────
function sl_renderView() {
    var s = sl_salas.find(function(x) { return x.id === sl_activoId; });
    if (!s) { sl_showEmpty(); return; }

    // Agendamentos desta sala (todos, ordenados)
    var ags_sala = sl_ags.filter(function(a) { return a.sala_id === s.id; });
    var pendentes = ags_sala.filter(function(a) { return a.status === 'pendente'; });
    var futuros   = ags_sala.filter(function(a) {
        return a.status === 'aprovado' && new Date(a.data_inicio) >= new Date();
    }).sort(function(x, y) { return new Date(x.data_inicio) - new Date(y.data_inicio); });
    var historico = ags_sala.filter(function(a) {
        return a.status !== 'pendente' &&
               (a.status !== 'aprovado' || new Date(a.data_inicio) < new Date());
    }).slice(0, 5);

    // Foto header
    var fotoHtml = s.foto_url
        ? '<div class="sl-foto-header">' +
            '<img src="' + s.foto_url + '" alt="' + s.nome + '" onerror="this.parentNode.innerHTML=\'<div class=sl-foto-placeholder><svg fill=none stroke=currentColor stroke-width=1.2 viewBox=\\\'0 0 24 24\\\'><path d=\\\'M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z\\\'/></svg></div>\'">' +
            '<div class="sl-foto-overlay">' +
                '<div class="sl-foto-nome">' + (s.nome || '') + '</div>' +
                '<div class="sl-foto-sub">' + [s.espaco, s.capacidade ? s.capacidade + ' lugares' : null].filter(Boolean).join(' · ') + '</div>' +
            '</div>' +
            '<div class="sl-foto-actions">' +
                '<button class="sl-photo-btn" onclick="sl_editar()">Editar</button>' +
                '<button class="sl-photo-btn" onclick="sl_toggleAtivo(\'' + s.id + '\')">' + (s.ativo !== false ? 'Desativar' : 'Ativar') + '</button>' +
            '</div>' +
        '</div>'
        : '<div class="sl-foto-header"><div class="sl-foto-placeholder"><svg fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>' +
          '<div class="sl-foto-overlay"><div class="sl-foto-nome">' + (s.nome || '') + '</div><div class="sl-foto-sub">' + (s.espaco || '') + '</div></div>' +
          '<div class="sl-foto-actions"><button class="sl-photo-btn" onclick="sl_editar()">Editar</button><button class="sl-photo-btn" onclick="sl_toggleAtivo(\'' + s.id + '\')">' + (s.ativo !== false ? 'Desativar' : 'Ativar') + '</button></div>' +
          '</div>';

    // Equipamentos
    var equips = [
        { key: 'tem_som',        label: 'Som'        },
        { key: 'tem_iluminacao', label: 'Iluminacao' },
        { key: 'tem_projecao',   label: 'Projecao'   },
        { key: 'tem_mesas',      label: 'Mesas'      },
        { key: 'tem_cadeiras',   label: 'Cadeiras'   },
    ];
    var equipHtml = '<div class="sl-equip-row">' +
        equips.map(function(e) {
            var on = s[e.key] === true;
            return '<span class="sl-equip-chip ' + (on ? 'on' : 'off') + '">' + (on ? '✓' : '×') + ' ' + e.label + '</span>';
        }).join('') +
    '</div>';

    // Horario
    var horario = '—';
    if (s.hora_inicio && s.hora_fim) {
        horario = s.hora_inicio.substring(0,5) + ' – ' + s.hora_fim.substring(0,5);
    }

    // Aviso
    var avisoHtml = s.aviso_entrega
        ? '<div class="sl-aviso"><div class="sl-aviso-label">Aviso de Entrega</div>' + s.aviso_entrega + '</div>'
        : '';

    // Pendentes desta sala
    var pendHtml = '';
    if (pendentes.length) {
        pendHtml = '<div class="sl-card">' +
            '<div class="sl-card-title">Pedidos Pendentes (' + pendentes.length + ')</div>' +
            pendentes.map(function(a) {
                return '<div class="sl-ag-item">' +
                    '<div>' +
                        '<div class="sl-ag-titulo">' + (a.titulo || 'Pedido') + '</div>' +
                        '<div class="sl-ag-sub">' +
                            sl_fmtDataHora(a.data_inicio) + ' – ' + sl_fmtHora(a.data_fim) + '<br>' +
                            (a.solicitante_nome || '') +
                            (a.solicitante_email ? ' · ' + a.solicitante_email : '') +
                        '</div>' +
                        '<div style="display:flex;gap:6px;margin-top:6px">' +
                            '<button class="sl-btn approve" style="font-size:10px;padding:4px 10px" onclick="sl_aprovar(\'' + a.id + '\')">Aprovar</button>' +
                            '<button class="sl-btn danger"  style="font-size:10px;padding:4px 10px" onclick="sl_rejeitar(\'' + a.id + '\')">Rejeitar</button>' +
                        '</div>' +
                    '</div>' +
                    '<span class="sl-ag-status pendente">Pendente</span>' +
                '</div>';
            }).join('') +
        '</div>';
    }

    // Futuros aprovados
    var futHtml = '';
    if (futuros.length) {
        futHtml = '<div class="sl-card">' +
            '<div class="sl-card-title">Proximos Agendamentos (' + futuros.length + ')</div>' +
            futuros.slice(0, 5).map(function(a) {
                return '<div class="sl-ag-item">' +
                    '<div>' +
                        '<div class="sl-ag-titulo">' + (a.titulo || 'Agendamento') + '</div>' +
                        '<div class="sl-ag-sub">' + sl_fmtDataHora(a.data_inicio) + ' – ' + sl_fmtHora(a.data_fim) + (a.solicitante_nome ? '<br>' + a.solicitante_nome : '') + '</div>' +
                    '</div>' +
                    '<span class="sl-ag-status aprovado">Aprovado</span>' +
                '</div>';
            }).join('') +
        '</div>';
    }

    // Historico
    var histHtml = '';
    if (historico.length) {
        histHtml = '<div class="sl-card">' +
            '<div class="sl-card-title">Historico Recente</div>' +
            historico.map(function(a) {
                return '<div class="sl-ag-item">' +
                    '<div>' +
                        '<div class="sl-ag-titulo">' + (a.titulo || 'Agendamento') + '</div>' +
                        '<div class="sl-ag-sub">' + sl_fmtDataHora(a.data_inicio) + (a.solicitante_nome ? ' · ' + a.solicitante_nome : '') +
                        (a.status === 'recusado' && a.motivo_recusa ? '<br><em>' + a.motivo_recusa + '</em>' : '') + '</div>' +
                    '</div>' +
                    '<span class="sl-ag-status ' + (a.status || '') + '">' + (a.status || '—') + '</span>' +
                '</div>';
            }).join('') +
        '</div>';
    }

    sl_showContent(
        fotoHtml +
        '<div class="sl-panel-body">' +
            '<div id="sl-msg" class="sl-msg"></div>' +
            avisoHtml +
            '<div class="sl-card">' +
                '<div class="sl-card-title">Detalhes</div>' +
                sl_fr('Espaco',     s.espaco || '—') +
                sl_fr('Capacidade', s.capacidade ? s.capacidade + ' pessoas' : '—') +
                sl_fr('Horario',    horario) +
                (s.descricao ? sl_fr('Descricao', s.descricao) : '') +
                '<div class="sl-field-row"><span class="sl-field-label">Equipamentos</span>' + equipHtml + '</div>' +
            '</div>' +
            pendHtml +
            futHtml +
            histHtml +
        '</div>'
    );
}

// ── RENDER APROVACAO DETALHE ──────────────────────────────────────────────────
function sl_renderAprovacaoView(agId) {
    var a = sl_ags.find(function(x) { return x.id === agId; });
    if (!a) { sl_showEmpty(); return; }
    var sala = sl_salas.find(function(s) { return s.id === a.sala_id; });

    var fotoHtml = '';
    if (sala && sala.foto_url) {
        fotoHtml = '<div class="sl-foto-header" style="height:120px">' +
            '<img src="' + sala.foto_url + '" alt="" style="opacity:0.7">' +
            '<div class="sl-foto-overlay"><div class="sl-foto-nome" style="font-size:15px">' + (sala.nome || '') + '</div></div>' +
        '</div>';
    }

    sl_showContent(
        fotoHtml +
        '<div class="sl-panel-body">' +
            '<div id="sl-msg" class="sl-msg"></div>' +
            '<div class="sl-aprov-card">' +
                '<div class="sl-aprov-titulo">' + (a.titulo || 'Pedido de Sala') + '</div>' +
                sl_fr('Sala',          sala ? sala.nome : (a.sala_id || '—')) +
                sl_fr('Data/Hora',     sl_fmtDataHora(a.data_inicio) + ' – ' + sl_fmtHora(a.data_fim)) +
                sl_fr('Solicitante',   a.solicitante_nome || '—') +
                (a.solicitante_email ? sl_fr('Email', a.solicitante_email) : '') +
                (a.solicitante_tel   ? sl_fr('Telefone', a.solicitante_tel) : '') +
                (a.descricao ? sl_fr('Descricao', a.descricao) : '') +
                sl_fr('Estado', '<span class="sl-ag-status ' + (a.status||'') + '">' + (a.status||'—') + '</span>') +
                (a.status === 'recusado' && a.motivo_recusa ? sl_fr('Motivo Recusa', a.motivo_recusa) : '') +
                (a.aprovado_em ? sl_fr('Respondido em', sl_fmtDataHora(a.aprovado_em)) : '') +
                '<div class="sl-aprov-row">' +
                    (a.status === 'pendente'
                        ? '<button class="sl-btn approve" onclick="sl_aprovar(\'' + a.id + '\')">Aprovar</button>' +
                          '<button class="sl-btn danger" onclick="sl_rejeitar(\'' + a.id + '\')">Rejeitar</button>'
                        : '') +
                    '<button class="sl-btn" onclick="sl_setTab(\'aprovacoes\')">Voltar</button>' +
                '</div>' +
            '</div>' +
        '</div>'
    );
}

// ── RENDER FORM ───────────────────────────────────────────────────────────────
function sl_renderForm(id) {
    var s = id ? (sl_salas.find(function(x) { return x.id === id; }) || {}) : {};
    var fv = function(k, d) { var v = s[k]; return (v !== undefined && v !== null) ? v : (d !== undefined ? d : ''); };
    var ck = function(k, d) { return fv(k, d) === true ? ' checked' : ''; };

    var espacos = ['Salao Principal','Lumen','Escritorios','Sala Externa','Outro'];

    sl_showContent(
        '<div style="background:var(--bg-card);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px">' +
            '<div>' +
                '<div style="font-size:16px;font-weight:700;color:var(--text-main)">' + (sl_isNovo ? 'Nova Sala' : 'Editar — ' + (s.nome || '')) + '</div>' +
                '<div style="font-size:12px;color:var(--text-faint);margin-top:2px">' + (sl_isNovo ? 'Preenche os dados da nova sala.' : '') + '</div>' +
            '</div>' +
            '<div style="display:flex;gap:8px">' +
                '<button class="sl-btn" onclick="sl_cancelar()">Cancelar</button>' +
                '<button class="sl-btn primary" id="sl-btn-guardar" onclick="sl_guardar(\'' + (s.id || '') + '\')">Guardar</button>' +
            '</div>' +
        '</div>' +
        '<div class="sl-panel-body">' +
            '<div id="sl-msg" class="sl-msg"></div>' +
            '<div class="sl-card">' +
                '<div class="sl-card-title">Identificacao</div>' +

window.sl_editar = function() {
    sl_editMode = true;
    sl_renderForm(sl_activoId);
};

window.sl_cancelar = function() {
    if (sl_isNovo) { sl_isNovo = false; sl_activoId = null; sl_showEmpty(); return; }
    sl_editMode = false;
    sl_renderView();
};

window.sl_guardar = async function(id) {
    var nome = document.getElementById('slf-nome')?.value?.trim();
    if (!nome) { sl_showMsg('error', 'Nome obrigatorio.'); return; }

    var btn = document.getElementById('sl-btn-guardar');
    if (btn) { btn.disabled = true; btn.textContent = 'A guardar...'; }

    var dados = {
        nome:           nome,
        espaco:         document.getElementById('slf-espaco')?.value       || null,
        capacidade:     parseInt(document.getElementById('slf-capacidade')?.value) || null,
        hora_inicio:    document.getElementById('slf-hora_inicio')?.value  || null,
        hora_fim:       document.getElementById('slf-hora_fim')?.value     || null,
        descricao:      document.getElementById('slf-descricao')?.value?.trim()     || null,
        foto_url:       document.getElementById('slf-foto_url')?.value?.trim()      || null,
        aviso_entrega:  document.getElementById('slf-aviso_entrega')?.value?.trim() || null,
        tem_som:        document.getElementById('slf-tem_som')?.checked        ?? false,
        tem_iluminacao: document.getElementById('slf-tem_iluminacao')?.checked ?? false,
        tem_projecao:   document.getElementById('slf-tem_projecao')?.checked   ?? false,
        tem_mesas:      document.getElementById('slf-tem_mesas')?.checked      ?? false,
        tem_cadeiras:   document.getElementById('slf-tem_cadeiras')?.checked   ?? false,
        ativo:          document.getElementById('slf-ativo')?.checked          ?? true,
    };

    try {
        if (id) {
            await sb('salas?id=eq.' + id, { method: 'PATCH', body: JSON.stringify(dados) });
        } else {
            var res = await sb('salas', {
                method: 'POST',
                headers: { Prefer: 'return=representation' },
                body: JSON.stringify(dados),
            });
            if (res && res[0]) sl_activoId = res[0].id;
        }
        sl_salas = await sb('salas?select=*&order=nome').catch(function() { return sl_salas; });
        sl_editMode = false;
        sl_isNovo   = false;
        if (!sl_activoId && id) sl_activoId = id;
        sl_renderList();
        sl_renderView();
    } catch(e) {
        sl_showMsg('error', 'Erro: ' + (e?.message || JSON.stringify(e)));
        if (btn) { btn.disabled = false; btn.textContent = 'Guardar'; }
    }
};

window.sl_toggleAtivo = async function(id) {
    var s = sl_salas.find(function(x) { return x.id === id; });
    if (!s) return;
    var novoEstado = s.ativo === false;
    if (!confirm((novoEstado ? 'Ativar' : 'Desativar') + ' esta sala?')) return;
    try {
        await sb('salas?id=eq.' + id, { method: 'PATCH', body: JSON.stringify({ ativo: novoEstado }) });
        s.ativo = novoEstado;
        sl_renderList();
        sl_renderView();
    } catch(e) { alert('Erro: ' + (e?.message || e)); }
};

// ── APROVACOES ────────────────────────────────────────────────────────────────
window.sl_aprovar = async function(id) {
    if (!confirm('Aprovar este agendamento?')) return;
    try {
        var userId = localStorage.getItem('zion_id') || null;
        await sb('sala_agendamentos?id=eq.' + id, {
            method: 'PATCH',
            body: JSON.stringify({
                status: 'aprovado',
                aprovado_por: userId,
                aprovado_em: new Date().toISOString(),
            }),
        });
        await sl_notificar(id, 'aprovado', null);
        await sl_reloadAgs();
        sl_updateBadge();
        sl_renderList();
        if (sl_tab === 'aprovacoes' && sl_activoAgId === id) sl_showEmpty();
        else if (sl_activoId) sl_renderView();
    } catch(e) { alert('Erro ao aprovar: ' + (e?.message || e)); }
};

window.sl_rejeitar = async function(id) {
    var motivo = prompt('Motivo da recusa (opcional):');
    if (motivo === null) return;
    try {
        var userId = localStorage.getItem('zion_id') || null;
        await sb('sala_agendamentos?id=eq.' + id, {
            method: 'PATCH',
            body: JSON.stringify({
                status: 'recusado',
                aprovado_por: userId,
                aprovado_em: new Date().toISOString(),
                motivo_recusa: motivo || null,
            }),
        });
        await sl_notificar(id, 'recusado', motivo);
        await sl_reloadAgs();
        sl_updateBadge();
        sl_renderList();
        if (sl_tab === 'aprovacoes' && sl_activoAgId === id) sl_showEmpty();
        else if (sl_activoId) sl_renderView();
    } catch(e) { alert('Erro ao recusar: ' + (e?.message || e)); }
};

async function sl_reloadAgs() {
    sl_ags = await sb('sala_agendamentos?select=*&order=data_inicio.desc').catch(function() { return sl_ags; });
}

async function sl_notificar(agId, estado, motivo) {
    try {
        var a = sl_ags.find(function(x) { return x.id === agId; });
        await sb('notificacoes', {
            method: 'POST',
            body: JSON.stringify({
                tipo:            'agendamento_sala',
                referencia_id:   agId,
                destinatario_id: a?.solicitante_id || null,
                titulo:          estado === 'aprovado' ? 'Agendamento aprovado' : 'Agendamento recusado',
                mensagem:        estado === 'aprovado'
                    ? 'O teu pedido de sala foi aprovado.'
                    : 'O teu pedido de sala foi recusado.' + (motivo ? ' Motivo: ' + motivo : ''),
                lida: false,
            }),
        });
    } catch(_) { /* tabela notificacoes pode nao existir */ }
}

// ══════════════════════════════════════════════════════════════════════════════
// AGENDA MODULE (tab "agenda" do modulo Salas)
// Vistas: dia | semana | mes
// ══════════════════════════════════════════════════════════════════════════════

var sl_cal = {
    view:         'semana',   // 'dia' | 'semana' | 'mes'
    anchorDate:   new Date(), // data referencia da vista
    filterSalas:  null,       // null = todas | Set de sala_ids
    popupEl:      null,
};

// Paleta de cores por sala (deterministica — hash do id)
function sl_salaColor(salaId) {
    var cores = [
        '#7b6af0','#2ecc71','#e67e22','#3498db','#e74c3c',
        '#9b59b6','#1abc9c','#f39c12','#2980b9','#c0392b',
    ];
    var h = 0;
    for (var i = 0; i < (salaId||'').length; i++) h = (h * 31 + (salaId||'').charCodeAt(i)) & 0xFFFFFFFF;
    return cores[Math.abs(h) % cores.length];
}

function sl_renderAgenda() {
    var e = document.getElementById('sl-empty');
    var c = document.getElementById('sl-panel-content');
    if (e) e.style.display = 'none';
    if (c) { c.style.display = 'block'; c.innerHTML = ''; }

    var html = '<div class="sl-cal-wrap">' + sl_buildToolbar() + sl_buildFilter() + '<div class="sl-cal-body" id="sl-cal-body"></div></div>';
    if (c) { c.innerHTML = html; }
    sl_paintCalBody();
}

function sl_buildToolbar() {
    var title = sl_calTitle();
    return '<div class="sl-cal-toolbar">' +
        '<div class="sl-cal-nav">' +
            '<button class="sl-cal-nav-btn" onclick="sl_calNav(-1)" title="Anterior">&#8249;</button>' +
            '<span class="sl-cal-title" id="sl-cal-title">' + title + '</span>' +
            '<button class="sl-cal-nav-btn" onclick="sl_calNav(1)" title="Proximo">&#8250;</button>' +
        '</div>' +
        '<button class="sl-cal-today-btn" onclick="sl_calToday()">Hoje</button>' +
        '<div class="sl-cal-views">' +
            ['dia','semana','mes'].map(function(v) {
                var label = {dia:'Dia', semana:'Semana', mes:'Mes'}[v];
                return "<button class=\"sl-cal-view-btn" + (sl_cal.view === v ? " active" : "") + "\" onclick=\"sl_calSetView(&quot;" + v + "&quot;)\">" + label + "</button>";
            }).join('') +
        '</div>' +
    '</div>';
}

function sl_buildFilter() {
    return '<div class="sl-cal-filter" id="sl-cal-filter">' +
        '<div class="sl-cal-filter-chip' + (!sl_cal.filterSalas ? ' active' : '') + '" onclick="sl_calFilterAll()" style="border-radius:20px">' +
            '<div class="sl-cal-dot" style="background:var(--primary)"></div>Todas' +
        '</div>' +
        sl_salas.filter(function(s) { return s.ativo !== false; }).map(function(s) {
            var cor = sl_salaColor(s.id);
            var on  = !sl_cal.filterSalas || sl_cal.filterSalas.has(s.id);
            return '<div class="sl-cal-filter-chip' + (on ? ' active' : '') + '" onclick="sl_calFilterSala(&quot;' + s.id + '&quot;)" data-sala-id="' + s.id + '">' +
                '<div class="sl-cal-dot" style="background:' + cor + '"></div>' + (s.nome || s.id) +
            '</div>';
        }).join('') +
    '</div>';
}

function sl_calTitle() {
    var d = sl_cal.anchorDate;
    var opts_mes_ano = { month: 'long', year: 'numeric' };
    if (sl_cal.view === 'dia') {
        return d.toLocaleDateString('pt-PT', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    } else if (sl_cal.view === 'semana') {
        var seg = sl_weekStart(d);
        var dom = new Date(seg); dom.setDate(dom.getDate() + 6);
        if (seg.getMonth() === dom.getMonth()) {
            return seg.getDate() + ' – ' + dom.getDate() + ' ' + seg.toLocaleDateString('pt-PT', { month:'long', year:'numeric' });
        }
        return seg.toLocaleDateString('pt-PT', { day:'numeric', month:'short' }) + ' – ' +
               dom.toLocaleDateString('pt-PT', { day:'numeric', month:'short', year:'numeric' });
    } else {
        return d.toLocaleDateString('pt-PT', opts_mes_ano);
    }
}

window.sl_calNav = function(dir) {
    var d = sl_cal.anchorDate;
    if (sl_cal.view === 'dia') {
        d.setDate(d.getDate() + dir);
    } else if (sl_cal.view === 'semana') {
        d.setDate(d.getDate() + dir * 7);
    } else {
        d.setMonth(d.getMonth() + dir);
    }
    sl_cal.anchorDate = new Date(d);
    sl_renderAgenda();
};

window.sl_calToday = function() {
    sl_cal.anchorDate = new Date();
    sl_renderAgenda();
};

window.sl_calSetView = function(v) {
    sl_cal.view = v;
    sl_renderAgenda();
};

window.sl_calFilterAll = function() {
    sl_cal.filterSalas = null;
    sl_rebuildFilter();
    sl_paintCalBody();
};

window.sl_calFilterSala = function(id) {
    if (!sl_cal.filterSalas) {
        // Activar filtro: mostrar apenas esta
        sl_cal.filterSalas = new Set([id]);
    } else {
        if (sl_cal.filterSalas.has(id)) {
            sl_cal.filterSalas.delete(id);
            if (!sl_cal.filterSalas.size) sl_cal.filterSalas = null;
        } else {
            sl_cal.filterSalas.add(id);
        }
    }
    sl_rebuildFilter();
    sl_paintCalBody();
};

function sl_rebuildFilter() {
    var el = document.getElementById('sl-cal-filter');
    if (el) el.outerHTML = sl_buildFilter();
    // Re-bind — nao necessario pois usa onclick inline
}

function sl_paintCalBody() {
    var body = document.getElementById('sl-cal-body');
    if (!body) return;
    var title = document.getElementById('sl-cal-title');
    if (title) title.innerHTML = sl_calTitle();

    // Filtrar agendamentos (excluir recusados da vista principal — optional)
    var ags = sl_ags.filter(function(a) {
        return a.status !== 'recusado';
    });
    if (sl_cal.filterSalas) {
        ags = ags.filter(function(a) { return sl_cal.filterSalas.has(a.sala_id); });
    }

    if (sl_cal.view === 'dia')    body.innerHTML = sl_buildDia(sl_cal.anchorDate, ags);
    if (sl_cal.view === 'semana') body.innerHTML = sl_buildSemana(sl_cal.anchorDate, ags);
    if (sl_cal.view === 'mes')    body.innerHTML = sl_buildMes(sl_cal.anchorDate, ags);
}

// ── VISTA DIA ─────────────────────────────────────────────────────────────────
function sl_buildDia(ref, ags) {
    var dias = [ref];
    return sl_buildTimeGrid(dias, ags, true);
}

// ── VISTA SEMANA ──────────────────────────────────────────────────────────────
function sl_buildSemana(ref, ags) {
    var seg = sl_weekStart(ref);
    var dias = [];
    for (var i = 0; i < 7; i++) {
        var d = new Date(seg); d.setDate(d.getDate() + i);
        dias.push(d);
    }
    return sl_buildTimeGrid(dias, ags, false);
}

function sl_weekStart(d) {
    var day = d.getDay(); // 0=dom
    var diff = (day === 0) ? -6 : 1 - day; // segunda-feira
    var seg = new Date(d);
    seg.setDate(d.getDate() + diff);
    seg.setHours(0,0,0,0);
    return seg;
}

// ── TIME GRID (dia + semana) ──────────────────────────────────────────────────
var HOURS_START = 6;
var HOURS_END   = 24;
var SLOT_H      = 56; // px por hora

function sl_buildTimeGrid(dias, ags, isDia) {
    var today = new Date(); today.setHours(0,0,0,0);
    var nCols = dias.length;
    var totalHours = HOURS_END - HOURS_START;

    // Header
    var headerCols = isDia ? '48px 1fr' : '48px repeat(' + nCols + ', 1fr)';
    var headerHtml = '<div class="sl-week-header" style="grid-template-columns:' + headerCols + '">' +
        '<div class="sl-week-header-time"></div>' +
        dias.map(function(d) {
            var isToday = d.getTime() === today.getTime();
            var nomeDia = d.toLocaleDateString('pt-PT', { weekday:'short' }).replace('.','');
            return '<div class="sl-week-header-day' + (isToday ? ' today' : '') + '" onclick="sl_calSetView(\'dia\');sl_cal.anchorDate=new Date(' + d.getTime() + ');sl_renderAgenda();">' +
                '<div class="sl-wd-name">' + nomeDia.toUpperCase() + '</div>' +
                '<div class="sl-wd-num">' + d.getDate() + '</div>' +
            '</div>';
        }).join('') +
    '</div>';

    // Body columns
    var bodyCols = isDia ? '48px 1fr' : '48px repeat(' + nCols + ', 1fr)';
    var bodyHtml = '<div class="sl-week-body" style="display:grid;grid-template-columns:' + bodyCols + '">';

    // Time column
    var timeHtml = '<div class="sl-time-col">';
    for (var h = HOURS_START; h < HOURS_END; h++) {
        timeHtml += '<div class="sl-time-slot">' + String(h).padStart(2,'0') + ':00</div>';
    }
    timeHtml += '</div>';
    bodyHtml += timeHtml;

    // Day columns with events
    dias.forEach(function(d) {
        var isToday = d.getTime() === today.getTime();
        bodyHtml += '<div class="sl-day-col' + (isToday ? ' today' : '') + '">';

        // Hour lines
        for (var h = HOURS_START; h < HOURS_END; h++) {
            bodyHtml += '<div class="sl-hour-line"></div>';
        }

        // Now line (only today)
        if (isToday) {
            var now = new Date();
            var pct = ((now.getHours() - HOURS_START) + now.getMinutes() / 60) / totalHours * 100;
            if (pct >= 0 && pct <= 100) {
                bodyHtml += '<div class="sl-now-line" style="top:' + pct + '%"></div>';
            }
        }

        // Events for this day
        var dayAgs = sl_agsForDay(ags, d);
        dayAgs = sl_layoutOverlaps(dayAgs, d);

        dayAgs.forEach(function(a) {
            var ev = sl_buildEvEl(a, d);
            bodyHtml += ev;
        });

        bodyHtml += '</div>';
    });

    bodyHtml += '</div>';

    return '<div class="sl-week-grid" style="min-height:' + (totalHours * SLOT_H) + 'px">' +
        headerHtml + bodyHtml + '</div>';
}

function sl_agsForDay(ags, d) {
    var dStart = new Date(d); dStart.setHours(0,0,0,0);
    var dEnd   = new Date(d); dEnd.setHours(23,59,59,999);
    return ags.filter(function(a) {
        var s = new Date(a.data_inicio);
        var e = new Date(a.data_fim);
        return s <= dEnd && e >= dStart;
    });
}

// Layout simples: eventos sobrepostos ficam lado a lado
function sl_layoutOverlaps(ags, d) {
    // Sort by start
    ags = ags.slice().sort(function(a, b) {
        return new Date(a.data_inicio) - new Date(b.data_inicio);
    });
    // Assign columns
    var cols = [];
    ags.forEach(function(a) {
        var aStart = new Date(a.data_inicio);
        var aEnd   = new Date(a.data_fim);
        var placed = false;
        for (var c = 0; c < cols.length; c++) {
            var lastEnd = new Date(cols[c][cols[c].length - 1]._end);
            if (aStart >= lastEnd) {
                cols[c].push(a);
                a._col = c;
                placed = true;
                break;
            }
        }
        if (!placed) {
            a._col = cols.length;
            cols.push([a]);
        }
        a._end = aEnd;
        a._totalCols = 1; // updated below
    });
    // Update totalCols
    var nCols = cols.length;
    ags.forEach(function(a) { a._totalCols = nCols; });
    return ags;
}

function sl_buildEvEl(a, dayRef) {
    var dayStart = new Date(dayRef); dayStart.setHours(0,0,0,0);
    var evStart  = new Date(a.data_inicio);
    var evEnd    = new Date(a.data_fim);
    var gridStart = new Date(dayRef); gridStart.setHours(HOURS_START,0,0,0);
    var gridEnd   = new Date(dayRef); gridEnd.setHours(HOURS_END,0,0,0);

    var s = Math.max(evStart.getTime(), gridStart.getTime());
    var e = Math.min(evEnd.getTime(),   gridEnd.getTime());

    var totalMs = (HOURS_END - HOURS_START) * 3600000;
    var topPct  = (s - gridStart.getTime()) / totalMs * 100;
    var htPct   = Math.max((e - s) / totalMs * 100, 1.2);

    var colW   = 100 / a._totalCols;
    var leftPct = a._col * colW;
    var widPct  = colW - 0.5;

    var sala  = sl_salas.find(function(sx) { return sx.id === a.sala_id; });
    var cor   = sl_salaColor(a.sala_id);
    var title = a.titulo || (sala ? sala.nome : '—');
    var sub   = sala ? sala.nome : '';
    var hIni  = evStart.toLocaleTimeString('pt-PT', {hour:'2-digit',minute:'2-digit'});
    var hFim  = evEnd.toLocaleTimeString('pt-PT', {hour:'2-digit',minute:'2-digit'});

    var statusCls = 'status-' + (a.status || 'aprovado');
    var idx = sl_ags.findIndex(function(x) { return x.id === a.id; });

    return '<div class="sl-ev ' + statusCls + '" ' +
        'style="top:' + topPct + '%;height:' + htPct + '%;left:' + leftPct + '%;width:' + widPct + '%;' +
        'border-left-color:' + cor + ';background:' + cor + '22"' +
        ' onclick="sl_showEvPopup(event,' + idx + ')" title="' + title + '">' +
        '<div class="sl-ev-title">' + title + '</div>' +
        '<div class="sl-ev-sub">' + hIni + '–' + hFim + (sub ? ' · ' + sub : '') + '</div>' +
    '</div>';
}

// ── VISTA MES ─────────────────────────────────────────────────────────────────
function sl_buildMes(ref, ags) {
    var year  = ref.getFullYear();
    var month = ref.getMonth();
    var today = new Date(); today.setHours(0,0,0,0);

    var firstDay = new Date(year, month, 1);
    var lastDay  = new Date(year, month + 1, 0);

    // Start from monday before first day
    var startOffset = (firstDay.getDay() + 6) % 7; // 0=mon
    var gridStart = new Date(firstDay); gridStart.setDate(1 - startOffset);
    // 6 weeks max
    var cells = [];
    for (var i = 0; i < 42; i++) {
        var d = new Date(gridStart); d.setDate(gridStart.getDate() + i);
        cells.push(d);
    }

    var diaNomes = ['Seg','Ter','Qua','Qui','Sex','Sab','Dom'];
    var headerHtml = diaNomes.map(function(n) {
        return '<div class="sl-month-header-day">' + n + '</div>';
    }).join('');

    var bodyHtml = cells.map(function(d) {
        var isToday     = d.getTime() === today.getTime();
        var otherMonth  = d.getMonth() !== month;
        var dayAgs = sl_agsForDay(ags, d)
            .sort(function(a, b) { return new Date(a.data_inicio) - new Date(b.data_inicio); });

        var evHtml = '';
        var MAX_SHOW = 3;
        dayAgs.slice(0, MAX_SHOW).forEach(function(a) {
            evHtml += '<div class="sl-month-ev status-' + (a.status||'aprovado') + '">' +
                (a.titulo || '—') + '</div>';
        });
        if (dayAgs.length > MAX_SHOW) {
            evHtml += '<div class="sl-month-more">+' + (dayAgs.length - MAX_SHOW) + ' mais</div>';
        }

        var ts = d.getTime();
        return '<div class="sl-month-cell' + (isToday ? ' today' : '') + (otherMonth ? ' other-month' : '') + '" ' +
            'onclick="sl_cal.anchorDate=new Date(' + ts + ');sl_calSetView(\'dia\')">' +
            '<div class="sl-month-num">' + d.getDate() + '</div>' +
            evHtml +
        '</div>';
    }).join('');

    return '<div class="sl-month-grid">' +
        '<div class="sl-month-header">' + headerHtml + '</div>' +
        '<div class="sl-month-body">' + bodyHtml + '</div>' +
    '</div>';
}

// ── POPUP EVENTO ──────────────────────────────────────────────────────────────
window.sl_showEvPopup = function(evt, idx) {
    evt.stopPropagation();
    sl_closeEvPopup();
    var a    = sl_ags[idx];
    if (!a) return;
    var sala = sl_salas.find(function(s) { return s.id === a.sala_id; });
    var ini  = sl_fmtDataHora(a.data_inicio);
    var fim  = sl_fmtHora(a.data_fim);

    var pop = document.createElement('div');
    pop.className  = 'sl-ev-popup';
    pop.id         = 'sl-ev-popup';
    pop.innerHTML  =
        '<button class="sl-ev-popup-close" onclick="sl_closeEvPopup()">×</button>' +
        '<div class="sl-ev-popup-title">' + (a.titulo || '—') + '</div>' +
        '<div class="sl-ev-popup-row"><strong>Sala</strong>: ' + (sala ? sala.nome : '—') + '</div>' +
        '<div class="sl-ev-popup-row"><strong>Horario</strong>: ' + ini + ' – ' + fim + '</div>' +
        (a.solicitante_nome ? '<div class="sl-ev-popup-row"><strong>Solicitante</strong>: ' + a.solicitante_nome + '</div>' : '') +
        (a.descricao ? '<div class="sl-ev-popup-row"><strong>Descricao</strong>: ' + a.descricao + '</div>' : '') +
        '<div class="sl-ev-popup-row"><strong>Estado</strong>: <span class="sl-ag-status ' + (a.status||'') + '" style="display:inline-flex">' + (a.status||'—') + '</span></div>' +
        (a.status === 'pendente' ? '<div class="sl-ev-popup-btns">' +
            '<button class="sl-btn approve" style="font-size:10px" onclick="sl_closeEvPopup();sl_aprovar(&quot;' + a.id + '&quot;)">Aprovar</button>' +
            '<button class="sl-btn danger" style="font-size:10px" onclick="sl_closeEvPopup();sl_rejeitar(&quot;' + a.id + '&quot;)">Rejeitar</button>' +
        '</div>' : '') +
        (a.status === 'recusado' && a.motivo_recusa ? '<div class="sl-ev-popup-row" style="margin-top:6px"><em>' + a.motivo_recusa + '</em></div>' : '');

    // Position near click
    document.body.appendChild(pop);
    sl_cal.popupEl = pop;
    var x = Math.min(evt.clientX + 8, window.innerWidth  - 320);
    var y = Math.min(evt.clientY + 8, window.innerHeight - 200);
    pop.style.left = x + 'px';
    pop.style.top  = y + 'px';

    // Click outside to close
    setTimeout(function() {
        document.addEventListener('click', sl_closeEvPopup, { once: true });
    }, 10);
};

window.sl_closeEvPopup = function() {
    var p = document.getElementById('sl-ev-popup');
    if (p) p.remove();
    sl_cal.popupEl = null;
};
