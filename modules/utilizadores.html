<style>
    .ut-wrap {
        display: flex;
        height: 100%;
        min-height: 0;
        overflow: hidden;
        font-family: var(--font-body);
    }

    .ut-side {
        width: 270px;
        flex-shrink: 0;
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        background: var(--bg-card);
        overflow: hidden;
    }
    .ut-side-head {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        gap: 6px;
        align-items: center;
        flex-shrink: 0;
    }
    .ut-search {
        flex: 1;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 7px 10px;
        font-size: 12px;
        font-family: var(--font-body);
        color: var(--text-main);
        outline: none;
    }
    .ut-search:focus { border-color: var(--primary); }

    .ut-btn-novo {
        padding: 7px 12px;
        border-radius: 8px;
        border: none;
        background: var(--primary);
        color: #fff;
        font-family: var(--font-title);
        font-size: 9px;
        letter-spacing: 1px;
        cursor: pointer;
        white-space: nowrap;
    }
    .ut-btn-novo:hover { background: var(--primary-dark); }

    .ut-legend {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        padding: 6px 12px;
        background: var(--bg-input);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
    }
    .ut-legend-item {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 9px;
        font-family: var(--font-title);
        letter-spacing: 1px;
        color: var(--text-faint);
        text-transform: uppercase;
    }
    .ut-legend-pip {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
    }

    .ut-list { flex: 1; overflow-y: auto; }

    .ut-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        cursor: pointer;
        border-left: 3px solid transparent;
        border-bottom: 1px solid var(--border);
        transition: filter 0.1s;
    }
    .ut-item:hover   { filter: brightness(0.94); }
    .ut-item.active  { filter: brightness(0.90); }

    .ut-item-admin    { background: rgba(198,40,40,0.07); }
    .ut-item-membro   { background: rgba(0,144,152,0.06); }
    .ut-item-visitante{ background: rgba(100,70,200,0.06); }
    .ut-item-outro    { background: rgba(80,80,80,0.05); }

    .ut-item-admin.active    { border-left-color: #c62828; }
    .ut-item-membro.active   { border-left-color: var(--primary); }
    .ut-item-visitante.active{ border-left-color: #7056c8; }
    .ut-item-outro.active    { border-left-color: #888; }

    .ut-avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-title);
        font-size: 14px;
        font-weight: 700;
        flex-shrink: 0;
    }
    .ut-item-info { flex: 1; min-width: 0; }
    .ut-item-nome {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-main);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .ut-item-sub {
        font-size: 10px;
        color: var(--text-faint);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .ut-pill {
        font-size: 8px;
        font-family: var(--font-title);
        letter-spacing: 1px;
        padding: 2px 7px;
        border-radius: 20px;
        white-space: nowrap;
        flex-shrink: 0;
    }

    .ut-panel { flex: 1; overflow-y: auto; background: var(--bg); }
    .ut-panel-empty {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        color: var(--text-faint);
    }
    .ut-panel-empty-icon {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: var(--bg-input);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .ut-panel-empty-txt {
        font-family: var(--font-title);
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
    }

    .ut-profile {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 18px 20px 12px;
        border-bottom: 1px solid var(--border);
    }
    .ut-profile-av {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-title);
        font-size: 18px;
        font-weight: 700;
        flex-shrink: 0;
    }
    .ut-profile-nome { font-family: var(--font-title); font-size: 14px; letter-spacing: 1px; color: var(--text-main); }
    .ut-profile-email { font-size: 12px; color: var(--text-faint); margin-top: 2px; }
    .ut-profile-badges { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }

    .ut-form { padding: 16px 20px 32px; }

    .ut-section-title {
        font-family: var(--font-title);
        font-size: 9px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-faint);
        padding: 16px 0 8px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .ut-field-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px 16px;
        margin-bottom: 4px;
    }
    .ut-field { display: flex; flex-direction: column; gap: 4px; }
    .ut-field.full { grid-column: 1 / -1; }
    .ut-label {
        font-size: 9px;
        font-family: var(--font-title);
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--text-faint);
    }
    .ut-input, .ut-select {
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 13px;
        font-family: var(--font-body);
        color: var(--text-main);
        outline: none;
        transition: border-color 0.15s;
    }
    .ut-input:focus, .ut-select:focus { border-color: var(--primary); }
    .ut-input[readonly] { opacity: 0.6; cursor: default; }
    .ut-toggle-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--text-main);
        cursor: pointer;
        padding: 6px 0;
    }
    .ut-toggle-row input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--primary);
        cursor: pointer;
    }

    .ut-msg {
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 12px;
        margin-bottom: 10px;
        display: none;
    }
    .ut-msg.error   { display: block; background: rgba(198,40,40,0.08); color: #c62828; border: 1px solid rgba(198,40,40,0.25); }
    .ut-msg.success { display: block; background: rgba(46,125,50,0.08); color: #2e7d32; border: 1px solid rgba(46,125,50,0.25); }

    .ut-admin-aviso {
        background: rgba(198,40,40,0.06);
        border: 1px solid rgba(198,40,40,0.22);
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 12px;
        color: #c62828;
        line-height: 1.6;
        margin-bottom: 12px;
    }

    .ut-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        padding-top: 16px;
        border-top: 1px solid var(--border);
        margin-top: 20px;
    }
    .ut-btn-cancel {
        padding: 8px 16px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg-input);
        color: var(--text-muted);
        font-family: var(--font-title);
        font-size: 9px;
        letter-spacing: 1px;
        cursor: pointer;
    }
    .ut-btn-save {
        padding: 8px 20px;
        border-radius: 8px;
        border: none;
        background: var(--primary);
        color: #fff;
        font-family: var(--font-title);
        font-size: 9px;
        letter-spacing: 1px;
        cursor: pointer;
    }
    .ut-btn-save:hover { background: var(--primary-dark); }
    .ut-btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .ut-btn-perigo {
        padding: 8px 14px;
        border-radius: 8px;
        border: 1px solid rgba(198,40,40,0.35);
        background: rgba(198,40,40,0.06);
        color: #c62828;
        font-family: var(--font-title);
        font-size: 9px;
        letter-spacing: 1px;
        cursor: pointer;
        margin-right: auto;
    }

    .ut-perms-box { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .ut-perms-head {
        display: grid;
        grid-template-columns: 1fr repeat(4, 68px);
        background: var(--bg-input);
        padding: 8px 12px;
        font-family: var(--font-title);
        font-size: 9px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-faint);
        border-bottom: 2px solid var(--border);
    }
    .ut-perms-head span { text-align: center; }
    .ut-perms-head span:first-child { text-align: left; }

    .ut-perm-row {
        display: grid;
        grid-template-columns: 1fr repeat(4, 68px);
        padding: 8px 12px;
        align-items: center;
        border-bottom: 1px solid var(--border);
        transition: filter 0.1s;
    }
    .ut-perm-row:last-child { border-bottom: none; }
    .ut-perm-row:hover { filter: brightness(0.93); }
    .ut-perm-row:nth-child(odd)  { background: var(--bg-card); }
    .ut-perm-row:nth-child(even) { background: var(--bg-input); }

    .ut-perm-nome { font-size: 12px; color: var(--text-main); font-weight: 500; }
    .ut-perm-cell { display: flex; align-items: center; justify-content: center; }
    .ut-perm-cell input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
    .ut-perm-na { font-size: 13px; color: var(--border); display: flex; align-items: center; justify-content: center; }

    .ut-perms-btns { display: flex; gap: 6px; }
    .ut-btn-tudo {
        font-size: 9px;
        font-family: var(--font-title);
        letter-spacing: 1px;
        padding: 3px 10px;
        border-radius: 20px;
        cursor: pointer;
    }
    .ut-btn-tudo.sel { border: 1px solid var(--primary); background: var(--primary-faint); color: var(--primary-dark); }
    .ut-btn-tudo.clr { border: 1px solid var(--border); background: var(--bg-input); color: var(--text-faint); }
    .ut-perms-disabled { opacity: 0.35; pointer-events: none; }
</style>

<div class="ut-wrap">
    <div class="ut-side">
        <div class="ut-side-head">
            <input class="ut-search" id="ut-search" placeholder="Pesquisar utilizador..." oninput="ut_filtrar()">
            <button class="ut-btn-novo" onclick="ut_novo()">+ Novo</button>
        </div>
        <div class="ut-legend">
            <div class="ut-legend-item"><div class="ut-legend-pip" style="background:#c62828"></div>Admin</div>
            <div class="ut-legend-item"><div class="ut-legend-pip" style="background:var(--primary)"></div>Membro</div>
            <div class="ut-legend-item"><div class="ut-legend-pip" style="background:#7056c8"></div>Visitante</div>
            <div class="ut-legend-item"><div class="ut-legend-pip" style="background:#888"></div>Outro</div>
        </div>
        <div class="ut-list" id="ut-list">
            <div style="padding:20px;text-align:center;font-size:12px;color:var(--text-faint)">A carregar...</div>
        </div>
    </div>
    <div class="ut-panel" id="ut-panel">
        <div class="ut-panel-empty">
            <div class="ut-panel-empty-icon">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
            <div class="ut-panel-empty-txt">Seleciona um utilizador</div>
        </div>
    </div>
</div>

<script>
    /* ── Helper global — converte secao com hífen para underscore (chave de coluna na BD) ── */
    function ut_secKey(secao) {
        return secao.replace(/-/g, '_');
    }

    (function () {
        'use strict';

        var ut_dados = [];
        var ut_id    = null;

        var UT_COR = {
            admin:     { bg: 'rgba(198,40,40,0.13)',   fg: '#c62828' },
            membro:    { bg: 'rgba(0,144,152,0.13)',   fg: 'var(--primary-dark)' },
            visitante: { bg: 'rgba(112,86,200,0.13)',  fg: '#7056c8' },
            outro:     { bg: 'rgba(100,100,100,0.12)', fg: '#666' },
        };
        function ut_cor(tipo) { return UT_COR[tipo] || UT_COR.outro; }

        /* ── Token da sessão ── */
        function ut_getToken() {
            try {
                var raw = localStorage.getItem('zion_session');
                if (!raw) return null;
                return JSON.parse(raw).token || null;
            } catch(e) { return null; }
        }

        /* ── Fetch para endpoints Vercel ── */
        async function ut_api(path, body) {
            var res = await fetch(path, {
                method: 'POST',
                headers: {
                    'Content-Type':  'application/json',
                    'Authorization': 'Bearer ' + (ut_getToken() || ''),
                },
                body: JSON.stringify(body),
            });
            var data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Erro na API');
            return data;
        }

        /* ── INIT ── */
        async function ut_init() {
            ut_injectModalPassword();
            try {
                ut_dados = await sb('usuarios?select=*&order=nome') || [];
            } catch(e) {
                ut_dados = [];
                console.error('Erro ao carregar utilizadores:', e);
            }
            ut_renderList();
        }

        /* ── SIDEBAR ── */
        function ut_renderList() {
            var el = document.getElementById('ut-list');
            if (!el) return;
            var q = (document.getElementById('ut-search')?.value || '').toLowerCase();
            var lista = ut_dados.filter(function(u) {
                if (u.ativo === false) return false;
                if (!q) return true;
                return (u.nome || '').toLowerCase().includes(q) || (u.email || '').toLowerCase().includes(q);
            });

            if (!lista.length) {
                el.innerHTML = '<div style="padding:20px;text-align:center;font-size:12px;color:var(--text-faint)">Nenhum utilizador encontrado</div>';
                return;
            }

            var TIPO_LABEL  = { admin:'Admin', membro:'Membro', visitante:'Visitante', outro:'Outro' };
            var TIPO_CLASSE = { admin:'ut-item-admin', membro:'ut-item-membro', visitante:'ut-item-visitante', outro:'ut-item-outro' };

            el.innerHTML = lista.map(function(u) {
                var tipo   = u.tipo || 'outro';
                var cor    = ut_cor(tipo);
                var ini    = (u.nome || u.email || 'U')[0].toUpperCase();
                var label  = u.e_admin ? 'ADMIN' : (TIPO_LABEL[tipo] || tipo).toUpperCase();
                var classe = TIPO_CLASSE[tipo] || 'ut-item-outro';
                var ativo  = ut_id === u.id ? ' active' : '';
                var numSec = 0;
                if (typeof REGISTRO_MODULOS !== 'undefined') {
                    numSec = REGISTRO_MODULOS.filter(function(m) {
                        return u.e_admin || u['ver_' + ut_secKey(m.secao)];
                    }).length;
                }
                return '<div class="ut-item ' + classe + ativo + '" onclick="ut_selecionar(\'' + u.id + '\')">' +
                    '<div class="ut-avatar" style="background:' + cor.bg + ';color:' + cor.fg + '">' + ini + '</div>' +
                    '<div class="ut-item-info">' +
                    '<div class="ut-item-nome">' + (u.nome || u.email || '—') + '</div>' +
                    '<div class="ut-item-sub">' + (u.e_admin ? 'Acesso total' : numSec + ' secções') + '</div>' +
                    '</div>' +
                    '<span class="ut-pill" style="background:' + cor.bg + ';color:' + cor.fg + ';border:1px solid ' + cor.fg + '33">' + label + '</span>' +
                    '</div>';
            }).join('');
        }

        window.ut_filtrar = function() { ut_renderList(); };

        window.ut_selecionar = function(id) {
            ut_id = id;
            ut_renderList();
            var u = ut_dados.find(function(x) { return x.id === id; });
            if (u) ut_renderForm(u);
        };

        window.ut_novo = function() {
            ut_id = null;
            ut_renderList();
            ut_renderFormNovo();
        };

        /* ── FORM EDITAR ── */
        function ut_renderForm(u) {
            var panel = document.getElementById('ut-panel');
            if (!panel) return;
            var tipo = u.tipo || 'outro';
            var cor  = ut_cor(tipo);
            var ini  = (u.nome || u.email || 'U')[0].toUpperCase();
            var TIPO_LABEL = { admin:'Admin', membro:'Membro', visitante:'Visitante', outro:'Outro' };
            var numSec = 0;
            if (typeof REGISTRO_MODULOS !== 'undefined') {
                numSec = REGISTRO_MODULOS.filter(function(m) {
                    return u.e_admin || u['ver_' + ut_secKey(m.secao)];
                }).length;
            }

            panel.innerHTML =
                '<div class="ut-profile">' +
                '<div class="ut-profile-av" style="background:' + cor.bg + ';color:' + cor.fg + '">' + ini + '</div>' +
                '<div>' +
                '<div class="ut-profile-nome">' + (u.nome || '—') + '</div>' +
                '<div class="ut-profile-email">' + (u.email || '') + '</div>' +
                '<div class="ut-profile-badges">' +
                '<span class="ut-pill" style="background:' + cor.bg + ';color:' + cor.fg + ';border:1px solid ' + cor.fg + '33">' +
                (u.e_admin ? 'Admin Total' : (TIPO_LABEL[tipo] || tipo)) + '</span>' +
                (!u.e_admin ? '<span class="ut-pill" style="background:var(--bg-input);color:var(--text-faint);border:1px solid var(--border)">' + numSec + ' secções</span>' : '') +
                (u.ativo === false ? '<span class="ut-pill" style="background:var(--bg-input);color:var(--text-faint);border:1px solid var(--border)">Inativo</span>' : '') +
                '</div></div></div>' +
                '<div class="ut-form">' +
                '<div class="ut-msg" id="ut-msg"></div>' +
                '<div class="ut-section-title">Dados do Utilizador' +
                '<button class="ut-btn-tudo clr" onclick="ut_pwAbrir(\'' + u.id + '\')" style="padding:3px 12px">🔑 Alterar Password</button>' +
                '</div>' +
                '<div class="ut-field-grid">' +
                '<div class="ut-field"><label class="ut-label">Nome</label>' +
                '<input class="ut-input" id="uf-nome" type="text" value="' + (u.nome || '') + '" placeholder="Nome completo"></div>' +
                '<div class="ut-field"><label class="ut-label">Email</label>' +
                '<input class="ut-input" id="uf-email" type="email" value="' + (u.email || '') + '" readonly></div>' +
                '<div class="ut-field"><label class="ut-label">Tipo</label>' +
                '<select class="ut-select" id="uf-tipo">' +
                '<option value="membro"    ' + (u.tipo === 'membro'    ? 'selected' : '') + '>Membro</option>' +
                '<option value="visitante" ' + (u.tipo === 'visitante' ? 'selected' : '') + '>Visitante</option>' +
                '<option value="admin"     ' + (u.tipo === 'admin'     ? 'selected' : '') + '>Admin</option>' +
                '<option value="outro"     ' + (u.tipo === 'outro'     ? 'selected' : '') + '>Outro</option>' +
                '</select></div>' +
                '<div class="ut-field" style="justify-content:flex-end;padding-top:20px">' +
                '<label class="ut-toggle-row"><input type="checkbox" id="uf-admin" ' + (u.e_admin ? 'checked' : '') +
                ' onchange="ut_onAdminChange(this.checked)">Admin Total (acesso a tudo)</label></div></div>' +
                '<div class="ut-admin-aviso" id="ut-aviso-admin" style="' + (u.e_admin ? '' : 'display:none') + '">' +
                'Utilizador com acesso total. As permissões por secção são ignoradas enquanto "Admin Total" estiver ativo.' +
                '</div>' +
                ut_buildPerms(u) +
                '<div class="ut-actions">' +
                '<button class="ut-btn-perigo" onclick="ut_toggleAtivo(\'' + u.id + '\',' + (u.ativo !== false) + ')">' +
                (u.ativo !== false ? 'Inativar' : 'Ativar') + '</button>' +
                '<button class="ut-btn-cancel" onclick="ut_fechar()">Cancelar</button>' +
                '<button class="ut-btn-save" id="ut-btn-save" onclick="ut_guardar(\'' + u.id + '\')">Guardar Alterações</button>' +
                '</div></div>';
        }

        /* ── FORM NOVO ── */
        function ut_renderFormNovo() {
            var panel = document.getElementById('ut-panel');
            if (!panel) return;
            panel.innerHTML =
                '<div class="ut-profile" style="border-bottom:2px solid var(--primary)">' +
                '<div class="ut-profile-av" style="background:var(--primary-faint);color:var(--primary-dark)">+</div>' +
                '<div><div class="ut-profile-nome">Novo Utilizador</div>' +
                '<div class="ut-profile-email">Preenche os campos e guarda</div>' +
                '</div></div>' +
                '<div class="ut-form">' +
                '<div class="ut-msg" id="ut-msg"></div>' +
                '<div class="ut-section-title">Dados do Utilizador</div>' +
                '<div class="ut-field-grid">' +
                '<div class="ut-field"><label class="ut-label">Nome</label>' +
                '<input class="ut-input" id="uf-nome" type="text" placeholder="Nome completo"></div>' +
                '<div class="ut-field"><label class="ut-label">Email *</label>' +
                '<input class="ut-input" id="uf-email" type="email" placeholder="email@exemplo.com"></div>' +
                '<div class="ut-field"><label class="ut-label">Password inicial *</label>' +
                '<input class="ut-input" id="uf-password" type="password" placeholder="Mínimo 6 caracteres"></div>' +
                '<div class="ut-field"><label class="ut-label">Tipo</label>' +
                '<select class="ut-select" id="uf-tipo">' +
                '<option value="membro">Membro</option>' +
                '<option value="visitante">Visitante</option>' +
                '<option value="admin">Admin</option>' +
                '<option value="outro">Outro</option>' +
                '</select></div>' +
                '<div class="ut-field full"><label class="ut-toggle-row">' +
                '<input type="checkbox" id="uf-admin" onchange="ut_onAdminChange(this.checked)">Admin Total (acesso a tudo)' +
                '</label></div></div>' +
                '<div class="ut-admin-aviso" id="ut-aviso-admin" style="display:none">Este utilizador terá acesso total ao sistema.</div>' +
                ut_buildPerms(null) +
                '<div class="ut-actions">' +
                '<button class="ut-btn-cancel" onclick="ut_fechar()">Cancelar</button>' +
                '<button class="ut-btn-save" id="ut-btn-save" onclick="ut_guardar(\'\')">Criar Utilizador</button>' +
                '</div></div>';
        }

        /* ── TABELA DE PERMISSÕES ── */
        function ut_buildPerms(u) {
            if (typeof REGISTRO_MODULOS === 'undefined') {
                return '<div style="color:var(--text-faint);font-size:12px;padding:12px 0">REGISTRO_MODULOS não encontrado.</div>';
            }
            var ACOES    = ['ver', 'criar', 'editar', 'eliminar'];
            var isAdmin  = u ? u.e_admin : false;

            var linhas = REGISTRO_MODULOS.map(function(mod) {
                var cols = ACOES.map(function(acao) {
                    if (!mod.acoes.includes(acao)) return '<div class="ut-perm-na">&#8212;</div>';
                    var elId    = 'pv-' + acao + '-' + ut_secKey(mod.secao);
                    var colKey  = acao + '_' + ut_secKey(mod.secao);
                    var checked = (u && u[colKey]) ? 'checked' : '';
                    return '<div class="ut-perm-cell">' +
                        '<input type="checkbox" id="' + elId + '" ' + checked +
                        ' onchange="ut_syncPerm(\'' + ut_secKey(mod.secao) + '\',\'' + acao + '\',this.checked)">' +
                        '</div>';
                }).join('');
                return '<div class="ut-perm-row"><div class="ut-perm-nome">' + mod.label + '</div>' + cols + '</div>';
            }).join('');

            return '<div class="ut-section-title">Permissões por Secção' +
                '<div class="ut-perms-btns">' +
                '<button class="ut-btn-tudo sel" onclick="ut_setTodas(true)">Selecionar Tudo</button>' +
                '<button class="ut-btn-tudo clr" onclick="ut_setTodas(false)">Limpar Tudo</button>' +
                '</div></div>' +
                '<div style="font-size:11px;color:var(--text-faint);margin-bottom:10px;line-height:1.8">' +
                '<strong>Ver</strong> = acesso à aba &nbsp;·&nbsp; ' +
                '<strong>Criar</strong> = pode adicionar &nbsp;·&nbsp; ' +
                '<strong>Editar</strong> = pode modificar &nbsp;·&nbsp; ' +
                '<strong>Eliminar</strong> = pode desativar</div>' +
                '<div class="ut-perms-box ' + (isAdmin ? 'ut-perms-disabled' : '') + '" id="ut-bloco-perms">' +
                '<div class="ut-perms-head"><span>Secção</span>' +
                '<span>Ver</span><span>Criar</span><span>Editar</span><span>Eliminar</span></div>' +
                linhas + '</div>';
        }

        /* ── INTERACTIVIDADE PERMISSÕES ── */
        window.ut_onAdminChange = function(checked) {
            var aviso = document.getElementById('ut-aviso-admin');
            var bloco = document.getElementById('ut-bloco-perms');
            if (aviso) aviso.style.display = checked ? 'block' : 'none';
            if (bloco) bloco.classList.toggle('ut-perms-disabled', checked);
        };

        window.ut_syncPerm = function(secao, acao, checked) {
            /* Ao marcar criar/editar/eliminar → força ver */
            if (checked && acao !== 'ver') {
                var el = document.getElementById('pv-ver-' + secao);
                if (el) el.checked = true;
            }
            /* Ao desmarcar ver → limpa todas as outras */
            if (!checked && acao === 'ver') {
                ['criar', 'editar', 'eliminar'].forEach(function(a) {
                    var el = document.getElementById('pv-' + a + '-' + secao);
                    if (el) el.checked = false;
                });
            }
        };

        window.ut_setTodas = function(val) {
            if (typeof REGISTRO_MODULOS === 'undefined') return;
            REGISTRO_MODULOS.forEach(function(mod) {
                mod.acoes.forEach(function(acao) {
                    var el = document.getElementById('pv-' + acao + '-' + ut_secKey(mod.secao));
                    if (el) el.checked = val;
                });
            });
        };

        /* ── GUARDAR ── */
        window.ut_guardar = async function(id) {
            var get   = function(k) { var el = document.getElementById('uf-' + k); return el ? (el.value || '').trim() || null : null; };
            var chkEl = function(k) { var el = document.getElementById('uf-' + k); return el ? el.checked : false; };

            var email   = get('email');
            var isAdmin = chkEl('admin');

            if (!email) { ut_showMsg('Email obrigatório.', 'error'); return; }

            /* Recolher permissões — numa única passagem, usando ut_secKey */
            var perms = {};
            if (typeof REGISTRO_MODULOS !== 'undefined') {
                REGISTRO_MODULOS.forEach(function(mod) {
                    mod.acoes.forEach(function(acao) {
                        var key = acao + '_' + ut_secKey(mod.secao);
                        var el  = document.getElementById('pv-' + acao + '-' + ut_secKey(mod.secao));
                        /* Se admin → força tudo true; senão lê o checkbox */
                        perms[key] = isAdmin ? true : (el ? el.checked : false);
                    });
                });
            }

            var btn = document.getElementById('ut-btn-save');
            if (btn) { btn.disabled = true; btn.textContent = 'A guardar...'; }

            try {
                if (!id) {
                    /* ── CRIAR ── */
                    var pw = get('password');
                    if (!pw || pw.length < 6) {
                        ut_showMsg('Password mínima de 6 caracteres.', 'error');
                        if (btn) { btn.disabled = false; btn.textContent = 'Criar Utilizador'; }
                        return;
                    }
                    var result = await ut_api('/api/auth/create-user', Object.assign({
                        email:    email,
                        password: pw,
                        nome:     get('nome'),
                        tipo:     get('tipo'),
                        e_admin:  isAdmin,
                        ativo:    true,
                    }, perms));

                    ut_showMsg('Utilizador criado com sucesso!', 'success');
                    ut_dados = await sb('usuarios?select=*&order=nome') || [];
                    var criado = result.user || ut_dados.find(function(x) { return x.email === email; });
                    if (criado) {
                        ut_id = criado.id;
                        ut_renderList();
                        setTimeout(function() {
                            var u = ut_dados.find(function(x) { return x.id === criado.id; });
                            if (u) ut_renderForm(u);
                        }, 700);
                    } else {
                        ut_renderList();
                    }

                } else {
                    /* ── EDITAR ── */
                    var body = Object.assign({
                        nome:       get('nome'),
                        tipo:       get('tipo'),
                        e_admin:    isAdmin,
                        ativo:      true,
                        updated_at: new Date().toISOString(),
                    }, perms);

                    await sb('usuarios?id=eq.' + id, { method: 'PATCH', body: JSON.stringify(body) });

                    ut_showMsg('Guardado com sucesso!', 'success');
                    ut_dados = await sb('usuarios?select=*&order=nome') || [];
                    ut_renderList();
                    var updated = ut_dados.find(function(x) { return x.id === id; });
                    if (updated) setTimeout(function() { ut_renderForm(updated); }, 700);
                }

            } catch(e) {
                ut_showMsg('Erro: ' + (e?.message || JSON.stringify(e)), 'error');
                if (btn) { btn.disabled = false; btn.textContent = id ? 'Guardar Alterações' : 'Criar Utilizador'; }
            }
        };

        /* ── MODAL ALTERAR PASSWORD ── */
        function ut_injectModalPassword() {
            if (document.getElementById('ut-pw-modal')) return;
            var modal = document.createElement('div');
            modal.id = 'ut-pw-modal';
            modal.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:999;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)';
            modal.innerHTML = [
                '<div style="width:100%;max-width:380px;background:var(--bg-card);border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.2)">',
                '<div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">',
                '<span style="font-family:var(--font-title);font-size:11px;letter-spacing:1px;color:var(--primary-dark)">ALTERAR PASSWORD</span>',
                '<button onclick="ut_pwFechar()" style="width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:none;cursor:pointer;font-size:14px;color:var(--text-faint)">✕</button>',
                '</div>',
                '<div style="padding:18px 18px 20px">',
                '<div class="ut-msg" id="ut-pw-msg"></div>',
                '<div class="ut-field" style="margin-bottom:10px"><label class="ut-label">Nova Password</label>',
                '<input class="ut-input" id="ut-pw-nova" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password"></div>',
                '<div class="ut-field" style="margin-bottom:16px"><label class="ut-label">Confirmar Password</label>',
                '<input class="ut-input" id="ut-pw-confirmar" type="password" placeholder="Repete a nova password"',
                ' onkeydown="if(event.key===\'Enter\') ut_pwGuardar()"></div>',
                '<div style="display:flex;gap:8px;justify-content:flex-end">',
                '<button class="ut-btn-cancel" onclick="ut_pwFechar()">Cancelar</button>',
                '<button class="ut-btn-save" id="ut-pw-btn-save" onclick="ut_pwGuardar()">Alterar Password</button>',
                '</div></div></div>'
            ].join('');
            modal.addEventListener('click', function(e) { if (e.target === modal) ut_pwFechar(); });
            document.body.appendChild(modal);
        }

        var ut_pw_target_id = null;

        window.ut_pwAbrir = function(id) {
            ut_pw_target_id = id;
            var modal = document.getElementById('ut-pw-modal');
            if (!modal) return;
            document.getElementById('ut-pw-nova').value = '';
            document.getElementById('ut-pw-confirmar').value = '';
            var msg = document.getElementById('ut-pw-msg');
            if (msg) msg.className = 'ut-msg';
            var btn = document.getElementById('ut-pw-btn-save');
            if (btn) { btn.disabled = false; btn.textContent = 'Alterar Password'; }
            modal.style.display = 'flex';
            setTimeout(function() { document.getElementById('ut-pw-nova').focus(); }, 100);
        };

        window.ut_pwFechar = function() {
            var modal = document.getElementById('ut-pw-modal');
            if (modal) modal.style.display = 'none';
            ut_pw_target_id = null;
        };

        window.ut_pwGuardar = async function() {
            var nova      = document.getElementById('ut-pw-nova').value;
            var confirmar = document.getElementById('ut-pw-confirmar').value;
            var msg       = document.getElementById('ut-pw-msg');
            var btn       = document.getElementById('ut-pw-btn-save');
            var showErr   = function(txt) { if (msg) { msg.textContent = txt; msg.className = 'ut-msg error'; } };

            if (!nova || nova.length < 6) return showErr('Password deve ter pelo menos 6 caracteres.');
            if (nova !== confirmar)        return showErr('As passwords não coincidem.');
            if (!ut_pw_target_id)          return showErr('Utilizador não identificado.');

            if (btn) { btn.disabled = true; btn.textContent = 'A guardar...'; }
            try {
                await ut_api('/api/auth/update-password', { userId: ut_pw_target_id, password: nova });
                if (msg) { msg.textContent = 'Password alterada com sucesso!'; msg.className = 'ut-msg success'; }
                setTimeout(function() { ut_pwFechar(); }, 1500);
            } catch(e) {
                showErr('Erro: ' + (e?.message || JSON.stringify(e)));
                if (btn) { btn.disabled = false; btn.textContent = 'Alterar Password'; }
            }
        };

        /* ── TOGGLE ATIVO ── */
        window.ut_toggleAtivo = async function(id, ativoAtual) {
            if (!confirm(ativoAtual ? 'Inativar este utilizador?' : 'Ativar este utilizador?')) return;
            try {
                await sb('usuarios?id=eq.' + id, { method: 'PATCH', body: JSON.stringify({ ativo: !ativoAtual }) });
                ut_dados = await sb('usuarios?select=*&order=nome') || [];
                ut_renderList();
                var u = ut_dados.find(function(x) { return x.id === id; });
                if (u) ut_renderForm(u);
            } catch(e) {
                alert('Erro: ' + (e?.message || JSON.stringify(e)));
            }
        };

        /* ── FECHAR PAINEL ── */
        window.ut_fechar = function() {
            ut_id = null;
            ut_renderList();
            var panel = document.getElementById('ut-panel');
            if (panel) panel.innerHTML =
                '<div class="ut-panel-empty">' +
                '<div class="ut-panel-empty-icon">' +
                '<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">' +
                '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>' +
                '<circle cx="12" cy="7" r="4"/></svg></div>' +
                '<div class="ut-panel-empty-txt">Seleciona um utilizador</div></div>';
        };

        /* ── FEEDBACK ── */
        function ut_showMsg(txt, tipo) {
            var el = document.getElementById('ut-msg');
            if (!el) return;
            el.textContent = txt;
            el.className = 'ut-msg ' + tipo;
            el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            if (tipo === 'success') setTimeout(function() { el.className = 'ut-msg'; }, 3000);
        }

        window.ut_init = ut_init;
        ut_init();

    })();
</script>
