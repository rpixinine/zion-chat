        // Substituir a função vl_filtrarPresencas completa
        async function vl_filtrarPresencas() {
            const eS = document.getElementById('pr-start'), eE = document.getElementById('pr-end');
            const eM = document.getElementById('pr-min'), eT = document.getElementById('pr-status');
            const eMb = document.getElementById('pr-membro'), eCu = document.getElementById('pr-culto');
            if (eS) _pr_start = eS.value;
            if (eE) _pr_end = eE.value;
            if (eM) _pr_min = eM.value;
            if (eT) _pr_status = eT.value;
            if (eMb) _pr_membro = eMb.value.toLowerCase().trim();
            if (eCu) _pr_culto = eCu.value;

            const contentEl = document.getElementById('pr-content');
            if (contentEl) contentEl.innerHTML = '<div class="vl-empty"><div class="vl-empty-icon">—</div>A carregar...</div>';
            if (!_pr_start || !_pr_end) {
                if (contentEl) contentEl.innerHTML = '<div class="vl-alert vl-alert-e">Seleciona o periodo.</div>';
                return;
            }

            try {
                let escPath = `ministerio_escala?data=gte.${_pr_start}&data=lte.${_pr_end}` +
                    `&select=id,membro_id,ministerio_id,culto_id,data,membros(id,nome),ministerios(id,nome),cultos(id,nome,hora_inicio)` +
                    `&order=data,culto_id`;
                if (_pr_min) escPath += `&ministerio_id=eq.${_pr_min}`;
                if (_pr_culto) escPath += `&culto_id=eq.${_pr_culto}`;

                let ciPath = `ministerio_checkin?data=gte.${_pr_start}&data=lte.${_pr_end}` +
                    `&select=*,membros(id,nome),ministerios(id,nome),cultos(id,nome,hora_inicio)` +
                    `&order=data,hora_checkin`;
                if (_pr_min) ciPath += `&ministerio_id=eq.${_pr_min}`;
                if (_pr_status) ciPath += `&status=eq.${_pr_status}`;
                if (_pr_culto) ciPath += `&culto_id=eq.${_pr_culto}`;

                const [esc, ci] = await Promise.all([
                    sb(escPath).catch(() => []),
                    sb(ciPath).catch(() => [])
                ]);
                _pr_escalas = esc || [];
                _pr_checkins = ci || [];
                vl_renderPresencasConteudo();
            } catch (e) {
                if (contentEl) contentEl.innerHTML = `<div class="vl-alert vl-alert-e">Erro: ${e?.message}</div>`;
            }
        }

        function vl_limparFiltrosPr() {
            const {start, end} = mesAtualISO();
            _pr_start = start;
            _pr_end = end;
            _pr_min = '';
            _pr_status = '';
            _pr_membro = '';
            ['pr-start', 'pr-end', 'pr-min', 'pr-status', 'pr-membro'].forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                if (id === 'pr-start') el.value = start;
                else if (id === 'pr-end') el.value = end;
                else el.value = '';
            });
            vl_filtrarPresencas();
        }


        // Substituir a função vl_renderPresencasConteudo completa
        function vl_renderPresencasConteudo() {
            const contentEl = document.getElementById('pr-content');
            const statsEl = document.getElementById('pr-stats');
            if (!contentEl) return;

            const ciMap = {};
            _pr_checkins.forEach(ci => {
                const k = `${ci.membro_id}_${ci.ministerio_id}_${ci.culto_id}_${ci.data}`;
                ciMap[k] = ci;
            });

            let linhas = _pr_escalas.map(e => {
                const k = `${e.membro_id}_${e.ministerio_id}_${e.culto_id}_${e.data}`;
                const ci = ciMap[k];
                return {
                    membro_id: e.membro_id,
                    membro_nome: e.membros?.nome || '—',
                    ministerio_id: e.ministerio_id,
                    ministerio_nome: e.ministerios?.nome || '—',
                    culto_id: e.culto_id,
                    culto_nome: e.cultos?.nome || '—',
                    culto_hora: e.cultos?.hora_inicio?.slice(0, 5) || '',
                    data: e.data,
                    status: ci?.status || 'sem_registo',
                    hora_checkin: ci?.hora_checkin || null,
                    minutos_atraso: ci?.minutos_atraso || 0,
                };
            });

            const escalasKeys = new Set(_pr_escalas.map(e => `${e.membro_id}_${e.ministerio_id}_${e.culto_id}_${e.data}`));
            _pr_checkins.forEach(ci => {
                const k = `${ci.membro_id}_${ci.ministerio_id}_${ci.culto_id}_${ci.data}`;
                if (!escalasKeys.has(k)) {
                    linhas.push({
                        membro_id: ci.membro_id,
                        membro_nome: ci.membros?.nome || '—',
                        ministerio_id: ci.ministerio_id,
                        ministerio_nome: ci.ministerios?.nome || '—',
                        culto_id: ci.culto_id,
                        culto_nome: ci.cultos?.nome || '—',
                        culto_hora: ci.cultos?.hora_inicio?.slice(0, 5) || '',
                        data: ci.data,
                        status: ci.status,
                        hora_checkin: ci.hora_checkin || null,
                        minutos_atraso: ci.minutos_atraso || 0,
                    });
                }
            });

            if (_pr_membro) linhas = linhas.filter(l => l.membro_nome.toLowerCase().includes(_pr_membro));
            if (_pr_status) linhas = linhas.filter(l => l.status === _pr_status);

            if (!linhas.length) {
                if (statsEl) statsEl.innerHTML = '';
                contentEl.innerHTML = '<div class="vl-empty"><div class="vl-empty-icon">—</div>Nenhum registo encontrado.</div>';
                return;
            }

            /* Stats globais */
            const totPresente = linhas.filter(l => l.status === 'presente').length;
            const totAtrasado = linhas.filter(l => l.status === 'atrasado').length;
            const totFaltou = linhas.filter(l => l.status === 'faltou').length;
            const totSemReg = linhas.filter(l => l.status === 'sem_registo').length;
            const totConfirm = linhas.filter(l => l.status === 'pre_confirmado').length;

            if (statsEl) statsEl.innerHTML = `
<div class="vl-stat-row" style="margin-bottom:14px">
  <div class="vl-stat"><div class="vl-stat-num">${linhas.length}</div><div class="vl-stat-label">Registos</div></div>
  <div class="vl-stat"><div class="vl-stat-num">${totPresente}</div><div class="vl-stat-label">Presentes</div></div>
  <div class="vl-stat"><div class="vl-stat-num">${totAtrasado}</div><div class="vl-stat-label">Atrasados</div></div>
  <div class="vl-stat"><div class="vl-stat-num">${totFaltou}</div><div class="vl-stat-label">Faltas</div></div>
  <div class="vl-stat"><div class="vl-stat-num">${totConfirm}</div><div class="vl-stat-label">Confirmados</div></div>
  <div class="vl-stat"><div class="vl-stat-num">${totSemReg}</div><div class="vl-stat-label">Sem Registo</div></div>
</div>`;

            /* Pré-computar: vezes servidas por membro por mês */
            const contagemMensal = {};
            linhas.forEach(l => {
                if (l.status !== 'presente' && l.status !== 'atrasado') return;
                const k = `${l.membro_id}_${l.data.slice(0, 7)}`;
                contagemMensal[k] = (contagemMensal[k] || 0) + 1;
            });

            const membroAreas = {};
            linhas.forEach(l => {
                if (!membroAreas[l.membro_id]) membroAreas[l.membro_id] = new Set();
                membroAreas[l.membro_id].add(l.ministerio_id);
            });

            /* Agrupar: mês > dia > culto > área */
            const porMes = {};
            linhas.forEach(l => {
                const mes = l.data.slice(0, 7);
                if (!porMes[mes]) porMes[mes] = {};
                const diaKey = l.data;
                if (!porMes[mes][diaKey]) porMes[mes][diaKey] = {};
                const cultoKey = `${l.culto_id}__${l.culto_nome}__${l.culto_hora}`;
                if (!porMes[mes][diaKey][cultoKey]) porMes[mes][diaKey][cultoKey] = {
                    culto_nome: l.culto_nome,
                    culto_hora: l.culto_hora,
                    areas: {}
                };
                const areaKey = l.ministerio_id;
                if (!porMes[mes][diaKey][cultoKey].areas[areaKey]) porMes[mes][diaKey][cultoKey].areas[areaKey] = {
                    area_nome: l.ministerio_nome,
                    linhas: []
                };
                porMes[mes][diaKey][cultoKey].areas[areaKey].linhas.push(l);
            });

            let html = '';
            Object.keys(porMes).sort().forEach(mes => {
                const diasObj = porMes[mes];
                const mesLinhas = linhas.filter(l => l.data.slice(0, 7) === mes);
                const mP = mesLinhas.filter(l => l.status === 'presente').length;
                const mA = mesLinhas.filter(l => l.status === 'atrasado').length;
                const mF = mesLinhas.filter(l => l.status === 'faltou').length;
                const mS = mesLinhas.filter(l => l.status === 'sem_registo').length;

                let diasHtml = '';
                Object.keys(diasObj).sort().forEach(dia => {
                    const cultosObj = diasObj[dia];
                    let cultosHtml = '';

                    Object.keys(cultosObj).sort().forEach(cultoKey => {
                        const cultoBlk = cultosObj[cultoKey];
                        const cultoLinhas = Object.values(cultoBlk.areas).flatMap(a => a.linhas);
                        const cP = cultoLinhas.filter(l => l.status === 'presente').length;
                        const cA = cultoLinhas.filter(l => l.status === 'atrasado').length;
                        const cF = cultoLinhas.filter(l => l.status === 'faltou').length;
                        const cS = cultoLinhas.filter(l => l.status === 'sem_registo').length;
                        const cTotal = cultoLinhas.length;

                        let areasHtml = '';
                        Object.keys(cultoBlk.areas).sort((a, b) => cultoBlk.areas[a].area_nome.localeCompare(cultoBlk.areas[b].area_nome)).forEach(areaKey => {
                            const area = cultoBlk.areas[areaKey];
                            const rows = area.linhas.map(l => {
                                const vezes = contagemMensal[`${l.membro_id}_${l.data.slice(0, 7)}`] || 0;
                                const multiArea = (membroAreas[l.membro_id]?.size || 0) > 1;
                                const horaLabel = l.hora_checkin ? l.hora_checkin.slice(0, 5) : '—';
                                const tardLabel = l.status === 'atrasado' && l.minutos_atraso > 0 ? ` +${l.minutos_atraso}min` : '';
                                return `<tr>
  <td style="font-size:12px;font-weight:600">${l.membro_nome}</td>
  <td><span class="vl-badge vl-b-${l.status}">${st_label(l.status)}${tardLabel}</span></td>
  <td style="font-size:11px">${horaLabel}</td>
  <td style="font-size:11px;text-align:center">${vezes > 0 ? vezes + 'x' : '—'}</td>
  <td>${multiArea ? '<span class="pr-multi-tag">+1 area</span>' : ''}</td>
</tr>`;
                            }).join('');

                            const aP = area.linhas.filter(l => l.status === 'presente' || l.status === 'atrasado').length;

            contentEl.innerHTML = html;
        }

        function st_label(status) {
            return {
                presente: 'Presente', atrasado: 'Atrasado', faltou: 'Falta',
                pre_confirmado: 'Confirmado', sem_registo: 'Sem registo'

        /* ── Imprimir Presenças ── */
        function vl_imprimirPresencas() {
            const statsEl = document.getElementById('pr-stats');
            const contentEl = document.getElementById('pr-content');
            if (!contentEl) return;

            const minNome = _pr_min ? (_pr_mins_list.find(m => m.id === _pr_min)?.nome || '') : 'Todos os ministerios';
            const periodoLabel = `${fmtD(_pr_start)} a ${fmtD(_pr_end)}`;

            /* Recolher dados das linhas renderizadas */
            const rows = [];
            document.querySelectorAll('#pr-content tbody tr').forEach(tr => {
                const tds = tr.querySelectorAll('td');
                if (tds.length < 5) return;
                rows.push([
                    tds[0]?.textContent?.trim() || '',
                    tds[1]?.textContent?.trim() || '',
                    tds[2]?.textContent?.trim() || '',
                    tds[3]?.textContent?.trim() || '',
                    tds[4]?.textContent?.trim() || '',
                    tds[5]?.textContent?.trim() || '',
                ]);
            });

            /* Agrupar por bloco de mês/dia para preservar estrutura */
            let bodyHtml = `

<p style="font-size:10px;color:#555;margin-bottom:14px">Exportado em ${new Date().toLocaleString('pt-PT')}</p>`;

                const mNome = monthEl.querySelector('.pr-month-nome')?.textContent || '';

                bodyHtml += `<h3 style="font-size:12px;margin:14px 0 4px;border-bottom:1px solid #ccc;padding-bottom:4px">${mNome} — ${mStats}</h3>`;

                monthEl.querySelectorAll('.pr-day-block').forEach(dayEl => {
                    const dDate = dayEl.querySelector('.pr-day-date')?.textContent || '';
                    const dCulto = dayEl.querySelector('.pr-day-culto')?.textContent || '';
                    bodyHtml += `<p style="font-size:10px;color:#555;margin:8px 0 3px"><strong>${dDate}</strong> · ${dCulto}</p>`;
                    bodyHtml += '<table><thead><tr><th>Voluntario</th><th>Area</th><th>Estado</th><th>Chegada</th><th>Vezes/Mes</th><th>Multi-area</th></tr></thead><tbody>';
                    dayEl.querySelectorAll('tbody tr').forEach(tr => {
                        const tds = tr.querySelectorAll('td');

        /* ══════════════════════════════════════════

        function vl_toggle(id) {
            const row = document.getElementById(`vl-det-${id}`);
            if (!row) return;
            row.classList.toggle('vl-hidden');
            const btn = document.querySelector(`#vl-row-${id} button`);
            if (btn) btn.textContent = row.classList.contains('vl-hidden') ? '+' : '−';
        }

        function vl_filtrarCampanha(id) {
            vl_campFiltro = id || null;
            vl_renderInscricoes();
        }

        async function vl_verificarPrazos() {
            try {
                const agora = new Date().toISOString();
                const exp = await sb(`voluntarios_atribuicoes?status=eq.aguardando&prazo_contato=lt.${agora}&select=id,inscricao_id`).catch(() => []);
                for (const a of exp) {
                    await sb(`voluntarios_atribuicoes?id=eq.${a.id}`, {
                        method: 'PATCH',
                        body: JSON.stringify({status: 'sem_retorno'})
                    });
                    await sb(`voluntarios_inscricoes?id=eq.${a.inscricao_id}`, {
                        method: 'PATCH',
                        body: JSON.stringify({status: 'sem_retorno'})
                    });
                }
            } catch (_) {
            }
        }

        /* ══════════════════════════════════════════
                ABA 5 — RELATÓRIO DE CULTO
                ══════════════════════════════════════════ */
        let _rel_cultos_list = [], _rel_data = '', _rel_culto_id = '';

        async function vl_renderRelatorio() {
            c().innerHTML = '<div class="vl-empty"><div class="vl-empty-icon">—</div>A carregar cultos...</div>';
            try {
                _rel_cultos_list = await sb('cultos?ativo=eq.true&select=id,nome,hora_inicio&order=hora_inicio') || [];
            } catch (_) {
            }

            const hoje = new Date().toISOString().slice(0, 10);
            if (!_rel_data) _rel_data = hoje;

            const cultoOpts = _rel_cultos_list.map(cu =>
                `<option value="${cu.id}" ${cu.id === _rel_culto_id ? 'selected' : ''}>
            ${cu.nome}${cu.hora_inicio ? ' · ' + cu.hora_inicio.slice(0, 5) : ''}
        </option>`
            ).join('');

            c().innerHTML = `
<div class="vl-toolbar">
  <span class="vl-toolbar-title">Relatorio de Culto</span>
</div>

<!-- Selector de culto + data -->
<div class="vl-card" style="margin-bottom:14px">
  <div class="vl-card-title">Selecionar Culto</div>
  <div class="vl-row">
    <div class="vl-field">
      <label class="vl-label">Data</label>
      <input type="date" class="vl-input" id="rel-data" value="${_rel_data}">
    </div>
    <div class="vl-field" style="flex:2">
      <label class="vl-label">Culto</label>
      <select class="vl-select" id="rel-culto">
        <option value="">Selecionar culto...</option>${cultoOpts}
      </select>
    </div>
    <div style="display:flex;align-items:flex-end">
      <button class="vl-btn vl-btn-p" onclick="vl_carregarRelatorio()">Carregar</button>
    </div>
  </div>
</div>

<div id="rel-content"></div>`;

            if (_rel_data && _rel_culto_id) await vl_carregarRelatorio(true);
        }

        async function vl_carregarRelatorio(silente) {
            const eD = document.getElementById('rel-data');
            const eCu = document.getElementById('rel-culto');
            if (eD) _rel_data = eD.value;
            if (eCu) _rel_culto_id = eCu.value;

            const el = document.getElementById('rel-content');
            if (!el) return;
            if (!_rel_data || !_rel_culto_id) {
                el.innerHTML = '<div class="vl-alert vl-alert-e">Seleciona data e culto.</div>';
                return;
            }
            if (!silente) el.innerHTML = '<div class="vl-empty"><div class="vl-empty-icon">—</div>A carregar...</div>';

            const culto = _rel_cultos_list.find(cu => cu.id === _rel_culto_id);
            const cultoLabel = culto ? `${culto.nome}${culto.hora_inicio ? ' · ' + culto.hora_inicio.slice(0, 5) : ''}` : '—';

            /* Carregar dados guardados + contagem automática de voluntários */
            let dadosGuardados = null, volCount = 0, volPresentes = [], relId = null;
            try {
                const [relRows, escRows, ciRows] = await Promise.all([
                    sb(`cultos_relatorio_geral?data=eq.${_rel_data}&culto_id=eq.${_rel_culto_id}&select=*&limit=1`).catch(() => []),
                    sb(`ministerio_escala?data=eq.${_rel_data}&culto_id=eq.${_rel_culto_id}&select=membro_id,ministerio_id,membros(id,nome,foto_url),ministerios(nome)&order=ministerios(nome),membros(nome)`).catch(() => []),
                    sb(`ministerio_checkin?data=eq.${_rel_data}&culto_id=eq.${_rel_culto_id}&select=membro_id,ministerio_id,status,hora_checkin,minutos_atraso,membros(nome),ministerios(nome)`).catch(() => []),
                ]);
                dadosGuardados = relRows?.[0] || null;
                relId = dadosGuardados?.id || null;
                volCount = escRows.length;

                /* Juntar escala + checkin para lista de presenças */
                const ciByMembro = {};
                (ciRows || []).forEach(ci => {
                    ciByMembro[`${ci.membro_id}_${ci.ministerio_id}`] = ci;
                });
                volPresentes = (escRows || []).map(e => {
                    const ci = ciByMembro[`${e.membro_id}_${e.ministerio_id}`];
                    return {
                        nome: e.membros?.nome || '—',
                        foto: e.membros?.foto_url || null,
                        area: e.ministerios?.nome || '—',
                        status: ci?.status || 'sem_registo',
                        hora_checkin: ci?.hora_checkin?.slice(0, 5) || '—',
                        minutos_atraso: ci?.minutos_atraso || 0,
                    };
                });
            } catch (_) {
            }

            const d = dadosGuardados || {};
            const val = (f, def = '') => d[f] != null ? d[f] : def;

            /* ── Campos manuais ── */
            const camposManual = [
                {id: 'total_participantes', label: 'Total de Participantes'},
                {id: 'total_templo', label: 'Total no Templo'},
                {id: 'total_overflow', label: 'Total no Overflow'},
                {id: 'bercario', label: 'Bercario'},
                {id: 'keola', label: 'Keola'},
                {id: 'traducao', label: 'Traducao'},
                {id: 'streaming', label: 'Streaming (PT)'},
                {id: 'streaming_en', label: 'Streaming (EN)'},
                {id: 'salvacoes', label: 'Salvacoes'},
                {id: 'curas', label: 'Curas'},
                {id: 'visitantes', label: 'Visitantes'},
                {id: 'tempo_oferta', label: 'Tempo Oferta', tipo: 'text', placeholder: 'Ex: 2:46'},
            ];

            const camposHtml = camposManual.map(f => `
<div class="vl-field">
  <label class="vl-label">${f.label}</label>
  <input type="${f.tipo || 'number'}" min="0" class="vl-input" id="rel-${f.id}"
    value="${val(f.id)}" placeholder="${f.placeholder || '0'}">
</div>`).join('');

            /* ── Tabela de voluntários ── */
            const volRows = volPresentes.map(v => {
                const tard = v.status === 'atrasado' && v.minutos_atraso > 0 ? ` +${v.minutos_atraso}min` : '';
                return `<tr>
  <td style="font-size:12px">${v.nome}</td>
  <td style="font-size:11px;color:var(--text-faint)">${v.area}</td>
  <td><span class="vl-badge vl-b-${v.status}">${st_label(v.status)}${tard}</span></td>
  <td style="font-size:11px">${v.hora_checkin}</td>
</tr>`;
            }).join('');

            el.innerHTML = `
<div class="vl-card" style="margin-bottom:12px">
  <div class="vl-card-title">${cultoLabel} — ${fmtD(_rel_data)}</div>

  <!-- Voluntários: campo auto-preenchido -->
  <div style="background:var(--primary-faint);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px">
    <div style="font-family:var(--font-title);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--primary-dark)">Voluntarios na Escala</div>
    <div style="font-family:var(--font-title);font-size:20px;font-weight:700;color:var(--primary-dark)">${volCount}</div>
    <div style="font-size:10px;color:var(--text-faint)">(calculado automaticamente das escalas)</div>
  </div>

  <!-- Grid de campos manuais -->
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px">
    ${camposHtml}
  </div>

  <div id="rel-alert" style="margin-top:10px"></div>
  <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end">
    <button class="vl-btn vl-btn-m" onclick="vl_relGerarPDF(${JSON.stringify(volPresentes).replace(/"/g, '&quot;')})">Gerar PDF</button>
    <button class="vl-btn vl-btn-p" onclick="vl_relGuardar('${relId || ''}',${volCount})">Guardar</button>
  </div>
</div>

<!-- Tabela voluntários -->
<div class="vl-card" style="padding:0;overflow:hidden">
  <div class="vl-card-title" style="padding:12px 14px">Voluntarios Escalados (${volCount})</div>
  ${volCount ? `<table class="vl-table">
    <thead><tr><th>Nome</th><th>Area</th><th>Estado</th><th>Chegada</th></tr></thead>
    <tbody>${volRows}</tbody>
  </table>` : '<div class="vl-empty" style="padding:24px">Nenhum voluntario escalado para este culto.</div>'}
</div>`;
        }

        async function vl_relGuardar(relId, volCount) {
            const alEl = document.getElementById('rel-alert');
            const campos = ['total_participantes', 'total_templo', 'total_overflow', 'bercario', 'keola',
                'traducao', 'streaming', 'streaming_en', 'salvacoes', 'curas', 'visitantes', 'tempo_oferta'];

            const payload = {data: _rel_data, culto_id: _rel_culto_id, voluntarios: volCount};
            campos.forEach(f => {
                const el = document.getElementById(`rel-${f}`);
                if (!el) return;
                const v = el.value.trim();
                payload[f] = f === 'tempo_oferta' ? (v || null) : (v !== '' ? Number(v) : null);
            });

            try {
                if (relId) {
                    await sb(`cultos_relatorio_geral?id=eq.${relId}`, {method: 'PATCH', body: JSON.stringify(payload)});
                } else {
                    await sb('cultos_relatorio_geral', {method: 'POST', body: JSON.stringify(payload)});
                }
                if (alEl) {
                    alEl.innerHTML = '<div class="vl-alert vl-alert-s">Guardado com sucesso.</div>';
                    setTimeout(() => alEl.innerHTML = '', 3000);
                }
                // Recarregar para obter o id gerado
                await vl_carregarRelatorio(true);
            } catch (e) {
                if (alEl) alEl.innerHTML = `<div class="vl-alert vl-alert-e">Erro: ${e?.message}</div>`;
            }
        }

        function vl_relGerarPDF(volPresentes) {
            const culto = _rel_cultos_list.find(cu => cu.id === _rel_culto_id);
            const cultoLabel = culto ? `${culto.nome}${culto.hora_inicio ? ' · ' + culto.hora_inicio.slice(0, 5) : ''}` : '—';

            const campos = [
                {id: 'total_participantes', label: 'Total de Participantes'},
                {id: 'total_templo', label: 'Total no Templo'},
                {id: 'total_overflow', label: 'Total no Overflow'},
                {id: 'bercario', label: 'Bercario'},
                {id: 'keola', label: 'Keola'},
                {id: 'voluntarios', label: 'Voluntarios', auto: true},
                {id: 'traducao', label: 'Traducao'},
                {id: 'streaming', label: 'Streaming (PT)'},
                {id: 'streaming_en', label: 'Streaming (EN)'},
                {id: 'salvacoes', label: 'Salvacoes'},
                {id: 'curas', label: 'Curas'},
                {id: 'visitantes', label: 'Visitantes'},
                {id: 'tempo_oferta', label: 'Tempo Oferta'},
            ];

            /* Colher valores */
            const valores = {};
            campos.forEach(f => {
                if (f.auto) {
                    valores[f.id] = document.querySelector('.vl-stat-num, [style*="font-size:20px"]')?.textContent?.trim() || '—';
                    // fallback: pegar do campo auto
                    const autoEl = document.querySelector('[style*="font-size:20px"]');
                    valores[f.id] = autoEl ? autoEl.textContent.trim() : '—';
                } else {
                    const el = document.getElementById(`rel-${f.id}`);
                    valores[f.id] = el ? (el.value || '—') : '—';
                }
            });

            /* Gráfico de barras simples (SVG inline) */
            const barDados = [
                {label: 'Particip.', val: parseInt(valores.total_participantes) || 0, cor: '#0e7490'},
                {label: 'Templo', val: parseInt(valores.total_templo) || 0, cor: '#0891b2'},
                {label: 'Overflow', val: parseInt(valores.total_overflow) || 0, cor: '#06b6d4'},
                {label: 'Salvacoes', val: parseInt(valores.salvacoes) || 0, cor: '#15803d'},
                {label: 'Visitantes', val: parseInt(valores.visitantes) || 0, cor: '#b45309'},
                {label: 'Vols.', val: parseInt(valores.voluntarios) || 0, cor: '#7c3aed'},
            ];
            const maxVal = Math.max(...barDados.map(d => d.val), 1);
            const barW = 60, barGap = 18, svgW = barDados.length * (barW + barGap) + barGap, svgH = 180;
            const barsSvg = barDados.map((d, i) => {
                const h = Math.round((d.val / maxVal) * 120);
                const x = barGap + i * (barW + barGap);
                const y = 130 - h;
                return `
<rect x="${x}" y="${y}" width="${barW}" height="${h}" fill="${d.cor}" rx="4"/>
<text x="${x + barW / 2}" y="${y - 5}"  text-anchor="middle" font-size="11" font-weight="bold" fill="#000">${d.val || '—'}</text>
<text x="${x + barW / 2}" y="155"     text-anchor="middle" font-size="10" fill="#444">${d.label}</text>`;
            }).join('');

            /* Tabela de voluntários */
            const volRows = (volPresentes || []).map(v => {
                const tard = v.status === 'atrasado' && v.minutos_atraso > 0 ? ` +${v.minutos_atraso}min` : '';
                const statusColors = {
                    presente: '#15803d',
                    atrasado: '#b45309',
                    faltou: '#b91c1c',
                    pre_confirmado: '#0e7490',
                    sem_registo: '#6b7280'
                };
                const cor = statusColors[v.status] || '#6b7280';
                const ini = v.nome.split(' ').slice(0, 2).map(p => p[0] || '').join('').toUpperCase();
                const fotoHtml = v.foto
                    ? `<img src="${v.foto}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid #ddd;display:block;margin:auto">`
                    : `<div style="width:32px;height:32px;border-radius:50%;background:#e5e7eb;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#374151;margin:auto">${ini}</div>`;
                return `<tr>
  <td style="text-align:center">${fotoHtml}</td>
  <td>${v.nome}</td>
  <td>${v.area}</td>
  <td style="color:${cor};font-weight:600">${st_label(v.status)}${tard}</td>
  <td>${v.hora_checkin}</td>
</tr>`;
            }).join('');

            const bodyHtml = `
<h2 style="margin:0 0 4px">${cultoLabel}</h2>
<p style="font-size:10px;color:#666;margin:0 0 16px">${fmtD(_rel_data)} &nbsp;|&nbsp; Gerado em ${new Date().toLocaleString('pt-PT')}</p>

<!-- Resumo -->
<table style="width:100%;border-collapse:collapse;margin-bottom:18px">
  <thead><tr><th>Indicador</th><th>Valor</th></tr></thead>
  <tbody>
    ${campos.map(f => `<tr><td>${f.label}</td><td><strong>${valores[f.id] || '—'}</strong></td></tr>`).join('')}
  </tbody>
</table>

<!-- Gráfico -->
<h3 style="font-size:12px;margin:0 0 8px">Indicadores Principais</h3>
<svg width="${svgW}" height="${svgH}" style="display:block;margin-bottom:18px">
  ${barsSvg}
</svg>

<!-- Lista de voluntários -->
<h3 style="font-size:12px;margin:0 0 6px;border-top:1px solid #ccc;padding-top:10px">Voluntarios Escalados (${(volPresentes || []).length})</h3>
<table>
  <thead><tr><th>Foto</th><th>Nome</th><th>Area</th><th>Estado</th><th>Chegada</th></tr></thead>
  <tbody>${volRows}</tbody>
</table>`;

            abrirJanelaPrint(bodyHtml);
        }

        /* ══════════════════════════════════════════
                EXPOR NO WINDOW
                ══════════════════════════════════════════ */
        window.vl_init = vl_init;
