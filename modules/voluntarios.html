        async function vl_guardarCampanha(btn) {
            const nome=document.getElementById('nc-nome')?.value.trim(), desc=document.getElementById('nc-desc')?.value.trim();
            const inicio=document.getElementById('nc-inicio')?.value, fim=document.getElementById('nc-fim')?.value;
            const alEl=document.getElementById('nc-alert');
            if(!nome||!inicio||!fim){if(alEl) alEl.innerHTML='<div class="vl-alert vl-alert-e">Preencha nome, inicio e fim.</div>';return;}
            if(fim<inicio){if(alEl) alEl.innerHTML='<div class="vl-alert vl-alert-e">Data de fim anterior ao inicio.</div>';return;}
            const slug=nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
            btn.disabled=true; btn.textContent='A criar...';
            try {
                await sb('voluntarios_campanhas',{method:'POST',body:JSON.stringify({nome,descricao:desc||null,data_inicio:inicio,data_fim:fim,slug,status:'rascunho'})});
                btn.closest('.vl-modal-overlay').remove();
                vl_renderCampanhas();
            } catch(e){
                if(alEl) alEl.innerHTML=`<div class="vl-alert vl-alert-e">Erro: ${e?.message||JSON.stringify(e)}</div>`;
                btn.disabled=false; btn.textContent='Criar';
            }
        }

        async function vl_statusCampanha(id, novoStatus) {
            const msgs={ativo:'Ativar campanha?',encerrado:'Encerrar campanha?'};
            if(!confirm(msgs[novoStatus])) return;
            try {
                await sb(`voluntarios_campanhas?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status:novoStatus})});
                vl_renderCampanhas();
            } catch(e){alert('Erro: '+(e?.message||JSON.stringify(e)));}
        }

        async function vl_gerarLinks(campanhaId) {
            const inscIds=await sb(`voluntarios_inscricoes?campanha_id=eq.${campanhaId}&select=id`).catch(()=>[]);
            if(!inscIds.length){alert('Nenhuma inscricao nesta campanha.');return;}
            const ids=inscIds.map(i=>i.id).join(',');
            const atribuicoes=await sb(`voluntarios_atribuicoes?inscricao_id=in.(${ids})&select=id,link_token,ministerio_id,ministerios(nome)`).catch(()=>[]);
            if(!atribuicoes.length){alert('Nenhuma atribuicao encontrada. Distribua primeiro as inscricoes.');return;}
            const porMin={};
            atribuicoes.forEach(a=>{if(!porMin[a.ministerio_id]) porMin[a.ministerio_id]={nome:a.ministerios?.nome,token:a.link_token};});
            const base=`${location.origin}/voluntarios-lider.html`;
            const ov=document.createElement('div'); ov.className='vl-modal-overlay';
            ov.innerHTML=`
<div class="vl-modal" style="max-width:540px">
  <div class="vl-modal-title">Links por Ministerio</div>
  ${Object.entries(porMin).map(([,info])=>`
    <div style="margin-bottom:10px">
      <div class="vl-label">${info.nome}</div>
      <div class="vl-link-box">
        <code>${base}?t=${info.token}</code>
        <button class="vl-btn vl-btn-m" style="padding:3px 9px;font-size:8px" onclick="navigator.clipboard.writeText('${base}?t=${info.token}');this.textContent='Copiado!'">Copiar</button>
      </div>
    </div>`).join('')}
  <div class="vl-modal-footer"><button class="vl-btn vl-btn-p" onclick="this.closest('.vl-modal-overlay').remove()">Fechar</button></div>
</div>`;
            document.body.appendChild(ov);
        }

        /* ══════════════════════════════════════════
           ABA 4 — PRESENCAS (CHECK-INS)
        ══════════════════════════════════════════ */
        let _pr_escalas = [], _pr_checkins = [];
        let _pr_start = '', _pr_end = '', _pr_min = '', _pr_status = '', _pr_membro = '';
        let _pr_mins_list = [];

        async function vl_renderPresencas() {
            const { start, end } = mesAtualISO();
            if (!_pr_start) _pr_start = start;
            if (!_pr_end)   _pr_end   = end;

            c().innerHTML = `
<div class="vl-toolbar">
  <span class="vl-toolbar-title">Presencas</span>
  <button class="vl-btn vl-btn-m" id="pr-btn-print" onclick="vl_imprimirPresencas()">Imprimir PDF</button>
</div>

<!-- Filtros -->
<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:flex-end">
  <div class="vl-field" style="margin:0;min-width:130px">
    <label class="vl-label">Periodo inicio</label>
    <input type="date" class="vl-input" id="pr-start" value="${_pr_start}">
  </div>
  <div class="vl-field" style="margin:0;min-width:130px">
    <label class="vl-label">Periodo fim</label>
    <input type="date" class="vl-input" id="pr-end" value="${_pr_end}">
  </div>
  <div class="vl-field" style="margin:0;min-width:160px">
    <label class="vl-label">Area / Ministerio</label>
    <select class="vl-select" id="pr-min">
      <option value="">Todos</option>
    </select>
  </div>
  <div class="vl-field" style="margin:0;min-width:120px">
    <label class="vl-label">Estado</label>
    <select class="vl-select" id="pr-status">
      <option value="">Todos</option>
      <option value="presente">Presente</option>
      <option value="atrasado">Atrasado</option>
      <option value="faltou">Falta</option>
      <option value="pre_confirmado">Confirmado</option>
    </select>
  </div>
  <div class="vl-field" style="margin:0;min-width:150px">
    <label class="vl-label">Voluntario</label>
    <input type="text" class="vl-input" id="pr-membro" placeholder="Nome..." value="${_pr_membro}">
  </div>
  <button class="vl-btn vl-btn-p" onclick="vl_filtrarPresencas()">Filtrar</button>
  <button class="vl-btn vl-btn-m" onclick="vl_limparFiltrosPr()">Limpar</button>
</div>

<div id="pr-stats"></div>
<div id="pr-content"><div class="vl-empty"><div class="vl-empty-icon">—</div>Clica em Filtrar para carregar.</div></div>`;

            /* Carregar lista de ministérios */
            try {
                _pr_mins_list = await sb('ministerios?ativo=eq.true&select=id,nome&order=nome') || [];
                const sel = document.getElementById('pr-min');
                if (sel) {
                    _pr_mins_list.forEach(m => {
                        const o = document.createElement('option');
                        o.value = m.id; o.textContent = m.nome;
                        if (m.id === _pr_min) o.selected = true;
                        sel.appendChild(o);
                    });
                }
            } catch(_) {}

            await vl_filtrarPresencas();
        }

        async function vl_filtrarPresencas() {
            const eS=document.getElementById('pr-start'), eE=document.getElementById('pr-end');
            const eM=document.getElementById('pr-min'),   eT=document.getElementById('pr-status');
            const eMb=document.getElementById('pr-membro');
            if(eS) _pr_start=eS.value; if(eE) _pr_end=eE.value;
            if(eM) _pr_min=eM.value;   if(eT) _pr_status=eT.value;
            if(eMb) _pr_membro=eMb.value.toLowerCase().trim();

            const contentEl = document.getElementById('pr-content');
            if(contentEl) contentEl.innerHTML='<div class="vl-empty"><div class="vl-empty-icon">—</div>A carregar...</div>';

            if(!_pr_start || !_pr_end){ if(contentEl) contentEl.innerHTML='<div class="vl-alert vl-alert-e">Seleciona o periodo.</div>'; return; }

            try {
                let escPath = `ministerio_escala?data=gte.${_pr_start}&data=lte.${_pr_end}` +
                    `&select=id,membro_id,ministerio_id,culto_id,data,membros(id,nome),ministerios(id,nome),cultos(id,nome,hora_inicio)` +
                    `&order=data,culto_id`;
                if(_pr_min) escPath += `&ministerio_id=eq.${_pr_min}`;

                let ciPath = `ministerio_checkin?data=gte.${_pr_start}&data=lte.${_pr_end}` +
                    `&select=*,membros(id,nome),ministerios(id,nome),cultos(id,nome,hora_inicio)` +
                    `&order=data,hora_checkin`;
                if(_pr_min)    ciPath += `&ministerio_id=eq.${_pr_min}`;
                if(_pr_status) ciPath += `&status=eq.${_pr_status}`;

                const [esc, ci] = await Promise.all([
                    sb(escPath).catch(()=>[]),
                    sb(ciPath).catch(()=>[])
                ]);
                _pr_escalas  = esc || [];
                _pr_checkins = ci  || [];

                vl_renderPresencasConteudo();
            } catch(e) {
                if(contentEl) contentEl.innerHTML=`<div class="vl-alert vl-alert-e">Erro: ${e?.message}</div>`;
            }
        }

        function vl_limparFiltrosPr() {
            const { start, end } = mesAtualISO();
            _pr_start=start; _pr_end=end; _pr_min=''; _pr_status=''; _pr_membro='';
            ['pr-start','pr-end','pr-min','pr-status','pr-membro'].forEach(id=>{
                const el=document.getElementById(id); if(!el) return;
                if(id==='pr-start') el.value=start;
                else if(id==='pr-end') el.value=end;
                else el.value='';
            });
            vl_filtrarPresencas();
        }

        function vl_renderPresencasConteudo() {
            const contentEl=document.getElementById('pr-content');
            const statsEl  =document.getElementById('pr-stats');
            if(!contentEl) return;

            /* ── Juntar escala + checkin ── */
            /* Para cada registo de escala, procurar o checkin correspondente */
            const ciMap = {};
            _pr_checkins.forEach(ci => {
                const k = `${ci.membro_id}_${ci.ministerio_id}_${ci.culto_id}_${ci.data}`;
                ciMap[k] = ci;
            });

            /* Construir linhas combinadas */
            let linhas = _pr_escalas.map(e => {
                const k = `${e.membro_id}_${e.ministerio_id}_${e.culto_id}_${e.data}`;
                const ci = ciMap[k];
                return {
                    membro_id:     e.membro_id,
                    membro_nome:   e.membros?.nome || '—',
                    ministerio_id: e.ministerio_id,
                    ministerio_nome: e.ministerios?.nome || '—',
                    culto_nome:    e.cultos?.nome || '—',
                    culto_hora:    e.cultos?.hora_inicio?.slice(0,5) || '',
                    data:          e.data,
                    status:        ci?.status || 'sem_registo',
                    hora_checkin:  ci?.hora_checkin || null,
                    minutos_atraso: ci?.minutos_atraso || 0,
                };
            });

            /* Adicionar checkins que nao tenham escala correspondente (ex: check-in manual) */
            const escalasKeys = new Set(_pr_escalas.map(e => `${e.membro_id}_${e.ministerio_id}_${e.culto_id}_${e.data}`));
            _pr_checkins.forEach(ci => {
                const k = `${ci.membro_id}_${ci.ministerio_id}_${ci.culto_id}_${ci.data}`;
                if(!escalasKeys.has(k)) {
                    linhas.push({
                        membro_id:     ci.membro_id,
                        membro_nome:   ci.membros?.nome || '—',
                        ministerio_id: ci.ministerio_id,
                        ministerio_nome: ci.ministerios?.nome || '—',
                        culto_nome:    ci.cultos?.nome || '—',
                        culto_hora:    ci.cultos?.hora_inicio?.slice(0,5) || '',
                        data:          ci.data,
                        status:        ci.status,
                        hora_checkin:  ci.hora_checkin || null,
                        minutos_atraso: ci.minutos_atraso || 0,
                    });
                }
            });

            /* Aplicar filtro de nome */
            if(_pr_membro) linhas = linhas.filter(l => l.membro_nome.toLowerCase().includes(_pr_membro));
            /* Aplicar filtro de status */
            if(_pr_status) linhas = linhas.filter(l => l.status === _pr_status);

            if(!linhas.length) {
                if(statsEl) statsEl.innerHTML='';
                contentEl.innerHTML='<div class="vl-empty"><div class="vl-empty-icon">—</div>Nenhum registo encontrado para os filtros aplicados.</div>';
                return;
            }

            /* ── Pré-computar: vezes servidas por membro por mês ── */
            const contagemMensal = {};
            linhas.forEach(l => {
                if(l.status !== 'presente' && l.status !== 'atrasado') return;
                const mes = l.data.slice(0,7);
                const k   = `${l.membro_id}_${mes}`;
                contagemMensal[k] = (contagemMensal[k] || 0) + 1;
            });

            /* ── Pré-computar: voluntários com múltiplas áreas no período ── */
            const membroAreas = {};
            linhas.forEach(l => {
                if(!membroAreas[l.membro_id]) membroAreas[l.membro_id] = new Set();
                membroAreas[l.membro_id].add(l.ministerio_id);
            });

            /* ── Stats globais ── */
            const totPresente  = linhas.filter(l=>l.status==='presente').length;
            const totAtrasado  = linhas.filter(l=>l.status==='atrasado').length;
            const totFaltou    = linhas.filter(l=>l.status==='faltou').length;
            const totSemReg    = linhas.filter(l=>l.status==='sem_registo').length;
            const totConfirm   = linhas.filter(l=>l.status==='pre_confirmado').length;

            if(statsEl) statsEl.innerHTML=`
<div class="vl-stat-row" style="margin-bottom:14px">
  <div class="vl-stat"><div class="vl-stat-num">${linhas.length}</div><div class="vl-stat-label">Registos</div></div>
  <div class="vl-stat"><div class="vl-stat-num">${totPresente}</div><div class="vl-stat-label">Presentes</div></div>
  <div class="vl-stat"><div class="vl-stat-num">${totAtrasado}</div><div class="vl-stat-label">Atrasados</div></div>
  <div class="vl-stat"><div class="vl-stat-num">${totFaltou}</div><div class="vl-stat-label">Faltas</div></div>
  <div class="vl-stat"><div class="vl-stat-num">${totConfirm}</div><div class="vl-stat-label">Confirmados</div></div>
  <div class="vl-stat"><div class="vl-stat-num">${totSemReg}</div><div class="vl-stat-label">Sem Registo</div></div>
</div>`;

            /* ── Agrupar por mês ── */
            const porMes = {};
            linhas.forEach(l => {
                const mes = l.data.slice(0,7);
                if(!porMes[mes]) porMes[mes] = [];
                porMes[mes].push(l);
            });

            const mesesOrdenados = Object.keys(porMes).sort();
            let html = '';

            mesesOrdenados.forEach(mes => {
                const mesLinhas = porMes[mes].sort((a,b) => a.data.localeCompare(b.data) || a.culto_hora.localeCompare(b.culto_hora));

                /* Stats do mês */
                const mP = mesLinhas.filter(l=>l.status==='presente').length;
                const mA = mesLinhas.filter(l=>l.status==='atrasado').length;
                const mF = mesLinhas.filter(l=>l.status==='faltou').length;
                const mS = mesLinhas.filter(l=>l.status==='sem_registo').length;

                /* Agrupar por data + culto dentro do mês */
                const porDia = {};
                mesLinhas.forEach(l => {
                    const k = `${l.data}__${l.culto_nome}__${l.culto_hora}`;
                    if(!porDia[k]) porDia[k] = { data: l.data, culto_nome: l.culto_nome, culto_hora: l.culto_hora, linhas: [] };
                    porDia[k].linhas.push(l);
                });

                const diasOrdenados = Object.keys(porDia).sort();

                let diasHtml = '';
                diasOrdenados.forEach(dKey => {
                    const dia = porDia[dKey];
                    const rows = dia.linhas.map(l => {
                        const mes2      = l.data.slice(0,7);
                        const vezes     = contagemMensal[`${l.membro_id}_${mes2}`] || 0;
                        const multiArea = (membroAreas[l.membro_id]?.size || 0) > 1;
                        const horaLabel = l.hora_checkin ? l.hora_checkin.slice(0,5) : '—';
                        const tardLabel = l.status === 'atrasado' && l.minutos_atraso > 0 ? ` (+${l.minutos_atraso}min)` : '';
                        return `<tr>
  <td style="font-size:12px;font-weight:600">${l.membro_nome}</td>
  <td style="font-size:11px;color:var(--text-faint)">${l.ministerio_nome}</td>
  <td><span class="vl-badge vl-b-${l.status}">${st_label(l.status)}${tardLabel}</span></td>
  <td style="font-size:11px">${horaLabel}</td>
  <td style="font-size:11px;text-align:center">${vezes > 0 ? vezes + 'x' : '—'}</td>
  <td>${multiArea ? '<span class="pr-multi-tag">+1 area</span>' : ''}</td>
</tr>`;
                    }).join('');

                    diasHtml += `
<div class="pr-day-block">
  <div class="pr-day-hd">
    <div class="pr-day-date">${fmtDataExtensa(dia.data)}</div>
    <div class="pr-day-culto">${dia.culto_nome}${dia.culto_hora ? ' · ' + dia.culto_hora : ''}</div>
  </div>
  <table class="vl-table" style="font-size:11px">
    <thead><tr><th>Voluntario</th><th>Area</th><th>Estado</th><th>Chegada</th><th>Vezes/Mes</th><th>Multi-area</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>
</div>`;
                });

                html += `
<div class="pr-month-block">
  <div class="pr-month-hd">
    <div class="pr-month-nome">${fmtMes(mes)}</div>
    <div class="pr-month-stats">
      ${mP ? `<span class="pr-stat-pill" style="background:#15803d">${mP} presentes</span>` : ''}
      ${mA ? `<span class="pr-stat-pill" style="background:#b45309">${mA} atrasados</span>` : ''}
      ${mF ? `<span class="pr-stat-pill" style="background:#b91c1c">${mF} faltas</span>` : ''}
      ${mS ? `<span class="pr-stat-pill" style="background:#6b7280">${mS} sem registo</span>` : ''}
    </div>
  </div>
  ${diasHtml}
</div>`;
            });

            contentEl.innerHTML = html;
        }

        function st_label(status) {
            return { presente:'Presente', atrasado:'Atrasado', faltou:'Falta',
                pre_confirmado:'Confirmado', sem_registo:'Sem registo' }[status] || status;
        }

        /* ── Imprimir Presenças ── */
        function vl_imprimirPresencas() {
            const statsEl   = document.getElementById('pr-stats');
            const contentEl = document.getElementById('pr-content');
            if(!contentEl) return;

            const minNome = _pr_min ? (_pr_mins_list.find(m=>m.id===_pr_min)?.nome || '') : 'Todos os ministerios';
            const periodoLabel = `${fmtD(_pr_start)} a ${fmtD(_pr_end)}`;

            /* Recolher dados das linhas renderizadas */
            const rows = [];
            document.querySelectorAll('#pr-content tbody tr').forEach(tr => {
                const tds = tr.querySelectorAll('td');
                if(tds.length < 5) return;
                rows.push([
                    tds[0]?.textContent?.trim() || '',
                    tds[1]?.textContent?.trim() || '',
                    tds[2]?.textContent?.trim() || '',
                    tds[3]?.textContent?.trim() || '',
                    tds[4]?.textContent?.trim() || '',
                    tds[5]?.textContent?.trim() || '',
                ]);
            });

            /* Agrupar por bloco de mês/dia para preservar estrutura */
            let bodyHtml = `
<h2>Relatorio de Presencas</h2>
<p style="font-size:10px;color:#555;margin-bottom:4px">Periodo: <strong>${periodoLabel}</strong> &nbsp;|&nbsp; Area: <strong>${minNome}</strong></p>
<p style="font-size:10px;color:#555;margin-bottom:14px">Exportado em ${new Date().toLocaleString('pt-PT')}</p>`;

            document.querySelectorAll('#pr-content .pr-month-block').forEach(monthEl => {
                const mNome  = monthEl.querySelector('.pr-month-nome')?.textContent || '';
                const mStats = monthEl.querySelector('.pr-month-stats')?.textContent?.replace(/\s+/g,' ').trim() || '';
                bodyHtml += `<h3 style="font-size:12px;margin:14px 0 4px;border-bottom:1px solid #ccc;padding-bottom:4px">${mNome} — ${mStats}</h3>`;

                monthEl.querySelectorAll('.pr-day-block').forEach(dayEl => {
                    const dDate  = dayEl.querySelector('.pr-day-date')?.textContent || '';
                    const dCulto = dayEl.querySelector('.pr-day-culto')?.textContent || '';
                    bodyHtml += `<p style="font-size:10px;color:#555;margin:8px 0 3px"><strong>${dDate}</strong> · ${dCulto}</p>`;
                    bodyHtml += '<table><thead><tr><th>Voluntario</th><th>Area</th><th>Estado</th><th>Chegada</th><th>Vezes/Mes</th><th>Multi-area</th></tr></thead><tbody>';
                    dayEl.querySelectorAll('tbody tr').forEach(tr => {
                        const tds = tr.querySelectorAll('td');
                        bodyHtml += `<tr>${[...tds].map(td => `<td>${td.textContent?.trim() || ''}</td>`).join('')}</tr>`;
                    });
                    bodyHtml += '</tbody></table>';
                });
            });

            abrirJanelaPrint(bodyHtml);
        }

        /* ══════════════════════════════════════════
           MISC
        ══════════════════════════════════════════ */
        function vl_toggle(id) {
            const row=document.getElementById(`vl-det-${id}`);
            if(!row) return;
            row.classList.toggle('vl-hidden');
            const btn=document.querySelector(`#vl-row-${id} button`);
            if(btn) btn.textContent=row.classList.contains('vl-hidden')?'+':'−';
        }

        function vl_filtrarCampanha(id) { vl_campFiltro=id||null; vl_renderInscricoes(); }

        async function vl_verificarPrazos() {
            try {
                const agora=new Date().toISOString();
                const exp=await sb(`voluntarios_atribuicoes?status=eq.aguardando&prazo_contato=lt.${agora}&select=id,inscricao_id`).catch(()=>[]);
                for(const a of exp){
                    await sb(`voluntarios_atribuicoes?id=eq.${a.id}`,{method:'PATCH',body:JSON.stringify({status:'sem_retorno'})});
                    await sb(`voluntarios_inscricoes?id=eq.${a.inscricao_id}`,{method:'PATCH',body:JSON.stringify({status:'sem_retorno'})});
                }
            } catch(_) {}
        }

        /* ══════════════════════════════════════════
           EXPOR NO WINDOW
        ══════════════════════════════════════════ */
        window.vl_init                     = vl_init;
        window.vl_setTab                   = vl_setTab;
        window.vl_toggle                   = vl_toggle;
        window.vl_filtrarCampanha          = vl_filtrarCampanha;
        window.vl_aprovar                  = vl_aprovar;
        window.vl_distribuirTodos          = vl_distribuirTodos;
        window.vl_filtrarInscricoes        = vl_filtrarInscricoes;
        window.vl_limparFiltrosIns         = vl_limparFiltrosIns;
        window.vl_mostrarLinkLider         = vl_mostrarLinkLider;
        window.vl_abrirDistribuir          = vl_abrirDistribuir;
        window.vl_confirmarDistribuir      = vl_confirmarDistribuir;
        window.vl_abrirRegistarVoluntario  = vl_abrirRegistarVoluntario;
        window.vl_confirmarRegistar        = vl_confirmarRegistar;
        window.vl_novaCampanha             = vl_novaCampanha;
        window.vl_guardarCampanha          = vl_guardarCampanha;
        window.vl_statusCampanha           = vl_statusCampanha;
        window.vl_gerarLinks               = vl_gerarLinks;
        window.vl_renderAtivosFiltrado     = vl_renderAtivosFiltrado;
        window.vl_limparFiltros            = vl_limparFiltros;
        window.vl_removerVoluntario        = vl_removerVoluntario;
        window.vl_abrirPerfil              = vl_abrirPerfil;
        window.vl_mostrarTabPerfil         = vl_mostrarTabPerfil;
        window.vl_carregarAnotacoes        = vl_carregarAnotacoes;
        window.vl_salvarAnotacao           = vl_salvarAnotacao;
        window.vl_removerMinisterioModal   = vl_removerMinisterioModal;
        window.vl_adicionarMinisterioModal = vl_adicionarMinisterioModal;
        window.vl_removerVoluntarioModal   = vl_removerVoluntarioModal;
        window.vl_guardarFuncao            = vl_guardarFuncao;
        window.vl_abrirRejeitar            = vl_abrirRejeitar;
        window.vl_confirmarRejeitar        = vl_confirmarRejeitar;
        window.vl_filtrarPresencas         = vl_filtrarPresencas;
        window.vl_limparFiltrosPr          = vl_limparFiltrosPr;
        window.vl_imprimirAtivos           = vl_imprimirAtivos;
        window.vl_imprimirPresencas        = vl_imprimirPresencas;

        vl_init();
    })();
</script>
