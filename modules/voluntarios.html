<style>
    /* ══════════════════════════════════════════
       VOLUNTÁRIOS + PRESENÇAS MODULE
       ══════════════════════════════════════════ */
    .vl-wrap {
        display: flex; flex-direction: column;
        height: 100%; min-height: 0; overflow: hidden;
        font-family: var(--font-body); background: var(--bg-page);
    }

    /* ── Tabs principais ── */
    .vl-tabs {
        display: flex; border-bottom: 1px solid var(--border);
        background: var(--bg-card); flex-shrink: 0; overflow-x: auto;
        scrollbar-width: none;
    }
    .vl-tabs::-webkit-scrollbar { display: none; }

    .vl-tab {
        padding: 10px 18px; font-family: var(--font-title);
        font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
        color: var(--text-faint); cursor: pointer;
        border-bottom: 2px solid transparent;
        border-top: none; border-left: none; border-right: none;
        background: none; transition: all 0.12s; white-space: nowrap;
    }
    .vl-tab:hover  { color: var(--text-main); }
    .vl-tab.active { color: var(--primary-dark); border-bottom-color: var(--primary); }

    /* ── Content ── */
    .vl-content { flex: 1; overflow-y: auto; padding: 16px; }

    /* ── Toolbar ── */
    .vl-toolbar {
        display: flex; align-items: center; justify-content: space-between;
        gap: 10px; flex-wrap: wrap; margin-bottom: 14px;
    }
    .vl-toolbar-title {
        font-family: var(--font-title); font-size: 11px;
        letter-spacing: 2px; text-transform: uppercase; color: var(--primary-dark);
    }

    /* ── Cards ── */
    .vl-card {
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: 10px; padding: 14px; margin-bottom: 10px;
    }
    .vl-card-title {
        font-family: var(--font-title); font-size: 9px; letter-spacing: 2px;
        text-transform: uppercase; color: var(--text-faint);
        margin-bottom: 10px; padding-bottom: 7px; border-bottom: 1px solid var(--border);
    }

    /* ── Tabela ── */
    .vl-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .vl-table th {
        text-align: left; font-family: var(--font-title); font-size: 8px;
        letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-faint);
        padding: 8px 10px; border-bottom: 1px solid var(--border); background: var(--bg-input);
        white-space: nowrap;
    }
    .vl-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .vl-table tr:last-child td { border-bottom: none; }
    .vl-table tr:hover td { background: var(--primary-faint); }

    /* ── Badges — fundo colorido + texto branco sempre ── */
    .vl-badge {
        display: inline-block; padding: 2px 8px; border-radius: 20px;
        font-family: var(--font-title); font-size: 8px; letter-spacing: 1px;
        text-transform: uppercase; white-space: nowrap; color: #fff;
    }
    .vl-b-pendente       { background: #6b7280; }
    .vl-b-em_atribuicao  { background: #b45309; }
    .vl-b-aprovado       { background: #15803d; }
    .vl-b-recusado       { background: #b91c1c; }
    .vl-b-sem_retorno    { background: #9f1239; }
    .vl-b-ativo          { background: #15803d; }
    .vl-b-inativo        { background: #6b7280; }
    .vl-b-rascunho       { background: #64748b; }
    .vl-b-encerrado      { background: #374151; }
    /* Check-in */
    .vl-b-presente       { background: #15803d; }
    .vl-b-atrasado       { background: #b45309; }
    .vl-b-faltou         { background: #b91c1c; }
    .vl-b-pre_confirmado { background: #0e7490; }
    .vl-b-sem_registo    { background: #6b7280; }
    /* Anotações */
    .vl-b-anotacao       { background: var(--primary-dark, #0e7490); }
    .vl-b-feedback       { background: #b45309; }
    .vl-b-interacao      { background: #15803d; }
    .vl-b-conversa       { background: #1d4ed8; }

    /* ── Botões ── */
    .vl-btn {
        padding: 6px 12px; border-radius: 8px; border: none;
        font-family: var(--font-title); font-size: 9px; letter-spacing: 1px;
        text-transform: uppercase; cursor: pointer; transition: all 0.12s;
        white-space: nowrap; color: #fff;
    }
    .vl-btn-p { background: var(--primary, #0e7490); }
    .vl-btn-p:hover { background: var(--primary-dark, #0c6070); }
    .vl-btn-o { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); }
    .vl-btn-o:hover { border-color: var(--primary); color: var(--primary-dark); }
    .vl-btn-m { background: var(--bg-input); color: var(--text-faint); border: 1px solid var(--border); }
    .vl-btn-m:hover { color: var(--text-main); border-color: var(--primary); }
    .vl-btn-d { background: #991b1b; color: #fff; }
    .vl-btn-d:hover { background: #7f1d1d; }
    .vl-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Campos ── */
    .vl-field { margin-bottom: 10px; }
    .vl-label {
        display: block; font-family: var(--font-title); font-size: 8px;
        letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-faint); margin-bottom: 4px;
    }
    .vl-input, .vl-select, .vl-textarea {
        width: 100%; background: var(--bg-input); border: 1px solid var(--border);
        border-radius: 8px; color: var(--text-main); font-family: var(--font-body);
        font-size: 12px; padding: 7px 10px; outline: none; transition: border-color 0.15s;
        box-sizing: border-box;
    }
    .vl-input:focus, .vl-select:focus, .vl-textarea:focus { border-color: var(--primary); }
    .vl-textarea { resize: vertical; min-height: 65px; }
    .vl-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
    .vl-row .vl-field { flex: 1; min-width: 130px; margin-bottom: 0; }

    /* ── Stats ── */
    .vl-stat-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .vl-stat {
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: 10px; padding: 10px 12px; text-align: center; flex: 1; min-width: 80px;
    }
    .vl-stat-num {
        font-family: var(--font-title); font-size: 18px; font-weight: 700;
        color: var(--primary-dark);
    }
    .vl-stat-label {
        font-size: 8px; color: var(--text-faint); text-transform: uppercase;
        letter-spacing: 1px; margin-top: 2px;
    }

    /* ── Stats secção com título ── */
    .vl-stats-section {
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: 10px; padding: 12px 14px; margin-bottom: 12px;
    }
    .vl-stats-section-title {
        font-family: var(--font-title); font-size: 8px; letter-spacing: 2px;
        text-transform: uppercase; color: var(--text-faint);
        margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
    }
    .vl-stats-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px;
    }
    .vl-stat-mini {
        background: var(--bg-input); border: 1px solid var(--border);
        border-radius: 8px; padding: 8px 10px; text-align: center;
    }
    .vl-stat-mini-num {
        font-family: var(--font-title); font-size: 16px; font-weight: 700;
        color: var(--primary-dark);
    }
    .vl-stat-mini-label {
        font-size: 8px; color: var(--text-faint); text-transform: uppercase;
        letter-spacing: 0.8px; margin-top: 2px;
    }

    /* ── Alertas ── */
    .vl-alert { padding: 8px 12px; border-radius: 8px; font-size: 12px; margin-bottom: 10px; }
    .vl-alert-e { background: rgba(185,28,28,0.1); border: 1px solid rgba(185,28,28,0.3); color: var(--text-main); }
    .vl-alert-s { background: rgba(21,128,61,0.1); border: 1px solid rgba(21,128,61,0.3); color: var(--text-main); }
    .vl-alert-i { background: var(--primary-faint); border: 1px solid var(--border); color: var(--text-main); }

    /* ── Modal ── */
    .vl-modal-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
        display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 16px;
    }
    .vl-modal {
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: 12px; padding: 22px; width: 100%; max-width: 460px;
        max-height: 90vh; overflow-y: auto;
    }
    .vl-modal-title {
        font-family: var(--font-title); font-size: 10px; letter-spacing: 2px;
        text-transform: uppercase; color: var(--primary-dark);
        margin-bottom: 14px; padding-bottom: 9px; border-bottom: 1px solid var(--border);
    }
    .vl-modal-footer {
        display: flex; gap: 8px; justify-content: flex-end;
        margin-top: 14px; padding-top: 10px; border-top: 1px solid var(--border);
    }
    .vl-modal-tabs {
        display: flex; border-bottom: 1px solid var(--border); margin-bottom: 14px;
    }
    .vl-modal-tab {
        padding: 7px 14px; font-family: var(--font-title); font-size: 8px;
        letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-faint);
        cursor: pointer; border-bottom: 2px solid transparent; background: none;
        border-top: none; border-left: none; border-right: none; transition: all 0.12s;
    }
    .vl-modal-tab:hover  { color: var(--text-main); }
    .vl-modal-tab.active { color: var(--primary-dark); border-bottom-color: var(--primary); }
    .vl-modal-tab-content { display: none; }
    .vl-modal-tab-content.active { display: block; }

    /* ── Anotações ── */
    .vl-anot-item {
        background: var(--bg-input); border: 1px solid var(--border);
        border-radius: 8px; padding: 10px 12px; margin-bottom: 7px;
    }
    .vl-anot-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .vl-anot-data {
        font-size: 9px; color: var(--text-faint); font-family: var(--font-title);
        letter-spacing: 0.5px; margin-left: auto;
    }
    .vl-anot-texto {
        font-size: 12px; color: var(--text-main); line-height: 1.5;
        white-space: pre-wrap; word-break: break-word;
    }

    /* ── Expand row ── */
    .vl-expand-body td { background: var(--bg-input); padding: 11px 10px; }
    .vl-hidden { display: none; }

    .vl-tag {
        display: inline-block; font-size: 9px; padding: 2px 7px; border-radius: 20px;
        background: var(--primary-faint); border: 1px solid var(--border);
        color: var(--primary-dark); margin: 1px; font-family: var(--font-title); letter-spacing: 0.5px;
    }

    /* ── Link box ── */
    .vl-link-box {
        display: flex; align-items: center; gap: 8px;
        background: var(--bg-input); border: 1px solid var(--border);
        border-radius: 8px; padding: 6px 10px; margin-top: 5px;
    }
    .vl-link-box code {
        flex: 1; font-size: 10px; color: var(--text-faint);
        overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-family: monospace;
    }

    /* ── Motivo rejeição ── */
    .vl-motivo-box {
        background: rgba(185,28,28,0.06); border: 1px solid rgba(185,28,28,0.2);
        border-radius: 7px; padding: 8px 11px; margin-top: 5px;
    }
    .vl-motivo-label {
        font-family: var(--font-title); font-size: 8px; letter-spacing: 1px;
        text-transform: uppercase; color: var(--text-main); margin-bottom: 3px;
    }
    .vl-motivo-texto { font-size: 11px; color: var(--text-main); font-style: italic; }

    /* ── Empty ── */
    .vl-empty { text-align: center; padding: 44px 20px; color: var(--text-faint); font-size: 12px; }
    .vl-empty-icon { font-size: 18px; margin-bottom: 8px; opacity: 0.35; font-family: var(--font-title); letter-spacing: 2px; }

    /* ── Campanha card ── */
    .vl-campanha-card {
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: 10px; padding: 14px; margin-bottom: 8px;
    }
    .vl-campanha-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
    .vl-campanha-nome { font-family: var(--font-title); font-size: 10px; letter-spacing: 1px; color: var(--text-main); }
    .vl-campanha-datas { font-size: 10px; color: var(--text-faint); margin-top: 2px; }
    .vl-sep { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
    .vl-btn-row { display: flex; gap: 6px; flex-wrap: wrap; }

    /* ══ PRESENÇAS ══════════════════════════════ */
    .pr-month-block {
        margin-bottom: 18px;
        border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
    }
    .pr-month-hd {
        background: var(--bg-input); padding: 9px 14px;
        display: flex; align-items: center; justify-content: space-between;
        border-bottom: 1px solid var(--border);
    }
    .pr-month-nome {
        font-family: var(--font-title); font-size: 10px; letter-spacing: 2px;
        text-transform: uppercase; color: var(--primary-dark);
    }
    .pr-month-stats { display: flex; gap: 6px; }
    .pr-stat-pill {
        font-size: 8px; padding: 2px 8px; border-radius: 20px;
        font-family: var(--font-title); letter-spacing: 0.5px; color: #fff;
    }
    .pr-day-block { border-bottom: 1px solid var(--border); }
    .pr-day-block:last-child { border-bottom: none; }
    .pr-day-hd {
        padding: 6px 14px; background: var(--bg-card);
        display: flex; align-items: center; gap: 12px;
        border-bottom: 1px solid var(--border);
    }
    .pr-day-date {
        font-family: var(--font-title); font-size: 9px; letter-spacing: 1px;
        color: var(--text-main);
    }
    .pr-day-culto { font-size: 10px; color: var(--text-faint); }
    .pr-multi-tag {
        font-size: 8px; padding: 1px 6px; border-radius: 20px;
        background: var(--primary, #0e7490); color: #fff;
        font-family: var(--font-title); letter-spacing: 0.5px;
    }

    /* ── Print styles ── */
    @media print {
        .vl-tabs, .vl-toolbar button, .vl-btn, input, select,
        .vl-btn-row, .pr-no-print { display: none !important; }
        .vl-content { overflow: visible; padding: 0; }
        .vl-table th, .vl-table td { font-size: 10px; padding: 5px 7px; }
    }
</style>

<!-- ══════════════════════════════════════════
     HTML
     ══════════════════════════════════════════ -->
<div class="vl-wrap" id="vl-wrap">
    <div class="vl-tabs">
        <button class="vl-tab active" id="vl-tab-ativos"     onclick="vl_setTab('ativos')">Voluntários Ativos</button>
        <button class="vl-tab"        id="vl-tab-inscricoes" onclick="vl_setTab('inscricoes')">Novas Inscricoes</button>
        <button class="vl-tab"        id="vl-tab-campanhas"  onclick="vl_setTab('campanhas')">Campanhas</button>
        <button class="vl-tab"        id="vl-tab-presencas"  onclick="vl_setTab('presencas')">Presencas</button>
    </div>
    <div class="vl-content" id="vl-content">
        <div class="vl-empty"><div class="vl-empty-icon">—</div>A carregar...</div>
    </div>
</div>

<script>
    (function () {

        /* ══════════════════════════════════════════
           HELPERS
        ══════════════════════════════════════════ */
        function sb(path, opts = {}) {
            return fetch(`${SUPA_URL}/rest/v1/${path}`, {
                ...opts,
                headers: {
                    'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`,
                    'Content-Type': 'application/json', 'Prefer': 'return=representation',
                    ...opts.headers,
                },
            }).then(async r => {
                if (!r.ok) { const e = await r.json().catch(() => {}); throw e; }
                const txt = await r.text(); return txt ? JSON.parse(txt) : [];
            });
        }

        function fmt(dt) {
            if (!dt) return '—';
            return new Date(dt).toLocaleString('pt-PT', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
        }
        function fmtD(dt) {
            if (!dt) return '—';
            return new Date(dt).toLocaleDateString('pt-PT');
        }
        function fmtMes(yyyymm) {
            const [y, m] = yyyymm.split('-');
            const meses = ['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
            return `${meses[parseInt(m)-1]} ${y}`;
        }
        function fmtDataExtensa(iso) {
            const d = new Date(iso + 'T00:00:00');
            const dias = ['Domingo','Segunda','Terca','Quarta','Quinta','Sexta','Sabado'];
            return `${dias[d.getDay()]}, ${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
        }
        function mesAtualISO() {
            const n = new Date();
            const y = n.getFullYear();
            const m = String(n.getMonth()+1).padStart(2,'0');
            const last = new Date(y, n.getMonth()+1, 0).getDate();
            return { start: `${y}-${m}-01`, end: `${y}-${m}-${last}` };
        }

        function c() { return document.getElementById('vl-content'); }

        /* ══════════════════════════════════════════
           ESTADO GLOBAL
        ══════════════════════════════════════════ */
        let vl_tabAtiva     = 'ativos';
        let vl_campFiltro   = null;
        let vl_membrosCache = [];

        /* ══════════════════════════════════════════
           INIT
        ══════════════════════════════════════════ */
        async function vl_init() {
            try {
                vl_membrosCache = await sb('membros?select=id,nome,e_voluntario&ativo=eq.true&order=nome') || [];
            } catch (_) {}
            vl_verificarPrazos();
            vl_renderAtivos();
        }

        /* ══════════════════════════════════════════
           TABS
        ══════════════════════════════════════════ */
        function vl_setTab(tab) {
            vl_tabAtiva = tab;
            ['ativos','inscricoes','campanhas','presencas'].forEach(t => {
                document.getElementById(`vl-tab-${t}`)?.classList.toggle('active', t === tab);
            });
            if (tab === 'ativos')     vl_renderAtivos();
            if (tab === 'inscricoes') vl_renderInscricoes();
            if (tab === 'campanhas')  vl_renderCampanhas();
            if (tab === 'presencas')  vl_renderPresencas();
        }

        /* ══════════════════════════════════════════
           ABA 1 — VOLUNTÁRIOS ATIVOS
        ══════════════════════════════════════════ */
        let vl_ativosCache     = [];
        let vl_ministeriosList = [];
        let vl_idiomasList     = [];
        let vl_nacList         = [];
        let _vl_q = '', _vl_min = '', _vl_idi = '', _vl_nac = '';

        async function vl_renderAtivos() {
            c().innerHTML = '<div class="vl-empty"><div class="vl-empty-icon">—</div>A carregar...</div>';
            try {
                const membros = await sb(
                    'membros?e_voluntario=eq.true&ativo=eq.true' +
                    '&select=id,nome,email,telefone,Idiomas,nacionalidade,funcao_voluntario&order=nome'
                ) || [];

                let minsMap = {}, minsRaw = [];
                if (membros.length) {
                    const ids = membros.map(m => m.id).join(',');
                    minsRaw = await sb(
                        `membro_ministerios?membro_id=in.(${ids})&ativo=eq.true` +
                        `&select=id,membro_id,papel,ministerios(id,nome)`
                    ).catch(() => []);
                    (minsRaw || []).forEach(v => {
                        if (!minsMap[v.membro_id]) minsMap[v.membro_id] = [];
                        minsMap[v.membro_id].push({ id: v.ministerios?.id, nome: v.ministerios?.nome, papel: v.papel, vinc_id: v.id });
                    });
                }

                vl_ativosCache = membros.map(m => ({
                    ...m,
                    _ministerios: minsMap[m.id] || [],
                    _idiomasArr:  vl_parseIdiomas(m.Idiomas),
                    _nac:         (m.nacionalidade || '').trim(),
                }));

                const minSet = new Map();
                minsRaw.forEach(v => { if (v.ministerios?.id) minSet.set(v.ministerios.id, v.ministerios.nome); });
                vl_ministeriosList = [...minSet.entries()].map(([id,nome]) => ({ id, nome })).sort((a,b) => a.nome.localeCompare(b.nome));

                const idSet = new Set(), nacSet = new Set();
                vl_ativosCache.forEach(m => {
                    m._idiomasArr.forEach(i => idSet.add(i));
                    if (m._nac) nacSet.add(m._nac);
                });
                vl_idiomasList = [...idSet].sort();
                vl_nacList     = [...nacSet].sort();

            } catch (e) {
                c().innerHTML = `<div class="vl-alert vl-alert-e">Erro ao carregar: ${e?.message || JSON.stringify(e)}</div>`;
                return;
            }
            vl_renderAtivosFiltrado();
        }

        function vl_parseIdiomas(val) {
            if (!val) return [];
            try { const a = typeof val === 'string' ? JSON.parse(val) : val; return Array.isArray(a) ? a : []; }
            catch (_) { return typeof val === 'string' ? [val] : []; }
        }

        function vl_renderAtivosFiltrado() {
            const eNome = document.getElementById('vl-search-nome');
            const eMin  = document.getElementById('vl-filter-min');
            const eIdi  = document.getElementById('vl-filter-idi');
            const eNac  = document.getElementById('vl-filter-nac');
            if (eNome) _vl_q   = eNome.value;
            if (eMin)  _vl_min = eMin.value;
            if (eIdi)  _vl_idi = eIdi.value;
            if (eNac)  _vl_nac = eNac.value;

            const q = _vl_q.toLowerCase();
            let lista = [...vl_ativosCache];
            if (q)      lista = lista.filter(m => m.nome.toLowerCase().includes(q));
            if (_vl_min) lista = lista.filter(m => m._ministerios.some(mn => mn.id === _vl_min));
            if (_vl_idi) lista = lista.filter(m => m._idiomasArr.includes(_vl_idi));
            if (_vl_nac) lista = lista.filter(m => m._nac === _vl_nac);

            /* ── Build UI shell se ainda não existe ── */
            if (!document.getElementById('vl-ativos-wrap')) {
                const minOpts = vl_ministeriosList.map(mn => `<option value="${mn.id}">${mn.nome}</option>`).join('');

        function vl_limparFiltros() {
            _vl_q = ''; _vl_min = ''; _vl_idi = ''; _vl_nac = '';
            ['vl-search-nome','vl-filter-min','vl-filter-idi','vl-filter-nac'].forEach(id => {
                const el = document.getElementById(id); if (el) el.value = '';

        /* ── Print voluntários ── */
        function vl_imprimirAtivos() {
            const q = _vl_q.toLowerCase();
            let lista = [...vl_ativosCache];
            if (q)      lista = lista.filter(m => m.nome.toLowerCase().includes(q));
            if (_vl_min) lista = lista.filter(m => m._ministerios.some(mn => mn.id === _vl_min));
            if (_vl_idi) lista = lista.filter(m => m._idiomasArr.includes(_vl_idi));
            if (_vl_nac) lista = lista.filter(m => m._nac === _vl_nac);

            const rows = lista.map(v => `<tr>
          <td>${v.nome}</td>
          <td>${v._ministerios.map(m=>m.nome).join(', ') || '—'}</td>
          <td>${v.telefone || '—'}</td>
          <td>${v.email || '—'}</td>
          <td>${v._idiomasArr.join(', ') || '—'}</td>
          <td>${v._nac || '—'}</td>
        </tr>`).join('');

          <h2>Voluntarios Ativos</h2>

            <thead><tr><th>Nome</th><th>Ministerios</th><th>Telefone</th><th>E-mail</th><th>Idiomas</th><th>Nacionalidade</th></tr></thead>

          body { font-family: Arial, sans-serif; font-size: 11px; margin: 20px; color: #000; }
          h2 { font-size: 14px; margin: 0 0 6px; }
          table { width: 100%; border-collapse: collapse; }
          th { background: #f0f0f0; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; padding: 6px 8px; text-align: left; border: 1px solid #ddd; }
          td { padding: 6px 8px; border: 1px solid #ddd; font-size: 10px; }
          tr:nth-child(even) td { background: #f9f9f9; }
          @media print { button { display: none; } }
        </style></head><body>
          ${bodyHtml}
          <br><button onclick="window.print()" style="padding:6px 16px;font-size:11px;cursor:pointer">Imprimir</button>

        /* ── Remover voluntário ── */

            if (!confirm(`Remover ${nome} da lista de voluntarios?\nO perfil do membro nao sera alterado.`)) return;
            try {
                await sb(`membros?id=eq.${membroId}`, { method: 'PATCH', body: JSON.stringify({ e_voluntario: false }) });
                vl_ativosCache = vl_ativosCache.filter(m => m.id !== membroId);
                const idx = vl_membrosCache.findIndex(m => m.id === membroId);
                if (idx >= 0) vl_membrosCache[idx].e_voluntario = false;
                vl_renderAtivosFiltrado();
            } catch (e) { alert('Erro: ' + (e?.message || JSON.stringify(e))); }
        }

      <div><div class="vl-label">E-mail</div><div style="font-size:12px">${vol.email || '—'}</div></div>

        <option value="Professor"   ${funcaoSel('Professor')}>Professor</option>

        <option value="Co-lider">Co-lider</option><option value="Office">Office</option>

        function vl_mostrarTabPerfil(tab, membroId) {
            ['perfil','ministerios','anotacoes'].forEach(t => {
                document.getElementById(`vl-pt-${t}`)?.classList.toggle('active', t === tab);
                document.getElementById(`vl-tc-${t}`)?.classList.toggle('active', t === tab);
            });
            if (tab === 'anotacoes') vl_carregarAnotacoes(membroId);
        }

        async function vl_carregarAnotacoes(membroId) {
            const el = document.getElementById('vl-anot-lista');
            if (!el) return;
            el.innerHTML = '<div class="vl-empty" style="padding:20px"><div class="vl-empty-icon">—</div>A carregar...</div>';
            try {
                const rows = await sb(`voluntarios_anotacoes?membro_id=eq.${membroId}&order=created_at.desc`) || [];
                if (!rows.length) {
                    el.innerHTML = '<div class="vl-empty" style="padding:24px"><div class="vl-empty-icon">—</div>Sem anotacoes. Regista a primeira interacao acima.</div>';
                    return;
                }
                const tipoBadge = { anotacao:'vl-b-anotacao', feedback:'vl-b-feedback', interacao:'vl-b-interacao', conversa:'vl-b-conversa' };
                el.innerHTML = rows.map(r => `
<div class="vl-anot-item">
  <div class="vl-anot-meta">
    <span class="vl-badge ${tipoBadge[r.tipo] || 'vl-b-anotacao'}">${r.tipo}</span>
    <span class="vl-anot-data">${fmt(r.created_at)}</span>
  </div>
  <div class="vl-anot-texto">${r.texto.replace(/</g,'&lt;')}</div>
</div>`).join('');
            } catch (e) {
                el.innerHTML = `<div class="vl-alert vl-alert-e">Erro: ${e?.message}</div>`;
            }
        }

        async function vl_salvarAnotacao(membroId, btn) {
            const tipo  = document.getElementById('vl-anot-tipo')?.value || 'anotacao';
            const texto = document.getElementById('vl-anot-texto')?.value?.trim();
            if (!texto) { alert('Escreve o conteudo da anotacao antes de guardar.'); return; }
            btn.disabled = true; btn.textContent = 'A guardar...';
            try {
                await sb('voluntarios_anotacoes', { method: 'POST', body: JSON.stringify({ membro_id: membroId, tipo, texto }) });
                const txtEl = document.getElementById('vl-anot-texto');
                if (txtEl) txtEl.value = '';
                btn.textContent = 'Guardado!';
                setTimeout(() => { btn.disabled = false; btn.textContent = 'Guardar'; }, 1200);
                vl_carregarAnotacoes(membroId);
            } catch (e) {
                alert('Erro: ' + (e?.message || JSON.stringify(e)));
                btn.disabled = false; btn.textContent = 'Guardar';
            }
        }

        async function vl_removerMinisterioModal(vincId, membroId) {
            if (!confirm('Remover este ministerio do voluntario?')) return;
            try {
                await sb(`membro_ministerios?id=eq.${vincId}`, { method: 'PATCH', body: JSON.stringify({ ativo: false }) });
                const vol = vl_ativosCache.find(m => m.id === membroId);
                if (vol) vol._ministerios = vol._ministerios.filter(mn => mn.vinc_id !== vincId);
                document.getElementById('vl-perfil-modal')?.remove();
                vl_abrirPerfil(membroId);
                vl_renderAtivosFiltrado();
            } catch (e) { alert('Erro: ' + (e?.message || JSON.stringify(e))); }
        }

        async function vl_adicionarMinisterioModal(membroId) {
            const minId = document.getElementById('vl-perfil-add-min')?.value;
            const papel = document.getElementById('vl-perfil-add-papel')?.value || null;
            const alEl  = document.getElementById('vl-perfil-alert');
            if (!minId) { if (alEl) alEl.innerHTML = '<div class="vl-alert vl-alert-e">Seleciona um ministerio.</div>'; return; }
            const vol = vl_ativosCache.find(m => m.id === membroId);
            if (vol?._ministerios.some(mn => mn.id === minId)) {
                if (alEl) alEl.innerHTML = '<div class="vl-alert vl-alert-e">Ja associado.</div>'; return;
            }
            try {
                await sb('membro_ministerios', { method: 'POST', body: JSON.stringify({ membro_id: membroId, ministerio_id: minId, papel: papel || null, ativo: true }) });
                document.getElementById('vl-perfil-modal')?.remove();
                await vl_renderAtivos();
                vl_abrirPerfil(membroId);
            } catch (e) {
                if (alEl) alEl.innerHTML = `<div class="vl-alert vl-alert-e">Erro: ${e?.message}</div>`;
            }
        }

        async function vl_removerVoluntarioModal(membroId, nome) {
            document.getElementById('vl-perfil-modal')?.remove();
            await vl_removerVoluntario(membroId, nome);
        }

        async function vl_guardarFuncao(membroId) {
            const funcao = document.getElementById('vl-perfil-funcao')?.value || null;
            try {
                await sb(`membros?id=eq.${membroId}`, { method: 'PATCH', body: JSON.stringify({ funcao_voluntario: funcao || null }) });
                const vol = vl_ativosCache.find(m => m.id === membroId);
                if (vol) vol.funcao_voluntario = funcao;
                const btns = document.querySelectorAll('#vl-perfil-modal .vl-btn-p');
                btns.forEach(b => { if (b.textContent === 'Guardar') { b.textContent = 'Guardado!'; setTimeout(() => b.textContent = 'Guardar', 1500); } });
            } catch (e) { alert('Erro: ' + (e?.message || JSON.stringify(e))); }
        }

    <label class="vl-label">Membro</label>
    <select class="vl-select" id="vl-reg-mem"><option value="">Selecionar membro...</option>${opts}</select>
  </div>
  <div id="vl-reg-alert"></div>
  <div class="vl-modal-footer">
    <button class="vl-btn vl-btn-m" onclick="this.closest('.vl-modal-overlay').remove()">Cancelar</button>
    <button class="vl-btn vl-btn-p" onclick="vl_confirmarRegistar(this)">Registar</button>
  </div>
</div>`;
            document.body.appendChild(ov);
        }

        async function vl_confirmarRegistar(btn) {
            const memId = document.getElementById('vl-reg-mem')?.value;
            const alEl  = document.getElementById('vl-reg-alert');
            if (!memId) { if (alEl) alEl.innerHTML = '<div class="vl-alert vl-alert-e">Seleciona um membro.</div>'; return; }
            btn.disabled = true; btn.textContent = 'A guardar...';
            try {
                await sb(`membros?id=eq.${memId}`, { method: 'PATCH', body: JSON.stringify({ e_voluntario: true }) });
                const idx = vl_membrosCache.findIndex(m => m.id === memId);
                if (idx >= 0) vl_membrosCache[idx].e_voluntario = true;
                btn.closest('.vl-modal-overlay').remove();
                vl_renderAtivos();
            } catch (e) {
                if (alEl) alEl.innerHTML = `<div class="vl-alert vl-alert-e">Erro: ${e?.message}</div>`;
                btn.disabled = false; btn.textContent = 'Registar';
            }
        }

        /* ══════════════════════════════════════════
           ABA 2 — NOVAS INSCRICOES
        ══════════════════════════════════════════ */
        let _ins_cache = [], _ins_todos_ministerios = [];
        let _ins_q = '', _ins_status = '', _ins_escolha = '', _ins_min = '';

        async function vl_renderInscricoes() {
            c().innerHTML = '<div class="vl-empty"><div class="vl-empty-icon">—</div>A carregar...</div>';
            let campanhas = [], inscricoes = [];
            try {
                campanhas  = await sb('voluntarios_campanhas?select=id,nome,status&order=created_at.desc') || [];
                let path   = 'voluntarios_inscricoes?select=id,status,created_at,campanha_id,membro_id,motivo_rejeicao,' +
                    'disponibilidade_sabado_manha,disponibilidade_sabado_tarde,' +
                    'disponibilidade_domingo_manha,disponibilidade_domingo_tarde&order=created_at.desc';
                if (vl_campFiltro) path += `&campanha_id=eq.${vl_campFiltro}`;
                inscricoes = await sb(path) || [];
            } catch(e) { c().innerHTML = `<div class="vl-alert vl-alert-e">Erro: ${e?.message}</div>`; return; }

            if (inscricoes.length) {
                const insIds  = inscricoes.map(i => i.id).join(',');
                const memIds  = [...new Set(inscricoes.map(i => i.membro_id))].join(',');
                const campIds = [...new Set(inscricoes.map(i => i.campanha_id))].join(',');
                const [membsD, campsD, areasD, atribD] = await Promise.all([
                    sb(`membros?id=in.(${memIds})&select=id,nome,email,telefone`).catch(()=>[]),
                    sb(`voluntarios_campanhas?id=in.(${campIds})&select=id,nome`).catch(()=>[]),
                    sb(`voluntarios_areas_interesse?inscricao_id=in.(${insIds})&select=inscricao_id,ordem,motivo,ministerio_id,ministerios(id,nome)&order=ordem`).catch(()=>[]),
                    sb(`voluntarios_atribuicoes?inscricao_id=in.(${insIds})&select=id,inscricao_id,ministerio_id,link_token,status,prazo_contato,data_contato,ministerios(id,nome)&order=created_at.desc`).catch(()=>[]),
                ]);
                const membMap  = Object.fromEntries((membsD||[]).map(m=>[m.id,m]));
                const campMap  = Object.fromEntries((campsD||[]).map(c=>[c.id,c]));
                const areasMap = {}, atribMap = {};
                (areasD||[]).forEach(a => { if(!areasMap[a.inscricao_id]) areasMap[a.inscricao_id]=[]; areasMap[a.inscricao_id].push(a); });
                (atribD||[]).forEach(a => { if(!atribMap[a.inscricao_id]) atribMap[a.inscricao_id]=[]; atribMap[a.inscricao_id].push(a); });
                inscricoes = inscricoes.map(i => ({
                    ...i,
                    _membro:      membMap[i.membro_id] || null,
                    _campanha:    campMap[i.campanha_id] || null,
                    _areas:       (areasMap[i.id]||[]).sort((a,b)=>a.ordem-b.ordem),
                    _atribuicoes: atribMap[i.id] || [],
                }));
            }
            _ins_cache = inscricoes;

            const minSet = new Map();
            inscricoes.forEach(i => i._areas?.forEach(a => { if(a.ministerios?.id) minSet.set(a.ministerios.id, a.ministerios.nome); }));
            _ins_todos_ministerios = [...minSet.entries()].map(([id,nome])=>({id,nome})).sort((a,b)=>a.nome.localeCompare(b.nome));

            const campOpts = campanhas.map(c => `<option value="${c.id}" ${vl_campFiltro===c.id?'selected':''}>${c.nome} (${c.status})</option>`).join('');
            const pendentes = inscricoes.filter(i=>i.status==='pendente').length;

            c().innerHTML = `
<div class="vl-toolbar">
  <span class="vl-toolbar-title">Novas Inscricoes</span>
  <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
    <select class="vl-select" onchange="vl_filtrarCampanha(this.value)" style="min-width:180px">
      <option value="">Todas as campanhas</option>${campOpts}
    </select>
    ${vl_campFiltro && pendentes > 0
                ? `<button class="vl-btn vl-btn-p" onclick="vl_distribuirTodos('${vl_campFiltro}')">Distribuir Pendentes (${pendentes})</button>`
                : ''}
  </div>
</div>
<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center">
  <input class="vl-input" id="ins-q" placeholder="Pesquisar nome..." oninput="vl_filtrarInscricoes()" style="flex:2;min-width:140px;max-width:220px">
  <select class="vl-select" id="ins-status" onchange="vl_filtrarInscricoes()" style="min-width:130px">
    <option value="">Todos os estados</option>
    <option value="pendente">Pendente</option>
    <option value="em_atribuicao">Em Atribuicao</option>
    <option value="aprovado">Aprovado</option>
    <option value="recusado">Recusado</option>
    <option value="sem_retorno">Sem Retorno</option>
  </select>
  <select class="vl-select" id="ins-escolha" onchange="vl_filtrarInscricoes()" style="min-width:110px">
    <option value="">Todas as escolhas</option>
    <option value="1">1a Escolha</option><option value="2">2a Escolha</option><option value="3">3a Escolha</option>
  </select>
  <select class="vl-select" id="ins-min" onchange="vl_filtrarInscricoes()" style="min-width:150px">
    <option value="">Todos os ministerios</option>
    ${_ins_todos_ministerios.map(m=>`<option value="${m.id}">${m.nome}</option>`).join('')}
  </select>
  <button class="vl-btn vl-btn-m" id="ins-limpar-btn" onclick="vl_limparFiltrosIns()" style="display:none">Limpar</button>
</div>
<div id="vl-alert-ins"></div>
<div id="ins-stats-wrap"></div>
<div id="ins-tabela-wrap"></div>`;
            vl_filtrarInscricoes();
        }

        function vl_filtrarInscricoes() {
            const elQ=document.getElementById('ins-q'),elSt=document.getElementById('ins-status'),
                elEs=document.getElementById('ins-escolha'),elMi=document.getElementById('ins-min');
            if(elQ) _ins_q=elQ.value; if(elSt) _ins_status=elSt.value;
            if(elEs) _ins_escolha=elEs.value; if(elMi) _ins_min=elMi.value;

            const q=_ins_q.toLowerCase();
            let lista=[..._ins_cache];
            if(q) lista=lista.filter(i=>(i._membro?.nome||'').toLowerCase().includes(q));
            if(_ins_status) lista=lista.filter(i=>i.status===_ins_status);
            if(_ins_escolha||_ins_min) {
                lista=lista.filter(i=>{
                    const ordens=_ins_escolha?[parseInt(_ins_escolha)]:[1,2,3];
                    return ordens.some(ord=>{
                        const a=i._areas.find(x=>x.ordem===ord);
                        if(!a) return false;
                        if(_ins_min&&a.ministerio_id!==_ins_min) return false;
                        return true;
                    });
                });
            }
            const limEl=document.getElementById('ins-limpar-btn');
            if(limEl) limEl.style.display=(q||_ins_status||_ins_escolha||_ins_min)?'':'none';

            const statsEl=document.getElementById('ins-stats-wrap');
            if(statsEl) statsEl.innerHTML=`
<div class="vl-stat-row">
  <div class="vl-stat"><div class="vl-stat-num">${_ins_cache.length}</div><div class="vl-stat-label">Total</div></div>
  <div class="vl-stat"><div class="vl-stat-num">${_ins_cache.filter(i=>i.status==='pendente').length}</div><div class="vl-stat-label">Pendentes</div></div>
  <div class="vl-stat"><div class="vl-stat-num">${_ins_cache.filter(i=>i.status==='em_atribuicao').length}</div><div class="vl-stat-label">Atribuidos</div></div>
  <div class="vl-stat"><div class="vl-stat-num">${_ins_cache.filter(i=>i.status==='aprovado').length}</div><div class="vl-stat-label">Aprovados</div></div>
  <div class="vl-stat"><div class="vl-stat-num">${_ins_cache.filter(i=>i.status==='recusado').length}</div><div class="vl-stat-label">Recusados</div></div>
  <div class="vl-stat"><div class="vl-stat-num">${_ins_cache.filter(i=>i.status==='sem_retorno').length}</div><div class="vl-stat-label">Sem Retorno</div></div>
</div>`;

            const tabEl=document.getElementById('ins-tabela-wrap');
            if(!tabEl) return;
            if(!lista.length){ tabEl.innerHTML='<div class="vl-empty"><div class="vl-empty-icon">—</div>Nenhuma inscricao encontrada.</div>'; return; }

            tabEl.innerHTML=`
<div class="vl-card" style="padding:0;overflow:hidden">
  <table class="vl-table">
    <thead><tr><th></th><th>Nome</th><th>1a Escolha</th><th>2a / 3a</th><th>Area Atribuida</th><th>Disponib.</th><th>Estado</th><th>Acoes</th></tr></thead>
    <tbody>${lista.map(i=>vl_renderRow(i)).join('')}</tbody>
  </table>
</div>`;
        }

        function vl_limparFiltrosIns() {
            _ins_q='';_ins_status='';_ins_escolha='';_ins_min='';
            ['ins-q','ins-status','ins-escolha','ins-min'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
            vl_filtrarInscricoes();
        }

        function vl_renderRow(ins) {
            const m=ins._membro, a1=ins._areas.find(a=>a.ordem===1), a2=ins._areas.find(a=>a.ordem===2), a3=ins._areas.find(a=>a.ordem===3);
            const disp=[
                ins.disponibilidade_sabado_manha&&'Sab M', ins.disponibilidade_sabado_tarde&&'Sab T',
                ins.disponibilidade_domingo_manha&&'Dom M', ins.disponibilidade_domingo_tarde&&'Dom T',
            ].filter(Boolean);
            const atribs=ins._atribuicoes||[], atribAtual=atribs[0]||null;
            let atribCol='<span style="color:var(--text-faint);font-size:10px">—</span>';
            if(atribAtual){
                const stLabel={aguardando:'Aguarda contacto',contatado:'Lider contactou',sem_retorno:'Sem retorno do lider'}[atribAtual.status]||atribAtual.status;
                atribCol=`<div style="font-size:11px;font-weight:600">${atribAtual.ministerios?.nome||'—'}</div>
                      <div style="font-size:9px;color:var(--text-faint);margin-top:1px">${stLabel}</div>
                      ${atribAtual.prazo_contato?`<div style="font-size:9px;color:var(--text-faint)">Prazo: ${fmtD(atribAtual.prazo_contato)}</div>`:''}`;
            }
            const historicoHtml=atribs.length>0?atribs.map(a=>{
                const st={aguardando:'Aguarda',contatado:'Lider contactou',sem_retorno:'Sem retorno'}[a.status]||a.status;
                return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">
  <div style="flex:1"><span style="font-size:11px;font-weight:600">${a.ministerios?.nome||'—'}</span>
  <span style="font-size:9px;color:var(--text-faint);margin-left:6px">${st}</span></div>
  ${a.prazo_contato?`<span style="font-size:9px;color:var(--text-faint)">Prazo: ${fmtD(a.prazo_contato)}</span>`:''}
  ${a.data_contato?`<span style="font-size:9px;color:var(--text-main)">Contactado: ${fmtD(a.data_contato)}</span>`:''}
</div>`;
            }).join(''):'<div style="font-size:11px;color:var(--text-faint)">Sem atribuicoes.</div>';

            const motivoHtml=ins.motivo_rejeicao?`<div class="vl-motivo-box"><div class="vl-motivo-label">Motivo da rejeicao</div><div class="vl-motivo-texto">${ins.motivo_rejeicao.replace(/</g,'&lt;')}</div></div>`:'';
            const base=`${location.origin}/voluntarios-lider.html`, nomeEsc=(m?.nome||'').replace(/'/g,"\\'");
            let botoes='';
            if(ins.status==='pendente'){
                botoes=`<button class="vl-btn vl-btn-o" style="font-size:8px" onclick="vl_abrirDistribuir('${ins.id}')">Distribuir</button>
                    <button class="vl-btn vl-btn-d" style="font-size:8px" onclick="vl_abrirRejeitar('${ins.id}','${nomeEsc}')">Rejeitar</button>`;
            } else if(ins.status==='em_atribuicao'){
                const token=atribAtual?.link_token||'', linkLider=token?`${base}?t=${token}`:'';
                botoes=`<button class="vl-btn vl-btn-p" style="font-size:8px" onclick="vl_aprovar('${ins.id}')">Aprovar</button>
                    ${linkLider?`<button class="vl-btn vl-btn-o" style="font-size:8px" onclick="vl_mostrarLinkLider('${linkLider}','${(atribAtual?.ministerios?.nome||'').replace(/'/g,"\\'")}')">Link Lider</button>`:''}
                    <button class="vl-btn vl-btn-d" style="font-size:8px" onclick="vl_abrirRejeitar('${ins.id}','${nomeEsc}')">Rejeitar</button>`;
            } else if(ins.status==='sem_retorno'){
                botoes=`<button class="vl-btn vl-btn-o" style="font-size:8px" onclick="vl_abrirDistribuir('${ins.id}')">Redistribuir</button>
                    <button class="vl-btn vl-btn-d" style="font-size:8px" onclick="vl_abrirRejeitar('${ins.id}','${nomeEsc}')">Rejeitar</button>`;
            }
            return `
<tr id="vl-row-${ins.id}">
  <td style="width:30px"><button class="vl-btn vl-btn-m" style="padding:2px 7px;font-size:9px" onclick="vl_toggle('${ins.id}')">+</button></td>
  <td><strong style="font-size:12px">${m?.nome||'—'}</strong><div style="font-size:10px;color:var(--text-faint)">${fmtD(ins.created_at)}</div></td>
  <td style="font-size:11px;font-weight:600">${a1?.ministerios?.nome||'—'}</td>
  <td style="font-size:11px;color:var(--text-faint)">${a2?.ministerios?.nome||'—'}${a3?`<br><span style="font-size:10px">${a3.ministerios?.nome}</span>`:''}</td>
  <td>${atribCol}</td>
  <td>${disp.map(d=>`<span class="vl-tag">${d}</span>`).join('')}</td>
  <td><span class="vl-badge vl-b-${ins.status}">${ins.status.replace(/_/g,' ')}</span></td>
  <td><div style="display:flex;gap:4px;flex-wrap:wrap">${botoes}</div></td>
</tr>
<tr id="vl-det-${ins.id}" class="vl-hidden vl-expand-body">
  <td colspan="8" style="padding:12px 14px">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 16px;margin-bottom:12px">
      <div><div class="vl-label">Nome</div><div style="font-size:12px;font-weight:600">${m?.nome||'—'}</div></div>
      <div><div class="vl-label">Telefone</div><div style="font-size:12px">${m?.telefone||'—'}</div></div>
      <div><div class="vl-label">E-mail</div><div style="font-size:12px">${m?.email||'—'}</div></div>
    </div>
    ${motivoHtml}
    <div class="vl-label" style="margin:10px 0 6px">Areas de Interesse</div>
    ${ins._areas.map(a=>`<div style="margin-bottom:6px;padding:6px 10px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px">
      <div style="font-size:9px;color:var(--text-faint);font-family:var(--font-title);letter-spacing:1px;margin-bottom:2px">${a.ordem}a Escolha — ${a.ministerios?.nome||'—'}</div>
      <div style="font-size:12px;font-style:italic">${a.motivo||'—'}</div>
    </div>`).join('')}
    <div class="vl-label" style="margin:10px 0 6px">Historico de Atribuicoes</div>
    ${historicoHtml}
  </td>
</tr>`;
        }

        /* ── Rejeitar ── */
        function vl_abrirRejeitar(inscricaoId, nome) {
            const ov=document.createElement('div'); ov.className='vl-modal-overlay'; ov.id='vl-rejeitar-modal';
            ov.innerHTML=`
<div class="vl-modal" style="max-width:440px">
  <div class="vl-modal-title">Rejeitar Inscricao${nome?' — '+nome:''}</div>
  <div class="vl-field">
    <label class="vl-label">Motivo</label>
    <textarea class="vl-textarea" id="vl-rej-motivo" style="min-height:90px" placeholder="Ex: Sem vagas no ministerio indicado..."></textarea>
  </div>
  <div id="vl-rej-alert"></div>
  <div class="vl-modal-footer">
    <button class="vl-btn vl-btn-m" onclick="document.getElementById('vl-rejeitar-modal').remove()">Cancelar</button>
    <button class="vl-btn vl-btn-d" onclick="vl_confirmarRejeitar('${inscricaoId}',this)">Confirmar Rejeicao</button>
  </div>
</div>`;
            document.body.appendChild(ov);
            setTimeout(()=>document.getElementById('vl-rej-motivo')?.focus(),80);
        }

        async function vl_confirmarRejeitar(inscricaoId, btn) {
            const motivo=document.getElementById('vl-rej-motivo')?.value?.trim();
            const alEl=document.getElementById('vl-rej-alert');
            if(!motivo){ if(alEl) alEl.innerHTML='<div class="vl-alert vl-alert-e">O motivo e obrigatorio.</div>'; return; }
            btn.disabled=true; btn.textContent='A rejeitar...';
            try {
                await sb(`voluntarios_inscricoes?id=eq.${inscricaoId}`,{method:'PATCH',body:JSON.stringify({status:'recusado',motivo_rejeicao:motivo})});
                const idx=_ins_cache.findIndex(i=>i.id===inscricaoId);
                if(idx>=0){_ins_cache[idx].status='recusado';_ins_cache[idx].motivo_rejeicao=motivo;}
                document.getElementById('vl-rejeitar-modal')?.remove();
                vl_filtrarInscricoes();
            } catch(e){
                if(alEl) alEl.innerHTML=`<div class="vl-alert vl-alert-e">Erro: ${e?.message}</div>`;
                btn.disabled=false; btn.textContent='Confirmar Rejeicao';
            }
        }

        function vl_mostrarLinkLider(link, ministerioNome) {
            const ov=document.createElement('div'); ov.className='vl-modal-overlay';
            ov.innerHTML=`
<div class="vl-modal" style="max-width:480px">
  <div class="vl-modal-title">Link do Lider — ${ministerioNome}</div>
  <div class="vl-link-box" style="margin-bottom:10px">
    <code style="font-size:11px;word-break:break-all;white-space:normal">${link}</code>
  </div>
  <div style="display:flex;gap:8px">
    <button class="vl-btn vl-btn-p" style="flex:1" onclick="navigator.clipboard.writeText('${link}');this.textContent='Copiado!';setTimeout(()=>this.textContent='Copiar',1500)">Copiar</button>
  </div>
  <div class="vl-modal-footer">
    <button class="vl-btn vl-btn-m" onclick="this.closest('.vl-modal-overlay').remove()">Fechar</button>
  </div>
</div>`;
            document.body.appendChild(ov);
        }

        async function vl_aprovar(inscricaoId) {
            const ins=_ins_cache.find(i=>i.id===inscricaoId); if(!ins){vl_renderInscricoes();return;}
            const atrib=(ins._atribuicoes||[]).find(a=>a.status==='contatado')||ins._atribuicoes?.[0];
            const nomMin=atrib?.ministerios?.nome||ins._areas.find(a=>a.ordem===1)?.ministerios?.nome||'—';
            if(!confirm(`Aprovar ${ins._membro?.nome||'este candidato'} como voluntario em "${nomMin}"?`)) return;
            try {
                const ministerioId=atrib?.ministerio_id||ins._areas.find(a=>a.ordem===1)?.ministerio_id;
                await sb(`membros?id=eq.${ins.membro_id}`,{method:'PATCH',body:JSON.stringify({e_voluntario:true})});
                if(ministerioId){
                    const jaAssoc=await sb(`membro_ministerios?membro_id=eq.${ins.membro_id}&ministerio_id=eq.${ministerioId}&ativo=eq.true&select=id&limit=1`).catch(()=>[]);
                    if(!jaAssoc.length) await sb('membro_ministerios',{method:'POST',body:JSON.stringify({membro_id:ins.membro_id,ministerio_id:ministerioId,papel:'Voluntario',ativo:true})}).catch(()=>{});
                }
                await sb(`voluntarios_inscricoes?id=eq.${inscricaoId}`,{method:'PATCH',body:JSON.stringify({status:'aprovado'})});
                const idx=_ins_cache.findIndex(i=>i.id===inscricaoId);
                if(idx>=0) _ins_cache[idx].status='aprovado';
                vl_filtrarInscricoes();
            } catch(e){alert('Erro: '+(e?.message||JSON.stringify(e)));}
        }

        async function vl_distribuirTodos(campanhaId) {
            const pendentes=await sb(`voluntarios_inscricoes?campanha_id=eq.${campanhaId}&status=eq.pendente&select=id`).catch(()=>[]);
            if(!pendentes.length){alert('Nenhuma inscricao pendente.');return;}
            if(!confirm(`Distribuir ${pendentes.length} inscricao(oes)?`)) return;
            const prazo=new Date(Date.now()+7*24*60*60*1000).toISOString();
            for(const ins of pendentes){
                const areas=await sb(`voluntarios_areas_interesse?inscricao_id=eq.${ins.id}&select=ministerio_id,ordem&order=ordem&limit=1`).catch(()=>[]);
                const a1=areas?.[0]; if(!a1) continue;
                await sb('voluntarios_atribuicoes',{method:'POST',body:JSON.stringify({inscricao_id:ins.id,ministerio_id:a1.ministerio_id,prazo_contato:prazo})}).catch(()=>{});
                await sb(`voluntarios_inscricoes?id=eq.${ins.id}`,{method:'PATCH',body:JSON.stringify({status:'em_atribuicao'})});
            }
            const el=document.getElementById('vl-alert-ins');
            if(el){el.innerHTML='<div class="vl-alert vl-alert-s">Inscricoes distribuidas.</div>';setTimeout(()=>el.innerHTML='',4000);}
            vl_renderInscricoes();
        }

        async function vl_abrirDistribuir(inscricaoId) {
            const areas=await sb(`voluntarios_areas_interesse?inscricao_id=eq.${inscricaoId}&select=ordem,ministerios(id,nome)&order=ordem`).catch(()=>[]);
            const prazoDefault=new Date(Date.now()+7*24*60*60*1000).toISOString().slice(0,10);
            const opts=(areas||[]).map(a=>`<option value="${a.ministerios?.id}">${a.ordem}. ${a.ministerios?.nome}</option>`).join('');
            const ov=document.createElement('div'); ov.className='vl-modal-overlay';
            ov.innerHTML=`
<div class="vl-modal">
  <div class="vl-modal-title">Distribuir Inscricao</div>
  <div class="vl-field"><label class="vl-label">Ministerio de destino</label><select class="vl-select" id="vl-dist-min">${opts}</select></div>
  <div class="vl-field"><label class="vl-label">Prazo do lider</label><input type="date" class="vl-input" id="vl-dist-prazo" value="${prazoDefault}" min="${new Date().toISOString().slice(0,10)}"></div>
  <div id="vl-dist-alert"></div>
  <div class="vl-modal-footer">
    <button class="vl-btn vl-btn-m" onclick="this.closest('.vl-modal-overlay').remove()">Cancelar</button>

  </div>
</div>`;
            document.body.appendChild(ov);
        }

        async function vl_confirmarDistribuir(id, btn) {
            const min=document.getElementById('vl-dist-min')?.value, prazo=document.getElementById('vl-dist-prazo')?.value;
            const alEl=document.getElementById('vl-dist-alert');
            if(!min||!prazo){if(alEl) alEl.innerHTML='<div class="vl-alert vl-alert-e">Preencha todos os campos.</div>';return;}
            btn.disabled=true; btn.textContent='A guardar...';
            try {
                await sb('voluntarios_atribuicoes',{method:'POST',body:JSON.stringify({inscricao_id:id,ministerio_id:min,prazo_contato:new Date(prazo).toISOString()})});
                await sb(`voluntarios_inscricoes?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status:'em_atribuicao'})});
                btn.closest('.vl-modal-overlay').remove();
                vl_renderInscricoes();
            } catch(e){
                if(alEl) alEl.innerHTML=`<div class="vl-alert vl-alert-e">Erro: ${e?.message||'Verifique se ja existe atribuicao.'}</div>`;
                btn.disabled=false; btn.textContent='Confirmar';
            }
        }

  <hr class="vl-sep">
  <div class="vl-btn-row">
    ${camp.status==='rascunho'?`<button class="vl-btn vl-btn-p" onclick="vl_statusCampanha('${camp.id}','ativo')">Ativar</button>`:''}
    ${camp.status==='ativo'?`<button class="vl-btn vl-btn-d" onclick="vl_statusCampanha('${camp.id}','encerrado')">Encerrar</button>`:''}
    ${camp.status==='encerrado'?`<button class="vl-btn vl-btn-o" onclick="vl_gerarLinks('${camp.id}')">Gerar Links de Lideres</button>`:''}

  </div>

                }).join('');

            c().innerHTML=`
<div class="vl-toolbar">
  <span class="vl-toolbar-title">Campanhas</span>

</div>

${cards}`;

        function vl_novaCampanha() {
            const ov=document.createElement('div'); ov.className='vl-modal-overlay';
            ov.innerHTML=`
<div class="vl-modal">
  <div class="vl-modal-title">Nova Campanha</div>
  <div class="vl-field"><label class="vl-label">Nome</label><input type="text" class="vl-input" id="nc-nome" placeholder="Ex: Novos Voluntarios Maio 2026"></div>
  <div class="vl-field"><label class="vl-label">Descricao (opcional)</label><textarea class="vl-textarea" id="nc-desc"></textarea></div>
  <div class="vl-row">
    <div class="vl-field"><label class="vl-label">Data inicio</label><input type="date" class="vl-input" id="nc-inicio"></div>
    <div class="vl-field"><label class="vl-label">Data fim</label><input type="date" class="vl-input" id="nc-fim"></div>
  </div>
  <div id="nc-alert"></div>
  <div class="vl-modal-footer">
    <button class="vl-btn vl-btn-m" onclick="this.closest('.vl-modal-overlay').remove()">Cancelar</button>

  </div>
</div>`;
            document.body.appendChild(ov);
