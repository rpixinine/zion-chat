<script>
// ══════════════════════════════════════════════════════════════════
//  PDV — PARTE 2: Core JS
//  Supabase helper · Estado global · Relógio · Abas
//  Carregar dados · Grid de produtos · Categorias
// ══════════════════════════════════════════════════════════════════

// ── SUPABASE ─────────────────────────────────────────────────────
const SUPA_URL = window.SUPABASE_URL      || '';
const SUPA_KEY = window.SUPABASE_ANON_KEY || '';

async function sb(path, opts = {}) {
    const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
        ...opts,
        headers: {
            'apikey':        SUPA_KEY,
            'Authorization': `Bearer ${SUPA_KEY}`,
            'Content-Type':  'application/json',
            'Prefer':        'return=representation',
            ...opts.headers,
        },
    });
    if (!r.ok) {
        const e = await r.json().catch(() => ({}));
        throw e;
    }
    const t = await r.text();
    return t ? JSON.parse(t) : [];
}

// ── ESTADO GLOBAL ─────────────────────────────────────────────────
let lojaProds   = [];   // produtos da tabela loja_produtos
let keolaProds  = [];   // produtos da tabela keola_menu
let prodsAtivos = [];   // lista activa conforme source seleccionado
let membros     = [];   // membros para o select de cliente

let itens       = [];   // itens no carrinho actual
let pagTipo     = 'dinheiro';
let descTipo    = 'pct';
let sourceAtivo = 'keola';
let catAtiva    = '';
let estSrc      = 'loja';
let user        = null;
let cfg         = {};

// Caixa gestão
let caixaAtual     = null;  // sessão aberta ou null
let caixaRetiradas = [];    // retiradas da sessão actual

// Relatórios
let relPeriodo = 'hoje';
let relSubTab  = 'vendas';
let relData    = null;      // cache dos dados carregados

// MBWay PDV
let mbwayPDVTimer      = null;
let mbwayPDVSegsLeft   = 300;
let mbwayPDVConfirmado = false;

// Pedidos
let pedidosData   = [];
let pedidosFiltro = 'ativos';

// Dados guardados do cupom (para imprimir após fechar modal)
let _cupomSnapshot = null;
// Callback do modal de nome de cliente
let _nomeClienteCallback = null;
// Snapshot dos dados para o modal de fechar caixa
let _fechoCaixaDados = null;

// Labels e ícones reutilizados
const PAG_LABEL = {
    dinheiro:      '💵 Dinheiro',
    cartao:        '💳 Cartão',
    mbway:         '📱 MB Way',
    transferencia: '🏦 Transferência',
    multibanco:    '🏧 Multibanco',
};
const PAG_ICONS = {
    dinheiro:      '💵',
    cartao:        '💳',
    mbway:         '📱',
    transferencia: '🏦',
    multibanco:    '🏧',
};
const STATUS_INFO = {
    pendente:      { label: 'Pendente',      emoji: '⏳' },
    em_preparacao: { label: 'Em Preparação', emoji: '🍳' },
    pronto:        { label: 'Pronto',        emoji: '✅' },
    entregue:      { label: 'Entregue',      emoji: '📦' },
    cancelado:     { label: 'Cancelado',     emoji: '✕'  },
};

// ── CONFIG (localStorage) ─────────────────────────────────────────
function loadCfg() {
    try { cfg = JSON.parse(localStorage.getItem('zion_pdv_cfg') || '{}'); }
    catch { cfg = {}; }
    if (!cfg.pagMethods) {
        cfg.pagMethods = { dinheiro: true, cartao: false, mbway: false, multibanco: false, transferencia: false };
    }
}
function saveCfgLocal() {
    localStorage.setItem('zion_pdv_cfg', JSON.stringify(cfg));
}

// ── RELÓGIO ───────────────────────────────────────────────────────
function tick() {
    const n = new Date(), p = v => String(v).padStart(2, '0');
    document.getElementById('clock').textContent =
        `${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
}
setInterval(tick, 1000);
tick();

// ── ABAS ──────────────────────────────────────────────────────────
function setAba(aba) {
    // Aba Venda usa grid layout especial
    document.getElementById('aba-venda').style.display = aba === 'venda' ? 'grid' : 'none';

    // Restantes usam classe .active
    ['pedidos', 'estoque', 'relatorios', 'caixa', 'config'].forEach(a => {
        document.getElementById(`aba-${a}`).classList.toggle('active', a === aba);
    });

    // Tabs do header
    ['venda', 'pedidos', 'estoque', 'relatorios', 'caixa', 'config'].forEach(a => {
        document.getElementById(`tab-${a}`)?.classList.toggle('active', a === aba);
    });

    // Acções ao entrar em cada aba
    if (aba === 'estoque')    renderEstoque();
    if (aba === 'pedidos')    carregarPedidos();
    if (aba === 'caixa')      renderCaixaTab();
    if (aba === 'relatorios' && !relData) carregarRelatorios('hoje');
}

// ── CARREGAR TUDO (init) ──────────────────────────────────────────
async function carregarTudo() {
    const [loja, keola, mbs] = await Promise.all([
        sb('loja_produtos?select=*&ativo=eq.true&mostrar_pdv=eq.true&order=categoria,nome').catch(() => []),
        sb('keola_menu?select=*&disponivel=eq.true&mostrar_pdv=eq.true&order=ordem.asc,nome.asc').catch(() => []),
        sb('membros?select=id,nome&ativo=eq.true&order=nome').catch(() => []),
    ]);

    lojaProds = loja || [];

    keolaProds = (keola || [])
        .filter(k => k.tipo_item !== 'componente')
        .map(k => ({
            ...k,
            _keola:            true,
            stock:             k.tipo_item === 'kit' ? (k.stock_kits ?? 0) : (k.stock ?? 0),
            controlar_estoque: k.controlar_estoque !== false,
            venda_sem_estoque: k.venda_sem_estoque || false,
            imagem_url:        k.imagem_url || k.foto_url || null,
            sku:               k.sku || null,
            codigo_barras:     null,
        }));

    membros = mbs || [];

    // Preenche select de clientes
    const sel = document.getElementById('cliente-sel');
    membros.forEach(m => {
        const o = document.createElement('option');
        o.value = m.id; o.textContent = m.nome;
        sel.appendChild(o);
    });

    prodsAtivos = keolaProds;
    renderCats();
    filtrarProd();
}

// ── SOURCE (Keola / Loja) ─────────────────────────────────────────
function setSource(src) {
    sourceAtivo = src;
    catAtiva    = '';
    prodsAtivos = src === 'loja' ? lojaProds : keolaProds;
    document.getElementById('src-loja').classList.toggle('active',  src === 'loja');
    document.getElementById('src-keola').classList.toggle('active', src === 'keola');
    renderCats();
    filtrarProd();
}

// ── CATEGORIAS ────────────────────────────────────────────────────
function renderCats() {
    const cats  = [...new Set(prodsAtivos.map(p => p.categoria).filter(Boolean))].sort();
    const strip = document.getElementById('cat-strip');
    strip.innerHTML =
        `<button class="cat-btn ${catAtiva === '' ? 'active' : ''}" onclick="setCat('')">Todos (${prodsAtivos.length})</button>`
        + cats.map(c => {
            const n = prodsAtivos.filter(p => p.categoria === c).length;
            return `<button class="cat-btn ${catAtiva === c ? 'active' : ''}" onclick="setCat('${c.replace(/'/g,"\\'")}'">${c} (${n})</button>`;
        }).join('');
}
function setCat(c) {
    catAtiva = c;
    renderCats();
    filtrarProd();
}

// ── GRID DE PRODUTOS ──────────────────────────────────────────────
function filtrarProd() {
    const q = document.getElementById('prod-search').value.toLowerCase().trim();
    let lista = [...prodsAtivos];
    if (catAtiva) lista = lista.filter(p => p.categoria === catAtiva);
    if (q)        lista = lista.filter(p =>
        (p.nome          || '').toLowerCase().includes(q) ||
        (p.sku           || '').toLowerCase().includes(q) ||
        (p.codigo_barras || '').includes(q)
    );
    renderGrid(lista);
}

function onSearchKey(e) {
    if (e.key !== 'Enter') return;
    const q = e.target.value.trim();
    if (!q) return;
    const match = prodsAtivos.find(p => p.codigo_barras === q || p.sku === q);
    if (match) {
        addItem(match);
        e.target.value = '';
        filtrarProd();
    }
}

function renderGrid(lista) {
    const grid = document.getElementById('prod-grid');

    if (!lista.length) {
        grid.innerHTML = `
            <div class="grid-empty">
                <div class="grid-empty-icon">
                    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                    </svg>
                </div>
                <div>Nenhum produto encontrado</div>
            </div>`;
        return;
    }

    grid.innerHTML = lista.map(p => {
        const stock  = p.stock ?? p.quantidade ?? null;
        const ctrl   = p.controlar_estoque !== false;
        const semEst = ctrl && stock !== null && stock <= 0 && !p.venda_sem_estoque;
        const isLow  = ctrl && stock !== null && stock > 0 && stock <= (p.stock_minimo || 3);
        const promo  = p.preco_promocional && Number(p.preco_promocional) < Number(p.preco);
        const preco  = promo ? Number(p.preco_promocional) : Number(p.preco || 0);

        const stockBadge = ctrl && stock !== null
            ? `<div class="pcard-stock-badge ${stock <= 0 ? 'zero' : isLow ? 'low' : ''}">
                   ${stock <= 0 ? 'Esgotado' : stock}
               </div>` : '';

        const imgHtml = p.imagem_url
            ? `<img src="${p.imagem_url}" alt="${p.nome}"
                    onerror="this.parentElement.innerHTML='<div class=pcard-img-fake></div>'">`
            : `<div class="pcard-img-fake">
                   <img src="assets/item_zion.png" alt="" onerror="this.style.display='none'">
               </div>`;

        const stockInfo = ctrl && stock !== null
            ? `<div class="pcard-stock ${stock <= 0 ? 'zero' : isLow ? 'low' : ''}">
                   Estoque: ${stock <= 0 ? 'Esgotado' : stock + ' un.'}
               </div>` : '';

        const clickFn = semEst
            ? ''
            : `addItem_id('${p.id}','${p._keola ? 'keola' : 'loja'}')`;

        return `
            <div class="pcard ${semEst ? 'esgotado' : ''}" onclick="${clickFn}">
                <div class="pcard-img">
                    ${imgHtml}
                    ${p.destaque ? '<div class="pcard-destaque">Destaque</div>' : ''}
                    ${stockBadge}
                </div>
                <div class="pcard-body">
                    <div class="pcard-nome">${p.nome}</div>
                    ${p.sku ? `<div class="pcard-sku">${p.sku}</div>` : ''}
                    ${stockInfo}
                    ${promo ? `<div class="pcard-preco-old">€ ${Number(p.preco).toFixed(2)}</div>` : ''}
                    <div class="pcard-preco${promo ? ' promo' : ''}">€ ${preco.toFixed(2)}</div>
                </div>
            </div>`;
    }).join('');
}

function addItem_id(id, src) {
    const p = (src === 'keola' ? keolaProds : lojaProds).find(x => x.id === id);
    if (p) addItem(p);
}

// ── TOAST ─────────────────────────────────────────────────────────
let _toastTimer;
function toast(msg, tipo = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className   = `toast ${tipo} show`;
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── BADGE DO CAIXA NO HEADER ──────────────────────────────────────
function renderCaixaBadge() {
    const el = document.getElementById('caixa-badge');
    if (!el) return;
    if (caixaAtual) {
        const hm = new Date(caixaAtual.data_abertura)
            .toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
        el.textContent = `● Aberta ${hm}`;
        el.className   = 'caixa-badge aberta';
    } else {
        el.textContent = '● Caixa Fechada';
        el.className   = 'caixa-badge fechada';
    }
}

// ── CARREGAR SESSÃO DE CAIXA ACTIVA ──────────────────────────────
async function carregarCaixaAtual() {
    try {
        const res = await sb('pdv_caixas?status=eq.aberta&order=data_abertura.desc&limit=1');
        if (res && res.length > 0) {
            caixaAtual     = res[0];
            caixaRetiradas = await sb(
                `pdv_retiradas?caixa_id=eq.${caixaAtual.id}&order=created_at.desc`
            ).catch(() => []);
        } else {
            caixaAtual = null; caixaRetiradas = [];
        }
    } catch {
        caixaAtual = null; caixaRetiradas = [];
    }
    renderCaixaBadge();
}

// ── CONFIG: carregar form ─────────────────────────────────────────
function carregarFormCfg() {
    const campos = ['nome','morada','nif','telefone','email','website','operador','rodape','iban','bic','banco','titular'];
    campos.forEach(f => {
        const el = document.getElementById(`cfg-${f}`);
        if (el) el.value = cfg[f] || '';
    });
    const pm = cfg.pagMethods || { dinheiro: true };
    ['dinheiro','cartao','mbway','multibanco','transferencia'].forEach(k => {
        const el = document.getElementById(`cfg-pag-${k}`);
        if (el && !el.disabled) el.checked = !!pm[k];
    });
}

function salvarCfg() {
    const campos = ['nome','morada','nif','telefone','email','website','operador','rodape','iban','bic','banco','titular'];
    campos.forEach(f => {
        cfg[f] = document.getElementById(`cfg-${f}`)?.value?.trim() || '';
    });
    cfg.pagMethods = {};
    ['dinheiro','cartao','mbway','multibanco','transferencia'].forEach(k => {
        const el = document.getElementById(`cfg-pag-${k}`);
        cfg.pagMethods[k] = el ? el.checked : false;
    });
    cfg.pagMethods.dinheiro = true; // sempre activo
    saveCfgLocal();
    document.getElementById('header-op').textContent = cfg.operador || '';
    const msg = document.getElementById('cfg-msg');
    msg.className   = 'cfg-msg ok';
    msg.textContent = 'Configuração guardada com sucesso';
    setTimeout(() => { msg.className = 'cfg-msg'; }, 3000);
}

// ── INIT ──────────────────────────────────────────────────────────
async function init() {
    loadCfg();
    carregarFormCfg();

    ZionAuth.protect({ tipo: 'membro' });
    user = ZionAuth.getUser();

    const op = cfg.operador || user?.nome?.split(' ')[0] || '';
    document.getElementById('header-op').textContent = op;

    if (user?.nome) {
        document.getElementById('caixa-op').innerHTML =
            `Operador: <strong>${user.nome.split(' ')[0]}</strong>`;
    }

    // Carregar sessão de caixa activa
    await carregarCaixaAtual();

    // Carregar produtos e membros
    try {
        await carregarTudo();
    } catch (e) {
        console.error('Erro ao carregar:', e);
        document.getElementById('prod-grid').innerHTML = `
            <div class="grid-empty">
                <div class="grid-empty-icon">
                    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="11" y1="8" x2="11" y2="12"/>
                        <line x1="11" y1="16" x2="11.01" y2="16"/>
                    </svg>
                </div>
                <div>Erro ao carregar produtos</div>
            </div>`;
    }

    document.getElementById('pdv-loading').style.display = 'none';
}

init();
</script>
