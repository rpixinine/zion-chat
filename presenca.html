<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Check-in — Zion Lisboa</title>

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#009098">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zion Lisboa">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="config.js"></script>
    <style>
        :root {
            --navy:       #02161e;
            --navy-card:  #071e28;
            --navy-light: #0d2d3a;
            --navy-border:#1a3d4d;
            --teal:       #009098;
            --teal-dark:  #006b70;
            --teal-glow:  rgba(0,144,152,.18);
            --beige:      #d8c3a5;
            --beige-dim:  rgba(216,195,165,.15);
            --green:      #43a047;
            --green-dim:  rgba(67,160,71,.12);
            --red:        #ef5350;
            --red-dim:    rgba(239,83,80,.10);
            --text-main:  #e8f4f5;
            --text-muted: #7fa8b5;
            --text-faint: #4a7a8a;
            --gold:       #c9a84c;
            --r: 14px;
            --font-title: 'Cinzel', serif;
            --font-body:  'Lato', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-body);
            background: var(--navy);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── HEADER ────────────────────────────────────────── */
        .header {
            width: 100%;
            background: var(--navy-card);
            border-bottom: 1px solid var(--navy-border);
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -60px; left: 50%;
            transform: translateX(-50%);
            width: 300px; height: 160px;
            background: radial-gradient(ellipse, var(--teal-glow) 0%, transparent 70%);
            pointer-events: none;
        }
        .header-inner {
            width: 100%;
            max-width: 480px;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 0 14px;
        }
        .header-logo {
            width: 44px; height: 44px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid var(--navy-border);
        }
        .header-logo-placeholder {
            width: 44px; height: 44px;
            border-radius: 10px;
            background: var(--teal-glow);
            border: 1px solid var(--teal-dark);
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            color: var(--teal);
            font-size: 20px;
        }
        .header-texts { flex: 1; min-width: 0; }
        .header-brand {
            font-family: var(--font-title);
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--teal);
            text-transform: uppercase;
            margin-bottom: 3px;
        }
        .header-ev-nome {
            font-family: var(--font-title);
            font-size: 16px;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .header-ev-data {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 3px;
        }
        .gold-bar {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        /* ── WRAP ────────────────────────────────────────────── */
        .wrap {
            width: 100%;
            max-width: 480px;
            padding: 28px 16px 60px;
            flex: 1;
        }

        /* ── LOADING / FATAL ────────────────────────────────── */
        .loading {
            text-align: center;
            padding: 80px 20px;
        }
        .spin {
            width: 36px; height: 36px;
            border: 2px solid var(--navy-border);
            border-top-color: var(--teal);
            border-radius: 50%;
            animation: spin .75s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-txt { font-size: 13px; color: var(--text-faint); }

        .fatal {
            text-align: center;
            padding: 70px 20px;
        }
        .fatal-icon { font-size: 40px; opacity: .25; margin-bottom: 12px; }
        .fatal-title {
            font-family: var(--font-title);
            font-size: 15px;
            color: var(--red);
            margin-bottom: 8px;
        }
        .fatal-sub { font-size: 13px; color: var(--text-faint); line-height: 1.6; }

        /* ── STEPS ──────────────────────────────────────────── */
        .step { display: none; }
        .step.active { display: block; }

        /* ── NIF INPUT ──────────────────────────────────────── */
        .nif-label {
            font-family: var(--font-title);
            font-size: 9px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-faint);
            margin-bottom: 10px;
            display: block;
        }
        .nif-wrap {
            position: relative;
            margin-bottom: 14px;
        }
        .nif-wrap svg {
            position: absolute;
            left: 16px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-faint);
            pointer-events: none;
        }
        .nif-input {
            width: 100%;
            padding: 17px 18px 17px 48px;
            border-radius: var(--r);
            border: 1px solid var(--navy-border);
            background: var(--navy-card);
            font-family: var(--font-body);
            font-size: 20px;
            letter-spacing: 3px;
            color: var(--text-main);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .nif-input::placeholder { font-size: 14px; letter-spacing: 1px; color: var(--text-faint); }
        .nif-input:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px var(--teal-glow);
        }
        .nif-input.invalid {
            border-color: var(--red) !important;
            box-shadow: 0 0 0 3px rgba(239,83,80,.12) !important;
        }

        .btn-buscar {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: var(--r);
            background: var(--teal);
            color: #fff;
            font-family: var(--font-title);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .15s, box-shadow .2s;
        }
        .btn-buscar:hover:not(:disabled) {
            background: var(--teal-dark);
            box-shadow: 0 4px 20px var(--teal-glow);
        }
        .btn-buscar:disabled { opacity: .35; cursor: not-allowed; }

        .msg {
            padding: 11px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 14px;
            display: none;
        }
        .msg.show { display: block; }
        .msg.error   { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(239,83,80,.25); }
        .msg.success { background: var(--green-dim);  color: var(--green); border: 1px solid rgba(67,160,71,.25); }

        /* ── CARD MEMBRO ────────────────────────────────────── */
        .membro-card {
            background: var(--navy-card);
            border: 1px solid var(--navy-border);
            border-radius: var(--r);
            padding: 20px 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 22px;
            animation: fadeUp .28s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: none; }
        }
        .m-foto {
            width: 70px; height: 70px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--navy-light);
            border: 2px solid var(--teal-dark);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-title);
            font-size: 24px;
            color: var(--teal);
            overflow: hidden;
        }
        .m-foto img { width: 100%; height: 100%; object-fit: cover; }
        .m-info { flex: 1; min-width: 0; }
        .m-nome {
            font-family: var(--font-title);
            font-size: 17px;
            color: var(--text-main);
            margin-bottom: 7px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .m-badges { display: flex; gap: 5px; flex-wrap: wrap; }
        .badge {
            display: inline-flex; align-items: center;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            font-family: var(--font-title);
            letter-spacing: .5px;
        }
        .badge-teal   { background: var(--teal-glow);  color: var(--teal);  border: 1px solid rgba(0,144,152,.3); }
        .badge-gold   { background: rgba(201,168,76,.1); color: var(--gold); border: 1px solid rgba(201,168,76,.25); }
        .badge-green  { background: var(--green-dim);  color: var(--green); border: 1px solid rgba(67,160,71,.25); }

        /* ── PRESENÇA BUTTONS ───────────────────────────────── */
        .btn-presente {
            width: 100%;
            padding: 17px;
            border: none;
            border-radius: var(--r);
            background: linear-gradient(135deg, #2e7d32, #43a047);
            color: #fff;
            font-family: var(--font-title);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity .15s, box-shadow .2s;
            margin-bottom: 12px;
            box-shadow: 0 4px 20px rgba(46,125,50,.2);
        }
        .btn-presente:hover:not(:disabled) { opacity: .88; box-shadow: 0 6px 28px rgba(46,125,50,.35); }
        .btn-presente:disabled { opacity: .35; cursor: not-allowed; }

        .falta-box {
            background: var(--red-dim);
            border: 1px solid rgba(239,83,80,.2);
            border-radius: var(--r);
            padding: 16px;
        }
        .falta-box-label {
            font-family: var(--font-title);
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--red);
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .form-textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--navy-border);
            background: var(--navy);
            font-family: var(--font-body);
            font-size: 13px;
            color: var(--text-main);
            outline: none;
            resize: none;
            min-height: 70px;
            transition: border-color .15s;
            margin-bottom: 10px;
        }
        .form-textarea:focus { border-color: var(--red); }
        .form-textarea::placeholder { color: var(--text-faint); }

        .btn-faltei {
            width: 100%;
            padding: 13px;
            border: 1px solid rgba(239,83,80,.4);
            border-radius: var(--r);
            background: transparent;
            color: var(--red);
            font-family: var(--font-title);
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .15s;
        }
        .btn-faltei:hover:not(:disabled) { background: rgba(239,83,80,.08); }
        .btn-faltei:disabled { opacity: .35; cursor: not-allowed; }

        /* ── CONFIRMADO ─────────────────────────────────────── */
        .confirmado {
            text-align: center;
            padding: 50px 20px 40px;
            background: var(--navy-card);
            border: 1px solid var(--navy-border);
            border-radius: var(--r);
            animation: fadeUp .3s ease both;
        }
        .conf-icon {
            width: 86px; height: 86px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px;
            margin: 0 auto 18px;
            border: 2px solid;
        }
        .conf-icon.ok {
            background: var(--green-dim);
            border-color: var(--green);
        }
        .conf-icon.nao {
            background: var(--red-dim);
            border-color: var(--red);
        }
        .conf-title {
            font-family: var(--font-title);
            font-size: 17px;
            margin-bottom: 10px;
        }
        .conf-title.ok  { color: var(--green); }
        .conf-title.nao { color: var(--red); }
        .conf-sub {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.7;
        }

        /* ── SEPARADOR ──────────────────────────────────────── */
        .ou {
            text-align: center;
            font-size: 11px;
            color: var(--text-faint);
            margin: 10px 0 12px;
            position: relative;
        }
        .ou::before, .ou::after {
            content: '';
            position: absolute;
            top: 50%; width: 35%;
            height: 1px;
            background: var(--navy-border);
        }
        .ou::before { left: 0; }
        .ou::after  { right: 0; }

        /* ── FOOTER ─────────────────────────────────────────── */
        .footer {
            text-align: center;
            padding: 16px;
            font-size: 11px;
            color: var(--text-faint);
            border-top: 1px solid var(--navy-border);
            width: 100%;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="header-inner">
        <img class="header-logo" src="assets/logo-zion-branca.svg" alt="Zion"
             onerror="this.outerHTML='<div class=\'header-logo-placeholder\'>⛰</div>'">
        <div class="header-texts">
            <div class="header-brand">Zion Lisboa</div>
            <div class="header-ev-nome" id="ev-titulo">Carregando...</div>
            <div class="header-ev-data" id="ev-data"></div>
        </div>
    </div>
</div>
<div class="gold-bar"></div>

<div class="wrap">

    <!-- LOADING -->
    <div id="view-loading" class="loading">
        <div class="spin"></div>
        <div class="loading-txt">A verificar evento...</div>
    </div>

    <!-- ERRO FATAL -->
    <div id="view-erro" class="fatal" style="display:none">
        <div class="fatal-icon">⛔</div>
        <div class="fatal-title">Acesso Inválido</div>
        <div class="fatal-sub" id="erro-msg">Este link de presença não é válido ou já expirou.</div>
    </div>

    <!-- STEP 1: NIF -->
    <div id="step-nif" class="step">
        <span class="nif-label">Insere o teu NIF</span>
        <div id="msg-nif" class="msg"></div>
        <div class="nif-wrap">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <rect x="3" y="5" width="18" height="14" rx="2"/>
                <circle cx="9" cy="12" r="2.5"/>
                <path d="M14 10h4M14 14h3"/>
            </svg>
            <input type="text" class="nif-input" id="nif-input"
                   placeholder="000 000 000"
                   inputmode="numeric" maxlength="14"
                   autocomplete="off"
                   onkeydown="if(event.key==='Enter')pBuscar()">
        </div>
        <button class="btn-buscar" id="btn-buscar" onclick="pBuscar()">Confirmar Identidade</button>
    </div>

    <!-- STEP 2: Membro + Presença -->
    <div id="step-presenca" class="step">

        <!-- Card membro -->
        <div class="membro-card" id="membro-card">
            <div class="m-foto" id="m-foto"></div>
            <div class="m-info">
                <div class="m-nome" id="m-nome"></div>
                <div class="m-badges" id="m-badges"></div>
            </div>
        </div>

        <div id="msg-presenca" class="msg"></div>

        <!-- Presente -->
        <button class="btn-presente" id="btn-presente" onclick="pMarcar('presente')">
            ✓ &nbsp; Estou Presente
        </button>

        <!-- Separador -->
        <div class="ou">— ou —</div>

        <!-- Falta -->
        <div class="falta-box">
            <div class="falta-box-label">Não Estou Presente</div>
            <textarea class="form-textarea" id="p_motivo_falta"
                      placeholder="Motivo da falta (opcional)..."></textarea>
            <button class="btn-faltei" id="btn-faltei" onclick="pMarcar('faltou')">
                Registar Falta
            </button>
        </div>

    </div>

    <!-- STEP 3: Confirmado -->
    <div id="step-confirmado" class="step">
        <div class="confirmado">
            <div class="conf-icon" id="conf-icon"></div>
            <div class="conf-title" id="conf-title"></div>
            <div class="conf-sub" id="conf-msg"></div>
        </div>
    </div>

</div>

<div class="footer">Zion Lisboa · Sistema de Gestão</div>

<script>
    (function () {

        const SUPA_URL = window.SUPABASE_URL  || '';
        const SUPA_KEY = window.SUPABASE_ANON_KEY || '';

        let _evento = null, _participantes = [], _membroSel = null, _presencaSel = null;

        /* ── helper Supabase ──────────────────────────────────── */
        async function sb(path, opts = {}) {
            const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
                ...opts,
                headers: {
                    apikey: SUPA_KEY,
                    Authorization: `Bearer ${SUPA_KEY}`,
                    'Content-Type': 'application/json',
                    Prefer: 'return=representation',
                    ...opts.headers
                }
            });
            if (!r.ok) { const e = await r.json().catch(() => {}); throw e; }
            const t = await r.text();
            return t ? JSON.parse(t) : [];
        }

        /* ── INIT ─────────────────────────────────────────────── */
        async function init() {
            const p = new URLSearchParams(window.location.search);
            const evId = p.get('e'), token = p.get('t');
            if (!evId || !token) return fatal('Link incompleto. Usa o QR Code do evento.');

            try {
                const evs = await sb(`eventos?id=eq.${evId}&select=*`);
                _evento = evs?.[0];
                if (!_evento) return fatal('Evento não encontrado.');
                if (_evento.qr_token !== token) return fatal('Token inválido. Usa o QR Code oficial do evento.');
                if (_evento.status !== 'em_curso') return fatal(
                    `Este evento está ${_evento.status === 'concluido' ? 'concluído' : 'não iniciado ou cancelado'}. As presenças só podem ser registadas durante o evento.`
                );

                /* preenche header */
                document.getElementById('ev-titulo').textContent = _evento.titulo || '—';
                const d = _evento.data_inicio
                    ? new Date(_evento.data_inicio).toLocaleDateString('pt-PT', { weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' })
                    : '';
                document.getElementById('ev-data').textContent = d + (_evento.local ? ' · ' + _evento.local : '');

                /* carrega participantes (com nif) */
                _participantes = await sb(
                    `evento_presencas?select=*,membros(id,nome,foto_url,nif,e_lider,e_presbitero,e_voluntario,professor)&evento_id=eq.${evId}`
                ) || [];

                mostrar('nif');
            } catch (e) {
                fatal('Erro ao carregar. Tenta novamente ou pede ajuda a um responsável.');
                console.error(e);
            }
        }

        /* ── HELPERS UI ───────────────────────────────────────── */
        function fatal(msg) {
            hide('view-loading');
            document.getElementById('erro-msg').textContent = msg;
            show('view-erro');
            ['nif', 'presenca', 'confirmado'].forEach(s => {
                const el = document.getElementById('step-' + s);
                if (el) el.classList.remove('active');
            });
        }

        function mostrar(step) {
            hide('view-loading');
            hide('view-erro');
            ['nif', 'presenca', 'confirmado'].forEach(s => {
                const el = document.getElementById('step-' + s);
                if (el) el.classList.remove('active');
            });
            const el = document.getElementById('step-' + step);
            if (el) el.classList.add('active');
            if (step === 'nif') {
                limparMsg('nif');
                document.getElementById('nif-input').value = '';
                document.getElementById('nif-input').classList.remove('invalid');
                setTimeout(() => document.getElementById('nif-input').focus(), 80);
            }
        }

        function show(id) { const el = document.getElementById(id); if (el) el.style.display = ''; }
        function hide(id) { const el = document.getElementById(id); if (el) el.style.display = 'none'; }
        function setMsg(id, tipo, txt) { const el = document.getElementById('msg-' + id); if (el) { el.textContent = txt; el.className = 'msg show ' + tipo; } }
        function limparMsg(id) { const el = document.getElementById('msg-' + id); if (el) { el.textContent = ''; el.className = 'msg'; } }

        /* ── BUSCAR POR NIF ───────────────────────────────────── */
        async function pBuscar() {
            const input = document.getElementById('nif-input');
            const nif = input.value.replace(/\D/g, '').trim();
            limparMsg('nif');
            input.classList.remove('invalid');

            if (nif.length < 5) {
                input.classList.add('invalid');
                setMsg('nif', 'error', 'Insere um NIF ou CPF válido.');
                return;
            }

            const btn = document.getElementById('btn-buscar');
            btn.disabled = true; btn.textContent = 'A verificar...';

            try {
                /* procura localmente nos participantes já carregados */
                const pres = _participantes.find(p => {
                    const mNif = (p.membros?.nif || '').replace(/\D/g, '');
                    return mNif === nif;
                });

                if (!pres || !pres.membros) {
                    input.classList.add('invalid');
                    setMsg('nif', 'error', 'Nenhum participante encontrado com esse NIF. Fala com um responsável.');
                    btn.disabled = false; btn.textContent = 'Confirmar Identidade';
                    return;
                }

                if (pres.status === 'presente') {
                    setMsg('nif', 'success', `${pres.membros.nome}, a tua presença já foi registada! ✓`);
                    btn.disabled = false; btn.textContent = 'Confirmar Identidade';
                    return;
                }

                _presencaSel = pres;
                _membroSel   = pres.membros;
                renderMembro();
                mostrar('presenca');

            } catch (e) {
                setMsg('nif', 'error', 'Erro ao verificar. Tenta novamente.');
                console.error(e);
            }

            btn.disabled = false; btn.textContent = 'Confirmar Identidade';
        }

        /* ── RENDER CARD MEMBRO ───────────────────────────────── */
        function renderMembro() {
            const m = _membroSel;
            const fotoEl = document.getElementById('m-foto');
            if (m.foto_url) {
                fotoEl.innerHTML = `<img src="${m.foto_url}" alt="${m.nome}" onerror="this.parentElement.textContent='${(m.nome || '?')[0]}'">`;
            } else {
                fotoEl.textContent = (m.nome || '?')[0];
            }
            document.getElementById('m-nome').textContent = m.nome || '—';

            const bs = [];
            if (m.e_lider)      bs.push('<span class="badge badge-teal">Líder</span>');
            if (m.e_presbitero) bs.push('<span class="badge badge-gold">Presbítero</span>');
            if (m.e_voluntario) bs.push('<span class="badge badge-green">Voluntário</span>');
            if (m.professor)    bs.push('<span class="badge badge-green">Professor</span>');
            if (!bs.length)     bs.push('<span class="badge badge-teal" style="opacity:.6">Membro</span>');
            document.getElementById('m-badges').innerHTML = bs.join('');

            limparMsg('presenca');
            document.getElementById('p_motivo_falta').value = '';
            document.getElementById('btn-presente').disabled = false;
            document.getElementById('btn-faltei').disabled   = false;
        }

        /* ── MARCAR PRESENÇA / FALTA ──────────────────────────── */
        async function pMarcar(tipo) {
            const isPresente = tipo === 'presente';
            const motivo = document.getElementById('p_motivo_falta')?.value?.trim() || '';
            const status  = isPresente ? 'presente' : (motivo ? 'faltou_motivo' : 'faltou');

            const btnP = document.getElementById('btn-presente');
            const btnF = document.getElementById('btn-faltei');
            btnP.disabled = true; btnF.disabled = true;
            if (isPresente) btnP.textContent = 'A registar...';
            else btnF.textContent = 'A registar...';
            limparMsg('presenca');

            try {
                const patch = { status, registado_em: new Date().toISOString() };
                if (motivo) patch.motivo = motivo;
                await sb(`evento_presencas?id=eq.${_presencaSel.id}`, {
                    method: 'PATCH',
                    body: JSON.stringify(patch)
                });

                /* actualiza cache local */
                const idx = _participantes.findIndex(p => p.id === _presencaSel.id);
                if (idx >= 0) { _participantes[idx].status = status; if (motivo) _participantes[idx].motivo = motivo; }

                /* tela de confirmação */
                const icon  = document.getElementById('conf-icon');
                const title = document.getElementById('conf-title');
                const msg   = document.getElementById('conf-msg');

                if (isPresente) {
                    icon.textContent = '✓';
                    icon.className   = 'conf-icon ok';
                    title.className  = 'conf-title ok';
                    title.textContent = 'Presença Confirmada';
                    msg.innerHTML = `<strong>${_membroSel.nome}</strong>, a tua presença em <strong>${_evento.titulo}</strong> foi registada com sucesso!`;
                } else {
                    icon.textContent = '—';
                    icon.className   = 'conf-icon nao';
                    title.className  = 'conf-title nao';
                    title.textContent = 'Falta Registada';
                    msg.innerHTML = `<strong>${_membroSel.nome}</strong>, a tua falta foi registada${motivo ? ` com o motivo: <em>"${motivo}"</em>` : ''}. Ficas em falta na próxima!`;
                }
                mostrar('confirmado');

            } catch (e) {
                setMsg('presenca', 'error', 'Erro ao registar. Pede ajuda a um responsável.');
                console.error(e);
                btnP.disabled = false; btnF.disabled = false;
                if (isPresente) btnP.textContent = '✓  Estou Presente';
                else btnF.textContent = 'Registar Falta';
            }
        }

        /* ── EXPORTS ──────────────────────────────────────────── */
        window.pBuscar  = pBuscar;
        window.pMarcar  = pMarcar;

        init();
    })();
</script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('SW registado:', reg.scope))
                .catch(err => console.error('SW erro:', err));
        });
    }
</script>
