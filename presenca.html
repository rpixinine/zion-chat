<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Check-in — Zion Lisboa</title>

    <link rel="icon" href="/assets/icons/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/icons/icon-512.png">

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#009098">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zion Lisboa">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="config.js"></script>
    <style>
        :root {
            --navy:       #02161e;
            --navy-card:  #071e28;
            --navy-light: #0d2d3a;
            --navy-border:#1a3d4d;
            --teal:       #009098;
            --teal-dark:  #006b70;
            --teal-glow:  rgba(0,144,152,.18);
            --green:      #43a047;
            --green-dim:  rgba(67,160,71,.12);
            --red:        #ef5350;
            --red-dim:    rgba(239,83,80,.10);
            --text-main:  #e8f4f5;
            --text-muted: #7fa8b5;
            --text-faint: #4a7a8a;
            --gold:       #c9a84c;
            --r: 14px;
            --font-title: 'Cinzel', serif;
            --font-body:  'Lato', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-body);
            background: var(--navy);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── HEADER ─────────────────────────────────────────── */
        .header {
            width: 100%;
            background: var(--navy-card);
            border-bottom: 1px solid var(--navy-border);
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -60px; left: 50%;
            transform: translateX(-50%);
            width: 300px; height: 160px;
            background: radial-gradient(ellipse, var(--teal-glow) 0%, transparent 70%);
            pointer-events: none;
        }
        .header-inner {
            width: 100%;
            max-width: 480px;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 0 14px;
        }
        .header-logo {
            width: 44px; height: 44px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid var(--navy-border);
        }
        .header-texts { flex: 1; min-width: 0; }
        .header-brand {
            font-family: var(--font-title);
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--teal);
            text-transform: uppercase;
            margin-bottom: 3px;
        }
        .header-ev-nome {
            font-family: var(--font-title);
            font-size: 16px;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .header-ev-data {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 3px;
        }
        .gold-bar {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        /* ── WRAP ────────────────────────────────────────────── */
        .wrap {
            width: 100%;
            max-width: 480px;
            padding: 20px 16px 60px;
            flex: 1;
        }

        /* ── LOADING / FATAL ─────────────────────────────────── */
        .loading { text-align: center; padding: 80px 20px; }
        .spin {
            width: 36px; height: 36px;
            border: 2px solid var(--navy-border);
            border-top-color: var(--teal);
            border-radius: 50%;
            animation: spin .75s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-txt { font-size: 13px; color: var(--text-faint); }
        .fatal { text-align: center; padding: 70px 20px; }
        .fatal-icon { font-size: 40px; opacity: .25; margin-bottom: 12px; }
        .fatal-title { font-family: var(--font-title); font-size: 15px; color: var(--red); margin-bottom: 8px; }
        .fatal-sub { font-size: 13px; color: var(--text-faint); line-height: 1.6; }

        /* ── STEPS ───────────────────────────────────────────── */
        .step { display: none; }
        .step.active { display: block; animation: fadeUp .22s ease both; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: none; }
        }

        /* ── TABS (Manual / QR) ──────────────────────────────── */
        .modo-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 18px;
            background: var(--navy-card);
            border: 1px solid var(--navy-border);
            border-radius: 12px;
            padding: 5px;
        }
        .modo-tab {
            flex: 1;
            padding: 11px 8px;
            border: none;
            border-radius: 9px;
            background: transparent;
            color: var(--text-faint);
            font-family: var(--font-title);
            font-size: 9px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all .15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .modo-tab.active {
            background: var(--teal);
            color: #fff;
            box-shadow: 0 2px 10px var(--teal-glow);
        }
        .modo-tab:not(.active):hover {
            color: var(--text-muted);
            background: var(--navy-light);
        }
        .modo-tab svg { flex-shrink: 0; }

        /* ── PAINEL MANUAL ───────────────────────────────────── */
        .nif-label {
            font-family: var(--font-title);
            font-size: 9px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-faint);
            margin-bottom: 10px;
            display: block;
        }
        .nif-wrap { position: relative; margin-bottom: 14px; }
        .nif-wrap svg {
            position: absolute;
            left: 16px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-faint);
            pointer-events: none;
        }
        .nif-input {
            width: 100%;
            padding: 17px 18px 17px 48px;
            border-radius: var(--r);
            border: 1px solid var(--navy-border);
            background: var(--navy-card);
            font-family: var(--font-body);
            font-size: 18px;
            letter-spacing: 2px;
            color: var(--text-main);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .nif-input::placeholder { font-size: 13px; letter-spacing: 1px; color: var(--text-faint); }
        .nif-input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-glow); }
        .nif-input.invalid { border-color: var(--red) !important; box-shadow: 0 0 0 3px rgba(239,83,80,.12) !important; }

        .btn-buscar {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: var(--r);
            background: var(--teal);
            color: #fff;
            font-family: var(--font-title);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .15s, box-shadow .2s;
        }
        .btn-buscar:hover:not(:disabled) { background: var(--teal-dark); box-shadow: 0 4px 20px var(--teal-glow); }
        .btn-buscar:disabled { opacity: .35; cursor: not-allowed; }

        /* ── PAINEL QR SCANNER ───────────────────────────────── */
        .qr-panel {
            background: var(--navy-card);
            border: 1px solid var(--navy-border);
            border-radius: var(--r);
            overflow: hidden;
        }
        .qr-video-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: #000;
            overflow: hidden;
        }
        #qr-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        /* Viewfinder overlay */
        .qr-finder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .qr-finder-box {
            width: 58%;
            aspect-ratio: 1;
            border: 2px solid var(--teal);
            border-radius: 12px;
            box-shadow: 0 0 0 2000px rgba(0,0,0,.45);
            position: relative;
        }
        /* Cantos animados */
        .qr-finder-box::before,
        .qr-finder-box::after {
            content: '';
            position: absolute;
            width: 18px; height: 18px;
            border-color: var(--teal);
            border-style: solid;
        }
        .qr-finder-box::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 10px 0 0 0; }
        .qr-finder-box::after  { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 10px 0; }
        /* Linha de scan */
        .qr-scan-line {
            position: absolute;
            left: 4px; right: 4px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--teal), transparent);
            animation: scanMove 2s ease-in-out infinite;
            border-radius: 1px;
        }
        @keyframes scanMove {
            0%   { top: 8%; }
            50%  { top: 88%; }
            100% { top: 8%; }
        }
        .qr-status {
            padding: 14px 16px;
            text-align: center;
        }
        .qr-status-txt {
            font-size: 12px;
            color: var(--text-faint);
            line-height: 1.5;
        }
        .qr-status-txt.ok  { color: var(--green); font-weight: 700; }
        .qr-status-txt.err { color: var(--red); }
        .qr-cam-err {
            padding: 40px 20px;
            text-align: center;
        }
        .qr-cam-err-icon { font-size: 32px; margin-bottom: 10px; opacity: .4; }
        .qr-cam-err-txt  { font-size: 13px; color: var(--text-faint); line-height: 1.6; }
        .btn-cam-retry {
            margin-top: 14px;
            padding: 10px 22px;
            border: 1px solid var(--teal);
            border-radius: 8px;
            background: var(--teal-glow);
            color: var(--teal);
            font-family: var(--font-title);
            font-size: 9px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
        }

        /* ── MSG ─────────────────────────────────────────────── */
        .msg {
            padding: 11px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 14px;
            display: none;
            line-height: 1.5;
        }
        .msg.show  { display: block; }
        .msg.error   { background: var(--red-dim);  color: var(--red);   border: 1px solid rgba(239,83,80,.25); }
        .msg.success { background: var(--green-dim); color: var(--green); border: 1px solid rgba(67,160,71,.25); }

        /* ── CARD MEMBRO ─────────────────────────────────────── */
        .membro-card {
            background: var(--navy-card);
            border: 1px solid var(--navy-border);
            border-radius: var(--r);
            padding: 20px 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 22px;
            animation: fadeUp .28s ease both;
        }
        .m-foto {
            width: 70px; height: 70px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--navy-light);
            border: 2px solid var(--teal-dark);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-title);
            font-size: 24px;
            color: var(--teal);
            overflow: hidden;
        }
        .m-foto img { width: 100%; height: 100%; object-fit: cover; }
        .m-info { flex: 1; min-width: 0; }
        .m-nome {
            font-family: var(--font-title);
            font-size: 17px;
            color: var(--text-main);
            margin-bottom: 7px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .m-badges { display: flex; gap: 5px; flex-wrap: wrap; }
        .badge {
            display: inline-flex; align-items: center;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            font-family: var(--font-title);
            letter-spacing: .5px;
        }
        .badge-teal  { background: var(--teal-glow); color: var(--teal); border: 1px solid rgba(0,144,152,.3); }
        .badge-gold  { background: rgba(201,168,76,.1); color: var(--gold); border: 1px solid rgba(201,168,76,.25); }
        .badge-green { background: var(--green-dim); color: var(--green); border: 1px solid rgba(67,160,71,.25); }

        /* ── BOTÕES PRESENÇA ─────────────────────────────────── */
        .btn-presente {
            width: 100%;
            padding: 17px;
            border: none;
            border-radius: var(--r);
            background: linear-gradient(135deg, #2e7d32, #43a047);
            color: #fff;
            font-family: var(--font-title);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity .15s, box-shadow .2s;
            margin-bottom: 12px;
            box-shadow: 0 4px 20px rgba(46,125,50,.2);
        }
        .btn-presente:hover:not(:disabled) { opacity: .88; box-shadow: 0 6px 28px rgba(46,125,50,.35); }
        .btn-presente:disabled { opacity: .35; cursor: not-allowed; }
        .falta-box {
            background: var(--red-dim);
            border: 1px solid rgba(239,83,80,.2);
            border-radius: var(--r);
            padding: 16px;
        }
        .falta-box-label {
            font-family: var(--font-title);
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--red);
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .form-textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--navy-border);
            background: var(--navy);
            font-family: var(--font-body);
            font-size: 13px;
            color: var(--text-main);
            outline: none;
            resize: none;
            min-height: 70px;
            transition: border-color .15s;
            margin-bottom: 10px;
        }
        .form-textarea:focus { border-color: var(--red); }
        .form-textarea::placeholder { color: var(--text-faint); }
        .btn-faltei {
            width: 100%;
            padding: 13px;
            border: 1px solid rgba(239,83,80,.4);
            border-radius: var(--r);
            background: transparent;
            color: var(--red);
            font-family: var(--font-title);
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .15s;
        }
        .btn-faltei:hover:not(:disabled) { background: rgba(239,83,80,.08); }
        .btn-faltei:disabled { opacity: .35; cursor: not-allowed; }

        /* ── CONFIRMADO ──────────────────────────────────────── */
        .confirmado {
            text-align: center;
            padding: 50px 20px 40px;
            background: var(--navy-card);
            border: 1px solid var(--navy-border);
            border-radius: var(--r);
            animation: fadeUp .3s ease both;
        }
        .conf-icon {
            width: 86px; height: 86px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px;
            margin: 0 auto 18px;
            border: 2px solid;
        }
        .conf-icon.ok  { background: var(--green-dim); border-color: var(--green); }
        .conf-icon.nao { background: var(--red-dim);   border-color: var(--red); }
        .conf-title {
            font-family: var(--font-title);
            font-size: 17px;
            margin-bottom: 10px;
        }
        .conf-title.ok  { color: var(--green); }
        .conf-title.nao { color: var(--red); }
        .conf-sub { font-size: 13px; color: var(--text-muted); line-height: 1.7; }

        .btn-novo-checkin {
            margin-top: 20px;
            padding: 13px 28px;
            border: 1px solid var(--teal);
            border-radius: var(--r);
            background: var(--teal-glow);
            color: var(--teal);
            font-family: var(--font-title);
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .15s;
        }
        .btn-novo-checkin:hover { background: var(--teal); color: #fff; }

        .ou {
            text-align: center;
            font-size: 11px;
            color: var(--text-faint);
            margin: 10px 0 12px;
            position: relative;
        }
        .ou::before, .ou::after {
            content: '';
            position: absolute;
            top: 50%; width: 35%;
            height: 1px;
            background: var(--navy-border);
        }
        .ou::before { left: 0; }
        .ou::after  { right: 0; }

        .footer {
            text-align: center;
            padding: 16px;
            font-size: 11px;
            color: var(--text-faint);
            border-top: 1px solid var(--navy-border);
            width: 100%;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="header-inner">
        <img class="header-logo" src="assets/logo-zion-branca.svg" alt="Zion"
             onerror="this.outerHTML='<div style=\'width:44px;height:44px;border-radius:10px;background:var(--teal-glow);border:1px solid var(--teal-dark);display:flex;align-items:center;justify-content:center;color:var(--teal);font-size:20px\'>⛰</div>'">
        <div class="header-texts">
            <div class="header-brand">Zion Lisboa</div>
            <div class="header-ev-nome" id="ev-titulo">A carregar...</div>
            <div class="header-ev-data" id="ev-data"></div>
        </div>
    </div>
</div>
<div class="gold-bar"></div>

<div class="wrap">

    <!-- LOADING -->
    <div id="view-loading" class="loading">
        <div class="spin"></div>
        <div class="loading-txt">A verificar evento...</div>
    </div>

    <!-- ERRO FATAL -->
    <div id="view-erro" class="fatal" style="display:none">
        <div class="fatal-icon">⛔</div>
        <div class="fatal-title">Acesso Inválido</div>
        <div class="fatal-sub" id="erro-msg">Este link de presença não é válido ou já expirou.</div>
    </div>

    <!-- STEP 1: Identificação (Manual + QR) -->
    <div id="step-nif" class="step">

        <!-- Tabs -->
        <div class="modo-tabs">
            <button class="modo-tab active" id="tab-manual" onclick="setModo('manual')">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <rect x="3" y="5" width="18" height="14" rx="2"/>
                    <circle cx="9" cy="12" r="2.5"/>
                    <path d="M14 10h4M14 14h3"/>
                </svg>
                NIF / Email / Tel
            </button>
            <button class="modo-tab" id="tab-qr" onclick="setModo('qr')">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="7" rx="1"/>
                    <rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/>
                    <path d="M14 14h2v2h-2zM18 14h3M14 18v3M18 18h3v3h-3z"/>
                </svg>
                Scan QR Code
            </button>
        </div>

        <!-- MSG partilhada -->
        <div id="msg-nif" class="msg"></div>

        <!-- Painel manual -->
        <div id="painel-manual">
            <span class="nif-label">Identifica-te</span>
            <div class="nif-wrap">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                    <rect x="3" y="5" width="18" height="14" rx="2"/>
                    <circle cx="9" cy="12" r="2.5"/>
                    <path d="M14 10h4M14 14h3"/>
                </svg>
                <input type="text" class="nif-input" id="nif-input"
                       placeholder="NIF, email, telemóvel"
                       autocomplete="off"
                       onkeydown="if(event.key==='Enter')pBuscar()">
            </div>
            <button class="btn-buscar" id="btn-buscar" onclick="pBuscar()">Confirmar</button>
        </div>

        <!-- Painel QR Scanner -->
        <div id="painel-qr" style="display:none">
            <div class="qr-panel">
                <!-- Video da câmara -->
                <div class="qr-video-wrap" id="qr-video-wrap">
                    <video id="qr-video" playsinline muted autoplay></video>
                    <canvas id="qr-canvas" style="display:none"></canvas>
                    <div class="qr-finder">
                        <div class="qr-finder-box">
                            <div class="qr-scan-line"></div>
                        </div>
                    </div>
                </div>
                <!-- Erro câmara (substituído via JS se necessário) -->
                <div id="qr-cam-err" class="qr-cam-err" style="display:none">
                    <div class="qr-cam-err-icon">📷</div>
                    <div class="qr-cam-err-txt" id="qr-cam-err-txt">
                        Não foi possível aceder à câmara.
                    </div>
                    <button class="btn-cam-retry" onclick="iniciarCamera()">Tentar novamente</button>
                </div>
                <!-- Status -->
                <div class="qr-status">
                    <div class="qr-status-txt" id="qr-status-txt">
                        Aponta a câmara para o QR Code do participante
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- STEP 2: Membro + Presença -->
    <div id="step-presenca" class="step">
        <div class="membro-card">
            <div class="m-foto" id="m-foto"></div>
            <div class="m-info">
                <div class="m-nome" id="m-nome"></div>
                <div class="m-badges" id="m-badges"></div>
            </div>
        </div>
        <div id="msg-presenca" class="msg"></div>
        <button class="btn-presente" id="btn-presente" onclick="pMarcar('presente')">
            ✓ &nbsp; Estou Presente (clique aqui, para confirmar sua presença)
        </button>
        <div class="ou">— ou —</div>
        <div class="falta-box">
            <div class="falta-box-label">Não Estou Presente</div>
            <textarea class="form-textarea" id="p_motivo_falta"
                      placeholder="Motivo da falta (opcional)..."></textarea>
            <button class="btn-faltei" id="btn-faltei" onclick="pMarcar('faltou')">
                Registar Falta (clique aqui, se não esta presente)
            </button>
        </div>
    </div>

    <!-- STEP 3: Confirmado -->
    <div id="step-confirmado" class="step">
        <div class="confirmado">
            <div class="conf-icon" id="conf-icon"></div>
            <div class="conf-title" id="conf-title"></div>
            <div class="conf-sub" id="conf-msg"></div>
            <!-- Botão para novo check-in (útil para o staff em eventos pagos) -->
            <button class="btn-novo-checkin" id="btn-novo-checkin" onclick="voltarParaNif()">
                + Próximo Check-in
            </button>
        </div>
    </div>

</div>

<div class="footer">Zion Lisboa · Sistema de Gestão</div>

<!-- jsQR — biblioteca leve para leitura de QR Code via canvas -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<script>
    (function () {

        const SUPA_URL = window.SUPABASE_URL  || '';
        const SUPA_KEY = window.SUPABASE_ANON_KEY || '';

        let _evento       = null;
        let _participantes = [];
        let _membroSel    = null;
        let _presencaSel  = null;
        let _modo         = 'manual';  // 'manual' | 'qr'
        let _qrStream     = null;
        let _qrAnimId     = null;
        let _qrProcessing = false;     // evita processar múltiplos frames seguidos

        /* ── Supabase helper ──────────────────────────────────── */
        async function sb(path, opts = {}) {
            const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
                ...opts,
                headers: {
                    apikey: SUPA_KEY,
                    Authorization: `Bearer ${SUPA_KEY}`,
                    'Content-Type': 'application/json',
                    Prefer: 'return=representation',
                    ...opts.headers
                }
            });
            if (!r.ok) { const e = await r.json().catch(() => {}); throw e; }
            const t = await r.text();
            return t ? JSON.parse(t) : [];
        }

        /* ── INIT ─────────────────────────────────────────────── */
        async function init() {
            const p     = new URLSearchParams(window.location.search);
            const evId  = p.get('e');
            const token = p.get('t');
            if (!evId || !token) return fatal('Link incompleto. Usa o QR Code do evento.');

            try {
                const evs = await sb(`eventos?id=eq.${evId}&select=*`);
                _evento = evs?.[0];
                if (!_evento)                    return fatal('Evento não encontrado.');
                if (_evento.qr_token !== token)  return fatal('Token inválido. Usa o QR Code oficial do evento.');
                if (_evento.status !== 'em_curso') return fatal(
                    `Este evento está ${_evento.status === 'concluido' ? 'concluído' : 'não iniciado ou cancelado'}. As presenças só podem ser registadas durante o evento.`
                );

                document.getElementById('ev-titulo').textContent = _evento.titulo || '—';
                const d = _evento.data_inicio
                    ? new Date(_evento.data_inicio).toLocaleDateString('pt-PT',
                        { weekday:'long', day:'numeric', month:'long', hour:'2-digit', minute:'2-digit' })
                    : '';
                document.getElementById('ev-data').textContent = d + (_evento.local ? ' · ' + _evento.local : '');

                _participantes = await sb(
                    `evento_presencas?select=*,membros(id,nome,telefone,email,foto_url,nif,e_lider,e_presbitero,e_voluntario,professor)&evento_id=eq.${evId}`
                ) || [];

                mostrar('nif');

            } catch (e) {
                fatal('Erro ao carregar. Tenta novamente ou pede ajuda a um responsável.');
                console.error(e);
            }
        }

        /* ── TROCAR MODO ──────────────────────────────────────── */
        function setModo(modo) {
            _modo = modo;

            document.getElementById('tab-manual').classList.toggle('active', modo === 'manual');
            document.getElementById('tab-qr').classList.toggle('active', modo === 'qr');
            document.getElementById('painel-manual').style.display = modo === 'manual' ? '' : 'none';
            document.getElementById('painel-qr').style.display     = modo === 'qr'     ? '' : 'none';

            limparMsg('nif');

            if (modo === 'qr') {
                iniciarCamera();
            } else {
                pararCamera();
                setTimeout(() => document.getElementById('nif-input').focus(), 80);
            }
        }

        /* ── CÂMARA ───────────────────────────────────────────── */
        async function iniciarCamera() {
            pararCamera();
            _qrProcessing = false;

            const videoWrap = document.getElementById('qr-video-wrap');
            const errEl     = document.getElementById('qr-cam-err');
            const statusEl  = document.getElementById('qr-status-txt');
            const video     = document.getElementById('qr-video');

            errEl.style.display   = 'none';
            videoWrap.style.display = '';
            statusEl.textContent  = 'A iniciar câmara...';
            statusEl.className    = 'qr-status-txt';

            try {
                // Prefere câmara traseira em mobile (environment)
                _qrStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 1280 } }
                });
                video.srcObject = _qrStream;
                await video.play();
                statusEl.textContent = 'Aponta a câmara para o QR Code do participante';
                tickQR();

            } catch (err) {
                videoWrap.style.display = 'none';
                errEl.style.display     = '';
                const msg = err.name === 'NotAllowedError'
                    ? 'Permissão de câmara negada. Permite o acesso nas definições do browser.'
                    : err.name === 'NotFoundError'
                        ? 'Câmara não encontrada neste dispositivo.'
                        : 'Não foi possível iniciar a câmara: ' + (err.message || err.name);
                document.getElementById('qr-cam-err-txt').textContent = msg;
            }
        }

        function pararCamera() {
            if (_qrAnimId) { cancelAnimationFrame(_qrAnimId); _qrAnimId = null; }
            if (_qrStream) { _qrStream.getTracks().forEach(t => t.stop()); _qrStream = null; }
            const video = document.getElementById('qr-video');
            if (video) { video.srcObject = null; }
        }

        /* ── LOOP DE LEITURA QR ───────────────────────────────── */
        function tickQR() {
            if (_modo !== 'qr') return;

            const video  = document.getElementById('qr-video');
            const canvas = document.getElementById('qr-canvas');

            if (video.readyState === video.HAVE_ENOUGH_DATA && !_qrProcessing) {
                canvas.width  = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);

                if (window.jsQR) {
                    const code = jsQR(imgData.data, imgData.width, imgData.height, {
                        inversionAttempts: 'dontInvert'
                    });
                    if (code?.data) {
                        onQRLido(code.data.trim());
                        return; // para o loop enquanto processa
                    }
                }
            }

            _qrAnimId = requestAnimationFrame(tickQR);
        }

        /* ── QR LIDO ──────────────────────────────────────────── */
        async function onQRLido(dado) {
            if (_qrProcessing) return;
            _qrProcessing = true;
            pararCamera();

            const statusEl = document.getElementById('qr-status-txt');
            statusEl.textContent = 'QR lido — a verificar...';
            statusEl.className   = 'qr-status-txt';
            limparMsg('nif');

            // O QR contém o email (ou telemóvel) do inscrito — mesmo identificador do email de confirmação
            const resultado = await procurarParticipante(dado);

            if (!resultado.ok) {
                statusEl.textContent = resultado.msg;
                statusEl.className   = 'qr-status-txt err';
                // Reinicia câmara após 2.5s para nova leitura
                setTimeout(() => {
                    _qrProcessing = false;
                    if (_modo === 'qr') iniciarCamera();
                }, 2500);
                return;
            }

            if (resultado.jaPresente) {
                statusEl.textContent = `✓ ${resultado.pres.membros.nome} — presença já registada`;
                statusEl.className   = 'qr-status-txt ok';
                setTimeout(() => {
                    _qrProcessing = false;
                    if (_modo === 'qr') iniciarCamera();
                }, 2500);
                return;
            }

            // Encontrou — vai para confirmação
            _presencaSel = resultado.pres;
            _membroSel   = resultado.pres.membros;
            renderMembro();
            mostrar('presenca');
            _qrProcessing = false;
        }

        /* ── BUSCA MANUAL ─────────────────────────────────────── */
        async function pBuscar() {
            const input = document.getElementById('nif-input');
            const raw   = input.value.trim();
            const clean = raw.replace(/\s/g, '');
            limparMsg('nif');
            input.classList.remove('invalid');

            if (!clean || clean.length < 5) {
                input.classList.add('invalid');
                setMsg('nif', 'error', 'Insere um NIF, email ou telemóvel válido.');
                return;
            }

            const btn = document.getElementById('btn-buscar');
            btn.disabled = true; btn.textContent = 'A verificar...';

            const resultado = await procurarParticipante(clean);

            if (!resultado.ok) {
                input.classList.add('invalid');
                setMsg('nif', 'error', resultado.msg);
                btn.disabled = false; btn.textContent = 'Confirmar';
                return;
            }

            if (resultado.jaPresente) {
                setMsg('nif', 'success', `${resultado.pres.membros.nome}, a tua presença já foi registada! ✓`);
                btn.disabled = false; btn.textContent = 'Confirmar';
                return;
            }

            _presencaSel = resultado.pres;
            _membroSel   = resultado.pres.membros;
            renderMembro();
            mostrar('presenca');
            btn.disabled = false; btn.textContent = 'Confirmar';
        }

        /* ── LÓGICA DE PROCURA (partilhada entre manual e QR) ─── */
        async function procurarParticipanteOld(dado) {
            try {
                const isEmail  = dado.includes('@');
                const telClean = dado.replace(/\D/g, '');
                let pres = null;

                if (isEmail) {
                    pres = _participantes.find(p =>
                        (p.membros?.email || '').toLowerCase().trim() === dado.toLowerCase()
                    );
                } else {
                    pres = _participantes.find(p => {
                        const mNif = (p.membros?.nif      || '').replace(/\D/g, '');
                        const mTel = (p.membros?.telefone || '').replace(/\D/g, '');
                        if (mNif && mNif === telClean) return true;
                        if (telClean.length >= 9 && mTel.length >= 9
                            && mTel.slice(-9) === telClean.slice(-9)) return true;
                        return false;
                    });
                }

                if (!pres || !pres.membros) {
                    return { ok: false, msg: 'Participante não encontrado. Verifica os dados ou fala com um responsável.' };
                }

                if (pres.status === 'presente') {
                    return { ok: true, jaPresente: true, pres };
                }

                return { ok: true, jaPresente: false, pres };

            } catch (e) {
                console.error(e);
                return { ok: false, msg: 'Erro ao verificar. Tenta novamente.' };
            }
        }

        async function procurarParticipante(dado) {
            try {
                const isPagoEvento = Number(_evento.valor) > 0 && !_evento.gratuito;
                const isEmail      = dado.includes('@');
                const telClean     = dado.replace(/\D/g, '');

                // ── DEBUG — apaga depois de confirmar que está a funcionar ──
                console.log('[procurar] dado:', dado, '| isPago:', isPagoEvento);
                console.log('[procurar] _participantes:', _participantes.length, _participantes.map(p => ({
                    nome: p.membros?.nome,
                    email: p.membros?.email,
                    telefone: p.membros?.telefone,
                    nif: p.membros?.nif
                })));

                // ════════════════════════════════════════════════════════════
                // EVENTO PAGO — fonte de verdade: evento_inscricoes (status=pago)
                // ════════════════════════════════════════════════════════════
                if (isPagoEvento) {
                    let inscricoes = [];
                    try {
                        inscricoes = await sb(
                            `evento_inscricoes?evento_id=eq.${_evento.id}&status=eq.pago&select=id,nome,email,telemovel,status,membro_id`
                        ) || [];
                    } catch (e) {
                        console.error('Erro ao buscar inscricoes pagas:', e);
                        return { ok: false, msg: 'Erro ao verificar inscrição. Tenta novamente.' };
                    }

                    console.log('[procurar] inscricoes pagas:', inscricoes.length, inscricoes.map(i => ({nome:i.nome, email:i.email, tel:i.telemovel})));

                    let insc = null;
                    if (isEmail) {
                        insc = inscricoes.find(i =>
                            (i.email || '').toLowerCase().trim() === dado.toLowerCase().trim()
                        );
                    } else {
                        insc = inscricoes.find(i => {
                            const iTel = (i.telemovel || '').replace(/\D/g, '');
                            return telClean.length >= 9 && iTel.length >= 9
                                && iTel.slice(-9) === telClean.slice(-9);
                        });
                    }

                    // Fallback: pesquisa por nome nas inscrições pagas
                    if (!insc && dado.length >= 3 && !isEmail && telClean.length < 9) {
                        const q = dado.toLowerCase().trim();
                        const matches = inscricoes.filter(i =>
                            (i.nome || '').toLowerCase().includes(q)
                        );
                        if (matches.length === 1) {
                            insc = matches[0];
                        } else if (matches.length > 1) {
                            return {
                                ok: false,
                                msg: `Encontrados ${matches.length} inscritos com "${dado}". Sê mais específico.`
                            };
                        }
                    }

                    if (!insc) {
                        return {
                            ok: false,
                            msg: 'Inscrição paga não encontrada. Confirma os dados ou verifica o pagamento na secretaria.'
                        };
                    }

                    // Verifica se já tem presença na lista
                    const jaExiste = _participantes.find(p =>
                        insc.membro_id
                            ? p.membro_id === insc.membro_id
                            : (p.membros?.email || '').toLowerCase() === (insc.email || '').toLowerCase()
                    );

                    if (jaExiste) {
                        if (jaExiste.status === 'presente') return { ok: true, jaPresente: true, pres: jaExiste };
                        return { ok: true, jaPresente: false, pres: jaExiste };
                    }

                    // Cria entrada em evento_presencas na hora
                    const payload = { evento_id: _evento.id, status: 'pendente' };
                    if (insc.membro_id) payload.membro_id = insc.membro_id;

                    const criado = await sb('evento_presencas', {
                        method: 'POST',
                        body: JSON.stringify([payload])
                    });
                    const novaP = criado?.[0];
                    if (!novaP) return { ok: false, msg: 'Erro ao criar registo de presença.' };

                    const presSimulada = {
                        ...novaP,
                        membros: {
                            id:           insc.membro_id || null,
                            nome:         insc.nome,
                            email:        insc.email,
                            telefone:     insc.telemovel,
                            foto_url:     null,
                            nif:          null,
                            e_lider:      false,
                            e_presbitero: false,
                            e_voluntario: false,
                            professor:    false,
                        }
                    };
                    _participantes.push(presSimulada);
                    return { ok: true, jaPresente: false, pres: presSimulada };
                }

                // ════════════════════════════════════════════════════════════
                // EVENTO GRATUITO — fonte de verdade: evento_presencas + membros
                // ════════════════════════════════════════════════════════════
                let pres = null;

                if (isEmail) {
                    pres = _participantes.find(p =>
                        (p.membros?.email || '').toLowerCase().trim() === dado.toLowerCase().trim()
                    );
                } else {
                    pres = _participantes.find(p => {
                        const mNif = (p.membros?.nif      || '').replace(/\D/g, '');
                        const mTel = (p.membros?.telefone || '').replace(/\D/g, '');
                        if (mNif && mNif === telClean && telClean.length >= 8) return true;
                        if (telClean.length >= 9 && mTel.length >= 9
                            && mTel.slice(-9) === telClean.slice(-9)) return true;
                        return false;
                    });
                }

                if (!pres && dado.length >= 3) {
                    const q = dado.toLowerCase().trim();
                    const matches = _participantes.filter(p =>
                        (p.membros?.nome || '').toLowerCase().includes(q)
                    );
                    if (matches.length === 1) {
                        // Só aceita se for resultado único para evitar enganos
                        pres = matches[0];
                    } else if (matches.length > 1) {
                        return {
                            ok: false,
                            msg: `Encontrados ${matches.length} participantes com "${dado}". Sê mais específico.`
                        };
                    }
                }

                if (!pres) {
                    return { ok: false, msg: 'Participante não encontrado. Verifica os dados ou fala com um responsável.' };
                }

                if (pres.status === 'presente') return { ok: true, jaPresente: true, pres };
                return { ok: true, jaPresente: false, pres };

            } catch (e) {
                console.error('[procurarParticipante]', e);
                return { ok: false, msg: 'Erro ao verificar. Tenta novamente.' };
            }
        }


        /* ── RENDER CARD MEMBRO ───────────────────────────────── */
        function renderMembro() {
            const m = _membroSel;
            const fotoEl = document.getElementById('m-foto');
            if (m.foto_url) {
                fotoEl.innerHTML = `<img src="${m.foto_url}" alt="${m.nome}"
                onerror="this.parentElement.textContent='${(m.nome || '?')[0]}'">`;
            } else {
                fotoEl.textContent = (m.nome || '?')[0];
            }
            document.getElementById('m-nome').textContent = m.nome || '—';

            const bs = [];
            if (m.e_lider)      bs.push('<span class="badge badge-teal">Líder</span>');
            if (m.e_presbitero) bs.push('<span class="badge badge-gold">Presbítero</span>');
            if (m.e_voluntario) bs.push('<span class="badge badge-green">Voluntário</span>');
            if (m.professor)    bs.push('<span class="badge badge-green">Professor</span>');
            if (!bs.length)     bs.push('<span class="badge badge-teal" style="opacity:.6">Membro</span>');
            document.getElementById('m-badges').innerHTML = bs.join('');

            limparMsg('presenca');
            document.getElementById('p_motivo_falta').value = '';
            document.getElementById('btn-presente').disabled = false;
            document.getElementById('btn-faltei').disabled   = false;
        }

        /* ── MARCAR PRESENÇA / FALTA ──────────────────────────── */
        async function pMarcar(tipo) {
            const isPresente = tipo === 'presente';
            const motivo     = document.getElementById('p_motivo_falta')?.value?.trim() || '';
            const status     = isPresente ? 'presente' : (motivo ? 'faltou_motivo' : 'faltou');

            const btnP = document.getElementById('btn-presente');
            const btnF = document.getElementById('btn-faltei');
            btnP.disabled = true; btnF.disabled = true;
            if (isPresente) btnP.textContent = 'A registar...';
            else            btnF.textContent = 'A registar...';
            limparMsg('presenca');

            try {
                const patch = { status, registado_em: new Date().toISOString() };
                if (motivo) patch.motivo = motivo;

                await sb(`evento_presencas?id=eq.${_presencaSel.id}`, {
                    method: 'PATCH',
                    body: JSON.stringify(patch)
                });

                const idx = _participantes.findIndex(p => p.id === _presencaSel.id);
                if (idx >= 0) {
                    _participantes[idx].status = status;
                    if (motivo) _participantes[idx].motivo = motivo;
                }

                const icon  = document.getElementById('conf-icon');
                const title = document.getElementById('conf-title');
                const msg   = document.getElementById('conf-msg');

                if (isPresente) {
                    icon.textContent  = '✓';
                    icon.className    = 'conf-icon ok';
                    title.className   = 'conf-title ok';
                    title.textContent = 'Presença Confirmada';
                    msg.innerHTML     = `<strong>${_membroSel.nome}</strong>, a tua presença em <strong>${_evento.titulo}</strong> foi registada com sucesso!`;
                } else {
                    icon.textContent  = '—';
                    icon.className    = 'conf-icon nao';
                    title.className   = 'conf-title nao';
                    title.textContent = 'Falta Registada';
                    msg.innerHTML     = `<strong>${_membroSel.nome}</strong>, a tua falta foi registada${motivo ? ` com o motivo: <em>"${motivo}"</em>` : ''}.`;
                }

                mostrar('confirmado');

            } catch (e) {
                setMsg('presenca', 'error', 'Erro ao registar. Pede ajuda a um responsável.');
                console.error(e);
                btnP.disabled = false; btnF.disabled = false;
                if (isPresente) btnP.textContent = '✓  Estou Presente';
                else            btnF.textContent = 'Registar Falta';
            }
        }

        /* ── VOLTAR PARA NIF (após confirmação, para próximo check-in) */
        function voltarParaNif() {
            _membroSel   = null;
            _presencaSel = null;
            mostrar('nif');
            // Retoma câmara se estava em modo QR
            if (_modo === 'qr') {
                setTimeout(() => iniciarCamera(), 100);
            }
        }

        /* ── UI HELPERS ───────────────────────────────────────── */
        function fatal(msg) {
            hide('view-loading');
            document.getElementById('erro-msg').textContent = msg;
            show('view-erro');
            ['nif','presenca','confirmado'].forEach(s => {
                const el = document.getElementById('step-' + s);
                if (el) el.classList.remove('active');
            });
            pararCamera();
        }

        function mostrar(step) {
            hide('view-loading');
            hide('view-erro');
            ['nif','presenca','confirmado'].forEach(s => {
                const el = document.getElementById('step-' + s);
                if (el) el.classList.remove('active');
            });
            const el = document.getElementById('step-' + step);
            if (el) el.classList.add('active');

            if (step === 'nif') {
                if (_modo === 'manual') {
                    const inp = document.getElementById('nif-input');
                    if (inp) { inp.value = ''; inp.classList.remove('invalid'); }
                    setTimeout(() => inp?.focus(), 80);
                }
            }
            // Para câmara se sair do step de identificação
            if (step !== 'nif') pararCamera();
        }

        function show(id)  { const el = document.getElementById(id); if (el) el.style.display = ''; }
        function hide(id)  { const el = document.getElementById(id); if (el) el.style.display = 'none'; }
        function setMsg(id, tipo, txt) {
            const el = document.getElementById('msg-' + id);
            if (el) { el.innerHTML = txt; el.className = 'msg show ' + tipo; }
        }
        function limparMsg(id) {
            const el = document.getElementById('msg-' + id);
            if (el) { el.textContent = ''; el.className = 'msg'; }
        }

        /* ── EXPORTS ──────────────────────────────────────────── */
        window.pBuscar       = pBuscar;
        window.pMarcar       = pMarcar;
        window.setModo       = setModo;
        window.iniciarCamera = iniciarCamera;
        window.voltarParaNif = voltarParaNif;

        init();
    })();
</script>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('SW registado:', reg.scope))
                .catch(err => console.error('SW erro:', err));
        });
    }
</script>
