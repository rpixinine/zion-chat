<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Relógio de Oração</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #02161e;
            --card: rgba(255,255,255,0.06);
            --card-strong: rgba(255,255,255,0.1);
            --border: rgba(255,255,255,0.16);
            --text: #ffffff;
            --muted: rgba(255,255,255,0.74);
            --accent: #d8c3a5;
            --font: 'Montserrat', sans-serif;
            --radius: 18px;
            --shadow: 0 14px 32px rgba(0,0,0,0.28);
            --tap: 48px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                    radial-gradient(circle at top, rgba(255,255,255,0.05), transparent 40%),
                    linear-gradient(to bottom, rgba(255,255,255,0.02), transparent 30%);
            z-index: 0;
        }

        header {
            position: relative;
            min-height: 36vh;
            background-image: url('https://storage2.snappages.site/2CD49G/assets/images/11060006_2160x976_2500.png');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: end;
            justify-content: center;
            padding: calc(env(safe-area-inset-top, 0px) + 1.5rem) 1rem 1.25rem;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
        }

        .gradient {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 170px;
            background: linear-gradient(to bottom, rgba(2, 22, 30, 0), rgba(2, 22, 30, 1));
        }

        .hero-content {
            position: relative;
            z-index: 1;
            text-align: center;
            width: 100%;
            max-width: 760px;
        }

        h1 {
            font-size: 1.95rem;
            font-weight: 600;
            line-height: 1.12;
            margin-bottom: 0.7rem;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.45;
            max-width: 31rem;
            margin: 0 auto 0.95rem;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            border: 1px solid rgba(255,255,255,0.26);
            border-radius: 999px;
            padding: 0.65rem 1rem;
            font-size: 0.84rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            backdrop-filter: blur(6px);
        }

        main {
            position: relative;
            z-index: 1;
            width: min(100%, 980px);
            margin: 0 auto;
            padding: 1rem 0.9rem calc(2rem + env(safe-area-inset-bottom, 0px));
        }

        .intro-card,
        .group-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(8px);
        }

        .intro-card {
            padding: 0.95rem;
            margin-bottom: 0.9rem;
        }

        .intro-card p {
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.55;
        }

        .search-row {
            margin: 0 0 0.9rem;
        }

        .search-input {
            width: 100%;
            min-height: var(--tap);
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.04);
            color: var(--text);
            padding: 0.9rem 1rem;
            font-family: inherit;
            font-size: 0.95rem;
        }

        .search-input::placeholder {
            color: rgba(255,255,255,0.45);
        }

        .groups-list {
            display: grid;
            gap: 0.8rem;
        }

        .group-card {
            padding: 0.9rem;
        }

        .group-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.7rem;
            margin-bottom: 0.75rem;
        }

        .group-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 38px;
            height: 38px;
            border-radius: 999px;
            background: var(--card-strong);
            border: 1px solid var(--border);
            font-size: 0.82rem;
            font-weight: 700;
            flex: 0 0 auto;
        }

        .group-time {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.25;
            margin-bottom: 0.25rem;
        }

        .group-name {
            font-size: 0.86rem;
            color: var(--muted);
            line-height: 1.45;
            word-break: break-word;
        }

        .group-actions {
            display: grid;
            gap: 0.5rem;
            margin-top: 0.85rem;
        }

        .action-btn {
            width: 100%;
            min-height: var(--tap);
            border-radius: 13px;
            border: 0;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.92rem;
            cursor: pointer;
            transition: transform 0.16s ease, opacity 0.16s ease;
            padding: 0.85rem 1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .action-btn:hover,
        .action-btn:focus-visible {
            transform: translateY(-1px);
            outline: none;
        }

        .action-btn.primary {
            background: var(--accent);
            color: #1f1913;
        }

        .empty-state {
            padding: 1rem;
            color: var(--muted);
            text-align: center;
            line-height: 1.5;
            border: 1px dashed var(--border);
            border-radius: 16px;
            background: rgba(255,255,255,0.03);
        }

        @media (max-width: 420px) {
            main {
                padding-left: 0.75rem;
                padding-right: 0.75rem;
            }

            h1 {
                font-size: 1.74rem;
            }

            .subtitle {
                font-size: 0.88rem;
            }

            .group-top {
                gap: 0.55rem;
            }

            .group-number {
                min-width: 34px;
                height: 34px;
                font-size: 0.76rem;
            }
        }

        @media (min-width: 768px) {
            header {
                min-height: 48vh;
                padding-bottom: 1.8rem;
            }

            h1 {
                font-size: 3rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            main {
                padding-top: 1.5rem;
            }

            .intro-card,
            .group-card {
                padding: 1.2rem;
            }

            .groups-list {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>

    const groupsList = document.getElementById('groupsList');
    const searchInput = document.getElementById('searchInput');

    function buildGroupCard(group) {
        const card = document.createElement('article');
        card.className = 'group-card';

        card.innerHTML = `
        <div class="group-top">
          <div class="group-number">${group.id}</div>
          <div>
            <div class="group-time">${group.time}</div>
            <div class="group-name">${group.name}</div>
          </div>
        </div>
        <div class="group-actions">
          <a class="action-btn primary" href="${group.link}" target="_blank" rel="noopener noreferrer">Entrar no grupo deste turno</a>
        </div>
      `;



        return card;
    }

    function renderGroups(filter = '') {
        const normalizedFilter = filter.trim().toLowerCase();
        const filteredGroups = prayerGroups.filter(group => {
            const haystack = `${group.id} ${group.time} ${group.name}`.toLowerCase();
            return haystack.includes(normalizedFilter);
        });

        groupsList.innerHTML = '';

        if (!filteredGroups.length) {
            groupsList.innerHTML = '<div class="empty-state">Nenhum turno encontrado para esta pesquisa.</div>';
            return;
        }

        filteredGroups.forEach(group => {
            groupsList.appendChild(buildGroupCard(group));
        });
    }

    searchInput.addEventListener('input', (event) => {
        renderGroups(event.target.value);
    });

    renderGroups();
