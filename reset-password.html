<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Password — Zion Lisboa</title>

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#009098">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zion Lisboa">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --cta:        #009098;
            --cta-dark:   #007078;
            --cta-light:  #00adb6;
            --cta-faint:  rgba(0, 144, 152, 0.12);
            --bg:         #02161e;
            --bg-panel:   #071c26;
            --bg-card:    #0a2232;
            --bg-input:   rgba(255, 255, 255, 0.06);
            --border:     rgba(255, 255, 255, 0.12);
            --border-cta: rgba(0, 144, 152, 0.40);
            --text:       #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --text-faint: rgba(255, 255, 255, 0.45);
            --red:        #fc8a8a;
            --red-bg:     rgba(252, 138, 138, 0.08);
            --red-border: rgba(252, 138, 138, 0.25);
            --green:      #6ee7b7;
            --green-bg:   rgba(110, 231, 183, 0.08);
            --green-border: rgba(110, 231, 183, 0.25);
            --font:       'Montserrat', sans-serif;
        }

        html, body {
            min-height: 100%;
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
        }

        /* Fundo decorativo */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                    radial-gradient(ellipse at 15% 20%, rgba(0,144,152,0.08) 0%, transparent 55%),
                    radial-gradient(ellipse at 85% 80%, rgba(0,144,152,0.05) 0%, transparent 55%);
            pointer-events: none;
        }

        /* ── Card ─────────────────────────────────────── */
        .card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0,0,0,0.40);
            position: relative;
            z-index: 1;
            animation: fadeUp 0.3s ease;
        }

        /* Header */
        .card-header {
            background: linear-gradient(160deg, #02161e 0%, #083040 100%);
            border-bottom: 1px solid var(--border);
            padding: 28px 32px;
            text-align: center;
        }
        .card-header-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 2px;
        }
        .card-header-line {
            width: 32px; height: 2px;
            background: var(--cta);
            border-radius: 2px;
            opacity: 0.7;
        }
        .card-header-title {
            font-family: var(--font);
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 10px;
            color: #fff;
        }
        .card-header-logo img {
            height: 32px;
            width: auto;
            filter: brightness(0) invert(1);
            opacity: 0.9;
            object-fit: contain;
        }
        .card-header-sub {
            font-family: var(--font);
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.40);
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* Body */
        .card-body { padding: 32px; }

        /* ── Form ─────────────────────────────────────── */
        .form-title {
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--cta-light);
            margin-bottom: 6px;
        }
        .form-sub {
            font-size: 13px;
            color: var(--text-faint);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .form-group { margin-bottom: 14px; }
        .form-label {
            display: block;
            font-family: var(--font);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-faint);
            margin-bottom: 6px;
        }

        /* Input com olhinho */
        .input-wrap { position: relative; }
        .input-wrap .form-input { padding-right: 42px; }
        .password-toggle {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            cursor: pointer; padding: 4px;
            color: var(--text-faint);
            display: flex; align-items: center; justify-content: center;
            transition: color 0.2s;
        }
        .password-toggle:hover { color: var(--cta-light); }
        .password-toggle svg { width: 17px; height: 17px; pointer-events: none; }
        .password-toggle .eye-off { display: none; }
        .password-toggle.visible .eye-on  { display: none; }
        .password-toggle.visible .eye-off { display: block; }

        .form-input {
            width: 100%;
            padding: 11px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            font-family: var(--font);
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input::placeholder { color: var(--text-faint); }
        .form-input:focus { border-color: var(--cta); box-shadow: 0 0 0 3px var(--cta-faint); }
        .form-input.error { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-bg); }

        /* Indicador de força */
        .strength-bars { display: flex; gap: 4px; margin-top: 7px; }
        .strength-bar {
            flex: 1; height: 3px; border-radius: 2px;
            background: rgba(255,255,255,0.10);
            transition: background 0.3s;
        }
        .strength-bar.weak   { background: var(--red); }
        .strength-bar.medium { background: #f59e0b; }
        .strength-bar.strong { background: var(--green); }
        .strength-label {
            font-size: 10px;
            color: var(--text-faint);
            margin-top: 5px;
            min-height: 14px;
            transition: color 0.3s;
        }
        .strength-label.weak   { color: var(--red); }
        .strength-label.medium { color: #f59e0b; }
        .strength-label.strong { color: var(--green); }

        /* Mensagens */
        .msg-box {
            padding: 10px 13px; border-radius: 8px;
            font-size: 13px; margin-bottom: 14px;
            display: none; line-height: 1.5;
        }
        .msg-box.error   { background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red); display: block; }
        .msg-box.success { background: var(--cta-faint); border: 1px solid var(--border-cta); color: var(--cta-light); display: block; }

        /* Botão */
        .submit-btn {
            width: 100%; padding: 13px;
            border: 1px solid var(--cta); border-radius: 8px;
            background: var(--cta); color: #fff;
            font-family: var(--font); font-size: 12px; font-weight: 600;
            letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; margin-top: 4px;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(0,144,152,0.25);
        }
        .submit-btn:hover { background: var(--cta-light); border-color: var(--cta-light); box-shadow: 0 6px 28px rgba(0,144,152,0.35); transform: translateY(-1px); }
        .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

        /* Link voltar */
        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            margin-top: 16px;
            font-family: var(--font); font-size: 11px; letter-spacing: 1px;
            color: var(--text-faint);
            text-decoration: underline; text-underline-offset: 3px;
            cursor: pointer; background: none; border: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--cta-light); }

        /* Estados: inválido e sucesso */
        .state-box { text-align: center; padding: 8px 0 4px; }
        .state-icon { margin-bottom: 16px; }
        .state-icon svg { width: 52px; height: 52px; }
        .state-title {
            font-family: var(--font); font-size: 15px; font-weight: 600;
            margin-bottom: 8px;
        }
        .state-txt { font-size: 13px; color: var(--text-faint); line-height: 1.7; margin-bottom: 24px; }

        .state-box.invalid .state-icon svg { color: var(--red); }
        .state-box.invalid .state-title    { color: var(--red); }
        .state-box.success .state-icon svg { color: var(--green); }
        .state-box.success .state-title    { color: var(--green); }

        /* Loading */
        .loading {
            text-align: center; padding: 16px 0 8px;
            font-size: 13px; color: var(--text-faint);
        }
        .spin {
            width: 28px; height: 28px;
            border: 2px solid rgba(0,144,152,0.20);
            border-top-color: var(--cta);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        input:-webkit-autofill,
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px #0d2535 inset !important;
            -webkit-text-fill-color: #fff !important;
        }

        @keyframes spin    { to { transform: rotate(360deg) } }
        @keyframes fadeUp  { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }
    </style>
</head>
<body>

<div class="card">
    <!-- Header com logo -->
    <div class="card-header">
        <div class="card-header-logo">
            <div class="card-header-line"></div>
            <img src="assets/logo-zion-branca.svg" alt="ZION"
                 onerror="this.style.display='none'; document.querySelector('.card-header-title').style.display='block'">
            <span class="card-header-title" style="display:none">ZION</span>
            <div class="card-header-line"></div>
        </div>
        <div class="card-header-sub">Lisboa · Portugal</div>
    </div>

    <!-- Body dinâmico -->
    <div class="card-body" id="card-body">
        <div class="loading">
            <div class="spin"></div>
            A verificar link...
        </div>
    </div>
</div>

<script>
    const token = new URLSearchParams(window.location.search).get('token');

    window.addEventListener('DOMContentLoaded', () => {
        if (!token) {
            renderInvalido('Link inválido', 'Este link de recuperação não é válido.<br>Pede um novo na página de login.');
        } else {
            renderForm();
        }
    });

    // ── Toggle password ────────────────────────────────
    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const isText = input.type === 'text';
        input.type = isText ? 'password' : 'text';
        btn.classList.toggle('visible', !isText);
    }

    // ── Força da password ──────────────────────────────
    function avaliarForca(val) {
        if (val.length < 6) return { nivel: 0, label: '', cls: '' };
        let score = 0;
        if (val.length >= 8)          score++;
        if (/[A-Z]/.test(val))        score++;
        if (/[0-9]/.test(val))        score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        if (score <= 1) return { nivel: 1, label: 'Fraca',  cls: 'weak' };
        if (score <= 2) return { nivel: 2, label: 'Média',  cls: 'medium' };
        return             { nivel: 3, label: 'Forte',  cls: 'strong' };
    }

    function atualizarForca(val) {
        const { nivel, label, cls } = avaliarForca(val);
        const bars  = document.querySelectorAll('.strength-bar');
        const texto = document.querySelector('.strength-label');
        bars.forEach((b, i) => {
            b.className = 'strength-bar';
            if (i < nivel) b.classList.add(cls);
        });
        if (texto) {
            texto.textContent  = val.length >= 6 ? label : '';
            texto.className    = `strength-label ${val.length >= 6 ? cls : ''}`;
        }
    }

    // ── Render: form ───────────────────────────────────
    function renderForm() {
        document.getElementById('card-body').innerHTML = `
            <div class="form-title">Nova password</div>
            <div class="form-sub">Define uma nova password segura para a tua conta.</div>
            <div class="msg-box" id="reset-msg"></div>

            <div class="form-group">
                <label class="form-label">Nova password</label>
                <div class="input-wrap">
                    <input class="form-input" id="new-password" type="password"
                           placeholder="Mínimo 6 caracteres"
                           oninput="atualizarForca(this.value)"
                           onkeydown="if(event.key==='Enter') doReset()">
                    <button type="button" class="password-toggle" onclick="togglePassword('new-password', this)" tabindex="-1">
                        <svg class="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
                <div class="strength-bars">
                    <div class="strength-bar"></div>
                    <div class="strength-bar"></div>
                    <div class="strength-bar"></div>
                </div>
                <div class="strength-label"></div>
            </div>

            <div class="form-group">
                <label class="form-label">Confirmar password</label>
                <div class="input-wrap">
                    <input class="form-input" id="confirm-password" type="password"
                           placeholder="Repete a password"
                           onkeydown="if(event.key==='Enter') doReset()">
                    <button type="button" class="password-toggle" onclick="togglePassword('confirm-password', this)" tabindex="-1">
                        <svg class="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
            </div>

            <button class="submit-btn" id="reset-btn" onclick="doReset()">Guardar Nova Password</button>
            <div style="text-align:center">
                <a href="login.html" class="back-link">← Voltar ao login</a>
            </div>`;
    }

    // ── Render: inválido ───────────────────────────────
    function renderInvalido(titulo, texto) {
        document.getElementById('card-body').innerHTML = `
            <div class="state-box invalid">
                <div class="state-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="15" y1="9" x2="9" y2="15"/>
                        <line x1="9" y1="9" x2="15" y2="15"/>
                    </svg>
                </div>
                <div class="state-title">${titulo}</div>
                <div class="state-txt">${texto}</div>
                <a href="login.html" class="back-link">← Voltar ao login</a>
            </div>`;
    }

    // ── Render: sucesso ────────────────────────────────
    function renderSucesso() {
        document.getElementById('card-body').innerHTML = `
            <div class="state-box success">
                <div class="state-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                        <polyline points="22 4 12 14.01 9 11.01"/>
                    </svg>
                </div>
                <div class="state-title">Password alterada!</div>
                <div class="state-txt">
                    A tua password foi actualizada com sucesso.<br>
                    Serás redirecionado para o login em instantes...
                </div>
                <a href="login.html" class="back-link">Ir para o login →</a>
            </div>`;
        setTimeout(() => { window.location.href = 'login.html'; }, 3000);
    }

    // ── Submit ─────────────────────────────────────────
    async function doReset() {
        const password  = document.getElementById('new-password')?.value || '';
        const password2 = document.getElementById('confirm-password')?.value || '';
        const msgEl     = document.getElementById('reset-msg');
        if (!msgEl) return;
        msgEl.className = 'msg-box';

        // Limpa erros anteriores
        document.querySelectorAll('.form-input.error').forEach(el => el.classList.remove('error'));

        if (password.length < 6) {
            document.getElementById('new-password').classList.add('error');
            msgEl.textContent = 'A password deve ter pelo menos 6 caracteres.';
            msgEl.className = 'msg-box error';
            return;
        }
        if (password !== password2) {
            document.getElementById('confirm-password').classList.add('error');
            msgEl.textContent = 'As passwords não coincidem.';
            msgEl.className = 'msg-box error';
            return;
        }

        const btn = document.getElementById('reset-btn');
        btn.disabled = true; btn.textContent = 'A guardar...';

        try {
            const res  = await fetch('/api/auth/reset-password', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ token, password }),
            });
            const data = await res.json();

            if (!res.ok) {
                if (res.status === 400) {
                    renderInvalido('Link expirado', (data.error || 'Este link já não é válido.') + '<br>Pede um novo na página de login.');
                    return;
                }
                throw new Error(data.error || 'Erro ao alterar password.');
            }

            renderSucesso();

        } catch(e) {
            if (msgEl) {
                msgEl.textContent = e.message || 'Erro ao guardar. Tenta novamente.';
                msgEl.className = 'msg-box error';
            }
            if (btn) { btn.disabled = false; btn.textContent = 'Guardar Nova Password'; }
        }
    }
</script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('SW registado:', reg.scope))
                .catch(err => console.error('SW erro:', err));
        });
    }
</script>
</body>
</html>
