<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Zion — Zion Church Lisboa</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        /* ── Hero banner ─────────────────────────────────── */
        .banner {
            min-height: 28vh !important;
            background-image: url('assets/palco-zion.avif') !important;
            background-size: cover !important;
            background-position: center !important;
            align-items: flex-end !important;
            justify-content: space-between !important;
            display: flex !important;
            padding: 0 14px 14px !important;
            overflow: hidden !important;
        }
        .banner img,
        .banner-fallback { display: none !important; }

        .banner-overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.50);
        }
        .banner-gradient {
            position: absolute; left: 0; right: 0; bottom: 0;
            height: 120px;
            background: linear-gradient(to bottom, rgba(2,22,30,0), rgba(2,22,30,1));
        }

        /* ── Nav pills (dark style) ──────────────────────── */
        .back-btn {
            position: relative; z-index: 2;
            display: flex; align-items: center; gap: 6px;
            background: rgba(2,22,30,0.65);
            border: 1px solid rgba(216,195,165,0.35);
            border-radius: 999px;
            padding: 6px 14px;
            font-family: var(--font-title); font-size: 10px; letter-spacing: 1.5px;
            color: var(--primary); text-decoration: none;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(216,195,165,0.12); border-color: var(--primary-light); color: var(--primary-light); }

        .page-badge {
            position: relative; z-index: 2;
            font-family: var(--font-title); font-size: 10px; letter-spacing: 2px;
            color: var(--primary); text-transform: uppercase;
            background: rgba(2,22,30,0.65);
            border: 1px solid rgba(216,195,165,0.35);
            border-radius: 999px; padding: 6px 14px;
            backdrop-filter: blur(8px);
        }

        /* ── Content ─────────────────────────────────────── */
        .content {
            flex: 1; overflow-y: auto;
            padding: 20px 18px 24px;
            background: var(--bg-input);
        }
        .content::-webkit-scrollbar { width: 4px; }
        .content::-webkit-scrollbar-thumb { background: rgba(0,144,152,0.25); border-radius: 2px; }

        /* ── Cards ───────────────────────────────────────── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 18px; margin-bottom: 10px;
            box-shadow: var(--shadow-sm);
            animation: fadeUp 0.4s ease both;
        }
        .card--highlight {
            background: linear-gradient(135deg, var(--primary-faint), rgba(0,144,152,0.01));
            border-color: var(--border-strong);
        }
        .card--verse {
            text-align: center; padding: 24px 20px;
            background: linear-gradient(135deg, var(--primary-faint), rgba(0,144,152,0.01));
            border-color: var(--border-strong);
        }
        .card-badge {
            display: inline-block; padding: 2px 10px;
            border-radius: var(--radius-full);
            background: var(--primary-faint); border: 1px solid var(--border);
            font-family: var(--font-title); font-size: 9px; letter-spacing: 1.5px;
            text-transform: uppercase; color: var(--primary-dark); margin-bottom: 10px;
        }
        .card-title {
            font-family: var(--font-title); font-size: 16px; font-weight: 600;
            color: var(--primary-dark); margin-bottom: 8px;
        }
        .card-text {
            font-size: 14px; color: var(--text-muted);
            line-height: 1.75; white-space: pre-line;
        }
        .card-ref {
            font-style: italic; font-size: 11px; color: var(--text-faint);
            margin-top: 8px; display: block;
        }

        /* ── Pastor ──────────────────────────────────────── */
        .pastor-row { display: flex; align-items: center; gap: 14px; }
        .pastor-foto {
            width: 64px; height: 64px; border-radius: 50%; flex-shrink: 0;
            background: var(--primary-faint); border: 2px solid var(--border-strong);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-title); font-size: 20px; color: var(--primary-dark);
            overflow: hidden;
        }
        .pastor-foto img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }
        .pastor-info { flex: 1; min-width: 0; }
        .pastor-links { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .pastor-link {
            display: flex; align-items: center; gap: 4px;
            font-family: var(--font-title); font-size: 9px; letter-spacing: 1px;
            color: var(--primary); text-decoration: none;
            padding: 3px 10px; border-radius: var(--radius-full);
            border: 1px solid var(--border); background: var(--primary-faint);
            transition: all 0.2s;
        }
        .pastor-link:hover { background: var(--primary-soft); border-color: var(--primary-light); }

        /* ── Versículo ───────────────────────────────────── */
        .verse-text { font-family: var(--font-title); font-style: italic; font-size: 16px; color: var(--primary-dark); line-height: 1.6; margin-bottom: 10px; }
        .verse-ref  { font-size: 11px; color: var(--text-faint); letter-spacing: 2px; text-transform: uppercase; }

        .content .section-label { margin: 20px 0 10px; text-align: left; }
        .content .section-label:first-child { margin-top: 0; }

        .other-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        @media (max-width: 400px) { .other-grid { grid-template-columns: 1fr; } }
        .other-item {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 10px 12px;
            animation: fadeUp 0.4s ease both;
        }
        .other-item-label { font-family: var(--font-title); font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-faint); margin-bottom: 4px; }
        .other-item-value { font-size: 13px; color: var(--text-main); line-height: 1.5; word-break: break-word; }
        .other-item-value a { color: var(--primary); text-decoration: none; }
        .other-item-value a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="page-wrapper">

    <div class="banner">
        <div class="banner-overlay"></div>
        <div class="banner-gradient"></div>
        <a href="index" class="back-btn">← Início</a>
        <span class="page-badge">Zion</span>
    </div>

    <div class="gold-line"></div>

    <div class="content" id="main-content">
        <div class="loading"><div class="spin"></div>A carregar...</div>
    </div>

    <div class="footer" id="main-footer">
        <div class="footer-links">
            <a class="footer-link" href="https://zionchurch.org.br/" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                Site Global
            </a>
            <a class="footer-link" href="https://zionlisboa.pt/" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                Site Oficial
            </a>
            <a class="footer-link" href="https://www.instagram.com/zionlisboa/?hl=en" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
                @ZionLisboa
            </a>
        </div>
        <div class="footer-divider"></div>
        <div class="footer-bottom">
            <div class="footer-copy" id="footer-copy">© 2026 Zion Lisboa — Todos os direitos reservados</div>
            <div class="footer-address" id="footer-addr">Rua do Centro Cultural, 11 · 1700-036 Alvalade · Lisboa, Portugal</div>
        </div>
    </div>

</div>

<script>
    const SUPA_URL = window.SUPABASE_URL   || '';
    const SUPA_KEY = window.SUPABASE_ANON_KEY || '';
    const CHAVES_FIXAS = new Set(['nossa_visao','lema','copy','endereco','codigo_postal','cidade','maps_url','instagram','site','telefone']);
    const PREFIXO_VALOR = 'valor_';

    async function sb(path) {
        const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
            headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json' }
        });
        if (!r.ok) throw new Error(`Supabase ${r.status}`);
        return r.json();
    }

    function esc(s) {
        return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function isUrl(str) { try { return ['http:','https:'].includes(new URL(str).protocol); } catch { return false; } }
    function getInitials(nome) { return (nome||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
    function parseLema(valor) { const m=valor.match(/^(.*?)\s*\(([^)]+)\)\s*$/s); return m?{texto:m[1].trim(),ref:m[2].trim()}:{texto:valor,ref:null}; }
    function chaveToLabel(chave) { return chave.replace(PREFIXO_VALOR,'').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); }

    function renderPastor(p, delay) {
        const initials = getInitials(p.nome);
        const fotoHtml = p.foto_url
            ? `<div class="pastor-foto"><img src="${esc(p.foto_url)}" alt="${esc(p.nome)}" onerror="this.parentElement.textContent='${initials}'"></div>`
            : `<div class="pastor-foto">${initials}</div>`;
        const svgIG   = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>`;
        const svgMail = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3 7 12 13 21 7"/></svg>`;
        const svgTel  = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.71 3.38 2 2 0 0 1 3.68 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.56a16 16 0 0 0 5.82 5.82l1.62-1.62a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`;
        const links = [
            p.instagram ? `<a class="pastor-link" href="https://www.instagram.com/${p.instagram}/" target="_blank">${svgIG} Instagram</a>` : '',
            p.email     ? `<a class="pastor-link" href="mailto:${esc(p.email)}">${svgMail} Email</a>` : '',
            p.telefone  ? `<a class="pastor-link" href="tel:${esc(p.telefone)}">${svgTel} Telefone</a>` : '',
        ].filter(Boolean).join('');
        return `
    <div class="card card--highlight" style="animation-delay:${delay}s">
        <div class="card-badge">${esc(p.cargo)}</div>
        <div class="pastor-row">
            ${fotoHtml}
            <div class="pastor-info">
                <div class="card-title" style="margin-bottom:4px">${esc(p.nome)}</div>
                ${p.bio ? `<div class="card-text" style="font-size:13px">${esc(p.bio)}</div>` : ''}
            </div>
        </div>
        ${links ? `<div class="pastor-links">${links}</div>` : ''}
    </div>`;
    }

    function renderValor(chave, cfg, delay) {
        const label = cfg.descricao || chaveToLabel(chave);
        const partes = cfg.valor.split('\n\n');
        const textoMain = partes[0];
        const textoRef  = partes.length > 1 ? partes.slice(1).join(' ').trim() : null;
        return `
    <div class="card" style="animation-delay:${delay}s">
        <div class="card-badge">Valor</div>
        <div class="card-title">${esc(label)}</div>
        <div class="card-text">${esc(textoMain)}</div>
        ${textoRef ? `<span class="card-ref">${esc(textoRef)}</span>` : ''}
    </div>`;
    }

    function renderOutras(itens, startDelay) {
        if (!itens.length) return '';
        const pills = itens.map((item, i) => {
            const label = item.descricao || chaveToLabel(item.chave);
            const valorHtml = isUrl(item.valor)
                ? `<a href="${esc(item.valor)}" target="_blank">${esc(item.valor)}</a>`
                : esc(item.valor).replace(/\n/g,'<br>');
            return `
        <div class="other-item" style="animation-delay:${startDelay + i * 0.05}s">
            <div class="other-item-label">${esc(label)}</div>
            <div class="other-item-value">${valorHtml}</div>
        </div>`;
        }).join('');
        return `<p class="section-label">Outras Informações</p><div class="other-grid">${pills}</div>`;
    }

    function renderFooter(cfg) {
        const instagram = cfg['instagram']?.valor || 'https://www.instagram.com/zionlisboa/';
        const site      = cfg['site']?.valor      || 'https://zionchurch.org.br/';
        const copy      = cfg['copy']?.valor      || '© 2026 Zion Lisboa — Todos os direitos reservados';
        const addr      = cfg['endereco']?.valor  || '';
        const cp        = cfg['codigo_postal']?.valor || '';
        const cidade    = cfg['cidade']?.valor    || '';
        const addrLine  = [addr, [cp, cidade].filter(Boolean).join(' ')].filter(Boolean).join(' · ');
        document.getElementById('footer-links').innerHTML = `
        <a class="footer-link" href="${esc(site)}" target="_blank">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            Site Oficial
        </a>
        <a class="footer-link" href="${esc(instagram)}" target="_blank">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
            @ZionLisboa
        </a>`;
        document.getElementById('footer-copy').textContent = copy;
        if (addrLine) document.getElementById('footer-addr').textContent = addrLine;
    }

    async function init() {
        try {
            const [pastoresRaw, configsRaw] = await Promise.all([
                sb('pastores?select=*&ativo=eq.true&order=created_at.asc'),
                sb('configuracoes?select=*'),
            ]);
            const cfg = {};
            (Array.isArray(configsRaw) ? configsRaw : []).forEach(row => { cfg[row.chave] = { valor: row.valor, descricao: row.descricao }; });
            const pastores = Array.isArray(pastoresRaw) ? pastoresRaw : [];
            pastores.sort((a,b) => {
                const aP = (a.cargo||'').toLowerCase().includes('principal');
                const bP = (b.cargo||'').toLowerCase().includes('principal');
                return (aP && !bP) ? -1 : (!aP && bP) ? 1 : 0;
            });
            const valoresChaves = Object.keys(cfg).filter(k => k.startsWith(PREFIXO_VALOR));
            const outrasChaves  = Object.keys(cfg).filter(k => !CHAVES_FIXAS.has(k) && !k.startsWith(PREFIXO_VALOR));
            let html = ''; let delay = 0.05;
            if (pastores.length) { html += `<p class="section-label">Liderança</p>`; pastores.forEach(p => { html += renderPastor(p, delay); delay += 0.07; }); }
            const temVisao = !!cfg['nossa_visao']; const temValores = valoresChaves.length > 0;
            if (temVisao || temValores) html += `<p class="section-label">Visão & Valores</p>`;
            if (temVisao) {
                html += `<div class="card" style="animation-delay:${delay}s"><div class="card-badge">Nossa Visão</div><div class="card-title">${esc(cfg['nossa_visao'].descricao || 'Transformar a Terra')}</div><div class="card-text">${esc(cfg['nossa_visao'].valor)}</div></div>`;
                delay += 0.07;
            }
            valoresChaves.forEach(chave => { html += renderValor(chave, cfg[chave], delay); delay += 0.07; });
            if (cfg['lema']) {
                const { texto, ref } = parseLema(cfg['lema'].valor);
                html += `<div class="card card--verse" style="animation-delay:${delay}s"><div class="verse-text">"${esc(texto)}"</div>${ref ? `<div class="verse-ref">${esc(ref)}</div>` : ''}</div>`;
                delay += 0.07;
            }
            html += renderOutras(outrasChaves.map(k => ({ chave: k, ...cfg[k] })), delay);
            document.getElementById('main-content').innerHTML = html || `<div class="empty"><div class="empty-icon">📖</div><div class="empty-txt">Sem conteúdo disponível.</div></div>`;
            renderFooter(cfg);
        } catch (e) {
            console.error(e);
            document.getElementById('main-content').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-txt">Erro ao carregar. Tenta novamente.</div></div>`;
        }
    }
    init();
</script>
</body>
</html>
